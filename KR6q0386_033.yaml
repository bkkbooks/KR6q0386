body:
  text: 侍者福善日録門人通炯編輯嶺南弟子劉起相重較贊然燈古佛贊有引然燈古佛釋迦之師也往昔有緣無心而遇因布髮掩泥持青蓮花而作供養得蒙授記遂證菩提今睹光像欽渴翹仰焚香作禮以偈贊曰稽首然燈吾師之師妙用無極故我歸依白日麗天萬象斯鑒滿月寒空衆星齊現明所不明照其不照惟此智燈光明朗耀秉法王令佩實相印磐石晏安十方鎮靜其心如空靡所不容有扣之者響若洪鐘其容湛寂恬然凝謐瞻之仰之諸障頓息緣會而遇無心而得紺髮滿頭青蓮一葉布髮掩泥志誠歸命持花作供貴乎清淨無上菩提當蒙授記罔象玄珠不容思議心心相印光光互融慧命無量功德無窮貝葉佛母贊有引東為法道源流達摩航海而來六祖應讖而出喇刺臂而裹海眼跋陀忘形而挾楞伽皆首出仙城初開法運自爾以來寥寥千載豈出彼沒此古人獨負而今人絶分耶固在導之者何如耳故曰不是無禪只是無師斯言有味哉余蒙恩竄嶺海觀察海門周公以視鹺至公當代搢紳中具正法眼人也與余以法相親每談必以第一義示人為事仲春十之三日同查汝定過朱氏草堂劉萬諸子畢集大為發揚此事諸子各發無上道心季子乃曰向不知佛今也知心既心即是佛吾當以佛為事仲子請越之高士蔣不任寫此像余歡喜稽首為贊曰佛體如空無處不容牆壁瓦礫達之者通秋水澄澄朝霞燦燦景落波心光浮素練識之不見見之不識翳目空華太虗鳥跡貝葉無文法身非有萬壑松聲作獅子吼碧眼鬍腮維摩病骨漏逗形骸分明眉目咦百花深處鷓鴣啼一聲呌破春山緑西方三聖贊稽首寂光主無量壽大師能以寂滅心現形十方界遍入有情身而作生死宰辟如日月光無心而成照蒙光照燭者無不遂其生又如慈乳母能達嬰兒心飢飽各適時不以乳為病我觀世閒人病痛必呼母以母為自心不呼不自解是故三有中凡在有情者苦樂不自釋適然念我師以師慈力光先入衆生心故能一照閒必出生死苦況復有大勢而復得大悲相比而化物物無不化者刀山并劍樹忽變作寶林鑊湯及爐炭偶成八德水皆以自心為轉變一念中如酵入乳酪醍醐不外求何況荊棘林不為清淨土是故念我師必若子憶母子母相憶時無不相見者念極諸想滅身心頓脫空寂光忽現前照用一時發即此苦穢軀便成極樂國始知日月中無不極樂者化佛贊似人非人日面月面從何處來者裏出現見時不識識時不見病眼空華太虗閃電逢人個個歎奇哉看行一味行方便雪山苦行佛贊肝膽冰霜形骸土木生來俊俏天然奇骨不是不捨皇宮祇因不愛喫肉走入萬疊寒嵒受盡凄凉寂寞一朝餓得眼睛華錯把明珠換魚目渾身惹得是非深直至而今抱冤屈幾度逢人話本懷才欲開言雙淚濮雙淚濮不知那個是知音但得相逢心願足又不戀王宮不住兜率脫却珍御衣埋身千丈雪瘦骨如柴剛腸似鐵六年凍餓口難開幾度思量心未瞥一朝驀地睹明星從前妄想都休歇便欲挨身入閙藍滿目風塵徒蹩躠返惹時人話短長誰知弄巧翻成拙直至而今怨未申通身是口難分說休分說費周折肝腸瀝盡空饒舌無限春光百鳥啼杜䳌呌徹空山血又身墮雪濤心寒秋水內外洞然又何彼此思之不及類之難比夢想不到誰能議擬若欲求之是非鋒起但莫思量自然法爾又骨如柴心似雪念如冰面似鐵不是剛腸疾惡人怎肯拋家輕失業幸賴明星換出頭免教笑折傍人舌又世念已枯諸緣盡撇千尺寒嵓萬年冰雪一片身心放下時從前妄想都休歇都休歇但看幾點疏星一輪明月又骨瘦心寒冰枯雪老不是者翻畢竟不好六年凍餓實難當可幸明星上得早當初錯愛者些些使得兒孫臥荒草又拋擲金輪王如弃捨殘涕埋身雪山中絶無一毫事端坐苦思惟不知竟為誰只待明星上當頭下一椎何似當初未醒時皎皎月挂珊瑚枝舍那如來法身贊有引余寓旅泊菴中為諸白衣談楞嚴適門人王安舜持舍那如來畫像一幅高三尺許遍身衣紋并頂上圓光通書華嚴經一部字如針鋒芥孔而點畫分明行如遊絲飄如散髮其身當胸闊一尺二寸則計字二百二十行有奇其圓光邊約二寸圍則字幾百行其微密細緻又過於身真有不可得而思議者焉以色古而不可讀侍者諦視於左臂辨出一一塵中一切佛則知其經為雜華無疑矣余見之歡喜踊躍而歎曰此非蒙如來甚微細智而加被者決不能至此然豈粗浮想像而可得耶因焚香稽首以偈贊曰我聞諸佛微細智以此證得妙法身遍在衆生心想中而能造作難思業今見衆生微細智遍入如來法身內於一微細毛孔中莊嚴難思法性海一毛一塵本性如具含無盡功德藏猶如清淨璃琉瓶內盛微細多芥子炳然顯現無障礙無壞無雜各安立假離婁眼極最明窮盡目力不能辨始觀法身本無相今見佛以法為身法身本不離衆生故從微細想中現是衆生心與如來無二無別互相入如是微妙淨功德久墮沉昏諸暗冥譬如微塵含大經苟非智眼不能見善哉佛子智力雄一見即生真實信剖破微塵出此經令我頓入華藏海佛心既即衆生心我入即同衆生入我身與佛及衆生互相攝入如珠網如此圓滿大法界全憑佛子信力持以此信力作佛事展轉攝化廣無邊見聞隨喜禮念閒彈指即能成正覺是故我贊佛子德廣大如空不可量我願法界諸衆生普入佛子信心住思惟佛贊稽首吾師何為獨步三七思惟如何可度不用思惟但行平等儻遇知音自然猛省思議佛贊默然思惟所思為誰思之之地人孰知之十方一念衆生一心但有知者即是知音明月在天影現衆水不出不入無彼無此如雲浮空無心而遍於一毫端十方齊現一切圓成萬緣具足但不思惟即如如佛無量壽佛贊有引余昔誦十六觀經以佛觀為第一故修淨業者靡不從事至若工繪家各有所本而於佛像尤難之蓋以垢濁心鏡現妙相影豈易致哉越人蔣生太清英年而獨精此技豈夙觀行所致耶余入粵之二年戊戌春蔣生亦至所繪佛菩薩不滿十幅獨遺蓮阜居士陳元譽三聖像精妙絶倫蓋居士長齊繡佛有年亦精神感通而致耶嗚呼蔣生尋與物化睹此遂成千古矣居士焚香稽首請贊余邈焉興懷贊曰稽首無量光徹照十方際湛然不思議永破癡暗冥我觀寂滅境清淨絶纖塵大地及山河竟從何處起刀山及劍林是誰之所造良以自心迷堅固妄想結譬如水成冰業風鼓扇力於受想夢中屬此燒炙苦我師冷眼看自心不耐細現此比丘身急撾塗毒鼓令諸耳之者一觸生死絶猶如妙蓮華扶疏出秋水又以大悲勢左提而右挈直使恐畏途翻成極樂土妄想歇滅處正覺即現前猶如湯消氷但由轉變力奇哉善男子夙習般若深能以一毫端現此希有事儼若大願時翹勤共悲仰皎如淨滿月遊於畢竟空心水垢濁澄光影一時現熱惱即清涼諸想頓寂滅真常妙樂地本不假外求即此幻化身便登安養國具此難思力是故我歸依願此盡未來永作大依怙又稽首無量壽端居常寂光普照法界空攝受有情者衆生迷本有逐諸生滅轉輪回六趣中如亡子背母慈母憶其子未嘗一念捨子若暫回光無有不見者以我出苦願入佛攝受心猶如空合空似以水投水衆生無明暗即是常寂光妄想一念歇常光當下現生滅無去來法性本不動見此法性身無量壽常樂接引佛贊稽首慈尊大光明聚淨法界身不可思議諸苦衆生入大悲眼眼淨無塵圓明赴感入衆生心如月墮水心水澄清故無彼此不接而來無生而至是故我師常住在世又冷地不禁入塵垂手分明示人人不知有但肯一念暫回光蓮華頓現非良久又稽首寂光主清淨妙法身如月現星中湛然即衆水以愍衆生故不受法性樂示現微塵剎屈垂方便手俯提弱器者同歸極樂土以衆生即心土亦非心外惟以心印心如以水入水是故見聞者一念即歸依但即自心觀本無心外佛色相如空華猶是翳眼見惟以清淨空寂然了無相以此見自心即見如如者又踞常寂光坐清淨土垂手入廛為衆生故以本法身現衆生心故十方界悉知其名憑悲願力普皆攝受故稱念者必得成就九品蓮臺為衆生母不借他緣作賓中主又稽首無量光遍滿法界身普接諸衆生同歸寂滅海土本無淨穢淨穢從心變心垢若消除淨境應念現佛在衆生心以垢蔽不現垢除佛現前不用他接引自佛自度生原無彼此相若能平等觀即是寂光土臥佛贊無事打眠快活欲死十方界中誰能如此阿彌陀佛贊心似寒空面如滿月坐寶蓮華出廣長舌水流風動熾然常說六道四生無機不攝但有稱名即得解脫只為當初願力深十方盡是無生國又稽首大師光明無量具足二嚴號尊中上以慈攝心心包沙界衆生即心本來無外是故稱名即求自己願見我師如是而已長齊繡佛圖贊神存理觀妙契法身想澄淨土即俗而真不住於相解脫諸塵應如是住降伏其心是則名為無事道人釋迦佛贊稽首本師面如滿月清淨法身湛然常寂是身若空其心若水空水連天月光如洗月不離天水不離地以空合空上下無際雲起長空風行水上彌滿波瀾廣長舌相不信但聽海潮音翻出龍宮祕密藏又唯我世尊妙功德聚如空中華隨緣應世法音若雷聽者心碎不是王宮割捨來誰作利益人天事又從兜率來不是無因為一大事特現此身才出母胎大驚小怪走向雪山翻成納敗幸有明星一聲喚醒若不回頭幾墮陷穽復到人間漏逗不少本大利微空懷懊惱末後掀翻和盤托出得遇知音方才雪屈舌上蓮花目前生事肝膽相投虗空粉碎是故智者深知苦心故拌身命常轉此經又法身之光如日之影照破世閒令人夢醒明暗一空聖凡一覺不透頂𩕳是為法縛刺繡釋迦佛贊稽首大能仁救護衆生者現身濁惡世如蓮花出水妙相三十二功德悉莊嚴是故見者悅如觀慈父母良與衆生心平等無差別故從巧思惟儼隨指端現衆生妄想絲織成惡道形佛在妄想中化出微妙相手引妄想絲針刺光綾素針針見法身念念成正覺於此和合緣頓見不思議是知法界空佛種從緣起我願諸衆生從妄想針線念念見法身無不成佛者毗盧佛贊於一毫端現微妙相如空中花似鏡中像欲隱彌彰才收便放是知我師光明無量觀佛贊稽首淨法身無量光明聚最勝蓮花王故號聖中聖湛然寂滅海應現微妙相端居極樂國攝化諸衆生以一心普印一切衆生心是故衆生心即是如如佛心佛與衆生三本無差別見心即見佛念佛即念心一睹殊勝容便悟真實性故從一毫端現此希有事禮念暫歸依頓獲常住果經行如來贊惟我大師胡為現身為衆生故作主中賓廣長舌相如風行空雷音長夜喚醒羣蒙來無所從去無所至要見我師如是如是又有二弟子隨之如來宴坐何為經行瞥然念起為度衆生尊者隨之捕風捉影衆生度盡熱夢未醒栴檀毗盧佛贊有引曲阿長者孫雲翼字圖南宦遊南海適遇栴檀香一枝徑可尺餘長八尺許世為希有喜而購之意效優闐故事持歸施置邑之廣福道場比丘通溙荷擔遂成毗盧妙相建閣以奉復請大藏經一部共成莊嚴余時休老南嶽溙持書乞贊余雖未面長者喜其功德難思乃略述其事以贊之曰海岸栴檀其價無外一銖之微值大千界何處移來至震旦國但有聞熏無不欣悅爰有長者無心而遇欲效優闐作妙相具傾心易之願即成佛擇地而施遂獲廣福時有比丘具大信力發荷擔心衆妙嚴飭三十二相手出一人如從兜率示現威神圓滿毗盧大功德聚無量光明遍一切處如剖微塵以善方便一時涌出大千經卷佛本無相隨心而成法本無住應緣即形以長者心乘比丘願世閒三寶於是出現法界蒙熏觸者離垢凡有歸依頓空諸有法身常住國土豐樂鱗甲羽毛俱蒙解脫草芥微塵同歸華藏故我如來現尊中上熾盛光如來贊稽首熾盛光明王普照十方塵剎中所有日月四天下一切衆生皆蒙益有情無情共一體同入如來光網中身心毛孔及微塵一切洞然無不徹衆生夢想顛倒心盡是如來光明藏是故七曜及四餘二十八宿各分布共作衆生有相身生死去來皆寂滅衆生之苦即佛心佛即衆生煩惱海以斯二者無分別是故苦樂隨念轉善哉佛子契佛心能持如來祕密印念念常放大光明能破無始煩惱暗一切妙用悉現前流入如來大願海普使見聞及稱揚盡塌涅槃常樂地睡起彌勒贊終日沿街走兩腳不休歇困來樹下眠肚裏黑如墨被誰喚醒來夢語尚未徹通身疲倦骨頭酸左右缺伸消不得者等村僧懶斷筋如何喚他作彌勒行腳彌勒贊橫擔拄杖挑箇皮袋一包破碎絡索當作奇貨買賣逢人就乞一文錢不知都是來生債指著龍華樹下莊折合將來還缺在坦腹彌勒贊為甚開口大笑不歇坦腹赤肚想是怕熱布袋和尚贊諦觀胸中不有看來手中不無生成如此褦襶翻却笑人糊塗肩頭橫擔拄杖腳根自在無拘若不被小兒搬弄則可稱雄猛丈夫辟支佛贊磐陀之上長松之下端悟無生水流花謝三大士贊惟三大士隨類現身在天而天在人而人如月處空影落衆水水有清濁月無彼此智度為母故多其子慈能與樂如如意旨大願無盡真經非字大士之心如虗空是文殊大士贊金色界裏月五臺山上雪雲端獅子兒空中霹𮦷舌誰識飲牛翁原是甘露滅宴坐金剛窟似踞猛虎穴玻瓈一盞茶聊清煩惱熱借問窟中多少人前後三三非浪說又居寂滅地建大法幢擊塗毒鼓聞者心降七佛之師衆生之父如獅子王大方闊步普賢大士贊蓮華半卷經峨嵋一輪月世界燦如銀頭顱白似雪萬壑吼松風盡是廣長舌法界任掀翻空花從起滅佛剎入毫端十方置眉睫香象奔騰跨步行蹴踏盲驢與跛鱉又稽首普賢法界為身塵毛國土坐臥經行於法性空大雲彌布以普遍故了無去住故微妙相曾無隱顯若有見者須是普眼乘大象王其體純白以本無染是真淨潔一切聖凡不離毛孔通身遍身如海潮涌大士觀我我觀大士以空合空本來無二故我敬禮大法界空願一切時處處相逢又稱法界身萬行之宗毛孔剎土何所不容象王遊行十方無礙稽首如空廣大自在普賢洗象圖贊法界為身何所不往乖此象王番成鞅掌象體純白本來無染無故洗之更增塵點水不洗水白不染白二者求之了無分別何勞奴兒枉費其功有不到處轉見不通以我觀之現成最好人象兩忘聖凡齊掃又象體潔白何處染塵眼中著屑其污通身以水洗之返增其污不洗自淨莫知其故水不增潔潔不用水兩不相到本來若此大士三昧圓融法界何於此塵而生障礙存之非染去之非淨此幻法門是名無諍普賢乘象贊大行闊步十方踏遍毛孔微塵何處不現獨行獨坐何等輕快要假他力便成狼狽腳下蓮華鼻孔繚繞不是者些被他纍倒身命相依往來已熟雖是纍他却閒我足普賢大士加持象贊惟我大士法界為身有持經者即現其形不是神通亦非好逞要使衆生當下猛省大悲觀音像贊我聞大士本無住但在衆生心想中衆生既即大士心如何顛倒若不見若言大士心顛倒如何能化顛倒人衆生若是不顛倒何勞大士強說法嗟哉人無智慧光猶如白日酣酒臥種種夢想恐畏途怕怖慞惶不能脫驅馳逃遁不可得又如渴鹿奔陽𦦨愈奔愈渴心力疲猶不自知在夢想惺眼觀者悲愍生極力叱之苦不覺不但不覺苦生瞋又復夢見追逐者畏前怖後盡力呼一呼忽然攘臂起從此一覺視夢中始信自心生顛倒如是大士能救苦大都亦似惺眼人縱能恆順諸衆生疑者反更生驚怖當人若肯暫回光猶勝大士千手眼善哉佛子何顛倒若不自求向他覓若從覓處見自心我亦名為觀自在又至人無名名之在人耳中見色眼裏聞聲六用唯一一亦不立遍界遍空無處不入皓月在天光印百川如草頭露顆顆皆圓於一毫端現微妙身坐微塵裏轉大法輪火聚刀山鐵牀銅柱絶呌一聲忽成淨土不擇淨穢何分男女若欲求之在我而已又我聞大士化身萬億眼見耳聞不知誰是有苦便呌呌即不受不見去來不知誰救我今思惟大士無我六根門頭觸者如火火不燒火塵不染塵無彼此故名觀世音又惟大士身在衆生心參而不雜離而不分故我有求隨聲而應匪大士來實我自證我不知苦何以能求即知苦處是為返流我流既返大士即我以我求我於何不可又我觀大士身本離一切相以本離相故故能現衆身譬如摩尼珠隨緣明衆色是故佛菩薩及六道衆生乃至異類形一切無不入如何男女身而作分別見若見大士身平等無二相了知法性空光明如滿月能令煩惱暗一切當下除故我依大士頓出生死苦水月觀音贊身若浮雲心如水月不動而應無言而說呼之有聲覓之不得凡有苦求皆得解脫又水月之姿空花之表谷響之聲摩尼之寶到處相逢即現形往來六道無昏曉一片身心只為人若箇阿師何處討又鏡像水月太虗閃電觸而動之瞥然影現又一塵不染十方露布通身手眼不須回互又心本無事為誰苦思有來問者自亦不知又大士無心如響應聲凡有求者隨呌隨應又以無相身應有求心無處不現名觀世音又水流在海月不離天不思而應為自在禪又無相之相相不在我隨應而現如薪遇火三十二應猶是瑣瑣百千萬億有何不可又大士身心衆生即是所以願求隨感而至又至人無形真悲無聲感應道交沙白水清又以慧為命以物為心尋聲救苦名觀世音又身心洞徹猶如琉璃表裏得淨如月臨池不感而應不求而至是故我師名不思議又無聲而說有求而應如答谷響似臨寶鏡是則稱名觀世音所修三昧名真淨又以寂滅心現微妙相滿月寒空光明無量我以精心如澄濁水水清月現不須議擬月不離水水不離月以無去來兩皆寂滅我心既寂大士即我故我所求應念而果又如鏡中像如水中月視之似有取之不得以海潮音出廣長舌此我大士說法之則又法身如雲充滿十方從空中生如水月光以身無外故心無礙所以應物得大自在三十二應人謂是實在我大士如海一滴衆生煩惱如火之狂甘露見灑應念清涼又我觀大士如水中月楊柳一枝稱甘露滅十方世界普霑濡能解衆生三毒熱又無慮而應不思而遍春到花開水清月現手捉足奔眼聞耳見遠而愈親淡而不厭丈夫若下苦心腸相逢即遂平生願又大士之身本來無相隨心應現不狀之狀電影空花鏡像水月作如是觀忽然超越又畢竟空中縣清涼月影沉衆水不容分別故大士身與物無二隨所見聞無處不是又大士本無身身隨衆生現如月映衆水不分垢淨故昏明在清濁非月有揀擇是故現大士應以淨心觀觀者心既淨衆苦悉皆空若知救苦心應即是觀者又大士無思其思以慈為衆生故兀兀如癡癡與衆生膠漆附離兩者相合俱不可知故能救苦影響同時是故大士悲深願重衆生界空其癡無用又我觀大士如月在空凡有水處皆現其中不擇淨穢原無彼此以水性空故無塵滓衆生心水亦復如是故有求者應念即至以有衆水如月普照以有衆生見大士妙觀音大士化比丘像贊有為而然無方而應何故捨他現此真淨以佛非法非法誰傳若無傳者聾瞽皆眠是故比丘即法即佛以心如空似響出谷以空無形盲者能視其響無聲聾者得意視聽不住聲色兩忘以三昧力醒彼癡狂塵中作主火裏生蓮稱名禮敬應念現前我師方名得自在禪蓮葉觀音贊苦海無涯誰為彼岸一葉紅蓮隨流泛泛以此舟航無處不遍萬類有求隨感應念是故稱名普門示現又苦海無涯欲流不竭至人所憑青蓮一葉彼岸非遙途程不涉身若雲空心如水月能如是觀何法可說慈聖聖母刻瑞蓮觀音贊聞彼曇華千年一現有聖人出以為瑞驗惟皇聖母闕産此華以此徵德又何以加蓮華觀音贊至人應物如優曇華見之者稀故以為誇青蓮出水根從淤泥見之者衆不以為奇是故我說法身周遍十方皆稱普門示現如此周匝人何不識只在目前建大法幟苟非真淨無以致此故大士身聊復爾爾又三界無安猶如火宅至人處之如清涼國五欲淤泥猶如糞壤蓮華挺生枝葉自長摩尼寶珠體淨圓潔墮溷迹中光明不缺佛性在纏染而不污泥中之蓮廁中之珠日用行藏昭昭不昧火裏蓮花故稱為瑞禪定觀音贊以思惟心入衆生想打水成痕敲空作響參而不雜離而不兩雪裏鷺鷥珠中象罔以如是觀名尊中上又以如幻觀無作妙力從聞思修入三摩地又大士無心何有寂亂衆生無情了無干絆應緣而度原非有心諸苦無住如空谷音是故大士其悲最廣如空合空似響答響本無去來亦無起滅大士神通故不可說白衣觀音贊衣白心赤己無他有使一切人念不下口又本來無染今亦無垢能如是觀十方通透又無形之形隨感而現只在一毫光明普遍又折竹之枝當吉祥草坐斷十方海枯山倒又海竭蓮枯塵消覺證全憑楊枝灑掃清淨又我觀大士心欲潔衆生染故自白其衣遮護衆生短如水但洗塵水不自洗水大士與衆生其實無彼此若見自己心便識大士面擘破一微塵大士光明現又大士中赤而外白與衆生心全不隔聲呌聲應即現前猶如濁水涵明月衆生心垢不易除大士以身為洗潔日用如觀大士容色相求之即不得只在聲前一句明耳見眼聞不可說又大士潔白以本不染故入衆生其心不淺如水清珠投之濁水珠不留影水清見底明月在空水清即現不邀而至不應而遍故衆生苦為大士身凡有所求即大士心身心無外彼此不二應念現前名不思議又湛湛寒空澄澄秋水大士法身實同於此月不離空空不離水似有兩般實無彼此心本無染衣非愛白以不白者瞻之即潔大士無心衆生有想相從想生如月在掌是故有求隨念即應原無去來自心現證又惟我衆生苦即是大士悲由苦與悲合故我願無違假使百千億隨求一時應何況智慧男於我而獨吝如水銀墮地顆顆思皆圓我所求一事事事亦復然我觀大士身如空谷覓響大士觀我心事如視諸掌魚籃觀音贊籃兒在手腳不住走十字街頭要人知有又手中一物常放不下赤心片片為人不假是故我說真慈悲者又手提魚兒街上賣眼裏尋人只圖快中心不愛半文錢多因要了慈悲債紫竹觀音贊紫竹林七寶地普陀嵒金剛際十方坐斷鎮常閒有求之者隨聲至不是吾師觀世音誰能箇箇皆如意又紫竹無林大士非身今所見者皆出自心南海觀音大士贊碧海蒼崖黃花翠竹魚鱉蛟龍夜叉鬼窟隨類現形沿流出沒如空在地無處不足此是觀音自在身不枉稱為過去佛又踞磐陀石觀寂滅心即彼羣動出微妙音法離諸相真經無文惟我大士現身如雲有求必應無類不往以大悲心全同妄想巖龕大士贊蒼巖片石苔封雲護大士法身於中顯露觸目分明略無回互而人別求此何以故又片石孤峰清池白月自在法身原無起滅形不自形本來如幻翳目空花晴虗閃電非關大士有心要為實由幻者妄想思算欲見大士真本來面但莫思量全體自現巖樹觀音大士贊瞻彼蒼崖巍巍不動實我大士法身孤迥盼彼崖樹枝葉扶疏維我大士慈蔭開敷晏坐其中無說無求示三十二妙應普周羣蒙驚起不出大定拔盡諸苦悉令清淨我觀大士了諸無相於幻化身號尊中上出廣長舌山高水深日夜常說名觀世音觀音大士應變相贊大士之身如摩尼寶五色互現隨緣即了在天而天在人而人既稱隨求何不現形若有求男便應男子福德智慧莊嚴無比只在求者一心顯現是故名為不思議變自在觀音贊稽首大悲主圓滿自在身鏡像水中月而作難思事微細法界塵一塵一切剎剎剎如塵衆無處不現形衆生一念閒一時平等應如圓通所說猶是分量數惟我心自知大士全不覺又月影鐘聲妙音色相耳視心聞功德無量御刻觀音大士贊惟我大士法身普應從耳根門圓通妙證十方擊鼓十方齊聞於法界空現形如雲天上天下無類不入是故求者隨心自足惟我聖慈宿秉悲願如大士心廣行方便以此妙相普施羣生令有所願如響應聲普陀觀音大士贊我聞大士不思而遍應微塵國廣行方便衆生即心心即衆生故有求者聲呌聲應水長船高泥多佛大苦劇悲深應接不暇踞補陀巖住生死海虗空縱銷此心不改又踞補陀巖觀寂滅海普震潮音名觀自在出廣長舌十方周遍故有求者應念即現衆生具足何勞往救水澄月現不前不後
