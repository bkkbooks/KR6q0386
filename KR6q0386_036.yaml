body:
  text: 侍者福善日録門人通炯編輯嶺南弟子劉起相重較頌佛祖機緣三十則釋迦牟尼世尊初生一手指天一手指地周行七步目顧四方云天上天下唯吾獨尊後雲門云我當時若見一棒打殺與狗子喫貴圖天下太平琅琊覺云可謂將此身心奉塵剎是則名為報佛恩頌曰才出頭來便著忙虗開大口說行藏祇知要吐心中事番惹旁人說短長世尊因調達謗佛生身陷地獄佛敕阿難傳問云汝在地獄中安否云我雖在地獄如三禪天樂佛又令阿難傳問你還求出否云我待世尊來便出阿難云佛是三界大師豈有入地獄分云佛既無入地獄分我豈有出地獄分頌曰地獄天堂有甚差受恩深處便為家人生適意即為樂何用閒情檢點他世尊因黑齒梵志運神力以左右手擎來合歡梧桐樹兩株至靈山獻佛佛云梵志志應諾佛云放下著志放下左手一株佛又云放下著志放下右手一株佛又云放下著志云我兩手盡空未審更放下個甚麼佛云吾非教汝放下其華汝當放下內六根外六塵中六識無一可捨是汝免生死處志忽然大悟頌曰擎來平地起干戈放下教伊沒奈何直到水窮山盡處縱無一物也嫌多世尊昔至多子塔前命摩訶迦葉分座令坐以僧伽黎圍之遂告云吾有正法眼藏密付與汝汝當護持傳授將來勿令斷絶頌曰分明大地露堂堂一片袈裟豈蓋藏才說密時原不密舌頭遍地太郎當文殊師利在靈山會上諸佛集處見一女子近佛座入於三昧文殊白佛云何此女得近佛坐佛云汝但覺此女令從三昧起汝自問之文殊繞女子三匝鳴指一下乃至托上梵天盡其神力而不能出佛云假使百千文殊亦出此女定不得下方過四十二恆河沙國土有罔明菩薩能出此女定須臾罔明至佛所佛敕出此女定罔明即於女子前鳴指一下女子於是從定而出頌曰佛前女子路頭差不是文殊力不加縱有拿龍捉虎手無如打鼓弄琵琶達摩初至金陵見武帝帝問如何是聖諦第一義諦摩云廓然無聖帝云對朕者誰摩云不識帝不契遂折蘆渡江至少室面壁九年頌曰遠來一片熱心腸只道他鄉是故鄉豈料相逢不相識掉頭冷坐最淒涼二祖至少林參承達摩立雪斷臂問曰諸佛法印可得聞乎摩曰諸佛法印不從人得祖曰我心未安乞師安心摩曰將心來與汝安祖云覓心了不可得摩云與汝安心竟祖於是悟入頌曰齊腰大雪臂摧殘特地將心強要安借爾拳頭築爾嘴何曾添上一毫端六祖大師參黃梅五祖著入碓房舂米一日因五祖索偈欲付衣法師書偈於壁曰菩提本無樹明鏡亦非臺本來無一物何處惹塵埃祖默識之夜呼入室密示心宗法眼傳付衣鉢令渡江南歸曹溪頌曰碓頭柴斧有何差又向晴空眼見華剛道本來無一物如何又拾破袈裟未到黃梅早已知三更入室又何為祇將衣鉢為奇貨引得兒孫箇箇癡南陽忠國師一日喚侍者者應諾如是三召皆應諾師曰將謂吾辜負汝却是汝辜負吾頌曰三呼三應太分明辜負何曾有重輕試向未呼前勘破長風日夜吼松聲南嶽讓禪師初參六祖祖問甚處來師曰嵩山來祖曰什麼物恁麼來師曰說似一物即不中祖曰還可修證否師曰修證即不無染污即不得祖曰即此不染污諸佛之所護念汝既如是吾亦如是頌曰遠來意氣甚揚揚問著何如雪上霜早向太陽門下立何須撥火更澆湯馬師一日升堂百丈收却面前席祖便下座頌曰大將登壇八面風捲旗息鼓四壘空太平氣象清如許方見王師大戰功馬師不安院主問和尚近日尊候如何祖曰日面佛月面佛頌曰病在膏肓不可醫閉門暗地自尋思傍人不解難禁處才問如何已失時趙州因僧遊五臺問一婆子曰臺山路向甚麼處去婆云驀直去僧便去婆曰好箇阿師又恁麼去也後有僧舉似師師曰待我去勘過明日師便去問臺山路向甚麼處去婆曰驀直去師便去婆曰好箇阿師又恁麼去也師歸院謂僧曰臺山婆子為汝勘破了也頌曰斜陽芳草正萋萋漫把王孫去路迷多少迷中留宿客五更夢破一聲雞趙州問新到曾到此閒麼曰曾到師曰喫茶去又問僧僧曰不曾到師曰喫茶去後院主問曰為甚麼曾到也云喫茶去不曾到也云喫茶去師召院主主應諾師曰喫茶去頌曰趙州一味淡生涯但是相逢請喫茶若問梅花探春色一枝墻外過鄰家遠來經涉路迢遙壘塊填胸氣正驕不用靈丹并妙藥只須一碗熱湯澆趙州因僧問如何是祖師西來意師曰庭前柏樹子曰和尚莫將境示人師曰我不將境示人曰如何是祖師西來意師曰庭前柏樹子頌曰大千經卷剖微塵臘盡陽回大地春拈出庭前柏樹子西來祖意又重新南泉因東西兩堂各爭猫兒師遇之白衆曰道得即救取猫兒道不得即斬却也衆無對師即斬之趙州自外歸師舉前語示之州乃脫草鞋安頭上而出師曰汝適來若在即救得猫兒也頌曰太阿出匣絶無情觸著須教斷死生偶遇白牯誇好手却將驢糞換雙睛睦州示衆云大事未明如喪考妣大事已明如喪考妣頌曰長江無際渺風波一任輕帆帶雨過到岸回頭看白浪愁心轉比在船多德山一日飯遲托鉢下堂時雪峰作飯頭見便云這老漢鐘未鳴鼓未響托鉢向甚麼處去師便歸方丈峰舉似巖頭頭云大小德山不會末後句師聞令侍者喚來問汝不肯老僧那頭密啓其意師乃休去至明日升堂果與尋常不同頭至僧堂前撫掌大笑曰且喜老漢會末後句雖然如是只得三年果三年而沒頌曰閒看師子漫調兒顧缺頻呻力盡施觸著翻身聊一擲低頭歸去令全提末後句莫狐疑自在遊行更讓誰萬古長空風月在三年未必是歸期德山因廓侍者問從上諸聖向甚麼去師曰作麼作麼廓曰敕點飛龍馬跛鱉出頭來師休去明日師浴出廓過茶與師師撫廓背曰昨日公案作麼生廓曰這老漢今日方始瞥師又休去頌曰慣戰深藏陷虎機窮追焉敢犯重圍縱然保得全身去折盡旗鎗已喪威馬祖與百丈西堂南泉玩月次祖曰正與麼時如何丈曰正好修行堂曰正好供養泉拂袖便行祖曰經入藏禪歸海唯有善願獨超物外頌曰月到中秋分外明幾家歌管不停聲漁翁歸去蘆花宿睡熟江天夢不成長沙因張拙秀才看千佛名經問曰百千諸佛但見其名未審居何國土還化物也無師曰黃鶴樓崔皓題後秀才還曾題也未曰未曾師曰得閒題取一篇頌曰黃鶴樓前江水深風波日夜吼雷音百千諸佛同搖舌覿面何勞別處尋夾山參船子才見便問大德住甚麼寺山曰寺即不住住即不似子曰不似似個甚麼山曰不是目前法師曰甚麼處得來山曰非耳目之所到師曰一句合頭語萬劫繫驢橛師又曰垂絲千尺意在深潭離鈎三寸子何不道山擬開口被師一橈打落水中山才上船師又曰道道山擬開口師便打山豁然大悟乃點頭三下師曰竿頭絲線從君弄不犯清波意自殊山遂問拋綸罷釣時如何師曰絲懸淥水浮定有無之意山曰語帶玄而無路舌頭談而不談師曰釣盡江波錦鱗始遇山乃掩耳師曰如是如是頌曰蘭橈獨倚把關津鈎線閒垂釣錦鱗偶遇獰龍才一撞滔天浪裏解翻身趙州因僧問狗子還有佛性也無州云無頌曰長江一望渺寒煙極目中流思惘然可惜夜深明月下更無人問渡頭船趙州因僧問萬法歸一一歸何處師曰老僧在青州做領布衫重七斤頌曰路到懸崖沒處行轉身一步腳頭輕要尋挂角羚羊跡有眼饒君亦似盲雪峰因三聖問透網金鱗未審以何為食師曰待汝出網來向汝道聖曰一千五百人善知識話頭也不識師曰老僧住持事繁頌曰扁舟使盡一帆風到岸何勞又轉篷若問漁翁何處宿放歌歸去月明中僧問雲門不起一念還有過也無門云須彌山頌曰天寒霜落月沉西清夜迢迢鶴夢迷海底日輪紅似火行人猶聽五更雞雲門上堂光不透脫有兩般病一切處不明面前有物是一又透得一切法空隱隱地似有箇物相似亦是光不透脫又法身亦有兩般病得到法身為法執不忘己見猶存坐在法身邊是一直饒透得法身去放過即不可仔細檢點將來有甚麼氣息亦是病頌曰天街華月影珊珊沉醉東風獨倚欄朝罷九重人靜後六宮猶整尚衣冠魯祖尋常見僧來便面壁南泉聞云我尋常向師僧道佛未出世時會取尚不得一箇半箇他恁麼驢年去頌曰寒巖雪壓一枝梅無限春光不放開却被東風輕漏泄暗香吹入夢中來溈山示衆云老僧百年後向山下作一頭水牯牛左脅下書五字曰溈山僧某甲此時若喚作溈山僧又是水牯牛喚作水牯牛又是溈山僧喚作甚麼即得頌曰馬腹驢胎佛祖家大人行處路途賒牯牛若較溈山老頭角崢嶸更讓他雲門因僧問如何是佛門云乾屎橛頌曰山河國土露堂堂瓦礫叢林總放光若使一塵當面立恆沙諸佛盡遮藏金剛經頌十八首世尊著衣持鉢空生歎希有著衣持鉢只如斯飯食經行有甚奇何故空生歎希有令人特地更生疑應如是住窮途白眼正悽惶忽漫相逢大歇場放下便為安樂地何須忉怛費商量如是降伏其心壁閒燈影弄孩兒黑夜翻疑有鬼隨試到天明親看破許多驚喜向誰提實無衆生得滅度者夜來夢到鬼門關無數羅叉擁鐵山唱罷寒雞天大曉回頭一笑破愁顏不住於相乾闥婆城落鏡中樓臺殿閣滿虗空但看無數登臨客倚檻披襟送去鴻應無所住而生其心鳥跡魚蹤莫浪尋電光石火豈容心時人但聽春禽噪誰信頻伽鷇裏音無我人衆生壽者傀儡登壇待鼓鑼大家相聚聽高歌不知線索經誰手線斷羞慚最懡㦬四果不作是念長途客店暫招商一宿休閒豈久長夜夢忽登兜率界回頭空費好思量燃燈佛所於法實無所得少擕書劍走他鄉主意將來赴選場偶向街頭遇占卜報言當作狀元郎持四句偈其福甚多年年鬼祟請神巫送退還來作穢污太上老君如律令諸邪從此一齊驅須菩提感激流涕心頭痛處有誰知國喪家亡說向誰回首故鄉消息斷不堪重聽雁聲悲歌利王割截身體穆王心愛偃師人歌笑歡娛當是真一怒頓教支解後始知膠漆合成身一念信心即得菩提莫道夷門薦狗屠一言然諾許金軀提鎚直入中軍帳奪得將軍肘後符三心不可得寒空落落雁孤征望眼昏迷里數生自是本來踪迹斷勸君不必計途程無法可說幻戲場中伎倆多歌聲不斷舞婆娑可憐觀者增悲喜曾見其中一線麼如來說非衆生是名衆生畫工隨意寫形容狀貌衣冠各不同好醜任他分別盡到頭不是主人公凡夫者如來說則非凡夫貴賤原無定準程從來白屋出公卿一蒙天子親宣詔便是當場第一名如來者無所從來亦無所去夢向華胥國裏遊到時歡喜轉時愁一聲雞唱霜天曉枕上空華落兩眸淨土十六妙觀頌第一日觀觀落日如懸鼓白日西沉寄所思夕陽盡處有心知一從別後無消息自此常如見面時第二水觀觀大水澄清凝氷映徹作琉璃想清涼心地碧澄澄瑩徹猶如水結氷一片琉璃光潔地休教埋沒老胡僧第三地觀觀氷琉璃成就地想遊心何處可經行寶地琉璃一掌平未動腳跟前一步看來原不涉途程第四樹觀觀琉璃地上作寶樹想行樹重重七寶林目前羅列氣陰森花含無量摩尼聚風動常宣妙法音第五池觀觀七寶池中有八功德水想如意珠王出涌泉水含八德注花閒金剛池底金沙布念念心開七寶蓮第六總觀作寶樓閣想寶嚴樓閣影重重無量諸天集此中不鼓自鳴天樂動法音盈耳樂無窮第七座觀觀七寶蓮華中含金剛臺想七寶華含七寶臺摩尼華蕊結胞胎隨心一片光明藏自身金容出現來第八像觀觀一佛二菩薩想相好光明水月身恰如亡子見慈親從今一識娘生面不作悠悠行路人第九佛觀觀佛相好想毫若須彌目若蓮重重相好總無邊通身毛孔光明聚照徹三千及大千第十觀音觀作大士形像佛立頂冠想長大無邊大士身頂光化佛等微塵細看毛孔含生土觸目分明是故人第十一勢至觀作端坐手執蓮花想光明色相總非差頂上天冠百寶華華裏淨含諸佛土不知誰是主人家第十二普觀作自身往生蓮華開合想心想蓮華量若空託身深處密難通光明照破華開後醒眼依然似夢中第十三雜觀作佛大小不定身想百川月落影參差來去隨人任所之只道兩頭分二路誰知動處不曾移第十四上三品觀心想遙登兜率宮莊嚴妙麗境重重親聞彌勒談真諦只恐相逢是夢中第十五中三品觀天子求才選孝廉鄉評大小共稱賢一朝特地登金殿白屋公卿豈偶然第十六下三品觀劍樹刀山在目前回光一照變金蓮椎埋拜將英雄事始信為官不是錢本住法頌壽黃檗山無念禪師八十有引上御宇之三年癸亥仲春二月十有七日乃黃檗山無念禪師四百八十甲子之辰也惟師少志向上早悟自心開頂門之正眼豎無畏之高幢法門歸重衲子趨風莫不指歸第一義令入自信之地誠末法之津梁長夜之慧炬也宗門寥落賴師獨振其家聲不慧雖未承顏而心光相照不隔一毫以法忘情無彼我相為日久矣嗟今老矣愧不能一接麈尾以結法喜之緣耳今幸值師示生之辰十方宰官居士緇白衆等各持供養而興慶讚不慧聞而歡喜私謂悟無生者離壽者相非四相之可遷安可以世諦而擬之耶乃說本住法頌敬遣侍者遙持香花用申讚歎是以滴水而稱大海以一隙而覩太虗非敢盡其涯量聊見微忱以法供養之意耳而說頌曰諸法自性常寂滅湛然不動如虗空世界森羅及萬象唯此一法之所印佛未出世祖未來此本住法無缺闕草芥塵毛體自全白牯黧奴亦知有何況衆生各具足而與諸佛性平等平等自性無生滅又豈四相之可遷不來不去無始終是故名為本住法若人悟此體如如一超頓絶凡聖見正眼開時生死空迷悟兩關當下闢已過關者掉臂行獨蹈大方無滯礙猶如師子自在遊非是野干可隨逐揭開五蘊封蔀茅露地披襟坦然坐是名無畏解脫人從此常依本法住唯師了此本住法獨踞黃檗最高峰巍巍不動若須彌萬象森羅齊額手日月遊行若電光世界山河鏡中影良以心空身亦空混融萬法無起滅是故一塵與空合即與虗空共一體一切微塵亦復然身與微塵等無二身塵既入法界空自性體與虗空等此空即是本住法入此法者壽無量空中世界任起滅一切聖凡從去來是法不動相常住此是大地衆生壽衆生既與諸佛同吾師豈與衆生別但願吾師常化生證入衆生無量壽針座右針示黃生欲不可縱志不可蕩性不可僻心不可放身不可逸學不可浪理不可蔽思不可妄勿佚豫而外馳勿嗜好而內喪恬憺自居百骸無恙不為物誘其神自王定志針示江生勿汩汩於物欲勿於亂想勿矯矯於浮雲勿逐逐於世網宜定志以素居冀凝神而靜養藜藿淡以自茹山水清而獨賞披玄易以窮化覽春秋而鑒往誦南華以銷憂叩西墳而破障觀世態若陽焰聽是非如谷響視衆物如蟲臂看此身如鼠壤富貴於我何求得失於人翻掌明明在前昭昭在上不妄不虞何惚何恍形似木雞心如象罔孔子曰不忮不求何用不臧此之謂善長我針一切愛憎皆由我障我障若空光明無量逐境心生隨情動念心境兩忘物我無辨物無妍醜由我是非我心不起彼物何為動靜等觀貴賤一視凡聖齊平名不思議身針敬咨爾身爾何為者四大合成內外虗假聚沫芭蕉塵埃野馬衆苦稠林生死曠野昧之者多識之者寡一息不來贅疣土苴心針爾胡為心恍惚杳冥為物之則為人之靈昭昭不昧耿耿常惺善惡之府賢聖之庭無為欲蔽勿使妄縈恬憺寂寞其神自寧性針爾體圓明爾形精奧不動不遷無相無貌如水之溼如火之燥萬化不移名言不到去住來今閒忙靜躁卓爾獨存是名真道命針咨爾何從實唯天顧壽夭窮通聽其所遇不忮不求無怨無惡鶉居鷇食龍雲豹霧信乎爾神浮沉有數安以俟之無容外慕銘母子銘并序清因弘法致難上干聖天子怒聲若雷霆私念老母聞之必驚絶矣乃蒙恩宥不死遣戍雷陽道經故鄉迎老母於江上一見歡喜談笑音聲清亮胸中略無纖毫滯念因問老母聞兒死生之際豈不憂乎乃曰死生分定耳我尚不憂何憂於汝但人言參差於事無決定見為疑念耳相與侍坐達旦即作永訣老母囑曰汝善以道自愛無為我憂今亦與汝長別矣欣然就道了不相顧余因感天下之為母有如此者豈不頓盡死生之情乎乃為之銘曰母子之情磁石引針天然妙性本自圓成我見我母如木出火木已被焚火原無我生而不戀死若不知始見我身是石女兒澄心銘示丁右武真性湛淵如澄止水憎愛擊之煩惱浪起起之不休自性渾濁煩惱無明愈增不覺以我取彼如泥入水以彼動我如膏益火彼亂我真亂實我生我若不生劫燒成氷是故至人先空我相我相若空彼從何障忘我之功在乎堅忍習氣才發忽然猛省省處即覺一念回光掃蹤絶跡當下清涼清涼寂靜挺然獨立恬淡怡神物無與敵觀心銘觀身非身鏡像水月觀心無相光明皎潔一念不生虗靈寂照圓同太虗具含衆妙不出不入無狀無貌百千方便總歸一竅不依形氣形氣窒礙莫認妄想妄想生怪諦觀此心空洞無物瞥爾情生便覺恍惚急處回光著力一照雲散晴空白日朗耀內心不起外境不生但凡有相不是本真念起即覺覺即照破境來便掃掃即放過善惡之境隨心轉變凡聖之形應念而現持呪觀心如磨鏡藥塵垢若除此亦不著廣大神通自心全具淨土天宮逍遙任意不用求真心本是佛熱處若生生處自熟二六時中頭頭盡妙觸處不迷是名心要師心銘人性本大超乎形器直以有我自生障蔽習染濃厚故為物纍問學不廣故多自是見理不明驕矜恃氣輕內重外逐物喪志嗜欲戕生不知避忌棄己忘真孰稱為智達人虗懷應緣無滯與時逶迤龍蛇玩世得失靡驚貴賤無預恬憺怡神省思寡慮力其未能謹其未至學其無為行其無事聽其無聽視其無視返觀內照念念不住諸妄消滅精一無二此乃至人師心之祕在我求之有餘地不如是觀名為自棄覺非銘萬里之行步步皆非維人不覺寸步不移人生百歲念念不住昧者冒然孰分新故善惡迭遷如環無端莫知其極誰使之然使者不知愈新愈迷腳跟罔措舉足成疲疲之既久失其故有變怪百出不見其醜以迷為覺大地皆錯嫫母效顰恬然自樂霎時臨鏡忽然猛省但歇狂心不勞施粉天然秀媚眉目清朗本來面皮毫髮無爽無論美惡不須雕琢只任現成自然還朴覺不覺是不知知非是非俱唾萬物齊歸夢覺銘善惡無端一心返復聖凡不隔唯存夢覺以覺入夢顛倒滋重以夢入覺當下解脫夢覺俱非寂爾靈知不生不滅何慮何思幻化百千唯在一念念起不覺太虗閃電煩惱不結業即不生愛憎堅固實生死根因果報應捷如影響根若不生枝從何長業有多種以殺為先好生惡死彼此皆然軀殼雖異佛性是同但平等觀殺念自空心鏡塵埋習染既厚以覺消磨光明自透漸磨漸落念起即覺覺至無生心境空廓妄想馳逐究竟無益諦審思維死生迅疾生死來往大夢冥冥但隨業轉如不有生有生不著須從夢覺醒眼看來無繩自縛念念回光心心返照但不隨情是名要妙忘緣銘情有智愚性無明昧凡聖之分實存向背如臣事君如子侍父一念精真不容顧佇顧佇則移移則造迷迷之既久其神日疲不移即悟悟則不顧獨立湛然妙用常住應緣若響處世如空逍遙物化頓脫樊籠不出不入無去無來空華世相水月襟懷觀世銘四大幻身本無一物愚者執之愛憎桎梏妙圓覺心彌滿清淨妄想積迷顛倒增病渴鹿逐𦦨愈逐愈渴看破即休始知是錯遊戲神通不離日用貴賤好醜任其搬弄達人大觀洞然明白離合悲歡了不可得六塵境界如夢聚寶無量貪求一覺便了音聲色相風月行空於斯不著豈是盲聾以此處世有何罣礙身雖凡夫名觀自在六根銘身為業媒心為業種從六情根貪奔愛涌眼流於色失其真明耳流於聲遺其本聞舌非爽味實多妄語恣意縱情識風內鼓習發竅鳴如簧有聲不知所自聽者震驚出口入耳愛憎斯起聲已消亡禍方資始如雷擊糞忽生毒菌愚者食之誤傷其命維鼻合身同為一覺總是浮塵身多過惡意乃樞機波流毒海為彼所漂汩其真宰是故世人雖生不生若能返觀各得精真精真若復六根無物似雲浮空如響出谷不被形拘不為心礙逈出情塵超然自在念佛三昧銘念佛念心念心念佛佛不外心心不是物自性光明心心照燭妄想潛蹤形骸空谷淨土不離目前蓮花常襯兩足何必待身後方生即現前不出不入此正是普光三昧只在當人一嗾正心銘心本光明欲蔽故暗天然之體隨情耗散今欲正之祛欲制情一真既復諸妄不生誠意銘意乃妄根乘虗日鑿密察其原潛乎不覺覺則不妄妄息即真至誠無息其善乃敦修身銘只體之欲縱情之本酒色之迷陷身之穽迷欲不返身心不固徒有此生誠為虗度齊家銘齊家之要惟儉與勤義禮若豐淡薄自醇勤儉傳家淡薄寧志是乃聖賢處世之祕六妙銘并引雪嶠山主結廬雙徑之朝陽峰下千峰如指故顏曰千指前峰緊抱彎環如角豫名之曰麟角且喻獨也菴前有池俗呼洗硯蓋東坡嘗三遊茲山特附諱乎豫易曰來月古人喻道曰池成月自來池上有齊豫扁曰洗月喻心境也齊後有泉味甘冽而醇豫題之曰過乳以昔聖言劫初之水味過於乳以從金剛際來今峰頂之水其源必深可喻道脈欲知本也菴後有石豫名大歇謂阿蘭若真修行處為寂滅場乃大休歇地也此景天然故題稱六妙而卷首書曰六通四達欲此境中人老人隨不為妙縛也直須雙奪故曰通達耳手而各為之銘志不忘也不作境會不落言思是在賓主自得耳千指菴千峰卓立直指此菴此菴如空了沒遮闌問菴中主不出不入有來參者空中一咄麟角峰羣走奔騰一麟自足惟麟所重在乎角獨片石如麟萬木若毛可笑騎者不動一毫來月池月原不來水亦不去驀爾相逢不知其故水底之天池中之月去來之相了不可說洗月齊月本無塵水自清潔從何處洗求之不得月墮水中水涵月影可惜觀者熱夢未醒過乳泉水中擇乳須是鵝王此不須擇在乎善嘗不許入口要先知味惟知味者飲之心醉大歇石石不善走為何要歇歇之大者為本寂滅趺坐此中不動不搖吐廣長舌松風夜號般若軒銘并序軒因閲此經以得名也為吳門居士朱鷺王在公棲息所鷺故奇士在公舉鄉進士為郡司馬唾軒冕棄妻子結隱於天目無何復過雙徑居此軒閲般若經大有省發豫自南嶽來以達大師末後因緣得至此山居士見而歡喜執弟子業豫歎曰非大力量欣寂滅之樂者何能頓脫塵纍而至此耶因名朱曰大力王曰大顏其軒曰般若乃為銘以紀之銘曰咄哉此軒光明透脫內外洞然了無縛著六根門頭圓通虗豁世出世閒一齊拋却此軒之味恬憺寂漠軒中主人身心快樂一切情塵火聚太末問此法門名不可說毗耶室銘有序居士管覺仙生長吳門早歸三寶不畜妻子不治生産唯結一室顏曰毗耶以延十方以無法可說但以香飯而作佛事老人過其室因請銘之銘曰毗耶離城堅固綿密雖居市𢌅而無塵跡中有居士獨寢一室門不通風六窗虗寂唯有十方不時雲集有問法者止是一默香飯不請隨緣摶食座不用借露地為席諸有屏空一塵不立身心兩忘世界齊擲萬纍俱捐諸緣頓息在塵出塵斯為第一鐵如意銘并引豫別雙徑雪嶠山主以鐵如意并香奩為供感而為銘維此如意代我心口我不能談借爾善吼爾言不無我法非有兩者既離一亦不守唯法身香與爾作耦託此金剛用垂不朽
