body:
  text: 侍者福善日錄門人通炯編輯嶺南弟子劉起相重較書問與陸五臺太宰伏惟老居士親授靈山付囑來此末法現宰官身匡持像教數十年來法門九鼎一絲唯老居士一身擔荷山僧居常獨處山林每感護法深恩未嘗不涕泗交頤也往以未得瞻禮為闕春時祇園暫對業已慶快生平既而東歸海上復聞闡提作大法障難心甚驚怖賴我老居士以衣覆被不獨使法門安堵抑令大藏表顯人天無復驚疑某每對三寶然香煉臂以醻法施之心也致謝無量其臺山大藏因緣料已不二藏公向未有聞想奉持之心益堅固矣與李廓菴中丞憶昔長安月夜促膝談心香積良期飽飡不二回首風塵從茲隔絕一別幾十年所矣念忠懷道誼耿耿精明常目在高空雲漢閒也嗟嗟濁世道與時違薄福眾生不能睹麟鳳之祥惟無長者政若驪龍失頷下之珠不獨九淵無光抑且孤負貧濟又安能望臻極樂以享四事之豐乎況復魔黨橫行夜叉四出而噉生人之肉可謂無安猶如火宅不獨炎洲赤土也伏惟長者凝神澹泊遊刃玄虗引松竹之清風發氷霜之高韻不減羲皇太古山僧比業重愆墮茲瘴海僅持一息聊復四年朔雪炎方相縣萬里追憶舊遊豈可再得雖絕徼遐荒而草木有知安能一日忘於陽春惠澤不識白毫光中曾一照及罪垢頭陀以業因緣而行佛道否答許鑑湖錦衣辱垂問法語數則鄙人鈍根庸流安可以副高望聊竭比量奉醻來旨所云西來意者畢竟西來有何意耶若果意自西來則祖師未來以前此土人皆無佛性耶殊不知此意人人本來具足不欠絲毫似衣底明珠向自有之佛祖但一指示原無實法與人也若作實法會則遠之遠矣所云坐禪而禪亦不屬坐若以坐為禪則行住四儀又是何事殊不知禪乃心之異名若了心體寂滅本自不動又何行坐之可拘苟不達自心雖坐亦剩法耳定亦非可入若有可入則非大定所謂那伽常在定無有不定時又何出入之有心本無相有相則非真心矣斯皆妄想攀緣影事豈可當以為真乎所云念佛者即是念自心也若心淨則佛土淨心土若淨無生死亦無去來所云看話頭可以入道者若道屬話頭則可人人易入亦有看之而不入者殊不知此乃古人一期方便如敲門瓦子所謂借路經過耳豈實法哉然攝引初機須是從者裏鑽過始得下手工夫古人自有方便直以單提一念為主如寶劒橫空佛魔俱斷情塵何敢攖傍如是用心若一念精純諸緣頓脫所謂一門深入久久當自信耳與孔原之念與足下同鄉土豈獨同五濁穢土耶推之本鄉實同一法清淨土中來山野自知歸路忍拋足下寧不把臂乎昨臨行作數語屬弼生留別足下且引王維欲知除老病惟有學無生之句此蓋就文士痛處劄錐足下即不能於此悟入願歸命三寶前受持圓覺經一卷精心熟誦字字不忘待三年後見山野以此當供養聞足下道伴信心清淨願足下教之以念佛法門求生淨土一門可以深入也計高選在即臨事冀善保重且五濁惡世非體菩薩大悲心決不能使眾生歡喜願足下體此與郭美命太史承命為勉師塔銘業已草草報覆惟依樣畫葫蘆不敢妄意增減但於公所謂見悲於法門者數語此瀝公肝腸之苦第勉師無以為辭惟是時不無流涕之嘆鄙人特為表而出之使後之觀者亦足以感發於公今日之心也公亦以我為增益謗乎其銘則脫然翻案此則不敢讓公矣與吳運使承示名公書記欲山僧印證大段世俗之學佛法者多舛駁不精難以著相定於是非之辨若非久留心佛法禪道歷參真正知識以淘融滓穢蕩滌塵習而但取依稀彷彿學相似語資談柄作影身草者斷斷難窺實際即有真心為生死大事且又執我見立牆壍者又沒交涉今所謂名公者多矣雲外野人又何敢妄擬其優劣幸有管東溟居士法眼存焉東溟先執業於楚侗公今觀此書所以力救楚老之弊不避斧鉞此正謂當仁不讓於師非具正法眼秉慧劒稱雄猛丈夫者不能也山僧就中略視一週已見大意然管君見性亦未放許透徹要之秉教奉行苦心深慮言言有本事事有君殊非漫語且就此中亦不能見管君長處公儻若留心此法請讀圓覺經千萬徧字字融通心地以至忘言契會自有一念相應處是時公自有分曉不必廣求佛法亦不必多起知見定不隨他人脚跟轉矣古語有云丈夫自有冲天志不向他人行處行此非虗談公若果趨向此事切須真實為生死大事一著喫緊萬萬不可作戲具增口過以公真心待三寶故山僧亦披肝露膽不避譏嫌為公道耳與黃子光時來安坐海印光中與諸幻眾揮麈默談頃閒賢伯仲氏炳然現我三昧也惟幽居遠市閉戶究心山色在目溪聲滿耳未必不對法身而聆長舌耳春來動定勝常知坐進此道歡喜無量且云爝然於中有難對俗人言者誠哉此事惟在自知自信正如啞人食甘飲苦耳其實何可吐露耶寄去大慧語錄幸時披剝冀足下時與此老把臂共行直使佛祖避舍三十日來所作水月道場空華佛事隨見影響候莊嚴有緒當迎杖舄共升法殿也右臂不仁久矣不能公布作書一語普告與黃梧山惟足下夙植靈根但今成熟未深所賴信力堅固不被諸煩惱魔之所傾動時方息肩苦趣正當頓轡先登以䇿萬里高步駕此津梁不意天摧法幢一旦分崩離析遂至於此朽夫法眼而觀了無塵迹所苦正在諸同志者道力孱弱失此依怙為悲戀耳朽夫雖朽惟以利生為事業若忘足下輩則忘自願力耳此語非妄此行萬里其別諸君語遞相發明幸同觀之與黃柏山吾佛出世全在機感因緣淺深以彰法之久近感深則久住緣淺則易壞此理固然今海印道場之在東方如日月光於幽谷耳長松巨石稠林陰翳終天莫睹今觀其不能久住者殆非佛日炤臨不深實在機感者煩惱稠林障翳不淺耳又何以常情論成壞去就乎所願障翳頓除何患慧光不朗朽夫此行萬里長空一般風月有何去來之相惟尊人無恙子光得所足可安心異日感應道交依然海印三昧也與江吾與善知識出現世閒遊行自在如大獅子所作皆奉如來所使教化成熟一切眾生以此為事乃至為一眾生不避三途劇苦刀山火聚不以為患以朽夫今日之事觀之但願得一人能不退菩提心成就最上因緣者則朽夫實所甘心否則七寶莊嚴皆屬有漏業因耳又何取焉今朽夫擲身魔界僅僅一紀而其開發信心知有此道者多但緣未熟耳以今視昔之東鄙猶古今異代矣且一時從遊者惟足下習染最重今見足下書翻然改圖是不負此心雖萬里如面豈不欣然就道耶與即墨父老離合之情悲喜自昔去來之想夢寐為勞蓋心苦於知己念切於有緣在古聖賢猶然況恒品乎聞之一飲一皆屬前緣一貴一賤交情乃見若山野之於諸君子一紀之歡不減骨肉之愛萬里之遣重遺手足之憂其不稱千載之知己多生之有緣乎諺語云得一世之榮不若得一世之名即山野之於山海固不能流芳適足以貽笑不知兒童稱說父子相傳於幾百年也況復布慈雲於邊地明佛日於重昏開性海之原轉文機之軸下成佛之種子孕作聖之胚胎山野心知此段公案深信上天之載自有無聲無臭者存焉又何以論空華凋謝瞖眼較得失乎苟知去彼取此則諸君子可稱出世知己矣與陸太宰長公惟太尊人乘悲願力現宰官身作大佛事為一代人天眼目世出世法打成一片總歸金剛心地即山野所習知者自出世以來乃至末後垂手之際未嘗一念捨護法心度生之事業也比雖順世無常隨乎幻化而法身體堅即三灾彌綸湛然常住不獨社稷之勛澤及億世而法門之功當與須彌共峙矣嗚呼法幢既折四眾何依一利大檀誰許白牛之駕悲在法門實能令人痛絕也所幸居士為克家之子不獨世其世家而亦世其出世家聲也所悲在彼所喜在此耳山野遠處遐荒身嬰罪地恨不能持瓣香詣龕室作梵唄以讚功德而此一念業已飛越碧海長天矣遙持半偈以供真前想在寂光必歡喜攝受願居士念此片心聊引侍者代繞三帀於座下幸無以荒唐而拒之也與汪仲嘉憶往昔從賢伯仲遊尚在兒童一別三十餘年不知日月向何去頃貧道以業風吹墮羅剎鬼國昨南來真州驀地相逢恍然如夢以情視之不無悲慨以法眼觀之自不見有絲毫去來動靜也貧道坐此瘴鄉一息千日若從前造道如此可不讓古人今將總洗前愆不敢不勉力自䇿故於荷戈之際力究此心始知從前知見多落光影門頭苟不蒙聖恩大施鉗鎚安知有今日事回觀天子爪牙不險於黃檗拄杖愧鈍根不若臨濟當下三拳一掌耳與管東溟僉憲憶昔山樓對坐每聽玄論是時尚在顓蒙雖不知維摩室中之祕蓋亦心知其為不思議人也別來三十餘年謂如食頃信乎如來出世始終不出剎那際三昧也貧道每自尅責徒生斯世枉入空門雖有志齊古人然恨不得古之知識如臨濟德山雲門諸老為之師匠模範即能以般若之火鎔佛性之金而欲求為真正佛祖面目者蓋亦難矣是以二十餘年苦切山林個中未敢輕放一綫種種幻化之緣舉皆空中佛事亦未肯以空華翳目此一念孤光惟有如來神通天眼盡知盡見者是可與知己者道耳頃荷諸佛神力哀憐而以不思議事攝之貧道一遭世變即私自欣謂鐵圍重關非此鉗錘不足以摧碎之也爰自歷難以來獨以金剛正眼視之從始至今就中歡喜之心不減平昔且日益過之所以彌感聖慈深荷佛力此心又惟佛可知也貧道常謂古今異代聖凡異路然雖出處不同事行各別亦各有其志莫不因言宣志即事見心易演於羑里騷發於江濆道德著於出關南華作於遯世是雖性情殊途而志則一致舉皆心假言詮志藉事表若夫貧道者自知習氣所鍾鍾於忠義居常私念丈夫處世既不能振綱常盡人倫所幸身託袈裟即當為法王忠臣慈父孝子所以三十年來苦切此事至若千尺寒巖萬年冰雪中徹骨徹心𨽗一生九死者又不止今日事也所恨歷劫習氣欲頓盡於一世固其所難要且自知妙悟萬不敢望於古人而此一念精真即窮劫不退此非妄語痛念生此末法澆漓之世偶被業風吹扇好事者即以法門人數口之愧理不充行不備不足以取信天下後世復遭此逆緣類墮俗數其迹既眇其心益微尤難見信於一時至若生死大事實在己躬報佛深恩寧無有地聞之人子之事親也以不辱其身謂之孝今貧道斷髮毀形既不能為世間孝子而罹罪辱行又不足以終出世事業真僧俗兩失之矣豈不虗此生哉實欲於九鼎一絲之秋以程嬰公孫杵臼之心匡持佛祖之命脉庶不失為法王之忠臣是故當捶楚之餘擲此瘴癘之地不敢一息忘於度生之事一入瘴鄉不數日即以楞伽為佛事三年之內手著諸書在干戈壁壘閒不敢一息懈怠所以急欲了此公案者自念久居塞北走盡天南人閒極品炎寒俱已備歷顧此蕞爾之軀何當受此燒煑志有待而形已消日雖長而生已短苟不努力強持一息以法為命誠恐一旦委填溝壑即與草木同枯朽矣況一失人身萬劫難復儻或緣差異路換面改頭即欲以今日之身作今日之事持今日之言求正今日之知識豈可復得是以不知羞慚亦不計其可否但任因緣而就儻一言有契佛祖之心當知音之賞則夕死亦足何暇顧雌黃審得失以適眾口之辨哉明公知我者其不以我妄乎聞之惟聖人能通天下之志適眾人之情未聞天下能通聖人之志眾人能適聖人之情者也但稟於心不假於外耳細誦來教溢美過情深感護法精心悲在同體不敢以世諦量也即荷尊慈所以屬望於下劣者正如啞人吃黃柏難以吐露向人或於楞伽案頭幸一印正則千里覿面夫復何云第不審未死之年可能接足承願如今日之談否與馮具區太史憶昔對坐龍華樹下一別二十餘年人世幻夢於此足觀矣貧道向沉幻網荷蒙法王正令以金剛寶劍而揮裂之不然何以有今日是故彌感聖恩不淺也年來瘴鄉兀坐窮廬惟以楞伽究祖師心印所幸智竭情枯於此法門頗有一綫之路隨所遊目自心境界筆而記之不覺墮增益障意將以此為報恩地久躭下劣慧目未清不識可與此法少分相應否古人以此向上一路徧歷百城恨以業繫不前不能三帀座下謹遣侍者持請印正仰願慧光洞照徹祕密嚴大施門開頓示寶藏實所至望耳與唐抑所太史仰辱同體真慈多方護念向聞炎方真同火宅饑饉餓殍枕藉道路山野私念極境窮荒為道緣爐鞴苟能假此鎔冶塵垢消亡精真獨露斯實聖恩所賜良不負此生平適足以報知己耳又豈敢以逐境生情重取法門之玷幸為謝諸故人仰惟炤攝更願以道自重自愛與王衷白太史嘗謂一切聖凡皆依如幻業力而得住持則去來起止聚散隱顯無非夢事今山野萬里之行良足證之在智光圓照不隔寸絲妄想瞥興淼漭雲天蓋不知何方何地所云情生智隔想變體殊非虗言也山野仰藉慈被諸凡無恙惟中連遭饑饉乍冒炎蒸蹈湯赴火誠可為喻山野諸所堪忍惟以幻化浮身難禁銷鑠恐即填溝壑不能再瞻天日幸為謝諸故人努力以道自重玉磐諸公不及別裁惟慈遠攝又世相空花眾生顛倒所搖目者惟智眼明見端然寂滅之境耳想別來密證之功已深入無際聞之菩提所緣緣諸苦趣憶昔長安深夜燈前一見忽若再生觀座下驚喜之狀足知未見之心與別後之懷耳古人雖云以理折情若情與理則大有不可折者此其同體之悲入於真知之境如月印寒潭人臨寶鏡自不能逃其形像耳王城比來法社零落知己星散能無寂寞乎洞觀近日入都想重見故人心相印可自有不能言者矣下劣年來處此瘴鄉所託光攝四大清涼無諸熱惱昔談淨穢隨心苦樂在己今實證之以法界海慧照之則又了無陳迹矣與高司馬承垂情遺草尤辱知己之真可稱千載旦暮之遇第山野人匪戴髮言不關風竊恐有玷明德耳自惟早棄筆研志探玄理窮究性原者有年至若詩文原非本業即有一二口頭語慨以應化之迹殊非作者擅場也惟禪門著述頗有數部草剏竢此行南中荷戈之暇緝集成編寄請印正儻其半偈可投幸附不朽則法施之隆未必不自長者真心流出也與曾見臺太宰往者同江雪夜一夕千秋臨別教言泰山九鼎不獨感道義情真實荷慈悲慨切令此枯朽得植根株於炎方瘴海之閒不為境風搖奪者皆仗老居士一語之力也恭聞法體日益康健此天佐以黃髮耆頤之福願加珍衛慎起居節飲食省思寡慮此為太上延年之術第念佛一門尤為晚年凝神極樂之祕訣出世之上䇿也惟翁居人臣之極而世間相已視如浮塵矣其出世之功儻稍留心於此未必不為此生究竟樂地也與王性海大行廬陵米價竟無可醻淨土勝緣業已深結承禪悅飽飡當不負空生託鉢也別後抵戍所其地瘴煙復逢饑饉惟此苦趣觸目心悲痛徹骨髓恨不能徧身毛孔一一如空流出利生四事耳斯實與貧道菩提分法為增上緣承以楞伽見委竢幻軀得所暫息塵勞定當窮神必不負囑累因緣耳又前北來僧乾峰已託問訊併致楞伽筆記奉求印可惟法屬有緣事如有待此經入震旦千有餘年況經三譯之手自昔弘法諸師若清涼圭峰不少其人所註疏者汗牛充棟而獨不及此使達磨心印暗而不彰以至今日被座下拈出於急流中一語拶破入山野鈍根之手播弄一番誠非小小因緣也豈與座下同受靈山之囑將鼓簧此法以救末代之弊耶不然何以有此難思之事乎就中不知究竟何如一旦以此大寶和盤託出光照人天未必不假神力也願指點瑕疵如奪秦庭之璧是在座下勇健耳與傅金沙侍御念此萬里之行得盛使周旋直登彼岸何莫而非法力此感不容聲矣自入瘴鄉心知罪狀日夜精勤懺悔不敢上負聖恩辜知己坐毒霧中以法為懷日夜無懈頃乾峰上人來幸接法音喜不可言具聞聖心有此回向法輪大轉光被海宇而玄樞默運仗智力居多慶躍何如旃檀如來下劣荷擔艱難之狀種種不能委悉今蒙大悲手眼出沈淪使法身不迷而下劣之心即得解脫無復成佛之想矣又何以來去見如來住相為布施哉種種因緣而求佛道皆分內事第恐當面錯過耳又惟如來出世本非一種因緣必感應道交機宜冥會而後現豈獨佛界然哉法法皆爾以旃檀如來一事觀之實有不可思議者存焉但佛如來出於山野未來之前座下出於山野既放之後然此佛事非山野無以成始非座下無以成終諦視此段因緣若落眾生手則不免於枯木朽株竟入丹霞火爐即墮落長老須眉又復何益又安能現身兜率降迹皇城使無量人天發希有心作苦海之津梁耶以此而觀諸法蓋不可以思惟心測度如來境界也前作書致南韶祝觀察為護法昨有報云已檄南雄擁送過嶺矣第中使者汗漫伴行者無乃隨脚根轉耳不識何時至都門突出眉閒白毫相光徧照東方萬八千也就光中種種因緣行菩薩道者縱有彌勒騰疑賴文殊智眼必一一洞徹無餘不竢疲極之人喋喋也奉寄楞伽一葉以供慧目蓋此經洞明吾人日用現前境界頓令實證所謂頓教法門者也願座下二六時中不可暫忘此法耳與張大心老人自歷難以來直至於今返求本心中一念動心悔心了不可得何況是非得失恩怨成壞見耶老人出世以來七歲即知有生死大事三十年來歷盡冰霜喫盡辛苦單單愽得此一念奈何向沈幻化網中若非聖恩一椎打破不知又向驢年去也年來坐瘴煙中住清涼地日以楞伽印心此實聖恩所賜也想居士聞之必大生歡喜矣君甫年來德業何如凡百誡以清淨寡欲勿生分外貪求馳逐之想將來受用自有廣大處閒中收攝身心當以學問為事異日成就立於人前可省慚愧耳老人回觀往事真同夢中無復一一諒在大心中凡所真實功德必不退初心也答柯復元孝廉聞足下病甚此心日夜縣念不已吾佛所言一切諸病從妄想生既妄想為諸病本即知斷妄想為一妙藥也足下有志了生死大事惜乎入此法門不深前會時草草放過將謂因緣有待不意生死逼之速如此耳足下清癯骨立即無病亦病狀況久病乎計其調理極難苟不以生死關捩子一口咬定一切世念情塵妄想思慮一時放下定難取效如燈𦦨𦦨祇見其焦枯耳當此之際只是死心一著工夫最為省力其他伎倆都用不著一切學問文字皆使不上若將從前胸中所有之物一齊吐却則病根盡拔枝葉自然不生矣老龐云但願空諸所有此真語也又佛言照見五蘊皆空度一切苦厄一切諸苦可苦者五蘊身心耳若五蘊皆空又何苦之有然五蘊身心本來自空但吾人未親看破若親看破則一切所有如空中花能見此身心如空花者即名觀自在菩薩矣凡在病苦中者應當作如是觀若為苦惱逼迫心地不得清涼但就逼迫不著的一眼定此處著力恰似與閻老子作對頭一般定要透若此處一透則百千萬劫生死機關一時頓裂如此掉臂而行是名大自在人也古人皆在疾病禍患死生關頭做出來故得如此穩穩當當光明廣大也勉力圖之與丁南羽往昔未面足下已見其心江干既見足下則睹其神矣三世十方諸佛歷代祖師向足下一毫端頭放光動地無怪乎其然也向以大士如幻三昧惠我每蒙甘露見灑頓令熱惱清涼既而覺音持康祖道影來展之瘴煙毒霧中令人血淚迸流徧身毛孔也惟康祖吾長干祖也舍利吾師之骨肉也且貧道忝為克家兒孫既不忍祖翁田地為荊榛又豈忍睹現身於瘴海乎居士其重我之悲願哉達師之贊實有以啟之耳時時瞻其像誦其言真足令人化血肉之軀為金剛骨也此段公案無物可醻舊端研一隻可以供足下乎若令此研磨穿則足下身光當與楞伽寶山並峙於性海中矣與遊二南人生聚散如雲世事如夢流轉勢速如電此身不實如芭蕉此三世諸佛入理之門吾人日用現證而不覺是與足下別來親切境界不審法眼觀之作何滋味與屠赤水嘗謂向上事屬上上根人即有志者其根未必利根利者其志未必精貧道私念捷疾利根真能一超直入者多惜以無上妙慧作世諦流布耳間者晤德園居士於王城靡不以此興慨貧道比以夙業重愆取辱法門遺師友憂蒙恩譴炎海於丙申春仲抵戍所時值其地連遭三災真同火宅日坐屍陀林中披閱楞伽於無生之旨脫然自信始知此事不從外得本自具足回視昔日工夫大似含元殿裏覓長安即此萬里調伏差勝三十年行脚古人以火聚刀山為道緣爐鞴非虗語也彌感聖主恩大難醻於此經有當於心者筆之成帙名曰觀楞伽記今已脫稿暇則檢點髑髏眼開識乾者亦不減維摩丈室中人也然此雖為撮摩虗空適足以消炎熱報罔極醻知己耳時與丁右武聚首五羊每談明德必出手書光明煥發恍若入寶林而視滿月清涼悅懌不言可知因知居士長齋繡佛與德園居士伯仲結制西湖之上切究此事喜得蓮師為證盟貧道遙空合掌讚歎不已竊念利根大志如居士友如德園師如蓮池可謂諸緣具足何患不一超直入真宇宙閒千載奇事古人云若識佛性義當觀時節因緣慨斯末法此會此緣難可再見諒不虗負矣讀普陀志護法真情字字皆從光明藏中流出貧道三復不覺感激填心也嗟乎唯我聖慈一代弘誓累劫津梁非籍圓通手眼幾乎沈埋佛祖矣念此曹谿為祖庭重地法海源流惜乎荒穢寥寥殆難舉目海門居士攝南韶時屬貧道纂其志安得居士俯垂一機擊塗毒鼓使鍱腹降心為祖道之光耶與王念西太史般若種子在五蘊中如玉在璞珠在淵任其埋藏深厚光明自然發輝昔與座下晤語祇園真不減荊山合浦也別來幻化如斯在智眼觀之了罔陳迹然性海波瀾惟遊泳者識其深廣耳山野年來坐此無多增進但於今事門頭目前無異法耳古人謂淨穢隨心苦樂在己心外無法真不吾欺所入楞伽境界殆非尋常恃佛法知見可能凑泊即山野生平行脚到水窮山盡處方見佛祖鼻孔只在眾生穿衣吃飯中也寄入慧目略見此番行脚不敢辜聖恩負知己也法華擊節亦自偶爾狹路相逢處拈來蓋發前人所未發雖出一己之見實可諸佛之心願座下試並披剝儻有一得幸廣法施令一切見聞頓入自心現量徹諸法實相則眉閒白毫相光突出於座下一毛端頭也此中生涯具見於此無餘蘊矣勺原同處經年亦深用錐劄雖識痛癢猶未徹心酸鼻大段佛性義自有時節因緣耳惟法界海慧自他不隔即此覿面無容贅談第願以法資神無忘度生事業是所至禱與徐明宇侍御連得手書知信道之篤其於安隱快樂之地自得受用無量矣歲除前二日行脚僧自東海持尊翰到知己還鄉兼得中丞訃音悲痛五內既讀札中語知中丞末後一段光明全在公柱杖頭放出百千萬劫大事因緣何幸於宰官身中僅得再見不覺化悲為喜然此事雖是生平道力亦重賴善友提𢹂公念道情真目前有此榜樣足徵佛法靈矣昔歐文忠公問一僧云古人臨生死之際有談笑脫去者今何寂寥無有僧云古人念念在定慧臨終安得亂今人念念在散亂臨終安得定文忠大驚此語正吾人學道之標的也承示平時頗自檢點及至當境習念又生此正公念力真切處方能見諦如此夫子亦曰性相近也習相遠也又曰學而時習之此習字豈但文字之學所謂習於性耳性本無物清淨虗明為物欲染習故汩昏而不明試思吾人自有知覺以來以至今日習於世故染於物欲日夜火馳未嘗暫止較自悔悟知非以來念道工夫比於欲習久近何如生熟緊慢又何如夫子嘗論弟子中能三月不違者獨顏子一人其餘則日月至焉由是觀之以日月之工夫敵多生欲習而欲勝之是猶滴水救積薪之火勢不能也古人明言學道無他伎倆只是生處要熟熟處要生久久純熟打成一片自然念念彌陀頭頭極樂矣來帋索書謹錄淨土詩二首願公留心淨土一門倘肯於念佛公案得力久久自有受用地往時每到中丞公坐席中見其銜盃之閒念佛不離口雖唾嗟談笑不覺佛現舌端足見此老生平以此為祕密行正當五欲烈𦦨中投此一念當下五內清涼若甘露灑心耳竊見近世學道之士祗知貪求玄妙不知向根本處下死工夫平居無事談論爽口豈不為快及臨榮辱禍患生死之際便見手忙脚亂此非他人誤己乃自誤耳此事一毫假借不得正似鍮石真金入火自見惟公靈根宿植今既秀發願以念佛三昧水時時灌之久久純熟開花結實自有時節耳感公見信貧道之真且篤且恨良晤之難不覺漏逗如許貧道年逼六十有漏之軀難堪十年瘴煙埋沒今鬚髮浩然無復故吾休息之心不離一念但業繩未解不敢高枕山林且於曹谿有休老之志欲借掊土掩此枯骨以了此生不知緣分何如以是與公會晤更難但有風便不妨數數致問也又往於海上有緣幸得一接光容睹其貌粹骨剛心知為最上根器第機緣未熟徒有赤心一片未敢遽然吐露譬若宿種已深特時節未至必待時雨溉灌而後發此必然之理也自爾鄙人以業力所使不得自由一墮瘴海忽忽八年時時私念此生恐無復與公結出世緣顧鄙人悲願習氣似深凡遇具有般若種子者一見即如磁石吸鐵欲自解於心必不可得又安能忘於公乎辛丑七月望後馮王二生歸自都門持手書至不覺喜心倒劇嗚咽霑襟蓋以人生知己會晤良難至於道緣知識尤其相遇之難而信根難發又難於遇知識也以其知識固有而求其大發真實信根為生死事切如公之痛懇猛利者萬萬難得然此般若種子即吾人本有之心光一旦迷之而為業識纏綿於軀殻之中從來止知有此血肉之身而以種種聲色香味諸塵境界埋沒如萬里奔濤杳無涯際愈濶愈深而愈見有味安肯急流中猛省回頭望彼岸乎自古迷中倍人未有不如此者公既知己躬下本有的萬古靈明之性是則此性在我本有不假外求又何懼其不能得第恐信之不篤見之不真求之之心不切耳功名富貴求之於人此個事求之在我孔子所謂未之思也夫何遠之有雖然求之在己第一先要認得真說得透看得破方不錯用心萬一知見不正見理不真不遇師友將所疑之事一一說得透或目前人我是非毀譽得失計較之心不忘或舊染習氣濃厚不能頓淨遇境觸發都把作正經道理會此便是墮疑網生退屈的時節也以我等本性原來清淨只是無量世來生生惡習染至於今熟不由人而留心此事幾曾若今生自幼至今讀書做事及日用飲食男女聲色貨利之熟哉故學道人必定生處要熟熟處要生便是入門下手初步其次消磨習氣必定要念力為主或古人話頭或單提一呪切切記心時時在念久久此念純熟中心有主則於遇境逢緣內不出外不入中閒一念炯炯孤明一切應事接物如鏡現像不將不迎來無所黏去無蹤跡此便是最初得力處也若於微細情想潛滋暗長不自覺時或己知己見悋惜護痛不肯一刀兩段此便是因循輭暖自恕自欺處者裏最要吃緊著眼決不可放過亦不可被他瞞過若輕放恕過便是自欺故孔子曰毋自欺也此便是教吾人行路把手拖步一般以吾人情昏智暗一向只在光影門頭識神影子裏弄聰明全於本地真實處不相干若者裏認得便是披沙揀金砂土若去金體自純不患不到精耀時節公留心此事較之他人更易以其根利而困橫已多一切世念已被不如意處消磨許多已得便宜不少世人以為失公必以為得如老子所謂去彼取此是亦天之所造也且如鄙人處瘴鄉八年於此其實從前未證法門參透許多此難與俗人言也其修行之方諸經俱有只是不要作玄妙話會若作話會多一重障耳六祖壇經最為心地法門之指南但中下根人不能湊泊以無工夫故耳永嘉集一書實是壇經註脚若見解依六祖用工夫如永嘉何患不一超直入只恐作話會耳楞伽最是直捷只是難看獨此二書可為羽翼願公留心念之與陳劒南貳師承示近日於楞伽壇經探討工夫頗進此則大為足下慶幸古人云生平無限傷心事不向空門何處消以諸苦皆生於有故佛說三界苦趣謂之三有所言空門非空無之空乃刳空之空龐居士云但願空諸所有謂內空諸想外空諸緣內外皆空心境俱泯則諸苦自絕此禪門出生死之捷徑也所云淨土文此又出苦海之要津安可以淺近視之試為足下略言之佛者覺也即吾人本有靈明性耳吾心本來是佛即六祖所云本來無一物若了此本來無物即頓見自心本來佛性是名成佛頓教法門此外非別有佛可成也言淨土者有二種謂事土理土在事則涉有相修為種種行門即龍舒淨土文所說乃接引中下根人之祕訣所言理土乃諸佛諸祖自受用之境界名常寂光言常則不變寂則不動光則不昧即吾人自性之本體也故云唯心淨土自性彌陀又云心淨則佛土淨又云生則決定生去則實不去此乃上上根人所證境界壇經淨土之旨蓋謂此也所云修淨土者以念佛為主蓋淨自心之方法耳吾人日用萬苦交錯穢濁本心如污濁水若急流猛𦦨念佛一聲則五內清涼諸苦頓歇此即佛救眾生之苦也以念佛故心垢頓除一念清淨所遇之境無非極樂風聲月色無非真境觸目無非淨土舉念皆見彌陀又何待三寸氣消過十萬八千佛土之遠哉此種法門第一要決定志第二要放得下第三要隨得緣然隨緣即安命也第四要認得真即不惑也第五要厭苦切然厭苦心切則慾念自除不退屈也以此五訣單持一念如大將身陷重圍決志突出一人單刀與萬人敵勇決如此則生死怨賊眾苦魔軍不戰而自退此所謂真將軍也佛經云與煩惱魔死魔共戰有大功勛出三界破魔網爾時如來一大歡喜此正所謂向空門而消豪傑之氣者也貧道自幼離俗即切志此事生平所遇魔壘甚多皆力戰而退然雖未出重圍今可自稱佛門上將不啻李廣飛騎此事如人飲水冷暖自知安敢向俗人道以此事臣不得獻於君子不得獻於父又安敢為世俗友人乎今足下猛然發此信心蓋宿種有在只待時而發今見淨土一書蓋春雨也如膏之澤潤已蕉之芽此造化之機甚微是亦足下受福之始也貧道嘗謂吾人處世日用不過一飽食一安眠耳此外皆長物也今既不得飽食安眠且又拌死營營以求悅人之耳目以增自己之苦海此可稱智人乎既不得世閒受用而出世之樂又茫然不知誠可憫耳世閒事求之於人出世事求之於己在我所可必得者捨之而不為可為癡之至矣如所云云者皆貧道生平出家所證實到境界殆非常流口舌者比今計從十九歲出家至五十八歲四十年來皆此一念即今遭此大譴於大苦猛火烈𦦨之中得清涼地者非別有方法耳此事非足下有此大緣必不敢道恐掩口而笑耳只如向來文字語言種種皆從此中流出自知就裏之妙亦不能言世人以文字目之特淺淺耳舉世法眼者稀貧道年來混俗和光此四字從小知妙生平力學近於十年之內苦心操切又今三年之內稍得相應可見涉世之難至人不易學不易至也此獨與足下道耳較之此事全在逆境中做出更見受用且功更大日劫相倍此須大力量人乃可為之昔人有言有將相之骨無出家之福此語不淺然出家之難亦非細事貧道生平之苦不啻足下萬倍然受苦之志則與足下霄壤矣貧道自出家以來凡所稱謂與人未嘗言兄弟二字何也其心志在於獨行獨步不與世俗為伍此乃向上出世志也今三年之內方與交遊稱兄弟正是混俗和光得力最初一步工夫是知菩薩應世之心妙在無方無住為最上乘六祖一聞應無所住而生其心則頓悟本來曠劫生死苦輪頓息此豈小丈夫哉此則貧道自知向皆住於偏枯空寂之地即若世人住於煩惱海中無二致也足下乃向住於有者與貧道住空無異今能翻然一蹋便破即頓超貧道三十年工夫可稱一超直入此非拋却現前境界別求出路若捨却目前別求解脫則非愚即狂永嘉云棄有著空病亦然猶如避溺而投火正謂此也以與足下見面時難前札蓋先已作臨封復讀足下來書感激過越乃對使據案草草不覺葛藤如許蓋慣曾為侶偏憐客耳足下發此無上心乃出世因緣也又安可以世俗泛泛而應故披瀝如此足下以此劄參之以消日月未必不為清涼散也又前得來書有歸心淨土之說足下猛利如此因而對使據案草草盈紙不知所云大段極言勸足下著實在不如意中討個安樂地所遇境緣難處就在難處中放下身心任他呼牛呼馬在我無可不可此段受用惟老子能之即夫子未得此法門未免處世為難及見老子之後被他痛處一錐直透到底當便得無量受用至若對門弟子說毋意毋必毋固毋我與夫空空如也此段皆了悟後的話頭決不是在前頭巾語也吾人心中不淨只是者些人我是非執情放不下意必固我定要依我方是好事且我既要依我而人豈不要依他人乎此皆苦海穢土中事只放下此心心中便乾乾淨淨快活無喻何為而不可坦坦蕩蕩即此便與佛心相應以此心念佛則心心皆彌陀念念皆淨土也又在省臨行種種夢事據其所述了然目前雖未盡信蓋於言外已得其微旨大為快事自古操行之士慮其人品未定罹患難者恐其功罪不明貧道今已兩得之幸之幸也即老死溝壑又何憾焉是故休老曹谿志願益堅儻徼六祖之靈借一掊土掩此枯骨更復何慕以此修崇之舉其功雖鉅不以歲月計其速成此心頗覺自寬且法門佛事如空中雲原無定相如亢陽禱雨以精誠之至無不尅應天時人事其致一也曉公天性敦篤忠實君子即名教中所難得者惜乎氣過於躁而心過於慈故於小人之言易動而無斷貧道感知己之遇且為地方作福橫身於百折之鋒而與生民除其害之大者幸亦催僅自免今區區力已竭矣而事方無涯安能以有限之精神泛無涯之毒海豈有智者所甘心耶去歲非貧道在則地方大有可畏者今秋極欲邀貧道往故力辭之耳貧道自視此身為法門所繫將徼佛祖之靈託之以為萬世功德是大有過於此者敢不自愛今多方委曲始遂藏迹之計況自今以望故吾不遠豈忍蒙不潔又為淨土之污辱乎鳥不厭高魚不厭深曹谿將為邱隅也足下知我者以為何如承示念佛須持數珠此繫念工夫最親切向日不敢言者恐足下有恥心在耳今既須之謹將自持伽南香珠一串奉上但把持已久香氣雖無而精神已滿知足下得此必能頓入歡喜藏也答楊元孺元戎古人云熱亂場中難當冷眼以三界無安猶如火宅出入其中者靡不為其燒煑若從烈𦦨中覓得一片清涼地非冷眼人不能得苟能當下一念清涼頓見大地皆冰自不在身心世界中作歸宿也此從上大力量人遊戲生死場中能轉塵勞作佛事化煩惱作菩提者特仗渠一隻冷眼一片冷心腸耳更有何神通妙用哉此言甚易知甚難見且如佛祖單以諸法如夢一則語為出世要路而世之智愚例皆能言人生如夢耳其語雖似其意則非其實未曾真真實實一眼觀破人生如夢也若果透則自然能與一切榮辱利害得失是非關頭掉臂而去矣又誰敢攖其鋒哉其實就中無甚玄妙至於最初一步不無其方吾人處世先要將夢中事試舉向目前細細觀察定要的的看到不覺發一大笑處到此則頓覺尋常說如夢話頭迥然不同矣即將一同處一念轉將目前境界置向夢中細細觀察看到昏沈沈重顛倒時忽然猛覺來如此則回觀生平向來歷過一切種種境界諦實求之了不可得了不可得處即是諸佛祖師出生死第一關也
