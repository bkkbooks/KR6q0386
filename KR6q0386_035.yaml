body:
  text: 侍者福善日録門人通炯編輯嶺南弟子劉起相重較贊達摩大師渡江贊十萬里西來端的為何事老蕭乍見時胸中尚疑似一語不投機掉臂且休去折得一莖蘆欲將橫大地九年面壁坐寥寥沒意趣博得神光臂一支通身化作光明聚相逢不必問前程丈夫自有沖霄志又不是徒來胸中有事不遇其人吞聲忍氣撩起便行絶無顧佇滔滔長江截流而渡折蘆一枝五葉浮空聊以代步豈是神通前程未定不知何往誰料少室巖前又落九年妄想又特來覓知音相逢不相遇一語不投機抽身便休去折蘆渡長江腳跟不點地不是少室巖幾乎大失利幸得赤心兒聊以遮羞愧賺殺後來人喚作西來意又半影贊狀似蒼鷹心如攫兔不是無身不欲全露又西歸贊來太忙歸太速憔悴精神慚惶面目落得一隻破鞋恰又有皮沒骨看爾回見尊堂將甚言句報覆阿呵呵屈不屈惹得兒孫望空哭又此事人人有分何勞特特西來只道將本求利誰知返見疑猜歸去淒涼無限思到家始恨手空回又繡像贊本無面目枉費針線貫穿將來一毫不欠縱是全身只得一半梁王殿上少室巖畔決無如此許多思算人道是鼻祖西來我説是婆心出現又達摩大師贊一片苦心腸遠來當大事不遇箇中人好生沒意趣九年面壁坐冰枯雪已老不得斷臂漢此心終不了只為當初自著忙今日始知來太早又其來甚遠其心甚苦不遇作家多遭輕侮其道既光其澤愈溥懸絲命在一莖蘆博得兒孫不可數普天匝地盡皈依此是吾師真鼻祖又有事在心忍俊不禁十萬西來誰是知音一語不投九年面壁不是神光幾乎狼籍苦海無涯掀天波浪擬之即墮蹈之即喪五葉浮空一花不改是知我師至今如在又氣蓋乾坤心包六合十萬里西來特特為者著不是不肯承當止因不愛摸索一語不投便渡江過水何曾不溼腳九年面壁冷愀愀謊得神光一臂落至今大地血橫流無限家私都拋却人道是直指單傳我道是間家過活又碧眼胡碧眼胡十萬里來胡為乎一語不投忙折蘆掉頭不顧羞殺吾嵩山石室冰雪枯九年面壁嘴盧都不愀不釆心何孤忽睜兩眼雙糢糊問道立者誰之徒擬待開口喪其軀一臂墮落心膽蘇滴血橫流滿江湖且道此事誰人無問君不竟胡為乎又特特而來尋人不遇忙折一蘆抽身便去少室巖前全無滋味賴有神光少吐其氣剛留一隻臭皮鞋惹得兒孫嫌破碎何似當初未到時長空明月無纖翳又其往太速其來太早知之者希空增懊惱不是少室巖前幾乎此心不了雖云直指單傳畢竟門前之繞兒孫至今播揚狼籍家私不少咦東風吹破樹頭春落花滿地無人掃又石室達摩大師贊蒼巖石室九年面壁非是無心祇為不識太無聊沒端的直待神光雪沒腰平空一語成狼籍五葉花開大地春至今滿眼生荊棘又贊既赤手來包裹何物把作贓私便成塗毒分疏不下至今負屈六祖大師肉身贊一陽來復暖氣漸臨三陽滿足萬物皆春一陰初至流火內凝三陰始交草木頓零有力造化尚使枯榮何況無生念念熏蒸以有入空四大俱融以空入有有則不朽空有兩忘適同金剛山河大地盡常寂光是故我師為法中王永明大師贊有序清幼讀心賦唯心訣即知師為光明幢也既而從雲谷先師聞説大師日行一百八件方便行將謂尋常勤勞事耳竊慕而行之因是寓目無遺法以為善用其心矣及垂老至西湖淨慈入宗鏡堂禮大師塔影訪其行事弟子大壑出自行録清展卷默然自失歎曰此廣大無邊微妙法行誠非金剛心普賢願不能持其萬一也況揭心宗而鎔教海示法性而攝羣情非稱法界三輪何能臻其閫閾哉清感歎難思稽首為之贊曰稽首大師光明幢普照法界清淨藏乘大願輪示三業特為羣生開正眼親傳佛祖祕密印融通教海歸一心陶鎔聖凡非比量頓入實相三昧海百千妙行顯唯心萬善同歸一真諦思惟自有三寶來此土唯師能護法是故華夷悉歸仰盡入慈悲心念中飛潛動植攝無遺即以己身代受苦若非寂滅平等觀何能了無彼此相悲哉末法諸愚蒙不知盡被願力攝懸此宗鏡照萬法目前何法非佛事即此放生一種德便入毗盧法界門自心先入衆生心衆生何能逃淨土我以湖山為筆研不能寫師一毛孔普願隨喜見聞者同證吾師大心力諸祖道影略傳贊康祖僧會贊法身舍利普遍大地光明照耀無處不是爰有至人尋光而來懇求出現梵剎初開天竺佛圖澄和尚贊至人隱顯其行莫測透體光明其用自別出入帝庭如狎鷗鳥脫然歸去由來時道廬山東林遠公贊曠志高懷遊心淨土創開東林以為初步蓮漏清聲流韻至今凡有聞者靡不歸心寶志公贊至人潛行迹不可知從何處來為鷹之兒遊行世間人莫能測擘破面皮又何必説傅大士贊道不在冠儒不在履釋不袈裟無有彼此但能不生分別心三教宗師即是你章安法師贊影響法化雲龍風虎凡立幟者必有其伍一家教觀至師大昌入多聞海源遠流長法智法師贊台之一家遠宗龍樹教觀分明觸者多悟五百年來其維不張實生吾師大振其綱不空三藏法師贊毗盧灌頂是為心印正令全提佛魔聽命奔走龍神潛消百怪是故智者得大自在賢首法師贊大法界網聖凡羅列獨有一綱惟師能挈引萬派流同歸性海五教齊收終古不改清涼國師贊秉大智印範圍法界入總持門具四無礙九尺長軀百年住世七帝門師事不思議圭峰禪師贊萬里封侯投筆而取吾師一投直出生死性海同遊真子之印入法界門是稱亞聖法照國師贊𭦟殊大士將期一見故金色界鉢中先現及至入門如從舊遊直指極樂是所歸投玄奘三藏法師贊大教東流其法未普爰有應真委命往取般若流光相宗大啓苦海舟航利濟無已窺基法師贊唯識幽宗義深且玄惟師揚之如日麗天定從兜率預稟彌勒不從中來安知其訣道宣律師贊如來設教三學為師定慧所發以戒為基大法東流此教未光南山傑出一振其綱一行禪師贊顯密之宗讖緯之故大衍一成陰陽合度世出世法靡不該練五地之行於師乃見南嶽懷讓禪師贊氣概沖天心虗沒量攬曹溪水興波作浪睡著馬駒一甎打起蹴踏橫行觸者皆死青原行思禪師贊天然尊貴不落階級一語投機如蜂得蜜曹溪一脈枝分脈衍從此兒孫雷驅電捲永嘉無相大師贊金錫孤標生龍活虎不是老盧幾遭輕侮言前薦得一宿便行縱然超越猶是兒孫西江道一禪師贊馬駒如龍牛行虎視百三十人一腳踏地法流西江百川東倒一滴瀰漫潤茲枯稿石頭希遷禪師贊獦獠佛性原自有因一尋思去即得其真踞坐石頭其路甚滑縱能行者也喫一踏越州大珠慧海禪師贊自持寶藏更向他求一言指出應用自由越有大珠圓明通透隨方照耀不落窠臼天皇道悟禪師贊那邊不住從何處來一見石頭八字打開以此示人只貴知有顛倒拈來如弄丸手潭州溈山靈祐禪師贊百丈壁立來者望崖惟師直入撥火心開作水牯牛異類中行仰山勘破父子家聲杭州鳥窠道林禪師贊乘日光來依自性住故才出頭天然妙悟巢居長松人道是險但看他人不自撿點洪州黃檗希運禪師贊大雄山下有一大蟲哮吼一聲聞者耳聾疾雷之機掣電之眼西來門風從此太險鎮州臨濟義玄禪師贊黃檗師子爪牙才露大愚之機如鷹拏兔脅下三拳腮邊一掌適犯其鋒非為粗莽端州洞山良價悟本禪師贊本來面目一摸便見無情説法似乎還欠既見雲巖掀翻窠臼過水覩影方始通透撫州曹山本寂禪師贊越格之資不存名迹超方之眼一見便識五位虗玄宗旨綿密是故至今猶黑似漆福州雪峰義存禪師贊熟處難忘蔬筍習氣鐘梵經聲聞之心醉師棒如龍友嘴如鐵故此出身自然超越雲門禪師贊才見睦州閉門推出挨身一拶頓折一足從此轉身蓋天蓋地雪峰未見早已心契法眼禪師贊一切現成了無顧佇萬象之中堂堂獨露一味平懷目前即是才涉思惟便落第二汝州首山省念禪師贊七軸蓮經持之已久一言放下即知本有不説之説舉著就見拂袖而行何等快便越州天衣義懷禪師贊本性慈悲來酬夙帳見了魚兒隨手便放一出塵網便登覺地擔折桶脫虗空粉碎潭州石霜楚圓慈明禪師贊西河逆機見者不識親遭掩口鼻孔打失其機迅發脫不可羈明眼稱之真獅子兒隆興府黃龍慧南禪師贊西河獅子父子門風倒握太阿誰敢當鋒師一攖之聖凡情盡室中三關全提正令袁州楊岐方會禪師贊荷擔大法綱維叢林狹路相逢一語見心異時兒孫遍滿天下源遠流長根深枝大舒州白雲寺守端禪師贊久把明珠祕為奇貨及遇作家一笑便墮看破笑處自亦絶倒信手拈來無非是寶蘄州五祖法演禪師贊出門不利即撞擔板逢人便問祇好遮眼幸遇作家一椎打破掉轉頭來方知話墮杭州慧日永明延壽智覺禪師贊乘大願力出為法瑞總持門開衆行畢備懸一心鏡朗照萬物佛日中天無幽不燭天目高峰禪師贊雪巖之險壁立萬仞惟師登之得其捷徑死關之險又踰於巖故望之者猶如登天天目中峰禪師贊天目窟中真獅子兒爪牙才露百獸奔馳孤峰凜凜法海洋洋是故我師稱僧中王又踞天目之高峰透空中之鐵壁破佛祖之重關小剎塵之知識示如幻之身心展那伽之定力打碎衆生生死窠縱是相逢無處覓千巖禪師贊問佛何在尋之不見鼠翻貓器忽然出現躍身如空應聲若響不是者番幾沉妄想佛印禪師贊文字習氣生來漏逗橫口説禪不落窠臼預畫笑容不知何為軒渠而化只者便是徑山無準禪師贊一語投機十方通透舌根雷奔衲僧雲湊兩入內庭提挈萬乘不假他力全憑正令寂照圓明禪師贊世道交興真人應運雲龍風虎莫之能禁真金出礦古鏡生光精明既發照用無方白雲覺禪師贊坐白雲峰轟霹𮦷舌性海波翻義天星列奔走龍神潛消魔蠥一點清涼破除瘴熱好箇阿師十分標格若不是者滿嘴鬍鬚人定認作靈山迦葉金剛塔贊稽首金剛幢般若光明聚一切衆生心故稱諸佛母普入微塵中能作利益事善哉妙智人從微細心想建此最勝幢猶若蓮華藏幢依微塵立一塵書一字塵塵世界圓字字光明現即於此一幢一一微塵聚具足般若緣不增亦不減是知衆生心各各皆具足我觀我此身不異此勝幢日用微細心盡憑般若力若一念瞻依一切皆具足念念不離心功德皆圓滿三教圖贊即一而三赤子身穿花布衫即三而一沒韻曲吹無孔笛説謊面不慙瞞人心似漆莫道肝腸有兩般誰能識破真消息一腔心事總難言杜鵑血染春山溼文昌帝君贊造化之精煥而為文炳乎長夜日月代明莫匪爾極寂然爾寧有叩之者如篁斯聲淵淵不竭若谷似盈帝出乎震此之謂至神老子騎牛贊紫氣東來青牛西逝不是尋人端為何事老子出關贊心存太古道違薄俗光而不耀虗而不屈致虗守靜少思寡欲恬惔怡神蕩然無物羣雄競爭方事馳逐鼎沸中原緬懷西竺才駕青牛便騰紫氣關令早知真人將至拜命瞻依請發幽祕垂五千言道全德備不居物先不為禍始謙道無我知足知止混俗和光莫知其紀故稱猶龍為柱下史孔子贊百王之師千聖之命萬古綱常羣生正性一力擔當全無餘剩不是吾師沒量人誰能永使人倫正彭祖贊色若嬰兒氣若哇吸風吹露但餐霞蟠桃一熟三千歲曾記為童尚折花呂純陽贊宇宙在手萬化生身稟三才之至粹得二氣之精純負青蛇而遊戲無礙見黃龍而妙悟乃真朝遊蓬島暮宿崑崙壽同天地德比陽春夫是之謂人中之聖抑仙中之神者也漢壽亭侯贊凜凜若生明明若在耿耿孤忠堂堂氣槩面上精神胸中磊塊處處逢人愛現身多應未了英雄債清涼山玉峰和尚半影贊明月半輪浮雲一片雪老冰枯水清沙淺人傳作鼻祖兒孫我説是文殊侶伴八十年苦行無窮百千劫圓成一念不知那世舊冤家來此人間償夙欠晚得箇俗不俗阿郎却做出真不真皮面咦今朝一笑再相逢直待龍華初會見寶峰和尚贊是真非真無相不相如珠中色似鏡中像大千遊遍沒行蹤十方壁落無遮障為打陝府鐵牛觸折邛州竹杖塞北山寒雪正飛天南地暖花初放相逢不肯露全機只道有無俱是謗借問何處者沒巴鼻阿師人道是天子門前寶峰和尚紫柏大師贊法界網裂其維不張適生大師力振其綱踞獅子窟斫旃檀樹奮迅未伸爪牙已露擊塗毒鼓釃甘露漿飲之者醉耳之者狂寂滅性空轟霹𮦷舌奔雷捲電觸者褫魄以大地心堅金剛骨眼裏有筋胸中無物臨濟不死黃檗猶生誰知大師不受其名大方闊步不存軌則翻身擲過須彌峰一拳槌碎無生國又獨坐孤峰披襟藏海咄醒魚龍潛消鬼怪拄撑如意雙眼空十方世界無遮蓋莫道春風處處同冰枯雪老寒巖在又定乾坤眼如懸寶鏡有臨之者妍𡟎莫遁倒握太阿與人不吝魔外攖之喪身失命無手行拳拳不在手無舌解語語不在口鬚眉略露其形似有若扣其中自不能剖又面如月心似鐵短髮長髯丰神自別拳頭一捏雙眼空脊梁才豎諸緣歇槌碎金剛圈圓成甘露滅十方世界沒遮攔一道神光間不徹驀地相逢鼻孔酸心中有痛難分説又通身血汗如獅搜絆迸斷情根卸却重擔外雖城府內無崖岸兩眼睜睜只見者漢雲棲大師贊乘願力來居堪忍界開淨土門了慈悲債建光明幢稟金剛戒八十年餘半利生臨行落得空無礙若識吾師住世心是則名為觀自在又我觀大師渾身活潑諸毛孔中光明透脫不見面目如何描摸縱饒畫得畢竟不著晏坐如空説法如風捕風捉影不得其蹤聞空中風見水中影多少癡人開眼打盹又以空為居以慧為命入衆生心行普賢行不論鱗甲羽毛同入平等法性一味慈悲十分清淨若問吾師甚法門此中三昧明無諍又心若空中月形如鏡裏像此是吾師四十年隨順衆生真榜樣又其容寂其心密無內外不出入百千三昧眼裏空花一切行門空中鳥迹不信分身萬象中癡人却向毫端覓咦無明和尚圓相贊久嚮無明名未識無明面突出大好山千里遙相見生涯在钁頭説法如奔電提張沒弦弓慣用石鞏箭只要射箇人應弦早奔竄忽撞頑石頭鏃羽一齊陷拋出鐵渾淪見者絶思算此是吾師老面皮相看只許言前薦若問當陽向上機雲山滿目難分辨無邊和尚贊剎海無邊一塵不立腳跟到處因緣會集隨身叢林家常茶飯來者充足任意幹辦一踏吳江剎竿才豎龍象奔騰全無回互雙徑雲生單傳月朗誰人大呼師答其響於一毫端現寶王剎八十八代都沒合殺道運全機賴師一撥鼻孔半邊誰曾摸著清涼山空印法師贊金色界中常隨萬衆唯師匡徒潛施大用五頂峰高經行顧注萬壑風猋法音彌布遊寂滅海坐雜花林如師子戲顧欠頻伸名聞九重風清寰宇十方歸依如海吸水形不象心真不混俗但見其皮誰得其骨法幢既傾教網不密師振其綱如天絲織哲人往矣寂寥千載天實生師儀形未改千尺寒巖萬年冰竇我居其前師躡其後我以業驅師以願持炎涼雖異此中不移劫火洞然冰枯雪老幻翳既除空花亦了浮雲散盡碧天高一輪明月當空皎試問金剛窟裏人前後三三是多少又半身贊問者老漢從何處來不知為甚滿面塵埃千尺冰雪凍不死得一半令人猜可怪獅子項下鈴自繫自解真奇哉紹覺法師贊以法為身以慧為命以三界為家以衆生為性其形骸也稿木其三昧也無諍火宅寒灰塵勞冰穽以城市為山林從語言入正定故熾然常説而不休者以智海橫流自不能禁無怪乎阿師口門不正靈徹法師贊骨崚嶒心寥廓鼻孔昂藏眉毛卓索湛若碧沼青蓮挺若長松孤鶴舌根不動語如雷時人莫道無言説自光長老贊從金剛窟來王舍城更無別事只為衆生一身叢林十方粥飯來者同餐不分主伴以無我心作衆佛事遇緣即宗平等無二若求其真真不在此但看現前即真佛子大歇耆年贊蚤年即知離俗老年方能出家以漚和為妙行以佛事為生涯五濁世中了無半點罣礙清淨界裏只有一朵蓮華此便是優婆塞衆中第一作家定宗老宿贊少入千佛巖即依千佛住起坐常不離人不知其故雖過八十年猶是最初步步入雜華林始是歸家路雪嶠山主贊坐斷雙髻峰捏出稱椎汁打破金剛圈咬碎鐵栗棘幾番凍餓死復生剛博得些間氣息不是殺父冤讎為甚著者死急落得一條性命却又東拋西擲走向雙徑峰頭不解掃蹤滅迹露出者箇形容也是眼中著屑縱饒雪上加霜須知炎天赫日試看端的橫眉鱉鼻杜鵑聲裏雨如煙東風吹落花狼籍赤腳鬔頭下翠微相逢誰是真相識靈霄峰梵懷慧山主贊從空中來求實處住故向凌霄別行一路身已在空足未離地若欲超然必須粉碎雲山滿目葛藤不少雖無干絆終是纏繞一物不將只須放下小處不存乃見其大不向外求不從人覓本有現前一切真實知見消亡玄妙不立一念直透銀山鐵壁衲雲師贊其脊如鐵其心如空一衲如雲萬事如風早入方山之室晚荷清涼之宗老而愈壯淡而不窮非窟中萬人之一安得振如此之高蹤是以思之而不見寫之而難形容依稀倣佛似池上放牛之翁虗谷公贊外若浮雲中如谷神心為常住故以為身七十九年若夢百千億劫如生得一片清淨田地傳之子子孫孫咦珊瑚樹上撑明月海底波斯夜嚼冰月岸公贊其出也不來其沒也不去生平覿面人無覓處雲駛月運舟行岸騖咦一聲長嘯海空秋金烏夜半啼天曙雪嶺公贊面如滿月骨似冰雪望之稜稜層層其中必定崎崎崛崛咦白雲橫斷曉峰青杜鵑啼徹春山血淡居鎧公贊骨稜層心寥廓氣昂藏機活潑那一半沒描摸佛祖郎當衆生絡索拌命橫身一力擔不負家傳者一著自贊看教不徹參禪未瞥一味癡憨十方蠢拙沒量如空剛腸似鐵且喜早入寒巖滿拌放身休歇忽遇一陳黑風飄墮羅剎鬼國拋入大冶紅爐擲向炎方火宅仰仗佛力加持者條性命拾得滿面風塵一腔冰雪不為行腳操方多是疇償夙業就中一片苦心開口向人難説只待龍華會中那時方才明白縱饒描寫將來不是娘生骨血又坐楞伽山踞磐陀石聽海潮音入無生國早從金色界中來老年誤作雷陽客馬後驢前風餐露食歷窮火聚刀山且喜干戈寧息感荷君恩復放還一條性命拾得翻身直上萬峰頭晝夜打眠無間歇衆魔心空諸佛耳熱時人若問箇中機鼎湖山上雲長白又形似片雲太虗不住來去無心隨風一度坐鼎湖之高峰笑曹溪之露柱任他苦海波翻自信肝腸鐵鑄回看火宅炎蒸何似白雲深處又為僧久慣還俗了欠習氣難忘修行不辦幸入聖天子大冶紅爐鑄成一箇生鐵羅漢拋向火宅炎荒大似鑊湯爐炭煉得通身骨肉鎔剩得慈悲心一片深知恩大莫能酬要報須憑真實願又心非在家形還混俗眼裏有珠胸中無物聞名時是是非非見面後嚷嚷咄咄任他描寫百千般只有一點畫不出又非俗非僧不真不假肝膽氷霜形骸土苴一味癡憨萬般瀟灑若不是聖天子破格鉗鎚如何得隨伴著將軍戰馬看他別有一種精神恰不屬之乎者也又拄杖長戈體盂刁斗一等生涯何分妍醜但看水月空華此外於吾何有又少小自愛出家老大人教還俗若不恆順世緣只道胸中有物聊向光影門頭略露本來面目鬚髮苦費抓搔形骸喜沒拘束一轉楞伽一炷香到處生涯隨分足又心不在髮形不在僧人不足道名不足稱百無可取一味可憎忍辱法門唯此獨能又愛山不高愛水不深僧不去髮俗不冠巾文不識字武不談兵實無可取虗有其名此箇沒用頭阿師只宜貶向雷陽隊裏著他驢前馬後者一著最能又獨行獨坐快活無那凡事無心佛也不做萬里雷陽一擲便過若有相逢問是誰兜率殿中第一座又心不在道形不入俗腳無干絆口無拘束如風行空如響答谷一味癡憨千般埋沒幸籍菩提樹一枝此生千足與萬足又少小出家老大還俗裝憨打癡有皮沒骨不會修行全無拘束一朝特地觸龍顏貶向雷陽作馬足而今躲懶到曹溪學墜石頭舂米穀又此老無狀是何模樣打之不痛抓之不癢罵之不羞謗之不枉兀坐不會參禪一味胡思亂想作佛無分作祖有障只好發付無事甲裏做箇老軍隊長又俗不知名僧不在數佛祖隊裏不容衆生界中不住白手操戈赤身露布怕死入地無門要活上天無路都道是沒伎倆的阿師誰知是不識字的大措又霜鬢鬔鬆冰心冷淡鉗口結舌奔雷捲電作東西南北之人受百千萬億之難號是憨僧呼為鐵漢形影相看瘴海濵莫道斯人無侶伴又出世六十年當軍三千日住山二十秋畢竟沒巴鼻為僧不解修行涉俗又無拘忌是何等業緣作者般蟲豸最喜是一片癡心把佛祖門庭當自己家事煩惱無邊苦海無際歷盡風波隨行逐隊荊棘林裏橫身戈戟場中作戲到如今不肯回頭閻老子豈不生氣想待彌勒下生那時方才理會咄春山夜雨子規啼聲聲呌人且歸去又其狀龍鍾其中空空佛祖界中不住衆生隊裏難容諸緣不會一法不通只將尋常茶飯當作豎立門風枉費癡心沒底落得煩惱無窮不若貶向無生國土披白雲以高臥抱明月而長終一切不顧依稀成就箇真正憨翁又為六祖而來因讓師而去來去雖似奔忙法門本來無住祇為撑支父子門庭不是妄生間氣歷盡艱難參殘竹篦落得滿面風塵當作西來祖意到底一片金剛心尚留再布曹溪地又兀兀無知百無所思全沒伎倆一味憨癡豈是人天眼目原來粥飯阿師只有一種奇特處皎皎月上珊瑚枝又曾向鉢中見有萬衆問是文殊被他掉弄直到五臺親承奉重聞説淨土法門恰似開眼作夢想是此老前身今日重來打鬨又七十年來夢遊人世隨身叢林空花佛事不顧危亡全無避忌一朝觸犯龍顏拶得虗空粉碎擲向萬里炎荒依舊逢場作戲只至弓折箭盡那時方才歇氣而今正眼看來落得一覺熟睡又月挂長松影沉秋水有相可窺無物堪比不可得而親豈可得而取引萬里之長風縱洪波之一葦大似少室巖前不是毗盧城裏清絶塵埃了無渣滓聲吼泥牛花開碓嘴從他相識滿乾坤脫體承當能幾幾又如鏡現像似雲浮空虗谷聲響止水魚蹤有眼不見有耳如聾既無可以贊歎又何可以形容喚作一物即不中此其所以為憨翁又威威堂堂澄澄湛湛不設城府全無崖岸氣蓋乾坤目撑雲漢流落今事門頭不出威音那畔無論為俗為僧肩頭不離扁擔若非佛祖奴郎定是覺場小販不入大冶紅爐誰知他是鐵漢只待彌勒下生方了者重公案又五臺冰雪枯東海波濤惡炎荒瘴癘深曹溪緣分薄只待心疲力倦赤身走歸南嶽七十峰頭睡正濃醒來兩眼空落落坐倚長松獨自看白雲一片生幽壑又不屬聖凡本來面目從何處來向毫端出水澄月照面雲開山露骨要知淵默雷聲大似響傳空谷有人若問西來的意但向伊道即心即佛又面闊口窄眉橫鼻直任爾描模全無氣息文彩未露時那箇知端的不向人天路上來問君何處曾相識又此老其中空無一物不聖不凡非心非佛兔角杖撈水月蹤龜毛繩縛虗空骨喚作憨山則背不喚作憨山則觸仔細撿點將來恰以枯樁榾柮只是別有一種惺惺畢竟描模不出咄咄咄月落不離天鳥歸樹上宿又坐五臺之冰雪聽東海之波濤飲炎荒之瘴毒臥南嶽之高峰拈雙徑之竹篦吹雲棲之布毛且看者些行腳恰似月上松梢若問大人作略全沒半點求其衲僧巴鼻絶無一毫只有一副肝膽痛癢不在皮毛再三捫摸仔細抓搔求之不得切處難撓且道畢竟如何咦巫峽猿啼霜夜月斷腸聲使夢魂銷又四十七年前曾向江心住今過七十二重來第二度如空雲去來竟莫知其故相逢舊時人請問歸家路識破夢幻身便是第一步若問末後句看燈籠露柱又觀海圖贊巨石長松洪波冥壑仰之彌高望之彌闊中有一人神情軒豁時聽潮音説普門親證耳根真解脫又行腳贊錫杖無環草鞋沒締十方往來隨足所至世出世間兩不相似水月道場空花佛事若問生涯如是如是胡中丞像贊僧不僧俗不俗一樣心腸兩般丰骨若問宰官比丘恰似生米作粥今朝狹路相逢依舊二三如六不拘南北東西觸著如釘入木往來生死路頭不知何處歸宿但願同生兜率天此心千足與萬足王宗伯像贊水月襟懷空花眼界鐵石肝腸風雲氣槩記得未入胞胎不是者箇褦襶就中沒處描模看來有些古怪當初不合杜口毗耶今日却來酬償夙債塵勞中轉無盡法輪毛端上現百千三昧捨己為人將金博塊時人盡道宰官身我説是名觀自在
