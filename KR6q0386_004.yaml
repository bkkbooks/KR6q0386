body:
  text: 侍者福善日錄門人通炯編輯嶺南弟子劉起相重較法語示容玉居士甲辰予居雷陽之三一庵化州王居士容玉請曰弟子歸心於道久矣第志未專一念生為名教以忠孝為先愧未能挂功名以忠人主博儋石以孝慈親心有未安故難定志余曰然哉夫忠孝之實大道之本人心之良也安有捨忠孝而言道背心性而言行哉世儒槩以吾佛氏之教去人倫捨忠孝以為背馳殊不知所背者跡所向者心也傳曰思事親不可以不知人思知人不可以不知天人者仁也性之德也由是觀之論事親而不知人不名為孝論知人而不知天不名知人言知天而不見性則天亦茫然無據矣是則心性在我則為本然之天真也能知天性之真則為真人以天真之孝則為真孝子能以見性之功自修則為真修以性真之樂娛親則為妙行以是為孝孝之至矣猥云以敬為重而口體為輕者抑又末矣玉曰弟子服膺明誨見性之功誠大矣以此娛親固所願也第望洋若海渺無指歸捷徑之功乞師指示余曰古德有言唯有徑路修行但念阿彌陀佛梵語阿彌陀此云無量壽佛者覺也乃吾人本然天真之覺性尤見性之第一妙門也原夫此性先天地不為老後天地不為終生死之所不變代謝之所不遷直超萬物無所終窮故稱無量壽此壽非屬於形骸修短歲月延促也吾人能見此性即名為佛且佛非西方聖人之稱即吾入自性之真而堯舜禹湯蓋天民之先覺者斯則天民有待而能覺聖人生之而先覺此覺豈非佛性之覺耶孟子所謂堯舜與人同耳所同者此也能覺此性則人皆可以為堯舜人既皆可以為堯舜則人人皆可以作佛明矣嗟嗟世人拘拘一曲之見未遇真人之教而束於俗學以耳食為至當無怪乎茫然而不知歸宿矣玉曰弟子蒙開示信知自心是佛自心作佛不假外求但不知作佛之旨下手工夫願求示誨余曰吾人苟知自心是佛當審因何而作眾生蓋眾生與佛如水與冰心迷則佛作眾生心悟則眾生是佛如水成冰冰融成水換名不換體也迷則不覺不覺即眾生不迷則覺覺即眾生是佛子欲求佛但求自心心若有迷但須念佛佛起即覺覺則自性光明挺然獨露從前妄想貪瞋癡等當下冰消業垢既消則自心清淨脫然無累無則苦去樂存禍去而福存矣真樂既存則無性而不樂天福斯現則所遇無不安惟此真安至樂豈口體之能致富貴之可及哉此所謂心淨則佛土淨事心之功無外乎此淨土之資亦不外於是玉曰弟子聞教心目開朗如見歸家道路了無疑滯第以念佛為孝何以致此孝耶是所未安願師指示余曰昔有孝子遠出其母有客至望子不歸口嚙其指子即心痛知母憶念遂即旋歸且母嚙指而子心痛以體同而心一也子能了見自心恍然覺悟自心即母心也以己之覺以覺其母以己之念願母念之母既愛子之形豈不愛子之心耶母若愛子之形則形累而心苦母若愛子之心則形忘而心樂矣且母子之心體一也昔母念子嚙指而子心痛今子念母忘形而母心豈不安且樂耶第恐子事心之功不篤忘形之學不至不能如母念子之切感悅其母之心耳故古之孝子不以五鼎三牲之養而易斑衣戲彩之樂孝之大者在樂親之心非養親之形也世孝乃爾儻能令母之餘年從此歸心於淨土致享一日之樂猶勝百年富貴使母時懷戚戚之憂也是則彼雖富貴而親不樂即樂而有所以不樂者存今子以念佛而能令母心安且樂樂且久豈非無量壽耶母壽無量子壽亦無量是淨土在我而不在人佛在心而不在跡矣子其志之示自庵有禪人住山佛言一切眾生流浪生死皆是妄想顛倒以為根本顛倒想滅肯心自許便是了生死出苦海的時節也妄想不休生死難出故云狂心不歇歇即菩提吾人果能頓歇狂心便是出三界破魔軍露地而坐稱為無事道人鐵面閻羅老子縱有狠心毒手亦無打算摸索處往來縱橫自由自在一大解脫人恁麼時節即喚成佛作祖亦不耐聽又肯向廁溷中與癡蠅作隊偷腥撲臭耶十方世界皆成淨土以大圓覺為我伽藍身心充滿其中與十方諸佛把臂共遊得大自在此則庵即是自自即是庵庵即是山山即是人無內無外無彼無此恁麼則住無所住行無所行修無所修方稱自庵若養嬾癡睡三生六十劫祇為他人作奴郎耳思之思之示慶雲禪人出家兒要明大事第一要真實為生死心切第二要發決定出生死志第三要拌一生至死不變之節第四要真知世閒是苦極生厭離第五要親近絕勝知識具正知見時時參請承順教誨如教而行精勤弗懈不為五欲煩惱遮障不為惡習所使不為惡友所移不為惡緣所奪不以根鈍自生退屈如是發心如是趨造久久純熟自然與本所願求函葢相合縱今生不能了悟明見自心即百劫千生亦以今日為最初因地也若不如是但以狹劣知見輭暖習氣因循宴安而欲以口頭禪狂妄心穢濁氣邪見根將為出家正業以此望出苦海是猶適越而之燕却步而求前也嗟嗟末法正信者稀禪人既知所向當審知本心以真實決定為第一義也勉之勉之示如常禪人佛言辭親出家識心達本解無為法名曰沙門常行二百五十戒又曰斷欲去愛識自心源達佛深理悟無為法又曰薙除鬚髮而作沙門受佛法者去世資財乞求取足日中一食樹下一宿慎不再矣使人愚蔽者愛與欲也如是之法種種叮嚀苦語無非要為佛弟子者最初出家便以離欲為第一行耳後世兒孫身雖出家心醉五欲不知何患是遠離法何道是出苦道纏綿昏迷而不自覺且又矯飾威儀詐現有德外欺其人內欺其心包藏瑕疵而不自覺欲求真心正念者難其人也淨名云直心為道場如常有志求出離法當以直心為第一義珍重示小師德宗爾自從老人遊二十餘年不獨執事辛勤即罹患難走瘴鄉已三度矣前已遣爾歸家山事師長爾狂心不歇復為予來今聞爾師已作故物爾竟不能生執巾瓶死啟手足是可以稱弟子乎爾今即歸不思何以報師恩於冥冥乎古人參師訪友端為成辦道業爾今從師二十餘年道業何在古人羞見父母師友爾道業無成幸爾無父母師友無寄羞地矣祖師云眾生與佛無別但眾生多習氣佛祖清淨無垢耳爾事善知識親聞訓誨年亦老矣尚然悠悠如此竟不知此去他時後日又何面目見老僧乎萬一老僧如爾父母恐爾此生亦無寄羞地也念爾忠肝義膽不減古人昨讀達觀大師語以田光比爾如此則老僧何以報平生乎所謂諸供養中以法為最今別復以此作供養以酬生平爾其再無忘今日重別之言臨歧執手叮嚀珍重示慧侍者佛以一大事因緣故出現於世欲令眾生開示悟入佛之知見然佛之知見即眾生之知見眾生知見即生死知見故曰知見立知即無明本知見無見斯即涅槃斯則聖凡知見無二而有迷悟不同者過在立不立耳祖師道若立一塵國破家亡以其知見本無凡聖但有立即有我有我則諸障頓起無我則萬法平沈是知我為生死之本也豈特凡夫造貪瞋癡而為我障即一切聖人諸修行者知見未忘盡屬我障尤為生死難拔之根故二種障中麤細不同麤則易遣細則難除以其知見深潛根於心者難拔故經云存我覺我俱名障礙此正知見立知幽潛如命不能自斷者所以古人三二十年苦心參學縱然悟得自性具足如寒潭皎月靜夜鐘聲隨扣擊以無虧觸波瀾而不散猶是生死岸頭事此古人大不自欺處儻欺己欺人是自壞壞他也侍者福慧早從老人出家初見老人時一蠢蠢物耳別去一十年茲來更蠢蠢也獨嘗喜其蠢蠢中有惺惺不蠢處此侍者以此蠢不蠢為命根今來又五年其蠢日增其不蠢者亦潛滋暗長也由是人視侍者蠢侍者亦自視蠢更蠢而人人不自知其為蠢也今年夏老人從西回山侍者忽出蠢狀老人大笑其蠢無出頭時私謂此蠢人立蠢為己過也苟能以此蠢自為受用地亦頗自足亦可了生死亦不負出家行脚事若以此更立其蠢則病不止知見立知也侍者若能推倒此蠢不患不與老人眉毛廝結示鄧司直佛祖出世說般若之法教人修行必以般若為本般若梵語華言智慧以此智慧乃吾人本有之佛性又云自心又云自性此體本來無染故曰清淨本來不昧故曰光明本來廣大包容故曰虗空本來無妄故曰一真本來不動不變故曰真如又曰如如本來圓滿無所不照故曰圓覺本來寂滅故曰涅槃此在諸佛圓證故稱為大覺又曰菩提諸佛用之故為神通妙用菩薩修之名為妙行二乘得之名為解脫凡夫迷之則為妄想業識發而用之則為貪瞋癡愛驕諂欺詐造之為業則為婬為殺為盜為妄所取之果則為刀為鋸為鐵為磨乃至鑊湯罏炭種種苦具皆從此心之所變現正若醒人無事種種樂境皆在目前少時昏睡沈著忽然夢在地獄種種苦具事一時備受辛酸楚毒難堪難忍正當求捄而不可得時堂前坐客喧譁未息隨有驚覺呻吟而起視其歡娛之境居然在目而酒尚溫餚尚熱也枕席之地未離苦樂之境頓別要之樂向外來苦從中出由是觀之天堂地獄之說宛然出現於自心又豈為幻怪哉是皆迷自心之所至耳經云自心取自心非幻成幻法又曰三界上下法唯是一心作以此觀之豈獨佛法說一心從上聖賢乃至一切九流異術極而言之至於有情無情無不從此一心之所建立但有大小多寡善惡邪正明昧之不同所用之各異耳故曰山河大地全露法王身鱗甲羽毛普現色身三昧此皆般若之真光吾人自心之影事也吾人本有之心體本來廣大包容清淨光明之若此目前交錯襍沓陳列於四圍者種種境界色相又皆吾心所現之若彼吾人有此而不知固可哀矣而且誤取自心以為貪愛之樂地目悅之於美色耳悅之於婬聲鼻悅之香舌悅之味身悅之觸心悅之法又皆自心所出又取之而為歡為樂為貪瞋癡為婬殺盜妄而造作種種幻業又招未來三途之劇苦如人夢遊而不覺可不大哀歟以其此心與諸佛同體無二歷代祖師悟明而不異者獨吾人具足而不知如幻子逃逝而忘歸父母思而搜討之所以釋迦出世達磨西來乃至曹溪所說三十餘年諸於流衍千七百則指示於人者盡此事也豈獨老盧即老人今日為司直所說者亦此事也司直與諸現前共聞見者亦此事也經云唯此一事實餘二則非真是知此一事外皆成魔說為戲論耳是則諸佛全證若不出世則辜負眾生諸祖悟之而不說法則辜負諸佛凡有聞者而不信不解不受不行則辜負自己負眾生者慢負諸佛者墮負自己者癡斯則佛祖可負而自己不可負以其本有而不求具足而不善用譬如持珠作丐可不謂之大哀歟司直今者身嬰塵海心墮迷途忽然猛省回頭尋求此事是猶持珠之子恥與丐者為伍心心向人求自足之方老人頓以此法直指向渠儼若指示衣底神珠原是司直固有亦非老人把似以當人情世態也然此如意寶珠隨求而應種種事業受用境界無不取足至若求其隨應之方又在司直自心善互精勤尅苦之力耳若果能自肯極力自求一旦豁然了悟則將山河大地鱗介羽毛與夫三世諸佛歷代祖師及堯臻周孔事業一口吸盡不假他力否則依然一夢想顛倒眾生耳又何以稱為大丈夫哉司直司直寧可上負佛祖下負老人萬萬不可自負負君負親也老人今日所說般若皆從上佛祖心地法門即與六祖大師最初所說不差一字第最初聞者唯爾一人既以一人而當昔日千二百眾老人歡喜不禁故亦為說般若之法如吾佛祖所云如為一人眾多亦然鄧生持此自利利他未必不為廣長舌也示妙光𢆯禪人入道因緣門路各別但隨夙習般若種性淺深不一有先頓棄文字單提古德機緣話頭而悟入者有先從教中親習種種修行妙門而後拋却襍毒專依觀行而悟入者如永嘉大師於天台止觀頓見自心如觀掌果及見曹溪如脫索師子老盧極盡神力剛道得个如是如是而已此即從上知識第一个樣子也玄禪人歷徧諸方久依講肆於佛乘教眼已窺一班若即其所窺苟能剗去一切知見文字習氣於離文字外佛祖向上一路單提力究日夜參求參到佛未出世祖未西來一著冷地向自己胸中忽然迸出如冷灰豆𪹼是時方信一切諸法不出自心轉一切山河大地草芥塵毛皆為自己如此任運隨宜作法施因緣是則名為開甘露門向佛祖頂𩕳上行也若心志狹劣將口頭殘茶剩飯當作無上妙味如此自捄不了又安敢言佛法知見乎示寬兩行人昔人為生死行脚今人但行脚而不知生死可哀之甚也所謂日用而不知者此耳其過在不知本有若人知有便知自重知自重則不隨物轉而能轉物矣詩有之曰我心匪石不可轉也要知非金剛心地靡不為物所轉者既為物轉則隨他去也可稱行脚衲子乎寬兩自北而南來慰余數矣不為艱難道路饑寒困苦所轉老人但知其脚跟勁故稱為鐵脚今見其心不移故復以鐵腸二字美之然鐵腸乃老人所知其行脚事定非爾所知若稍知行脚便不恁麼驀直去也老人愍其愚而恐其所不知故復以此書發付再行脚去若此後摸索鼻孔不著他時異日定難似今日相見也示如良禪人佛言薙除鬚髮而作沙彌離欲寂靜最為第一是知欲乃生死路頭第一大事也故切呵之戒之離此便得安隱快樂眾生所以沈淪苦海不得速登彼岸者獨欲為過患耳佛言諸苦所因貪欲為本若滅貪欲無所依止且三界為一切眾生所依止之宅而以欲為基址塵勞聒聒皆此為喧閙耳今欲一離依止便無所謂破三毒出三界破魔網爾時如來一大歡喜是知五欲不離三界難破我如來悲愁可知要求寂靜解脫難矣如良少小出家多方行脚今遇老人發菩提心授沙彌戒志修離欲行此則願出生死第一妙行也第恐志不堅行不力耳佛言久受勤苦乃可得成當決定志直至成佛而後已此乃真志離欲行也示周暘孺周子請益法相宗旨老人因揭六祖識智頌曰大圓鏡智性清淨平等性智心無病妙觀察智見非功成所作智同圓鏡五八六七果因轉但轉名言無實性若於轉處不留情繁興永處那伽定此八句發盡佛祖心髓揭露性相根源往往數寶算沙之徒貪多嚼不爛概視此為閒家具曾無正眼之者大可憫也咸謂六祖不識字不通教何以道此殊不知佛祖慧命只有八个字包括無餘所謂三界唯心萬法唯識以唯心故三界寂然了無一物以唯識故萬法樅然蓋萬法從唯識變現耳求之自心自性了不可得所以佛祖教人但言心外無片事可得即黃梅夜半露出本來無一物即此一語十方三世諸佛歷代祖師盡在裏許擘不破故衣鉢止之即二派五宗都從此一語衍出何曾有性相之分耶及觀識智頌略為注破若約三界唯心則無下口處因迷此心變而為識則失真如之名但名阿賴耶識亦名藏識此識乃全體真如所變者斯正所謂生滅與不生滅和合而成乃真妄迷悟之根生死凡聖之本棱伽云藏識海常住境界風所動洪波鼓冥壑無有斷絕時既云藏識即阿賴耶而又云常住則本不動也然所動者非藏識特境界風耳偈云前境若無心亦無是則取境界者非藏識乃生滅心耳此生滅心強名七識其實是八識之動念所謂生機若此機一息前境頓空而六識縱能分別亦無可寄矣若前五識原無別體但是藏識應緣之用獨能照境不能分別故曰同圓鏡其分別五塵者非五識乃同時意識耳故居有功若不起分別則見非功矣由是觀之藏識本真故曰性清淨其過在一念生心是為心病有生則有滅惟此生滅如水之流非水外別有流也但水不住之性見有流相有流則非湛淵之水明矣故棱伽二種生住滅謂相生住滅流注生住滅此二種生滅總屬藏識生滅不滅則前七識生生滅若滅則唯一精真其真如之性自茲復矣復則識不名識而名智故曰心無病六祖大師所頌約轉八識而成四智大圓鏡智藏識所轉平等性智七識所轉妙觀察智六識所轉成所作智前五識轉以妄屬藏識之用故真亦同圓鏡然六七二識因中先轉五八一體至果乃圓如此觀之識本非實而妄有二用故曰但轉名言而已換名不換體也且此體不在禪定修行唯在日用一切聖凡同時轉之唯在留情不留情之閒故有聖凡迷悟之別周子有志於此諦向日用轉處著眼試定當看示舒伯損舒生伯損有志於道請益因示之曰老氏有言為學日益為道日損損之又損以至於無為學者增長知見以當進益殊不知知見增而我見勝我見勝則氣益驕氣益驕則情愈蕩情蕩則慾熾而性昏矣性昏而道轉遠是故為道者以損為益也吾人性本清淨了無一物所謂纖塵不立性之體也由是習染濃厚發而為貪為瞋為癡為慢故縱情物欲物欲厚而性日昏所謂有餘之害也今之為道者但損其有餘以復性之所不足性體若足則道日光由是發之而為忠為孝為仁為義推而廣之以治天下國家則其利溥而德大以致功名於不朽者皆損之之益也故在易卦損上益下曰益損下益上曰損苟不自知所損徒以增長知見為學則損益倒置又何能以盡性哉是故志道者損之為貴示文軫仲尼有言曰富而可求也雖執鞭之士吾亦為之如不可求從吾所好又曰不義而富且貴於我如浮雲且曰富若可求不羞執鞭既曰可求而又曰富貴如浮雲果有求耶果不求耶蓋曰不義之富貴如浮雲甚言必不可求也此君子有固窮之訓小人有斯濫之譏吾聖人教人以安命定志之本也嗟嗟世人不達大命之本而岌岌窮達之場未了性命之源徒懷得失之念得失驚心則取捨異趣而紛飛之念交錯於胸中欲求志定而理明德新而業進其可得乎示劉平子向道不難而難於發心道不難學而難於外求道不難會而難於揀擇道不難入而難於自足道不難悟而難於求𢆯學道之士於此一一勘破不被人瞞心曠神怡翛然獨步此之謂𢆯通之士也性相近習相遠此語直示千古修行捷徑吾人苟知自性本近唯因習而遠頓能把斷要津內習不容出外習不容入兩頭坐斷中閒自孤自孤處正謂如有所立卓爾若到卓爾獨存之地則性自復子輿有言學問之道無他求其放心而已矣雖然亦有心未嘗不求而問學不明者何也病在不放之放求而不求依稀彷彿視之為匹似閒耳苟知不放之放則自不放求之無求則為真求子輿氏見性明心單傳直指處唯此而已有志向道以此為準道在日用而不知道在目前而不見以知日用而不知道見目前而不見道非道遠人人自遠耳故曰道在目前不是目前法亦不離目前非耳目之所到苟能透過目前逆順關頭毀譽境上不被牽絆橫身直過如此用心則聖人不在三代今古不離一念矣有志向道初發心時便從此入示歐嘉範世以忠臣孝子為第一義且曰忠出於孝而始於事親語曰思事親不可以不知人思知人不可以不知天夫天即吾人本然之天性也人之於世百凡可假獨事親之念最真以出乎天性故也吾人既稟此性而為人不知天性之本然則不知人之所當貴也誠能知人之可貴則於一切虗浮襍染垢濁之事自不敢留滯於胸中以障本有之虗明一復本明則聖賢在我故曰道不遠人此之謂也示李子晉人性本明為物欲情塵之所昏蔽故於日用而不自知故曰性相近習相遠也吾人苟有志於復性工夫不必外求但於日用見聞知覺習染物欲偏重處念念克去克之既久物徹塵消本明自露譬如磨鏡垢淨明現然鏡體本明非待磨而有也凡有志向道工夫當以克磨惡習為入門初地示李子融昔人云割髮宜及膚翦爪宜侵體言其切也故學道之士先須辦長遠不退之志下一分篤實苦切工夫如登萬仞高山不至極頂不已步步努力心心不退不為毀譽傾動不為是非搖奪不為困橫抑挫如一人與萬人敵小有退怯前功盡棄又豈可以不堅固心而至不退安樂之境界耶示歐嘉可語曰人莫不飲食也鮮能知味也此言道在日用至近而知之者希古人謂除却著衣喫飯更無別事是則古今兩閒之內被穿衣喫飯瞞昧者多矣儻不為其所瞞則稱豪傑之士矣學道之士不必向外別求𢆯妙苟於日用一切境界不被所瞞從著衣喫飯處一眼看破便是真實向上工夫有志於道者當從日用中做示梁騰霄士君子處世當其未遇靡不志願匡主庇民建不朽之事業至一登仕籍但務立名為心忘其所以為功久則漸染時俗心神渾濁不覺流入富貴之途甚則名亦無所顧忌究其初心不可得矣何也以最初志願不從根本實際中來第為浮慕妄想而已原非堅固不拔之志安能立不朽之業哉梁生騰霄骨剛氣逸大非風塵中人每從予遊聞一字一句未嘗不驚心惕慮閒嘗請益予謂學者固當求志於道德凡志於道德者必先究吾人根本實際要從真性流出此真性至廣至大光明清淨蕩絕纖塵此吾性之體所謂仁也此體之中一塵不立但有一念妄想即屬有我有我則與物對物我既分人我兩立人我既立則大同之體昏塞不得為仁矣本體昏塞則諸妄皆作縱有功名之志皆從妄想發揮凡有作為皆非真實根本既妄則脚跟不穩由是一入世緣頓染流俗宜矣梁生從今當做自性工夫從實際參究儻於自性未能的究根本但將六祖不思善不思惡正與麼時如何是上座本來面目話頭蘊在胸中二六時中切切參究參到一念不生處忽然識得本來面目方見老盧不吾欺也示游覺之般若體性人人具足但以習氣厚薄故障有輕重之分則人有智愚之別是知貪瞋癡愛現前皆全體獨露之時第為濁智流轉不自覺察所謂日用而不知也嗟乎聖人不異凡民獨其日用現前境界紛拏交錯之時一眼透不為所瞞昧欺奪耳由是觀之平等性智念念現前如大火聚自一切境界洞然矣示優婆塞王伯選古人多稱塵勞中人有志向上求出生死謂之火裏生蓮以其真難得也以一切眾生無量劫來躭湎五欲為煩惱火燒日夜熾然未曾一念迴光暫得清涼直至如今能於烈𦦨叢中猛地回頭頓思出路豈非蓮花生於火內也伯選閩人來賈於參禮老人求出離法老人憐之為授五戒開示念佛法門專心淨土經云心淨則佛土淨以吾人自心是佛唯心是土淨穢不二心佛一如如是觀察作如是念念念熏修一心清淨光明暎發十方蓮華佛土皎然在前何但火宅生蓮而已哉示寂覺禪人禮普陀寂覺禪人將東禮普陀乞一語為行脚重老人示之曰古人出家特為生死大事故操方行脚參訪善知識登山涉水必至發明徹悟而後已今出家者空負行脚之名今年五臺峨嵋明年普陀伏牛口口為朝名山隨喜道場其實不知名山為何物道場為何事且不知何人為善知識祇記山水之高深叢林粥飯之精麤而已走遍天下更無一語歸家山可不悲哉南海無涯乃生死苦海之波流也普陀山色乃大士法身常住也海振潮音乃大士普門說法也禪人果能度生死海覩大士於普門聽法音於海崖返聞自性不須出門一步何必待至普陀而後見其或未然悠悠道路虗往虗來即大士現在頂門亦不能為汝拔生死業根也禪人自定當看若大士有何言句歸來當為舉似老人慎勿虗費草鞋錢也示梁仲遷甲寅梁子四相字仲遷從老人遊有年老人愛其心質直而氣慷慨每見事不平無論可否或義有可為即放捨身命以當之老人每責其麤浮以有道體而欠涵養操存之功若駿馬而無銜轡終不免其蹶也老人將行相送韶陽舟中請法語以書紳乃書此寄之予謂梁子有道者心質直而不曲此道之本也慷慨近勇猛赴緩急近慈悲忘身以赴之是不量力不審權不探本而事末皆麤浮氣之所使非由道力發也古之聖人涉世有體用全彰故應不失時若明鏡之照妍醜權衡之定輕重殊非漫任血氣者梁子自今已往當先洗除習氣潛心向道將六祖本來無一物話頭橫在胸中時時刻刻照管念起處無論善惡即將話頭一拶當下消亡綿綿密密將此本參話頭作本命元辰久久純熟自然心境虗閒動靜云為凡有所遇則話頭現前即是照用分明不亂定力所持自不墮麤浮鹵莽界中不隨他脚跟轉矣即讀書做文字亦不妨本參讀了做了放下就還他个本來無一物自然胸中平平貼貼久之一旦忽見本無心體如在光明藏中通身毛孔皆是利生事業又何有身命可捨哉如此用心操存涵養心精現前看書即與聖人心心相照作文自性流出此是真慷慨丈夫之能事所謂樞得環中以應無窮即建功立業皆成不朽梁子既有其本又何憚而不為哉示劉仲安癸丑冬予居五羊一時從遊者眾覩劉子骨剛氣渾謂夙具般若緣種器近於道予將有南嶽之行劉子送於舟中特請益曰弟子道心甚切但為宿習濃厚妄想纏繞不能直逃向上望師指示老人謂曰子知妄想則妄想自不能纏繞矣既稱妄想則本無實體譬如空花安能結空果耶由子不達妄想本無認作實法與作對待念念與之打交滾絕無一念休歇之時斯則但以妄想為主而當人本體為之埋沒所以見造道之難耳豈不見僧問古德云妄想不停時如何德云妄想不惡六祖於黃梅會下剛只道得个本來無一物子從今日用做工夫只將本來無一句作話頭二六時中切切參究但看妄想起處切莫隨他流轉當下一拶自然埽踪滅跡矣
