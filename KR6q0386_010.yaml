body:
  text: 侍者福善日録門人通炯編輯嶺南弟子劉起相重較法語示本懷印禪人昔吾佛於靈山會上欲以妙法華經付囑有在令於末世受持廣宣流布無論人天百萬即得授記諸弟子竟無一人敢於娑婆世界流通此法者必待地涌之衆乃能荷擔持此法者豈易易哉以五濁惡世衆生薄福其性剛強最難調伏是以吾佛教持經者必以忍辱為第一行故曰如來滅後欲為四衆說是經者應入如來室著如來衣坐如來座乃可為衆廣說此經如來室者一切衆生中大慈悲心是如來衣者柔和忍辱心是如來座者一切法空是安住是中然後以不懈怠心乃可為衆說是法華經故佛自述其往昔求法之行如提婆達多世世之冤害及常不輕之禮拜四衆乃至辱罵或加刀杖瓦石種種苦事皆歡喜忍之無一念懈退此正教菩薩法末世持經之最勝行吾徒為佛子苟無忍行又何以持佛慧命使不斷哉及授付囑持經之菩薩則誓之曰種種苦事皆當能忍是以佛說觀三千大千世界無有如芥子許不是菩薩為求菩提捨身命處乃至頭目髓腦無有吝惜故教持經者先以忍行悲此法末非大忍力又何能護佛法續慧命乎老人每每以忍行開示禪人禪人能篤信老人亦能以忍力自持今不但卒保道場亦且成就己行切不可以世諦尋常觀之更於此外別求生死法也且此經乃吾佛世尊為一大事因緣故出現於世一大事者乃衆生本有佛之知見也佛知見者以能見諸法實相也以衆生迷真知見但認五蘊幻妄身心而不見真實之相若見實相則三界上下了無一法又何生死可寄耶如此豈獨參禪能了生死而持經不能了生死乎若南嶽天台皆悟實相之大宗師儻法社諸侶讀誦此經能有一人如天台悟入法華三昧者即此靈山一會儼然未散如是則護持之人具足恆沙功德不可思議矣佛為此法劫劫生生捨此身命禪人即能捨此一生成大法益又何外慕別求佛法乎今縱不能了生死即仗此法為舟航願力持之於生死海中亦必終有到彼岸時猶勝從前虗生浪死也禪人既信老人語從此發起大忍力大精進力是名真法供養如來以成普賢大行切不可起生滅心立人我見而生退墮之想也示新安仰山本源覺禪人本源覺重興仰山道場三十餘年幻出種種莊嚴皆自心力誦圓覺梵行二經亦二十餘年精持淨行皆從宿習般若中今禮匡山請授大戒拈香請說圓覺大義老人因示之曰佛說三界上下法唯是一心作所謂圓覺流出一切清淨真如菩提涅槃及波羅蜜教授菩薩是故為佛弟子若達唯心法門則一切染淨因果皆即現前念念轉變故曰心淨則佛土淨直如仰山因緣向皆危石巉嵒荒榛茂草今一旦幻此道場如從天至皆從最初一念堅固信心故致如斯廣大佛事由是觀之則西方淨土又豈從心外得耶老人今為禪人特授梵網金剛寶戒此戒名為毗盧遮那心地法門經云若授佛戒即入諸佛位是知一念信心即開佛知見一切佛土應念現前故諸佛淨土皆從金剛心地建立禪人果能了知此法門從此向前日用頭頭一切運為明明了知皆從自心流出則法法皆為淨土真因更能將一聲阿彌陀佛念念不忘心心不昧念至動靜無二寤寐如一則現前步步皆踏淨土寶地經行即此身心已坐蓮華胎中直至臨命終時才捨此身即花開見佛如從夢覺到此始知生死如夢淨土如幻一念之閒永居不退此外更有何法出生死乎禪人久修梵行第未親聞善知識打破從前妄想夢但了法法唯心何用別求佛法努力珍重示陳善人楚沔稱名郡故文憲之但法門善知識過化者希觀智禪人杖錫於此掩關三年一時向化者衆適來善人乃舊歸依信心弟子也遠參匡山老人為求開示以傳白大衆老人因示之曰在家男女能持五戒謂不殺不盜不邪淫不妄語不飲酒食肉佛住世時常在法會稱優婆塞優婆夷此云近事男女以堪親近承事三寶故其所修者精持五戒免墮三途苦趣是為天人之福故曰五戒不持人天路絶若持五戒第一要明信因果善惡報應如影隨形謂作善因福果定生人天若造惡因惡果必墮三途苦趣且觀世之高官尊爵富貴榮華者此等必是前世修福供養三寶齊僧布施印經造像修寺建塔濟貧拔苦之所感招其長壽多男父慈子孝夫唱婦隨兄友弟恭者必定從放生不殺持齊戒中來在家有能持此五戒者即五常備矣謂不殺仁也不盜義也不邪淫禮也不妄語信也不飲酒智也儒門能此者即成德之君子矣持齊豈分外事耶其中有上智高明之士既持此戒復念人世無常如風中燭怕生死此一失人身萬劫難復如此思惟念生死苦求出離心切更宜發心持念阿彌陀佛將此一句佛橫在胸中心心不斷念念不忘朝暮禮佛誦經回向西方求生淨土若念佛念到一念純熟一心不亂臨命終時見阿彌陀佛放光接引投托蓮花以為父母花開見佛從此永出生死輪回之苦長揖三界是名菩薩此念佛功夫古今在家男女行持一生取辦生西方者不少故曰唯有徑路修行但念阿彌陀佛此外別求皆為邪見邪行矣善人持此轉化同類一人一家以及一鄉一郡通都為佛國矣但願努力修行只要信心真切一念奉行不必別求𢆯妙佛法示盛蓮生老子云吾所大患為吾有身若吾無身吾有何患圓覺經云我今此身四大合成當觀身中堅硬歸地潤濕歸水暖氣歸火動轉歸風四大各離今者妄身當在何處如此諦觀此心久久純熟身相忽空種種煩惱皆從妄想顛倒而生如夢顛倒本來不有當煩惱時直觀此心妄想從何處生追到本無生處則妄想不生妄想不生則煩惱空身心忽空則一切煩惱當下消滅應念即入清涼極樂國矣此觀喫緊乃脫苦之妙藥然初心觀未易成但將阿彌陀佛審實話頭切切不忘若妄想起時提起話頭一拶則妄想自滅以尋常無有正念故專逐妄想流轉攀緣不停以滋苦耳一切諸法皆自心生心外無法若不觀心而求脫若之路猶却步而求前也只須發勇猛心切不可說不能乃自畫耳示吳啓高啓高久歸三寶齊心有年今來匡山求授戒法為法門弟子以結未來出世之緣因詺名福常號淨心居士為授優婆塞戒復拈香請益老人因示之曰一切世閒種種業行皆是無常盡為苦因故感生娑婆國土衆生所聚故名堪忍愚迷之人以苦為樂轉滋貪愛更增苦本不知出苦之要是為顛倒故舉世之人但有一念知是無常苦空發心求出離者是即大智慧人但有一念返省發起厭苦之心便是出苦之路但有一念求生淨土之願即是成佛之本所以佛說戒法教人止惡修善以惡止則心淨善修則苦滅苦滅則福增心淨則為淨土之因苦滅則為極樂之本福增則為常樂之果是知一念發起受戒之心則衆苦可斷衆福可集生死可出淨土可生皆從最初一念發心為因地也居士今日既能知此事發此心故凡所作即是出世之行雖未出家即名佛子從今果以持戒之心念佛淨除心中夙染貪瞋癡愛種種煩惱則心地清淨以此淨心念佛念念不忘心心不斷即日用現前事事皆是淨土之因即所施種種四事供養三寶者皆為莊嚴淨土之資所謂心淨則佛土淨唯心淨土自性彌陀元不離當人一念是為真實法行所謂真常之福從淨心中謂是故也居士果能諦信不疑何用別求佛法但不可作世閒尋常事目之則道念自堅信心日長矣珍重珍重示無知鑑禪人出家人先須要知出家割愛辭親本為求出生死若為生死大事要知世閒一切諸法皆是苦本身是苦聚必要發心修行求出苦之道先須看破現在身心境界當觀此身乃地水火風四大假合成形四大各離今者妄身當在何處如此看破則不為此身謀求種種受用之樂次要看破現前見聞知覺全是妄想用事總非真心以此妄心造種種業起心動念無非是業無非是罪即此一念便是生死苦本切不可隨他妄想流轉日用密密觀察妄想起處就要看破當下消滅切不可隨他相續攀緣往而不返若觀察不定無巴鼻時但將一聲阿彌陀佛作話頭緊緊抱定念念不忘有此話頭作主但見妄想起處即提起佛來是為正念現前則妄念不待遣而自消矣如此二六時中密密用心唯此一念為主其餘一切妄想皆為客客主若分久久純熟則妄想自消真心自顯矣禪人若果有志為生死大事但以此一念為真其餘世閒種種伎倆作詩寫字乃至攀緣交遊放浪皆是顛倒癡迷之事也若不慕實行專事虗浮縱放六情遊談無根空喪光陰不唯虗生浪死抑恐惡業難逃千生百劫無出頭時也示徐清之佛說三界上下法唯是一心作言三界上者乃出世四聖謂佛菩薩聲聞緣覺也三界下者乃六道凡夫謂天人修羅三善道及地獄畜生餓鬼三惡道也是則十法界中一切聖凡善惡因果依正莊嚴皆由一心之所造然此一心非別乃吾人日用現前分別了知之心也既然一切由心非次第造乃日用現前念念所作之業於十法界流轉若一念由貪瞋癡所作十惡身三口四意三惡業則就三途苦趣之因若一念轉十惡而為十善則為人天妙樂之因若一念善惡兩忘內不見有我外不見有人一心寂靜則為聲聞出苦之因若觀目前苦樂逆順由因緣生滅流轉還滅則成緣覺之因若一念了知人法無我因緣性空無有作受者而不妨現行布施持戒忍辱六道之行化度衆生則為菩薩之因若一念頓悟自心本來光明廣大無不包容無不濟度了無一法當情生佛平等即為成佛之因故此一心廣大無外本來清淨圓滿光明若日用念念悟此則雖居塵勞而為出世之人矣此所以維摩稱為不二法門也居士若能體此而行則一切恩怨是非人我煩惱情根應念化成光明藏矣日用一切境界試此觀看念念覺察若不能安忍為煩惱之所障礙才見起處即將六祖本來無物一句提起如金剛王寶劒則一切煩惱當下冰消身心化作清涼池矣如此力行若能精進不退則頓證大解脫場又何此外別求佛法哉示若曇成禪人成禪人約同志於金沙之東禪結青蓮社以持誦法華經為業凡入社者必先熟讀此經能背誦而後入堂不數年閒能持者數十輩去住不一唯禪人一志不移遂以此為盡形壽焉請益老人因示之曰此經乃吾師釋迦世尊特為開示衆生佛之知見為成佛真種故述其往因謂於大通智勝佛時為十六王子得聞此經展轉傳持故凡曾從聞者必生生世世共生一處以持此經為行故昔受化者直至今生於靈山會上各各授記成佛乃的示此經為成佛正因真種也故委明持經之法師即於現世父母所生六根必得清淨如經具明金口親宣非虗語也此經自入中土受持者多獨南嶽思大禪師所悟精深天台智者大師讀誦此經乃見靈山一會儼然未散思大師曰此法華三昧也非子莫證非我莫識故天台因之建立止觀妙門發明百界千如實相之旨向後依止觀而悟明一心者如永嘉而下非一人也是知此經為成佛之妙行明矣唯六祖云心迷法華轉心悟轉法華此又示持此經者第一義門禪人今持此經試向未展卷軸已前突開頂門正眼爍破無明諸法實相觸處洞然則見色聞聲目前現證嘗轉如是一卷真經頓將八識田中歷劫已來愛憎煩惱種子盡化為光明藏如是受持是真精進是明真法供養如來若徒以紙墨文言為妙法以循行數字為持經而心地未淨煩惱未空此何異以水泡為摩尼以蒸沙為飯本如是則牛皮未透豈圖遮眼而已耶示觀智雲禪人學道人以等心死誓為出生死第一義又放下為入道之要古人云志當歸一久而不退他日必知妙道所歸此五乳為老人歸真之所禪人歸依老人之心一生居半今幸有此卓錐之地正是爾等放捨身命處生則同修死則同歸爾當放下諸緣一心寂靜於此集二三同志老者專心念佛精修淨業誓死為期則法道常存慧命不斷是不負歸依之念也應念爾祖樂天公與老人有三世之誼自當以義為質絶無二念若別存一念則非真實為生死人凡居常務要以法為懷綱維叢林調和大衆內外一體賓主一心兼忘人我勦絶是非了得煩惱本空便是出生死路即此心地清涼便是淨土之要門也爾其勉哉勗哉示凝畜通禪人佛祖修行之要唯有禪淨二門兼以萬行莊嚴是為正修行路比來學人參禪者多被邪師過謬引入邪見稠林墮我慢魔增外道種是大可憂況十無一人得解脫處似此不唯自誤亦且誤人可不懼哉是故老人極力主張淨土真修世人不知都輕視為尋常不知念佛之妙故多錯誤耳且念佛即是參禪更無二法即念佛時須先將自己胸中一切煩惱妄想貪瞋癡愛種種雜亂念頭一齊放下放到無可放處單單提起一聲阿彌陀佛歷歷分明心中不斷如線貫珠又如箭筈相拄中閒無一毫空隙處如此著力靠定於一切處不被境緣牽引打失如此日用動中不雜不亂夢寐如一如此用心念到臨命終時一心不亂便是超生死淨土之時節也若但口說念佛心地不淨妄想不除只道念佛不靈驗如此縱到三生六十劫亦無出頭分爾其勉之答德王問承大王諭使者訪問山僧修行直捷法門云王已能持不殺戒齊蔬三年但念末後一著為急有何法修持至臨終安樂後世不迷此乃大王宿習般若根深積生修習故今處富貴尊位不昧本來一念真切參求法要山僧愚劣敢以實對惟佛說法度人如應病之藥方便多門不是一種自教流此土古今依奉修行者有禪與教兩門人人共由禪則傳燈諸祖直貴了悟自心其下手工夫則心單提話頭參求直至明見自心而後已此獨被上上根人一超直入又須善知識時時調護提撕方得正路在昔王臣亦有能者蓋不多見是乃出家人易為行耳今大王尊居深密不易接見善知識故不敢以此勸進其有依教修行昔有天台智者大小止觀乃成佛要門其大止觀文繁難於理會其小止觀雖簡易其實要說解明白而下手安心亦不易入即能知能行亦難得親切日用現前境界逆順處多用不上況末後大事乎此法亦非大王所易行者亦不敢進今獨有佛說西方淨土一門專以念佛一事為要以觀想淨境為正行以誦大乘經為引發以發願為趣向以布施為福田莊嚴此實古今共由不論貴賤智愚俱能真實下工夫故萬人修行萬人效驗此願大王留意焉謹將日用修行規則條列如左我佛為救度娑婆世界諸苦衆生專說西方極樂淨土法門但專以念阿彌陀佛發願往生彼國有彌陀經一卷便是證明其經中所說都是彼國及國土境界實事最是明白其修行之方亦有節次如僧家功課之法不必拘套但以念佛為主每日早起禮佛即誦彌陀經一卷或金剛經一卷即持數珠念阿彌陀佛名號或三五千聲或一萬聲完即對佛回向發願往生彼國語在功課經中此是早功課晚亦如之如此日日以為定課定不可缺此法教諸宮眷如法同修更妙此乃我聖宗仁孝聖母所行垂法宮闈至今不廢者是為常行也至若為末後一著大事其做工夫更要親切每日除二時功課之外於二六時中單將一聲阿彌陀佛橫在胸中念念不忘心心不昧把一切世事都不思想但只將一句佛作自己命根咬定牙關決不放捨乃至飯食起居行住坐臥此一聲佛時時現前若遇逆順喜怒煩惱境界心不安時就將者一聲佛提起一拶即見煩惱當下消滅以念念煩惱是生死苦根今以念佛消滅煩惱便是佛度生死苦處若念佛消得煩惱便可了得生死更無別法若念佛念到煩惱上作得主即於睡夢中作得主若於睡夢中作得主則於病苦中作得主若於病苦中作得主則於臨命終時分明了了便知去處矣此事不難行只是要一念為生死心切單單靠定一聲佛再不別向尋思久久純熟自然得大安樂自在得大歡喜受用殊非世閒五欲之樂可比也惟大王留意此法便是真實修行捨此更無過此直捷省事者也切不可聽邪見邪說而惑焉又大王若要末後知去向更有一妙法請為言之其法就在念佛心中時時默下觀想想目前生一大蓮華不拘青黃赤白狀如車輪之大觀想華狀分明仍想自身坐在華中鬚臺之上端然不動想佛放光明來照其身作此想時不拘行住坐臥亦不計歲月日時只要觀境分明開眼合眼了了不昧乃至夢中亦見阿彌陀佛與觀音勢至同在華中如白日明見若此華想成就便是了生死之時節也直至臨命終時此華現前自見己身坐蓮華中即有彌陀觀音勢至同來接引一念之頃即得往生西方極樂世界居不退地永不復來受生死之苦此實修行一生了辦之實效也惟此法門非是僧談乃佛經中處處開導直捷法門所謂惟有徑路修行但念阿彌陀佛捨此別無妙法矣聞大王心不求長生但願末後明白除此再無可明白之法矣若怕疾病要學調息運氣求却病此非良法若氣不善運返至大病至不可療萬萬不可惑於此也若是念佛一法得入親切其餘總不必留心矣願大王著實諦信切莫懷疑又正月二十七日僧蘊真奉大王令旨持睿語下問事件山僧伏讀再三足見大王體究生死大事要明性命根宗了達佛祖禪教旨趣山僧愚昧不敢妄談謹按教典一一條牒來問對答分明陳列如左伏乞睿覽一問三乘之道性命之原教禪之說達磨之道何曰無字心地何處用工人生到底怎麼下落又說有佛無佛端的何為又說一靜之中無我無人猶如太虗到底如何可將上中下乘言語佛祖度衆生之念一一細剖解釋是所願聞答佛教宗旨單以一心為宗原其此心本來圓滿光明廣大了無纖塵清淨無物此中本無迷悟生死聖凡不立生佛同體無二無別此正達磨西來直指此本有真心以為禪宗故對武帝云廓然無聖若能頓悟此心則生死永絶只在當人一念頓悟即名如如之佛不屬修證階差不屬三乘漸次此禪宗目為向上一路從前諸祖所傳即指此心以為宗極是名為禪此宗不立文字只貴明心見性其修進工夫當初達磨教二祖問曰汝作甚麼二祖云乞師安心達磨云將心來與汝安二祖云覓心了不可得達磨即與印正云與汝安心竟此心不可得一語便是西來的指二祖又問豈無方便磨云汝但外息諸緣內心無喘心如墻壁可以入道此便是教參禪最初第一著工夫達磨之道如此而已除此心外更無別法後來禪道既久學人不能頓悟故有參禪提話頭之說其話頭不拘是誰隨將古人公案一則蘊在胸中作話頭下疑情即無之一字就是公案直者疑處便是參究參來參去久久忽然心地迸開如大夢覺即名為悟以參究便是用工夫以正參時心中一念不生了無一物故說無我無人猶如太虗悟處便是下落既得了悟自心則歷劫生死情根一齊頓斷既悟此心又說甚佛與衆生故從此已去三界往來任意度生永絶諸苦不被生死拘留是稱菩薩此便是參禪到底下落性命從此了却若不悟此心則被一生作下善惡業牽輪轉六道諸苦趣中到底沒下落所謂生死苦海無有彼岸正謂此也一問三乘之道乃是佛度衆生隨機施設權巧方便之法門也一大藏經皆是此意原夫一心之法生佛同體本無身心蓋因最初一念妄動迷了此心遂結成幻妄身心即今人人血肉之軀名為色身即今知覺思慮者乃妄想心經說五蘊是也五蘊者色受想行識也肉身即色蘊心即受想行識之四蘊以身心知苦樂等為受分別貪求念念不斷為想此想相續不斷為行此三即知覺思慮之心其識即命根初未迷時但只云性既迷真心有此幻妄身心其識連持此身故名為命此性命之原也佛初出世只是教人了悟此心而已以迷之既久不能了悟故佛設方便先教人知此身是苦本其苦因貪瞋癡愛煩惱所集而生故要人先斷煩惱其苦可出有中下根人依之修行斷了煩惱果然得出生死之苦是稱聲聞緣覺為下中二乘因他但能自度不能度人不知同體之意只得一半故名小乘及有大心衆生既能自度又能度人自利利他廣修六度謂能布施持戒忍辱精進禪定智慧有此六行其心廣大是名菩薩故名大乘又云上乘此二乘法一大藏經都說此事只是要人了悟此心末後會歸一心即名最上一乘是名為佛此教中之極則也三乘修行之法甚多說不能盡但依一法修行皆得出生死苦非止一端種種方便直是悟了此心方是末後下落處未悟此心俱在生死海中隨善惡轉若作善即生天上人中若作惡業縱貪瞋癡愛即墮三途受苦無量此三乘法若學中下乘修則一向愛戀此身貪著受用妄想之心不能斷除故不能也若學上乘人修雖能布施持戒其後四行又不能全亦不能即出生死縱修善法生在天上福盡還墜如汲井輪終無下落若求悟明此心可了生死無奈如今現前事法交錯又不能下苦心參究縱參亦不得真善知識指教恐錯用心返落邪道如此豈不虗過一生雖要求箇下落到底無下落以天上受福未免輪回故也故佛別設直捷方便念佛求生淨土一門此乃一生成就臨命終時定有下落也今將念佛淨土法門為大王陳之一問淨土法門為何而設因佛設三乘之法要人修行不是一生可以成就恐落生死苦海難頓出離若要參禪可一生了悟得出生死又因妄想紛紛習氣深厚不能參究若未悟明此心不免輪回故別設西方淨土一門此不論上中下根及貧富貴賤但肯依而修之一生可以成就所謂惟有徑路修行但念阿彌陀佛更無巧妙何以如此以我今現住世界名為娑婆乃極苦之處謂生苦老苦病苦死苦乃至求不得苦冤家聚會種種諸苦說不能盡雖是王侯將相富貴受用種種樂事都是苦因以此極苦難得出離故說西方淨土名為極樂世界以此國中但受諸樂故名極樂以彼佛國絶無穢污故名淨土無有女人蓮華化生故無生苦壽命無極故無老死苦衣食自然故無求不得苦諸上善人俱會一處故無冤家聚會之苦以彼國土七寶莊嚴故無瓦礫荊棘便利不淨種種清淨全不同此世界彌陀經中所說一一皆是實事今一切人求生彼國者更無別法但一心念佛以為正行日日回向又心想蓮華身坐其中故臨命終時即見阿彌陀佛放光接引見大蓮華湧現在前見自己身坐於花上一念往生既生彼國從此永不復墮生死苦趣名不退地菩薩此便一生修行結果後世下落如此分明除此之外別說臨終有甚境界皆是邪說若不念佛及臨命終時隨造惡業惡境現前悔之晚矣此是最省要直捷修行法門是佛別設接引方便也一修淨土不必求悟明心性專以念佛觀想為正行又以布施齊僧修諸福田功德以為莊嚴佛土之助其念佛心中雖發願往生然必要知先斷生死之根方有速效如何是生死之根即今貪著世閒種種受用及美色淫聲滋味口體一切皆是苦本及一切瞋怒忿恨之心及執著癡愛之心與一切邪魔外道邪師所說邪教之法即如今一類邪人妄稱圓頓達磨等教及妄立南陽淨空無為等教歸家等偈一一皆是近代邪人望空揑作此等言語惑亂世人之法俱要盡情吐却乃至全真採取陰陽等術內丹外丹之說都是邪法皆不可信單單只是篤信念佛一門每日誦彌陀經兩卷念佛若干或不計數只是心心不忘佛號即此便是話頭就是性命根宗更不必問如何是性命當人本來面目及三魂七魄元辰之說者些全是在血肉軀上妄認妄指之談俱無下落若問在生怎麼樣沒後怎麼樣在生造惡的沒時惡境現前在生念佛求淨土的沒時淨土佛境現前以遂我所求乃是好事若不是所求善心中來都是邪魔之事決不可錯信誤了百劫千生也但看棱嚴經中說的分明若說有相皆妄此言是參禪門中的話單單只求清淨真心不容一物故說有相皆妄以念佛淨土原是想心成就經云想澄成國土以參禪要斷妄想心最難故今以淨想換去染想耳其蓮華現前正是觀想成就又何以妄相推之修行各有門路不同不可一槩論也已上所答皆依佛祖經教中一一考正不比妄談若參禪則以明心見性為主若念佛求生淨土一門不必明心見性單單只是念佛佛者覺也若念念不忘佛即念念明覺自心若忘了佛便是不覺若念至夢中能念即是常覺不昧現在若此心不昧則臨終時此心不昧即此心不昧處便是下落賢王如今國事萬機決不能參禪惟有念佛最好不拘閒忙動靜一切處都念得只是一心不忘更無別巧法其前知乃神通之事此不必求當時佛不許學習此事若成了佛自然有神通不待求也其鬼神前知非是人可學得的切不可想此等事若念佛到臨命終時自然預知時至亦是尋常念力成就不可強也已上數條伏乞賢王詳察留意焉
