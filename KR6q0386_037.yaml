body:
  text: 侍者福善日録門人通炯編輯嶺南弟子劉起相重較偈一七十二首唯心偈淨妙不思議圓滿真實心廣大具威神變現無量事其體離諸垢不捨染淨緣世與出世間成就衆善業衆業若空華本來無所有以無所有故故説即真常善達業性空不為幻技惑不著亦不厭如理諦實觀起處即無生當念自空寂了無前後際一念若須彌動靜平等如境界風不動寂滅妙常樂清淨若蓮華深入塵勞泥不染世間垢懷此如意珠隨求無所乏神光照暗冥普覺諸含識居山偈借問山中人居山有何趣日飽三頓粥長伸兩腳睡磐石作禪牀雲霞為蓋被微風吹幽松發明西來意撥落雲裏華刮除眼中翳一念絶中邊了無前後際覺來雙眼空回視夢中事撈摝水底月却翻成鈍滯凡聖一齊拋方脫娘生纍一物不將來猶是第二義透出無事關始遂居山計大澤禪人三度嶺海參禮因示萬里為誰來來復為底事靴裏摸指頭原不在別處若向外邊尋走盡天涯路來來去復來此法原無住試問曹溪僧菩提可有樹若不得一枝枉費賣單布示道脈源禪人參禪無祕訣要為生死切生死挂眉毛念念不暫輟提起金剛圈脊梁徑似鐵努力望前追直使命根絶妄想頓潛蹤身心當下撇要見本來人如空中釘橛打破黑漆桶方是大休歇題恆河圖示恆一林禪人佛住恆河岸常對河説法至法難思處即以河沙喻若以沙數多猶未盡佛意直以此法身乃顯真實義法身常不變隨流性不遷雖以種種穢體性常清淨乃至劫火燃究竟體不壞是故法身常自性無生滅佛子識此義了悟自性身如彼恆河沙永劫性常一是名金剛地佛子善安住觀緣偈諦觀此身無始來皆從顛倒妄想生輪回六道苦趣中性返人天無量劫妄念不止苦無涯妄境不空業如海若能一念暫回光當下即令登彼岸妄業積聚如須彌人我是非苦堅固結成生死鐵圍關百劫千生不能出鑊湯爐炭本來無只從一念瞋心起若於起處即消除火裏金蓮真解脫現前境界若空花鏡像水月不可喻世人癡迷無慧目錯認為真顛倒見妄將四大以為身六識三毒為主宰貪瞋我慢不自知妄逐驅馳諸苦趣自性清淨即彌陀六塵不染蓮花土一念不生生死空日用現前真極樂示念佛念佛本為超生死先須要識生死心癡愛便是生死根不拔其根難解脫癡愛即是念佛心即將念佛斷癡愛癡愛若能念念斷心心彌陀全身現即此便是真精進不可一念暫忘却淨土就在淨心中不得向外別尋覓圓明偈示畢一素失明心光圓明本無量苦彼浮塵眼遮障隔紙不能觀外物返視何曾見五臟譬如白日麗虗空人處暗室如生盲暗中人亦有兩眼如何不與日光通我此四大如茅屋心在身中鳥在籠誰能撤去茅屋封光明照耀原無窮若能自見心光滿了了常明不用眼此是無生無滅光不與四大同流轉君今何幸天見憐特拔遮障天光全不須白晝怨不見只如有眼黑夜眠夜眠有眼亦如此心光圓明宛自爾若離明暗見自心圓明頓發超生死舉世誰知無眼好昔人曾恨盲不早頓拋四大光明全此是吾家如意寶登昆山示同遊諸子崑山城中一拳石大似須彌納芥子我來䇿杖一登之頓入蟭螟眼孔裏時人一望忽不見紛紛四衆皆驚起忙來試問空中人依然指出舊時底梁壓談生示之以偈屋梁倒塌壓談生談生被壓何不死梁若到身身即碎身若到梁梁不避兩者既到何不干試問不干之所以目前境界不比梁談生何苦先惶慞若要不惶慞看逼狗跳墻示福智字本明修淨土但觀一句彌陀佛念念心中常不斷若能念念最分明即與彌陀親見面只想淨土在目前日用頭頭無缺欠佛土全收一念中便是往生真方便只在了了分明時不可更起差別見觀身是身如水泡乍現亦不久癡兒以為珠取之不盈手況復於此中多貪為罪藪唯在智眼觀畢竟何所有觀心此心本無形視之不可見起滅了無端迅若空中電妄想逐塵勞渴鹿奔陽𦦨堪嗟今古人都壓良為賤示衆幻海無涯沒盡頭塵勞妄想幾時休應知世相空中電須信人生水上漚唯攝一心歸淨土全憑萬行作真修目前總是菩提路念念常登般若舟示無相老納見爾初年六十餘別來十載近何如光陰有限頻頻覺妄想無邊念念除淨土蓮華禪水灌心田愛草慧刀鋤百千萬劫俱空度莫使今生又涉虗示沈生成德二首濕寢人必病鰍得方不死物性各有宜苦樂何憂喜物本無可欲而人自欲之甘苦味不同嗜者以為奇示六一居士二首世事忽如夢人情空若雲誰知塵市裏心靜即離羣迹近寧違俗心空豈在家但看污濁水湛湛出蓮華示普聞禪人不辭行腳苦萬里涉山川今到曹溪路誰酬不借錢示金山貴禪人三首白髮愁難解紅塵路不通身居人境內心在萬山中日日塵勞裏朝朝愛惡場不知因甚事專一為他忙苦海深無底浮生事有涯不知三界內何處是歸家贈本淨禪人結葊白雲獨坐千峰裏慵披百衲衣靜聽流水響間看白雲蜚示本昂字俯無有我必自高驕矜還恃氣俯而至於無便入清涼地示慧珊字海月大海聚衆寶撑拄唯珊瑚明月時來往清涼並夜珠示淨堂禪人一鉢隨孤杖三山結衆緣曹溪涓滴水酬盡草鞋錢示劉生四休一味常知足多求總是差飯蔬食飲水只此了生涯菩提葊八景有引葊在嘉禾之石門顏生生居士所建為智河行公安居豫之徑山過此因而有題菩提山不到菩提山安識菩提境獨有山中人忘言心自省翠城蒼翠繞法城宛似金剛圈佛魔俱不入其中空空然古觀音像觀音有後先法身無今古以絶去來心故能常救苦羅漢松挺挺孤松樹堂堂應真相若問涅槃心枝頭明月上蓮花灣蓮生淤泥灣其性本香潔瞻彼花中人端坐無言説放生池一片無生心全彰放生處令彼鱗甲類盡踏無生路漚生塔漚生本不生漚滅原不滅獨留無縫塔寒空照明月槵樹以患能除患槵樹愛生長見此槵子珠頓發離患想山居示衆二十五首獨坐一爐香翛然萬慮忘靜看階下蟻畢竟為誰忙寂寂離知覺昭昭泯見聞三更天外月一片嶺頭雲世事一局棋著著爭勝負黑白未分前幾箇能惺悟清淨光明藏俄然一念興無邊生死海盡向此中生紅塵路更長青山間不了試問往來人誰識山中好湛湛青蓮花居泥而不染明明出世心雪在玻璃盞傀儡夜登場觀者生欣歎祇合醉中心難禁醒眼看四大衆緣合妄自分妍醜試看幻化人情識從何有微塵含世界不信盡包容莫道微塵小應知世界空枯木巖前路行人到此迷應登別峰頂更上一層梯岸樹懸崖坼枯藤古井深那堪二鼠嚙況被急流侵炎炎火宅中熱惱無回避一念放下時頓得清涼地舉世要多求求多轉生惱唯有知足心便是如意寶淨土唯心現蓮花性地香目前常不昧即此是西方妄想沈淪趣清心解脫場回光時返照覿面禮空王逐逐奔陽𦦨行行入火坑儻能開隻眼當下了無生世路多纏縛虗名最困人腳跟絲線斷方許出紅塵山林多寄興寂寞幾能甘不到真休處終成落口談我相真難破他非甚易求一生間檢點到底沒來由自性天真佛都為妄想纏但能一看破立地證金仙萬法唯心造千途一念差不知未起處苦海正無涯寂寂忘緣處心心放下時西來無別意只在自知之大海一滴水具足百川味法性本自同昧者見各異人道百年長我道百年短枕上夢三更醒人未轉眼一片間田地多為蕪草侵但能時剗却便是出塵心示衆十首六言死盡偷心活計做成沒用生涯收拾無窮妄想換將一朵蓮花四大支持骨立寸心寂寞寒空獨有綿綿一息龜毛線繫長風却説百年如夢誰曾兩眼睜開縱是機關使盡到頭總是癡騃可惜清涼心地無端迸出貪瞋霹𮦷心中火起燒殘自性天真身是衆緣假合四大圍一虗空動作呼為真宰不知誰在其中陷阱機關自造刀林火鑊誰當只道目前慶快安知身後苦長貌是超塵儀表衣為出水蓮華試看胸中何物莫教妄想輕遮蠶繭自生纏縛燈蛾誰使焦然將謂投明用巧豈知業力相牽名是假名非實毀譽入耳如風試聽呼為賊草猶人漫罵虗空荊棘林中掉臂是非場裏抽身落得無窮冷淡者般全不饒人偈二三百八首圜中讀圓覺經四相章我相鐘鼓鈴鑼不斷聲聲聲日夜説無生可憐醉夢傷生者鏡裏相看涕淚傾人相突兀巑岏聳鐵城刀林劒樹冷如冰誰知火向冰山發燒盡冰山火不生衆生相鐵門緊閉杳難開關鎖重重亦苦哉可怪呻吟長夜客不知因甚此中來壽者相一條血棒太無情觸著須教斷死生痛到徹心酸鼻處方知王法甚分明出圜中過長安市四首長安風月古今同紫陌紅塵路不窮最是喚人親切處一聲雞唱五更鐘體若虗空自等間纖塵不隔萬重山可憐白日青天客兩眼睜睜歎路艱飄風聚雨一時來無限行人眼不開忽爾雨收雲散盡太虗原自絶塵埃空裏乾城壄馬人目前倣佛似煙村直須走入城中看聲色原來不是真過吳山經堂寺遇明通禪人禮華嚴因示到處山河即本真大千經卷一微塵間來剖破輕拈出莫道文殊是智人過鐵佛葊贈鄒爾瞻給諫江上青山不斷春門前流水淨無塵開門忽見葊中主恰是金剛不壞身示沙彌照理出家本意緣何事割愛辭親豈等間不向袈裟求解脫松門翻作鐵圍關題東山寺壁咫尺東山入翠微深林晴日雨霏霏市流水聲相和觸目分明向上機中盤旅邸壁間見達師偈併題君到曹溪我不來我到曹溪君已去來來去去本無心誰知狹路相逢處避難石無端一念惹膻腥從此形骸纍不輕十載獵叢張網處石頭滿眼盡無生命小師大義讀楞伽玉線金針不易穿休從明月問青天玄關路斷無消息爾去逢人莫浪傳問丁右武大參病舉世誰知病裏身維摩獨坐見偏真從教大智懸河辨一默昭回萬象春示果弘福堂二侍者歸故山萬水千山枉問人腳跟一步最為親莫教錯落懸崖去縱出頭來已失真瀰茫煙水望何孤底事逢人問有無回首萬山清徹骨尚餘春色滿平蕪贈蔭亭上人請藏經歸南雄延祥寺一自南能度嶺時曹溪御墨尚淋漓於今重載琅函至佇看炎荒雨露垂送誥禪人歸慈化杯浮一葉渺無垠煙水茫茫苦問津歸去家山生意滿百花深處鳥啼春示查汝定涉水登山亦壯哉芒鞋遙自敬亭來入門一笑忘賓主莫道維摩口不開題雪山苦行佛萬山冰雪連根凍一片身心徹骨寒不是死中重發活如何能得識情乾無端棄却金輪位特爾令生大地疑自是九重深密事從來不許外人知輕拋兜率入王宮一顧回頭思不窮走向萬山千丈雪埋身八面不通風心似冰霜骨似柴六年凍餓口難開誰知忽睹明星上落得盈盈笑滿腮答定齋賀明府函蓋乾坤一句新晴空霹𮦷淨煙塵箭鋒拄處難回互狹路相逢是故人青獅白象駕雲中金色銀光出處同若問無生端的意空山風雨吼長松示歐生羽仲傳經訶林斯道幽微若一絲全憑信力以維持苟非一片金剛地難使菩提葉葉輝送樂天法師還匡廬山色湖光一鏡開曼殊誤落此中來莫教獅子輕彈舌恐震當年舊講臺贈西來梵僧十萬西來碧眼胡渡江曾折一莖蘆只今石室猶留影試問前生是有無挽本來和尚五年三度叩禪關此日尋師去不還不是白椎兜率院多應聽法五臺山送如證禪人造旃檀像還五臺火雲赤日滿炎荒金色光含古道場不是曼殊親出現誰知隨處是清涼海岸旃檀淨法身無邊相好隱微塵分明剖出諸人看覿面當機一句新寄大千法師三十年前同法席別來消息斷他鄉忽聞近住千峰裏想已心空聞妙香示曹溪塔主香火千秋似一朝兒孫終夜守寥寥茶湯宛若生前供不負當年石墜腰勉曹溪諸弟子十首千僧和合似靈山大衆依歸豈等間不是曾蒙親囑付如何得入祖師關肉身現在即如生朝暮茶湯出志誠鐘鼓分明常説法不須苦口再叮嚀福田種子要深栽因果如臨明鏡臺親到寶山千萬次者回不可又空回辛勤作務莫辭勞可想當年石墜腰一息不來千萬劫善根不種苦難消莫教輕易過平生如箭光陰實可驚只恐氣銷三寸後幾時再到寶山行功德園林不可輕腳跟步步要分明莫教錯落隨他去免使盲人又夜行寸椽片瓦衆緣成信施脂膏不可輕切莫貪他驢糞橛等間換却一雙睛信心膏血重須彌粒米莖薪不可欺但看披毛并戴角酬償夙債苦泥犁幸生中國蚤離塵身著袈裟遠六親受用空門清淨福如何能報祖師恩少小能存向上心毫芒終長到千尋只須歷盡冰霜苦始得成材出鄧林示曹溪沙彌能新智融達一淨洗通文方覺書華嚴經七首剖破微塵出大經無邊剎海遞相形松風鳥語分明説只在當人著意聽佛境重重不可量毫端三昧豈尋常須知舉手通身現觸處全彰海印光行行雁影落寒空直豎橫斜但信風莫問普賢求妙行先須識取主人公毗盧樓閣幾時開彈指感須待善財頓見閣中無盡藏重重佛境甚奇哉福城東畔禮文殊知識遙參到海隅五十三人同一調不勞遠涉費程途海波為墨亦須乾筆若須彌舉不難描寫毗盧華藏界最初一字許誰看紙墨文言總不真真經全在剖微塵但能字字光明現莫道文殊是智人挽萬固寺一山和尚二十年前問起居相逢猶是在生初只今遙望中條月獨有清光照竹廬寄高常侍憶昔長安話別時雪中把臂立臨歧而今萬里炎荒外一念清涼君獨知贈訶林裔公菩提樹下久棲遲時復經行繞樹思遙想當初栽樹日曾經親手一封泥贈顏杏園醫士雪山衆草菁蔥信手拈來用得工不是等間醫國手肯教狼藉怨春風贈太和老人金剛堀裏舊相逢雪鬢鬔鬆氣更雄一盞玻璃茶尚醉依稀猶記放牛翁送暹侍者遊五臺兼訊空印法師遙從火宅入清涼萬里休言道路長儻見文殊問消息堀中今空幾禪林過法性寺菩提樹下禮六祖大師菩提樹下舊相逢千載重來氣尚同鐘鼓聲沈香不斷兒孫何故覓玄蹤送離際禪人參方汝持一鉢曹溪水遍灑諸方五味禪莫道老憨無法説而今不直半文錢送若惺炯公禮普陀波流不動白華山滿月寒空大士顏若向巖前相見處瞻依須聽普門還喜法侄行廣至憶昔離家別祖年爾應猶是未生前今從萬里相看處一笑還追夙世緣問遊石陽病借問毗耶病裏身就中檢點孰為真只須剝盡重陰後始見陽和大地春送惺來裔公行腳瀰漫煙水渺無窮回首山城歷百重祇為尋師參底事德雲不在妙高峰懷大都千佛寺憶昔千花七寶臺一花一葉一如來不知近日花間佛可似當年震法雷示能哲禪人爾到曹溪路不差眼前行腳未為賒試看初出門前望芳草漫漫何處家寄王居士清涼雪夜共談禪一別於今二十年常憶毗耶真面目寒空明月幾回圓再過法性寺喜炯公禮普陀歸三年不坐菩提樹一念常懸般若燈莫謂頭陀慵説法道緣不似獵叢僧詠楞伽室寄天與孔居士滔滔毒海渺無涯夜剎羅叉此是家獨有楞伽無價寶光明日夜照恆沙八面光明體最圓金剛雖利不能穿時時安置心王殿照破三千及大千曹溪雪茶寄金山珍公摘得先春葉一枝寄將鶴骨病阿師試烹一盞親嘗過可似初參趙老時甲辰春奉檄還戍舟泊支江逸炯二公啓南羽仲仲遷諸子過訊因示暫繫孤舟傍柳陰端居恰似逝多林菩提樹下常隨衆怪道能來問法音示堪輿梁生山河大地一微塵法眼圓明始見真自是要求歸著處肯教埋沒世間人示羅浮山主印宗羅浮山下繞恆河河畔祇林似普陀若問華中觀自在試看明月墮清波贈周相士落魄江湖一蒯緱相心神術自壺丘逢人若問榮枯事一段真光在兩眸示性如濟禪人底事南遊學善財為尋知識久徘徊妙高峰頂無蹤迹莫道文殊錯指來示普陀勝林禪人普陀山下白華村日夜潮音説普門試問葊居何所有但聞鸚鵡報黃昏聞惺來裔公於雲棲受具歸以偈訊之一條拄杖活如龍相伴曾登天竺峰自向雲棲聞法後諸緣可頓一時空山中夏日竹牀瓦枕足松風午睡沈酣夢想空四體百骸俱作客不知誰是主人公靜夜鐘聲鐘聲清夜響寒空一擊如吹萬竅風不是間催龍聽法多應喚醒主人公示泰和周生大道從來在目前却於死處覓枯禪誰知日用頭頭事盡是無生最上緣道力何如業力強就中生熟好思量臨機遇境能回互頓息迷途演若狂示圓通總持長老西江一派自曹溪馬祖頭疼孰可醫若向圓通覓生藥死貓頭話最堪思示龔生伯起數千里外訪知音只為從人覓此心及至相逢親見面始知昔日費追尋示慈明賢禪人一錫遙從多寶來南詢煙水獨浮杯歸途若過曹溪路路滑休行雨後苔戊申夏日重過羊城偶成仙城已度十三載人世今過六十年回首塵寰如夢事不知究竟屬何緣當年一鉢歷諸方到處名山是道場喫盡檀那無米飯至今酬價費商量五臺千尺雪蒙頭只道寒灰死便休誰想一星星火種焚燒大地更橫流東海曾衝萬里濤奔雷破石浪頭高輕乘一葉隨風去直踏三山釣六鰲示正位侍者極盡懸崖百尺竿動移一步最為難只教撒手翻身去不作貍奴白牯看示悅禪人誦華嚴經百城煙水望如天何處相逢問普賢想向妙峰山頂過不知曾説此因緣示飯頭德山托鉢幾時來去米長沙莫浪猜休向上方香積借火爐邊事亦奇哉寄五臺妙峰師玻璃世界水晶宮金色銀光處處同獨跨金毛獅子步遊行八面不通風氷霜鶴骨髮如銀誰識曼殊最後身一自堀中相別後至今不隔一微塵拄杖橫挑剎海遊無邊剎土一塵收間來擘破微塵看落盡空花剩兩眸千丈寒巖百尺氷當年相對坐崚嶒即今火宅清涼界一個維摩一個僧寄五臺空印師遙思遊戲雜花林獨坐旃檀寶樹陰不動舌根常説法萬人時聽海潮音一自拋身瘴海瀾蠻煙毒霧儘加餐歸來渴飲曹溪水不減清涼徹骨寒示曹溪紫筍莊莊主一夕東風紫筍肥無邊春色到柴扉桃花滿眼無人問誰薦當陽向上機寄枝隱白門深隱一枝安山水娛情世念殘曾入維摩方丈內百千三昧一毫端示杲禪人閉關六窗緊閉不通風何事藏身入此中試向文殊彈指處直教拶破太虗空贈融禪人住持泰和大司馬郭公忠孝寺脫體原從瘴癘天三生又結宰官緣維摩丈室渾無語莫道無言不是禪示懷愚修堂主向上三玄動步疑言前一句許誰知若非撒手懸崖去辜負娘生兩道眉寄靈山桂峰師靈山一會儼然存松柏雲棲滿鹿園自是法身常説法分明鐘鼓報黃昏寄東海劫外法師親受靈山付囑來法筵今向海濵開楞伽山頂魔羅衆幾度聞經到講臺示南禪人為問毗耶病裏身不知誰是病中人二時粥飯三餐藥喫得分明意最親寄賴古軒居士長齋一室事空王心地時焚般若香遙想日長趺坐處靜聽鳥語出山光寄謝青蓮居士常憶青蓮居士身夢魂時對鏡中人知君深得無生意自信居塵不染塵鼎湖山居歷盡風波總是非此心久已習忘機翻身直入千峰裏坐看間雲白晝飛寄明宗法師曾從兜率白椎來一受金篦法眼開會向今時傳露布只教平地淨塵埃寄蘊法師江頭促膝別君時回首青山入夢思為問花臺千百衆言前一句幾人知寄巢法師披雲帶月飽風霜清夜迢迢鶴夢長讀罷楞伽香篆細知君無物可思量寄雨法師久從鷲嶺現當機誰問雲興花雨飛莫道法筵今寂寞堀中君作衆歸依示中孚表禪人世緣看破解歸來火裏蓮花不易開直把根塵都洗盡莫教再入者胞胎示無知鑑禪人明明佛性本無遮自是從前一念差失腳久沈生死海者回切莫負蓮花示微密禪人鉢囊遙自伏牛來度嶺寒梅花正開若問曹溪親切句菩提無樹鏡非臺示凝知瀚禪人圓頂方袍八寶身出家本意要超塵若為煩惱輕埋沒再出頭來已失真寄湛禪人住伏牛曾持一鉢到曹溪跋涉寧辭獨杖藜聞道萬山深隱處夕陽斜照鳥爭啼寄題郭次公如是院舍衛曾開祇樹林君今重擬布金心法王如是全提處獨許文殊是賞音答郭允叔曾向曹溪問上乘西來密意屬南能莫言杜口維摩詰不是當年有髮僧寄題郭叔子太乙囊泉亭清池明月影沈沈囊水江湖濟度心試問遊魚真榮處濠梁未必是知音示弘範禪人禮謝千華寶座前却從臨濟覓三玄今來更問曹溪路雲滿青山月滿天寄衲雲法師當陽剖破一微塵拄杖間提用處親明月夜深崖下虎歸依猶似昔時人送僧造旃檀像歸茶陵南海旃檀香一枝法身隨處現雙眉迎歸寂寂松陰下猶似拈花不語時贈郭生凌舄長齋繡佛禮空王火宅翻為選佛場夜剔明燈心寂寂蓮花不必想西方將之南嶽留別嶺南法社諸子十首一落風塵二十年相逢須信是前緣自從衣鉢南來後今日重拈直指禪底事分明在己躬不須向外問窮通但能觸處回光照莫被塵勞困主公大道從來絶本真多因分別強疏親直須看破娘生面方是塵中特達人瘴煙飲盡齒猶寒不記從前道路難此去萬山深密處雲霞五色座中看草載驅馳走瘴鄉年來不覺鬢如霜今乘一葉扁舟去蹤迹應從萬壑藏塵勞混迹久和光只為拈提此事忙千尺釣竿幾斫盡海天回首更茫茫一自歸依繞法壇時時為乞此心安莫言別去三千里明月中天覿面看時把綸竿見素心竹枝唱罷幾知音扁舟歸去霜天夜明月蘆花何處尋寒空歷歷雁聲孤蹤迹從今落五湖無限煙波寄愁思片帆天際是歸途為法寧辭道路賒豈云瘴海是天涯頻將一滴曹溪水灌溉西來五葉花
