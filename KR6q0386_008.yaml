body:
  text: 侍者福善日錄門人通炯編輯嶺南弟子劉起相重較法語示歸宗智監寺歸宗為古尊宿說法地達觀師倡緣興復既而湛公竭身盡力竟還故物今廿餘年湛公化去弟子修慈荷之予丙辰夏來禮金輪舍利塔覩其寺規模甲匡山之勝因思輔弼者誠難其人眾中見禪人在智眉宇秀拔卓有骨氣因屬主者命為監寺禪人善密行凡眾人盡日所務有不及者視其當務必通夕不寐一一親為料理明發則事無不辦者予嘻噓而歎曰有是哉予嘗見叢林年少率無慚愧一味養嬾三業不攝禮誦不修甚至白晝安眠安肯終夜不寐身任其勞以備大眾之務乎昔佛弟子千二百人獨稱羅睺為密行第一故為佛長子此土前輩諸祖唯百丈一日不作一日不食遂為叢林千古典刑永明每日行一百八事行故閻羅殿上圖像供養佛說三千大千世界無有如芥子許不是菩薩捨身命為眾生處故感為天中天是知從上佛祖無有不從行門建立世閒福田功德也禪人能以此心放捨身命荷負叢林即是建立三寶三寶常住即是續佛慧命慧命不斷即是報佛深恩知恩報恩即是慈父之孝子矣既秉如是行願二六時中念念諦思我自無始生死以來捨此身骨如須彌山所飲母乳如四海水如此捨身受身皆造生死苦業何曾一日以此身命修出世行乎若果有之則吾今生定不如此在凡夫地矣今幸有此身發難得之志一生盡命不捨本行則是一生超過百劫千生矣如此乃謂不虗生耳禪人從此更發精進居一切時但將趙州狗子佛性話頭蘊在胸中隨就作處心心參究畢竟因甚道無一旦搕著抹著一念疑團迸裂從前生死頓然了却是可謂福慧二嚴一生取辦古人云移花兼蝶至買石得雲饒前三十六代祖師一齊在禪人眉毛上轉大法輪也示自宗念禪人佛教弟子修出世法唯自利利他二種妙行利他謂之修福自利謂之修慧菩薩發心勤求無上菩提菩薩雖知法性空寂而不捨有為諸行知法性空是謂自利不捨諸行是謂利他從上佛祖未有不由二行得出生死者是以釋迦世尊歷劫勤修難行苦行我等曠大劫來於生死海頭出頭沒捨身受身不可思議皆是虗生浪死何有一毛真實行門若有寔行則定不似今生者頭面也回光返照猛自思惟豈不痛哉禪人今幸仗夙緣早得脫俗永離苦海又得安居名山諸祖說法勝道場地此萬劫難遇之緣正是饑逢王膳病遇醫王自當慶幸無量即盡此形壽拌捨一生作此功德已勝百劫千生空過無益也禪人當信老人言自今之後發堅固不退之心持勇猛剛強之志盡自己色力量自己才能辦一片肯心任緣隨願耐心耐煩忍苦忍勞即一日成就一種功德已勝一生空過矣禪人自說身弱神疲不能任事古人貴在心力強願力大不在色力徤不徤也今雖小恙不為大苦若造惡業墮在三塗即求今日以小病小惱之身心求作福田之利益不可得也佛令眾生思地獄苦發菩提心正是今日䇿發精進幢也古德云寧有法死不無法生縱捨此身命作此妙行猶為般若舟航可到彼岸苟不勉力強志可謂虗負此生既到寶山空手而歸豈不惜哉若能安心於無事則心空心空則神不竭神不竭則身不勞如此是為無作妙行遇緣即宗定不為日用所轉頭頭成就大解脫門矣當諦思之示陸將軍名世顯號鎮湖將軍為濠梁世胄天性英傑其殺機固所賦也中年知向道入海門周先生室先生拈古人勸君識取主人公之語示之老人歸隱匡山謁老人金輪峰下自知殺業太重願求懺悔老人喜其性直無偽固古豪傑忠肝義膽之儔第古今賦此天性者多盡錯用其心故以佛種子翻作地獄苦具耳佛性無二眾生與佛不隔一毫達性眾生即佛不達性佛即眾生如清冷之水以之獻佛則清淨以之洗穢則污濁故佛之慈悲即眾生之殺機古德云護生須用殺殺盡始安居又云梵語阿羅漢此云殺賊經云與五陰魔煩惱魔死魔共戰有大功勳滅三毒出三界破魔網爾時如來一大歡喜此釋迦老子勸人殺生之榜樣也以佛能如此殺生故號大雄猛世尊世人愚癡賦有雄猛之佛性而不自殺其賊翻以殺人劫劫生生酬償地獄之苦而自以為功多豈不為至愚至癡倒用其佛性者哉語云一將功成萬骨枯自古罪之大者莫大於殺生其殺人以為功殺生食肉恣口腹以為快其愚等也將軍能回心向上自求多福從今日去以殺生之勇自殺其慾佛言貪慾瞋恚過於怨賊能自斷之是為殺賊能破煩惱出生死苦是為大雄以此直求無上佛果是為大賞其殺之利有如此者而自棄不謀可謂智乎雖然殺人則易自殺則難故云出家大丈夫事非將相所能為老人葛藤至此是謂法施慈悲將軍信此是真懺悔示慧成信首座首座慧成中年棄妻挈子出家曾參達觀蓮池兩大師乃至南嶽湖東掩關老人將卜居南嶽成破關相迎遂侍巾舄一日作禮白言某幸末法為佛弟子志出生死親見三大師現身五濁惡世衛護法門行其難行忍其難忍調其難調每見如來教中教菩薩法將謂空言今親承三大師之行履典刑現在便可盡形壽依歸誠難捨此別求怙恃矣乃寫三大師之真終身佩奉且生生世世執此願輪即往來人天周流六趣曾無厭倦乞師為我證明之老人聞而笑曰此固子之深心本願雖然似矣猶未探其本也請試觀夫本師和尚毗盧遮那法身非身以文殊觀音普賢三大士之行以成其身文殊智也觀音悲也普賢行也捨此三者則法身寂寥亦無寄矣故如來法身若言其智則徹法界理事因果乃至草芥塵毛無不盡其源底盡眾生界心念頭數莫不徹其根源若言其悲則盡眾生數皆為己身凡眾生之饑寒困苦疾病痛癢乃至三塗劇苦皆菩薩全身一體共受故能不捨於一眾生若言其行則盡虗空徹法界無一草芥塵毛不是菩薩捨身命處故普賢十願一一皆言虗空界盡眾生界盡眾生業盡眾生煩惱盡我此行願無有窮盡是故本師毗盧遮那以此三法成就一身少一法而法身不成即一眾生而非自己則法身不徧乃至塵毛草芥一有不徹則未盡無明以至虗空盡處而行願亦盡則法身斷滅雖然於法界性中觀此三者如首羅三目即一即三非三非一於寂滅海中猶似漚滅漚生耳若有挺特沒量大人能於毗盧頂𩕳上行回視此三行者大似喚奴作郎矣以彼區區介爾之行較三大士者又不啻奴兒婢子豈能盡佛法身之量哉苟能從此發堅固心放捨身命建立三寶凡有纖毫裨法門益眾生事皆法界全體之德用如由一塵以徧諸塵始一毛而融多毛從今生以極未來劫劫生生下退此心亦如普賢之虗空界盡而行願無盡生生世世食息起居行住坐臥未離本師一毛孔外三大老者乃於法性海中同出同沒不出如幻三昧逢場作戲竿木隨身說幻法以開幻眾是則有之何足以為師哉其無以限量心自隘如來法身境界可也示自覺智禪人佛言汝等比丘每於辰朝當自摩頭此語最為親切老人每每思之吾佛慈悲痛徹骨髓常謂末法比丘多所受用安居四事種種供養各各自謂所應得者更不思我是何人物從何來為何而受所以知恩者希而報恩者少特未一摩其頭耳苟回光一摩其頭則不覺自驚曰吾為何薙除鬚髮不與俗人為伍耶苟知形與俗異則居不敢近俗身不敢入俗心不敢念俗如此則樂遠離行不待知識之教而自發勇猛入山唯恐不深矣又安忍混從市俗縱浪身心為無慚人作無益行耶自覺禪人向住人閒來匡山禮老人願枯心住山修出世行老人因示之以福慧雙修之行修慧在乎觀心修福在乎萬行觀心以念佛為最萬行以供養為先是二者乃為總持吾人日用一切起心動念皆是妄想為生死本故招苦果今以妄想之心轉為念佛則念念成淨土因是為樂果若念佛心心不斷妄想消滅心光發露智慧現前則成佛法身然眾生所以貧窮無福慧者由生生世世未嘗一念供養三寶以求福德直為生死苦身念念貪求五欲之樂以資苦本今以貪求一己之心轉而供養三寶以有限之身命隨心量力供養十方乃至一香一華粒米莖菜則如滴水入滄溟一塵落大地縱海有枯而地有盡其福無窮故感佛果華藏莊嚴為己將來自受用地捨此則無成佛妙行矣禪人如生疲厭當自摩頭則自發無量勇猛也示龍華泰禪人余往乞食長安時過龍華樹下主人瑞庵師物色余甚驩視猶多世親因也余覩王舍城中諸住剎者率多浮習獨師孤硬潔介遇物不假辭色心知其非塵中人也遂相與莫逆數數徃來諸弟子輩亦莫不以余為親故無閒然及師化去其孫潭公視余猶視師余被放嶺外愧生平竟無以報德者頃余出嶺之南嶽法孫泰禪人遠來相訊余見之不覺五內酸痛昔之與師音聲相貌居然在目及余之雙徑了達大師因緣禪人相侍既而余歸匡山則携禪人與之同歸意念爾祖之德冀成就禪人出世之業為報地耳居期年以開荒之勞身心未及放下頃政為禪人指示發覺初心方有趨向乃翁以書招之屬以他緣余刻意留之不可得禪人將別請益因示之曰吾出家兒先須急其大者略其小者何謂大生死是也何謂小世緣是也古德云除却死生真大事其餘都是可商量以眾生沈淪苦海汩沒世緣積劫以來以至今日未嘗一念返省今幸為佛弟子身著袈裟且又遇知識有入道之緣而不拌捨世緣苦心參究己躬下事切恐今生錯過縱出頭來未審可能如今日諸緣畢具否也禪人今以乃翁之命不敢違去則固爾當以死生之念為急辦道之緣不可失事畢旋歸老人幸得活埋空山但存殘喘一日則與禪人切磋大事有一日之功老人以畢命為期禪人以死心相侍但得禪人當人一念光明煥發不獨禪人以了積劫生死大事亦是老人所以報乃祖之地不負此世際會因緣也禪人行矣其無久滯他鄉重增生死業累耳示翠林禪人佛祖教人唯在真心實行為出生死之要心真則凡所動作言行舉措無一事而不真行實則凡所云為無一行而不實故真實如好種子其餘作為立行種種皆發生之緣以是之故抽芽發幹開花結實究竟不虗故佛說發心修行如布種子成就菩提以為結果果者實也以始終皆真實故故佛呵二乘為焦芽敗種者以其心行不真實故也從上諸祖教人參須真參悟須實悟是知一切眾生虗生浪死者以其妄想顛倒用事劫劫生生未曾一念真實故於生死海中漂流難到彼岸所謂業識茫茫無本可據耳況為佛弟子身在袈裟之下豈可流浪一生念念妄想業識流轉曾無一念返省而求真實履踐之行此乃向袈裟下失却人身最為可憐愍者禪人既不遠千里來參老人必發一片真實信心以此空山寂寞之中非掠虗之地何所為而來耶既發真實信心不是一見便了不求一段真實之行亦徒然耳若求真實之行即從真實心中發現果有真真實實為生死之心必須將從前有生以來及出家以來從頭一一細思檢點何曾有一念一行是真實事從前已是空過即從今日已去發一片出世之心將一切世閒情根妄想攀緣一齊放下將此一把骨頭一齊拋却將此一條性命納向空山大澤之中任他日炙風吹一切安逸飽煖思慮盡情撇却單單直以死生一念掛在眉毛上將一則古人公案蘊在胸中日夜參究看他一念世閒心起便是墮在生死處定要把斷不容毫髮如此參究不悟不休即此一著便是為生死真實心即以此心向二六時中一切動作云為種種行門至禮拜三寶供養十方調和大眾看待老病一切行門無不親身竭力承事不生一念厭倦心不生一念人我是非得失心不起一念休歇止足想如永明大師每日行一百八件方便行盡形不改即此便是真實之行如此操心立行透出本地光明則將積劫所染一切貪瞋癡愛習氣種子一一消融化為成佛真實種子矣如是用心可謂不虗此生不負出家不枉遠犯風波參訪知識若仍前涉虗止作嘗情業垢罪垢種子但隨妄想而行不唯辜負此生實取窮劫三途之苦耳示順則易禪人沙門釋子乃出塵之人親近佛法乃出情之法實破我之具方今學者廣學多聞但增我見少能餐采法味滋養法身慧命者豈非顛倒之甚也易禪人以多聞無益志在清修固已遠矣然徒以清修為行而不刻意究竟生死根株不深窮佛祖不到之地此其創志不遠是以一日之價為得也可不負其本有哉吾徒所難得者厭世俗最難得者厭生死禪人今知其厭而不知究其所以厭是猶然以五十步笑百步也嗟予老矣餘日無多生死大患橫在眉睫恐厭之不極禪人年亦長矣能以老人之厭自厭倘不厭老人相與千嵒萬壑之閒絕影忘言修厭離行從此長揖五濁永離四生同遊廣大極樂之鄉豈不為最上因緣哉又奚止於裹粮千里之適視彼榆枋莾蒼者固未足與道也示𢆯機參禪人禪人以持明為專行從事者三十年心地未有發明乞老人指示老人因示之曰佛說修行之路方便多門歸源無二即參禪提話頭與念佛持明皆無二法第不善用心者不知借以磨煉習氣破除妄想返以執著之心資助無明故用力多而收功少耳此事如用瓦子敲門只是要門開不必計手中瓦子何如也以吾人無量劫來積集貪瞋癡愛襍染種子潛於藏識之中深固幽遠無人能破聖人權設方便教人提一則公案為話頭重下疑情把斷妄想關頭絲毫不放久久得力如逼狗跳墻忽然藏識迸裂露出本來面目謂之悟道若是單單逼拶妄想不行何必話頭即婆子數炭團專心不二亦能發悟況念佛持呪有二法哉禪人持明三十年念見効者不是呪無靈驗只是持呪之心未曾得力尋常如推空車下坡相似心管滾將去何曾著力來如此用心不獨今生無驗即窮劫亦只如此及至陰境現前生死到來依然眼花撩亂却怪修行無下落豈非自誤自錯耶禪人從今不必改轉就將持呪的心作話頭字字心心著力挨磨如推重車上坡相似渾身氣力使盡不敢放鬆絲毫寸寸步步脚跟不空如此用力時只逼得妄想流注塞斷命根更不放行到此之時就在正著力處重下疑情深深看審問只者用力持呪的畢竟是个甚麼來去疑來疑去如老鼠入牛角直到轉身吐氣不得處如此正是得力時節切不可作休息想亦不得以此為難生退息想及逼到一念開豁處乃是電光三昧切不可作𢆯妙歡喜想從此更著精彩拌命做去不到忽然藏識迸裂虗空粉碎時決不放手若能如此持呪與參禪豈有二法耶所以道俱胝只念三行呪便得名超一切人便可證明即親見佛祖亦不易老人之說也示智沙彌方今出家兒於末法鬬諍堅固之時有能決志為生死大事單提向上一著以了悟為期此上上根人誠不易見今亦有參究此事又惡覺惡習濃厚蒲團未穩邪見橫生多落魔道此其難也古德云未能參究向上且於教法留心時光亦不空過其留心於教亦有兩般一則根器稍利力窮性相宗旨深徹其源以多聞熏習之功從聞思修入三摩地是則不獨目了心性抑且為人師此亦報佛深恩不負出家之志至若根器稍鈍不能廣親教乘即持誦一門尤為要行故天台大師以讀誦受持為五品觀行之首即法華所說持經法師現在父母所生肉身即得六根清淨此持經之功豈劣行哉沙彌既知厭生死苦投佛出家苟無專心一行豈不辜負此生即持經一行能專心一志如古人潛心理觀一旦忘言契會得佛心宗是由文子而得總持此所謂旋陀羅尼門由此證入歷劫生死根株仗此法門一時頓斷豈不為無上菩提之徑路乎若悠悠歲月唐喪光陰墮於粥飯常流豈不虗消信施重增業累又何取於出家為哉示性覺禪人出家本為生死大事今出家兒不知生死為何物但知隨波逐流業識茫茫無本可據古人參方行脚訪尋知識單為究明己躬下事今人行盡天下歷徧叢林唯鼓粥飯習氣竟不知善知識為人處可惜奔波一生到底了無下落是為可憐愍者至有一念為生死心的不知修行之要或以禮誦念佛為修行一生辛苦到底於己躬下事如黑漆桶相似於生死分上了沒干涉禪人發心真實為生死大事唯有參究向上一著為真實工夫先要辦一片長遠決定不退之志古人二三十年單提一念不悟不休第一不得指望速成就釋迦老子三大阿僧祇劫磨煉身心豈是鈍根耶古德參究機緣儘多唯有念佛的是誰一則審實話頭最易得力禪人今日發心參究但將此一則公案時時提撕先將身心內外一切妄想襍亂念頭一齊放下放到沒可放處即深深提起一聲阿彌陀佛四字歷歷分明急著眼看看得少不得力又提一聲佛有力便下疑情審問者念佛的是誰審之又審畢竟是誰看得纔有昏散現前即便快著精彩又提又看又審又疑疑到疑不得處胸中如銀山鐵壁立在心目之閒如此便是話頭得力時也若到此得力處正好重下疑情於日用一切時一切處念念不移乃至久久夢中一似醒時一般若用力到此決不可退墮忽然疑團迸裂自然頓見本來面目若肯發此決定之志操不退之心但只一念直直行將去切不可求速効切不得將心待悟若工夫綿密自有打破時節也如上所說參究一節最是易為省力是要放得下提得起靠得定疑得切不拘行住坐臥動靜閒忙都是用心的時節六祖云若論此事輪刀上陣亦可做得此之謂也禪人有志真為生死便從此一路下脚示寶藏相禪人禮普陀觀音大士證圓通本根以法界身隨緣應現豈定居於普陀耶海喻生死山喻涅槃大士以法身普應生死海中即眾生日用尋常皆大士威神顯現湛然寂滅猶如寶山故以海中普陀象之由在眾生煩惱海中眾生有苦即大士之苦故一稱其名即得解脫乃眾生喚醒自心大士大士現前則寂滅現前寂滅則苦不能到故山在海中波濤不能撼動是故名為大士常居普陀非局指海中拳石為大士棲託也眾生迷妄不禮自心大士親踞寂滅道場巍巍不動如海中山爾乃䟦涉山川必數千里外跉跰辛苦而向外求之迷之甚矣雖然如是經云歸元無二方便多門今大地眾生皆信大士於南海合就其機而引進之令其涉海登山一呼大士猛省自心則觸目波濤皆入圓通之門必使自信而後已同此行者但有一人能信老人此言則不負一翻行脚不然則空費草鞋錢也示明輝禪少林禮祖若論此事佛未出世祖未西來照天照地無欠無餘即黃面老子出世胡亂四十九年終日搖唇鼓舌亦未道著一字及末後拈花迦葉破顏微笑乃曰吾有正法眼藏涅槃妙心今付與汝大似空拳誑小兒自是喚作教外別傳之道一似鉢盂安柄一人傳虗十人傳實達磨西來又說作單傳直指少室九年賺得神光癡種立雪斷臂將謂有甚奇特究竟到底直是个覓心了不可得從此承虗接響大家都架空中樓閣各立門庭二派五宗畢竟不曾為人拈出直至如今大地黑如漆致使癡狂之輩向鬼窟裏弄精魂自謂傳少林禪是某家兒孫如此誑惑愚人豈不痛哉禪人今日參老僧老僧此閒無佛法禪道與人說甚麼乾矢橛禪人又要走向少林禮鼻祖求佛法禪道捨却自己脚跟下一尺土更向千山萬水之外向他家屋裏覓豈智也哉禪人試將己躬下理會看未出門一步與到匡山時是同是別即今離匡山一步到少林往返歸來時是同是別若是別則未出門一步早已錯却了也況千里萬里乎禪人如不信老人試到少室問取單傳堂前露柱看是个什麼示法界約禪人禪人生長建昌自離塵以來久走方外曾禮紫栢及老人於大都已三十餘年復覲老人於匡山因示之曰從上出家兒皆為生死大事登山涉水求善知識決擇於一言一句之下勦絕命根將百千萬劫塵勞惡習當下頓斷如脫鞲之鷹自此不復受人拘縶即能掉臂生死路頭絕無顧盼諦觀傳燈諸祖為人抽釘拔楔處有甚𢆯妙秘密耶只是學人一向單為生死一著蘊在胸中吞不入吐不出扼塞不通如喪老妣相似偶因緣時熟忽遇善知識拄杖頭一撥便轉更有何疑慮耶唯的信自心本有而已今人行脚走徧天涯入徧叢林眼中到處熱烘烘便是好道場見粥飯精潔一頓飽的便是好知識從遇明眼知識都被熱瞞當面錯過如此行脚參方不為本分事便是流浪生死一生空過時光枉費草鞋錢豈不大可嘆息耶禪人為生死出家行脚參知識住名山行苦行種種法行一一經歷且道即今生死事畢竟如何且道前見紫栢老人今見老人與未見時有何差別且道今在匡廬萬仞峰頭白雲深處與王舍城中萬仗紅塵裏境界是同是別若道是同且隔三千里外沒交涉若道是別衲僧行脚眼在甚處若向者裏定當得出三十年即今日今日即三十年前紅塵即白雲白雲即紅塵一切生死煩惱業行及種種差別境界無不觸目寂滅矣其或未然今日再行脚從頭起重到五臺峨嵋參見文殊普賢試問何等是平等一際寂滅法門待有話會再來與老僧相見示崇觀禪人觀禪人往來吳楚不遠數千里來參一見則知其有志而未能也老人愍其遠來且無可指示但因其名乃字之曰見微以眾生生死根株微細流注妄想昏迷而不自知故吾佛大師設觀以照之良以微非觀照無以見生死之力大觀不涉微無以顯照用之功力能破幽微則生死可出此特教家之極則若是衲僧分上自有格外鉗錘但能一念如鐵壁銀山塞斷咽喉無吐氣處直得死而復甦方有少分相應耳禪人方且波流識海未能勦絕命根他時後日苟能吐却襍毒放下身心再來參請有分示六如坤公從上諸祖教人參禪雖有超佛越祖之談其實要人成佛作祖耳未有欲求作佛祖而不遵佛祖之言教者捨教而言修行是捨規矩而求方圓也且佛教阿難開口便道應當直心淨名云直心是道場馬鳴大師開示修行切要須發三種心謂直心正念真如法故深心要集一切諸善行故大悲心願救一切眾生苦故從上諸祖未有不發此三種心者學人祇知瞢瞢的去參話頭只要妄想貪求𢆯妙却不知是直心正念真如祖師方便法門若說真如二字學人早作道理會取去誰肯下死工夫做若只教去看話頭看到話頭逼拶歷劫情根忽然斷處從來一切妄想情慮當下消滅求一念生心了不可得到此便是離念境界正所謂正念者無念也若到無念則不求與真如合自然覿體相應如此便是佛祖教人直心的樣子也是知參禪更無別樣巧法只是要人實實死做做到恁般田地豈有甚秘密巧妙哉此乃第一直心修行也第二深心要集一切諸善功德此諸善功德不是外邊有為的事如達磨大師對武帝云淨智妙圓體自空寂是真實功德是知達磨所說淨智妙圓正是馬鳴直心正念真如馬鳴所說諸功德就是將直心正念去做以真如徧成一切有為事法今日要求證真如不是在死眉死眼鬼窟裡求要在一切日用有為萬行上求所以行上求者不是在事上別討出一个𢆯妙真如來只是就將直心正念在一切事上驗看可與直心正念相應不相應若事事法法都與直心正念相應則目前無一法一事不是真如境界矣所以馬祖與百丈諸弟子日用中搬柴運水鋤田插禾燒火煑飯事事上覿面勘驗尋常一言一句冷言熱語都是要弟子入證真如之門若勘到果然一切處不昧方許有為人分若胸中絲毫未透未到無念境界起心動念即被業轉墮在生死窟中故未輕許印正此傳燈千七百則葛藤皆真實印正語非𢆯妙機鋒語如今學人都把作𢆯妙奇特言句蘊在胸中當作己解日用頭頭未曾一毫看破豈不誤哉第三大悲心願拔一切眾生苦如今學人見拔眾生苦是菩薩事待他日成了菩薩纔度眾生却不知能度眾生方是菩薩度眾生苦不是有了神通妙用纔去度眾生却就是直心正念集諸功德處就是度生事業且如世尊教須菩提度盡眾生實無眾生可度乃至廣行六度更無一法可行乃至上求菩提佛果亦無所得且度眾生豈不是集諸功德實無一法可得豈不是直心正念真如如此妙用乃自己日用神通取之無禁用之不竭則何法而非功德事哉以眾生日用種種事法皆是煩惱現行今以真如一念事事法法上印破都轉作真如妙用便是度自心之眾生如此參學是名真參實究者不是現成端坐養懶過了三年五載便誇大口說我參禪幾多時悟了多少妙處如此見識都閻老子前喫鐵棒漢反不如三家村田舍郎他倒免酬信心檀越宿債老漢看來佛祖教人原是分分明明只是後人錯會所以誤耳禪人既歸心老人須信老人言從今將抱守瑠璃瓶子一拶粉碎將從前參的都移在一片身心上向成就眾生門頭拌却性命去一一著實體驗過發廣大心能引一眾生發菩提心便是拔一眾生之苦自破一分我執損一分煩惱消得一分我見煩惱便是證一分真如境界若從此以去更發長遠心即三生十劫劫劫生生行到煩惱消盡處便是度盡眾生處若眾生煩惱一時都盡更要成甚麼佛祖示西印淨公專修淨土近世士大夫多尚口耳恣談柄都尊參禪為向上事薄淨土而不修以致吾徒好名之輩多習古德現成語句以資口舌便利以此相尚遂到法門日衰不但實行全無且謗大乘經典為文字不許親近世無明眼知識卒莫能迴其狂瀾大可懼也大都不深於教乘不知吾佛度生方便多門歸源無二之旨耳世人但知祖師門下以悟為上悟心本意要出生死念佛豈不是出生死法耶參禪者多未必出而念佛者出生死無疑所以然者參禪要離想念佛專在想以眾生久沈妄想離之實難若即染想而變淨想是以毒攻毒博換之法耳故參究難悟念佛易成若果為生死心切以參究心念佛又何患一生不了生死乎惟此淨土法門世人以權目之殊不知最是真實法門諦觀普賢以法界為身修十大願必指歸淨土馬鳴傳心祖師宗百部大乘作起信論究竟結歸西方東土傳燈諸祖雖不明言淨土但悟心既出生死不歸淨土豈成斷滅耶永明會一大藏指歸一心亦攝歸淨土禪至中峯時在季世而極力讚揚西方況此法門乃本師無問自說十方諸佛共讚豈諸佛菩薩諸大祖師反不如今之業垢眾生而妄談耶淨公中年棄愛出家初參紫栢大師授參禪之指今於淨土一門願修而未決老人因謂之曰此事不必問人只看自家為生死心何如若為生死心如救頭然志要一生取辦譬若人患必死之病有人覓還丹可救一人授以海上單方足以起死回生只在病者有決定心信此可服更不必待覓還丹只服此單方頓令通身汗出絕後方甦是時始知其妙但諦信此法專心一志至臨命終時方自知其郊耳又何必問取他人勉矣行之決不相賺示沙彌性鎧沙彌性鎧來參請益老人字之曰堅忍惟佛示弟子曰著忍辱衣名堅固鎧以鎧為禦患之具譬夫大將臨敵不遭矢石之患而能全身保命有必勝之功者鎧之力也且吾沙門釋子蹈生死之場遇五欲諸魔之大敵非忍力堅固不足以勝之故曰忍色忍欲難忍能忍方能保全法身慧命以臻極樂之場即吾佛亦曰種種諸難皆當能忍況末法險道多諸患難苟無堅忍之力又何以克全出世之業乎
