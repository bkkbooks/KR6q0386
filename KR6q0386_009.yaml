body:
  text: 侍者福善日録門人通炯編輯嶺南弟子劉起相重較法語示夜臺禪人文殊菩薩住清涼山與一萬眷屬常演說法故西域沙門遙禮此山為金色世界華嚴經云一切處文殊師利從一切處金色世界而來由是觀之文殊果常住於此山耶蓋衆生界中煩惱所集為熱惱地若行人能開智眼達本情忘知心體合則當下清涼如是則觸目無非文殊化境步步不離清涼道場此所謂一切處文殊金色世界也夜臺禪人久住臺山夜遊故得此名今來南方行腳參禮知識是必親從文殊指點而來如善財之南詢雖經百一十城未動腳跟一步如前周行十方世界未離金色界中在在知識逆順法門無非文殊智眼今見老人於五乳峯頭與金色世界是同是別者裏辨得許你親見文殊其或未然再買草鞋行腳去參參示省然覺禪人性覺禪人中歲出家遠來匡山求授具戒以有隱疾不能久侍辭歸請益老人因示之曰身為大患之本衆苦所聚六道生死先要識此生死苦因所謂諸苦所因貪欲為本若滅貪欲無所依止是故佛說金剛戒心地法門乃斷欲之利具出苦之舟筏也汝今幸聞此法念念不忘心心不懈即此便是修行之要如圓覺經云當觀此身四大合成我今觀此堅硬歸地潤濕歸水暖氣歸火動轉歸風諦觀四大各有所歸今此妄身當在何處如是觀察念念不忘心心不昧久之純熟當見此身忽然脫空四大若空諸苦頓脫即此工夫便是出生死之第一妙訣也從上諸祖未有一人不從參究中來得了悟心性者未有不修而能得利益者汝當更念此身雖苦幸存一息尚可求能出之方若一失此身枉著袈裟則將來三途之苦動經長劫雖欲求出不可得也故云思地獄苦發菩提心勉之毋怠示說名道禪人道學人往參老人於曹溪特為發明金剛般若宗旨以吾人修行不仗般若根本智生死難出然此般若非向外別求即是吾人自心之本體本自具足故今修行但求自心更不別尋枝葉佛祖教人只是返求自心故云識心達本源故號為沙門又云若人識得心大地無寸土以我自心元是般若光明本來無物但因一念之迷故日用而不知但知有此幻妄之假我即不知有本來常住法身即今要悟本來法身即就日用現前六根門頭起心動念執著我處當下照破本來無我無我則無人無人則了無衆生衆生既空則生死根絶生死既脫則無壽命是則四相既除一心無寄豈非無住之妙行乎若不能當下了悟只將六祖本來無物一語置在目前但見一切境緣對待生心之時便是我執就此執處一照照破則當下情忘對待心絶即是無我無我則無人人我既空則日用身心了無罣礙以日用逆順境界皆是生死路徑若境界看破了無罣礙則生死根株亦從此倒斷矣如是豈非善修般若無住之妙行乎禪人有志要出生死必以此為第一義此外別求即落外道邪徑矣示魏聖期聖期居士頃以書來請益云某邇來雖惕然於生死大事欲隨處解脫惟橫逆忽來不能當下消受雖旋能覺知主人已被牽纏矣觀此來意乃真切有志於生死大事者第未遇善知識指點心地工夫故無把柄耳蓋吾人從來只認妄想為心不知本有佛性一向只在世情逆順境界上起好惡憎愛種種分別知見殊不知此等憎愛喜怒之情全是生死根株舉世之人未有不在此中一生交滾者古德教人參禪了生死不是離此別有𢆯妙只是在此等境界上憎愛之心看破便是了生死以此憎愛妄想從來習染純熟深厚若無方便法門豈能敵得所以參禪看話頭之說正是破煩惱之利具耳所以被他牽纏者直為無此話頭作主宰耳只如僧問趙州狗子還有佛性也無州曰無即將此一無字懷在胸中作話頭下疑情念念不忘心心不昧一切閒忙動靜應酬忽遽中只提此一語重下疑情審問疑來疑去只有一個話頭現前縱是看書才放下書本回頭一看便下疑情此疑堅固切不可作道理思量解會只要一個疑念真切久久純熟但見心中妄念起時如此一問當下氷消心中所起喜怒只是一妄想耳先有此話頭作主宰及境界至時一到即看破當下氷消全不用力如此做工夫不但敵破境界抑有了悟之時但切不可作𢆯妙道理思量恐反誤也示福敦禪人新安禪人遠參匡山求授戒法名曰福敦字曰篤如篤者敦篤純一無僞精誠之至也然吾沙門佛子欲超生死證真常求無上涅槃之福樂苟非精誠一念純真無妄力破煩惱之魔頓拔愛憎之根而欲頓享無為之福難矣千里之行在於初步從此戒為基本乃趨菩提之初步即此念念向前心心不退單求一念生死情根搜拔起處竟不可得然不可得處便是生死無著處矣第恐志不堅行不力耳若恐不力但以阿彌陀佛四字橫於胸中以為利斧久久根株自斷矣如是著力是名篤如勉之勉之示福厚禪人新安禪人來參匡山求授戒法名曰福厚字曰積如蓋出世人福由漸積而厚至佛乃足猶如積微塵以成大地厚之至也吾佛世尊從無量劫來捨頭目髓腦積功纍行乃得菩提菩提為涅槃之安宅福樂之極地也苟不積何以至此哉然如者乃如如佛性吾人本有良由積劫煩惱侵𩞾故煩惱情塵日厚而如如佛性薄矣今既知佛性本有不假他求從此日用念念知歸但見情塵起處以智光照之久久純熟則佛性厚而煩惱薄煩惱薄而業障輕業障輕而生死斷是由積真如以斷生死求證菩提享常樂我淨之厚福豈非由積而至耶故曰水之積也不厚則負大舟也無力禪人勉之示同塵睿禪人滇南同塵睿禪人遠至大都親歷講肆既而盡棄所習南參知識遊新安之黃山愛其幽勝遂隱約其閒一鉢往來無定棲止然以華嚴大經為課誦壬戌仲夏來參匡山求授大戒拈香請益老人因示之曰子以華嚴大經為常課能知此經之綱宗乎惟我毗盧遮那曠劫因中稱法界心修普賢行證窮法界名為報身號盧舍那具有佛剎塵數相好是為正報所感二十重華藏世界無盡莊嚴以為依報安住海印三昧稱普光明智為地上菩薩演說此經名曰普照法界修多羅為稱性法門種種微妙不可思議如此法門乃諸佛自證境界具在衆生日用妄想心中念念現前經云譬如一微塵中具有大千經卷書寫三千大千世界中事有一智人明見此經剖破微塵出此大經利益無窮然一微塵者衆生妄想心也大千經卷衆生本具性德也隱而不現謂衆生日用而不知也明眼智人破塵出經即諸佛證窮此法開示衆生為大利樂也是知此經所說乃說衆生日用妄想心耳大哉衆生之心具有廣大不思議力智用無邊而為介爾妄想所蔽可不悲哉吾佛特為此事出現世閒故曰為一大事因緣故出現於世以諸佛證此大事因此緣此特出世閒為衆生說更無別事以衆生迷此大事而為生死故以生死為大事也由是觀之即八十卷之雄文所開示者乃吾人一念之妄想心耳故曰我今於一切衆生心中成等正覺所謂諸佛心內衆生時時成道衆生心內諸佛念念證真故般若多羅尊者曰入息不居陰界出息不涉衆緣常轉如是經百千萬億卷苟能以如是眼轉如是經盡未來際無閒斷時所謂塵說剎說熾然說無閒歇此乃華嚴法界真經之大旨也禪人若悟此法則於未展卷前徹見無邊法界於撥火拈香謦咳彈指之閒也雖然如是也要牛皮鑽透始得示修淨土法門海陽禪人遠參匡山求授戒法命名曰深愚拈香請益云弟子某發願求生西方淨土結法侶若干人同會一處專修淨業願乞慈悲指示法要老人因示之曰佛說修行出生死法方便多門唯有念佛求生淨土最為捷要如華嚴法華圓妙法門普賢妙行究竟指歸淨土如馬鳴龍樹及此方永明中峯諸大祖師皆極力主張淨土一門此之法門乃佛無問自說三根普被四衆齊收非是權為下根設也經云若淨佛土當淨自心惟今修行淨業必以淨心為本要淨自心第一先要戒根清淨以身三口四意三此十惡業乃三途苦因今持戒之要先須三業清淨則心自淨若身不殺不盜不淫則身業清淨不妄言綺語兩舌惡口則口業清淨意不貪不瞋不癡則意業清淨如此十惡永斷三業氷清是為淨心之要於此清淨心中厭娑婆苦發願往生安養立念佛正行然念佛必要為生死心切先斷外緣單提一念以一句阿彌陀佛以為命根念念不忘心心不斷二六時中行住坐臥拈匙舉筯折旋俯仰動靜閒忙於一切時不愚不昧並無異緣如此用心久久純熟乃至夢中亦不忘失寤寐一如則工夫綿密打成一片是為得力時也若念至一心不亂則臨命終時淨土境界現前自然不被生死拘留則感阿彌陀佛放光接引此必定往生之效驗也然一心專念固是正行又必資以觀想更見穩密佛為韋提希說十六妙觀故得一生取辦今觀經現存若結淨侶同修任各志願於十六觀中隨取一觀或單觀佛及菩薩妙相或觀淨土境界如彌陀經說蓮華寶地等隨意觀想若觀想分明則二六時中現前如在淨土坐臥經行開眼閉眼如在目前若此觀想成就臨命終時一念頓生所謂生則決定生去則實不去此唯心淨土之妙指也如此用心精持戒行則六根清淨永斷惡業煩惱則心地清淨觀念相繼則妙行易成淨土真因無外此者若但口說念佛求生淨土若淨戒不持煩惱不斷心地污穢佛說是人永不成就是故行人第一要持戒為基本發願為助因念佛觀想為正行如是修行若不往生則佛墮妄語矣示念佛參禪切要念佛審實公案者單提一聲阿彌陀佛作話頭就於提處即下疑情審問者念佛的是誰再提再審審之又審見者念佛的畢竟是誰如此靠定話頭一切妄想雜念當下頓斷如斬亂絲更不容起起處即消唯有一念歷歷孤明如白日當空妄念不生昏迷自退寂寂惺惺永嘉大師云寂寂惺惺是寂寂無記非惺惺寂寂是惺惺亂想非謂寂寂不落昏沈無記惺惺不落妄想惺寂雙流沈浮兩捨看到一念不生處則前後際斷中閒自孤忽然打破漆桶頓見本來面目則身心世界當下平沈如空華影落十方圓明成一大光明藏如此方是到家時節日用現前朗朗圓明更無可疑始信自心本來如此從上佛祖自受用地無二無別到此境界不可取作空見若取空見便墮外道惡見亦不可作有見亦不可作𢆯妙知見但凡有見即墮邪見若在工夫中現出種種境界切不可認著一咄便消惡境不必怕善境不必喜此是習氣魔若生憂喜便墮魔中當觀惟自心所現不從外來應知本來清淨心中了無一物本無迷悟不屬聖凡又安得種種境界耶今為迷此本心故要做工夫消磨無明習氣耳若悟本心本來無物本來光明廣大清淨湛然如此任運過時又豈有甚麼工夫可做耶今人但信此心本來無物如今做工夫只為未見本來面目故不得不下死工夫一番方有到家時節從此一直做將去自然有時頓見本來面目是出生死永無疑矣示海濶禪人刺血書經禪人發心書華嚴五大部經特禮匡山請益老人因示之曰毗盧遮那安住海印三昧現十法界無盡身雲說華嚴經名普照法界修多羅若正報身諸毛孔中放光明說若依報世界草芥微塵則塵說剎說如是演說盡未來際無閒無歇如是之經充滿法界所謂一字法門海墨書而不盡今子以有限之身心涓滴之身血若為而盡書之耶雖然此經果不能書則一切衆生絶分矣且曰法界之經則凡在法界無非此經若悟毗盧以法界為身則自己身心亦同法界此則日用現前動靜語默拈匙舉筯咳唾掉臂皆法界之大用是則何莫而非書寫此經之時耶若身同法界則一一毛孔皆悉周遍如是則舉一滴之血當與性海同枯矣所以普賢大士剝皮為紙柝骨為筆刺血為墨量等法界是則全經不出一字即書一字亦同全經何況百軸之文禪人苟能作如是觀則自書者與見聞者及禮拜讚歎一香一華而作供養乃至執勞運力者無不同歸法界如是功德豈可得而思議禪人若無如是眼作如是行亦不免揑目見空華豈不重增顛倒想耶示曹溪沙彌能化書華嚴經佛云佛種從緣起是故衆生正因佛性本具但以無明堅固不遇善緣終不能發如種子在地要假雨露陽和之緣方能抽芽發幹乃至開花結實耳老人未至曹溪諸沙彌所習世俗之業且不知有佛有僧安知佛法哉自老人開化種種方便誘引教導始則知為僧矣既而以佛性難明先教書寫華嚴大經使知親近隨順佛法信心若發方可引入佛慧初則二三其人自是人人相望發心不十年閒書此大經者已成十餘部六祖入滅已來千年今日之事從前所未有也佛性人人本有恆沙功德人人本具以無知識開導皆以性德而造惡業招三途之苦報若悟此佛性則轉惡業而為無量淨土莊嚴今沙彌能化能以造業之心轉為淨土莊嚴作成佛真因所謂智種含於心地遇法雨慧日之緣故能發菩提芽生長善根抽功德枝開萬行花將來必成菩提妙果此正所謂佛種從緣起也老人往往開示曹溪諸弟子等若從此人人勇猛發無上心有志佛法究明己躬大事即如六祖住世時發明自心者千人之中豈止三十餘人而已耶是在遞相轉教之功耳示惺初元禪人書經性元禪人來參匡山老人字之曰惺初發願書寫大經老人因示之曰出家修行佛說方便多門固在各各發心何如耳第一向上參禪求明自心志了生死次則深窮教海志願宏通護持正法續佛慧命又次則深厭生死專心淨業願生西方此皆理行為最上者若夫事行種種至於書寫經典乃六種法師之一是佛稱讚者故法華說持經法師現世肉身得六根清淨此豈事行可擬哉且云舉手低頭皆已成佛此稱性之行又豈可以描抹點畫致耶老人昔住五臺曾刺血泥金書寫華嚴大經每於書寫之中不拘字之點畫大小長短但下一筆則念佛一聲如是點點畫畫心光流溢念念不斷不忘不錯不落久之不在書與不書乃至夢寐之中總成一片由是一切境界動亂喧擾其心湛然得一切境界自在無礙解脫門乃至一切見聞無非真經現前以此證之則書經之行妙在一心不亂又豈若童蒙抹硃便以書經求功德耶禪人試以此行如是書寫如是受持似有少乃相應若以描寫為妙行博名高為求供養之資則又不若尋常粥飯為無事僧也勉之示昭凡庸禪人庸禪人往參老人於五羊嘗示以無生之旨頃來謁匡山見其為道之志彌篤而參究工夫未純以未把作一件真實大事耳老人因示之曰古人學道第一要為生死心切不是要求𢆯妙道理也所言生死者何即吾人日用現前種種塵勞境界中遇境逢緣若逆若順內心習氣引發現行起愛憎取捨等種種妄想分別心也以念念攀緣起善惡等種種業行都作未來生死根株以妄想無涯故生死無際所以衆生長劫流轉生死苦海無出頭時良由不知自心之過也故云若不了自心云何知正道古今學道人有志出生死者單要求明自心耳以此心一向粗浮如沸湯烈𦦨未常一念清冷故古人權設方便將一則公案教學人念念提持參究如僧問趙州狗子還有佛性也無如永明教人審實念佛的是誰即此一無字誰字便是斷生死命根之利劒也然此參究審實只是此無字誰字起從何處起落向何處去只看者一念起落處要見起滅根源若參到極則處將一念生滅妄想迸斷打破漆桶頓見本來面目到此便將佛祖向上鼻孔一時盡在自己手中從此識得本來人更不疑張三李四恰元來是自己本命元辰如是有何𢆯妙可求又何必向他家屋裏求耶然此一著若不是最初發心為生死切任你做盡伎倆都是鬼家活計縱有一知半見都是魔說凡有所作皆是魔業可惜百千萬劫難遇一段大事因緣也禪人果有志此事直須將自己胸中從前世諦伶俐聰明知見及種種妄想一齊折合歸向到一念上做將一句話頭作橫空寶劒斬斷從前妄想如斬亂絲果能如是下毒手做苦切工夫若無真實悟處則從上佛祖皆墮妄語矣所最忌者唯是無真實心只將參禪做面皮說好看話耳示履初崇禪人禪人生長豫章素有向上志聞老人逸老匡山遂棄世諦緣潔心來參因留入衆隨時入室久之察其多軟暖之習而骨氣不剛故入道之心不猛居常䇿其不逮一日拈香請益老人因示之曰子有向道之志而無振拔之氣者以心力不純故骨不徑骨不徑故無剛毅勇猛之志所謂中無主不立耳所以中無主者以第一無真實為生死心故無決定久遠不退之志既無決定之志則一切趨操無特達之行所以因循舊習悠悠日月但守閒散任意以為自在無拘於心既不知撿而於四大幻身亦無支持之力故日用現前全無真實工夫亦無真實受用耳從今日去先要發一片真實為生死心立一定久遠不退之志盡此形壽決定要究明己躬下一段大事畢竟要齊古人方不負此生平要如古人必以一則公案為參究話頭如永明大師念佛審實的公案最為穩當即將心中從前一切夙習知見妄想思算一齊放下放到無可放處單單提起一聲阿彌陀佛即看此念起處審實者念佛的是誰且念且審又審又念靠定一念審實得力處便覺心如墻壁究到究不得處便是得力時節如此久久參究參到心無用處如老鼠入牛角時忽然一念迸裂便是了生死的時節也子能如是用心如此著力自然骨剛氣猛名為挺特丈夫視前軟暖之狀真日劫相倍矣子其勉之示慧鏡心禪人吾佛說法以一心為宗無論百千法門無非了悟一心之行其最要者為參禪念佛而已而參禪乃此方從前諸祖創立悟心之法其念佛一門乃吾佛開示三賢十地菩薩總以念佛為成佛之要十地菩薩已證真如豈非悟耶然皆曰不離念佛念法念僧善財參五十三善知識第一德雲比丘即單授以念佛解脫門及至末後參見普賢為入妙覺善知識乃專回向西方淨土云親覩如來無量光現前授我菩提記由是觀之即華嚴為最上一乘而修稱法界行始終不離念佛十地聖人已證真如尚不離念佛而末法妄人乃敢謗念佛為劣行又何疑參禪念佛為異耶是闕多聞不知佛意妄生分別耳若約唯心淨土則心淨土淨故初參禪未悟之時非念佛無以淨自心然心淨即悟心也菩薩既悟而不捨念佛是則非念佛無以成正覺安知諸祖不以念佛而悟心耶若念佛念到一心不亂煩惱消除了明自心即名為悟如此則念佛即是參禪若似菩薩則是悟後不捨念佛故從前諸祖皆不捨淨土如此則念佛即是參禪參禪乃生淨土此是古今未決之疑此說破盡而禪淨分別之見以此全消即諸佛出世亦不異此說若捨此別生妄議皆是魔說非佛法也示修六逸關主余初度嶺至五羊時菩提樹下弟子修六逸公即相率同輩歸依乃至出嶺之南嶽遊吳越相從於艱難困苦中始終二十五年未嘗少閒及余歸隱匡廬公素為生死心切志求向上亦相從於金輪峯頂閉死關三年單提一念幸有自信之地今以省師歸故山拈香請益老人因示之曰出家為生死求向上一路乃本分事禪人死關三年其於放下身心抖擻客塵煩惱消磨習氣乃最初一步業已自信但於參究生死病根未能頓拔以參禪先須識取生死病根方能用藥調治耳何謂生死病根以貪瞋癡慢皆以我見而為根本一切聖凡二種生死皆因執我然我依見立是則妄見乃我執之本稱為法身之刺見刺不拔生死難出是以一切凡夫執身心人我是非之見一切外道橫執邪見二乘聖人執生死涅槃欣厭取捨之見一切菩薩執有生可度有佛可求之見等覺聖人未忘佛見法見故有二愚乃至祖師門下初學參禪者則多先起待悟之見於未悟中妄起未得謂得之見及有一念狂心暫歇處即執為妙悟便生得少為足之見即將古人言句攀扯回為己解執為𢆯妙之見以此蘊集於懷不肯唾却久之釀成毒藥以致誤墮邪見縱有一念頓悟自心本來無物則又墮在光影門頭以為究竟之見所以雲門道只饒得到法身為法執不忘己見猶存墮在法身邊謂之抱守竿頭則永無超脫之見總之但有絲毫情見未除皆是生滅邊收通是生死病根縱然悟得尚屬生死故云悟之一字亦須唾却何況全未了悟但依希恍忽便起知見自以為得即將古人現成語句把作自己妙悟此皆墮自欺全非真參實究功夫如此用心皆是未識生死病根之過也所以古德云不用求真唯須息見苟知見消亡不真何待所以佛示阿難云見見之時見非是見見猶離見見不能及此其究竟窮元單以見為生死病根以從法身而起妄見見有身心世界而沈生死故今以離見為出生死證法身之極則也馬鳴大師示人以離念為真修實證以因念有見若見謝則念自離妄自泯矣是知貪瞋煩惱之病根淺唯獨見刺之病根深最為難拔故參究工夫煩惱易斷習氣難除習氣不除則妄見潛滋妄見滋則縱有悟處皆成習氣以成魔見矣所以棱嚴經中說見魔最深隱而難知也禪人有志真參實究直須看破切不可墮在知見網中正當做工夫時只將趙州無字與六祖本來無一物同參於未提起時先將身心內外一齊放下放下又放下放到無可放處透底看者無字畢竟有什麼氣息才有一念起處當下一定看他畢竟是個甚麼如此安身立命在話頭上靠定深錐痛劄一念不移如老鼠咬棺材自有透脫時也切不得將古人公案言句蘊在胸中將來比擬以擬心即錯決不是古人見處至於尋常應緣時只將話頭靠定歷歷孤明自然不被境風搖奪乃至與人接談時切不可將古人公案作自己知見以資談柄此一種病根最深以正當說時直圖爽快全不知不是自己本分事以此縱心矢口全不曾回頭照看所以不知是病若養成此病則將為大我慢魔乃狂魔之所攝持今目中所見緇白好禪者比比皆然不可不懼也古人參禪無別𢆯妙只是肯將凡情聖解一齊掃却放得胸中空落落不留絲毫知見作主宰知見不存則真見發光自然了無一物矣如此放下時則當人一念如大火聚一切塵情習氣一觸便燒如紅爐片雪絶無影跡可留回觀一切知見邊事如說夢耳所以道參禪無訣法只要放得下若放下一念則一念真實若念念放下則念念真實若徹底放下則盡未來際徹底真實矣公行矣能不忘此叮嚀之言則與老人眉毛撕結未常有絲毫閒隔時也嗟嗟老人老矣儻負此緣錯過此生則再求今日之緣又不知幾千萬劫也示慧𢆯興後禪人東海佛法不行之地自靈山桂峯師開化令捨邪歸正者不少老人昔居海印寺歎師法利之盛其諸弟子能說法者居多今學人興後乃嫡孫也老人別靈山二十有八年矣辛酉歲後來參匡山改歲後辭歸故山請益修心法要老人因示之曰佛最所訶者煩惱所知二種障為生死根本然煩惱障乃貪瞋癡愛為凡夫生死根本所知障乃佛法知見為三乘聖人生死根本苟二障不除則衆苦無由得出也嗟今世人不知佛法者固無足怪即學佛法人不斷除煩惱又以所學佛法為所知障生長我慢重增煩惱心地染污種子觸發現行放逸身心毫無撿束循情造業豈非大謬耶學人今聞老人開示知為生死大事發心參求本地工夫此乃最勝願力但今參究工夫不用別求只要將胸中舊有習氣種子一一打點乾乾淨淨不許觸發現行就於日用對境逢緣起心動念處當下看破不許相續其用心下手只如棱嚴經所說觀音耳根圓通旋倒聞機返聞自性一則觀門最好用心若於日用見聞處果能返觀自性則不隨外境流轉如此念念返流則念念是歸真之路如此用心若習氣不除觸發現行定不得力此全在違現業一著為最上行也然又必要為生死心切乃肯下死工夫耳學人實為生死真切用心乃有受用不是說了便休作一種佛法知見也示淨心居士往老人過吳中淨心居士參禮請益老人示之以念佛法門以念佛如水清珠能清濁水故以淨心為道號別數年矣今書來云念佛難成一片復請開示老人因示之曰修行第一要為生死心切生死心不切如何敢云念佛成片且衆生無量劫來念念妄想情根固蔽即今生出世何曾一念痛為生死日用念念循情未常返省今欲以虗浮信心就要斷多劫生死所謂滴水救積薪之火豈有是理哉若果為生死心切念念若救頭然只恐一失人身百劫難復要將此一聲佛咬定定要敵過妄想一切苦念念現前不被妄想遮障如此下苦切工夫久久純熟自然相應如此不求成片而自成一片矣此事如人飲水冷暖自知告訴不得他人全要自己著力若但將念佛做面皮如此驢年無受用時直須勇猛更莫遲疑示仁天老宿持法華經仁天大德誦法華經二十餘年將行請益因謂之曰法華最上一乘乃吾佛久祕之要為授記諸弟子之券書也六祖云心迷法華轉心悟轉法華誦經不解意與義作讐家二十七祖云入息不居陰界出息不涉衆緣常轉如是經百千萬億卷如上二祖所說仁天畢竟如何持此經耶經云是法非思量分別之所能解如是則六祖縱許解意亦未能持又云此經開方便門以示諸法真實之相如是則山河大地草木瓦石無非實相縱若二十七祖離出入息亦未能持然則仁天畢竟如何持耶如佛所說持品乃至展轉第五十人轉教持經功德不可思議由是觀之轉教之功不論解義不解義離息不離息但能一念信心自知本有則慧命不斷由是老人最讚青蓮法社以持法華為妙行也以一聞此經便下成佛真種仁天以此轉教多人能如佛所讚歎更有何法過於是乎示沈大潔禪淨二行原無二法永明大師示之於前矣禪本離念固矣然淨土有上品上生未常不從離念中修若曰念佛至一心不亂豈存念耶但此中雖是無二至於下手做工夫不無巧拙以參究用心處最微最密若當參究時在一念不生若云念佛則念又生也如此不無兩橛念就參究念佛處打作一條要他不生而生生即不生方是永嘉惺寂雙流之實行也何耶若論參究提話頭堵截意根要他一念不生如此雖是參的工夫古人謂抱樁搖櫓只者要他不生的一念是生也豈是真不生耶只如念佛若將一聲佛號挂在心頭念念不忘豈是真一心不亂古人教人參活句不參死句正在生處見不生意如經云見剎那者方悟無生即此一語則參究念佛當下可成一條矣道人諦聽參究念佛此中易落淆訛不可忽也如何參究即念佛念佛即參究耶如今參究就將一句阿彌陀作話頭做審實工夫將自己身心世界并從前一切世諦俗習語言佛法知見一齊放下就從空空寂寂中著力提起一聲阿彌陀佛歷歷分明正當提起時就在直下看覷審實此念佛的是誰重下疑情審之又審疑之又疑如驢覷井覷來覷去疑來疑去疑到心思路絶處如銀山鐵壁無轉身吐氣處是時忽然磕著觸著真無生意忽然猛的現前時則通身汗流如大夢覺到此方信生即無生無生即生參即是念念即是參回頭一看始知向來如在含元殿裏覓長安也如此做工夫最怕將心要悟才有要悟的心便是攔頭板也只管一直做將去不計工程即到做不得時則打起精彩又從新做起又切不可貪求𢆯妙即有一念暫息寂靜歡喜切不可當作好處直須吐却切不可將佛祖𢆯言妙語來作證當作佛法又不可墮在無事甲中以此為得總之一切聖凡迷悟都不管單單只是追求一念下落追到趕盡殺絶處久久自見本來面目如十字街頭見阿爺更不向人問覓也看來此事元是人人本分上事更無甚奇特處道人真真實實為生死大事試從此下手決不相賺
