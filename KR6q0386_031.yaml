body:
  text: 侍者福善日録門人通炯編輯嶺南弟子劉起相重較題跋題瑞之麟禪人刺血書華嚴經後在圜中作雜華統法界之經也直指毗盧果海性德圓融無礙廣大自在細微莊嚴以示衆生日用現證平等心地法門欲因之以廓塵習昭真境不離當處頓得無量受用耳觀夫佛等衆生等剎土塵毛染淨等劫念往來三際等迷悟因果理事等法爾如然居然自在其所以不等者良由吾人自昧於一念之差究竟有天淵之隔所謂情生智隔想變體殊故曰奇哉奇哉一切衆生具有如來智慧德相但以妄想顛倒執著而不證得若離妄想執著則自然業智當下現前如一微塵具含大千經卷智人明見剖而出之則利用無窮由是觀之無論衆生心具不具只在當下眼明不明耳豈更有他哉是以文殊舉之以為智普賢操之以為行善財挾之以發心彌勒帶之而趣果四十二位之各證五十三人之全提月滿三觀星羅十門行布圓融事理無礙以極塵毛涉入依正互嚴種種言詮重重法象火聚刀山之解脫臥棘牛狗之堅持乃至異類潛行分身散影無非遊刃微塵之利具也由具利則塵易破塵破則經卷出經卷出則性德彰性德彰則果海足果海足則無不足矣斯則六千道成於言下猶是鈍根三喚普賢於目前豈為智眼信乎聾瞽封蔀識情衆生日用而不知也知則根塵識界草芥塵毛通為法界真經屈伸俯仰咳唾掉臂總是普賢妙行以如是經海墨積書而不盡以如是行日用現前而有餘只在當人一念回光返照之力耳今麟禪人用滴血書此經是明見而後書之耶抑因書而後明見耶猶然書之欲見而未及見耶若明見而後書則不待操觚全經已具如臨寶鏡又豈淋漓翰墨區區於簡牘文字之間耶若因書而後明見則現前日用妙境全彰似懸珠網又豈昏沉業識茫茫於水月空華之界耶若書之欲見而未及見則析骨為筆剝膚為紙刺血為墨點染太虗揮灑金屑豈不重增迷悶枉歷辛勤一葉落而天下秋回管灰飛而大地春起是則書與不書全經自在見與不見明昧一如悲夫夜壑藏舟力者負之而不覺覺則透出毗盧全彰法界昭昭然毫端眉睫之間物物頭頭而與普賢交臂也休師有言華藏性海與我同遊者舍子其誰歟否則暫閉閣門試請回途重參曼室大士子行矣無忘所囑題書華嚴法華二經後毗盧遮那證窮法界富有無量功德之藏是與一切衆生同有而應得者故視一切衆生如一子地必欲全付自得所有而始快雖衆生茫昧而不覺乃設無量方便種種調伏必使諦信不疑而後已譬如長者具有無量富饒止有一子幼而逃逝子雖背父而父未嘗一念忘子也日月既久子以傭賃歸來而不識其父父既知子必降身辱志與子同事相親而漸通其情實直至心相體信父子情忘然後親為囑書全付家業而後死方無憾也由是而知雜華乃我如來法界藏中之典記法華如長者委付家業之囑書入此二種法門方為克家之子也善男子吳大靜手書二經豈非能知本有料理如來家業者耶由是必有應得之日矣刺血書金剛般若經跋般若出生諸佛故為諸佛母而為衆生之佛性是則般若所流源源無盡如海水潛流四天下地諸佛衆生覿體無二是知衆生四大根本身肉骨血皆般若所流遡其本源一體無二居士賀學仁氏刺血書寫金剛般若以報其親如引細流而歸於海可謂善於返本而報本者也世之言大孝者能有過於此者乎又梵語般若唐云智慧此乃一切諸佛衆生之大本也迷之為生死悟之為涅槃諸佛證之為根本智衆生背之為無明流其實體一而明昧異耳故我世尊出世特為開示此智以法大機小不能領荷故二十年後方說此經業已多方開示必欲諦信此智而不疑用為成佛根本而此經以金剛名者以智乃佛之所證金剛心耳方將以果地覺為我因心故以般若為入大乘初門是知特以金剛名經非假喻也嗟乎一切衆生迷此本智流浪生死其來久矣觀者但以經義深奧文字重復為不易入殊不知以空為宗以頓斷疑根直心正念為本原無文字可立故黃梅以此印心我六祖大師一聞應無所住而生其心便能頓破歷劫疑根及見黃梅即能道本來無一物是乃從此經得入之第一榜樣也是則此經為禪宗的訣學者槩以文字目之故知之者希惜哉末法正眼難逢今愈見其難也經云若有讀誦受持書寫者不於一佛二佛三四五佛而種善根已於無量萬億佛所種諸善根由此觀之即信受書寫亦非淺淺因緣也曹溪沙彌方覺刺血書此卷冀終身受持焚香作禮請豫題記因感而言曰六祖入滅千年曹溪道場化為狐窟即出家兒為樵兒牧豎矣豫來力救其弊辛苦十年修崇梵宇漸次可觀而魔僧作孽內自破壞人且謂佛祖無靈即豫亦無以自解也今見沙彌方覺乃能刺血書此經則豫心渙然氷釋矣何也以經云若人以七寶莊嚴恆沙佛土不如受持此經一四句偈以彼有為功德終成敗壞不若無為之勝益也以此般若為成佛真種子故佛言若使一人發菩提心寧可我身受地獄苦以其信心難發也今覺沙彌一人能以般若為心實豫十年辛苦所致又何以修崇有為功德為重而以成壞為念乎因有感於此故併記之題三峰禪人血書法華經衆生迷佛知見遠逝五道周流惡趣其來久矣釋尊出世特為開示使其悟入警其歸志政若慈父念子望其委付家業故說此經使人速達故鄉耳昔有老宿繫蓮經七軸於梁間人或問之答曰此家書也常熟三峰比丘刺血書寫此經豈特見家書而思歸者邪良以幻化空身即法身此經已有如來全身今以血書如世之真子辨嫡父血滴枯骨必見滲入是則楮乃法身之枯骨乎因贅以偈輕拋故國不知年一紙家書特特傳囓指忽然心痛處思歸徹夜不成眠題公全禪人血書法華經後惟我本師和尚遠自大通智勝佛時為十六王子講說此經已下一乘成佛之種而諸聞者迷淪塵點劫來流浪生死直至今日靈山會上方乃悟入各為受記將來成佛是為一代時教究竟之極談譬如窮子久逝他方今始歸來見父心相體信堪荷家業此經大似長者委付家業之囑書故云凡有聞法者無一不成佛是以天台獨重五種法師受持讀誦書寫者皆為成佛之真種以其一悟此心從真所流則凡有所作皆真實行殆非妄想攝持者比也今公全禪人發無上心刺血書寫此經則使幻妄身血滴入法性海中等同一味莊嚴毗盧法身之果而又發願更書華嚴大經以為究竟莊嚴是猶窮子既得家業之囑書則披閲庫藏之典記按圖求索是則華藏世界無盡妙好莊嚴皆禪人本有受用之大業如此豈非究竟一大事因緣哉禪人親持所書之經具陳本願請益老人故為具述本末因緣如此血書梵網經跋梵網經者乃我法王應運首創之露布也即其所制皆性戒耳故三藏之設從凡至聖所歷諸位皆依金剛心而建立之此戒即所謂金剛心實成佛之大本緬惟吾人遭此末法去聖時遠苟願出生死證真常非此戒不足以證之然此戒非金剛心又不足以持之蓋一切衆生所以久沉生死而不能自出者良由著我以我見重故諸業交作業作故苦即隨之如影響形聲理不可逭故修行要門無論大小三乘皆以破我為本我空而業無所繫然破我之具非金剛心斷斷乎難矣諦審佛意既曰戒乃自性清淨心又何持犯之有第迷之而為幻妄蘊蓋情塵所蔽不得不揭而祛之此戒乃裂見網之利器不得不施於最初之創而初學菩薩即上根利智不得不秉此為最初地也學人真照以夙習般若緣深自願出家依吾法兄雪浪聽習有年謁余於那羅延窟余政悲末法務本者希乃為諸弟子誦梵網戒照聞而有感遂哀請授戒且發深重大願刺舌根血書此經志畢命受持余深慨焉因謂吾本師盧舍那佛從初發心以至成佛精進不退以不可說不可說身命而為布施剝皮為紙析骨為筆刺血為墨書寫經典積如須彌為重法故不惜身命子苟知生死難出愛根難斷佛果難期依佛所行如佛所願又何患不成佛從此以往生生世世以此身血書寫此經當布滿大千又不止如須彌之高廣即見聞隨喜發心修學者當如菽粟遍十方剎土又何止此一會一人一衆而已耶子宜勉旃特書此以證子之願仍願此經至盡未來際當處處現身如多寶也子其志之重刻華嚴經題辭毗盧老人於一微塵裏冷坐不禁於青天白日忽爾盹睡墮入緣生妄想夢中引起歷劫情塵種種幻網境界盡無盡大光明藏重重交羅如天地簾珠互遞影像炳然歷別且自生大奇特想亦乃驚怪普告十方一切天人極十虗為口門以大地為長舌說夢中事使諸聞者瞪目相視有眼者盲有耳者聾其登地大士自負親為當家長子親履其中尋無一物了不可得轉展告之傍人但云如空中鳥跡耳禪人乃又願於一毫端頭欲令人頓入此中蓋亦難矣雖然大地衆生無一人而不沉埋此一塵也只須大智慧人冷眼生華妄想恁麼如是如是種種奇特莊嚴且在一切衆生日用妄想網中種種光明時時頓現各各日用而不自知所以不知者但夢未破耳今於路傍草莾間猛地一人𨁝跳攘臂大呼頓使十方世界六種震動同時各各相謂歎曰奇哉奇哉不知此中果有如斯大希有事遂剖而出之大家𢹂手通同遊戲自在無礙無所希求竟亦不知誰之力也知恩者當自重之菩提心願文跋一切聖凡皆本自住金剛心地具足如來不思議智但以習氣熏發轉變之力而得成熟故一切衆生各各八識田中具十法界種子特隨緣熏發故先後遲速不同耳華嚴經云菩薩有十種習氣見佛習氣於清淨世界受生習氣行習氣願習氣波羅蜜習氣思惟平等法習氣種種境界差別習氣若諸菩薩安住此法則永離一切煩惱習氣得如來大智慧習氣非習氣智故知染淨二業升沉兩門皆從熏習而生不是無因而得是知從上佛祖善知識教人原無實法與人亦無法可傳可授但凡有親近者獨觀其染淨習氣之厚薄因其病而調伏之惟執勞辛苦三二十年耳提面命朝夕參承乃至困辱萬端逆順千狀種種施設無非以大般若光明熏蒸無明業習令其轉染成淨使其自知本有耳苟能自知其本有智光內自熏發日增月盛一旦如大火聚則向之煩惱業習燎之如紅爐片雪如此則日用頭頭遇境逢緣皆大智用是所謂轉染污業習而為般若智習矣若轉之淨盡徹底窮源與十方佛祖轉處無別則但印可之曰如是如是惟此而已豈此外更有別法耶由是觀之則從上三賢十聖皆能轉之而未盡者故從般若所發十種習氣為金剛種子以之劫劫生生熏變無明不淨不休終竟透皮而出此所以毗盧世尊重願行也德宗始發跡於蒲從法親妙峰師因得事老人於清涼以至海上將二十餘年矣所歷辛苦不可殫述為法懇誠之心未嘗一念稍間老人唯以不思議智炬照之而已竟未一啓齒向上事也待其自信自肯方不自負己靈耳渠以本願請老人為敷揚者有年老人未之首肯甲午冬日從老人於京之大慈壽寺雪夜請益哀泣自敘其志願云云老人為信筆書此明年春二月老人即以弘法因緣致聖天子怒逮及於渠實出九死余戍雷陽宗復自蒲萬里問老人於瘴海間相值五羊乃出此卷老人展之則見其光明奪目也遂贅之以此普賢行願品題辭毗盧遮那如來居華藏界菩提場中為地上菩薩說華嚴經有三千大千世界微塵數偈一四天下微塵數品即龍勝大士盡出世間智不能數其品目而此品者略本之略本也惟我盧舍那如來曠劫所修廣大因行所感華藏世界殊勝莊嚴其因地本行不出普賢十種大願而此願者乃稱法界心極法界量包攝無遺故曰願王然修行之要成佛之速無越乎此所謂一念消滅無量惡業一念成就無量善根者譬若金轉輪王夢入阿鼻地獄受大劇苦無可哀救怕怖慞惶奔馳狂呼欲逃而不得一旦叱咤極力猛醒向之苦事求之而不得現成受用種種本自具足此所謂夢幻法門以智而入唯在自心不假外求故曰心淨則佛土淨門人鄭擴發菩提心歸依淨土余教之以專誦此品一旦生死夢破何患不覩華藏現成受用乎題安樂行品後豫少讀四教儀見天台大師判五種法師為觀行位竊有疑焉既見法門之有以持經為行者動則誦法華經百千部及察其律身持心多未能與經㳷合是知持經之難矣及豫述法華通議至佛讚法師之功德有供養者其福過於供佛有毀謗者其罪重於謗佛此我世尊金口誠言及見持經之法師現在父母所生肉身即得六根清淨按六根清淨當在七信菩薩不退者以永不退墮生死也何持經之功一至此邪是知持者不在紙墨文字而在離言妙契佛心佛之慧命由是相續而不斷者宜其功德殊勝然矣某人受持此經於安樂行中有所契入故專持之此乃世尊教諸末法持經弟子第一妙行即如來之家法也從是而入法華三昧悟佛知見固無難矣題刻藥師經後經以藥師名者蓋依本佛而稱也至聖無名以德彰名然佛為三界醫王善治一切衆生心病故稱醫師是則一大藏教乃對症之妙藥而衆生之病以癡愛為根病根不除而欲出生死渡苦海者詎可得乎問曰經云求官位得官位求男女得男女求長壽得長壽求安樂得安樂皆衆生之癡愛也佛意本欲衆生離之今有求而必遂者豈非增益癡愛耶答曰非增益之實欲離之耳以衆生不信自心是佛故顛倒迷途溺於愛河佛以廣大慈悲而拔濟之不能頓出特設方便以引攝之即其所愛而誘進之所謂以楔出楔以毒攻毒故云先以欲鈎牽後令入佛智則世間之愛可潛消而默化矣衆生始以不信自心之惑如貪財者而夢金寶生大歡喜致大欲樂且金寶欲樂豈自外至耶衆生處此夢宅種種希求佛以如夢幻法門而調治之癡愛重則信佛愈極信至極則自心癡愛化而為佛知見矣又如置酵於乳而成酥酪必轉醍醐此經是佛以醍醐甘露之藥施衆生能服之者豈不頓祛百病獲長壽哉居士劉嶠刻經以施多人正若長者於四達通衢以妙藥施人但能信受而服之者則心病頓瘳而隨求必應其藥師之號豈虗稱哉既信自心則觀此經不屬紙墨文字矣白衣陀羅尼經後跋白衣陀羅尼經乃我圓通大士從大悲心中實際流出故世之善男子女人苦於無嗣志心持此求無不感應如響且往往應之者非一而不信者亦非一又有持而不應者亦非一此何以故以我大士依本師觀音如來授如幻聞熏聞修金剛三昧現三十二應身十四無畏功德與十方三界六道衆生同悲仰故法界衆生欲求男者誕生福德智慧之男生者皆白衣重胞以示大士不誑衆生之也雖然此男者果何自而來耶若即大士現身而大士不迷安得所生之男一一如慈悲現身之士若非大士現身又何以求大士而得生此理難窺故信之者希不知大士既與一切衆生共一悲仰是則大士悲仰之心即衆生願求之心也其求者果如大士之心而大士之心亦即求者之心如鏡交光影影互現又如谷響聲叫聲應未有自心而不應自心者故曰自心取自心非幻成幻法是則所求之男實是求者自心所變現不如是求故不應耳所以求而得智慧福德何也蓋尋常男女純以淫欲之心求之故多愚癡原非智慧心所生也今不以淫欲心求而求之於大士則是原出智慧智慧福德之本也所生福德智慧之男所謂聲和響順形直影端其理無疑也子寅周伯子篤信此法一日入山焚香作禮乞書此經然我亦從大士耳門而入三昧者第恐子寅不能作如是觀故書寫已又從而解說之跋姜大隱百城煙水卷余嘗讀清涼傳至無著入金剛窟與文殊茶話間見諸大士自雲中冉冉而下因問此衆龍象何自而來殊曰此吾窟中一萬眷屬各於十方世界利生緣畢而歸也又問世何不知殊曰或現帝后妃女國太母身或現宰官居士黃門長者比丘僧尼隨類皆入化化無窮安可以迹較之耶今觀聖慈御筆賜姜常侍百城烟水卷及諸大宰官題咏詩則不必更疑文殊也姜公別號大隱為慈寧宮侍中其所以荷擔如來輔弼聖化建立三寶者功最居多故能獲此密印不減髻珠之賞公當持此以為利生之券他日歸來窟中想文殊見之必合符也佛頂尊勝陀羅尼呪跋諸佛同證祕密心印得成無上菩提含之以為三德祕藏吐之以為萬行莊嚴持之以為利生事業誦之以為潔己妙行是故一切諸佛因之而成道一切菩薩因之而轉邪此則凡所謂密呪者皆稱尊勝而此呪者出自毗盧灌頂為法身所演又尊勝中之尊勝者也若書之幡幢風之所到影之所臨觸之者皆能離苦得樂又況行之持之於心含之而為心印者耶故首楞嚴曰若有衆生欲習難除但當一心誦我佛頂光聚祕密神呪淫火頓除如湯消氷應念化成無上知覺噫一切衆生皆以淫欲而正性命今一持此呪則命根頓斷生死永離又何況彼區區貪瞋癡慢不化為無上菩提真種子耶行人明寬持此有年今乞海印老人書寫此卷將終身佩帶持誦不忘老人嘉其志行助其堅強乃為書之又贅之以此將以策前程示來學者八大人覺經跋此八大人覺經豫昔居海上時時書示弟子輩持誦今來忘矣昨達觀師偶以元雪菴大師擘窠大書刻本寄豫讀之恍然如覩故物一向藏之篋笥未嘗拈出示人茲小金山鏡心上人偶持此冊來乞書法語余乃躍然為書此經一過因歎曰此足以占感應道交時節因緣所會耳佛為衆生說法唯待機宜故曰久默斯要不務速說所以未曾說說時未至故豫初入未見有僧徒酷嗜佛法者偶一日過金山上人乃持所請諸名公共書四十二章經一冊請豫跋語自是緇白弟子書四十二章經者數人豫因為菩提樹下新學沙彌講說一周得聞此經者不啻百什人矣其機蓋自上人發也此經乃一切世間諸天及人所希聞者豫生平喜以此經施人而獨於此地其機不發今又因上人而發之其事蓋亦奇矣何也以佛說法唯待機而動迫不得已而後應如洪鐘受隨扣而響是知此段因緣非特爾也良以一切衆生寢此大光明藏而沉瞑於長夜之夢從來不覺久矣非大覺不足以破大夢非破大夢不足以稱大人不唯能覺人者為大人而能奮力勇猛自覺者亦大人也是則能大覺而後為大人唯大人而後能有大覺以一念之覺而破永夜之夢豈細事哉嗟乎豫觀大地衆生同稟此覺無非大人第無大人以開覺之耳吾佛世尊獨稱大人其靈山一會英傑之士與夫拈花之破顏少林之面壁以至六傳五派千七百人皆所稱自覺覺他而為有力大人者也是皆與人同耳嗟乎一切衆生皆證圓覺所以迷悶而不入者非覺違拒諸能入者要之於此八法不能覺悟故於生死關頭不能掉臂由此甘受沉淪驅馳苦趣伶跰辛苦客作賤人不能得稱為大人耳上人能傑然觸發此機豈非千金之子流落窮途一旦而發思歸之念者耶今吾所書此八大人覺經實鴈足家音展之即得故鄉消息試時時展之勿暫忘歸計致慈尊盻盻於常寂之鄉而倚般若之門也釋迦觀音志跋釋氏之學以全體大用盡法界量為極則所謂毗盧遮那海印三昧威神之力平等顯現是故一切諸佛之始終一切菩薩利生之事業乃至世諦語言資生之業無不從此三昧流出而有廣大不思議力福慧莊嚴皆悉具足乃見法界之妙且一切聖凡統不出此是知吾祖乃三昧中之一人所輯釋迦觀音二志乃述三昧之境界轉為利生之方便即述一代時教之法門又為三昧中之三昧豈可以世諦文字目之哉智者觀之豈不躍然入此三昧嗟豫小子亦從三昧而興讚歎者也詎可以恆情而擬議耶題普念佛求生淨土圖世人歷劫久沉生死苦海輪回三途皆因自心妄想煩惱造種種業故無出頭之時佛說西方淨土一門引攝衆生出離苦趣是為最妙法門一生取辦楚僧海慧單勸十方真實為生死人一心念佛更無別緣以衆生煩惱深重妄想甚多皆生死根然非多多之佛不能度多多之人今聞汝東居士刻接引彌陀佛像一尊通身約圈一千八百每念佛千聲以朱填一圈念完佛身則計念佛一百八十萬聲雖積劫百八煩惱仗佛消除而淨土可期生死之苦可永脫矣且願所勸念佛之人亦如念佛之數更望大信心檀越施紙印散亦相若惟此功德圓滿則施者念者同歸極樂無疑矣題化城募緣疏刻藏盛舉乃自佛法入中國二千餘年一段大事因緣令末法無量衆生種成佛真因乃至深山窮谷無佛法處亦得共覩釋迦如來大事全藏惟此功德實震旦第一希有之勝事非大悲願力者不能發此心然又非大願力者不能克全其業今方過半已費數萬計故非一人一手一足之力也刻板之地始議五臺苦冰雪次遷徑山苦霧濕皆非久計末遷化城可謂得所其建議始馮太史復得吳中丞克荷者末得淡居鎧公皆莫大之願力也但貯板之房須高廠架使離地透風不致易壞即板成而安置之功殊非一人一力可措也今觀馮吳二公疏意甚至頭目髓腦之不惜此何等苦心哉豫嘗謂世有一代之人皆同心夙願業已久在如來光明藏中所謂緣熟即現今行乞之僧大似執舊券以訪同願固知一見而興起者皆往昔同盟且謂當來同會也其所施又何計金錢幣帛哉心與此法量等虗空而福亦量等虗空界矣題雲棲大師小像至人無身以願力為身至人無事以利生為事故身非我有事非己為此所以身不能拘事不能纍觀師住世八十餘年建立度生事業者過半知其未出世前皆操為人之具也即其法門攝受無量衆生而同出生死者不知其幾何人是則師雖隨緣去來幻化死生而法身常住與山川相為悠久又豈可以此色相求之哉瞻者當如空生晏坐石室真見如來必致天帝散花而興讚歎也放生文跋聖人之教以五常治世仁為首不殺曰仁佛設五戒以不殺第一是知聖人之心以慈為本經云孝名為戒斯則戒以孝為本以一切衆生有知覺者皆有佛性若殺生則斷絶佛性又不止於冤債相尋而已是故凡在長劫生死之中往來六道何趣不至何身不受即其所殺之生皆過去多生之父母兄弟妻子六親可知也今殺其命而食其肉豈非骨肉自相吞食乎佛以孝為戒故知不殺則孝之大者豈止惜物命已也悲夫世人之迷相習食噉而不悟豈不痛哉故聖人戒以不殺以全佛性此又不止世間之孝而已此蓮池大師所以普勸放生以稟佛之心人能遵而行之非特得師之心適足以盡大孝全佛性而為成佛之因矣豈細事哉刻此書以廣化多人此不獨廣大師之心實廣佛之慈悲非世之尋常口語也宜篤信之題殺生現報録佛言一切衆生蠢動含靈皆有佛性又云衆生從無量劫輪回生死無一類而不受生身是則現見諸有命者非獨慧命皆過去之親因迷而不知也衆生癡迷又不唯食噉而且以他命網利以養己養親是所殺者豈唯斷佛慧命抑殺害親因向說報在來世今觀此録則明明目前現報人人共所見聞斯則非斷他慧命殺己親因實殺己身而自速其死也何待未來可不懼哉觀此録即佛說此是花報果在地獄能持而奉行之即奉三世佛法矣刻五大師傳題辭豫頃讀錢太史集護法録見宋學士作國初高僧傳法門之盛何其偉歟恭惟我聖祖開基創業建立三寶崇重法門超越百代而一時名德光揚佛祖之道不減在昔蓋千載一時自此而降漸漸寂寥而嘉隆之際極矣何幸先皇太聖母身式聖主興揚佛事遍滿宇內四十餘年未嘗暫息亦從前所未有也若法門龍象五大師際會一時雖體用不同理事各別其所以扶樹宗教開人天之眼目作長夜之智燈未嘗不與佛祖同途合轍況巍巍堂堂為大光明幢哉豫幸從諸師之後獨愧薄劣不能拈一莖草第申讚歎願流光不昧照耀末世故作三銘二傳以俟後之執僧史者有所采焉題法雷遠震卷贈五臺空印法師開化雲中以下東海遺稿附佛未出世祖未西來一塵未剖大地凝然萬象露法身之體虗空演無字之經見之者盲聞之者聾靡不悶悶靈明昭昭業識若昏夜而履砧巖赤身而臨毒壑慈眼視之有不堪其憂者躍然而起影落此中則萬死一生甘苦同受忉忉三藏廣長舌為之乾焦咄咄一拳老婆心為之滴血此我大師不得已而臨蒞三途現身異類或師子頻伸或象王回顧將無作有弄假成真幻化人天顛倒豪傑此甘露門以之而開大法雷因之而振頓使寒谷生春萌芽漸發三草二木引蔓抽條上中下根花果敷實者不可得而勝數矣即應緣施設敲唱齊行節拍成令無非將機就機以楔出楔豈有實法與人哉後之觀場者認不真為真執無說而說然而舌亦為之乾焦心亦為之滴血悲夫誨者諄諄聽者莫莫且而恃為真宰將伐全功竟無尺寸之賞方嬰長劫之羈者此何以故蓋亦將無作有弄假成真以不知幻化人天以致豪傑顛倒耳醍醐毒藥生死由誰惟此未嘗不涕下也嗟乎吾師之心誰能師之吾師之行孰能行之後師者謂之慈父孝子能行者謂之法王忠臣親親尊尊此余生平扼腕而求之者難見其人惟法師澄公者宜其人也公早禮空王不耽人僞長超諸有嚴淨毗尼翩翩濁世挺挺青蓮寂寂空山崚崚氷雪滿腔肝膽生鐵鑄成三藏微言一串穿却與文殊為友故棲遲於文殊之場以師子為兒乃戲遊於師子之窟釀慈雲於空谷垂靉靆於清涼今也一管灰飛不萌花發將見春回大地欣看草木皆榮法雷振於雲中甘露灑於劫外吐青蓮於舌根溉醍醐於心地直使盲者明聾者聰昏者惺死者生花者實枯者榮不恃不伐不攝不驚執金剛劒據涅槃城使諸魔衆盡稽首而歸命此何以故良由師吾師心行吾師行知將無而作有解弄假以成真故亦能顛倒豪傑幻化天人望受繫珠之賞將解長劫之嬰可謂慈父之孝子法王之忠臣苟如是始可報吾師之恩與公把臂同遊於不死不生不然則但聞其聲不見其形又何稱為有力大人公其不然請聽空中十方諸佛謦咳之音題國朝高僧行腳卷贈慧菴鑒上人古人為生死事大故割愛遺榮登山涉水參訪知識相求於苦空寂寞之濵決擇己躬發明向上每於明眼人前揚眉瞬目一棒一喝之下忽然迸裂身心脫落如冷灰豆爆使無量劫來生死情根一時頓拔當下如斷索師子跳擲縱橫自在遊戲了無纖毫羈絆所以稱為大力量人此吾出家兒發足超方第一步行徑也自鼻祖西來首行此令𪷤𪷤寰中如唐之馬祖南嶽臨濟德山趙州雲門宋之永明大慧元之雪巖中峰諸大老一脉相傳如閫外將軍風行萬里故每遇鉗錘遭毒手者靡不通身粉碎骨肉俱融悲夫去聖時遙此道寥寥知音者稀惟我朝漠然無聞居常以此痛心將謂獅弦絶響矣偶乞食王城幻住慈氏樓閣一日居士閻君持國初尊宿送僧行腳偈十八首觀季潭泐大師上堂數語風規自足不減古人余歡喜贊歎何幸二百餘年生此末運獲覩先覺廣大三昧於一毫端頭良夙緣也此卷業已進之祕府因跋數語願將此話流布人間適唐抑所袁玉蟠王衷白三太史公過訪談及將欲修國朝高僧傳正博采法門行腳事遂將此托之時慧菴鑒公見而懇之惟公幼入黃門錦玉叢中志痛生死一旦棄如涕唾遠遊名山參訪知識廣求決擇今隱居伏牛意其必曾遭毒手如古人者故見此語相親乎不然則如嚼木札羮咬鐵飣飯耳公將歸故山余亦東還窟中不惜疲勞為書一過公能於此一言洞見古人方始不負出家之志可作出塵標格不然不但不重己靈抑且纍及海印也題竹林大師示門人振宗法語後宗禪者多毀教習教者多昧禪是以禪教話為兩橛古之師匠竟不能一其指歸即圭山和會宗教猶以為隔羅見月上下千百年來學者無能一其趣向此無他乃乏正眼師承為之剖破藩籬所謂不是無禪只是無師以禪宗者乏多聞宗教無正眼此大道所以難明也清涼竹林大師踞華座萬指圍繞善說法要號當代義龍尋常履踐不涉玄途觀其示門人語句大有宗門作略苟無正眼安能出詞吐氣如是之雄健乎可以文字師概目之耶嗟乎學者久墮知見網中非金剛王劒不能一揮裂之大師以此示振宗學人是必為當家種草定不負此一段因緣若以尋常葛藤視之不唯當面錯過抑且辜負法恩多矣題三山真侍者行腳卷後此國初十八高僧示行腳僧語也余竊謂禪源一脈自中峰後閴其無人空谷而下多帶廉纖無復古人作略如脫索獅子也甲午冬寓大都慈壽方丈西雲閻公持所録前偈致豫豫讀之三復歎曰人天眼目猶在不滅惜乎不見諸老手澤遂記而藏之明年三月豫即以法罹難遣雷陽於是年十月出都侍者福善收豫海印草負笈隨度嶺就行間往來瘴海及曹溪者十有五年矣庚戌春王正月豫喜謝曹溪負身得自由善欲歸省上元後五日持豫數年積草於濛江舟中檢拾殘楮偶得此卷讀之慨憶當日題墨未乾即有萬里之行詎意今忽得此故物耶古人云欲識佛性義當觀時節因緣豈非佛祖冥加以神力而攝受之耶不然何以始終見此如出方網三昧彈指謦咳時也燈下展卷喜而不寐乃為侍者重書一過嗟豫老朽固不堪與諸老把臂共行善當不減三山真侍者行腳事也古人閒垂一言半語如天普蓋似地普擎老人信手拈來於一毫端作大佛事則諸大老似掩耳偷鈴老漢未免畫蛇添足善侍者縛作一束擲向東洋大海尤較三山百步否則未免祖禰不了殃及兒孫也題達觀禪師送三禪人遊方卷後從古出家兒為生死大事不能自決故辦草鞋登山涉水訪求大知識決擇之然其大善知識如踞地師子一毛不敢攖傍才傍則命根頓斷凡垂一言半句如晴空霹𮦷閃電使人耳聾眼花自救性命不暇況又敢弄佛法禪道乎此中利害知之者希嗚呼二百年來行腳僧不少犯此令者幾何其人今某三禪者以行腳事自負其志可嘉既見達觀禪師爪牙已露命根不斷又欲別求知識余見此卷而笑曰三禪者持此卷行腳如請上方劒討賊不知他時後日何以繳報題達觀大師祭遍融大和尚文後昔延陵季子挂劒於徐君墓謂心許於生前報知於身後以為義高千古世諦如此況出世乎古人為生死事大割愛辭親參訪知識而決擇之每於一言啓迪施者如天普蓋受者如地普擎投機於石火電光之間而生死情塵迸然雷裂豈偶然哉故其恩深似一滴入海當與之同枯矣豈值生前身後而已耶豫觀達師祭遍老文深有感焉噫且一飯千金莫報以為奇事一語窮劫不泯又豈等閒嗚呼遍老度生六十餘年法施將滿大地至若知恩報恩人間幾幾藉令人人如達師者則大通之因地又不必取於墨劫之前也然其遍老之不朽者賴一語一語之不朽者墨點存焉觀者如此可謂不辜本有矣佛奴歌跋吳年少比丘大川發大心願以一鉢供十萬八千衆其行最苦是故諸長者居士聞而歡喜咸皆讚歎唯顧實甫歌有蕭梁求為佛家奴之句蓋標其能忘身三寶以略耻天下之自重不若蕭梁者達觀可禪師見而異之乃盡力奴狀聲為歌以發之余長歌三疊而歎曰藉令黃面碧眼觸此亦當捧腹絶倒況奴奴者乎以宗門向上事不涉玄途尊貴無匹即以尊貴自居猶是奴兒婢子呼為頂墮況種種意想攀緣流注諸行耳雖然少年比丘何為處此常憶昔有富主性不易事唯一奴當心其晝主極欲以使奴奴苦無當其夜主夢為奴奴夢為主亦極欲以使奴奴亦無當然夢覺等而苦樂異復何怪哉今此比丘將以白晝之奴求為夢中之主其所供十萬多衆豈亦白晝之主將為夢中之奴耶噫生死涅槃猶如昨夢比丘知此可以滴水供養十方恆沙世界諸佛衆生受用無盡矣何區區十萬八千為其無以限量心自割如來無量境界也壽昌語録題辭壽昌老人生平行履惟放身捨命於空山寂寞之濵墾土地博得滿腔氣息尋常潑撒向人天衆前如撾毒鼓使聞聲者聾中毒者死而中毒者幾何人哉憶昔黃面老子在靈山會上領一隊懵懂漢逐日著衣持鉢沿街過巷乞得一摶冷飯歸來飽餐後洗鉢收衣趺座而坐閒打葛藤如此以為家常過活若是者三十餘年而人天大衆瞢然畢竟不知所為何事偶於一日被空生破遂發歎曰希有世尊世尊見其眼目動定遂為盡力胡亂一上直使空生纖疑盡淨命根勦絶而後已故空生感悟切心涕淚悲泣痛哭稱歎而不容口至此黃面老子氣悶少舒始不負從前一片婆心今觀壽昌钁頭大似黃面衣鉢此語不減靈山葛藤當知此話大行如毒鼓聲不知中其毒者能幾何人至其感悟流涕如空生者又不知能得幾何人也諺語有云相識滿天下知心能幾人後之讀此語者若作言語話會則有負壽昌若不作言語話會則有負自己若兩不相負當於未舉以前把钁頭處薦取始得跋可禪人行腳卷昔法照齊次見萬佛菩薩現形於鉢中不知何以故乃問僧云此五臺文殊化境也遂發足履五臺願見文殊乃至果見文殊授以念佛法門照可禪人先從雲棲得念佛三昧今欲往求文殊印證則可倘問南方法衆不可被前後三三當面瞞却也又照可禪人初住黃山以華嚴為業所謂於一塵中入正定也今從他方起處欲破塵出經將誅茅於西湖之上意須長者插一莖草老人直謂之不然以無礙法界遇緣即宗隨處具足但稟明於心又何假外耶
