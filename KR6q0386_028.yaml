body:
  text: 侍者福善日録門人通炯編輯嶺南弟子劉起相重較塔銘新城壽昌無明經禪師塔銘佛祖之道若太虗空亘古嘗然非晝夜代謝之可明昧唯得之者若獲如意寶應用無窮其不思議力性自具足稟明於心不假外也從上諸祖莫不皆然何近代寥寥不曰無禪直是無師其果無也豫於壽昌禪師見其人矣按狀師諱慧經號無明撫州崇仁裴氏子父某母某氏初産難祖父誦金剛經遂得娩因名經師生而頴異不羣形儀蒼古若逸鶴凌空天性淡然無嗜好九歲入鄉校便問浩然之氣是箇甚麼師異之居恆若無意於人世者年十七遂棄筆硯慨然有向道志年二十遇入居士舍見案頭金剛經閲之輒終卷欣然若獲故物即與士言其意士奇之由是斷葷酒決出世志父母亦聽之蘊空忠禪師說法於廩山遂往依之詢其本名曰慧經執侍三載凡聞所教不違如愚嘗疑金剛經四句偈一日見傅大士頌曰若論四句偈應當不離身師不覺灑然因述偈有遍界放光明之句以是知為夙習般若熏發也時年二十有四一日閲大藏至宗眼品始知有教外別傳之旨至於五宗差別竊疑之迷悶八閲月若無聞見時以為患癡久之有省於是切有參究志遂辭廩山欲隱遁乃訪峨峰見其林壑幽邃誅茅以居誓不發明大事決不下此山居三年人無知者因閲傳燈見僧問興善如何是道善曰大好山師罔措疑情頓發日夜提撕至忘寢食一日因搬石堅不可舉極力推之豁然大悟即述偈曰欲參無上菩提道急急疏通大好山知道始知山不好翻身跳出祖師關因呈廩山山知為法器師生而孱弱若不勝衣及住山極力砥礪躬自耕作鑿石開田不憚勞苦不事形骸每聞空山境喧乃曰老僧不釆無窮遂居不閉門夜獨山行年二十有七向未剃髮人或勸之師曰待具僧相乃爾至是始剃染受具影不出山者二十有四年如一日也邑之寶方乃宋師寶禪師故剎也請師重興乃應命先之廩山掃師塔而後往有倏然三十載忘却來時道之句時師年五十有一萬曆戊戌歲也師住寶方日益增精進力凡作務必以身先形枯骨立不厭其勞不數年百堵維新開田若干佛殿三門堂厨畢具四方衲子聞風而至者日漸集有僧問師住此山曾見何人師曰總未行腳僧激之曰豈以一隅而小天下乎師善其言遂荷錫遠遊乃過南海訪雲棲復之中原入少林禮初祖塔問西來單傳之旨尋往京都謁達觀禪師深器重之入五臺參端峰和尚峰門庭孤峻師一見而契乃請益曰某甲於古德公案數則有疑乞師指示峰曰請道師曰臨濟道佛法無多子畢竟是個甚麼峰云向道無多子又是個甚麼師曰玄沙謂靈雲敢保老兄未徹在何處是他未徹處峰云大是玄沙未徹師曰趙州云臺山婆子我為汝看破了也勘破在甚麼處峰云却是婆子勘破趙州師更請益峰云知是般事便休師作禮遂相印契峰返詰師各以頌答語載別録末後趙州頌云暗藏春色明露秋光有眼莫鑑縱智難量到家不上長安路一任風花雪月揚峰深肯之觀師語忌十成機貴回互妙叶五位是知洞上宗風由此必振自是師心亦倦遊矣乃返錫寶方始開堂說法以博山來公為第一座師資雅合簧鼓此道激揚宗旨四方衲子望風而至者益衆戊申邑之壽昌乃西竺禪師所創也久頺衆請師居之舊傳有讖師與竺同鄉同姓咸以師為竺再來云師住壽昌不攀外援不發化主隨緣任用數年之閒所費萬計道場莊嚴煥然巨麗叢林所宜纖悉畢具不十年閒千指圍繞豈師以無作妙力而幻成者耶惟師之生也賦性直質氣柔而志剛心和而行峻雖邊幅不修而容儀端肅嚴霜加日不怒而威衲子一見失其故又隨機善誘各得其宜每遇病僧必親調藥餌遷化則躬負薪茶毗凡叢林巨細必自究心不謀而合度不擇淨穢必盡心力而為之胸次浩然耳目若無所睹聞者逮七旬尚混勞侶耕鑿不息必先出後歸躬率開田三剎歲入可供三百衆故生平佛法未離钁頭邊也四十餘年曾無一息以便自安雖臨廣衆未嘗以師道自居至於應酬偈誦法語川流雲湧誠所謂般若光明如摩尼圓照無思而應者耶自古傳燈諸老雖各具無礙解脫其不疲萬行者獨永明一人然未及其粗若師者可謂道契單傳心融萬法何發強精進之若此耶益王嚮師道德深加褒美因嘆曰去聖時遙幸遺此老其見重若此丁巳臘月七日自田中歸語大衆曰吾自此不復砌石矣衆愕然除夕上堂曰今年只有此時在試問諸人知也無誡語諄諄後云此是老僧最後一著分付大衆切宜珍重戊午元旦三日示微恙遂不食云老僧非病會當行矣大衆環侍欣若平昔衆不安以偈諭之曰人生有受非償莫為老病死慌七日以偈示博山次第寫寶方壽昌遺囑乃曰古人護惜常住如命根老僧不惜命根為安常住十四日寫書遠近道俗且勉進道十五日吉水蕭孝廉來參師開示但看個萬法歸一勉其力究十六日分付茶毗自作舉火偈命侍者徹宗唱偈舉火次辰取水潄口洗面拭身囑曰不必再浴費常住薪水也誡衆無得效俗變孝違者非吾弟子乃索筆大書今日分明指示擲筆端坐而逝萬曆戊午正月十有七日未時也茶毗火光五色心𦦨如蓮花其細瓣如竹葉頂骨諸牙不壞餘者其白如玉重如金文五色葬於某建窣堵波師生於嘉靖戊申世壽七十有一僧臘四十有奇得法弟子若干人其上首元來今開法博山其餘守三山常住有三會語録豫嚮聞師風丙辰避暑匡山有門人持師圓相真者豫展之即知師為格外人而恨未及見也因為之贊有突出大好山千里遙相見之語博山見之以豫為法門知師之深者乃具述師行狀請為塔上之銘豫痛念禪門寥落向未有以振起者獅絃將絶響矣今師之行履其見地穩密機辨自在不唯法眼圓明一振頺綱而峻節孤風誠足以起末俗至其大精進忍力又當求之古人雖影不出山而聲光遠及豈非尸居龍見淵默雷聲者耶觀其昭然生死實踐可知因次序其實行乃為之銘銘曰大道廓然如太虗空聖凡幻葉影落其中即有求者竟不可得擬議思量棹棒打月瞿曇熱亂達摩忙來到頭落得一隻皮鞋建塗毒鼓全彰正令如有擊者喪身失命不用命者時來一擊三日耳聾晴空霹𮦷身心俱碎魔佛潛蹤摩尼光耀八面虗通惟我壽昌誤中其毒遍身毛孔三昧出沒化生死窟作光明聚日用頭頭無處不是提起钁頭似金剛劍煩惱稠林佛祖出現四十餘年墾土掘地瓦礫荊棘純七寶砌身心世界碎為微塵塵塵佛剎坐臥經行佛法禪道拈向一邊有來問者直指目前如大圓鏡五色齊至不出不入死生遊戲自墮其中未常住世即今便行亦未曾去不信但看草芥纖塵何有一物不是全身青山塔影松風長舌說法音聲常無閒歇九華山無垢蓮公塔銘公諱性蓮字無垢太平仙源王氏子生而不羣幼喜為佛事蚤有出世志初其地佛法未流時諸外道羣聚宣揚其說公每往觀聽一日謂衆曰此夢語也其如生死何因決志出俗年二十有二遂棄妻子破家散産而去之金陵攝山棲霞寺從素庵節法師剃染受具依棲講席習諸經論義置卷歎曰吾為生死大事故出家此豈能了大事乎遂棄去復得故鄉之牛頭山誅茆以休刀耕火種專以己躬下事為念久之未有所入遂棄去至清河謁法堂和尚授以念佛三昧乃深信入尋參遍融老於都下融一見而器之遂留入室久之妙峰和尚開法於蘆芽公特往見大有所陶冶復歸故鄉之大山四方緇白聞風而至歎曰吾出家兒豈為滴水波流把茆遮障此生平乎復棄去誓歷盡名山遍參善知識多方行腳備嘗辛苦如是者七年偶冬日涉河氷裂作聲墮水寒徹忽然有省乃曰眉元來橫鼻元來直渴飲饑餐更有何事於是生平之疑泮然氷釋即歸卓錫於池陽之杉山十方衲子日益至公遂開梵剎以接待為事至者無他技但精潔粥飯茶湯而已了無禪道佛法觀者諦信不疑九華聖道場地迎公為叢林主公治己精苦忘身為衆凡化惡性必委曲方便跪拜周旋甚至詈罵必俟大信而後已時人稱為常不輕如是幾草年遠近緇白傾心如佛祖故凡所須未常發一街坊化主應時如響凡足跡所至或一食一宿之所皆為道場若池陽之杉山九華之金剛峰觀音山之金堂大山之草菴蓮嶺之靜室金陵之花山餘若秦頭峰婆娑壠岑峰洞白沙山吉祥諸天隨地各建蘭若數十所以修隱靜者居之咸有其徒主其業豈非忘身為物無心而成化者耶丙申仲春二月應衆請於三祖之皖山不數月百廢俱舉遠近風動公復歸九華越明年皖山四衆固請公去公首肯曰去即去矣尚須三日明日偶過九龍訪一庵主四顧欣然乃謂衆曰吾至此山大事畢矣衆不解其意二日示微疾竟終於此全身塔於蘭若之右萬曆丁酉九月三日也公生於甲辰之四月八日世壽五十有四僧臘二十有五公弟子甚衆各領其叢林事其優婆塞就乞佛法者獨邵季公兄弟查汝定蕭伯穀相與莫逆為方外死生交公遷化月餘汝定即走嶺南訪余於行閒持公行實乞為銘以余三復感公之操存可謂精於忘己者也故為銘曰忘身為物如蟲禦木視物為己水不洗水物我兩忘不犯鋒芒石人晝舞金烏夜光惟公之身飄若行雲惟公之心止若谷神不來不去誰死誰生九華參天觀者耳聾皖山戞漢聽者眼盲亭亭一塔卓彼虗空覓公行處問取九峰棲霞影齊珠公塔銘攝山自梁武開山至唐而盛往諸名德說法其中荒廢久矣嘉靖中五臺陸公遊目慨然屬僧統請先雲谷大師習靜其中嵩山善公重興其寺延素庵法師大開法席海內學者一時雲集座下弟子若干人其上首則影齊珠公也公安陸李氏子生而頴異父敬事三寶公幼從父入寺聞僧誦華嚴經有感遂請出家禮邑之月公為弟子執事數載有遠遊志乃棄去之金陵棲霞從素庵弟子錫法師受具戒聽講諸經論窮性相宗旨精心教觀十有五年一日向師請問教外別傳之旨師曰此向上事自有師承幻休老人正主法少林汝可往參公遂之少室見休即問如何是向上事休曰五乳峰頭月單傳殿內燈公不契乃請挂搭同衆久參入室一日舉石霜公案有省呈偈曰出門便是草寒林花發春歸早堪笑無足人解行却把須彌橫踏倒休曰聲前一句妙叶潛通劫外真風幽微綿密從上佛祖授手之事非思量意識可到又非玄路可通子無以世諦流布也公作禮凡執事四年復歸棲霞自爾心不涉緣跡不入俗日夜精修一心無懈一日無疾索浴更衣儼然而逝萬曆某年某月某日也公世壽幾十幾歲法臘幾十夏得度弟子若干人全身塔於山之某處豫少事雲谷大師每過棲霞愛公道骨崚嶒知為法器竟不負生平得向上巴鼻是豈可以尋常學解束縛死生者同日語哉乃為銘之曰山川精英人文斯著道脉潛流雲來壑赴茲攝之靈久蘊其妙爰有哲人鑿開一竅法化斯彰玄風日扇適生珠公高標霞燦教海義龍宗門神駒顧盼千里電捲星馳握向上符執言前幟匿耀韜光深入無際抱道凝神蒼巖翠壁坐脫其中孤光赫奕塔影撑空真風披拂法身堂堂雲霞出沒耶溪若法師塔銘公諱志若字耶溪山陰姚氏子母晏氏初禱白衣觀音夢洗足頭陀謂曰吾與汝作獅子兒覺而有娠生而機頴幼喜趺坐念佛父早喪母孀居甫七歲母病日夜悲泣母臨危囑曰汝宿僧也無負本願言訖而逝師以母遺命尋禮會稽華嚴寺賢和尚出家年十七始剃染居常切念生死大事即之牛頭山立志參究未幾從荊山法師聽法華經於天台即隱山中憤力向上事單棲六載偶觸境有省年二十六聞雪浪恩公開法於南都乃瓢笠而往先從棲霞素菴法師受具遂依雪浪座下執業十有二載研窮諸經論深造玄奧萬曆己丑檇李創慧華庵沈司馬嶽水部延公居之庚寅公年三十六陸太宰五臺管僉憲東溟劉柱史子威請講楞嚴於吳門壬辰講法華於杭之靈隱明年講楞伽於淨慈壬寅棲息武林之飛來峰北有永福寺故址廢入民閒潘太常贖建佛閣禪堂以成菴居三吳兩浙皆宗公教化隨在列剎開演諸經論者三十餘處會五十餘期稱一代師匠云豫與雪浪為同門兄弟恩兄開法南都公為上首弟子豫聞其夙解有年矣丁巳豫以雙徑因緣過吳門晤公於如意覩其蒼然道骨喜法門尚有典刑也及公歸豫往弔雲棲抵武林月之九日公先示微疾手豫書曰本意追大師歸今豫將長往不能待矣囑弟子曰我留最後供必為獻之明日索浴自起更衣端坐而逝嗚呼公秉夙慧童真出家即志向上事及有發明力窮教典為人天師豈非願力然哉生平清節自守應世皭然三衣之外無長物臨終脫然無罣礙蓋般若根深人未易察識也嗟豫老朽三十餘年慕公止一面且末後不忘非宿緣哉乃敘公行履之概而為之銘曰死生膠固靡不牽纏公何視之如此脫然以般若種生生熏習是故去來全不著力戒月悲華慈雲法雨自利利他潔無塵滓洞契佛心播廣長舌法音經耳功報彌劫嗟哉末法公為法幢願久住世魔外自降生死去來法身寂滅公實灑然是真解脫塔倚孤峰松聲不絶日夜圓音熾然常說雲中普興禪院開山第一代住持古鏡玄公塔銘日月麗天生盲獲益春回大地幽谷陽生故吾佛世尊法身彌綸凡在有情無不具足雖邊地篾戾苟因緣會遇無不使令入佛知見轉腥羶而為淨土者是在開化之功何如耳豫於玄公深有感焉公諱義玄別號古鏡雲中賈氏子父林母李氏生有異徵髫年厭俗禮郡定盛和尚出家志向上事長辭師操方初至京師於萬壽戒壇受具足戒遍禮海內名山參訪知識決䇿己躬下事有所發明念福慧未圓功行不具中年還鄉廣作佛事結飯僧緣不以數計造滲金像莊嚴佛土繪水陸以拔幽冥修橋梁以濟厲揭建窣堵以標人天跪誦往生呪三十六萬遍以資淨業凡在利益靡不精心竭力以導利多人由是四衆歸依王臣敬仰雲中邊地逼虜民情慓悍以公之教化轉殺機為善種詎非現比丘身說法者耶公體豐厚而性柔和見者欣說景從內典外書無不該涉學富而行高故感代藩國主三世崇重吉陽端惠諸王咸為外護建普興禪院遂為開山第一代住持公生於嘉靖丁亥入滅於萬曆乙巳世壽八十僧臘四十有奇塔於雲中郊外豫於丙辰長至月弔紫柏老人於雙徑大都龍華故人月清潭公走書持狀乞銘乃為之銘曰法身普遍無處不周如月現水清濁同流是故衆生有情皆具善惡雖殊其性不二轉化之機係於善導以水投水不妙自妙是故至人隨處示現若是無緣對面不見倘以妙用入衆生心如月在水愈清愈深能以善化轉彼殺機以無我故知之者希日照中天春回大地時若至時無處不是公以緣現而以緣滅生滅去來了不可說表剎凌空法身常住是知我公真機獨露敕賜龍岡寺大方遷禪師塔銘禪宗傳燈所載皆本五家法脉修短不一其系自有元雪庭禪師揭洞上一宗於少林二十四傳至大章書禪師中興其道今遷公為的嗣也師諱如遷字大方別號松谷陝西鳳翔岐山人族李氏父諱鐸母張氏師生於落星里幼喜佛事每至佛寺則如舊居愛戀忘歸蚤入社學肄儒業心不喜每向父母曰兒聞佛教乃出世因志願出家年十七父母不能回其志乃捨禮本郡無踪本公為師剃染居三載發志操方遠訪知識決擇己躬下事首參悅菴喜和尚授具指示向上一路尋入青峰山弔影單棲有所開悟聞大章宗師開堂少林往求印證嘉靖辛酉謁章於立雪庭遂留依止朝夕入室陶鎔從上機緣乃蒙印可有針頭玉線海底鐵牛日夜辛勤記伊保守之囑由是知洞上宗風五位正偏之旨至是猶未泯也師得法已腰包一鉢遍遊海內名山回至京師歷諸講肆深窮性相宗旨後至懷慶鄭世子讓國潛修白業聞師至致禮參請深相印契乃建精舍於龍岡延師晏寂時四方學者聞風遠至萬曆丁亥應大都慈雲菴請舉揚宗旨戊子千佛寺請講諸經日繞萬指庚寅奉聖母慈聖皇太后懿旨於慈壽寺開淨土法門在會者千二百衆欽造鍍金大佛像賜大藏經護敕御書大法寶藏四字甲午春請回龍岡創寺安供戊戌秋八月十有一日先示微恙端然而逝師生於嘉靖戊戌世壽六十有一僧臘四十有奇全身葬於寺之西原師歿後二十二年萬曆己未弟子海雲走匡廬謁豫求塔上之銘豫昔晤師於大都慈壽見其孤標凜凜如立雪長松衲子參請不假辭色拈提宗教必指向上為極則應機接物純一至誠動止未嘗少怠有先德典型與豫對談旬日夜無不抵掌擊節居恆謂學人憨師當代宗門正眼也豫被放嶺外師歸故山時對弟子言有萬里之思故其銘待豫有以也豫感師為法門知己乃為之銘曰一花五葉二派五宗門庭施設各擅家風洞上真源機貴回互玉線金針正偏不住雪老重拈書師繼業至我遷公親承骨血海底鐵牛當機印定遇緣即宗全提正令隨方指示明鏡當臺妍𡟎不隱八字打開二十餘年和泥入水把手為人渾忘自己名達九重道光末運法藏自天龍神欽敬忘功罷業休老林泉身心寂滅慧光渾圓幻緣已盡撒手便行本來不滅又何有生塔鎖龍岡法身常住問末後句天曉不露廬山千佛寺恭乾敬公塔銘公諱仁敬字恭乾別號幻識襄陽吳氏子生而不羣髫年有出世志於伏牛山福田寺禮高菴法師祝髮受具聽講經論參窮性相宗旨日夜無怠者三載於教觀深有信受師曰學者志宜遠大無以管窺蠡測為自足也遂如京都東園暹理諸大法師皆一時師匠公依講肆盡得其奧義大章宗師開達摩單傳之旨於少林公盡棄教義復往參究依棲十餘年歎曰此口耳也道在心證奚事空言哉遂棄去之伏牛煉魔場大爐鞲中放捨身心打長七者三年有所悟入隨遍參知識以求印證道過金陵守心禪師隱居弘濟操履密行為一時推重一見大奇之乃為公曰道在心悟守在靜密登山涉水徒費草鞋錢耳乃留公閉關相與切磋日造深奧盡掃其玄解如是者三年及破關即判然入廬山將結隱以終身焉時萬曆七年己卯歲也公初入山卜地至金竹坪見其寬衍歎曰此五百人安居處也因與山靈誓願以身命布施於此以結十方衲子緣遂誅茆縛廬弔影居之負舂執役弟子智聯為之助公得以絶跡者三年明年庚辰達觀可禪師來遊見而異之曰公能安心寂寞如此其所操進當不可量遂為莫逆盤桓月餘而去歲癸未應黃梅五祖寺之請演法華經又三年乙酉應興國吳公國倫請演楞嚴經彼方素稱剽悍人多感化焉吳公首唱為建殿堂經營五年歲己丑三殿禪堂厨庫告成公之南昌募造千葉寶蓮毗盧大像太史定宇鄧公為唱導功未及半公示微恙遷化萬曆十九年辛卯歲六月初七日也世壽五十有一僧臘三十有奇聯自山中奔赴哀號不欲生鄧公勉以繼志述事卒乃師願乃完大像負師靈骨還山葬於寺後時萬曆丙申某月某日也公得度弟子九人獨聯侍公最久公之願輪有所托焉入滅二十八年歲丁巳諸孫各捐衣鉢建窣堵波請豫為銘銘曰大道如空無處不通但離窒礙靡不包容淵深若海潛流大地有鑿之者必至實際故載道者在乎形器心量若空其道自備我觀我公忘己為物布心如地其願乃足相彼空山誅茅一把擬覆十方任其來者有願未終賫志而訣有子克家卒振其業梵剎聿興集者雲赴飢餐勞息莫知其故公心常住法身不滅直窮未來石爛海竭塔影高標松聲泉響如是法輪在知音賞廬山雲中寺敬堂忠公塔銘佛以無數方便調伏衆生菩薩以種種因緣而求佛道是知為佛弟子續佛慧命者非特踞華座拈槌豎拂為向上事即抗志煙霞潛行密用未嘗不以泉響風聲為廣長舌相也若雲中忠公者豈非白毫光中晏坐山林而求佛道者耶師諱法忠別號敬堂新安歙縣曹氏子母程氏公生而頴異齠年好端坐不與羣兒嬉弱冠厭儒業不喜治生産蚤有出世志年十九遊錢塘靈隱寺遇雲山僧大機和尚即求出家為剃染執侍三年二十一登壇受具即依講肆久之多所參承然未自信遂行腳至少林大千潤禪師開堂說法師依之扣單傳之旨未幾走長安謁遍融月心二大老指示心要尋歸五臺豫同妙峰禪師居北臺之龍門師訪於氷雪中一見而心相印契乃留居期年萬曆壬午妙師與豫別之蘆芽拉師同往尋開叢林諸所創立師有力焉居三載棄去入伏牛火場調煉三業南還登匡廬愛其幽勝遂誅茅於講經臺居三年復還五老峰弔影四年一日登覽仰天坪乃匡山絶頂喜其高勝遂居之單丁數載漸緝屋宇久之衲子亦漸集師手植松十餘萬本冀成叢林師居恆坦夷無緣飾御衆不立規矩凡細務必以身先至老不倦隨緣自守一衲之外無長物粒米莖菜必與共之視衆如一平等行慈無論智愚賢不肖浸久默化而不自知故來者如歸家侍父母凡出語句慨切痛至聽者無不心領神會是以雖不上堂入室而一衆森嚴儼然一大爐鞲蓋以身教也豫於丁巳歲投老五乳訪師於雲中欣然道故師一日過豫連牀夜話屬豫撰十方常住記越三年庚申秋示微疾臨終端坐謂其徒曰吾見紅日當空金蓮遍地吾其行矣言訖寂然而逝時七月草一日也師生於嘉靖辛丑世壽八十法臘六十晚年得度弟子三人能幻能握皆歙人能撑䖍州人握奉師茶毗收靈骨塔葬於桃花峰下持狀請銘豫撫然而歎曰當師訪於五臺時見師飄然如凌風孤鶴心甚愛其高舉比即堅留且云能同埋此中乎師曰有緣必遂自後別去將謂無復再晤之期豈意垂老同歸且為述師之生平耶銘曰大道如空萬法體同能善用者遇緣即宗逆順隨宜了無虧缺是在智者種種方便松聲泉響出廣長舌況復當機豈非善說是故至人以身為教密行全彰事事皆妙墾土掘地搬柴運水大用現前何拘彼此有緣而遇無心而作法法頭頭都成解脫弔影重巖如臨廣衆二十餘年巍巍不動通身毛孔遍布十方有入之者脫體清涼剎建雲中僧來世外粥飯如從香積世界是在吾師無作妙力用而不藏從空一擲大願未終幻緣消歇掉臂而行了無言說一塔撑空靈跡是寄法身常住盡未來際宣城華陽山道者法振鐸公塔銘公諱大鐸字法振宛陵某氏子生而超羣神清韻朗幼從鄉校讀論語至朝聞道夕死可矣乃曰道何物耶聞而可死遂大疑之每每以此問諸先達皆不愜意一日逢行腳僧問曰如何是道僧曰此吾佛氏無上妙道非世之仁義禮智而已也公由是篤信佛道遂禮其僧剃髮時年甫二十其僧囑曰吾非爾師當往參雲棲公徑造焉得沙彌戒依衆未幾即從雪浪法席參諸教義居恆求悟自心不得其指復歸雲棲進具戒請益修心之要示以念佛法門以一心不亂為的旨付禪關䇿進一書為參究之訣公佩服還本郡石瀧巖閉關三年單提一念久之有省復往雲棲求印可遂依衆淘汰數年辭歸本郡之華陽山誅茅以居華陽祖於黃山白嶽縱廣一由旬周環四邑菴當萬山之中最為幽僻公居之唯種芋栽茶拾橡栗採松花以充食竟絶意人閒唯一沙彌智浩執侍焉浩讀楞嚴至徵心處問曰七處徵心皆不可得畢竟心在甚麼處公撫几一下良久問曰會麼浩曰不會乃示二祖公案久之令浩參諸方去公單居焉緇白請公說金剛般若要義公拈凡所有相皆是虗妄若見諸相非相即見如來問衆曰會麼衆曰不會公曰一切有為法如夢幻泡影如露亦如電應作如是觀乃曰大衆各自珍重吾將行矣即沐浴更衣端坐念佛而逝時萬曆戊午七月十八日也公生於萬曆甲戌八月二十四日世壽四十有五僧臘二十有八葬於菴之某處智浩參方歸省公已入寂三年矣浩乃匍匐匡山乞豫為塔上銘豫覽狀知公始以聞道可死一言發心頓棄人閒世雖親教義不尚名言絶意於空山寂寞之濵單提一念以死生為大事至其操行孤絶超然似古隱山之流此末法之難能者嗟乎若公之風可使吾徒之貪者廉狂者息躁者靜也又何事踞華座為說法哉豫有感於斯乃為之銘曰般若靈根如種在地遇緣而發若時雨溉聞道一言夙習固然偶一觸之應念現前死既可矣復生何戀頓捨世緣入山修練不事語言單提向上一念孤明吾我俱喪橡栗松花以療形枯浮雲幻化視之若無寂寞空山孤風絶侶莫問其賓看主中主死生不變太虗閃電寂滅空中超情離見撩起便去似不曾來空花翳目野馬塵埃塔影團團霞蒸霧鎖問末後句青山朵朵比丘性慈塔幢銘比丘性慈毗陵潘氏子性愛離俗童時聞月珠法師講楞嚴遂發心出家禮宇光法師於華山求剃度授以淨土法門專心一志雅修梵行喜看老病心無厭倦習音聲佛事後遇滇南僧性玉結伴遊南海誅茅同居十餘載玉患病頻年慈看侍殷勤如事父母略無怠容玉竟無恙萬曆己未同禮匡山授具戒回普陀而玉病復作慈益加調護庚申歲慈感法乳復來省匡山舟次荻港偶微恙遂坐脫於舟中囑同行三人茶毗於紫沙州萬曆庚申五月一日也玉聞之乃奔負靈骨歸葬普陀復走匡山具述其因緣乞志之豫聞而感之曰詩云兄弟䦧於墻世有骨肉而仇讎者多矣況二姓乎若慈與玉也驀爾相逢以道相親一心莫逆看病十年如一日慈能盡心力於生前玉乃感恩義於身後誠所謂一死一生乃見交情者耶豫故次序其事又以啓法門之義當以看病為第一行也慈生於癸巳年正月十七日世壽二十八歲玉為滇南昆明徐氏子世業儒故併記之乃為銘曰宿具道緣無心而遇形異心同難兄難弟視身若己死生不二出情之情故乃如是骨埋白花心凝實際試問大士果何來去新安黃山擲鉢菴寓安寄公塔銘公諱廣寄字寓安衢州開化余氏子生而聰慧有出塵志年十五白父母聽出家投郡張公山無為法公為沙彌好學多能博雅游藝恆往來於休婺之閒一時士大夫無不器重樂與為忘年交年二十四歎曰人生過隙駒耳泛泛若此何以出家為遂決志遊方參訪知識屢行為親知羈留不果乃宵遁單瓢隻杖徑造雲棲大師見而器之為授具戒開示念佛法門曰念佛無他伎倆專在一心不亂公服膺遂以充維那居常刻意精修單持一念謹束三業嚴整威儀調和內外悅可衆心大師一日臨衆曰朝廷設官以稱職為最豈惟國家叢林亦然梵語維那此云悅衆若寄維那可謂稱職矣由是一衆咸推重之一坐八年以省師歸故山閉關三年萬曆庚戌入黃山之丞相原誅茅藏修精進自䇿一念不移若忘人世久之一方緇白歸信者衆圖南汪公為結菴以居之一坐十二年偶嬰真疾竟不言動止如常人莫知之久之疾篤鄉人請醫診視公曰死生如客耳當行即行又何為乎竟勿藥唯安然端坐如不有身一日召弟子曰吾行矣末後一事汝等識之言訖跏趺而逝時天啓元年辛酉二月二日也初弟子不意公遽化未理龕室乃置坐於几上且恐形變急積薪茶毗值天大雪不能動轉如是者七日遠近緇白聞而破雪奔弔見公顏色如生喜容可掬唇紅不改手軟如綿咸曰此生人也安忍化固止之乃借佛龕收斂供於所整之丈室雪乃止弟子相謂曰此豈末後事耶於是亦不敢火經夏秋炎熱形氣不變意欲奉三年乃葬明年壬戌三月弟子大守走匡山具白其事且請為銘豫聞而歎曰吾沙門之行貴真修實證不在衒名聞立門庭為得也以公之高明多藝博識廣聞一入法門即盡情屏絶精心為道如愚若訥居常一念密密綿綿見人不發一語問者唯唯一笑而已至若處同袍忘人我脫略形骸無不愛而敬之豈非威儀攝生正容悟物無言而說法者耶嗚呼若公之於生死神往形留化臭腐為神奇豈非戒定熏修精心融貫而然耶即佛祖之金剛不壞常住不朽亦由是而致否則不崇朝若豚子之食於死母也豫於是有感焉乃為之銘曰三界萬法為心所造壞與不壞總在一竅螢火蚌珠其光雖小亦是精妙圓明之寶何況佛性寶覺明心在我固有豈不甚深戒定所熏金剛種子故舍利羅其叢如蟻既有幻形寧免幻病果縛現存業由前定如公形骸久而不臭想是其中心光無垢從此精練生生不退決定至於金剛之地或焚或存無可不可且待三年再來報我我作此銘非為公立普告諸人大家努力
