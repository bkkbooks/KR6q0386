body:
  text: 侍者福善日錄門人通炯編輯嶺南弟子劉起相重較法語示觀智雲禪人學道人第一要看破世閒一切境界不隨妄緣所轉第二要辦一片為生死大事決定鐵石心腸不被妄想攀緣以奪其志第三要將從前夙習惡覺知見一切洗盡不存一毫第四要真真放捨身命不為死生病患惡緣所障第五要發正信正見不可聽邪師謬誤第六要識得古人用心真切處把作參究話頭第七要日用一切處正念現前不被幻化所惑心心無閒動靜如一第八要直念向前不可將心待悟第九要久遠志不到古人田地決不甘休不可得少為足第十做工夫中念念要捨要休捨之又捨休之又休捨到無可捨休到無可休處自然得見好消息學人如此用心庶與本分事少分相應有志向上當以此自勉示了心海禪人吾人出家單為生死大事操方行脚參師訪友只為決擇己躬下向上一路不明不已故善知識單以此事示人近來法門寥落諸方罕聞此風行脚到處但鼓粥飯氣息而已老人寓靈湖蘭若了心禪人來參入門見其有衲僧巴鼻似非尋常粥飯者今將返伏牛拈香請益老人示之曰方今海內禪林第一賴有牛山苦行非諸方可及學道之士苟能𢬵捨身命一生定不空過但日用工夫單提一念話頭最為綿密所以不得超脫得大自在者以一向死守話頭念念不捨不知參禪最先要內脫身心外遺世界離念一著所以繫念反為念縛不得超脫大自在地耳禪人此番入山幸仗規繩大眾夾持正好隨場下手著力但於念念中看念未起處由在離念一著久久忽然念頭迸斷心境兩忘如脫索獅子自在遊行他時再見老人决不似今日眉目動定也示湘潭諸優婆塞佛住世說法有常隨四眾出家二眾曰比丘比丘尼在家二眾曰優婆塞此云近事男優婆夷云近事女以其在家能持五戒可以近事三寶堪受法利故及佛法東來隨時受化代不乏人至有明心見性入祖師之室者近來法道久湮師承無眼妄禮三拜例得一名即自稱為弟子其實腥腪未吐素行未改致生譏謗全無利益大為壞法之端故老人生平未敢輕許今觀湘潭諸弟子信心篤厚非泛泛波流故強𠃔其請但念汝等素未聞法雖云善人不知如何是善今按唯識論說心所五十一而善法唯有十一餘皆惡心所也十一法者謂信精進慚愧不貪不瞋不癡輕安不放逸行捨不害此十一法全具為純善人但少一法即為缺德汝等但能依教持此善法各各究明時時觀察提撕於何法上有未純熟更加切磋之功務要全美而後已如此用心是為真實善人所言善心者即清淨真心也以一切眾生各各本具如來清淨真心但為惡念染污故隨情造業而不自知今能觀察善心則一切惡法自不現前心自清淨矣苟能有志漸漸深觀只參六祖大師開示慧明不思善不思惡正與麼時那箇是明上座本來面目公案時時參究是謂向上一路汝等脚跟下誰無一尺土努力前行必不相賺若肯歸心淨土即依此法一心念佛則現生可斷生死永絕沈淪但恐偷心自欺不能作真實行耳老人強為汝等作如是說為憐三歲子不惜兩莖眉切不可作世諦流布話會也示方覺之乙卯覺之方子支離其形而天機妙發參老人於南岳老人見其心光炯炯是於般若有夙種者每以向上示之方子心領如飲冰焉今將別拈香請益乃示之曰方子無以天全其性而殘其形以為闕也予知天不以形累子以真厚其德耳世之形全者眾而以形傷生者多矣孰能離形釋智以全其性耶聖人謂形為生累故曰大患為吾有身故滅身以歸無以其形銷而苦息矣吾佛教化眾生但以破我為第一義入禪之要不依形骸不依氣息一切皆離其心自寂心寂而樂莫喻焉圓覺經云當觀此身四大假合堅硬歸地潤濕歸水煖氣歸火動轉歸風四大各離今者妄身當在何處方子從此二六時中但當作如是觀觀至一念不生處則外不見身內不見心身心寂然了無一法是時始知天奪子之假實全子之真則子之至樂不待忘形而造乎極矣子但精進作如是觀一旦洞然始信老人此語不妄示智海岸書記乙卯老人至五羊說法一時法性弟子與緇素皈依者眾翕然可觀亦時節因緣也未幾時故多事法會難集老人入曹谿向在會者亦多退席唯智海岸修六逸若惺炯三人不離執侍及投老南嶽則岸逸二子相隨不捨是感法乳情深義至高也老人隱居湖東不覺三載居常極其淡薄二子恬然想陳蔡之從不是過耳頃岸以師老歸省拈香請益願乞一語終身奉持老人自念老矣出世法緣會合良難經云如大海中一眼之龜值浮木孔豈易易哉嗟子行矣應諦聽之佛言一切眾生皆證圓覺是知佛性在人各各具足不欠一毫然諸眾生所以流浪生死長劫輪迴而不返者直以背覺合塵順生死流隨逐魔網而不自知也以不自知自覺故枉受沈淪正似持珠乞丐不知懷中本有如意之寶棄之而甘受竛竮以是之故如來說為可憐愍者老人居常觀子天性率直忘機近道但習氣深厚不能自持往往苦被宿習所牽一入魔罥則渾身墮落苦不自知及猛然想起即恨不能跳出生死忙忙打疊修行道緣未集熟境現前習氣又發不覺隨波逐浪及至回頭照管已經多時如此起起倒倒依傍老人二十年來畢竟己躬下生死大事茫無歸宿此何以故葢有入道之資而無堅忍不決定之志故脚跟下站立不住胸中多生惡覺惡習不肯痛下毒手洗刷一番耳學道如此任情不但今生不辦即千生萬劫終無成辦之時也佛言佛法難聞知識難遇今幸選知識聞正法若當面錯過再出頭來知是幾時求如今日未可得也子今生幸遇老人一向動定無恒唯今相伴二年喜子能忍苦可謂堅志今又告別恐離老人未必如今日也嗟予老矣求再侍老人如今日亦未可得也苟終身無成豈不辜負此生一大事因緣耶子今行矣所叮嚀者切勿再墮魔網當堅持特操不可久住王城若以二載忍苦之心侍六祖如侍老人信自心是佛一語如信老人將從前習氣忍而不發心心揩磨念念省察單提一句話頭咬定牙關不可輕易放過如此拌盡此生決志不改是則不但不離老人一步即與佛祖周旋坐臥經行不出道場之外也不唯不負老人抑且不負自己示劉存赤乙卯頃予投老南嶽甲寅冬暮茶陵劉季子遠來參叩雪夜圍爐寒燈相照因問子一向如何用心對曰昔蒙和尚開示偈云蓮華火裏生世人謂希有不是火生蓮惟在心離垢每看此話於末句頗得受用老人深喜因示之曰子於心離垢一句得力此語不虗亦不易到經云凡夫賢聖人平等無高下唯在心垢滅取證如反掌繇是觀之眾生與佛本來無二所謂心佛與眾生是三無差別但心淨即佛心垢即眾生生佛之辦不遠只在心垢滅與不滅耳以此心本來清淨但以貪瞋癡慢五欲煩惱種種業幻垢濁障蔽故名眾生此垢若淨即名為佛豈假他力哉無柰一切眾生無始業障深厚煩惱堅固難得清淨必假磨煉之功故有參禪念佛看話頭種種方便皆治心之藥耳譬如鏡光本明以垢故昏必假磨煉之藥然藥亦垢也以取能去其垢故鏡明而藥不存矣又如真金在礦沙石垢穢必須烹煉之法金精而無用其煉矣眾生心垢難離必須工夫精勤調治垢去心明故說眾生本來是佛非一向在煩惱垢濁之中妄自稱為佛也參禪看話頭一路最為明心切要但近世下手者稀一以根鈍又無古人死心一以無真善知識決擇多落邪見是故念佛參禪兼脩之行極為穩當法門若以念佛一聲蘊在胸中念念追求審實起處落處定要見箇的當下落久久忽然垢淨明現心地開通此與看公案話頭無異是須著力挨排始得若以妄想浮沈悠悠度日把作不喫緊勾當此到窮年亦不得受用若以悠悠任妄想為受用此則自誤不但一生即從今已去乃至窮劫無有不誤之時也子向於念佛法門有緣試著實究審果在煩惱垢濁之中一聲佛號如水清珠以此受用但非徹底窮源耳經云如澄濁水沙土自沈清水現前名為初伏客塵煩惱去泥純水名為永斷根本無明子只將此佛語默默自驗萬無一失若得到真離垢處如經云明相精純不為客塵煩惱留礙如此不惟彌陀接引即十方諸佛亦皆同聲稱讚矣幸與子窮年雪夜此段泠淡家風世所希有苟不負此嘉會但從此去念念不離泠淡中便是離垢一條徑路步步著力必有到家真解脫時也示鍾衡頴茶陵鍾生明性詩禮世家往因患難走參予於曹溪老人曉之以善惡報應因果之說安其心以歸其難竟解所以解者皆非憶想可到機緣偶會無心自至生由是故物無恙蹈安恬無事之境然竟茫然不知其故猶然以生平未愜心快意事將用心力以圖之若探囊拾芥也甲寅除日同存赤劉子遠來相慰伴予度歲老人噫嚱而歎曰子所志是將涉海渡河而求飲甘泉泉未必得而渴愈熾且苦䟦涉之勞也向以因果報應之理喻子豈忘之耶夫善惡感應捷如影響聲和響順形直影端故聖人不言因果但言為善降之百祥為不善降之百殃是以安命定志為誡故曰不知命無以為君子聖人教人以安命佛教人以隨緣其道一也安命則一毫不必強為隨緣則一念不容妄想故佛法教人一以斷妄想為本妄想乃貪瞋癡種種惡業之本也即菩薩修行以至成佛報得天上人閒最勝莊嚴廣大福田皆從斷妄想始以妄想斷則惡業消惡業消則百福集此所謂自求多福也故示之以偈曰世事皆從妄想生妄心消處業緣輕不須更覓菩提路只要當人退步行退步者乃休心斷妄之最上工夫也以人心本來光明廣大為萬福之源但由妄相惡業遮障故禍日生而福日減今苟妄消業斷則一性圓明受用無邊得受用處是為真福是知福由己作者政非智巧機詐可致耳且佛以斷妄心則感人天之福鍾生本有功名富貴之鎡基若能直下休心將前生平所作之業從頭仔細一一撿點但有虧心傷理一念不合大道處盡是苦根一齊吐却從新別立根本另作一番工夫只在休心斷妄聽命俟時一件把作標準潛心自己固有之事業不必別求一念妄想之事如此以補前行之失一旦災消福至則功名富貴逼拶將來亦無迴避處又何用種種妄想攀緣而他求哉鍾生果能諦信不疑執而行之則佛果可期況世緣乎勉之勉之示袁大塗世之士紳有志向上留心學佛者往往深思高舉遠棄世故效枯木頭陀以為妙行殊不知佛已痛呵此輩謂之焦芽敗種言其不能涉俗利生此政先儒所指虗無寂滅者吾佛早已不容矣佛教所貴在乎自利利他乃名菩薩梵語菩薩此云大心眾生以其能入眾生界能斷煩惱故得此名菩薩捨世閒無可修之行捨眾生無斷煩惱之具所以菩薩資藉眾生以斷自性之煩惱如他山之石可以攻玉耳煩惱者乃貪瞋我愛見慢種種惡習而為自性光明之障蔽非世閒眾生一切逆緣境界不能磨礪以治斷之如詩所云切磋琢磨者此也且佛制五戒即儒之五常不殺仁也不盜義也不邪淫禮也不飲酒智也不妄語信也但從佛口所說言別而義同今人每發心願持佛戒乃自脫略其五常是知二五而不知十也又推禪定為上乘以其能明心見性而不知儒亦有之顏淵問仁子曰克己復禮為仁己者我執也豈非先破我執為修禪之要一日克己天下歸仁豈非頓悟之妙以天下皆物與己作對待障礙若我執一破則萬物皆己豈非歸仁乃頓悟之效耶及直請其目乃曰非禮勿視聽言動以所視聽言動者皆物而非禮則我障也今言勿者謂不被聲色所轉也於一切處不墮非禮豈非入禪以戒為首耶但佛多就出世說至其所行原不離於世閒即菩薩住世所行亦不外此佛者覺也能覺此心即名為佛非離此淨心之外別求一佛也良由眾生惡習障重心難清淨故設念佛方便求生淨土法門且曰心淨則佛土淨是知念佛固淨心之妙行也然念佛本為淨心苟念佛而其心不淨何取於念持戒而背五常何取為戒袁生有志向道結友同修淨業蓋夙習善根所發參見老人堅請授戒老人示之曰戒本自性具足若諦信老人之言自淨其心則戒已受禪已修淨土已入菩薩妙行世出世法二利具足槩不出此生其勉之示雙輪照禪人雙輪照禪人來參且云將隱居山中單究向上事乞老人住山之法因示之曰古人住山乃大捨身命處殊非細事專要善用其心用心之法單提向上一念直須向佛祖不容處一著立定脚跟次則要將胸中一切知見𢆯言妙語襍毒一齊吐却次則識得本體了無一法不可被妄想習氣影子發生種種境界惑亂正念次則要看本參話頭如六祖不思善不思惡如何是本來面目公案極力提撕但有一切惡習現前即將本來無一語看破切不可隨他相續流轉咬定牙關此處定要把得住方不被他搖奪如此用心乃是惺惺時著力處若用心著力太過則懈怠心生便起昏墮此時只須快著精彩不可落在昏沈窠窟中急須持呪仗此呪力足敵此魔以藏識中多劫惡習今被話頭逼出變化無窮境界一切魔境從妄想生一切昏沈從散亂生正恰用心之時忽一念散亂即落昏沈是須善知永嘉寂寂惺惺四料揀語最為切要古人用心但只將一句本參話頭靠定如鐵壁銀山相似若到一念不生處亦是得力不可作究竟會直到工夫任運不假思惟一念豁然身心如脫空方是工夫入手處亦未是究竟但能至此自然輕安自在便生歡喜然此乃是本分事未是奇特若生奇特想便墮歡喜魔便起無端狂知狂解此關最險此皆老人有所試者古云枯木巖前錯路多行人到此盡蹉跎非細事也縱使有力打過種種境界正好修行正好保護未是到家若以此為足便起世閒種種五欲因緣之念此關難過過者百無一二所以不到古人田地正是得少為足之過患也饒你學人苦心一生得到此地若被此等惡習所牽仍是墮落生死坑中前功盡棄可不哀哉如此說話古人語中所載不少老人略為拈出以末法中難得真正學道之人蓋亦曾為浪子偏憐客耳大段古人住山不是養嬾圖快活單為自己生死大事所以走向萬重寒巖作沒伎倆活計若在此因循度日虗喪光陰豈不更可悲哉雖然用心差別既已知之其山中目前變幻境緣即水流風動猿吟鳥噪雲騰霧擁樅從在前更為喧襍永嘉見道忘山之語切須看破老人初住五臺龍門時萬丈寒巖之下冰雪堆裏如埋死人徹骨嚴寒五內俱透唯有微微一息視從冰中出入至此返觀覓自心一念起處了不可得此境正是助道之緣又大風時作萬竅怒號日夜不休及雪消㵎流響若奔雷又如千軍萬馬奔騰之狀如此襍亂境界初最難當因思古人有言聽水聲三十年不轉意根可許入道老人遂即發憤於獨木橋上坐立終日聽水聲始則聒聒難消久則果爾忽然寂滅自此一切境界皆寂滅矣所謂萬境本閒惟人自閙此又是道人住山第一著工夫也禪人記取毋忽示顓愚衡禪人丙辰向上一路乃出家人本分事古人發足超方只要究明此事近代以來槩不知出家為何事安可望為古人乎顓愚衡禪人初依五臺空印大師聽習經論久之遂盡屏去單提一念切究本分事萬里南詢過曹谿謁老人請益老人謂此事若不放下身心苦功根究到水窮山盡處終無下落縱到水窮山盡處古人謂之靜沈死水又謂之𢆯妙窠窟若不回頭轉腦則面前如鐵壁銀山相似祇是得力時不是受用處古人用心不是死到底須是死中發活始得要在回機轉位所以道百尺竿頭坐的人雖然得入未為真百尺竿頭重進步大千世界現全身學人到此只索轉身別行一路方不被他作障礙禪人唯唯作禮而別乃就誅茆南嶽未幾老人亦曳杖而至詢禪人則為病魔所撓業經寶慶就醫老人聞之歎曰禪門下衰真實為生死的學人最為難得今斯人而有斯疾豈龍天厭薄法門乎丙辰春三月朔風雨夜半忽禪人雨衝泥而至老人相見大喜曰此豈病夫所能耶覩其眉宇津津爽氣是知其疾已瘳八九因再拈香請益老人特示之曰子之病魔乃子之大善知識為助道因緣子知之乎切以眾生之病病在有我以執我故一切煩惱眾病以之而生病生則苦必隨之自古及今無有一人不病是者唯知病病之人不為病耳且四大假合聚必有散縱使不病何嘗不病哉若了病不病者則病不能病之矣子知今日之病不知多生劫劫病病至今日矣子若不了今日病則從此已去不知病之底止也子知生死之病而不知要出生死之病大有過於生死之病也夫何故古人以參禪不出陰界墮於識情窠臼縱有妙悟皆成我見以執四大為我病尚可醫今離四大復執有我此病則醫王束手最難調治諸佛諸祖特特出世單為治此一種膏肓之病費盡多少心力求肯服藥而瘥者幾何人哉禪人身病已瘳切不可被禪病侵也雲門謂法身有兩般病其言透過法身若法執不忘己見猶存亦是病極言認執之病也禪人將前所蘊一切𢆯言妙語及參禪執守功勛一齊唾却只到一點惡覺惡習不留定不被他養成病根直使佛祖無立脚處豈不見善財童子南詢百城參五十三大善知識各授一種法門到頭只落箇與法界等與虗空等何曾有實法繫著耶又不見毗盧遮那法身非身而托普賢妙行為身普賢無行但以眾生之行為行故曰菩提所緣緣苦眾生若無眾生則無菩提此從上佛祖出世之真榜樣老人因謂禪人四大病身非病魔不能治禪病刺心非眾生不能治從今日去只將身如大地等則病魔潛蹤心與眾生等則我見不立我見不立則禪病自消以心不自心則本不生不生則一法不立苟一法不立又有何法而作知見障礙哉古人云捨情易捨法難禪人捨身即捨情捨見即捨法情法兩忘豈不為大無礙解脫之人哉嗟予老矣再晤為難禪人勉之示李福淨零陵李生應禎請益心性之旨因示之曰夫心性者何乃一切聖凡生靈之大本也以體同而用異因有迷悟之差故有真妄之別所謂三界惟心萬法唯識以迷一心而為識識則純妄用事逐境攀緣不復知本有真心矣若知真本有達妄元無則可返妄歸真從眾生界即可頓入佛界矣達磨西來單傳心印頓悟法門正是頓悟此心此禪宗心性真妄之旨也若夫吾儒所宗堯舜禹湯文武周公孔子所傳之心性則曰唯精惟一以精一為宗極而有人心道心之別此亦真妄之分也但世教所原不出乎此其曰道心則不迷不妄之性也其曰人心則迷性而為情世人但知用情而不知用性但知波而不知波原水也故孔子曰性相近也習相遠也性近則水原無波習遠則逐波忘水水尚不知而況了達濕性無二乎且如本一水也而以醎酸苦辣和之則淡性亡矣其濕性則本無二也是知眾味乃妄之變也其濕性不可變也不可變者真可變者妄若達濕性無二則眾昧不可得而有也所謂堯舜與人同耳同者性也不同者妄也又曰人皆可以為堯舜其可為者性也不可為者習也人之所習苟捨污下而就高明則日遠所習而近於性是可與為堯舜者亦此習耳習近於性即禪家漸修之行也以世儒之學未離凡近去聖尚遠非漸趨無以致其極故聖人立教但曰習曰致曰克其入道工夫在漸復不言頓悟若夫禪門則遠妻子之愛去富貴之欲諸累已釋切近於道故復性工夫易為力故曰頓悟以所處地之不同故造修有難易其實心性之在人本無頓漸之差但論習染之厚薄此入道要也若究心性之精微推其本源禪之所本在不生滅儒之所本在生滅故曰生生之謂易此儒釋宗本之辨也心性之說蓋在於此若宗門向上一著則超乎言語之外又不殢心性為實法也示叚幻然給諫請益諸佛出世無法可說祖師西來亦無實法與人但為眾生種種顛倒執著之情隨宜擊破令捨執著頓悟本有而已以眾生癡迷執著之心堅固難破加以歷劫無明煩惱業障根深難得頓悟故費吾佛四十九年無量方便為設斷惑證真之法從凡至聖設有五十五位之階差非是世尊好作恁般去就費婆心也以眾生心病無量故設對症之方亦無量耳及至究竟實際直到知見盡泯一法不立始是到家田地若有纖毫知見不忘猶在門外止宿草菴遣之又遣至無可遣縱然如是猶是法身邊事未是法身向上事止是教家極則處未是宗門極則處由是觀之修行一事豈是草草便以一知半解為得哉且如宗門自六祖已前不說參究功夫只貴當下頓悟自南嶽青原已下根機不一多在參求保養及至五家建立門庭施設不同就裏宗旨元無差別其於應機接物如秦鏡當臺照徹肝膽至若與人解粘去縛直指法身向上一路勦絕佛法知見不到窮源徹底斷斷不肯輕易放過其在禪道大盛之時天下明眼知識甚多學道衲子處處參請印證故悟者不落邪見及宋而元知識雖多學人邪見不少不墮生滅則落空見有體無用如二乘偏空甚至撥無因果墮落外道豁達斷空或悟心未徹才見影響便得少為足自稱菩薩口口談空心心著有竟造生死之業而不自覺如是皆未得明眼知識勘驗提撕故致禪門凋弊古德云不是無禪只是無師謂是故耳大段末法參禪得少為足者多縱有真正學人肯下死手做工夫十年五年不變其志亦有了悟自心一切皆空因無明師印證遂落空見或識神未破墮在光影門頭或習氣未淨被工夫逼拶變現種種境界將為神通妙用或見諸佛菩薩現身說法或使知他心宿命能見未來之事或起種種異見此皆習氣變現若認作奇特便落魔道可惜一往工夫為害非細此皆不遇明師又不知佛教中修心方便故誤墮耳亦有真參實悟明見自心了無一法不能開頂門正眼便坐在淨裸裸赤灑灑純清絕點處此名拘守竿頭靜沈死水故云百尺竿頭坐的人雖然得入未為真百尺竿頭重進步大千世界現全身又云有佛處不可住無佛處急走過正是教人不可坐在無事甲裏便說無佛可成無眾生可度此正墮在斷見不能離此空見耳縱然到此亦是法身邊事未是法身向上事豈不聞雲門道得到法身邊隱隱的似有箇物相似亦是光不透脫直饒透過放過即不可此語實是修心照膽鏡也故古德云悟之一字直須吐却應知佛祖說法一味遣眾生執情所謂但盡凡情別無聖解若作聖解即受羣邪棱嚴經中五十種陰魔非漫語也今時修行既無明師指點若不遵佛祖言教印證將何以為憑據耶始因眾生著有故佛破其有見二乘外道著空故佛破其空見菩薩著空有二邊故佛說非空非有破二邊見及至入佛法中又遣其佛見法見所以遣至無遣正謂不見一法即如來豈不見善財童子參五十三大善知識已入五十三位法門入佛境界不說成佛之事但云與虗空等與法界等與毗盧遮那等及見普賢菩薩乃為說十種行願此便是修行學佛之大榜樣不以悟後為無事也今人修行縱能悟徹法界若不學善財修習普賢大行終是不免墮落空見外道可不懼哉此上葛藤特為修行無多聞慧錯誤用心不能入佛知見故不免饒舌若視為泛泛語言不唯有負老僧且自誤不少示玉覺禪人蘄陽慧玉慧覺二禪人參老人於黃梅紫雲山自云心中生滅念念不停猶如野馬特求開示云何降伏其心老人示之曰學人修行為生死大事也以心中念念不停故生死不斷欲實為了生死必要把一切萬緣盡情放下放得乾乾淨淨然有無始習氣種子不得乾淨必須參一話頭紙上都有但不知下手工夫難易訣法必須參善知識開示方便是他行過的曉得易入處如六祖昔聞應無所住而生其心當下開悟世人不知當了𢆯妙道理會元不是𢆯妙因昔有住今聞無住故當時放下而得開悟有何𢆯妙如永明大師昔以念佛用心不能造入後於韋䭾前拈鬮得念佛參禪世人以禪當作道理講殊不知禪乃是自心經云不生不滅是也欲明生死大事知戒律尊崇決不敢犯先要信力肯心堅志把𢆯言妙理世事人情都要放下此參禪一著元無有𢆯妙奇特此事極拙汝肯信否若果肯信但把從前妄想一齊放下不容潛生緩緩專提一聲阿彌陀佛著實靠定要觀此念從何處起如垂綸釣於深潭相似若妄念又生此因無始習氣太重又要放下切不要將心斷妄想只把脊梁豎起不可東想西想直於妄念起處定放下又放下緩緩又提起一聲佛定觀這一聲佛畢竟從何處起至五七聲則妄念不起又下疑情審這念佛的畢竟是誰世人把此當作一句說話殊不知此下疑情方纔是得力處如妄念又起即咄一聲只問是誰妄念當下掃蹤滅跡矣佛云除睡常攝心睡時不能攝心一醒就提起話頭如此不但坐如是行住茶飯動靜亦如是在稠人廣眾中不見有人在諸動中不見有動如此漸有入處七識到此不行如此日夜靠定不計工夫一旦八識忽然迸裂露出本來面目便是了生死的時節方不負出家之志但參禪之時不要求悟任他佛來祖來魔來只是不動念念單提行將去中閒再無疑難如是綿綿密密心心無閒日用著力做去自有下落示明益禪人學人不知向上一路但求增益知見殊不知知見立知即無明本此不知本有而向外馳求更欲增益其明矣苟明其明則明亦不立何益之有故曰為學日益凡言學者則向他家屋裏求安樂窩縱然求得畢竟非屬己有既非己有則樂非真樂樂既非真又何從而安之耶向外求安自古學人之通病非特今也明益禪人請益將謂無益而欲明之耶有益而欲明之耶若言無益無益則不必矣若言有益既有益矣又何必明之耶試看明從何明益從何益若求明其明則失本明若更求多益則返成無益凡求益者如人食已飽而更貪其味則傷食而病成矣若能隨食而吐可勿藥而愈若護病忌醫終成痞滯凡病此者雖盧扁不能治何也以貪食不吐一病也養病諱疾二病也病成忌醫三病也或從而惡藥四病也或求速效不信治本之方即疑醫棄藥五病也或更從庸醫誤服毒藥而至損生者此不治之科也學人自棄本明而向外馳求增益知見大都若此傷哉吾少每讀醫師喻未嘗不三復聖訓竊見近世學者初為沙彌即能誦此老不知宗竟致虗生浪死者無限此不明之過也亦有求明而誤以不明強自為明者誠不達本之咎耳佛言息心達本源故號為沙門學人苟能息心達本明不必外求益不必多增自性具足曾何虧欠明益禪人果能知此頓將從前所求多處一齊吐却如傷食人中無宿滯則元氣自復學人剗却知見可稱無事道人矣試子細撿點從前滿腹餿酸作何氣味參參示慧棱禪人禪人生長休邑少賈於江湖因厭塵俗至匡山禮續芳和尚薙髮老人自南嶽來休夏金竹禪人拈香請益因示之曰汝已能捨世閒恩愛身雖出家而心未明出家之事昔吾佛世尊捨金輪棄王宮入雪山六年苦行覩明星悟道成等正覺為三界師六道尊仰人天供養普度眾生同出生死此是最初第一箇出家之樣子也如此看來豈是偷安養嬾貴圖現成受用便為出家者乎定有一段本分事也從上諸祖持為生死大事出家至於操方行脚參訪知識特為發明心地將無量劫來生死根株一拔頓盡超脫三界永離苦趣方為自利後聽龍天推出建立三寶是為利他二利具足始是出家本分事禪人今日出家曾知有此事否曾知有生死大事否如何是生死即今現前五蘊身心集下無量劫來種種貪瞋癡慢憎愛習氣種子日用心心起惑造業之心元是如來佛性光明種子今被無明煩惱葢覆日用而不自知者是以迷此佛性便是生死悟此佛性頓斷煩惱脫離生死是真出家兒如此看來出家乃大丈夫了生死事非享安逸貴圖自在而已也不肯修行不求明心見性是為虗消信施返招來世酬償之苦何出家之有禪人何生何緣何幸得遇明師度脫安居名山道場法侶和合又何幸遇善知識指引開導若不深生慶幸大生慚愧決志修行求出生死是為自棄如到寶山空手而回豈不哀哉禪人若肯發志修行最先要將從前一切煩惱憎愛習氣一齊頓斷單單志求了生死一著單將一句阿彌陀佛蘊在胸中如己命根心心不斷念到花開見佛便是了生死真正出家之時節也若不以老人之言發起真實信心是為避溺投火此生錯過豈有出頭時節汝切自思自勉毋忽示半偈聞禪人禪人少習舉子業有出世志四十棄妻子禮紫栢老人之弟子果清湛公祝髮於歸宗歸宗乃昔諸尊宿建法幢之禪窟有如來舍利在焉是知禪人出家之緣勝所居之地勝第未發勝心耳歸宗久廢紫栢大師過其地慘然悲酸見枯松半折斤斧大師愍而呪土壅之冀其重榮以卜道場之再建不數年皮骨皆完於是湛公毅然重興遐邇聞之莫不仰異景從居士邢來慈矢心唱導又數年感今上賜御藏以光名山由是殿閣遂成而堅音長老募造毗盧大像以奠安之自此三寶已具其二獨僧寶未集不足以揚法道耳禪人出家之八年老人自南嶽來遊禮舍利於金輪峰頂覩其山川秀詢復之艱難殿閣雖成禪居未就猶然荒寂中也來慈固苦心護法其力行乃吾徒事若僧徒不勇往為之則負建立之意恐紫栢寂光有靈定不瞑目也因是致懇勸發大眾而堅音與禪人為之綱領禪人聞說頓發勝心普化大檀莊嚴佛土即荷錫出山濵行請益老人欲堅其願力乃歡喜而示之曰汝雖出家然猶未聞出世之行昔吾釋迦本師捨金輪王位匿影雪山六年苦行以成正覺為人天師其實久遠劫來廣修福慧故曰三千大千世界無有如芥子許不是菩薩捨身命為眾生處至若施頭目腦髓如棄涕唾非一劫二劫乃至無量劫來世世生生如此苦行方纔博得相好身土微妙莊嚴即今末法弟子一鉢盂飯皆是如來身命骨血換來留與兒孫受用由是觀之吾徒出家衣食現成安居受用豈易消受哉苟不思報佛恩體佛心行佛行理佛家事則名雖出家實資三途之苦具耳所謂體佛心者大慈悲心是行佛行者忍辱心是佛家事者廣行六度成就二嚴建立三寶宏揚法化是若不如此非佛弟子是為賊人盜佛袈裟自滋苦本如此出家有何利益所言福慧二嚴者以志悟般若種子了達自心妙契佛心此名為慧廣修檀度莊嚴成就眾生此名為福故曰福慧兩足稱二足尊故今勸禪人第一要志求般若了悟自心以出生死之苦海次要廣行眾行普化十方莊嚴佛土以成淨土之淨業除此二行無可修者然佛言教化眾生即是莊嚴佛土以大地眾生沒溺貪欲苦海畢造生死苦業長劫沈淪無由自出故感三界三途之苦具所賴三寶為福田以種般若之種子以為他世自受用之因緣然須必假僧寶以開導故吾徒佛子能化一人發勝心破慳貪則一人淨自心嚴一人之佛土化多人則嚴多人之佛土苟能化大地使人人發心則圓成人人之佛土是則轉穢土成淨土變苦具為樂具豈不為最上殊勝之妙行哉禪人行矣執老人片言以往便是豪傑之士頓發廣大之心如廣額屠兒放下屠刀便作佛事亦如八歲龍女獻珠之頃即證菩提自有能破慳囊扣揮糞土成汝願力者禪人勉旃萬無怠惰
