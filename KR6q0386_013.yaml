body:
  text: 侍者福善日録門人通炯編輯嶺南弟子劉起相重較書問與達觀禪師某鈍根下劣屈于塵習適特地走人間自以無謂不期錫杖落此豈知吾師精進力所攝持耶昨禮座下辱法愛連宵徹夜真言密語如呪病龍心心在雲雨耳即殑伽能領深恩矣惟師一一辛苦中來某一旦坐受其惠竟何以報想十方諸佛定為此會生歡喜發讚歎耳此緣殊非小小某愚癡向謂琬公亦靈山會上人耳匪蒙攜過雲居親見肝膽則某此生幾不知此公矣承命作復琬公塔院記初不自量將謂易易遂莾鹵承當及至雷音覩其真迹不覺氣縮即以虗空為口大地為舌猶不能讚其功德況方寸流注乎因懇祈請法力加庇而為之尤難措辭馬上至潭柘思已過半及覩師手書二經莊嚴妙麗讀願贊則泮然具足矣十五日暮歸慈壽次日焚香禮禱而後操觚屬草剛完使者持法音至諷誦數過歡喜絶倒勞法身特現塵中蓋似慈悲太煞使某何以當此敬謝無量塔記謹此報命其文千二百餘言但某心血止此有則盡吐之矣其間但欲點染虗空自覺少光𦦨耳願師印證不吝郢削無使琬公見屈抑令觀者增深佛種惟慈攝受之某和南言附達大師答書真可和南辱塔記即率衆焚香頂禮訖疾讀三四過令人無地可以寄口舌贊歎也苟非真得琬公之心骨之苦處安能吐辭等刀鋸剖痛情哉寧惟使琬老朽骨生春即某足賴之不朽矣如是扶植法道將何以報海印主人咄一棒分死活時決不敢作世諦流布某再和南又憨山大師侍者某此回出山諸人以為突出意外那羅堀主此回來燕圓成無量功德豈惟諸人慮不及此即堀主亦不意憨頭憨腦闖入是非閙藍做許多好事發古德之幽光解衆人之紛糾而道人亦得託不朽于寸管是無上供養慚何以消怖懼怖懼懷靜送經圓贊并小敘謹奉命即著如奇呈正超如所持偈不遑一為發揮行恐觸境逢緣終被物使奈何奈何道人行蹤主人既還東海即亦往石經矣然再必一晤而別尚有數語似不可少者某再和南又承慈遠問悲欣交集病病之心知在法眼望色決脈于十年前矣惟神明之祕久默斯要今豈逃洞見肝膽耶但今道人受病之原初為客邪所干中傷真氣以致君火太盛銷鑠肺金內外交攻上下否塞梔子益母不用而用貝母轉使大小便利不通固結日甚庸醫誤入肉寇熱勢益增幾悶致死賴甘草解之而揀去肉寇得椒通和周身汗出道人幸佐以軍薑得蘇其同病者竟誤中狼毒良醫束手幸元氣未損必不傷生須徐徐調理但真陰水生心火漸降客邪消伏真君泰然則可保復元氣全生性矣感荷慈念遠問受病之原其狀如此惟賴白毫遠照自受病以來雖大火猛𦦨炙身而五內清涼略無一念疲厭之心其視三界牢獄四生桎梏端若天光雲影耳向來所入海印三昧俱成水月道場空花佛事矣幸得情關迸裂識鎖頓開時將長䇿象王而逐金毛回步旃檀之林飢餐紫柏渴飲曹溪吾生之願遂畢于此更不敢勞移步毗耶再施甘露但願安隱那伽深入無際以待圍繞三匝耳使回謹此奉慰慈注又世相空花翳目顛倒已不足論而成住壞空往來代謝有為如是法性湛然復何加損第念法緣未溥願力未周向為智礙今則從空霹𮦷一聲種種幻化雲翳蕩然且幸而今而後方為無事道人此正火聚刀山成就清涼如幻解脫斯實聖恩于我不薄其他一切是非泯然殆盡又何足道若能成就無上道力一切佛土隨願往生又何區區拳石勺水間邪知師同體之愛愛踰骨肉同心之憂憂入肺腑故敢以此奉慰非妄語也不慧出期不遠儻幻緣有待尚圖荷䇿雲山優遊末歲其法喜之樂又當如何此又天龍所遣成就第一希有功德也又不慧障緣深重辱師同體慈力而攝受之所勞神用種種甚微細智固超情表豈容言喻旅泊話別挂帆而西以新正五日抵桐江冒雪弔健齋晤見臺公詢休郎動定云業已束裝明發有九江之行尋即遣書至吉水邀過桐江相聚舟中歡然道故宛若多生熟遊菩提分法人也爾瞻聞之即迎過鐵佛菴中相見機語甚投此君根器猛利況得休郎為前茅不一言之下則向之堅壁旗鼓不覺自偃頓然翻案大非昔日鄒君也不慧過上元方行休郎送至廬陵會王性海此君天然道骨不意末法塵勞中有此上根利智將來成就法緣不淺因留連二日而別休郎即放舟東下想見知忍則可委悉因緣矣不慧于二月三日過庾嶺旅邸壁間忽見師留題恍對法身而臨寶鏡歡喜踊悅因書偈曰君到曹溪我不來我到曹溪君已去來來去去本無心誰知狹路相逢處飽餐而去六日至曹溪禮六祖真儀頃即出山至五羊謁總鎮王公囚服見之此公意氣甚高親見降階釋縛乃云公物外高人況為朝廷祈福致此奇禍何罪之有吾輩正中心感重豈可以尋常世法相遇固讓不可竟留款敘移時齋食而退且又遣力護送往戍所途涉千五百里道殣相望雖三尺童子亦操戈挾刃殊不辨其盜非盜也至電白其程猶半迆南山林蓊咫尺迷蹤曠野高原迥無煙火窮日粒米不糝終朝滴水不啜雷地飢荒尤甚業已四年瘴癘大作時疫橫行毒氣熏天炎蒸蔽日枵腹罹災死傷過半悲慘之狀大不可言況復海岸腥風嵐煙烈日觸鼻透心神昏意醉此為罪鄉誠非虗設私謂自非徹骨冰霜何能消此酷毒也仰庇諸所堪能調伏無生忍地即荷戈行伍不異道場但泉涸草枯無薇可采資非禪悅何慮不為西山餓夫惟不慧道愧先德遭時過之此業力所勝死生又何置念直以本願未酬佛恩未報為慚愧耳竊念諸佛以不思議神力調伏衆生非以一方便而折攝之欲其情枯智竭須知極境窮源冥益鈍根真慈不淺儻法緣有在異日天假有緣與師對談夢幻法門豈不以今日因緣為實證也惟師智光圓照天南萬里不隔纖毫仰願無緣慈力時以攝之又江頭一別瞬息三年無時不寄情霄漢間也丁卯冬初覺音來得奉手書并荷慈惠法寶盈篋種種功德真灑甘露于焦枯布慈雲于火宅也康祖贊點開髑髏金剛正眼讀之令人遍身毛孔熙怡喜不可知此非無緣慈力何能至此覺音云杖錫有遠遊之念自爾不知所指此心逐逐妄想每與右武聚首未嘗不對妙音色相也右武真奇男子前冬別時頂門一針渠自云痛徹至踵頓然翻案不慧因贈之曰覺非居士今已大非昔人矣此公別去時復寥寥所幸諸緣屏絶四大輕安無所損惱得以閉門穹廬究竟未了公案楞伽幸已脫草去夏攝引初機數輩演法華于武場以酬師之大願有擊節數紙此皆支離糟粕殊非真知見力但念此餘生置身于無事甲裏彌感聖恩難報聊復以此消磨歲月且仗諸佛神力持以洗污教之愆故不惜世諦流布也適接法意不覺歡喜絶倒瞻金剛塔如對法身讀諸祖贊如聽梵響啜陽羡春茶如灌醍醐念此瘴鄉何緣得此普令見聞隨喜獲益大義重來此亦僧中程嬰也此子信根原深第習氣不淺今幸撇來亦大損減又荷師法力攝持即此可望上進覺音此來大為抖擻胸中頗有樂地惜乎志有餘而力不足亦不負此生可作金剛種子再出頭來必不負善知識因地也渠聞師在匡廬函欲一見遂遣先歸以報計大義入夏可至至時又當委悉又前大義來接法音歡喜無量知動定如宜甚慰遠懷比來為曹溪因緣想聞之必大撫掌先心尚欲令義郎自燕而晉及臨行念其二十年來跉跰他方今其師物故已二載餘寧忍不拈瓣香撮培土乎因是遂立促還家山由楚而歸不及布體座下今夏幻軀幸無大病第為荔枝魔發遍體疥痬又為假曹溪粥飯僧魔妄作鬼祟是故養病蘧廬此時正欲入山且幸某公發大道心願作檀越第其人清淡如水志大力微師能以無作妙力遙伸右手過百一十城竪此金剛幢乎不知上方佛土寶威德如來何日為衆生説法令我遙聞謦咳彈指之聲也新歲三得中甫問慰安情至深感道義同體知應微車計秋中可抵薊門侍座下耳孝廉馮生昌歷乃此中弟子上首近書來云已入丈室何幸如之第不知此子去就何如儻在都門願時時拔濟知二護法大著勇猛力必致感應但聽時節因緣耳又堪忍土中事種種幻化正宜法眼視之耳若入鶖子之目亦未免作淨穢見也昨永順持法音來知杖錫有靈嶽之行回書徑往報之矣旃檀如來因緣已悉前問蓋佛神力不假于他也持去楞伽筆記奉入慧目以作法供養某下劣深知此一段大事因緣皆如來所遣聖恩所賜即此可為報恩地但願此法普遍微塵剎土一切見聞同入自心現量即不慧委填溝壑則此生千足萬足夫復何憾第不審就中有少分相應否願大施金篦披刮翳膜其幸不在區區耳又春三月促覺音負病歸是時尚想紫柏與五老爭雄遣八行往訊忽順禪人持禿筆字來則知已拖泥帶水向萬里無寸草處去也笑老癡為底事如此忙碌碌耶昨有人説長安路上有個沒料理漢竊官家一壞土揑作丈六金身令無量人生顛倒想復將丈六金身撇向十字路上令往來驢馬踐踏若紫柏老癡過此又作麼生耶嘗憶老趙州將一莖草作丈六金身老雷陽則將丈六金身作一莖草此個公案是同是別知在萬仞峰頭必發一笑老紅盔近來毒氣熏得耳聾眼花鼻塞咽悶不知何時向白銀界裏翻身一吐此惡習也又紅盔去紫柏萬里時聞説法音聲在鼓鼙刁斗間如塗毒入耳轉令瘴煙毒霧化作甘露日夜飽餐故當死不死更見鉢沿蚊蚋貪涎流溢大千何時三災火起燒為煨燼毗藍揚去光音霪雨一洗劫灰淨盡無餘也曹溪舊稱西天寶林比為魔宮鬼堀可笑紫柏老人神力不大暫求一宿不能安今天遣紅盔特來灑掃八年之內極盡神力一洗殆盡魔黨盡驅今將化穢而成淨土變業海以作蓮池老盧埋沒千年今日始得轉身吐氣將來絶後再蘇頓見光明赫奕但閣門堅閉不能頓現無量莊嚴佛土只待文殊遙伸右手過一百一十餘城聊藉彈指之功便見重重無盡境界假使十方世界一一善財如佛剎微塵數衆生參禮時可使一一頓入毗盧法界也此蓋老紅盔鎗頭上佛事旗竽下工夫較老紫柏端居淨土坐蓮花中吐廣長舌為諸化身大士説利生法門時同別何如某禪人遠來相問不減契順走惠陽老紅盔且無覺範別胡強仲氣習也某舌端時時現出紫老法身居然在目敬持梵香一盂用伸供養唯慈照之與妙峰禪師某切自念鈍根下劣結習濃厚乘夙善緣天幸吾師辱以真慈拯拔曲盡心力善巧方便面命耳提日夕無間者數年居常切覩我師默造之心恨不能通身躍入我心頓令眼目動定若有靈聖者但土木坯胎終難變化雖然禱之既久入之既深不無感通冥應某情雖鹵莾而于潛滋密化未嘗不由吾師幻網三昧加被之力也雲聚清涼月明空界自爾形分影散隱顯同時雖于妙音謦咳勢阻關山然其實相真身儼含心水別經五稔猶同一日道越三千不隔寸絲是則深居寂寞之濵益入圓通之境可謂迹逾疏而心逾密聲日銷而實日彰某之形神未嘗去吾師一念也然某自知形器穢濁謂斯朽骨惡氣衝天非寥廓大谷不足以藏之塵勞塞漢非汪洋巨浸不足以洗之故甘心拌命擲此山海窮鄉而置盡絶之地且將無復人世矣不意默承護法菩薩運通寶藏頓使一光東照大破暗冥可稱萬世希有功德原其所自與者受者又皆盡從吾師圓妙清淨真心流出也客冬某持法旨至接讀十數通深見師心不覺涕泣交頤即所云喜心翻倒劇嗚咽淚沾襟耳然所悲者非屬于情而在出于常情者舉目寥寥豈容多見是不容不感悲且痛也嗟乎某此生已矣竟同草木枯稿無疑至若報侍左右之心有懷未即惟願我師真慈不棄心心圓照而攝受之令癡子不入顛倒狂途而安步歸圓覺路也時幸託此一枝頗稱幽勝儻識海波澄意吾師心月能自忍留光而不落影于此中乎又不慧平生每自尅念于此長夜得值吾師可謂再逢親友矣故自緣會三十年前即知有向上事二十年中常勤除糞此一念苦切之心未嘗去于眉睫但恨積習深厚不能頓淨現業流識有負師友法恩大為慚愧爰自離析以來忽十五年實已臥薪嘗膽痛自䇿勵未敢少惰第以幻翳未消猶沈幻網心知被縛力不自由良以慧劒不利不能頓裂此知痛處敢欺吾師及幸以法為緣知報佛恩即以幻網為佛事其荷負之心實持九鼎而法執之病益增七重將謂不負所生敢追先哲此實狂愚非謂慧也幸亦心知非正如夢渡河念蒙聖主隆恩惠以金剛𦦨爍破重昏使歷劫情根一揮頓裂回視昔遊皆同夢事是故不慧以此慶快平生心知吾師必為我賀今雖遠投瘴海如坐道場飽飲炎蒸如餐甘露荷戈之暇惟對楞伽究佛祖心印始知從前皆墮光影門頭非真知見力是知諸佛神力調伏有緣衆生非止一種方便若逆若順無非令入清涼大解脫門火聚刀山無非究竟寂滅道場地而今而後或可謂不負己靈亦可謂不負師友矣于會心處隨筆記之今將卒業此雖非正順解脫聊以法自娛適足以見光陰不虗度耳意吾師聞此必發一笑也大義萬里遠來以得法音為喜第念此子持吾師一言付囑于不慧者已十五年心如一日辛苦萬狀然于禪道佛法竟未啓齒此真出世丈夫法門奇事今復依依萬里至此豈不慧所堪況彼師親皆老何獨我為是以促歸且以不慧行藏奉慰知己慈念也第緣有聚散法無起滅在正眼視之了無朕迹剎海不隔劫念圓收又何有去來彼此之相吾師處此久如諒不以天涯罪夫勞靜慮也儻天假以年猶當白首同歸以酬初願惟禪悅滋神以道自愛又惟師以法界為心以行願為身即彌綸華藏莊嚴塵剎當無疲厭此遐荒雖遠正不出吾師毛孔也其攝受之心如珠網交羅光光相照更不容妄想于其間耳鈍根年來坐此瘴鄉所作佛事亦不出師幻網三昧第以情生智隔不能餐師法性之樂然亦賴此為消熱惱作清涼地師其以為妄乎古人為到處家山隨緣樂地不慧即不能全體適足以自娛楞伽四卷誠以印心吾師慧目肅清必深照洞徹其原即此生無對面之期而世世常為法侶矣又自入瘴鄉六年不知霜風作何狀今正月六日南征宿新州客邸寒風刮面不減塞上夜深擁納夢想正在萬丈冰雪中忽推門扣見者大義也乃驚喜絶倒所負北來諸故人書首開吾師函恍若對面坐五臺拄地菴中枕膝夜話時也歡喜可知復詢吾師種種功德種種莊嚴此家常事不假稱揚嘗讀楞嚴經見阿難望佛惠我三昧之語將謂虗談以今觀之不但身坐瘴海即入鐵圍必蒙吾師足光先照矣所謂因緣會遇窮劫不磨豈妄語哉不慧今年五十有六不覺老至形容透俗心地日開常自私語若此形不化足以甘心苦海為人天作橋梁臥具此狹劣之見始由吾師擴之今更見其真耳大義之走瘴鄉誠以為苦今遣歸家可以休狂心作己躬下事望吾師惡辣鉗錘銷鎔習氣是以不負吾輩亦不負其先心耳又不慧以業力遷訛擲此嶺外不減曼殊在鐵圍師以慈善足光時時照拂亦不減菩提場中初成正覺時也大義來具荷攝受感不在言惟師願輪日廣三昧日深顧此區區穢軀親近隨順如夙昔豈能再得不慧處此業鄉三年餘矣禪定解脫未知何如但所喜者學成真正俗人其所消磨日月者重增文言陋習皆多生積障今日盡發不知何日得三匝座前求懺悔耳先具數種師其為我印正之遙憶多寶妙塔涌現虗空但昔日靈山會上釋迦分身盡集而塔戶一開多寶出現吾師分身當何時而集耶令遙聞者不禁瞻慕之思也即有可散之花亦無神足可遣耳寄蓮池禪師往者某居金色界時吾師因禮曼室來承以無緣慈力攝受我于冰雪中使某得以坐瞻光相深慰夙心信宿而別自爾傾注之懷蓋亦勤矣某去臺山將南歷百城擬參座下復為業力牽之東海良以耽著枯寂遂置身窮陬篾戾車地因之矢心建立三寶上報佛恩亡軀盡命十年于茲向以道力孱弱大為魔擾者日月居半以致取辱法門見呵智者今且猶不自量乃戀戀堀中以臂當轍心心不退豈宿習然哉切念道法垂秋正宗淡薄賴吾師乘大悲願輪高竪法幢宗説兼暢止觀雙運毗尼獨揭淨土專門使狂子知歸淳風可挹禪者自南中來無不備詢起居知法體輕安色身康健樂説無礙應機不倦微細之制不減迦維何幸衰世末流遇斯弘範每一興懷五體勇悅毛孔皆香深愧業繫不前未遑瞻覲茲門人胤繼特致問訊薄具名香三色奉為説戒時供養普熏四衆伏希慈納又惟吾師踞寂滅場以佛性戒而為末法衆生種金剛種子此等最上因緣乃毗盧之所願釋迦之所贊宜為天龍八部之所欽也若不慧者以穢濁之質點污法門以業纍之緣罹斯罪垢實受諸佛所呵乃辱吾師攝受豈非以平等大悲普視有情者耶不然何慈音無遮一至于此瘴鄉拜辱手書不啻足輪光照鐵圍令有緣謗法者先蒙益耳不慧向沈幻網今幸荷諸佛神力以金剛烈𦦨而銷鑠之今則罪性了然且賴此作懺悔地年來奔走之餘所作佛事著述數種乃藉佛祖心光以為破障之具以孤陋之見處僻遠之鄉不識果與此法少分相應否敬持獻座下乞師法眼為我印決儻不墮增益謗或可聊弭夙愆酬罔極耳與五臺月川師不肖鈍根波流幻海花落寒空不啻曳尾泥途自甘逃逝已也回視金色界人端居靈山一會惟時白毫東注幽邃蒙光豈不見此頭陀如是度衆生而行菩薩行耶數辱慈念惠問勤勤以人境兩奪故無片言以報諒知己者一體同觀定不心口異視也往承以駁物不遷見示鄙心將謂足下偶爾成文試入遊戲三昧故未敢加答恐當實法流布忽忽業已三秋適幻師遠來下問窮陬詢及起居具悉悲戀之情深感無已且出尊駁草本不意刀刀見血如此不肖愚昧雖非楊修幼婦而一覽頗識其妙第愧不足以當足下心由辱見信之深不敢有負所望略為陳之愚謂所駁若按名責實雖肇公復起不易其詞若忘言會旨即清涼再出亦當追其武也語曰駟不及舌誠有味乎然彼造論覃思立意命名不曰無見且以不遷當俗不真為真由是觀之是物不遷而非真不遷也以其物有遷流故今示之以不遷為妙若真已不遷不遷何足云故云是法住法位世間相常住其旨良哉若以高見所摘論文皆遷流之語駁之字字無差言言有據即肇公對語亦俯首無詞但彼亦自解云所造未嘗異所見未嘗同意恐足下責之以言而未諒其心耶抑所見未同耶故曰正言似反誰當信者若足下猶不信而信者誰其人歟且肇公明指不遷在物而足下以真究之斯則為門不同故道路各別宜其相左聞足下始因不肖舉清涼謂物各性住于一世之語濫同小乘無容從此轉至餘方之説遂有此駁然不肖所以舉此者意有所為蓋緣尋常以物不遷意詰諸方大德都謂物遷而真不遷人人話作兩橛然清涼疏中自有二意且云顯文似同小乘云云其實意在大乘生即不生滅即不滅遷即不遷原清涼意正恐後人見此論文便墮小乘生滅遷流之見故特揭此表而出之欲令人人深識論旨玄悟不遷之妙耳然鈔文但舉小乘一意辨之未竟大乘之説但結文此約俗諦為不遷耳一語義則長短相形但文稍晦耳不肖在昔舉此正恐足下有今日之事是時交臂而別彈指已經八年將謂足下力窮不遷徹見諸法實相不意云云若此竊謂足下此見不獨不得肇公立論之心而亦全不得清涼表白之心不獨不得清涼表白之心而亦未得區區蓬心也此足下與肇公正謂所造未常異所見未常同也管見如此亦未敢為必當間常于此潛神有日頗有自信之地即每每舉之亦曾為浪子偏憐客之意耳以不肖愚心願足下善自寬姑捨是而勿較但試于諸法上努力著眼覷之果遷果不遷若于江河競注真個不流野馬飄鼓真個不動直下便見不許攀扯性空果如是則肇公此論皆為剩語又何區區據蝸角而力爭尺寸耶適足以見不肖非扶同硬證也呵呵與五臺空印法師萬里炎方真同燒鬻每一興念舊遊則千尺寒冰稜稜在目頓見徹骨清涼也第目極雲中而金毛師子不現令人熟習難忘耳昔調達推山壓佛身嬰劇地問之則曰如四禪天今日始知非大言固本分事耳且火宅中人念淨土則清涼豈淨土中人念火宅不增煩惱耶自愧下劣向從法門龍象之後志期稍有建立拈一莖草供養十方豈知定業難逃沈淪至老自達師化後此心已殞無復人間妙師撒手而歸光前絶後可無遺憾即今人天眼目惟師獨立光明幢耳儻有餘年仰仗法力得遂一晤之緣以畢此生實為厚幸若機緣不偶殆將不久人世即為永訣是有望于龍華三會耳顓愚有志納子可惜而有斯疾儻可得瘳亦座下之白眉也近刻三種寄請印正但老子一書古無善解苦心十五年似可為後學發蒙其金剛決疑法華品節儻有當心幸命流通亦法施也興雪浪恩兄前歲侍者南來手教諄切誨弟以法門為重弟鈍根下劣向耽枯寂日沈孤陋雖一念生死之心耿耿不昧第習染深厚不能頓契無生上友古人中心慚愧有負初志比見法門寥落若吾輩天然兄弟尚參商一方不能時復促膝究心鼓簧斯道況悠悠者乎弟自奉教以來利他之心亦漸開發惟時自忖宗欠明悟教未精研且末學膚受貴耳賤目取信不易移風易俗之懷似難頓伸居常深思吾佛立教以三學為宗弟每見後學如兄所云最難樹立者多不揣其本即一二根性稍利又為狂魔所附以至慢法輕師至于身心略無檢束根本不堅又安望其枝葉榮茂乎此正吾兄所謂千人之中無一二可語者惟此未嘗不涕下也弟奉吾兄大教業二十年今春始強勉開堂照常為衆講演開堂之初第一瓣香先供養本師守愚大和尚弟每念剃染之初即濫膺華嚴法席猥辱先師法愛不減于兄但弟之所以報先師者萬無一也曾憶昔年弟初行腳時與兄別于雪浪嘗叩吾兄志向所在且云待老師百年後為立一建一塔以酬法乳足了生平此其本願其他一切可任緣無礙斯言猶在耳弟明記于心亦時復以此舉似知己者但不知吾兄此願業已酬否切念與兄年登知命幻化如斯即未死之年亦漸趨衰老縱利生之願未艾而涉世之念已灰此時若置勝緣不但泯先師之德抑且減法門之光使後學無憑不知所自源遠流長古德所重家聲不播昔賢所恥若吾輩兄弟並名宇宙苟寥寥如此況其他乎願吾兄及時努力謹薄具名香一炷石資若干以為先登即兄不奈緣恐建塔為囏若刻一八楞方幢更見古雅其文不必假手于他願吾兄親操是所至望又弟不肖罪戾無狀取辱法門為師友憂大負慚愧先心擬過家山將布五體仰藉慈力攝受作懺罪羯磨辱吾師兄暫出那伽移步江上憐而教之使飽餐甘露頓覺五內清涼身心俱化罪福皆空此善財南遊所以從大塔廟前為初步也別後于新正六日抵同江鄒南老迎于鐵佛菴中首出吾兄手書諸祖機緣卷展之光明赫昱照耀心目跋語縱橫殺活儼然據坐揮麈鄒君寶此即法身常作菴中主也鄒君根最猛利幸與弟夙緣有在一語投機盡翻前案誓將迎吾兄演化西江大為開導此蓋渠信心肝膽儻有問至兄當善調伏使其增崇正信作成佛真種因緣不淺經廬陵會王塘老所養甚佳其信向淨土精專觀其立言似非本指耳二月三日度庾嶺六日遊南華禮六祖覩其山川形勢絶勝無怪其千七百人從此流出吾徒不可不一瞻依也十九日抵廣州訪陳夷山已作故物始聞歐倫老尚在及將買舟造其舍則報云化去三月矣遐方失二知己良可悲悼向傳南海生機繁衍風氣淳厚今則涼薄太甚值歲飢異常米穀涌貴民不聊生從去秋七月至今不雨野無農夫戶有盜賊而雷陽尤甚會城到戍所路經千五百里雷地已凶三年民物凋殘今復瘴癘大作死傷過半道路枕藉悲慘徹心季春炎蒸猶如流火弟私謂初心不以道緣不知朔雪之寒今非業力安知炎方之熱世態二途弟已極盡然非彼不足以破此也弟至即從行伍寄身古寺宛是頭陀荷戟轅門居然馬卒始知幻技兒幻出種種相耳且死生患難弟心何所不安但念與兄多劫親因今幸再值以未盡宿緣第恐沈淪瘴海永隔修途儻岐路過逢安得如今若昔諒吾兄智光圓照必以平等慈力而攝受之定不捨此業幻衆生為罪垢耳其他復何所云慨斯末法念報佛恩願兄努力為法自重自愛又自江干一宿蒙以甘露見灑即走入瘴鄉皆藉以驅炎蒸消熱惱耳吾兄惠我三昧何深也弟生平于大法緣薄幼而無聞老無所知頃于荷戈之暇力究楞伽筆之成記將以此謝謗法之愆弟恃孤陋之見既不蹈襲陳言又未及請正法眼竟為好事災木可謂駟不及舌矣敬專侍者持請印正不識就中果有少分相應否儻于性海掠一滴之味真空通芥孔之光差不負此平生亦不纍及法座若一言無當即為付之水火決不敢以此博虗名增業種自蔽妙明更障後人眼目也慨此末法正因者希弟幸與兄同生斯世同履一門苟于此法印可其心弟即不敢稱摩耶同胞適足以結兜率共座之緣耳與少林無言宗師伏念祖庭秋晚舉目寥寥可為垂涕者非一端也幸座下乘願而來鼎力荷擔正當揮戈駐日之時去秋天假良緣聚首王城一語而別及歸臥海上以觀世相若此諸念皆灰無復興起度生事業惟兀兀空山與諸幻衆種田博飯以消磨白日送餘年耳比來風聞法雨普潤四衆雲臻想雷電之機將破重昏而啓羣蒙也痛念世道交衰人多薄信一槩不以根本為懷且心器不淨又安可以注甘露瘳大病乎惟願座下深思顧命之言廣闡最初之制使初機之士追風受勒大步隨鈎然後播真風于性天撤迷雲于蘊谷特本分尋常輕車熟路耳狂愚之言高明以為何若與愚菴法師佛説四十里外不聞法者墮慢法罪鄙人知法座咫尺而不親聽聞亦墮此罪非本心也蓋為障障此緣耳昨承枉過一見甚喜既而且悲座下過苦如此然精進堅確固乃弘法者前旄而棄本取末亦不智之第一也蓋身為道本重為輕根而座下以一食之故欲損生為衆苦形以博名殊不智之甚此正不知輕重者耶古人有一念純真日用斗金非分外座下見解如此豈自不安于純真耶維摩道于食等者于法亦等此語座下把作不偏衆為等之耶若以不偏衆平等至若供養我者不名福田此又何謂也永嘉謂幻化空身即法身座下今自損法身虧慧命可稱知法者乎不知法而説法將何以模範人天用規來學乎有意不偏者謂曹山之不受食耳若以座下而觀假如曹山之語將欲奉行者豈將與夷齊同貫而後為得耶可笑座下説法不知法為己不為人知輕不知重計亡不計存是皆顛倒見耳鄙人此謂大似雪上加霜今奉世資若干為座下開齋之需座下若不食當不與之廝面矣且不及親往特遣如珊代為禮三匝勸轉法輪也又鄙人以苦言慰座下者以重法情深故也悲此末法寥寥舉目無親幸賴座下懷揮戈駐日之心嘉歎不容己但此中悽惋處非常情可知乃鄙人慣曾為旅偏憐客耳念座下以二施之力一肩荷擔日月無常色力有限第恐精神不足則法喜不充將何以飽飫人天哉身為法本此非浪語心知座下就裡密意正不在言至若幻化門頭亦借色力勇健為增上緣耳古人未有不假借藥石榮衛四大者以四大幻物元其家具耳讀法言霜雪凜凜松柏姿也但雪解而松柏振色此不假陽春而發越乎但願座下陽春滿屋則使草木皆春矣是大有望座下為法門重者故敢忉忉如此又別來忽忽四年矣誠萬里寸心千秋一日也所幸髮日白而心日赤形日化而念日消昔聞大火所燒時我此土安隱今見老胡真不吾欺也自入瘴鄉不數日即念楞伽為寢食烈𦦨毒霧中有此家具真水清珠令此身心如火浣布耳每坐菩提樹下深念老胡攜此一枝種子航海而來幸得賣柴漢栽培灌溉令其扶疏廕庇人天今二千年來無復為之料理者罪夫荷戈之暇即營其下侵晨理荒穢帶月荷鋤歸漸覺油然生意而發茂矣曹溪源頭扼塞乃復為疏濬其志有若干言寄法眼照之足見罪夫此中不敢忘家業負至恩耳昔被遣之日紫柏老人在匡廬對三寶立願願誦法華百部以求加被今還著于本人因率諸弟子了願于穹廬誦持之餘為衆敷演標其大旨名曰擊節併持請正以見天涯火宅紅盔下生計耳一笑與交光法師朽夫罪纍為法門辱自知慚愧無地懺悔所幸諸知識力加被之致得久活瘴鄉每思猊座萬指圍繞震海潮音作師子吼普警羣迷聲光所及靡不蒙益況在法親有緣者乎頃大義回家山聞公尚駐錫中條必得瞻禮光相小刻數種奉塵慧目略見萬里懷人之意儻蒙解脫尚期把臂于孤峰月下一笑長空洗此半生塵困耳與隱菴上人吾佛以生死喻海喻河是則我居海濵公居河畔然海水無涯河流迅駛我已觀海十年于此未知公觀河幾時也每念令師逝而不返令人悲愴不已心喪三年又不知還念令師如區區否欲公念令師非欲公效俗情也乃欲公念生死如河耳仲尼有言逝者如斯不舍晝夜公將何憑截流而過其為我言之以慰懸懸也茲因便致名香三種願以此熏足下信根耳此香一熏足下即汗流沾背是足以供十方諸佛矣海印以此望足下足下何以報我耶與靜修上人承惠乃祖翁笠子精妙絶倫鄙人時時戴之如天雖居丈室亦常目在之也公戴乃祖物如鄙人乎吾曹去佛三千年即今日心存目注如覿面金容若存想不真依教不篤則非佛弟子公能三十年存想乃祖若我輩所以想世尊乎鄙人見佛易見公等難不是我身不能到人世即是公心不肯如海印以身心相離故難之耳人生浮脆流光迅速公能揮戈駐白日可許不懼無常虗死也悠悠笑談作何究竟惟深省之寄松谷師聖人不出世萬古如長夜此語流布雖久證者希往不肖養疴窮谷每見毫光東照莫不皆從吾師眉間而發故使十方尋光而至者皆有所歸依即散花供養者盡成佛事然法門有此瑞相十方諸佛豈不共生歡喜讚歎今春不肖坐惡劫中衆苦音聲痛徹心府又聞吾師疲于津梁掉臂而去此之痛處著錐也私謂吾佛居舍衛國而城東老母不願見之後之具正令者謂此婆子有大人相今觀五濁惡世諸苦土中著一明眼人不得不肖亦謂此土衆生亦皆有大人相也言及至此吾師以為何如不肖業緣深重比又牽之入此鬧藍無奈狹劣之習不忘大菩提心未發然目前不見吾師而他方貧子堆集于長者之門無恃怙者正如衆星中無明月耳故十方暗冥豈獨佛祖無光實使覺場冷淡如此大地凝寒豈不凍殺法身耶令人悲酸不已豈直長夜之歎而已哉此心無地可寄但于吾師水月光中合掌作一讚歎耳遙觀明月山前光明石上對主山神衆説自證法門使聞之者聾見之者盲此吾師自性法樂定以此消磨日月破孤內耳與靜堂師十年剛一見復交一臂而失之然此心月凄凄寧不挂于階前長松之下憶吾師每率諸弟子逍遙食息乎其間豈不為音詠之資禪定之病耶大師無縫塔想呈樣矣行實當誰為之成時幸以見寄別後有作惟願書紙百尺頓令入我海印之光作幻人之伴也與萬安上人惟公為法門樞機荷負甚重乃乘夙願力實非淺鮮一自清涼別後朽夫雖妄生于人世亦未常忘情于公所憂非在公身而在公身所繫耳非虗語也昨以大事因緣入舍衛一見公喜不自勝此心釋然冰解始知龍象遊行固不可以蹊徑量浣慰何言周旋月餘察公眉睫間煙霞之氣栩栩然有塵垢粃粳濁世之意語默炳炳乎三昧此乃公宿植靈根般若內熏之所發所欠外緣助顯向上第一義耳良可悲悼蓋吾人所賦獨靈于萬物者豈止口體安飽而已哉真大有富貴于富貴求之在我而不假于人者存焉即所喻如摩尼寶珠者是以吾佛世尊蚤見于此故不戀安富貴尊榮爾乃甘心寒巖以六年苦行博廣大之受用所以一覩明星即如在掌握吾人固有而不見故甘心馳逐以一息之危生博無量之苦惱所以才遇愛緣即棄如涕唾至若較其輕重不啻以隋侯之珠彈千仞之者比也公自視何如哉願公自重而保持之萬勿自輕自棄沈酣鴆湎為親友所惜也朽夫自顧樗朽不材無敢旁景人世念與公見面之難且感高誼留意于朽夫者獨厚且重故敢以言為報耳流光難繫日月欺人但願努力寸陰自重自愛與梅翁本師弟子某自省罪原不通懺悔以自受身于父母受恩于君受教于師受知于朋友受法于知識受食于檀越惟此恩德殞身以報未足以酬萬一拔毛以數其罪不能計其少分也即今投荒萬里猶在蓋載之間而四事安居上賴聖主下資檀越不致飢窘流離者皆仗如來白毫光中一分功德也名雖罪鄉均霑造育此人間華報猶尚可逃恐地獄真因又何以免此某日夜所腐心者也別師以來忽忽四年雖坐戈戟場中未常一念忘其本事向于楞伽一卷句不能讀幸藉此地足可究心初至戍所坐尸陀林即安心觀照隨以所得筆而記之不覺終軸今夏為衆敷宣一周其聞者亦無多舛自信頗不妄談即不敢以著書見志聊足為懺悔之資且見某于造次顛沛亦不敢忘佛事敬持一部上供師前以酬訓誨之恩願藏之房中以為子孫之寶且為異日之話柄也囑弟子語子行矣善自寬毋以小害大毋以人廢言其言曉曉將以其信求其信果若我信子其勉之無順氣無恃志順氣傷恃志狂小不忍則亂大謀人無遠慮必有近憂小事當懲細行當勤天命可畏聖言可尊定志凝神無以為易其心戰戰兢兢守口如瓶防意如城惟學日積惟德日新流俗已深上求友于古人君子防未然不處嫌疑間如鳥擇木似虎靠山世路最崎嶇舉步宜囏難是以聖人生于憂患死于放逸切問近思博學篤志逢人若愚處世如寄無恃口無飭服恬淡寂寞身如虗舟心若空谷是信我信子其勉之與曉塵上人足下踞天目之師子還記落掌懸崖撫松立雪之事乎想孤峰絶頂覓得古人行履處也儻持片雲不妨散我炎荒作甘露清熱惱耳
