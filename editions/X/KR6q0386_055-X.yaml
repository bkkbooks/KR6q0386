body:
  text: 虞山私淑弟子毛晉編較附錄大明廬山五乳峰法雲禪寺前中興曹溪嗣法憨山大師塔銘有序余小子廣淪賓之在中秘也偕同參數子請益牢山憨公於龍華精舍蕭宗伯玄圃暨吾家司馬體中與焉所聞非帝網之十玄則祖燈之五葉而師特以體究念佛為露地兩輪後十年入粤而皖江之素復我又後二十年入吳因體中而浮渡之鼓振我於是余始能游師之籓悉秘現湧沒順逆種種影事又七年玄圃徑曹溪而北及送師於懸崖明年而余得請幕府何公克以師蛻還五乳也又明年上首福善瑩石為楮而奉師自著年譜使余吐舌為筆余受卒業者三而龍華浮渡之會儼然未散矣師法諱德清慕清涼法界之玄故字澄印別號憨山乃選於五臺之奇以喻狂性之歇者也系出金陵蔡氏考諱彥高妣洪氏夢觀音抱送而孕誕於嘉靖丙午孟冬之旬有二日白衣重包十年辭家依報恩寺主西林和尚使法孫俊公為之師十九禮棲霞雲谷大師薙髮受具二十六北游出入燕晉得自在三昧於臺山三十八遯蹟東海之那羅延窟久之得六種就踰五十放於嶺南而以出家優婆塞大振曹溪之鐸覃恩洊逮袈裟著身而師年六十有九矣又三年反自吳營菟裘於廬山五乳峰下剎曰法雲以養十方之老居數歲復如曹溪當年之七十有八臘之六十是為天啟癸亥先於懸弧者一日而示寂焉師丰儀慈滿神情凝定望之似阿羅漢初就外塾而母督之嚴徐而察焉知非池中物也從臾若翁以裂愛網而師之酬罔極也却十鎰之供於山陰藩邸獨拜孝定皇后之賜泥金和血以塗襍華攝二老於香幢光蕊其省覲也閒於報恩藏輪三宿子舍有法喜而無情怛君子曰生之成之是謂聖善熏之變之是謂潔白世閒慈孝其海之一漚而已矣北講之涉天壍也自無極之說華嚴玄談昉也南禪之反故鼎也自雲谷之付念佛公案昉也兩大士口光交灌師頂不驚不溢身恒晏坐華藏道場而清泰法王若二法王子入於淨念猛心如形斯鑑其養之專也乃至行於都市不見一人知其解者以為密雲尚往他日更於肇公似昔人非昔人義得未曾有所謂旋嵐常靜江河不流證之目前一一諦了而七歲時生來死去之疑渙然氷釋其偈曰生死晝夜水流花謝今日乃知鼻孔向下得宗通之相一卓錫臺山略杓岸頭聞機數反久乃不聞吹萬之諠雪窟頭陀酬對以目菜羮米汁旬啖一升念息塵忘立而喪我者不知幾旦暮也其偈曰瞥然一念狂心歇內外根塵俱洞徹翻身觸破太虗空萬象森羅從起滅得宗通之相二牢山之會心也海天雪月互影交光三昧現前無入無出其偈曰海湛空澄雪月光此中凡聖絕行藏金剛眼突空華落大地都歸寂滅場得宗通之相三又後三年靜中機發不因心念意在舌端其偈曰烟波日日浸寒空魚鳥同游一鏡中夜半忽沉天外月孤明應自混驪龍所謂月落後相見是耶非耶得宗通之相四蓋自是迴真入俗而有省覲之游妙喜大悟十八小悟無數箇中冷煖惟師自知意者菩薩根力次第增上明妙安樂恒與王所相應故華嚴之在筆端也六字佛名心手相得即一點無空過者而客主周旋語不愆忘文無亥豕妙法蓮華回向慈聖亦若是則已矣臺山無遮之會日更供具席以半千坐滿萬人皆師陰為擘畫如時而給剝無聲所與首事妙峰登公了不知其來處當事之嚴不交睫者九旬以水代飱者七日其去以匝月息者也借曰壯齡則耄期而徑余邑屋矣雲興瓶瀉脅罕至席不睹其倦於勤也嘗閒行海南訪子瞻寂音故蹟而望郡城生氣獨據西隅趣行北渡而瓊州地震存毀具如師言永嘉詮定初曰引起後曰辦事師其二之中乎臺山之悟四顧無所咨決而以現量寓目首楞嚴王八閱月無用心處其在那羅延窟則楞嚴懸鏡半燭而成亦無用心處門人曰盍使一一文句消歸觀心師頷之楞嚴之有通議自此昉也嘗以四法界觀說法華于嶺南至現寶塔品喟然嘆曰佛意要指娑婆人人目前即華藏然須三變淨土者曲為鈍根漸示一班耳從是法華之有擊節有品節有通議自此昉也折蘆孤唱楞伽握符栽松代興金剛司契而師照以楞嚴之鏡則無門之門無住之住皆若有啟其鐍者以故楞伽筆記和人目為流徵之音而金剛決疑則雖空生再來固當相視而笑華嚴一宗往往迷清涼之廣而耽方山之略不知廣之可以略也五乳一關三周寒暑疏之綱要其將與合論並珍如是種種說通之相布在方䇿覩烟悟火宗通歷然誰謂與不傳者俱往而法雲之漏刻之以香課佛名日至數萬圓頓交參禪土雙妙兩大士最初結束撩起便行直向山眉海目繞錫三周作一宿覺豈不真勇邁終古大丈夫哉韋編珠笈初以為前茅中以為副乘卒以為輔車於是作中庸直指大學決疑著春秋左氏心法道德南華內篇為智度善巧而鬼神情狀表章丘明曰夫夫冥參魯竺之心法也東奧周參知舉大易通乎晝夜之道而知以質師曰是吾宗所謂不屬生死一著子也參知躍然更為諸弟子暢其玄義而師以西伯為東諸侯主矣蓋西林翁嘗鈍置師以世諦使侍皐比故於二酉多所漁獵法書韻語少作功力美秀夙成事辭之文居然良史而非滿字莊嚴一乘鼓吹無述也王大司徒弇州屬以慧業建得其所謂夷然不屑厥仲奉嘗贈以晤言曰可知王逸少名理讓支公而汪左司馬南溟則悲五宗衰相聲輓力推岌岌乎為徑山中峰之室佹得之矣伏牛法光和尚師目之宗門香象自慶小穴小友畜師勉以離心意識參出聖凡路學而師時已得肇公意旨北臺影師言庶幾獨怪其吟哦不停以為魔著閒而請焉報言驟發悟機而有物據我舌本爾時恨不遭鉗錘毒手痛棒熟眠以至此耳師心識焉舘於胡臬憲順菴之署強可覓句遂不得休念光師之魔且至寢不成寐跏趺坐忘起問居諸而數盈於把矣故終其身於無礙辯才而得自在師之升聞於慈聖也為聖躬禱也其作無遮道場也為皇儲禱也居一年貞皇應河清之瑞而誕唱導之侶妙峰大方咸被寵錫而獨師逃之海濵求華嚴菩薩住處所謂那羅延窟而谷隱焉慈聖多之建寶坊於西山以召而弗之敢往也賜金百五十鎰以繕阿蘭而弗之敢拜也無已請如漢汲黯矯制事果山以東緇黃鰥寡囚繫之腹而有司者䇿書以報慈聖愈益多之藏函寶璽有隕自天以草昧故庋於他已又勅宮婇之勝任者布金有差而觀音菴之廢墟賜額尚方稱海印禪寺矣於是有挾隆隆而耽視茲土者號無賴黃冠百餘輩稱引宋七真故宇以為訟端萊守有聞於李中丞將致辟而首難者露刃偪師談笑道之立解偕行數百武其黨疑與師購將倒戈師更與入市啖以瓜果一郡盡讙謂方士殺僧矣師乃明其不然即渠魁無使滅耳第盡驅越境而已其以德報怨類此而往者報恩殿廊之燼也師與雪浪恩公矢以一期戮力及奉勅藏還寺而舍利窣堵出光明橋以迎貝㲲師因入謝請慈聖日減膳饈需隆棟久之事有端矣戒於島夷遂不果而中貴人之與轉藏輪者嘗以眦睚得過上左右眾鑠之謂其監緣飾佛事多壑帑金而詐稱黃冠摭己事鳴登聞以訟有旨逮師及中貴人對簿詔獄師內空其心而外侃侃言事請覈內府則賑饑之籍固在而他無所得其漏卮釋憾於中貴人者本不欲患師更以所稔顛末具廣貞狀上意浸解坐私建梵剎戌之雷陽而諸剎之蒙悉檀於慈聖者雖往來厲而億無喪矣故相張洪陽先生稱其難棄能棄難忍能忍以能幽贊神廟之孝為社稷功亮夫師於般若香光固是雲谷老人安上鼻孔臨岐偪拶亦自不無妙峰恩公一臂臺山遂作暮雲春樹清風匝地何之非早歲塤𡎍而師所描邈於飛雪之鑪運風之斤狎主之歃亦不啻三鎧甲龍從涅槃起矣紫柏大師於世罕所許可而獨輕千里之駕於堅牢晉琬公塔院之會送難通理一坐四旬於宇內法喜無兩其示寂圜扉雖魍魎輩毒於含沙而本所懷來固未嘗不在雷陽棨戟之下也雙徑之遊雖微上首鎧公固當己事遄往愆期有待而適會紫柏以舍利遷爰及闍維銘諸堅白其斯以為方外素交揚厲雲棲證知吾師蓮祖為法華地湧中人而浮山朗目智公亦以旋陀羅尼與作點睛手則予小子賓竊負法壘蝥弧漸騰而附青雲上矣師謂紫柏瀾之濁矣維泉之昧及吾兩人之未髦也左提右挈以為曹溪滌除宗門其有興乎左股既夷壯馬是急故紫柏自曹溪如燕而師度嶺已還乃心罔不在祖窟筮之以周臬憲海門而曹溪志成鎮之以戴制臺而屠沽之肆一灑狙獪虎冠兵奴我苾蒭蠶食我疆里者令不崇朝烏散鬼匿招提改觀於是乎範之以律儀經之以出入守之以典籍潤之以法流育之以義學如是者數年寶坊輪奐浸假若新最後有事於大雄寶殿而一二黠悍師蠧惡其害己歙張羣譟將以一矢加遺而師方晏坐誦金剛般若深解義趣愉愉如也譟者心怍已退而不釋然乃因制府之罷誣師掠用常住物愬御史臺流寓二年司理錫之鞶帶直指弗是也下郡徵典守節符會之秋毫無爽乃褫訟者服以竄而曹溪之蠱裕矣師之少也受遺西林翁獨以心計償兩世逋負緡至千於無遮之會而竣籍其羨以𢌿塔院寺主大方貲至萬知以恬養勞以謙牧發機於所不得已而藏用於所不可知驥稱其德而力倍凡馬無算矣雖報恩之籌以師命輟海印之績以城社隳南華之墉以裨販圮而師惟心之土悲智妙嚴豈復有乏少耶貴璫之濫於榷也藪盜叢姦不可嚮邇差幸有浮慕於福田而師受戴制臺請與為嬰兒其應如響於是稅使者窘於至期迫不得所欲而黃白之冶受成有司民不知有履尾之咥白艚遺粟食民而騰糴人患之而戴公胤子將歸溫陵其行也與白艚會於時榷使有憾於將軍則多族市井豪讙以媚竈冑士之告急於師者再矣師方安居扉為之啟從容諭眾而欲得賤糴耶今罪在大辟糴雖賤誰當食者眾怒少怠而急白榷使者出令寧反側心且明非胤子之過匡圉閴然蓋師輕身以先持戟使師涖大鑒宗盟而師脫載鬼之弧納用缶之牖無烈俠氣有烈俠功所謂動刀甚微謋然已解進乎技矣師毗尼純白廉而不劌門庭在雲棲紫柏之閒德充之符逅之而慢幢折疑城頹瞋劍墮出要咨諏不惜四楞著地惻乎惟恐人之不有之也蹤蹟半天下所至登羯摩之壇升白椎之座以數十會計東齊南越法化久湮佛種幾斷而自其得師也若醯雞之覩天地熏於二嚴誓於九品乃至盂蘭放生諸白淨行無冠笄童耄翕如也別傳之宗時復為利根者賈勇而齒牙無畏投芥於鍼使清涼之區乃得遵累朝憲章弛於任土而大木終其天年為官家佛法僧物寺主取大邑人無災用脫桎梏居然五天之郛一郟鄏矣今上毓於青宮詔戍士之老疾詿誤者陳情而宥師有二焉首尾覈奏凡六年乃聽自恣而慈聖之為孝定也臨於湘東大作佛事然後免妙喜之冠反棲賢之圉而師初行脚時所銘一鉢一衲雖豐城之與延津弗若矣師所莫逆海內賢豪無慮百數而天隨風負則北之胡南之戴為尤湖東練若以曾儀部金簡為三年淹五乳十檀則汪少司馬靜峰執其牛耳是時名剎之虗左者桐鄉之浮渡以堂金沙之東禪以構其曰麈尾是瞻武陵雲棲則萃通國之懽以請禪講勝流刳心䁥就美盡東南而竟為廬阜之岑寂所扄已復為曹溪之謳吟所吸人以為疲於津梁而師固未嘗下臺山之座也縱其樂說無礙之辯曲示單傳而鎔入一塵法界似圭峰解脫於文字般若而多得世閒障難似覺範森羅萬行以宗一心而嚴無生往生之土又似永明雖正令寂寥稍似婆心太熱亦或觀時逗根不忍法堂前草深一丈耳先甲曰辛以革其面後甲曰丙以蔚其文二十年以來飲光之華往往於吳楚閒振其夕秀瀹曹源者豈曰無庸師可報紫柏於淨土矣書華嚴時夢與登公謁清涼國師於金剛之窟而慈氏法王亦乘率陀樓閣影現夢心錫以䇿文曰分別是識不分別是智依識染依智淨染有生死淨無諸佛佩斯印也以游世閒所謂善能分別一切法於第一義而不動蓋師之所從來深遠矣年譜之筆絕於癸亥而專以法施為心六字其末後句也前化及之三旬徧謝申警若將遠行且各留楮墨為別眾以師眷眷法雲也判袂玄圃而小不豫矣侍者以遺教請至心念佛而外無他囑也初度欲臨而張韶州奉紫叵羅衣為壽清言浹日歡若生平日中而驪駒叱馭日晡而白牛說駕矣二時暖於頂三日汗濡於鼻覩貌如生而遙曯其瑞相者謂招提且火最後供通曰內外諸法空洞一如何去來之足問然則參雲谷時所覩三聖對現色身漚滅空澄了無所得永明有言生則決定生去則實不去剎那際中去齊而送者徙市去越而慕者傾都去震旦而哀者撼丘陵榮者雕金石如夢乍醒不消一咄矣緣熏習影重重無盡而出纏弟子曰福善某某等在纏弟子曰即墨黃生納善某某等五羊馮生昌歷某某等服勤請事助轉法輪皆其盛者也於師臺山願文四攝眾中固是恒河沙一數而黃生剜臂為燈以蘄反錫痂瘢作大悲形衣髮皆具首楞嚴觀晝夜一蒲勤勇坐脫可謂奇中倍人下逮余小子賓啖法乳於名字之初灑心血於窣堵之後雖步趨未也共相與力倘亦有不可思議者焉師瑰意奇行著於年譜不可殫書所著復有心經直說圓覺經解起信疏略起信直解百法規矩直解性相通說肇論註八十八祖傳贊方便語參禪切要觀老莊影響論憨山緒言夢遊集若干卷並行於世銘曰覩師舌相渝三紀而不能挈其廣長摸師眉毛亘三旬而不能知其在亡聽之以心兮失嚬呻之師子游之以目兮得迴旋之象王其語無聲其默孔揚其形不疲其神不傷璞三刖而為璽金百煉而彌剛禮師塔也皮相者以為化城之幻迹而心服者以為寶所之慈航賜進士出身左春坊左諭德兼翰林院侍讀菩薩戒弟子皖舒廣瀹吳應賓頓首拜譔大明海印憨山大師廬山五乳峰塔銘我神宗顯皇帝握金輪以御世推慈聖皇太后之志崇奉三寶以隆顧養上春秋鼎盛前星未耀慈聖以為憂建祈儲道場於五臺山妙峰登公與憨山大師實主其事光宗貞皇帝遂應期而生於是二公名聞九重如優曇鉢華應現天際妙峰不出王舍城大作佛事而大師有雷陽之行其機緣所至橫見側出固非凡情之可得而測也大師之遷化於曹溪也大宗伯宣化蕭公親見其異為余道之已而南海陳迪祥以行狀來謁余表塔余曰有吾師宣化公在他日請為第二又明年乙丑其弟子居廬山者曰福善奉全身歸五乳而留爪髮於曹溪走書來告曰大師東遊得子而憙曰剎竿不憂倒却矣燈炧月落晤言亹亹所以付囑者甚至塔前之銘非子誰宜為余何敢復辭謹按師諱德清族蔡氏全椒人也父彥高母洪氏夢大士抱送而生七歲叔父死屍於牀問母從何處去即抱死生去來之疑九歲能誦普門品年十二辭親入報恩寺依西林和尚內江趙文肅公摩其頂曰兒他日人天師也十九祝髮受具戒於無極某公聽講華嚴玄談至十玄門海印森羅常住處悟法界圓融無盡之旨慕清涼之為人字曰澄印從雲谷會公縛禪於天界寺發憤參究疽發於背禱護伽藍神願誦華嚴十部乞假三月以畢禪期禱已熟寐晨起而病良已三月之內恍在夢中出行市中儼如禪坐不見市有一人也雪浪恩公長於師一歲相依如無著天親嘉靖丙寅寺於火誓相與畜德俟時以期興復師既巋然出世而雪浪卒為大論師修治故塔稍酬誓願焉師嘗聽講於天界廁溷清除了無人蹟意主東淨者非常人也訪之一黃面病僧目光激射遂與定參訪之約質明則已行矣即妙峰登公也師以江南習氣輭暖宜入冬氷夏雪苦寒不可耐之地以痛自摩厲遂飄然北邁天大雪乞食廣陵市中曰吾一鉢足以輕萬鍾矣抵京師妙峰衣褐來訪須髮鬖𣯢如河朔估客師望其眸子識之相視一笑參徧融貞公融無語惟張目直視又參笑巖巖問何方來曰南方來巖曰記得來時路否曰一過便休巖曰子却來處分明遊盤山至千像峰石室見不語僧遂相與樵汲度夏時萬歷元年癸酉也明年偕妙峰結冬蒲坂閱物不遷論至梵志出家頓了旋嵐偃嶽之旨作偈曰死生晝夜水流花謝今日方知鼻孔向下峰一見遽問師何所得師曰夜來見河中兩鐵牛相鬬入水去至今絕消息峰曰且喜有住山本錢矣遇牛山法光禪師坐參請益法光發音如天鼓師深契之送師遊五臺詩云雪中師子騎來看洞裏潛龍放去休且曰知此意否要公不可捉死蛇耳師居北臺之龍門老屋數椽在萬山氷雪中春夏之交流澌衝擊靜中如萬馬馳驟之聲以問妙峰峰舉古人三十年聞水聲不轉意根當證觀音圓通語師然之日尋緣溪橫彴危坐其上初則水聲宛然久之忽然忘身眾籟閴寂水聲不復聒耳矣一日粥罷經行忽立定光明如大圓鏡山河大地影現其中既覺身心湛然了不可得說偈以頌之遊雁門兵使胡君請賦詩甫搆思詩句逼塞喉吻從前記誦見聞一瞬現前渾身是口不能盡吐師曰此法光所謂禪病也惟睡熟可以消之擁衲跏趺一坐五晝夜胡君撼之不動鳴擊子數聲乃出定默坐却觀如出入息住山行脚皆夢中事其樂無以喻也還山刺血書華嚴經點筆念佛不廢應對口誦手畫歷然分明隣僧異之率徒眾來相嬲已皆讚歎而去嘗夢與妙峰夾侍清涼大師開示初入法界圓融觀境隨所演說其境即現又夢登彌勒樓閣聞說法曰分別是識無分別是智依識染依智淨染有生死淨無諸佛自此識智之分了然心目也師既建祈儲道場遂遠遁東海之牢山慈聖命龍華寺僧瑞菴行求得之遣使再徵不能致賜內帑三千金復固辭使者不敢復命師曰古有矯詔賑饑之事山東歲凶以此廣聖慈於饑民不亦可乎使者持賑籍還報慈聖感歎率闔宮布金造寺賜額曰海印師詣京謝恩為報恩寺請藏上命師齎送因以便歸省父母寺塔放光累日迎經之日光如浮橋北度經在塔光中行也師還以報恩本末具奏曰願日減饍羞百金十年工可舉也慈聖許之歲乙未而黃冠之難作師住山十三年方便說法東海彌離車地咸向三寶而黃冠以侵占道院飛章誣奏有旨逮赴詔獄先是慈聖崇信佛乘敕使四出中人讒搆動以煩費為言上弗問也而其語頗聞於外庭所司遂以師為奇貨欲因以株連慈聖左右并按前後檀施帑金以數十萬計拷掠備至師一無所言己乃從容仰對曰公欲某誣服易耳獄成將置聖母何地乎公所按數十萬在縣官錙銖耳主上純孝度不以錙銖故傷聖母心獄成之後懼無以謝聖母公窮竟此獄將安歸乎主者舌吐不能收乃具獄上所列惟賑饑三千金有內庫籍可考慈聖及上皆大喜坐私造寺院遣戍雷州非上意也達觀可公急師之難將走都門遇於江上師曰君命也其可違乎為師作逐客說而別師度庾嶺入曹溪抵五羊赭衣見粤帥就編伍於雷州歲大疫死者相枕籍率眾掩薶作廣薦法會大雨平地三尺癘氣立解參政周君率學子來扣擊舉通乎晝夜之道而知發問師曰此聖人指示人要悟不屬生死一著耳周君憮然擊節粤之孝秀馮昌歷輩聞風來歸師擬大慧冠巾說法搆禪室於壁壘閒說法華至寶塔示現娑婆華藏涌現目前開悟者甚眾居五年乃克住錫曹溪歸侵田斥僦舍屠門酒肆蔚為寶坊緇白坌集攝折互用大鑒之道勃焉中興甲寅夏師在湖東慈聖賓天詔至慟哭披剃返僧服又二年念達觀法門死生之誼赴葬於雙徑為作茶毗佛事箴吳越禪人之病作擔板歌弔蓮池宏公於雲棲發揮其密行以示學者自吳門返廬山結庵五乳峰下效遠公六時刻漏專修淨業居四年復往曹溪天啟三年癸亥宣化公赴召來訪劇談信宿公謂師色力不難百歲更坐二十餘夏如彈指耳師笑曰老僧世緣將盡幻身豈足把翫哉別五日果示微疾韶陽守張君來問師力辭醫藥坐語如平時既別沐浴焚香集眾告別危坐而逝十月之十一日也曹溪水忽涸百鳥哀鳴夜有光燭天三日入龕面顏發紅鬚髮皆長鼻端微汗手足如綿僧徒驚告謂師復生蕭公語余衰老赴闕䟦涉二萬里何所為哉天殆使為師作末後證明耳嗚呼知言哉師長身魁碩氣宇堂堂所至及物利生機用善巧如日晅雨潤加被而人不知山東再饑師盡發其囷親泛舟至遼東糴豆以賑旁山之民咸免捐瘠稅使與帥有隙嗾市民以白艚作難羣噪圍帥府師緩頰諭稅使解圍不動聲色會城以寧珠船千艘罷採不歸剽掠海上而開礦之役繹騷尤甚採使謁曹溪師以佛法攝受徐為言開採利害由是珠船罷採不入海而礦額令有司歲解制府戴公詒書謝曰吾乃今知佛祖慈悲之廣大也師為余言居北臺大雪高於屋數丈昏夜可鑑毛髮堅坐待盡身心瑩然遲明塔院僧穴雪以入相𢹂行雪洞中里許乃出當詔獄拷治時忽入禪定榜箠刺爇若陷木石逾年在雷陽聞侍者趣呼逮繫毒楚卒發幾無完膚此楞伽筆記所由作也師東遊至嘉興楞嚴寺萬眾圍繞有隷人如狂易狀搏顙不已曰我寺西仲秀才也身死尚在中陰聞肉身菩薩出世附隷人身求解脫耳師為說三歸五戒問解脫否曰解脫竟懵然而覺師之樹大法幢為人天眼目豈偶然哉師世壽七十八僧臘五十九前後得度弟子甚眾從師於獄職納橐饘者福善也終始相依於粵者善與通烱超逸通岸也貴介子弟剜臂然燈以求師道現大士像於瘡痂中而坐脫以去者即墨黃納善也士歸依者馮昌歷為上首御史王安舜孝廉劉起相陳迪祥歐文起梁四相龍璋皆昌歷之徒也師所著有楞伽筆記華嚴綱要楞嚴懸鏡法華擊節楞嚴法華通議起信唯識解若干卷觀老莊影響論道德經解大學中庸直指春秋左氏心法夢遊集又若干卷嗟乎師於世閒文字豈必不逮古人有不逮焉亦糟粕耳師於出世閒義諦豈必不合古人有不合焉亦皮毛耳惟師夙乘願輪以大悲智入煩惱海以無畏力處生死流隨緣現身應機接物末後一著全體呈露後五百年使人知有一大事因緣是豈可以語言情見擬議其短長者哉是故讀師之書不若聽師之言聽師之言又不若周旋瓶錫夷考其生平而有以知其願力之所存也謙益下劣鈍根荷師記莂援据年譜行狀以書茲石其詞寧繁而不殺者欲以示末法之儀的啟眾生之正信也銘曰人生出沒五濁世閒生死之涂屹立重關重關峻復誰不退墮師子奮迅一擲而過濟河焚舟縣車束馬一鉢飛渡誰我禦者氷山蟄伏雪窖沉埋氷解凍釋水流花開光明四照上徹帝閽榮名利養匪我思存震霆赫怒我性不遷桁楊木索說法熾然覺範朱崕妙喜梅州雷陽萬里謂我何求軍持應器橫戈杖錫毀形壞衣古有遺則大鑒重徽靈照不昧屈㫬之衣如施畫繢師之示現如雲出谷觸石膚寸雨不待族雲歸雨藏山川自如孰執景光以窺太虗福德巍峩文句璀璨視此肉身等一真幻匡山不來曹溪不去塔光炳然長照覺路天啟七年丁卯九月朔常熟幅巾弟子錢謙益謹述憨山大師傳師諱德清全椒人姓蔡母洪氏夢大士𢹂童子入門抱之遂娠及誕白衣重胞居常不樂俗年十二聞西林和尚有大德欲往從之父不聽母曰養子從其志迺送入寺時無極講經西林雪浪長師一歲先依無極見師如夙契十九從無極聆華嚴玄談至十玄門海印森羅常住處悟法界圓融無礙之旨切慕清涼之為人自字澄印每於講會密察方僧可為侶者一日見後架潔清思淨頭必非常人比見乃黃腫病僧每早起事必辦不知何時灑埽也故不寢以偵之則當眾方放參時已糞除畢數日淨頭病師問安否答曰業障身病已難支而饞病又難當每見行齋食恨不俱放下師袖果餌親之問其號曰妙峰蒲州人因相期結伴為遠遊既數日則已去矣更六年師至長安有稱鹽客相訪者長鬚髮衣褐衣入門即問認否師視其兩目忽記昔天界病淨頭也云為山陰王請內藏來師追妙師至河東山陰王留結冬訂刻肇論向於不遷論未明旋嵐偃嶽之旨忽閱梵志自幼出家白首而歸鄰人曰昔人猶在耶志曰吾似昔人非昔人也豁然了悟初師方七歲叔死叔母撫尸而哭曰天耶那裡去也師愕然問叔身在此又往何處曰死矣意死向何處去疑之未幾次嬸舉子隨母往視見嬰兒問母何從入嬸腹中母拍一掌云爾從何入爾母腹中耶又切疑之自此死去生來之故耿耿於懷至是如氷澌泮矣明日妙師問所得師曰夜來見河邊兩個鐵牛相鬬入水中去也至今絕消息妙師笑曰且喜有住山本錢矣時伏牛山法光禪師在王所示以離心意識參出凡聖路學師深領其旨每歎曰光師談論如天鼓音一日搜師詩讀之笑曰何自得此佳句復笑曰佳則佳矣那一竅欠通在師問和尚通否曰三十年來拏龍捉虎今日草裡走出兔子來下一跳師曰和尚不是拏龍捉虎手光拈拄杖作打勢師把住以手捋其鬚曰說是兔子恰是蝦䗫光笑休去一日謂公不必他往願同老伏牛是相望也師同妙師登五臺光以詩送云雪中獅子騎來看洞裏潛龍放去休問其意曰要公不捉死蛇耳師言禪道久無師匠比見光師始知有宗門作略大方主人為卜居北臺之龍門大風時作萬竅怒號意喧之問妙師師曰境自心生非從外來古人云三十年聞水聲不轉意根當證觀音耳根圓通初師日坐溪橋水聲宛然久之動念即聞不動念即不聞一日忽然忘身音聲俱寂自此眾響閴然不復為擾矣人餉師米三斗日食麥麩和菜以合米為飲送之半載有餘糧偶粥罷經行忽入定不見身心唯一大光明藏圓滿湛寂如大圓鏡山河大地影現其中及覺說偈曰瞥然一念狂心歇內外根塵俱洞徹翻身觸破太虗空萬象森羅從起滅時年三十也悟後無可請益乃展印楞伽經既夙所未講但以現量照之少起識心即不容思量如是者八閱月全經旨趣了然量中一夕夢入金剛窟石門榜大般若寺見清涼大師倚臥床上妙師左侍師趨入禮拜右立大師開示初入法界圓融觀境謂佛剎互入主伴交參往來不動之相纔說其境其境即現自知身心交參涉入妙師問曰此何境界大師笑曰無境界境界又夢履空上昇入廣大樓閣瞻禮彌勒聞其說曰分別是識無分別是智依識染依智淨染有生死淨無諸佛自此識智之分了然心目萬歷辛巳神宗皇帝遣官祈皇嗣於武當皇太后遣官於五臺就本寺建道場訖癸未師以臺山虗聲難久居遂蹈東海之上易號憨山尋清涼疏所謂那羅延窟者即東海牢山也聖母以五臺祈嗣之勞訪求三人大方妙峰俱至命龍華寺住持至海上喻師尋建寺西山期以必往又發三千金為師建庵師俱辭丙戌敕頒十五藏經散施天下名山慈聖以其一送東海牢山無可供奉命合宮布金修寺賜額曰海印是冬禪室成靜坐夜起見海忽身心世界當下消落偈曰海湛空澄雪月光此中凡聖絕行藏金剛眼突空花落大地都歸寂滅場入室取楞嚴證之開卷見汝身汝心外及山河虗空大地咸是妙明真心中物全經觀境了然心目述楞嚴懸鏡一卷丁亥開堂說戒四方衲子日益至作心經直說以懸鏡文簡學者不易入始創意述楞嚴通議己丑為報恩寺請藏齋送至龍江便道省親且欲重修本寺師出家處也乞聖母日減膳羞百兩積之三年可舉慈聖俞之甲午冬入賀聖節命說戒於慈壽寺再請舉修報恩寺上命徐俟明年乙未逮師先是上數惡內使以佛事請用太煩偶以他故觸聖怒有忌送經使者因之發難遂假前方士流言擊登聞鼓以進下鎮撫司獄望風旨者盡令疏向所出諸名山施資十數萬計嚴訊之師曰媿為僧無以報國恩今安惜一死以傷皇上之大孝乎即曲意妄承奉非臣子所以愛君之心也有死而已止供前施七百餘金而前所辭建庵金使者不敢復命師曰古人矯詔濟饑今歲凶何不廣聖慈饑民乎令僧與使者遍散之僧道孤老獄囚各取所司印籍以復至是請覈內支籍代賑之外無他上意解時相國洪陽張公暨諸當事營救甚力後張語人曰人知憨公為大善知識不知有社稷陰功也眾聞之悚然出獄戍雷州侍御樊公繼謫問雷陽風景何如師方註楞伽經拈卷示之曰此雷陽風景也督府命住曹溪闢堂𤀹源行化之外普潤枯瘠癸卯達觀在京師適妖書發難下詔獄訊以為師之故檄還戍所因憶達師云楞嚴說七趣因果世書無對解者師云春秋乃明明因果之書耳遂著春秋左氏心法乙巳渡瓊海夜望郡城氣索然遂行謂眾曰瓊城將有災行後地大震陷城東隅暨官民廬舍仆明昌塔壓碎師所寓樓先時郡士大夫競留師師不止故免丙午遇赦癸丑至衡陽遊南嶽禮八十八祖道影丙辰登匡山避暑金竹坪註肇論僧某以五乳貽師喜其境幽將投老焉為達觀茶毗手拾靈骨藏於文殊臺丁巳下山弔雲棲說法淨慈之宗鏡堂日遶千指歸閉關謝眾效遠公六時刻香代漏專心淨業著華嚴綱要重述圓覺起信直解莊子內篇註粤方伯吳公暨諸弟子固請復至曹溪者三壬戌冬至為弟子戒期講楞嚴起信諸經論晚參示眾云老人穩坐匡廬今日踰河越嶺為著甚麼爾曹慎毋作容易想也癸亥冬十月示微疾韶陽太守挾醫問疾師不御侍者請垂一言師曰金口所演尚成故紙我又何為自後不語端坐而逝初外道羅清以其教遍行東方絕不知有佛法師居東漸久其長率眾來歸開講大化遂遍東海嶺南佛法久廢海門周公攝南韶集諸子問道於師周鼎石問通乎晝夜之道而知師答此聖人指人要悟不屬生死一著公擊節歎服有龍璋者聞師論心異之歸謂其友馮昌歷曰北來禪師說法甚奇特因共請益師開示以向上事諦信不疑自是王侍御安舜歐文起梁四相等相率歸依士人向慕法化大行雖上下崇禮奉為法王而有為之事角至再然當事有結轖則必乞師解之稅使者惡大將軍因苦閩艚運米新督席閩人也公子舟次白艚之旁藉口以大將軍資公子行鬨士民數千人沉公子舟持戈圍帥府甚急帥令中軍詣關涕泣求救師遂破關往謁從容開曉使者悟俾散亂民師先往大言於眾曰諸君所為欲食賤米耳今犯大法當取死即有賤米誰食之耶圍乃解會城以寧復甦採珠之擾其在東海敕賜殿成勢家冀奪道場搆方外黃冠稱侵其道院事下菜州無賴數百喧競合圍師令侍者他往獨徐行其中首一人舞銅牌利刃出其鞘擬殺師師笑視之曰爾殺人何以自處其人氣索收牌刀圍行城外二里許將東西行師躊躇請首者同至寓處閉門解衣磅礴談笑自若取瓜果共噉之一市喧云方士殺僧矣太守遣多役捕之彼眾惶懼皆叩首求解師曰爾勿懼亦勿辯第聽吾言太守問狂徒殺僧耶師曰未也來捕時僧方與彼同食瓜果耳太守曰何鬨曰市鬨耳太守命三木師曰將欲散之乃故拘之耶太守悟但令地方驅之不三日盡解散師於詩文天才駿發少年入長安王元美諄諄誨以詩法師不答瞠目視之敬美一見笑曰阿哥輸却維摩了也論曰莊生云以聖人之學教聖人之才其亦庶乎其可矣余以辛酉入五乳訪師者三語甚洽余謂師用世異才也贈以詩曰出世還應用世人師不語其意深自得又謂師老矣何不加意嗣人答云須其人精心求之我求何益初師在海上即墨黃生納善年十九參究堅切脇不至席對大士破臂然燈保師速還火發瘡痛日夜危坐持觀音大士名三月乃愈痂痕結大士像眉目身衣宛然如畫求隨師出家師不許生乃曰弟子打箇觔斗來師又何能止我乎又明年竟坐脫此豈所謂其人耶非耶其在嶺南則馮昌歷五乳之患難不二者為福善賜進士出身廣東等處提刑按察司按察使會稽陸夢龍君啟撰憨山大師塔院記嶺南無佛五祖所譏而能大師出其無根之智剖三光而剗五嶽掃軌易嚮以師百世何其盛也玄風既衰法地亦墜積劫之因是為闢始師與達觀滌源曹溪之盟結想未紓師乃被難達觀聞之驚曰憨公已矣此願曷酬而師以主恩佛佑流宥五刑適赴其地雖業累所纏然亦因緣之願力也初至解紛上將督府德之願為護法先時道場土宇割裂侵并流徒肆為屠沽至是檄縣期以三日盡之因謂師六祖腥羶已為滌然生靈塗炭請師救濟其一珠船千艘皆海上巨盜資以欽採之勢踰期不歸橫掠海上吏不能制其一礦役暴橫掘墓破居師乃徐動榷使啟誘信心嚴約珠船徹所遣役歸有司歲額解進民自此安枕矣遂闢祖庭立義學登壇說法自宰官文士下及𧵑販咸遂歸依改徑拓產歸所侵田以屠肆為十方旦過寮設庫司清規井然如官府法歲大饑疫勸施掩骼作濟渡道場夫無著之機棄絕聖智有為之化波潤津梁大小精粗至人畢貫所以君子契其精玄小人懷其樂利沒而不忘其在斯乎玄圃蕭先生北上入訪因遊次謂曰已為師覓一片福地問何在曰天時岡師戲云天時岡宰相定穴非吾法王孰能居之既別即示微疾數日而逝甲子春廬山弟子福善等至請龕還廬嶺南弟子歐文起劉起相暨山寺大眾議留乃鬮卜之三鬮皆得留字韶太守張三星為建塔院即所指天時岡也然龕卒歸五乳是為衣履之藏銘曰聰明聖智道不涉焦金腐芥世喪裂大師精神十方徹撓挑風雷弄日月波瀾不蕩光不滅曹溪中流祖源遏刊山滌源九州列洪鍾在函無扣歇水逝風行非續絕曹溪五乳無蹟轍與塔而三其嶻嶪天啟七年六月賜進士出身廣東等處提刑按察司按察使會稽陸夢龍撰本師憨山大和尚靈龕還曹溪供奉始末謹按本師以萬歷丙申逆緣入粤生平履歷備載於蕭玄圃吳觀我錢受之諸名公銘亦既逗漏不少今所紀者自廬山迎靈龕還曹溪及開龕漆布始末也吾師弘法一生精神半在曹溪備載於中興錄暮年歸休於廬之五乳天啟壬戌起相同堂主本昂等堅請師南還以癸亥冬示寂於曹溪五乳眷屬知微善公欲迎靈龕歸廬龕前拈鬮三拈皆得留字于時宗伯蕭公捐貲會本道我齋夏公韶府張公暨遠近緇白弟子及十房僧道崇建塔院善公者本從師於患難九死之餘孝誠篤摯邀請吳越諸宰官歸依師門者具書當道何制臺下令強迎歸廬乙丑之春正月也崇禎庚辰起相承乏司李瑞州入山掃塔始知形家異議既入塔復啟𣪁卜地因憶壬戌侍師於廬師別詩云一片遠心遡流水相期端為不傳衣又曾於眾中授記云爾他日為兵部權要之官當為我修蔡家先墳二十年來一官拓落既難提石上之衣又罔效包土之力嘗懷內疚忽猛省曰師靈未妥倘了此段公案其於修墳不既多乎遂謀力任南迎之役長男珵燁隨任因力贊之癸未秋楚𡨥震鄰兵燹是虞嗣孫慈力廣成等用予言龕前拈鬮三鬮皆順起相解任將南歸遣男珵燁代迎有晏生日瑞者曾物色之兩造中賞其膽智可任渠亦堅請效勞因命之往康郡糧館亦留都人難之曰大師吾梓里也彼能迎我獨不可留乎相先托同鄉康郡司李廖公文英為東道主值廖奉臺檄辦事准安已在舟中矣為風所留幾八十日晏生懇之廖欣然許諾一夕風轉南遣人趣晏曰風利不泊遲則自誤值晏痢病動轉不得業揚帆北渡晏生已夫望矣是夕石尤風大作又逆遞廖舟還故處晏生手額曰大師之靈也於是檄星子縣署篆甯公主其事牌行山中眾莫敢抗瑞郡守戎金國柱康郡守戎胡宗聖皆遣兵迎送旗鼓導引出山𡨥警日迫河道梗澀六舟南邁途中值賊客舟皆被邀截獨靈龕船得風揚帆徑去鈎竿皆著手不得如是屢經險阻履險卒夷川嶽助順何莫非吾師之靈也是年冬仲朔二日靈龕到山山中大眾歡聲如雷以為從天而下也晏生及嗣孫慈力為余言龕靈異甚初出山及度嶺皆四人𢌿之比到濛裏登岸夫力倍之猶勉強此何說也予謂老人家顯異欲以肉身出現乎擇吉入塔在甲申九月而荒盜頻仍復值燕都大變崩心痛悼欲先期入山省視未遑也有宋總戎紀者語僧遠蒼曰大師名喧宇宙豈同餘人金剛之體保無缺漏請開瞻禮於四月廿八集眾拈鬮許開開則道骨如生儼然端坐不傾不倚髮甲皆長衣服鮮潔白綾坐褥無半點瑕數珠絨串若新大眾歡呼歸命頂禮觀者如堵後數日前吏部尚書李公日宣韶府黃公錕者入山隨喜共作證明始信肉身大士應緣度世前有大鑒今有本師先是卓錫泉久竭郡侯黃公留心法門百計搜剔比靈龕既啟泉則自湧應若影響豈偶然也起相與余宗元紏本府長春社中緇白善信設闔山大齋以重陽日入山廿五日齋僧十月初十日漆布陞座十房戶長長老耆舊塔主堂主及長春社護法居士具僉帖請嗣孫慈力等守奉塔院香燈宋公首捐五十金漆布且請李公撰募疏謂塔院襟眉未舒為修剏取香燈田產之費制臺沈公業題百金此皆與本師夙值般若之緣故能於末後一著各出手眼為千秋竪光明幢也起相綿力何幸躬逢其盛爰識其始末如此崇禎十七年十月吉日原任江西瑞州府推官順德菩薩戒弟子劉起相頓首謹識奉輓憨翁禪師圓寂蕭雲舉少宰廣西人鼓棹雙林扣夕扉故人把袂洽心期一年契濶龍華會萬里音書雁斷時茅結牢山歸北海花開庾嶺向南枝衡陽地褊袈裟濶匡嶽雲深杖錫移臺鏡本空觀自性風旛忽動想能師幾回涼月倍清夢一宿秋風對故知隱几談天收密義揮毫見地掃羣疑久無粘縛心常定空有慈悲首重垂落葉秋深忘語倦聽鍾夜半說心危每嗟塵世心常苦更到禪臺路轉岐法語聽來堪唯唯客程催去故遲遲老知湖海應難遇會囑機緣忽漫離鴈過寒山秋影盡馬嘶曹水去聲悲尺素傳書人北面闍黎聞訃淚交頤法門摧棟材難得覺海藏舟事莫追睡蝶蘧蘧纔入夢猶龍矯矯欲何之晤來已是經千劫化去何煩贊一辭忘我非貪無相好觀空莫詫有形奇回看峰色林端寺夢想潮音篋裏詩圓寂那曾分去住莊嚴不改舊威儀秪愁法侶應稀少託鉢傳衣更屬誰奉輓憨翁大和尚有敘吳中偉左方伯海鹽人憨山大師禪宗龍象余治兵湖南獲展參詣庚申春再承乏嶺表道經曹溪頂禮南華祖像僅蔽風雨雖巨材山積而龜曝鶴飛丹青剝落徘徊久之慨然太息詢厥所以老比丘答言此我憨大師未竟業也安禪七日金地將完讒搆三途法輪中輟言罷掩抑悲不自勝予重憐其意語之曰若等真思大師予當為若招之比丘輩咸各歡喜無量投地稱謝遂重趼千里殷勤啟請始於比年某月再入曹溪則僧輩已三詣大師而予亦三致書師矣卓錫之日法訊見貽薄宦紏縛未遑酬次每念他日北歸庶幾從容化城仰參心諦而法臘已滿遽登涅槃俾予數年所懷竟成虗想夫金剛不壞則大教常流石電難延則肉軀等盡予悼宗風之永寂哀玄義之將頹感往多哀傷今欲絕攬筆成誅情見乎詞矣歸盡天龍有大師講壇華雨落遲遲厨中法膳慈宮出嶺表恩流聖主知鷗鳥宰官疑玩世旃檀海藏有經時是誰高足如迦葉把撰遺疏痛所思曹溪滴滴泣南華當日親承坐具紗心印獨傳無一字地金重布有三車林風月掩床頭火穀雨煙消定後茶末法中興還更墮低徊雙樹獨長嗟讖記南宗歲已千道場重此更安禪法流心在無窮悟祖去衣藏不再傳泣斷比丘黃葉下靈埋鏁子白雲邊應留遺教經同佛猶自中流得寶船滿月當年一試參歸依初地憶湖南衣從白㲲身常淨教演青蓮舌再含金版譯窮經幾部銀鈎書就祖千函予曾刻師楞嚴通議師亦為予手書祖像贊傳是誰檀越真師負三度書招秪自慚過匡山奉弔憨山大師王思任山陰人七峰絕頂開巒蘿葛窮時剩石攀溪舌瓏玲難翦截教人猶自聽憨山靈光作線一相牽八里庄前二十年今日拜師猶骨在知師原是古金仙賜環炎海主恩多鱷浪蛇雲伏幾魔遮莫靈山因道力空餘好相聽彌陀治任千般為一龕曹溪廬阜若何參早知風月猶擎架一火燒時沒得擔奉輓五乳大師博山後學大艤象王蹟應瑞蓮開五乳峰前吼若雷今日樹煙何靉靆紫雲旋入白雲推南華福地塔全身脚底猶披五乳雲柱杖攪渾清世界不知得法幾多人哭五乳大師弟子福能憶斷南華歸去來那堪已脫舊蓮胎人誰得髓應成笑我未忘情自合哀荷法從今皆弱質論文視昔幾雄才可憐孤客餘雙眼遙對青山泣草萊乍得歸依雙徑山師資可想鷲峰閒幾堪玉樹蒼苔瘞即使香臺末路還語對石泉分哽哽涕當風葉墮印心四卷楞伽在掉臂何人已出關泣對緘書轉不平空於手澤訴歸盟相逢未惜懸千載自棄須知負一生推古但云𢹂履去臨哀誰解作驢鳴蕭蕭客舍殘冬雪點袂依人若有情淚灑天涯寄弟兄先師遺囑太分明鬚眉五老堪摩擬腰脊三梁自現成紅葉鄉人雙眼血白雲弟子一心旌於茲領取拳拳意何必高談論死生寄憨大師曹溪法眷書海印白衣弟子虞山錢謙益致書於憨大師曹溪塔院住持諸上座師兄恭惟甲申之歲大師真身自五乳歸於曹溪迄今十有三載矣某洊經喪亂萬死一生視息僅存草土自屏既不能襆被腰包躬埽塔院又不克齋心頂禮遙致瓣香仰負劬勞俛辜記莂跼天蹐地歎愧何已唯是多生承事畢世歸依布髮未忘其宿因失乳久思夫慈母此則海墨難盡劫火不灰我大師固當於長寂光中重加憐慜密為加被者也自法幢傾倒末劫凌夷師子逝而野干鳴龍象寢而妖狐熾家家臨濟箇箇德山宗師如茨付拂如葦而又搆造妄語侮慢聖僧謗紫柏則曰本無師承毀大師則曰但稱義學聚聾導瞽惑世誣民法門之敗壞未有甚於此時者也舉世飲狂井之藥而有一人不狂舉世怖曉鏡之頭而有一人不怖單撑孤立風雪當門此一人者或者護世四王密諦力士假手是人為如來使使之屏除魔外不斷佛種而我大師慈心悲愍普施無畏亦豈無厚望於後人與諸上座與某緇白不同同出大師之門並受遺囑居今之世隨波逐流坐視斯人中風狂走搖手閉目不為拯救亦何以稱海印之真子與魔強佛弱俗重道輕智眼無多法城日倒未上諸上座能不河漢吾言否也今所欲亟請於座右者近代紫柏雲棲皆有全集行世大師夢遊集嘉興藏函但是法語一種其他書記序傳之文發明大法者有其目而無其書聞大師遺稿藏貯曹溪卷帙甚富今特為啟請倒囊相付當訂其訛舛削其繁蕪使斯世得窺全壁不恨半珠人天眼目剎塵瞻仰斷不可遼緩後時或貽湮沒之悔也又大師著春秋左氏心法乃發明因果之書常自言曹溪削稿時燈前燭下徵求案斷魂魄可追毛髮皆竪以今世時節因緣正當開顯此書用以革頑止殺撈攏劫濁追思大師往昔付託良非聊爾流通之責胡可逭也伏祈諸上座合力搜羅悉心採集片紙隻字罔有闕遺楗椎集眾招告大師真身之前舉授軺車詔使鄭重郵致俾某得藉手撰集以告成事此則法乘教海千秋之耿光非及門一人之私幸也大師五乳塔院濫竽載筆南海陳相公曾為題識勒石南華甲申已後歸龕事蹟山門當有實錄不揆蕪陋願考覈作第二以備僧史某年七十有五誓以西垂之歲歸命佛門會台賢之異同破性相之岐執闡揚遺教弘護真乘庶幾黽勉餘生不負大師摩頂付囑至意俟文集畢工少有端緒當為文一通啟告大師冥機密感念茲在茲而今固未遑及也遙望雙峰焚香作禮嶺海迢然如在床席天寒夜凍琢氷削牘意滿楮陿不盡所云歲在丙申十一月長至前三日某和南奉啟右錢牧齋宗伯訪求憨山大師遺稿書以託龔孝升中丞者頃𢹂至海幢華首和尚觀之彈指讚禮蓋歎錢公能不負師龔公能不負友而兩公皆能不負佛所付囑也使授諸梓命今釋跋其後嗚呼斯道凌夷於今已極良由信根輕鮮忘法本而背佛恩其視慧命斷續之閒若越肥秦瘠笑啼皆偽起倒隨人請以此書正告天下萬世之為法門後昆者知錢公所以盡心於大師之心與龔公所共弘護之心與和尚所共流通之心皆共出於三世諸佛大悲大願之心皮下有血人觸著便痛不隔一絲危涕既零忘身非險即生佛慧命實嘉賴之豈止為大師竪立光明法幢而已時丁酉春正月穀日華首門下弟子比丘今釋跋台諭憨大師全集泰處署中搜羅咨訪非力所及適金道隱在此知中丞傳台札於海幢法侶其堂頭宗寶老人歡喜讚歎焚香設拜屬道隱題跋付梓布告諸方俾凡有收藏大師法語者單辭片紙皆來聚集現在數種附中丞行笥此外更有所得泰當為續上也門人萬泰頓首憨山大師全集舊序余嘗思維世聖賢立身一代或開創或繼述或守成或重興或救弊其用心於制作之微事無不周義無不備使千萬世下有能尋其旨趣皆可因之而振起也此非古今之大經大法哉於是更進而思之夫經世聖賢尚能以身盡一代之事以道開萬世之心況我佛祖出世為人以超生死性命之法而化凡聖迷悟之心其示現普門感應異類者豈不能續三世之慧燈傳大千之種智乎余於憨山大師見之矣大師悟門與教化之廣大已見於自己著述與諸明眼傳記贊銘之詳舉世莫不知為再來肉身大士矣余何能贊一辭蓋痛念法門而有感焉大師當此宗門凋落之際方與雲棲達觀二大師相為鼎立以悟宗門之人不據宗門之位是預知宗門將振故為宗門大防獨虗此位而尊此宗使其狂妄僭竊之徒自生畏懼而不敢眇視輕賤此其心又奚啻程嬰杵臼哉嗚呼有三大師如此光明赫奕於前而後世尚有僭竊不恤為大師之罪人者寧不大可慨與雖然孔子作春秋正萬世名義雖不能使萬世之名義皆正而有不能正名義者亦何能逃春秋之誅余昔年見大師贊予壽昌先祖及撰塔銘即突出大好山千里遙相見之句已知與先祖把手共遊向上一路矣至於平生說法著作曲盡一代時教始終本末全體佛心全行祖意其提唱拈頌及指示偈語曾何減於古人曾何讓今人天下後世自知師實祖位之人不居祖位豈可以師不自居即為非祖位人乎師沒後二十二年而全身不壞與曹溪六祖開創重興無有二義其進於維世大經大法而能續法身慧命誠無不周無不備也茲大師法孫堅如欲募刻師全集乃特請為序而贊成之予嘉其為法忘軀之誠因述余所仰慕感慨之思云爾天界後學道盛和南題憨山大師口筏引客歲龔中丞孝升入虞山錢宗伯屬收憨山大師遺文維時華首老人與鼎湖棲壑和尚裒集法語及諸論述附星軺以往珠海牟尼光已照映吳山淛水閒矣余從友人黃秋聞又得遺言一則乃師中興曹溪祖庭時與鄧生敷說所謂口筏者也師信口說法泚筆千言文不加點皆從不思議中流出其示鄧生言下指點縱橫穿漏從來單提直指未有如是之簡捷透快者師與雲棲紫柏同時稱三大宗師弘皆親受記莂雲棲以低眉作佛事師與紫柏以努目作佛事而其作略大都從五臺水觀中來故其楮墨所宣莫不有千峰積雪萬壑轟雷之雄概此片紙亦具見一班矣刻成仍寄宗伯俾補入全集中而敬書數語於後丁酉蒲月中州曾弘合掌言
