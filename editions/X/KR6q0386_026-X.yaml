body:
  text: 侍者福善日錄門人通炯編輯嶺南弟子劉起相重較記廬山大悲懺堂記唯佛法身無際全體而為眾生眾生妄想無際全體而為生死之妄業妄業不消故眾生苦海亦無際而終莫知出自非大悲願力無由以竭苦海消妄業而出生死證本際也是故觀音大士稱法界心行大悲行潛入一切眾生妄想海中而為之濟度設陀羅尼令其持誦薰修欲令眾生出苦海見本法身登涅槃岸此大悲懺法所由立也其呪本出灌頂部乃中道法身所流是為毗盧心印始於四明尊者準大悲經之所剏立其來尚矣良以眾生藏識幽關非祕密心印不足以破之是為脫苦之良藥也直指滿公受教於雲棲藏修南岳志以懺法為佛事信奉者眾既而之廬岳結隱單棲願廣此法以度四眾故建懺堂以示薰修之儀堂既成乞記於老人乃謂之曰一切眾生皆本法身既迷而為生死業海令以法身心印而薰變業性是以水投水似空合空但有信者於生死苦不期出而出矣公以大悲心為苦海舟航之慈楫以人人本有之法而指示之如以甘露灑焦枯而清涼心地不待告而自知矣法性無盡眾生界不可盡此法亦無盡又何以永永為計哉廬山雲中寺十方常住記廬山禪林棊布山之絕頂九奇峰下最為幽勝俗呼仰天坪以其高而無上也昔為虎狼之巢有雲中寺乃敬堂忠公所剏建也師諱法忠本歙人年十九禮杭之靈隱達機和尚為弟子執爨三年思大事未了遂依講肆聽了義諸經猶以文字為障礙渡江之少林依大千和尚參達摩西來之旨居十載尋之京師復禮徧融諸大知識印決心要因之五臺會予與妙師心知為法門之傑予去東海妙師歸蘆芽因拉師同往居三年諸所建立多咨之頃又棄去入牛山未幾而轉匡山初結菴講經臺居三年以往來為煩仍遷五老峰又四年至雲中愛其高絕乃誅茅縛椽以居之草衣木食十方英靈衲子多集師脫形骸無爾我以道相忘不設規繩無約束人人自律不以世俗標榜四事任緣闕則親行乞以供之雖寸絲粒米咸以眾為懷精練三業稟明一心居二十二年遂成叢林後為團瓢以供宴息山門榜曰雲中志最高也師好栽松計十餘萬章冀化龍以紀年也予自南岳來遊茲山師與予夜話因謂予曰某老矣幻化人世任緣住此山三十年矣今浮光不久即此道場雖幻緣所成本意為十方龍象設非為區區一己乞師一言以為志予喜而歎曰大哉師之心乎經云以大圓覺為我伽藍身心安居平等性智是佛以十方為懷也西江有言十方同聚會個個學無為此是選佛場心空及第歸是祖以十方為心也惟師生平志在無我故隨所建立皆無我今一旦而委之十方是究竟無我其有能克紹其業赤身擔荷者能以師心為心苟志於道豈無豪傑之士心空及第者乎是則山色湖光水流風動皆演無我之法音師廣長舌相常住而不泯也其常住相代別有券非予所筆略記師生平始末以告來者廬山萬壽寺莊嚴佛像記廬山之南剎竿相望其谷之大者曰棲賢巖壑嶔岑林木蓊太乙漢陽桃林諸峰叢列雲中眾水會於巨㵎中有寺曰萬壽葢唐僧德英所建為禪堀也歲久而毀我明正統閒僧明安重修今亦圮矣禪人慧楞緝而居之古殿數楹不蔽風雨佛像金容塵坌薄蝕凄然蒼蘚古瓦閒也楞因發願重新乞予為疏遣其徒本聖走故鄉新城行乞焉孝廉涂君世延以前身為僧因字曰悞來志不忘本也見疏興心遂先倡於眾施金若干聖持歸以莊嚴金像殿宇煥然一新山光掩映若睹毫彩於靈鷲為人天說法時也仍乞予記之曰夫佛者覺也為生靈之大本即眾生知覺之自性也人有此心則人皆有此覺覺則眾生即佛不覺則佛即眾生故曰心佛與眾生是三無差別今之莊嚴此像匪直飭金木之幻形實所以開自心之佛性也若涂君者宿生為僧是欲望躋覺路者也今轉為此身是欲覺而復昧如人酣睡將醒而復困特傍無一呼振起者耳傳燈諸祖大開爐鞴陶冶羣迷或一棒一喝之閒使人頓盡凡情立登覺地即所謂一呼而醒大夢者由是觀之則予之一疏不減臨濟德山之棒喝涂君一觸而悟本來即能現八相於目前圓三祗於當下可謂捷疾利根者也斯則同施善男女等即靈山四眾之儔共結佛種之緣將來世世生生於夢宅中遞相呼斥必皆至大覺而後已是所謂一大事因緣也又豈值施不慳之財飭幻化之像而已哉此佛性之緣經說如人食少金剛終竟透皮而出甚言性真之不昧也請記之以為他日法門券嘉興平湖縣紫清寺齋僧田記平湖紫清道場乃見全慧公所修置齋僧田七十畝以永供三寶是為常住丁巳歲慧公入寂遺囑弟子智達無替乃業達來匡山受戒且請老人為記之曰凡世之稱田者以種子有所託而不朽者生生無窮也故孝順父母為敬田拔濟貧苦為悲田供養三寶為福田世人捨此而修性命之福者無地矣慧公所遺之田三者具而世出世命實所係焉後之守此三田而不力畊有所荒穢者失敬則逆失悲則盜無福則佛之慧命斯斷絕矣其有不及念及此者不為非人亦非佛弟子矣然而食此田者亦當知推此心則智種靈苗日夜秀發而菩提之果可冀否則墮為焦芽敗種矣全椒縣三汊河建昌化菴記欽惟我聖祖龍飛淮甸肇迹滁陽山川之靈固已久矣全椒當郡之西雖彈丸黑子僻在一隅為滁之奧猶寸玉也藏輝斂潤向含而未暢若陽春之發育葢有時焉我明二百餘年嘉隆之際文運始開時猶朱明之會也今則洋洋佛國之風矣不惟附郭之閒鐘鼓相聞即窮鄉下里奉佛齊心者葢連比也豈非天地大化之運乘時而昌者耶邑城之水自西而南二十里與黃山水會三汊為邑之水泄當河之左有山蹲峙若捍門而右隄平衍則水泄無制氣散而中虗若天有闕也里人夏讓性篤善而喜奉佛發心建佛剎於河北之滸正殿山門齋堂廚庫居然一勝道場其形勢則與山相雄峙而制其波流使滀不傾而施有餘也菴既成走廬山言其事且問額於予予桑梓也稔知其故乃題之曰昌化意謂法化之運由此而昌即以此而祝聖壽保斯民亦大昌於王化同躋仁壽而登極樂之鄉也故略記其事且為銘曰聖祖龍飛於滁之陽維茲椒丘當西之岡外磧中腴蘊靈抱奇如石之玉含潤藏輝天道默運如春在花三陽交泰發英吐葩文運一轉法化同流天機人心如水載舟三水會合捍門為峙獨有一拳如闕右臂爰有斯人天光忽發於河之滸建茲梵剎殿宇巍峩斯民保障鐘鼓鞫鍠法音嘹喨見者歸依聞者欣悅頓置斯民於極樂國道化既流文運實昌奠茲遐福山高水長金沙重興東禪寺緣起記十方世界盡常寂光無一處而非道場諸塵勞門為普賢行無一法而非佛事要在緣會方興得人乃見此五濁世中建立法幢之不易予觀金沙之東禪概可見矣按邑乘治東三里許有古剎舊名新興禪院肇建於唐光啟閒及宋建炎中因張忠穆公改篤忠顯慶院後名東禪廢於元末國朝重興久亦墮於荒榛茂草萬歷庚寅冬達觀禪師書經於于王二氏園偕太史損菴王公輩過而慨焉草莽中得斷湊而讀之乃知為大觀閒貢士路亦臨所撰鐘樓記也達師補其文而存之於是遂發興復之願達師去弟子堅音修慈古潭如清願肩為十方院時麥浪中敗屋三楹為黃冠耕藝所也清公即就處水齋以發眾信頃之遠近果集居士孫雲翼雲仍造禪堂三楹卜萬歷辛卯八月二十八日上梁雲翼登鄉薦報至遂捐坊資充修造壬辰雲仍特選應貢及癸卯太史從子懋錕捷壬子懋鋙捷坊資各如例於是建禪堂五楹伽藍祖師堂各三楹先因達師弟子密藏開公募供禪侶遂成道場清公力守之環寺經行持呪種松冀成叢林未幾清公去繼者或去或化乃請蜀高原法師原又去遂以徧弟子浪崕海耀為住持耀則有志盡命豎立焉會修茲至遂與法侶海印道成輩議建法社遵佛三學宗經律論經則法華律則梵網論則起信先以讀誦受持為業熟則如說修行然定主止觀妙宗專於淨土社名青蓮耀公主之此末法一最勝法緣也約既就太史從子鏡承父宇望遺命捐百金以助剏始庚戌閒太史乏嗣欲捨宅為寺乃賣別業千餘金悉捨為修建資凡造正殿三楹西方殿三楹新禪堂五楹其制則四合一局規模軒豁一目洞見居然一大道場也殿成其像則耀公監製倣唐貫休畫本漆布為質脫沙為之精妙絕倫為世一代申品初以舊堂為主坐北遂以正殿坐東其山門利在北以太史精於形家故也癸丑秋太史不幸捐館遺命以己像供於寺願為伽藍如南宮之於鶴林也丙辰春耀公集諸檀越致書請予主其社以休老焉予以弔達大師未了緣喜而應之以是年冬十月至居無何即之雙徑明年丁巳春予志投老歸匡山耀公涕泣攀留竟不可會耀公以他緣欲去予在匡山聞之亟遺書留本懷印公守之未幾堅音慈公自皖城至眾信喜為本發心人固留居之居士雲仍為開山檀越備述始末因緣乞予為記且請為定規繩立法約永為十方常住予為憮然而歎曰自古建立成功之不易也豈獨天下國家為然而叢林亦以之且夫法王御世以安樂行為家範以梵網戒為條約賞罰森嚴何昭著也所謂文武之政布在方冊者其人存政舉固在得人何如耳沙門釋子苟知吾佛歷無數劫捨身命而求菩提即今出世猶受雪山六年凍餓博得人天供養以贍後世兒孫即如茲剎建立艱難纖塵滴水皆信心之膏血一思及此身毛皆豎雖粒米莖菜皆金剛屑何忍不懼泥犁妄造黑業乎後之居此者但求明信因果不昧初心精持三學守奉經律念念以生死大事為懷又何庸別求佛法哉是為記新安仰山寶誌公畫像感應記新安四塞山奇秀甲東南而仰山特幽勝乃梁開山為寶誌公道場顯名於唐寂禪師久廢無聞焉里俗素不知佛特奉誌公甚嚴凡禱雨祈嗣災祥求之立應故崇祀不絕隆慶初守靜暄公習頭陀行精苦異常遠近皆化源中巨姓聚族而謀請公興復仰山公從之及入山則見故址墮草莽荊榛中而區內山場皆歸有力者公乃先募眾姓山下田以易其地率弟子性玉性覺棲風沐雨披草萊剪荊棘而為之不十餘年撤舊鼎新遂成一大道場如天降地涌四境之內人人知有三寶矣寺既成父老相傳有誌公畫像三幅流落民閒不知其所萬歷辛丑金陵報恩修舍利塔匠氏得於金頂寶缾中乃梁張僧繇手筆卷而懷歸其人乃新安績溪李氏也有三子各分其一未幾李卒仲季二子日就貧知誌公道場在仰山遂獻之玉覺二公得之以為神物久之伯子家火速戒家人棄像而搶券及撿之像存而券如是者三遂怪以為鬼物越數年伯子遠行歸途失道誤至山下葊所時僧俱赴齋而靜光禪人獨留頃之一客揖而問路光指之客感而問其名報曰靜光客愕然光不知其故遲數日眾赴齋光又後頃之前客至光與之坐客曰先人為石工修報恩塔得誌公大士畫像三幅分兄弟三人前兩弟者已歸上剎矣小子所藏者家三被火棄之而不以是知非我所宜有也今送師將與前二合併耳光受而展之則見額載武帝敕賜大士弟子靜光供養者因知其人前所愕者怪其名同也泰昌改元嘉平月靜光來匡山授戒具悉其因緣予聞而甚異之惟大士應身無量然皆一過而化獨現誌公比丘身久而益著初武帝命張僧繇寫大士真屢易不肖大士以指劙破面皮現觀音大士相乃知其為化身也傳載存日多往來於潛山太湖之閒然未聞在仰山也大士入滅武帝以二瓦缸為龕葬於鍾山之陽我聖祖定鼎建康親卜壽宮於山中上自定之啟土得瓦龕開視見肉身如生叉髮長滿手託一板題曰梁寶誌公聖祖大異之乃移葬於山東之靈谷建塔寺以奉之立像於城中雞鳴寺設春秋祭祀以麵為犧牲太常典禮至今如一日不謂於仰山荒榛荊棘中放光現瑞足見至人應化無方神妙而不測也予循覧三像因緣前二像其一乃生前封號敕其一乃身後武帝讚必僧繇手筆其後一額有金字敕載大士滅後武帝思之乃賜銀十萬八千兩命工部侍郎吳世良同聖師弟子靜光造歷安奉乃命刻殿式及武帝御臨上香并大士為諸臣說戒三圖合一板成止許印二幅其一留宮中供養一賜大士之弟子靜光禪師復賜田若干未載其地是則三像原非一處也然梁至國初已千餘年所存不一而仰山父老何從聞而知之耶此其可恠一也況千百年閒更朝換代兵火離亂不知其幾公府民業遞散不常何三像竟歸天府毫無虧損此二也報恩塔建於永樂宣德閒內藏豈無他寶而以三像置於空中且像既歸塔頂仰山父老何從而知之乃傳言於今日耶此其三也然像安塔頂無復再見人閒之理何仰山重興之時適當修塔之日此其四也縱像從塔出藉使一落他人之手則仰山何望焉豈期石工為郡人此其五也雖像集新安二子縱歸山中而伯氏不遭三災亦竟無合併之日矣此其六也且像始於大士生前身後而歸亦如次道場成而圖乃現藉使靜光之名不同亦無以發伯氏之信心此其七也故予聞而甚異之感歎無已以見至人潛形益物法身湛然徧十方而不分經三災而不壞歷千古而不泯常住於蒼崖石壁以發蔑戾之善根新安佛剎特興於仰山僧寶始現暄公而誌公畫像完歸則在玉覺二公及靜光諸孫梵剎重新之日孰非我大士法身常住慈悲威神攝受之力也哉予故委記之以示永久使觀者因三像因緣知大士感應之妙庶有以發信心而續慧命也廣東光孝禪寺重興六祖戒壇銘并序佛法入中國教自白馬西來從陸而至雒陽禪泛重溟由水而至五羊豈以性海一脈潛流於大地耶自晉耶舍尊者乘番舶抵仙城建梵剎種訶子成林故號訶林宋求那䟦陀𢹂楞伽四卷至止訶林立戒壇於林中讖曰後有肉身大士於此授戒梁普通閒梵師智藥三藏𢹂菩提樹植於壇側記曰百七十年有大智人於此出家及我六祖大師出黃梅衣鉢剃髮菩提樹下實應其讖遂從智光律師登䟦陀壇受滿分戒乃歸曹溪禪宗實自此發源也戒為成佛之本大師開化於曹溪則以戒壇為根本地弟子往來於其中故今寺僧皆從衣鉢中出千百年來香燈供奉如生造化密移世道不古久之僧不知有戒人不知有壇清淨覺地化為狐堀歲月更歷幾易其主矣萬歷丙申春予蒙恩徙海外開法於壘壁閒樹下弟子通炯超逸數十輩皆從授教博士弟子亦多歸焉越七年壬寅諸弟子相聚而歎曰戒壇乃吾祖師根本地奈何湮沒蕪穢忍坐視乎炯逸募資鳩材居士王安舜等相率而謀贖壇基一隅不期年而落成予去五羊越八年逸老匡山炯逸從遊未離猶然依棲樹下時也一日二子作禮請曰戒壇因緣賴師始終之師老矣願惠一言以記之予為之言曰法性海中本無出沒常寂光土安有去來人世變遷任運佛國淨穢隨心所謂道在人弘法因機感此千載一時起廢光前自有不期而會者矣安知今之興者詎非在昔之人後之來者寧無今日之眾耶此佛種從緣塵劫不昧燈燈相續而無盡者也乃為銘曰大海潛流四天下地禪宗一脈自南而至爰有至人訶林肇開戒壇剏立待聖人來菩提無樹根栽於戒佛種從緣枝葉是賴百七十年符讖不虗從獵隊出培此根株袈裟出現須髮自落堂堂應真光明透脫法雷一震法雨霶𩃱流潤大千重長枝柯覆蔭既繁集者益盛聖凡不分龍蛇乃混枝柯既枇根本不固故金剛地棲此狐兔大運循環無往不復昔人適來還我故物寶掌一開取如探囊法幢重建斯道用光葉落歸根來時無口實我祖師將心自剖此壇既復如出礦金盡未來際將傳此心虗空可殞心光不昧惟此道場如是如是武昌府雙峰接待寺大光月公道行記楚為漢南一大都會當天下之衝方外缾錫往來四大名山之所必由向無息景之地則長途困頓風雨饑寒孰得而問焉非月公以身命布施則曷能為此傳舍哉公諱真月晉之汾陽人也姓燕氏父維時母宋氏感異兆而娠年三十頓棄妻子出遊方外先至武當參不二和尚開示念佛法門遂薙髮詔名真月執侍未久即入終南百草坪巖居菜羮飲水面壁九年未有所悟入尋出山行脚徧歷諸方參請知識者二十二年復之伏牛煉魔場打長七三月至是心有發明乃乞印證諸方萬歷乙未至襄陽潭溪遇無聞和尚心相契可以大光字之時歸依焉公自以為行不踐實仍打餓七者三不米食者期年已而隨師禮普陀歲丁酉至武昌因見十方衲子往來無所棲泊遂志建接待處乃持鉢行乞至東郭雙峰之下有古剎盡廢唯白衣大士像壅泥土中公悲痛良久即稱名祈禱願興復焉於是坐荒榛中不食者二七日絕而復穌復水齋百日人見其精誠無不警動公律己甚嚴自甘淡薄粒米莖菜與眾同之接納無倦出入施利因果皎然毫髮無爽一方檀越日益信重不十年閒遂成叢林予丙辰夏自南岳之雙徑舟次江上見其為人端嚴誠慤信其為四眾依歸也予嘗閱華嚴知菩薩利生行非一種率以廣大深心視物同己以身為大地荷負眾生以身為橋梁濟渡眾生乃至頭目髓腦而無悋惜雖百千劫而無疲厭始而驚異終則信其為真實行也原夫眾生所以常寢生死者以其有我而為障也菩薩度生須先度我我度而眾生自度矣我人既空則眾生界盡眾生界盡則煩惱業果何從而寄耶成就妙行無踰此也一切聖凡因果依心建立隨願所成心空願固則應念現前淨土莊嚴本非分外故如公者始以如絲一命以願繫之而竟成如許廣大佛事豈非從空建立由是觀之則此有作幻化因緣又何足以盡法界之量耶雖然嘗一滴以知大海睹一隙以見太虗由是有以知公矣因感公之行遂記之以勒貞石為法門將來者勸都昌縣重興佛殿山長慶寺記都昌治東七十里許有山名佛殿奇絕處也有寺名長慶剏始於唐長慶楞禪師過化於此遂為名剎相沿至胡元於兵久廢為民業我明萬歷己酉有僧名性念者遊方至此睹其山境清絕發心重興比有塘西劉氏捨其基園洎棠山劉氏施材鳩工始剏蘭若為藏修所越四年壬子念請達觀禪師之法孫古愚拙公遂禮為師公竭志重建即率其徒性聽等苦心戮力募化資佐頃之拙公之父與其弟素業儒一旦發出世心盡捨其家資數百金以助莊嚴遂成道場佛殿禪堂齋廚山門無不畢備既而公之父弟俱剃髮披緇父名本能字學南弟名大哲字安行相與精修白業而歸依拙公者日亦至若性愍悠感忠懋忞想等皆其徒也咸有力焉寺成予至匡山拙公來參問法要仍樂單棲誅茅結廬於五老峰下獅子嚴望五乳眉目閒也以不時得扣謁焉一日拈香作禮具述因緣乞予為記予喟然歎曰法界皆從緣起也故曰一切諸法緣會而生緣會而生則未生無有未生無有則生本無也世出世法莫不皆然是知大地山河皆一真法界處處無非道場唯在緣之會不會耳茲山當長慶未至時奇峰絕壑唯草木蒙茸猿鶴嘯唳蛇虎縱橫而已及長慶一過遂即建法幢使見聞瞻禮頓發無上菩提之心向之山林草木一切音聲皆為廣長舌相演說無生無二佛法矣及緣散而滅猶然長慶未至時也今此道場之興剏始由於性念緣會由於拙公克成則實資於學南父子一家際會豈小緣哉經云想澄成國土今之興者施者助者居閒而效力者苟非同一金剛心地安能頓成不朽之勝事使山林草木同放光明超越前修而若是耶後之居者守者能知建立之心一草一葉盡為金剛種子則此山此地松聲泉響皆演法音永為菩提道場晨鐘夕梵永祝聖壽無疆矣如是建立又豈可人天有漏而擬議耶因述其始末因緣以昭來者吳江接待寺十方常住記雜花云毗盧遮那徧法界身以智悲行而為莊嚴我震旦五臺峨嵋補陀三山為三大士攝化地舉國男女之有知者靡不歸心為寶所其南海又近而易至者是以十方僧徒往來繩繩不絕如縷而中途疲乏非化城暫息無以濟其飢渴勞苦此接待之設尤為第一最勝行也吳江為南北孔道津口接待寺適當其衝寺建於宋紹熈閒僧寂照開山額承天萬壽元至正閒僧正壽增修改名接待萬曆初僧了空重開接待院尚書五臺陸公中丞太素沈公善士吳氏等損資建禪堂立永遠十方常住了空後得無邊海公繼之至庚戌海遷化邑縉紳居士延念雲勤公居之勤乃達觀禪師之法孫密藏開公之上首也以禪師久過化於此法緣最熟勤公立行端確不忝其嗣一方雅重之叢林日益振念法門之老者無所歸乃設養老延壽二堂建普同塔此為最勝悲行也諸護法者為久遠議設長生田歲計三百六十畝於是寺有恒產以供來者緣既具勸公走書乞予以記之曰自古叢林非建立之難而守業之為難也以佛教菩薩專以利他為任故百丈立清規凡在伽藍眾僧之物秋毫皆為十方常住設非若世俗子孫之業比其戒亦何森嚴也乃曰十方僧物幾如鴆毒纔沾著則通身潰爛極言其不可輕易染指也粒米莖菜尚不敢私況其多乎以乞者初心元為眾僧而施者發心本為福田種子佛說食者苟非良田則不免復身醻償之苦況以養貪毒滋泥犁之業乎此因果皎然之不爽者可不為之寒心乎惟此道場之建立也苟勤公之心不普必不能成此業後之守者非若勤公之心必不能繼其緒若果潔己盡力以奉佛戒則使往來雲水飢者食勞者息病者安老者佚死者歸豈不為永永福田為苦海之津梁乎若明察秋毫不昧因果則為文殊之大智守之勿失行之無倦則為普賢之大行利濟無窮悲田益廣則為觀音之大悲三者具足為因圓滿毗盧法身之果是則成佛妙行無越於是矣又何庸登山涉水廣參知識別求玄妙佛法乎予昔東遊弔達師信宿其地且知勤公之操心立行歎此功德最勝故詳為之記普度菴記番禺之東南沙灣宋丞相李忠簡公之故里也居族最鉅煙火萬餘家居士李宜楨字彥周幼業儒懷材不售每念人生虗幻徒碌碌耳思所以求出苦之方發心向道歸依三寶見龍舒淨土文歎曰此迷方指南也隨得雲棲彌陀疏披閱再三益諦信不疑即發願長齋繡佛屏絕家緣專修淨業三年於茲矣因思法門廣大以普度為心建精藍一所奉觀音大士像顏曰普度願同里長幼各各發隨喜心同結出苦之緣非漫爾也予初至曹溪居士遠來參禮請為之記予聞而讚曰善哉廣大之心也惟此佛性聖凡同稟蠢動含靈皆共有之第迷之不覺日用而不知將此佛性變為妄想造貪眼癡盜殺盜淫妄種種惡業自取三途惡道之劇苦百千萬劫無由出離且如殺他生命取其血肉以資口腹即一食之閒一器之內傷百千命若計醻償因果不爽其一日之業已招百千萬生之苦矣何況一生所作耶殺業一種已無涯矣況多業乎積業既深且廣是為苦海苟無舟航濟度何由而至彼岸耶誠可哀矣是以諸佛菩薩悲愍愚迷出於世閒現種種身而為度脫我觀音大土三十二應隨類現身應以何身度即現其身而為說法令其出苦由是觀之居士之心即大士之心以慈悲而度眾生即大士之應身也此方居人不下十餘萬儻因此菴而得度脫即佛法化一里由此擴而充之連鄉比邑至於通都將周一國以及天下若使人人改惡遷善皆為極樂國土矣則此普度之設如陽春一葉耳人同此心凡見聞隨喜者豈不躍然從之耶此亦一大事因緣也是為記寧都金蓮菴記章貢之寧邑當三省都會山水奧區去邑之西四十里有山最高者曰蓮花峰逶迤而下突起一巒曰寶峰林木蓊清泉繞帶千峰環翠居然最勝處也其地高廠先是父老傳聞忽生金蓮數朵知可為道場萬曆丁未了此曉公愛其幽寂因建蘭若於上額曰金蓮公一日感病恍然如夢忽見地獄種種變相頃即化為西方淨土境覺而歎曰天宮地獄善惡隨心感變耳因而發大誓願切志修持專心持誦華嚴大經日夜精勤無倦由是一方感化予居匡廬之四年庚申冬公同難名道公來謁乞一言以紀其事予謂之曰山河大地觸目道場淨土娑婆隨心轉變故古人拈一莖即建梵剎況修崇殿宇僧坊種種具足者乎此實從金剛心之所建立也然既能以一心變荊棘而成寶坊亦可以變道場而為業海若後之守者能體作者之心於中精勤三業專淨一心則是其地堅固金剛所成永永常住不動不壞若以安居如意四事現成縱放身心夤緣俗業以致外侮見侵損壞常住者是以袈裟換毛角以寶地易泥犁可不懼哉了此俗姓廖氏為邑之望族十八出家法名如曉其弟子某等併記之揚州府興教寺放生社建接引佛閣維揚東南一大都會也法門之剏自晉謝安捨宅為寺延覺賢尊者譯華嚴經故名小興嚴比尊者翻譯時感二童子日送水問之曰龍孫也由是道場始開相沿時代改名興教嘉隆閒我先師無極和尚弘法於江南四方學者多往來首座寶堂璋公挂錫於此璋法孫靈裔燈公往受業於先法兄雪浪之門精修白業一時鄉薦紳先生雅重之由是引攝於慈悲之行結念佛放生社以月八日為期建接引佛閣以示歸心有地冀且垂化於永久也乞予為記予聞而讚歎曰此吾佛所設自利利他最勝之行也聞之佛者覺也即吾人本有知覺之性上與諸佛下及眾生均賦而同稟者裴休曰血氣之屬必有知凡有知者必同體所謂真淨妙明虗徹靈通卓然而獨存者也此性不迷而為佛迷之而為人顛倒而為物惟吾佛證此愍物迷之特現世閒普為開示使令悟入方便多門唯念佛最為簡捷然念佛非他乃呼自性天真之佛也一念覺而一念佛念念覺則念念佛若常覺不昧則為常住佛矣自利之功無越此者然而自既覺矣愍物更迷若夫飛潛蠢蝡何能使其自覺耶故推我同體之悲以拔之仗佛真慈以攝之故念多佛以故多生然放一生即成一佛是則頓使胎卵溼化無量無數無邊眾生皆悉入於無餘涅槃實無有一眾生得滅度者如此豈不為最勝二利之行耶是則以我之願仰憑佛力故設接引之像建閣以奉之令見聞隨喜者一瞻一禮興起普濟之心則同體之悲益廣而成佛之真種益深如是功德豈可得而思議耶是為記高郵州北海臺菴接待十方常住記惟三大士現身十方普度眾生無處不徧在我震旦國中以三大名山為法身常住道場而峨嵋僻處西蜀遠在一隅唯五臺普陀對峙南北為十方眾僧之所歸宿往來道路不絕如縷當淮揚之衝高郵之閒運河之畔縣絕中途雲水所過足無停景路長人倦日莫途窮風晨雨夕躡雪履冰有漏之軀飢渴所逼形骸所苦者不可勝紀行脚之無告者非一人一日也有居士陸黌者發心建接待菴一座為暫息之所慮供瞻無恒募眾置田百八十畝取所穫以充鉢盂於是來往緇流勞者得息飢者得食渴者得飲故至者如歸家想此人閒世第一殊勝福田也予逸老匡山居士來歸乞為之記予欣然為之言曰一切眾生皆執我相唯以利己為心雖草芥縷葉視如九鼎靡不為子孫計孰能存一念利濟之心乎惟吾佛說菩薩大心純以利他為任所行六度以布施為第一其所施有內外竭盡三等之別外則資財內則身命竭盡則無遺餘此非無我之至孰能為之方今末法眾生薄福慳貪日重此行為難有能一念推及於此者則為大心菩薩矣予謂三等之施皆一心也以眾生視財為命故捨財即捨命苟貪心不竭則一毛難拔捨心纔發則為竭盡無遺矣然心佛與眾生是三無差別故一念捨心則盡法界之量而為成佛之體能令受者一念歡喜之心亦入法界是則此心與佛及眾生界皆平等矣所以施為成佛之本也苟能以此捨心利物念念不斷則念念中與一切眾生皆成佛之時大經云我今於一切眾生心中成等正覺謂是故也故菩薩萬行攝於六度又以施為總持以其心大而難能故德廣而益大所以文殊之智普賢之行觀音之悲皆與法界等者葢推無我之心之極致也是則此菴雖小足含法界即三大士常住此中而福田利益豈可得而思議哉故予詔居士之名福田志其行也是為記
