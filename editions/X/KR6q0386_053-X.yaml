body:
  text: 侍者福善門人通炯日錄海幢法裔今照今光收藏憨山老人自序年譜實錄上嘉靖二十五年丙午予姓蔡氏父彥高母洪氏生平愛奉觀音大士初夢大士𢹂童子入門母接而抱之遂有娠及誕白衣重胞是年十月己亥十二日丙申己丑時生也二十六年丁未予周歲風疾作幾死母禱大士遂許捨出家寄名於邑之長壽寺遂易乳名和尚二十七年戊申予三歲常獨坐不喜與兒戲祖父常謂曰此兒如木樁二十八年己酉二十九年庚戌三十年辛亥三十一年壬子予年七歲叔父鍾愛之父母送予入社學一日叔父死停於牀予歸母紿之曰汝叔睡可呼起乃呼數聲嬸母感痛乃哭曰天耶那裏去也予愕然疑之問母曰叔身在此又往何處耶母曰汝叔死矣予曰死向甚麼處去遂切疑之未幾次嬸母舉一子母往視予隨之見嬰兒如許大乃問母曰此兒從何得入嬸母腹中耶母拍一掌云癡子你從何入你娘腹中耶又切疑之由是死去生來之疑不能解於懷矣三十二年癸丑予八歲讀書寄食於隔河之親家母誡不許回但經月歸一次一日回戀母不肯去母怒鞭之趕於河邊不肯登舟母怒提頂髻拋於河中不顧而回於時祖母見之急呼救起送至家母曰此不才兒不渰殺留之何為又打逐略無留念予是時私謂母心狠自是不思家母常隔河流淚祖母罵之母曰固當絕其愛乃能讀書耳三十三年甲寅予九歲讀書於寺中聞僧念觀音經能救世間苦心大喜因問僧求其本潛讀之即能誦母奉觀音大士每燒香禮拜予必隨之一日謂母曰觀音菩薩有經一卷母曰不知也予即為母誦一過母大喜曰汝何從得此耶誦經聲亦似老和尚三十四年乙卯予十歲母督課甚嚴苦之因問母曰讀書何為母曰做官予曰做何等官母曰從小做起有能可至宰相予曰做了宰相却何如母曰罷予曰可惜一生辛苦到頭罷了做他何用我想只該做箇不罷的母曰似你不才子只可做箇挂搭僧耳予曰何為挂搭僧有甚好處母曰僧是佛弟子行徧天下自由自在隨處有供予曰做這箇恰好母曰只恐汝無此福耳予曰何以要福母曰世上做狀元常有出家做佛祖豈常有耶予曰我有此福恐母不能捨耳母曰汝若有此福我即能捨私識之三十五年丙辰予十一歲偶見行脚僧數人肩擔瓢笠而來予問母此何人耶母曰搭搭僧也予私喜視之僧至放擔倚樹乃問訊化齋母曰請坐急烹茶具齋飯甚恭敬食罷眾僧起即荷擔隻手一舉母急避之曰勿謝僧徑去予曰僧何無禮飯齋不謝母曰謝則無福矣予私曰是僧之所以高也切念之遂發出家之志苦無方便路耳三十六年丁巳予年十二讀書通文義鄉族咸愛重之居常不樂俗父為定親立止之一日聞京僧言報恩西林大和尚有大德予心即欲往從之白父父不聽白母母曰養子從其志第聽其成就耳乃送之是歲十月至寺太師翁一見喜曰此兒骨氣不凡若為一俗僧可惜也我第延師教讀書看其成就何如時無極大師初開講於寺之三藏殿祖翁𢹂往謁適趙大洲在一見喜曰此兒當為人天師也乃撫之問曰汝愛做官要作佛予應聲曰要作佛趙公曰此兒不可輕視當善教之及聽講雖不知言何事然心憤憤若有知而不能達者時雪浪恩兄長予一歲先一年依大師出家見予相視而嘻時人以為同胞云江南開講佛法自無極大師始少年入佛法者自雪浪始三十七年戊午予十三歲初太師祖擇諸孫有學行者俊公為予師先授法華經四月成誦三十八年己未予年十四流通諸經皆能誦太師翁曰此兒可教不可誤之也遂延師能文者教之三十九年庚申予年十五太師翁乃請先生教習舉子業初即試其可教乃令四書一齊讀是年多病四十年辛酉予年十六是歲四書完背之首尾不遺一字四十一年壬戌予年十七是歲講四書讀易并時藝及古文辭詩賦即能詩述文一時童子推無過者四十二年癸亥予年十八時督學使者專講道學以童生為謌童動隨數十逐隊而謌亦有因之而倖進者予大恥之遂欲棄所業是歲以病辭不入館四十三年甲子予年十九同會諸友皆取捷有勸予往試者時雲谷大師正法眼也住栖霞山中太師翁久供養往來必欵留旬月予執侍甚勤適雲大師出山聞有勸予之言恐有去意大師力開示出世參禪悟明心地之妙歷數傳燈諸祖及高僧傳命予取看予檢書笥得中峰廣錄讀之未終軸乃大快歎曰此予心之所悅也遂決志做出世事即請祖翁披剃盡焚棄所習專意參究一事未得其要乃專心念佛日夜不斷未幾一夕夢中見阿彌陀佛現身立於空中當日落處覩其面目光相了了分明予接足禮哀戀無已復願見觀音勢至二菩薩即現半身自此時時三聖炳然在目自信修行可辦也是年冬本寺禪堂建道場請無極大師講華嚴玄談予即從受具戒隨聽講至十玄門海印森羅常住處恍然了悟法界圓融無盡之旨切慕清涼之為人因自命其字曰澄印請正大師曰汝志入此法門耶因見清涼山有冬積堅氷夏仍飛雪曾無炎暑故號清涼之語自此行住氷雪之境居然在目矢志願住其中凡事無一可心者離世之念無刻忘之矣四十四年乙丑予年二十是歲正月十六日太師翁入寂師翁於前年除日畢集諸眷屬曰吾年八十有三旦暮行矣我度弟子八十餘人無一持我業者乃撫予背曰此子我望其成人今不能矣是雖年幼有老成之見我死後房門大小事皆取決之勿以小而易之也眾唏噓受命新歲七日師翁具衣徧巡寮各辭別眾咸訝之又三日即屬後事示微疾舉藥不肯進乃曰吾行矣藥奚為乃集眾念佛五晝夜手提念珠予擁於懷端然而逝以師翁生平持金剛經臨終亦不輟也太師翁為報恩官住三十年居方丈及入滅至三月十八日而方丈火眾皆歎異是年冬十月雲谷大師建禪期於天界集海內名德五十三人開坐禪法門大師極力扳予往從少師翁聽之乃得預會初不知用心之訣甚苦之乃拈香請益大師開示審實念佛公案從此參究一念不移三月之內如在夢中了不見有大眾亦不知有日用事一眾皆以予為有志初不數日以用心太急忽發背疽紅腫甚巨大師甚難之予搭袈裟哀切懇禱於韋䭾前曰此必冤業索命債耳願誦華嚴經十部告假三月以完禪期後當償之至後夜倦極上禪牀則熟睡開靜亦不知及起則忘之矣天明大師問恙何如予曰無恙也及視之已平復矣一眾驚歎是故得完一期及出亦如未離禪座時即行市中如不見一人時皆以為異江南從來不知禪而開創禪道自雲谷大師始少年僧之習禪者獨予一人時寺僧服飾皆從俗多豔色予盡棄所習衣服獨覓一衲被之見者以為怪四十五年丙寅予年二十一自禪期出是年二月十八日午時大雨如傾盆忽大雷自塔而下火發於塔殿不移時大殿焚至申酉時則各殿畫廊一百四十餘間悉為煨燼時予少祖為住持及奏聞旨下法司連逮同事者十八人合寺僧恐株連各各逃避而寺執事僧無可與計事者予挺身力捄躬負鹽菜送獄中以供之寺至刑部相去二十里往來不倦者三月且多方調護諸在事者竟免死時與雪浪恩公俱決興復之志且曰此大事因緣非具大福德智慧者未易也你我當拌命修行以待時可也是時即發遠遊志頃之少祖尋入滅太祖之房門無支持者先是太師翁入滅無儲畜喪事皆取貸不資故多欠負即析居知必不能保予思太師翁遺命乃設法盡償其負貸餘者分諸弟子各執業房門竟以存是年冬從無極大師聽法華經於天界寺因志遠遊每察方僧求可以為侶者久之竟未得一日見後架精潔思淨頭心非常人乃訪之及見特一黃腫病僧每早起事已悉辦不知何時洒埽也予故不寐竊經行廊下偵之當眾方放參時即已收拾畢矣又數日見不潔乃不見其人問之執事曰淨頭病於客房也予往視其狀不堪問曰師安否曰業障身病已難支饞病更難當予問何故曰每見行齋食恨不俱放下予笑曰此久病思食耳是知其人真因料理果餅袖往視之問其號曰妙峰為蒲州人予即相期結伴同遊後數日再視之則不見予心知其人恐以予累故潛行耳隆慶改元丁卯予年二十二特舉虗谷忠公為寺住持以救傾頹比為回祿事常住負貸將千金皆經予手眾計無所處予設法定限三年盡償之是年奉部檄本寺設義學教僧徒請予為教師授業行童一百五十餘人予因是復視左史諸子古文辭二年戊辰予年二十三是年謝館事復館於高座以房門之累然也三年己巳予年二十四是年金山聘館居一年四年庚午予年二十五是年仍應金山聘五年辛未予年二十六予以本寺回祿決興復之志將修行以養道待時是年遂欲遠遊始同雪浪恩兄遊廬山至南康聞山多虎亂不敢登遂乘風至吉安遊青原見寺廢僧皆蓄髮慨然有興復之志乃言於當道選年四十以下者盡剃之得四十餘人夏自青原歸料理本師業安頓得宜冬十一月即一鉢遠遊將北行時雪浪止予恐不能禁苦寒姑從吳越多佳山水可遊目耳予曰吾人習氣戀戀軟煖必至不可施之地乃易制也若吳越枕席間耳遂一鉢長往六年壬申予年二十七初至揚州大雪阻之且病作久之乞食於市不能入門自忖何故急自省曰以腰纏少有銀二錢可恃耳乃見雪中僧道行乞不得者即盡邀於飲店以銀投之一餐而畢明日上街入一二門乃能呼遂得食因自喜曰吾力足輕萬鍾矣銘其鉢曰輕萬鍾之具銘其衲曰輕天下之具乃為之銘曰爾委我以形我託爾以心然一身固因之而足萬物實以之而輕方將曳長風之袖披白雲之襟其舉也若鴻鵠之翼其逸也若潛龍之鱗逍遙宇宙去住山林又奚衒夫朱紫之麗唯取尚乎霜雪之所不能侵是年秋七月至京師無投足之地行乞竟日不能得日暮至西太平倉茶𬕔僅一餐投宿河漕遺教寺明日左司馬汪公伯玉知予至乃邀之以與次公仲淹為社友故耳因得寓所旬日即謁摩訶忠法師隨往西山聽妙宗鈔有西山懷恩兄詩期罷摩訶留過冬聽法華唯識請安法師為說因明三支比量十一月妙峰師訪予至師長鬚髮衣褐衣先報云有鹽客相訪及入門師即問還認得麼予熟視之見師兩目忽記為昔天界病淨頭也乃曰認得師曰改頭換面了也予曰本來面目自在相與一笑不暇言其他第問所寓曰龍華明日過訊夜坐乃問其狀何以如此師曰以久住山故髮長未翦適以檀越山陰殿下修一梵宇命請內藏故來耳問予狀乃曰特來尋師且以觀光輦轂一參知識以絕他日妄想耳師曰別來無時不思念將謂無緣今幸來某願伴行乞為前驅打狗耳竟夕之談遲明一笑而別即往參徧融大師禮拜乞和尚指示師無語唯直視之而已參笑巖師師問何處來予曰南方來師曰記得來時路否曰一過便休師曰子却來處分明予作禮侍立請益師開示向上數語而別萬曆元年癸酉予年二十八春正月往遊五臺先求清凉傳按跡遊之至北臺見有憨山因問其山何在僧指之果奇秀默取為號詩以志之有遮莫從人去聊將此息機之句以不禁氷雪苦寒遂不能留復入京東遊行乞至盤山於千象峪石室見一僧不語予亦不問即相與拾薪汲水行乞汪司馬以書訪之曰恐公作東郊餓夫也及秋復入京以嶺南歐楨伯先數年未面寄書今為國博急欲見予故歸耳二年甲戌予年二十九春遊京西山當代名士若二王二汪及南海歐楨伯一時俱集都下一日訪王長公鳳洲相見以予少年易之予傲然賓主公即諄諄教以作詩法予瞠目視之竟無一言而別公不懌乃對次公麟洲言之明日次公來訪一見即曰夜來家兄失却一隻眼予曰公具隻眼否公拱曰小子相見了也相與大笑歸謂其兄曰阿哥輸却維摩了也因以詩贈予有可知王逸少名理讓支公之句一日汪次公與予同居看左傳因謂予曰公天資特異大有文章氣概家伯子當代文宗也何不執業以成一家之名乎予笑而唾曰留取老兄膝頭他日拜老僧受西來意也次公大不悅歸告司馬公公曰信哉予觀印公道骨他日當入大慧中峰之室是肯以區區文字為哉第恐浮遊為誤耳見予與次公扇頭詩有身世蜩雙翼乾坤馬一毛之句乃示次公曰此豈文字僧耶他日特設齋請予與妙師同坐公謂予曰禪門寥落大可憂小子切念之觀公器度將來成就不小何以浪遊為予曰貧道特為大事因緣參訪知識今第遊目當代人物以了他日妄想耳非浪遊也且將行矣公曰信然予觀方今無可為公之師者若無妙峰則無友矣予曰昔已物色於眾中曾結同參之盟故北來相尋不意偶遇於此公曰異哉二公若果行小子願津之時妙師取藏經回司馬公因送勘合二道又為文以送予一日公速予至問曰妙峰行矣公何不見別予曰姑徐行公曰予知公不欲隨人脚跟轉耳殊大不然古人不羞小節而恥功名不顯於天下但願公他日做出法門一段光明事業又何以區區較去就哉予感而拜謝遂決行即往視妙師已載乘矣見予至問曰師行乎曰行矣即登車未別一人而去秋八月渡孟津見武王觀兵處有詩弔之曰片石荒倚岸頭當年曾此會諸侯王綱直使同天地應共黃河不斷流過夷齊扣馬地弔曰棄國遺榮意已深空餘古廟柏森森首陽山色清如許猶是當年扣馬心遂入少林謁初祖時大千潤宗師初入院予訪之未遇出山觀洛陽古城焚經臺白馬寺即追妙師九月至河東會山陰至遂留結冬時太守陳公延妙師及予意甚勤為刻肇論中吳集解予校閱向於不遷論旋嵐偃岳之旨不明竊懷疑久矣今及之猶罔然至梵志自幼出家白首而歸鄰人見之曰昔人猶在耶志曰吾似昔人非昔人也恍然了悟曰信乎諸法本無去來也即下禪牀禮佛則無起動相揭廉立階前忽風吹庭樹飛葉滿空則了無動相曰此旋嵐偃岳而長靜也至後出遺則了無流相曰此江河競注而不流也於是去來生死之疑從此氷釋乃有偈曰死生晝夜水流花謝今日乃知鼻孔向下明日妙師相見喜曰師何所得耶予曰夜來見河邊兩箇鐵牛相鬬入水去也至今絕消息師笑曰且喜有住山本錢矣未幾山陰請牛山法光禪師至予久慕之相見喜得坐參也與語機相契請益開示以離心意識參出凡聖路學深得其旨每見師談論出聲如天鼓音是時予知悟明心地者出詞吐氣果別也深服膺其人一日袋中搜得予詩讀之歎曰此等佳句何自而得耶復笑曰佳則佳矣那一竅欠通在予曰和尚那一竅通否師曰三十年拿龍捉虎今日草中走出兔子來下一跳予曰和尚不是拿龍捉虎手師拈拄杖才要打予即把住以手捋其鬚曰說是兔子恰是蝦蟇師一笑休去師一日曰公不必他往願同老伏牛是所望也予曰觀師佛法機辯不減大慧見居常似有風顛態吟哦手口無停時謂何師曰此我禪病也初發悟時偈語如流日夜不絕自是不能止遂成病耳予曰此病初發時何以治之師曰此病一發若自看不破須得大手眼人痛打一頓令其熟睡覺時則自然消滅矣我初恨其無毒手耳歲暮師知予新正即往五臺乃以詩送之有雲中獅子騎來看洞裏潛龍放去休之句問曰公知否予曰不知師曰要公不可捉死蛇耳予頷之向來禪道久無師匠及見光師始知有宗門作略山陰國主問予二親在乃贈二百金為終養資予謝曰貧道初行脚自救不了又安敢累二親乎因讓致光師三年乙亥予年三十正月自河東同妙師上五臺過平陽師之故鄉也師以少貧值歲饑父母死葬無殮具至是山陰與一二當道助之予為卜高敞地為合葬作墓誌師俗姓續居平陽東郭葢春秋續鞠居之後也太守胡公號順菴東萊人聞予至寓城外欲一見不可得及予行公送郵符予曰道人行脚有草屨耳焉用此公益重及予行公後追之至靈石乃見同至會城留語數日差役送至臺山於二月望日寓塔院寺大方主人為卜居北臺之龍門最幽峻處也以三月三日於雪堆中撥出老屋數椽以居之時見萬山氷雪儼然夙慕之境身心洒然如入極樂國未幾妙峰往遊夜臺予獨住此單提一念人來不語目之而已久之視人如杌直至一字不識之地初以大風時作萬竅怒號氷消澗水衝激奔騰如雷靜中聞有聲如千軍萬馬出兵之狀甚以為喧擾因問妙師師曰境自心生非從外來聞古人云三十年聞水聲不轉意根當證觀音圓通溪上有獨木橋予日日坐立其上初則水聲宛然久之動念即聞不動即不聞一日坐橋上忽然忘身則音聲寂然自此眾響皆寂不復為擾矣予日食麥麩和野菜以合米為飲湯送之初人送米三斗半載尚有餘一日粥罷經行忽立定不見身心唯一大光明藏圓滿湛寂如大圓鏡山河大地影現其中及覺則朗然自覓身心了不可得即說偈曰瞥然一念狂心歇內外根塵俱洞徹翻身觸破太虗空萬象森羅從起滅自此內外湛然無復音聲色相為障礙從前疑會當下頓消及視釜已生塵矣以獨一無侶故不知久近耳是年夏雪浪兄北來看予至臺山不禁其凄楚信宿而別冬結一板屋以居四年丙子予年三十一春三月蓮池大師遊五臺過訪留數日夜對談心甚契是年予發悟後無人請益乃展楞伽印證初未聞講此經全不解義故今但以現量照之少起心識即不容思量如是者八閱月則全經旨趣了然無疑秋七月平陽太守胡公轉鴈平兵備入山相訪靜室中唯餐燕麥野菜虀耳時下方正酷熱驂從到澗中敲氷嚼之公見曰別是一世界也吾到此世念如此氷耳是年冬十月塔院主人大方被誣訟本道擬配遞還俗叢林幾廢廬山徹空禪師來與予同居適見其事大苦之予曰無傷也遂躬謁胡公冐大雪往及見胡公欣然曰正思山中大雪難禁已作書遣迎師適來誠所感也然竟解釋主人道場以全固留過冬朝夕問道為說緒言開府高公移鎮代郡聞予在署中乃謂胡公云家有園亭多題詠欲求高人一詩胡公諾之對予言予曰我胸中無一字焉能為詩乎力拒之胡公乃取古今詩集置几上發予詩思予偶揭之方搆思忽機一動則詩句迅速不可遏捺胡公出堂回則已落筆二三十首矣予忽覺之曰此文字習氣魔也即止之取一首以塞白然機不可止不覺從前所習詩書辭賦凡曾入目者一時現前逼塞虗空即通身是口亦不能盡吐更不知何為我之身心也默之自視將欲飛舉之狀無奈之何明日胡公送高公去予獨坐思之曰此正法光禪師所謂禪病也今在此中誰能為我治之者無已獨有熟睡可消遂閉門強臥初甚不能久之坐忘如睡童子敲門不開椎之不應胡公歸亟問之乃令破窗入見予擁衲端坐呼之不應撼之不動先是書室中設佛供案有擊子胡公拈之問曰此物何用予曰西域僧入定不能覺以此鳴之即覺矣公忽憶之曰師入定耶疾取擊子耳邊鳴數十聲予始微微醒覺開眼視之則不知身在何處也公曰我行師即閉門坐今五日矣予曰不知也第一息耳言畢默坐諦觀竟不知此是何所亦不知從何入來及回觀山中及一往行脚一一皆夢中事耳求之而不得則向之徧空擾擾者如雨散雲收長空若洗皆寂然了無影像矣心空境寂其樂無喻乃曰靜極光通達寂照含虗空却來觀世間猶如夢中事佛語真不吾欺也歲暮擬新正還山乃為胡公言臺山林木苦被姦商砍伐菩薩道場將童童不毛矣公為具疏題請大禁之自後國家修建諸剎皆仗所禁之林木否則無所取材矣五年丁丑予三十二歲春自鴈門歸因思父母罔極之恩且念於法多障因見南岳思大師發願文遂發心刺血泥金寫大方廣佛華嚴經一部上結般若勝緣下酬罔極之恩以是年春創意先是慈聖聖母以保國選僧誦經予僭列名至是上聞書經即賜金紙以助明年四月書經起徹空師遊匡山有詩十首送之六年戊寅予年三十三刻意書經無論點畫大小每落一筆念佛一聲遊山僧俗至者必令行者通說予雖手不輟書然不失應對凡問訊者必與談數語其高人故舊必延坐禪牀對談不失亦不妨書對本臨之亦不錯落每日如常略無一毫動靜之相鄰近諸老宿竊以為異率數眾來驗故意攪擾及書罷讀之良信因問妙師曰印師何能如此耶妙師曰吾友入此三昧純熟耳予自住山至書經屢有嘉夢初一夕宿入金剛窟石門榜大般若寺及入則見廣大如空殿宇樓閣莊嚴無比正殿中唯大牀座見清涼大師倚臥牀上妙師侍立於左予急趨入禮拜立右聞大師開示初入法界圓融觀境謂佛剎互入主伴交參往來不動之相隨說其境即現覩於目前自知身心交參涉入示畢妙師問曰此何境界大師笑曰無境界境界及覺後自見心境融徹無復疑礙又一夕夢自身履空上昇高高無極落下則見十方迥無所有唯地平如鏡琉璃瑩徹遠望唯一廣大樓閣閣量如空閣中盡世間所有人物事業乃至最小市井鄙事皆包其中往來無外閣中設一高座紫赤燄色予心謂金剛寶座其閣莊嚴妙嚴不可思議予歡喜欲近心中思惟如何清淨界中有此雜穢耶纔作此念其閣即遠尋復自思曰淨穢自我心生耳其閣即近頃之見座前侍列眾僧身量高大端嚴無比忽有一少年比丘從座後出捧經一卷而下授予曰和尚即說此經特命授汝予接之展視乃金書梵字不識也遂懷之因問和尚為誰曰彌勒予喜隨比丘而上至閣陛瞑目斂念而立忽聞磬聲開目視之則見彌勒已登座矣予即瞻禮仰視其面晃耀紫金色世無可比者禮畢自念今者特為我說則我為當機遂長跪取卷展之聞其說曰分別是識無分別是智依識染依智淨染有生死淨無諸佛至此則身心忽然如夢但聞空中音聲歷歷開明心地不存一字及覺恍然言猶在耳也自此識智之分了然心目矣且知所至乃兜率天彌勒樓閣耳又一夕夢僧來報云北臺頂文殊菩薩設浴請赴隨至則入一廣大殿堂香氣充滿侍者皆梵僧即引至浴室解衣入浴見有一人先在池中視之為女子也予心惡不欲入其池中人故汎其形則知為男也乃入共浴其人以手戽水澆予從頭而下灌入五內如洗肉桶五臟一一蕩滌無遺止存一皮如琉璃籠洞然透徹時則池中人呼茶見一梵僧擎髑髏半邊如剖瓜狀視之腦髓淋漓心甚厭之其僧乃以手指剜取示予曰此不淨耶即入口噉之如是隨取隨噉其甘如飴腦已食盡唯存血水其池中人曰可與之僧乃授予予接而飲之其味如甘露也飲而下透身毛孔一橫流飲畢梵僧搓背大拍一掌予即覺時則通身汗流如水五內洞然自此身心如洗輕快無喻矣如是者吉兆居多總之皆與諸聖酬酢常聞佛言常有是好夢七年己卯予年三十四是年秋京都建大慈壽寺完初聖母為薦先帝保聖躬欲於五臺修塔院寺舍利寶塔諭執政以為臺山去京窵遠遂卜附京吉地建大慈壽寺是年工完覆奏聖母以為未滿臺山之願諭皇上仍遣內官帶夫匠三千人來山修造是時朝廷初作佛事內官初遣於外恐不能卒業有傷法門予力調護始終無恙八年庚辰予年三十五是年特旨天下清丈田糧寸土不遺臺山從來未入版額該縣姦人蒙蔽欲飛額糧五百石於臺山屢行文查報地土合山叢林靜室無一人可安者自此臺山為狐窟矣諸山耆舊集白予予安之曰諸師第無憂緩圖之予於是宛轉設法具白當道竟免清丈未加升合臺山道場遂以全九年辛巳予年三十六是年建無遮會初妙師亦刺血書華嚴經與予同願欲建一圓滿道場名無遮會妙師募化錢糧畢集京中請大德僧五百眾其道場事宜俱備適皇上有旨祈皇嗣遣官於武當聖母遣官於五臺即於本寺予以為沙門所作一切佛事無非為國祝釐陰翊皇度今祈皇儲乃為國之本也莫大於此者願將所營道場事宜一切盡歸併於求儲一事不可為區區一己之名也妙師意不解上遣內使亦不解事但以阿附為心予大不然乃力爭忤之竟從予議頃之江南妖人作難忌者即欲借此中傷以破道場然以為國求儲之題目竟保全始終無虞是年修塔成予即以金書華嚴經安置塔藏有願文一卷予自募造華藏世界轉輪藏成為建道場於內應用供具器物齋糧果品一切所需妙師在京若罔知皆予一力經營九十晝夜目不交睫及十月臨期妙師率所請五百餘僧一日畢集內外千人其安居供具茶飯齋食條然不失不亂亦不知所從出觀者莫不駭然初開啟水陸佛事七晝夜予七日之內粒米不糝但飲水而已然應事不缺供諸佛菩薩每日換供五百卓次第不失不知所從來觀者以為神運予亦自知佛力加被也十年壬午予三十七歲是春三月講華嚴玄談百日之內常住上牌一千眾十方雲集僧俗每日不下萬眾一食如坐一堂不雜不亂不聞傳呼剝之聲皆予一人指揮餘無措目者智者不知所以然也生平精力葢竭於此三月會罷盡庫內所餘一應錢糧約可萬計盡行封付本寺主者以為常住予與妙師一鉢飄然長往矣妙師往蘆芽予以疾往真定障石巖調養作詩一首有削壁插天應隘日斷崖無路只飛梯之句是年八月皇子生予復之京西中峰寺作重刻中峰廣錄序結冬水齋於石室十一年癸未予年三十八春正月水齋畢然以臺山虗聲謂大名之下難以久居遂蹈東海之上始易號憨山時則不復知有澄印矣始予為本寺回祿志在興復故修行以約緣然居臺山八年頗有機會恐遠失時故隱居東海此本心也夏四月八日至牢山初玅師別時以予不能獨行乃命法屬德宗為侍者予初因閱華嚴疏菩薩住處品云東海有處名那羅延窟從昔以來諸菩薩眾於中止住清凉疏云梵語那羅延此云堅牢即東海之牢山也禹貢青州登萊之境今有窟存焉予因慕之遂特訪至牢山果得其處葢不可居乃探山南之最深處背負眾山面吞大海極為奇絕信非人間世也地名觀音菴葢古剎也唯廢基存焉考之乃元初七真出於東方假世祖威福多占佛寺改為道院及世祖西征回僧奏聞多命復唯牢山僻居海上故未及之耳予喜其地幽僻真逃人絕世之所志願居之初掩片蓆於樹下七閱月後得土人張大心居士為誅茅結廬以居入山期年人無往來心甚樂也時即墨靈山寺有桂峰法師一方眼目也喜得相與十二年甲申予年三十九秋七月聖母以五臺祈嗣之勞訪求主事三人乃大方妙峰與予也二師已至受賜獨訪予不得因力求之乃命舊主人龍華寺住持瑞菴親訪之公知予在海上乃杖䇿而至具宣慈旨某懇謝曰倘蒙聖恩容老山海受賜多矣又何求其他公覆報聖意不已尋卜地建寺於西山髓遣內使至期以必往予竟謝不就中使回報以居山堅臥之志聖意憐之問無房舍即發三千金仍遣前使送至以修菴居及至予力止之曰我茅屋數椽有餘樂矣何用多為使者強之不敢覆命予曰古人有矯詔濟饑之事今山東歲凶何不廣聖慈於饑民乎乃令僧領來使徧散各府之僧道孤老獄囚各取所司印冊繳報聖情大悅感歎不已及後予罹難下鎮撫鞫予數用內帑金予對以請查內庫支籍上查止此濟饑一事餘無一毫上意竟解十三年乙酉予年四十東人從來不知僧予居山中則黃氏族最大諸子漸漸親近方今所云外道羅清者乃山下之城陽人外道生長地故其教徧行東方絕不知有三寶予居此漸漸攝化久之凡為彼師長者率眾來歸自此始知有佛法乃予開創之始也十四年丙戌予年四十一是年頒藏經先國初刻藏有此方撰述諸經未入藏者今上聖母命補入之刻完皇上敕頒十五藏散施天下名山首以四部施四邊境東海牢山南海普陀西蜀峨嵋北邊蘆芽時聖母以臺山因緣且數召予不知賜亦不受乃以藏經一部首送東海初未知也及至牢山無可安頓撫按行所在有司供奉予見有敕命乃詣京謝恩比蒙聖慈命合眷各出布施修寺安供請命名曰海印寺予在京聞達觀禪師訪予於海上即趨歸兼程追之值師出山尋即同回盤桓兩旬贈予詩有閑來居海上名誤落山東之句是年冬十一月予自辛巳以來率多勞動未得寧止故多疲倦至今禪室初就始得安居身心放下其樂無喻一夕靜坐夜起見海湛空澄雪月交光忽然身心世界當下平沉如空華影落洞然壹大光明藏了無一物即說偈曰海湛空澄雪月光此中凡聖絕行藏金剛眼突空華落大地都歸寂滅場即歸室中取楞嚴印正開卷即見汝身汝心外及山河虗空大地咸是妙明真心中物則全經觀境了然心目隨命筆述楞嚴懸鏡一卷燭才半枝已就時禪堂方開靜即喚維那入室為予讀之自亦如聞夢語也十五年丁亥予年四十二是年修造殿宇始開堂為眾說戒自是四方衲子日益至為居士作心經直說是年秋胡中丞公請告歸田𢹂其親之子送出家為侍者命名福善十六年戊子予年四十三時學人讀予楞嚴懸鏡請曰此經心觀具明第未全消文字恐後學不易入願字字消歸觀心則莫大之法施也予始創意述通議已立大旨然猶未屬稿十七年己丑予年四十四是年閱藏為眾講法華經起信論予自別五臺時有省親之心且恐落世諦也姑自驗之一夕靜坐忽開眼有偈曰煙波日日浸寒空魚鳥同遊一鏡中昨夜忽沈天外月孤明應自混驪龍乃急呼侍者曰吾今可歸故鄉見二老矣先是為報恩寺乞請大藏經一部冬十月至京請藏上即命送賷行十一月至龍江本寺寶塔放光連日及迎經之日塔光如橋向北迎經僧自光中行及安經建道場光相日日不絕瞻禮者曰萬餘人以為希有之瑞老母聞予至先遣人候問何日到家予曰我為朝廷事非為家也若老母能相見歡喜如未別時止可信宿否則我不歸矣老母聞之曰再生相見歡喜不了那更有悲一面即可況兩宿耶及予歸老母相見欣然絕倒予大以為異及夜坐族中長者問從船來陸來老母應聲曰何問從船來陸來問者曰從何處來老母曰從空中來予驚曰怪得當時老婆子能捨我也因問老母曰別後想我否母曰安得不想予曰母何以自遣母曰始而不知既知爾在五臺因問師家五臺在何處曰在北斗之下即令郎住處也我自此夜禮北斗稱菩薩名則不復想矣今謂你死則不拜亦絕想矣今見爾乃化身來也予明日祭祖塋為二親卜得葬穴時老父已八十予戲曰今日活埋老子省他日又來也予把钁斫地老母奪之曰老婆婆自埋又何煩人連斫數十下三日告別老母歡然如故未嘗蹙眉予始知老母非尋常也即墨有黃生納善字子光者乃今大司公之弟也初予至海上時年十九歲即歸依請益授以楞嚴二月成誦從此齋素雖父母責之不異其心切志參究脇不至席時予南歸光私念曰吾生邊地長劫不聞三寶名今幸遇大善知識為不請友倘不回吾輩失依怙矣乃對觀音大士破臂然燈供養求大士保予早歸自後火瘡發痛日夜危坐持觀音大士名號三月乃愈愈時見瘡痕結一大士像眉目身衣宛然如畫即其母妻亦未知也恒求出家予絕不聽乃曰弟子打箇筋斗來師又何能止我乎是知篾戾車地未嘗斷佛種也初予以重修本寺志居臺山事已有機但以動至數十萬計未易言故待時於海上至是機將熟乃借送大藏因緣回南都具得本寺始末回覆命具奏聖母且云工大費鉅難輕舉願乞聖母日減膳羞百兩積之三年事可舉十年工可成聖情大悅即命於是年十二月儲積始十八年庚寅予年四十五是年殿宇成春為聖母代書法華經時有鄉宦欲謀道場者乃搆方外黃冠假稱占彼道院聚集多人訟於撫院開府李公先具悉其事痛恨之下送萊州府窮治其狀予親聽理力捄之無賴數百眾作鬨於府城有匡人之圍時有隨侍二人予斥之他往乃獨徐行其中為首一人持銅牌有利刃出其鞘鼓舞予前欲殺予予笑視之曰爾殺人何以自處其人氣索即收牌刀圍行城外二里許將分路狂眾疑彼為首者有利於予即欲毆之予默計彼眾一鼓則其人危矣奈何乃躊躇將別即拉住首者同至寓處閉門解衣磅礴談笑自若取瓜果共噉之時滿市喧云方士殺僧矣太守聞之即遣多役並捕之彼眾惶懼皆叩首求解免予曰勿懼亦勿辯第聽予言何如耳及至太守問曰狂徒殺僧耶予曰未也來捕時僧方與彼為首者同食瓜果耳守曰何以作鬨予曰市暄耳太守欲枷彼予曰將欲散之枷則固拘之也太守悟乃令地方盡驅之狂眾不三日盡行解散由是此事遂寧是歲作觀老莊影響論十九年辛卯予年四十六歲是年聖母造檀香毗盧佛像建大殿是年秋門人黃子光坐脫二十年壬辰予年四十七是年秋七月予至京訪達觀禪師於上方晉時有琬公慮三災壞劫無佛法乃刻石經藏石室其塔院為僧所賣師贖之欲得予作記予適至師大喜及見即同過石經山乃為作琬公塔院記及重藏舍利記并前所作有海印稿時與達師相對盤桓四十晝夜為生平之奇二十一年癸巳予年四十八是年山東大饑死者載道山中所儲齋糧盡分賑近山之民不足又乘便舟至遼東糴豆數百石以濟之由是邊山四社之民無一饑死者二十二年甲午予年四十九是年春三月山東開府鄭崑崖公入山見訪問法為說方便語冬十月入賀聖節至京留過歲請說戒於慈壽寺時予以修本寺因緣知聖母儲已厚乃請舉事時上以倭犯朝鮮方議往討姑徐徐乃寢
