body:
  text: 侍者福善日録門人通炯編輯嶺南弟子劉起相重較塔銘徑山化城寺淡居鎧公塔銘歷觀古今豪傑之士有戡亂之才而不能降心有拔山之力而不能割愛是知能透情關掉臂生死者非宿種深根雖丈夫亦未易為力也豫於鎧公有異焉公諱法鎧字忍之別號淡居江陰人姓趙氏世稱巨族母夢僧趺坐於堂上遂生公公生而頴慧為兒嬉喜佛事倜儻逸羣長習舉子業才名奕奕乃塵視世榮志性命之學父母為聘竟不願父卒乃杖䇿孤遊登太和山遇羽士授長生之術過武昌遇講良知學者皆掉頭棄去一日入僧舍見金剛經讀至如來説諸心皆為非心忽有省乃曰是吾所歸也還過浮山坐三曲洞瀝血寫孝經癸巳遊皖城達觀禪師過江上公往參未面門外作禮再謁乃見求度未許師登馬祖菴公偕阮公自華至是夜師夢披白鎧人侍其側及公至著白衣懇求剃度師許之因命今名剃髮授具戒時年三十有三師命參己躬下事公即辭入天目誅茅於分經臺弔影藏修單提向上極力參究蔬食不糝單衣露肘每降妄心燃香爇臂如是者三年大有開發石帆嶽公入山見公斃衣鬔頭垢面跣足腰鐮採薪因問你是淡和尚甚麼人應曰我是他使的嶽公大笑曰真道人也久之下天目復過宣城掩關於西樂乃習荷重負肩試四十斤經行以苦筋骨調昏睡其道益進後出關行腳至匡廬每過叢林坐廊下忽焉達旦寤寐一如也辛丑至都門省本師於慈壽初入室便問某甲為生死大事願師指示師即痛棒如是者再一日又問曰永嘉云了即業障本來空只如師子尊者二祖肇公等是了得也未聲未絶師連棒曰會麼會麼公曰不會師曰本來空是甚麼乾屎橛公猛省但點首而已自是見地即穩密壬寅秋南還入浮山會聖巖乃宋遠録公與歐陽六一因碁説法處久為俗業皖城淡宇阮公聚族復之請公以居重新遠公塔瀝血書梵網經日課金剛般若為母壽戊申應太史觀我吳公請住持浮山大華嚴寺居常以本分為佛事四方衲子至者唯示直捷處乃集諸祖入道因緣梓之初達師刻大藏以雙經寂照為刻場師靈龕亦歸之公欲滿本師願遂往庚戌公至山見多霧濕下有化城故址乃宋佛日宣禪師道場太史具區馮公議修復為藏板處公簡得其手扎示左方伯本如吳公吳公按址畫界奪諸豪右之手仍為佛地又贖臨安太平寺田百畝供贍常住於是藏事有歸焉甲寅吳公開府於蜀公以刻藏因緣往議遂登峨嵋禮普賢乙卯春同直指若谷徐公出蜀是年秋還徑山大師靈龕已入土司成文寧朱公禮師塔按形家言知地有水議改葬公與師護法弟子仲淳繆公行求善地改卜於鵬摶峰之陽丙辰冬豫自南嶽來赴弔盡法門死生之義至金沙為文以祭預定於長至月十九日及至會是日茶毗豫因舉火請靈骨入塔以酬生平知己達師末後一段光明公之力也諺曰棒頭出孝子公實以之豫歸匡山公疲於津梁以寂照付杲公以化城為十方接待常住囑諸弟子曰汝等袈裟下各有一坐具地何戀戀於此耶辛酉秋七月遍辭諸檀越過白門以藏事托本如吳公冬十月歸雙徑一日倚杖立堂下顧謂衆曰羚羊挂角不出十二衆罔測至晚爇香禮佛沐浴更衣趺坐默然至旦忽脫去天啓辛酉十二月十三日也弟子某某等茶毗葬於某某處公生於嘉靖辛酉三月二十一日世壽六十有一僧臘二十有八豫每見達師門庭峻絶恆思後難其人及至雙徑見公貌粹骨剛稜稜英氣四方會葬者至百凡蝟集公擘畫遊刃指揮如意意氣間間不動聲色其於以送死復生盡形畢命繼志述事光前絶後斯為達師末後弟子無忝的骨者也私謂公之才足以應世力足以荷擔其為道也艱難辛苦靡不備歷其於事也見義勇為不避刀鋸其視利養如空花水月死生之際超然如脫斃屣噫非大丈夫夙根披露心契無生寢處於有形之外者曷能如此哉公弟子元亮具狀走匡山乞豫為銘豫念法門之誼乃為銘曰叢林秋晚大法頺綱歲寒霜雪紫柏用光其道既光門庭益峻壁立懸崖大有徑庭望之者栗親之者退棘棒一條全無忌諱窟中獅子爪牙才露是獅子兒略無回互一棒之下翻身𨁝跳大步遊行回途復妙渾身荷擔不遺餘力恆沙法藏信手揮斥法輪無窮轉之未盡津梁既疲隨緣究竟旅泊安居乾城行處一切盡為十方常住生前不有末後亦無一塵不立本自如如羚羊挂角分明指示撩起便行撒手歸去一塔孤標空中建立法身彌露風聲月色南嶽山主瑞光祥公銘盡法界量無一物而非法身諸塵勞門無一行而非佛事況乎調練三業精專一心遠離世間而勤淨土之行者乎故吾佛白毫光照東方萬八千界光中菩薩種種因緣而求佛道若南嶽祥公者豈非光中所現攝念山林一心勤求佛道者乎按狀公諱法祥字瑞光別號隱南越嵊縣周氏子生而超曠業儒不第慨然有出世志從其叔遊京師往參嘯巖老人巖示以向上公曰弟子塵勞中人未敢承當巖曰即念佛法門最為捷要公頷之居頃南還決志出家禮本邑喜菴愷公剃髮時年三十有二矣謁棲霞素菴法師受具依棲講肆三年遂棄去北遊大都參遍融和尚一見問曰汝作麼生公曰某甲為生死出家一向修念佛法門不審是第一義諦否融曰更不容念佛外別求第一義諦公領旨作禮慈聖皇太后大作佛事建淨業期請居首座三年期罷遊五臺之伏牛遍參諸老宿時柏松和尚牛山者舊也公見與語心契留住石室弔影絶迹木食三年一日趺坐雪積滿床火絶衣濕侍者往見驚走報松松往視見公定乃擊磬警覺問曰煙寒灰冷作麼境會公曰山原是石冰原是水雪飛滿崖不知所以松曰此是暫息塵勞得輕安耳若耽著此境即墮偏空勿滯於此宜行腳去逢南即止授以鉢袋囑曰禪和往南走報道七十九我也不多時大家相廝守公遂瓢笠徑造峨嵋禮普賢住大峨石八越月苦切參究心地未安因憶松柏逢南之記遂之南嶽登祝融峰頂望古大明山林崇茂即往卜居未幾赤帝峰僧楚然請主閲藏公至一宿夜半恍惚夢中告曰此非師所居速去詰朝將他往適僧大寬留住側刀峰公應諾行三日藏經破公以嘯巖開示念佛法門志終身從事欲以豆為數寬願充化主募豆四十八石公從此放下身心影不出山日夜精勤以豆為珠淨念相繼至終身焉由是稱為豆兒佛云公住山絶無外緣聲光日露十方衲子遠歸之四事不思而至叢林不作而成南嶽寂寞多至得公一振起居常誡諸弟子汝剃除鬚髮不知有生死大事但倚墻靠壁業識茫茫喚作甚麼豈非吾佛所呵衲衣在空間假名阿練若苟不專心淨業大限到來將何抵對閻老子乎聞者感泣公雖絶意人世當世君子聞風景仰廣西方伯劉公謁廟遣書請一見力謝不往衡州郡丞盧公祀廟點失期者罰約三十餘石送公公曰老僧豈以一鉢飯斂衆怨乎竟不納長沙吉王嚮公差內使往請公曰山僧行腳倦遊息肩於此誓死效遠公迹不入俗不敢奉命王遣前使賫送華嚴經二部大疏鈔一部齋資百兩公領令旨以齋資散合山以廣王惠餘留鎮山門王益加重焉公接納往來不擇臧否一味平等慈悲荊襄大盜賈二唐九等七人被捕急來歸發露懺悔哀乞活命公憐其誠納之冠以道巾令隨衆作務捕官至見公慈心藹然又聞念佛音聲有感乃解腰纏三金辦齋而去其盜亦化為苦行僧辛丑歲飢大衆絶糧三日采蕨而食公日夜禱于護法神有少年僧於山下檀越家化米豆百數十石送至詢問前僧無有也公自居側刀峰精修淨業三十餘年未常暫輟居常脅不至席不設方丈唯坐一龕於佛殿不安庫戾笥無長物滅之日唯胡椒一瓶舊布數片而已無勞侍者不發化主不結外援不交權貴所食麗糲常以粳麩為餅充餐僧有投之地者公拾取煨而晱之每經行念佛必荷鋤出遊凡見遺穢必以土掩之或曰師何過勞如此公曰一片清淨地恐山神見穢矣公生平隨衆年七十餘尚無法嗣臨江居士傅某向賈於江湖一旦棄妻子出家峨嵋名同融萬曆壬寅冬來參心相印契即付衣鉢偈曰西來大意問如何直至於今見也麼心上不生何有見囌嚕㗭唎娑婆訶融即依棲以終焉公向與衆周旋無倦一日索浴禮佛告衆曰瓜子孰也正落蒂時堂中無知之者時融居毗佛洞乃遣人往喚融至峰前聞音樂聲入室寂然公趺坐融作禮公曰我行矣先以鉢袋纍汝今以念珠柱杖留別善自護持良久令首座領衆念佛公趺坐誡衆曰毋得虗張揑怪誑惑世人獨一味老實念佛言訖合掌端坐而逝萬曆庚戌二月初六日寅時也公生於嘉靖壬辰九月望日世壽七十有九法臘四十有三大衆供於堂中七日顏色不變全身葬於峰之右建窣堵波憶昔在東海時儀部曾公為言公苦行高操不減古人豫時心識之矣公入滅後十有四年癸亥豫歸曹溪融公具狀來乞塔上之銘豫撫狀喟然而歎曰嗟乎去聖時遙法門凋斃叢林典刑幾至掃地泛泛波流率汩汩於聲利以喪本真法道之衰亦至於此若夫清操苦節一念終身始終不易如公者可謂以身説法矣又何俟登曲彔木拈槌豎拂為向上哉觀公死生去來了無罣礙豈非以念佛心入無生者耶愧不能發公之蘊祕乃為之銘銘曰十方世界法身普應諸塵勞門是為妙行何況一心淨念相繼始終不移日夜無替嗟哉末法逐物失真何如我公為道忘身一入千峰如履刀刃故得三昧名為無諍迥絶外緣以豆為珠光明歷歷心境如如影不出山迹不入俗苦節稜稜清風拂拂四衆來歸隨緣粥飯一味平懷人人自辦以念佛心直入無生故末後句撩起便行赤律一身寸絲不挂七十九年脫體放下來無所粘去不留迹故我稱為真善知識塔影橫空光流南嶽廣長舌相熾然常説水流風動念佛念法此是我公迷津寶筏敕建大護國慈壽寺開山第一代住持古風淳公塔銘世尊説法三藏所談則曰隨類現身皆為實相拈花示衆迦葉微笑則曰觸物明心單傳直指古之學佛者明此可謂具正法眼若古風禪師者始以居士身終為比丘相隨緣利物人莫測其潛符此豈可以二諦求之哉謹按師狀諱覺淳保定新城人也父宋欽母張氏師生即性不茹葷酒為兒好趺坐及長不喜治生産業父母為娶師雖強從即善觀空修離欲行每集諸善男子作般若圓覺法會師為衆中長天然穎悟年二十七棄家遠遊如京師登壇受白衣戒大善知識寶藏成公開法於王城師往參謁有所感契即從披剃執弟子業師最居下板雖執爨負舂未嘗不以身先成公有不可師事志益堅居三年公方命其受具從守心無礙二法師聽華嚴圓覺楞嚴諸經於四大分離妄身何處之語有所領契自爾隨處建立華嚴圓覺道場歲無虗日王城感化若迦維改觀洋洋中外如此者十餘年嘉靖辛酉司禮監黃公錦衣焦公輩重修普安寺迎師居之幾二十年師唯據丈室延一江大千止菴諸法師弘天台賢首兩宗旨隆慶壬申先帝始崇佛道就普安建吉祥道場師主壇筵精誠感格恩渥頒隆齋饋盡從中出今上元年兩宮聖母為社稷祈福大作佛事凡建立齋壇多就師所嘗賜千佛錦袈裟凡內經廠諸效為佛事者率皆從之萬曆丙子今上奉聖母慈聖宣文明肅皇太后德意敕建大慈壽寺成即遷師為住持命度沙彌一人為弟子及敕校續入大藏師首領之凡所弘闡佛事無不稱旨是時海內法門盡皆知師為大法幢矣居常接納四衆但舉圓覺知幻即離不作方便離幻即覺亦無漸次之偈及楞嚴如幻三昧或拈提古人向上公案以警發之暇則行住坐臥每咄咄作私語見聞即為之改容舉莫識其為密行者生平履歷不離當處而大播宗風竟莫究其涯涘多稱為肉身大士一夕召諸弟子告有微恙端坐三日熙然集衆念佛隨聲寂然而逝萬曆九年四月十有七日也師生於正德辛未卒於萬曆辛巳世壽七十有一僧臘四十有奇得度弟子十五人孫八十餘人本在為欽依僧録善世領今慈壽住持奉師全身葬於寺之後園聖母悼之乃賜金若干建塔以表旌之銘曰法身如空非聲非色應物現形如水中月觸處皆然何真何俗即比丘身亦同空谷伊維古風聿生像季卓爾襟期作大佛事真俗雙彰形神俱妙不離市而弘至道感應昭昭天人穆穆默運環樞龍降虎伏精格紫宸誠回北斗法道用昌和盤珠走梵剎才興琳宮初建風滿寰區翕如雷電一管春生蒹葭灰起大地揚輝實從茲始師維何人為化為幻詎受密遺來行方便七十餘年師如食頃觀者癡疑熱夢未醒彈指歸空破顏微笑萬丈深潭只垂一釣表剎凌空長松帶霧月色風聲真機獨露金臺龍華寺第八代住山瑞菴禎公塔銘師諱廣禎字瑞菴金臺孫氏子生性多奇譎幼不齒羣兒中見者異之心喜佛事時喃喃作出家語龍華榮菴茂公居僧録左闡教有重行偶從孫氏齋次見師甫七歲有奇氣因乞為沙彌遂命與上足繭公為弟子少長即喜以音聲為佛事調練三業精修六時居常切志向上事年三十登壇受具大通法師教化昌隆勤事之多聞法要隆慶改元大宗伯舉為龍華住持師大開法社延禪講宗師集四方學士披閲大藏闡少室天台兩宗旨若大千潤禪師中興曹洞凡為諸方師匠者多發迹於斯妙峰登禪師微時以大藏因緣謁師師為引重於公卿間道風大著妙師為法門推漸亦藉資焉今上崇尚三寶海內名藍知識凡為佛事者多出師門大都稱為功德藏丁丑春妙師與豫隱居清涼師傾心慕之遊五頂搜訪於冰雪中居無何杖錫南遊禮普陀大士入天台隱於通玄峰頂鳥棲𪅏食者三年專精一行三昧有所發悟尋謝去回䇿東吳禮長干舍利泝長江陟九華登匡廬馴黃龍白鹿揖五老而望香爐繞文殊經臺三匝滌除玄覽以休過黃梅求印證焉復遊目武當抵南嶽求悟法華三昧處回入伏牛練磨衆中居三月以歸萬曆九年辛巳春師年五十有四矣居頃之妙師與豫建大會清涼師與雙林平公無遮允公齊入法社壬午春會罷師復與豫結隱太行及冬初師還故居明年豫亦東蹈海上且誓與師同歸又明年甲申奉聖母慈聖皇太后命同妙師飯僧秦晉伊洛諸名山因出關走蘆芽渡河登華嶽覽長安閲雁塔留影尋草堂羅什翻經處結夏圭峰望太白太乙略崤函而東再入伏牛訪嵩少參鼻祖單傳哭潤公扣白馬以歸居無何復奉慈旨賫大藏往天台廬嶽復遣清涼還報師喟然歎曰一介微僧數叨慈命撫心顧德愧何以當乃引疾獨居屏人絶迹山門事久付弟子輩居常自足無意於世生平後己先人不以物為事戒珠心月秋露寒空貌古神清長松孤鶴凄然暖然可親而不可近可慢而不可忽難非法眼之英固一代叢林師表也達觀可師嘗謂豫曰吾門之龍華猶如秦鏡真能照人肝膽又若絮裹如意信手取之無不足者一時賞鑑如此師抱疾期年豫從海上往問之師把臂泣謂豫曰死生夢幻去來夜旦非豫所悲但不能與公同歸有負山海之盟一旦長訣當引領望公於淨土中至若所棄土苴諸弟子輩屬當事公如我生公其視我不死耶又曰法門寥落重豫所悲妙達二師密藏諸公輩皆當代俊逸爾我真期願當忘心為法幸為我謝居無何召諸弟子曰吾賴為佛子愧無補法門但生平此心不敢辜負佛恩耳生謂我不足死當我有餘爾其勉之豫行矣爾其無忘東海也為我裁衣以謝言訖而逝萬曆十有七年五月草三日也師生於嘉靖戊子世壽六十有二法臘三十有奇得度弟子二人孫智潭奉師龕室全身葬於京西北海店之隆禧寺左是歲冬十月智潭奉師命持衲衣一襲匍匐海上訃豫聞之嗟乎悲哉生耶死耶師何人耶因具述行實如左乃為銘曰盡法界身修普賢行海印威神炳然齊映或現頭陀或居肆塵市山林無非佛事曰惟我師化比丘相戒目悲華為人榜樣圓覺伽藍十方聚會來者應知無內無外如如意珠似功德藏出生妙利恆沙供養上方擎來香飯一鉢見者聞者皆蒙度脫擘破天台踏翻廬嶽如蓮華開似大夢覺歷遍寰中囊收沙界赤手歸來無錢買賣六十餘年死生夜旦喚不回頭先登彼岸撇下髑髏埋之沙聚塔表長空影沈秋水是師常身昭然若此五臺山龍泉寺正光居士徐公願力塔記銘觀夫真界凝然應化之徵靡一聖凡異路利他之迹有殊所以幻影多端浮光萬態至若憑願力以持心假窣波而表願者是於正光居士見之矣居士姓徐氏霸州保定縣人父伸母高氏士生而有異徵周歲能言前世事動止度若天人嘉靖三十四年甫七歲應選進入宮闈列內翰局讀書進局官教內則儀掌祕閣即能明習故事隆慶改元升御前勤慎有功萬曆初今上御宇紀勛升乾清宮內奏事牌子歷事三朝小心翼翼奉聖母起居朝夕惕厲調和樞紐贊理化機有大力焉德位日崇篤信三寶於都城崇文門外建明因寺一區印施佛大藏經一部延沙門永慶為住持於山西五臺舊路嶺重修龍泉寺奏聞聖母度沙彌遠健授僧録左覺義為本寺住持又於真定曲陽縣北重修鳳祥寺一所置地三頃餘畝以供龍泉香火接待十方域內名山大剎凡聖母功德所被者靡不默助皇猷敷揚慈化一雨普霑含生獲福矣居士雖處深宮衣唯布素甘心蔬食每厭生死志求出離朝參慕禮寒暑不易刺血書金剛般若經普賢行願法華心品若干卷建窣堵波於龍泉之東南麓以表願力持心功流浩劫溼斯猛𦦨永宅清涼期來世以歸依效一生而取辦以為金剛種子靈苗福田常住矣噫若居士者非夫親承付囑而來耶抑以幻化人天而作佛事耶何其智深志固之若此也功德既成乃命家臣程進持杖稽首海印道人乞紀其事乃為銘曰乾坤造化育靈産秀乃降哲人曷分左右哲人伊何唯徐之子氣亶丈夫幻形維女維女謂何內訓實祖不有其人孰匡聖母歷事三朝位班九列贊化調元著茲偉績蕩蕩慈風輝輝佛日率土普天無非為國在在道場處處寶所但願莊嚴孰分人我身處塵勞志求淨土稟受三歸普修六度書寫受持大乘經偈誓捨此身徑登佛地嗟彼夢夫長夜冥冥偉矣達人視死如生迹繫王宮心存丘壑徑節凌雲長松孤鶴偃師化人誰假誰真獻珠龍女其事若神塔表長城奠安畿輔上祝聲𨤲天長地久普濟菴始祖寶藏成公塔銘寶藏大師者諱自成山東德州劉氏子幼習爐業在鉗鎚間即知以念佛從事如佛教金師之法如是用心有年父蚤喪其母孀居天性至孝供養竭其心力年三十有出世志從本省鐘樓寺潭公剃染即立禪習止觀門師將志行腳母老無養師以具稱其母荷擔之遠遊四方每乞食奉母於樹下冢間上壽為歡不減鼎爼後至京之西山百花中峪往來數年土人重之其供養日益贍師惟以一瓢之外無餘糝以此終母天年以茶毗法葬之建窣堵波以表孝義今尚存焉已而結庵居大峪嶽家坡中貴傅公集衆請師住都城之普安寺未幾白衣檀越張某建普濟菴於阜城關外四里園接待十方往來嘉靖庚戌秋八月大虜犯京師都城三面無隙率多奔潰唯西郭一面將合圍適虜酋引胡兒數千騎馳至菴首飲馬盤礴酋驟入菴衆擁其後師望之頺然憨笑且罵曰酋奴毋妄動我物師預羅鮮果於階下酋長見柿如火欣然取噉師大罵曰此不可食酋將為賣己強食之甚苦澀師乃奪其柿以頻梨與之虜噉而甘之歡呼以為不欺己嚙指誡衆曰有人於此毋妄殺也乃插令箭而去頃一虜追王氏子入菴其人奔潛佛座下虜窺得之刃將下師以手挈虜奪刃擲地其人竟以生居頃虜亦稍稍引去達觀可禪師常贊之曰師以一身當虜一面指麾談罵所全活者數萬是即現天大將軍身而為説法豈直一大將摧之力哉杭人韶善士者夢伽藍為師催供養傾心歸依建彌勒菴以延師師居常不事口腹衲衣糞掃一鉢無餘每得施利米麵盡皆傾囊以濟貧者若空無一粒亦不往自檀越唯以坯堵門面壁忍餓而坐久有知之者為送供食盡則堵門如故率以為常後修普安寺成師復歸院弟子日漸進初淳公執業甚勤師於衆中獨苦淳公祁寒溽暑陸沈賤役唯公以身先之百不一可無人識其意者師將終日顧謂衆曰吾之有淳猶樹之有幹至若枝葉繁茂扶疏而庇蔭多矣汝等知之乎未幾無疾而逝嘉靖三十九年二月朔日也師世壽八十有九僧臘五十有奇公滅後淳公大興普安於先帝顧命之時今上聖母建慈壽寺成延淳公為住持以公弟子了寧為替僧公化後又以其孫本在為住持在以疾告退院又以其徒圓應世其業聖慈復建慈恩寺為在別阮以休老焉公之子孫枝葉繁茂一如公言豈非天道冥冥報德之驗與萬曆甲午冬日余隨緣王城其孫了鑑與在等持狀乞余為銘乃為之銘曰天道無親常與善人明明在上豈曰不真維真不朽視身非有不有至人安見其久伊惟我師積彼孝思出塵離俗其德實基應化門頭其功匪一以異方便著茲偉績因悟不生所以不死技幹扶疏實由種子覆庇人天埋根千尺一剎峩然千秋萬慈慧寺無瑕玉和尚塔銘公諱明玉字無瑕西蜀安嶽龍居劉氏子公生不愛治生産業性倔強不與世情和合長娶汪氏女舉三子長兒聰慧篤孝公雖心愛之亦不為兒女子計居常以佛為事每供養二老必以齋蔬為盡孝二老以此自安公以超塵脫俗為念無頃刻置也二老謝世去公年四十六即判然棄妻子從方外遊是時長兒年十二躑躅相隨至播州之樓頭山於東洋海菴主所父子俱剃髮為沙彌授具戒隆慶三年五月五日也自爾公攜長兒行腳即督課業為弟子父子相從雲遊萬里遍歷名山參叩知識苦行絶倫每日中一食粳菜不糝樹下冢間隨遇順適自是終身脅不至席萬曆初謁普陀過金陵至都下遊履五臺寓三塔寺禮華嚴經經六十萬字一字一拜每晝夜必稽首三千如是者經三匝至十二年復至京之碧峰寺禮法華經六萬餘字一字一拜晝夜不倦如前者十二匝長兒為沙彌者年德日亦長多親講肆聽習華嚴法華楞嚴圓覺唯識諸經論善開曉發蒙而事公日益謹一時稱詫謂有師弟子如此者業已風動中外矣十七年內官監太監王公輩欲開精舍延公弟子為弘法所且為公休老地乃卜阜城關外二里許捐資創寺以居寺成請額聖母嘉之賜曰慈慧大宗伯棠軒李公記其事一日公謂弟子曰吾以業繫娑婆七十二年侵尋老病久住何益吾將歸矣爾當以法為懷勿生愛戀遂不食念佛不絶者旬日聲響如鍾顏色若壯弟子請問生死大事公但曰嘻嘻呵呵呵呵嘻嘻不是妄念不是真知良久云你説是個甚麼自代云大通橋上交糧客原是南方送米人臨危索浴更衣端坐持珠念佛益哀促連大呌佛佛佛倒駕鐵牛歸佛土聲絶而逝萬曆乙未春王正月十九日也公生於嘉靖甲申七月世壽七十有二僧臘二十有六以某月某日奉全身於黃村塔弟子一人真貴即今為慈慧法師者豫持鉢王城住慈氏樓閣貴持行實哀乞海印狀其事公生不識一丁臨行快便如此豈非腳跟線斷就路還家者耶乃為銘曰生死機關只在一竅善來善逝木人戴帽父子團圞形影相顧世出世間有何回互昔日老龐破家散宅今日看來大似未撇何如此公一竅不通生拗鐵強直出樊籠龐不嫁女公不捨兒一般主意各得便宜七十二年半僧半俗今日風光千足萬足一塔凌空十方常住空壞塔存法身彌露三角山勉菴幻法師塔銘謹按狀師諱如幻字勉菴莆田林氏子父環師倜儻負奇氣幼業儒年十四即列諸生里有夏生治時者通內典師與遊從最善生一日謂師曰公唇掀齒露非壽相也師驚問何為而可生曰聞之誦觀音大士禱無不應第持其號自當驗師遂依持勤懇二年而唇果吻合年十九倭夷寇閩父母俱喪於兵師大泣曰人命固如是乎何戀戀鄉井為遂拂衣遨遊江湖間二載入廬山參遍融大師融問曰大德何處人來作甚麼師曰小子閩人來為求長生融曰有長必有短何不學無生曰無生作麼學乞師指示融曰汝試剃除鬚髮屏息諸緣咬嚼一句無義味話久久得個下落乃可為爾道無生師即剃染命名如幻依棲頃之遂去蘄水馬牙山參無為藏主居三載次隱斗方山又五載遂荷䇿北遊上都謁諸大知識依暹理二法師聽諸經奧義諸老皆深器之已而有田將軍者蘄人也見師雅量因漫之以世諦業師笑曰海龍肯入溝渠遂拽杖歸九峰衲子駢集每以楞嚴為衆發明心要翰林郭公正域以太夫人憂居謁師於九峰相得歡甚公因進而請曰竊見常世談禪者動以棒喝機鋒為向上自多及察其操存則末也若是又不若守教乘精戒律離欲苦行以慈利物若師之為佳耳師曰然非禪之過乃學禪者之過耳奈何去聖愈遠法門下衰誠若公言可為流涕也師律身清苦生平無嗜好有所施輒以施人每有所往唯一鉢三衣跣足草屨而已楚藩臬大夫沈君與師交最密弟子輩欲置香火地以券白師於沈公師大斥曰方寸福田不力耨區區安向沈官人弟子不聽私請之師知之即拽杖去九峰走武曲憩吉陽寺閉關誦華嚴經三載往潭州三角山為馬祖門人總印開山處不幾年煥然一新法席大振師一日謂衆曰趙州八十尚行腳我腳底豈乏草鞋一具耶遂拂袖之匡廬入黃龍寺留講楞嚴至二卷終師謂衆曰姑舍是無論且有末後一句子當與大衆商量即示恙六日告終衆有請留偈師曰辭世本無偈癡人覓夢蹤虗空無面目面目問虗空弟子有問師靈骨可更之蘄乎師曰愛重娑婆苦無情極樂天何須懷舊影寂照滿三千言訖遂逝時萬曆十九年某月日也師生於嘉靖癸巳世壽五十有九僧臘三十有奇門人火浴遂以骨石瘞於黃龍山之某處弟子性詮以遺命走江夏郭太史乞狀其行實萬曆壬辰秋九月因郭太史紹介於余為塔銘乃按狀以敘而為銘曰大海汪洋味全滴水娑竭噙之為雲為雨惟此一滴無內無外卷入毛端散周沙界霈然䨦乾地普洽三草二木酸甘苦辣各得生長抽芽發幹除非無根自遭塗炭曰惟我師娑竭之子毒氣逼人觸之者死噓氣成雲縮氣成冰或寒或熱順時稱尊以身為水以水為命變化無方去來不定流行坎止遇緣即宗不是如幻安能合空來無所從去無所著倒騎黃龍踏折三角潭州之水匡山之雲彌滿六合是師全身
