body:
  text: 侍者福善日録門人通炯編輯嶺南弟子劉起相重較大學綱目決疑題辭余十九棄筆研三十入山絶文字五十被譴蒙恩放嶺外於今十四年矣往來持鉢五羊諸子謬推為知言時時過從問道余卒無以應若虗來實往愧矣愧矣間有以禪視者余則若啞人喫黃檗耳己酉秋日偶乞食來諸子具香齊於法社余得捧腹是諸子果我也食訖請益余但吐粥飯氣耳含羞而別舟還曹溪思諸子飽我非一日矣竟莫酬嘗有以顏子問仁章請者余咿嗚而已即有言不能遍遍亦不能盡而求悅可衆心者談不易也以諸子之食難消腹猶果然舟中睡足聞侍者讀大學聒我疑焉因取經一章按綱目設問答以自決且引顏子問仁章以參會之如鼓刀然兩半餉而卒業讀之不成句非文也諦思自幼讀孔子書求直指心法獨授顏子以真傳的訣餘則引而不發向不知聖人心印盡揭露於二百五言之間微矣微矣豈無目耶嗟嗟余年六十四矣而今乃知可謂晚矣恐其死也終於泯泯故急以告諸子諸子年或過余半未半者幸而聞此可謂蚤矣如良馬見鞭影一息千里有若鵝王擇乳豈不以此為粥飯氣耶是特有感於一飯而發願諸子持此以餉天下之餓者非敢言博施也己酉中秋前二日方外德清書於須陽峽之舟中大學之道在明明德在親民在止於至善大學者謂此乃沒量大人之學也道字猶方法也以天下人見的小都是小人不得稱為大人者以所學的都是小方法即如諸子百家奇謀異數不過一曲之見縱學得成只成得個小人若肯反求自己本有心性一旦悟了當下便是大人以所學者大故曰大學大學方法不多些子不用多知多見只是三件事便了第一要悟得自己心體故曰在明明德其次要使天下人個個都悟得與我一般大家都不是舊時知見斬新作一番事業無人無我共享太平故曰在親民其次為己為民不可草草半途而止大家都要做到徹底處方才罷手故曰在止於至善果能學得者三件事便是大人兩個明字要理會得有分曉且第二個明字乃光明之明是指自己心體第一個明字有兩意若就明德上說自己工夫便是悟明之明謂明德是我本有之性但一向述而不知恰是一個迷人只說自家沒了頭馳求不得一日忽然省了當下知得本頭自在原不曾失人人自性本來光明廣大自在不少絲毫但自己迷了都向外面他家屋裏討分曉件件去學他說話將謂學得的有用若一旦悟了自己本性光光明明一些不缺缺此便是悟明了自己本有之明德故曰明明德悟得明德立地便是聖人此就工夫為己分上說若就親民分上說第一個明字乃是昭明之明乃曉諭之意又是揭示之義如揭日月於中天即是大明之明二意都要透徹問如何是至善答自古以來人人知見只曉得在善惡兩條路上走只管教人改惡遷善此是舊來知見有何奇特殊不知善惡兩頭乃是外來的對待之法與我自性本體了不干涉所以世人作惡的可改為善則善人可變而為惡足見善不足恃也以善不到至處雖善不善故學人站立不住以不是到家去處非可止之地以此看來皆是舊日知見習氣耳今言至善乃是悟明自性本來無善無惡之真體只是一段光明無內無外無古無今無人無我無是無非所謂獨立而不改此中一點著不得蕩無纖塵若以善破惡惡去善存此猶隔一層即此一善字原是客塵不是本主故不是至極可止之地只須善惡兩忘物我迹絶無依倚無明昧無去來不動不搖方為到家時節到此在己不見有可明之德在民不見有可新之民渾然一體乃是大人境界無善可名乃名至善知此始謂知止知止而後有定定而后能靜一節定字乃指自性本體寂然不動湛然常定不待習而后定者但學人不達本體本來常定乃去修習強要去定只管將生平所習知見在善惡兩頭生滅心上求定如猢孫入布袋水上按葫蘆似此求定窮年也不得定何以故病在用生滅心存善惡見不達本體專與妄想打交滾所謂認賊為子大不知止耳苟能了達本體當下寂然此是自性定不是強求得的定只如六祖大師開示學人用心云不思善不思惡如何是上座本來面目學人當下一刀兩段立地便見自性狂心頓歇此後再不別求始悟自家一向原不曾動此便是知止而后有定的樣子又云汝但善惡都莫思量自然得見心體此便是知止的樣子所以學人貴要知止知止自然定靜字與定字不同定是自性定體此靜乃是對外面擾擾不靜說與定體遠甚何也以學人一向妄想紛飛心中不得暫息只管在知見上強勉遏捺將心主靜不知求靜愈切而亂想益熾必不能靜何以故蓋為將心覓心轉覓轉遠如何得一念休息耶以從外求入如人叫門不開翻與守門人作鬧鬧到卒底若真主人不見面畢竟打鬧不得休息若得主人從中洞開重門則守門者亦疾走無影而求入者真見主人則求見之心亦歇滅無有矣此謂狂心歇處為靜耳若不真見本體到底決不能靜故曰定而后能靜安字乃是安穩平貼之義又如安命之安謂自足而不求餘也因一向求靜不得雜念紛紛馳求不息此心再無一念之安而今既悟本體馳求心歇自性具足無缺無餘安安貼貼快活自在此等安閒快活乃是狂心歇處而得故曰靜而後能安慮字不是妄想思慮之慮亦不是憂慮之慮乃是不慮之慮故曰易無思也無慮也寂然不動感而遂通天下之故又曰百慮而一致又曰不慮而遍正是者個慮字謂未悟時專在妄想思慮上求即一件事千思萬慮到底沒用也慮不到多思多慮於心轉見不安今既悟明此心安然自在舉心動念圓滿洞達天下事物了然目前此等境界不是聰明知見算計得的乃是自心本體光明照耀自然具足的故曰安而後能慮得字不是得失之得乃是不滲漏之義聖人泛應曲當羣情畢照一毫不謬徹見底原一一中節故謂之得非是有所得也初未明明德時專用妄想思慮計較籌度縱是也不得何以故非真實故今以自性光明齊觀竝照羣情異態通歸一理故能曲成而不遺此非有所得蓋以不慮之慮無得之得故曰慮而后能得言非偶爾合節特由慮而合故古之欲明明德於天下者一節此釋上本末先后之序以驗明明德親民之實效也就成己工夫上說則以明明德為本新民為末蓋從根本說到枝末上去今就成物上說故從枝末倒說到根本處來以前從一心知止上做到慮而能得到此則天下事物皆歸我方寸矣今欲要以我既悟之明德以揭示天下之人願使人人共悟蓋欲字即是願力謂我今既悟此明德之性此性乃天下人均賦共稟者豈忍自知而棄人哉故我願揭示與天下之人使其同悟同證但恐負此願者近於迂濶難取速效且天下至廣豈可一蹴而遍故姑且先從一國做將去所謂知遠之近若一國見效則天下易化矣昔堯都平陽舜宅百揆湯七十里文王百里皆古之欲明明德於天下之君也孰不從願力來余故曰欲願力也身為天下國家之本經文向後總歸結在修身上可見修身是要緊的事而此一件事最難理會豈是將者血肉之軀束斂得謹慎端莊如童子見先生時即此就可治國乎豈是身上件件做得模樣好看如戲場上子弟相似即此可以平天下乎故修身全在心上工夫說只如顏子問仁孔子告以克己復禮為仁此正是真正修身的樣子隨告之曰一日克己復禮天下歸仁此便是真正治國平天下的實事若不信此段克己是修身實事如何顏子請問其目孔子便告之以四勿乎且四勿皆修身之事也克己乃心地為仁之工夫也克己為仁即明明德也天下歸仁即新民也為仁由己此己乃真己即至善之地故顏子隳聰明黜肢體心齊坐忘皆由己之實效至善之地也夫人之一身作障礙者見聞知覺而已所謂視聽言動皆古今天下人人舊有之知見為仁須是把舊日的知見一切盡要剗去重新別做一番生涯始得不是夾帶著舊日宿習之見可得而入以舊日的見聞知覺都是非禮雜亂顛倒一毫用不著故剜心摘膽拈出箇勿字勿是禁令驅逐之詞謂只將舊日的視聽言動盡行屏絶全不許再犯再犯即為賊矣此最嚴禁之令也顏子一聞當下便領會遂將聰明隳了將肢體黜了一切屏去單單坐坐而忘忘到無可忘處翻身跳將起來一切見聞知覺全不似舊時的人乃是從新自己別修造出一箇人身來一般如此豈不是新人耶自己既新就推此新以化民而民無不感化而新之者此所謂一日克己復禮天下歸仁正修身之效也不如此何以修身為治國平天下之本耶心乃本體為主意乃妄想思慮屬客此心意之辨也今要心正須先將意根下一切思慮妄想一齊斬斷如斬亂絲一念不生則心體純一無妄故謂之賊蓋心邪由意不誠今意地無妄則心自正矣故曰欲正其心先誠其意知與意又真妄之辨也意乃妄想知屬真知真知即本體之明德一向被妄想障蔽不得透露故真知暗昧受屈而妄想專權譬如權奸挾天子以令諸侯如今要斬奸邪必請上方之劒非真命不足以破僭竊故曰欲誠其意先致其知知乃真主一向昏迷不覺今言致者猶達也譬如忠臣志欲除奸不敢自用必先致奸邪之狀達於其主使其醒悟故謂之致若真主一悟則奸邪自不容其作祟矣故曰欲誠其意先致其知物即外物一向與我作對者乃見聞知覺視聽言動所取之境知即真知乃自體本明之智光此一知字是迷悟之原以迷則內變真知為妄想故意不誠不誠故不明外取真境為可欲故物不化不化故為礙是則此一知字為內外心境真妄迷悟之根宗古人云知之一字衆妙之門衆禍之門是也今撥亂反正必內仗真知之力以破妄想外用真知之照以融妄境格即禹格三苗之格謂我以至誠感通彼即化而歸我所謂至誠貫金石感豚魚格也且知有真妄不同故用亦異而格亦有二以妄知用妄想故物與我相扞格此格為鬬格之格如云與接為搆日與心鬬是也以真知用至誠故物與我相感通此格乃感格之格如云格其非心是也且如驢鳴蛙噪窗前草皆聲色之境與我作對為扞格而宋儒有聞驢鳴蛙噪見窗前草而悟者聲色一也向之與我扞格者今則化為我心之妙境矣物化為知與我為一其為感格之格復何疑問真知無物可對如何感格於物答真知其實內外洞然無物可對而感物之理最難措口易曰寂然不動感而遂通天下之故寂然不動知體也天下之故外物也感而遂通格物也感通云者不是真知鑽到物裏去以真知蕩然無物當前故也真妄心境不容兩立外物如黑暗真知如白日若白日一升羣暗頓滅殆約消化處說感通耳以暗感明則明成暗今以明感暗則暗自謝而明獨立故雖感而本不相到而重在明也物體本虗以妄取著故作障礙今以真知獨照則解處洞然無物可當情矣以寂然不動之真知達本來無物之幻物斯則知不待感而自照物不待通而自融兩不相解微矣微矣故學人獨貴在真知真知一立則明德自明元無一毫造作大學工夫所以言明言知而修齊治平皆是物也問始綱領說明德親民止至善分明是三件事今條目上只說明明德於天下終歸到致知格物上若一件事是何意答聖人此意最妙千古無人會得此中八件事單單只重在一箇知字此知字即明德乃本體也前云第一箇明字有二意吾向所解致知格物乃用前悟明一意工夫已在知止中止字即寂然不動之知體知止知字即第一箇明字乃工夫此一段已知致至極處知體既極則誠意正心修身之能事畢矣如此則明德與新民分明兩事今欲明明德於天下乃用第二揭示昭明之意則致知格物亦可就新民上說且知止而后有定是已立謂知所止則自己腳跟已立定矣慮而后能得是已達謂已於一切事物通達而不遺目前無一毫障礙則法法皆真豈非已達耶其所以立所以達皆仗真知之力也故今做新民的工夫就將我已悟之真知致達於萬物之中萬物既蒙我真知一照則如紅爐點雪烈日消霜不期化而自化矣故云致知在格物物自化故謂之格彼物既格則我之明德自然照明於天下民不期新而自新矣所謂立人達人也如此則明德新民只是一事三綱領者一而三三而一也故此八事只了明明德於天下一句且從家國而後及天下者知遠之近也明甚問如何格物就能平得天下答且道所格之物是何物即天地萬物盡在裏許豈除了天地萬物外別尋箇物來格耶若格物平不得天下如何孔子說一日克己復禮天下歸仁且道天下又是何物歸仁畢竟歸向何處去參參問致知格物與克己復禮天下歸仁如何消會答克己即致知復禮即格物天下歸仁即物格問學人不會答己是物克是致知復禮則己化化己豈非格物耶天下歸仁何等太平氣象是謂物格問正心致知何辨答正心乃四勿先將視聽言動絶其非禮但可修身正己不能化物若致知專在格物則達人其功最大所以大學重在致知問格物物格先後之旨答前八事著先字總歸重在末後致知上此是說工夫今從物格說至平天下著後字亦是提起知字要顯向後七事都是知字的效驗耳學人要在此知字上著眼前云致知格物者是感物以達其知此格字乃感格之格今言物格而後知至者是藉物以驗知體意謂彼物但有一毫不消化處便是知不到至極處必欲物消化盡了才極得此真知如此則物格之格乃來格之格所謂神之格思的格字正是天下歸仁之意物都來格方是知之效驗所以格物物格學人須要討分曉若物都來格了則一路格去直到天下平方才罷手聖人意旨了然明白只是要真實工夫做出乃見下落問自天子以至於庶人一是皆以修身為本既云只一知字如何歸到修身上答不從修身上做起不道向虗空裏做所以聖人分明示汝克己復禮天下歸仁以己即己身乃是我最親之一物比外物不同克己乃是我致知先致在己身一物上若將自己此物格了然後格天地萬物何難之有故通以修身為本問格有三義謂扞格感格來格答三義通由一人而發也請以喻明昔杞梁之妻善哭夫死哭之初哭則里人惡其聲厭其人故聞其哭則掩耳見其人則閉目以其哭異乎人之哭也其妻亦不以里人厭惡而不哭哭之既久里人不覺而哀痛之亦哭哭則忘其厭惡也厭惡忘則心轉而憐之矣其妻亦不以其人憐己而不哭終哭之不休久則通里人人皆善哭矣人人皆善哭則忘其哀痛而不見若人之為哭者人人善哭哭久則通里以成俗俗成則人人皆謂自能哭矣人人自能哭則視杞梁之妻猶夫人也不異己而與之周旋密邇則無不忘也且杞梁之妻之哭非哭其夫也哭其天也天乃終身所依賴者失則不容不哭也慟則終天之恨也以知天不容己故哭亦不已奚以人厭惡而可已耶藉使通里之人日日而詢之哭更哀也殆非有意欲人憐己也豈詢而能止之即自刃在前鼎鑊在後威而止之不能也何耶以此天外無可哭者矣初哭而人惡之者以哭之痛特異於人也扞格也哭久而人人皆痛者以哭之痛切於人心故人人皆自痛非痛杞也感格也蓋久而通里善哭以成俗則不知哭痛自杞出抑視梁妻直類己焉耳斯則來格也此言雖小可以喻大此憨山大師所著大學綱領決疑也大師居曹溪章逢之士多負筆問道大師現舉子身而為說法今年過吳門舉似謙益曰老人遊戲筆墨猶有童心要非衲衣下事也子其謂何益聞張子韶少學於龜山窺見未發之中及造徑山以格物物格宗旨言下扣擊頓領微旨晚宋稱氣節者皆首子韶繇今觀之子韶抗辨經筵晚謫橫浦執書倚立雙趺隱然視少年氣節殆如雪泥鴻爪非有得於徑山之深而能然乎今之為子韶者願力不同其以世諦而宣正法則一也扁鵲聞秦人愛小兒即為小兒醫今世尚舉子故大師現舉子身而為說法何謂非衲衣下事乎子韶嘗云每聞徑山老人所舉因緣如千門萬戶一踏而開今之舉子能作如是觀大師金剛眼睛一一從筆頭點出矣萬曆丁巳四月虞山幅巾弟子錢謙益焚香敬題
