body:
  text: 侍者福善日録門人通炯編輯嶺南弟子劉起相重校序淨土指歸序淨土指歸蓋指修者歸於淨土也吾佛世尊攝化羣生所說法門方便非一而始終法要有性相二宗以其機有大小故教有頓漸之設末後分為禪教二門教則引攝三根禪則頓悟一心如一大藏經千七百公案其來尚矣若淨土一門普被三根頓漸齊入無機不攝所謂橫超三界是為最勝法門從上諸祖悟心之士未有一人不以此為歸宿者如龍樹馬鳴極力而稱揚之說者以為俯提中下非知淨土之旨者何耶良以十方世界一切衆生依正二報雖有勝劣淨穢之殊皆從一心之所感變故云心淨則土淨所謂唯心淨土是則土非心外淨由一心苟非悟心之士安可以淨其土耶斯則禪家上上根未有不歸淨土者此也中下之士修持淨戒專心注念觀念相續臨終必得往生雖有去來之相而彌陀相好寶樹華臺實由自心之所感現譬若夢事非從外來至若愚夫愚婦但修十善精持五戒專心念佛臨終必得往生者此以佛力加持行人念想增勝此以勝想彼以大願願與念接自心與佛默爾相應雖淨土之境未現而往生之功已成實由自心冥感之力亦非外也若十惡之輩臨終業勝在獄苦事已現在前但為苦逼極脫苦心切極苦之心而成念力極盡悔心悔心已極即此極處全體轉變一念與佛相應故佛力加持應念現前化刀山為寶樹變火鑊為蓮池故此惡輩亦得往生然此淨土之境良因自心全體轉變之功實非外得由是觀之三界萬法未有一法不從心生淨穢之境未有一境不從心現所以淨土一門無論悟與不悟上智下愚之士但修而必得者皆由自心斯則唯心淨土之旨皎然若視白黑矣以佛體如空自心空淨與佛冥一惟假一念願力莊嚴而淨土之境頓現不借功勛是為上上殊非淺智薄信者可到也中下之士依觀念相續不為愛緣業習之所傾奪根雖少劣而志實上上且修之惟難以斷愛根為難耳惡輩往生更難雖云帶業亦由多生夙習善根內熏所發根雖惡劣即一念勇猛之心超於上上較彼放下屠刀便作佛事又差勝矣然此萬萬無一世人若必待此而求生謬矣以愚所觀根無大小究竟必由向上一念而得成就故此法門豈特權為中下而設耶二師將軍愛柏徐公以文武發家說禮樂而敦詩書談兵之暇留心淨土法門所謂以慈用兵者也纂輯指歸一書宗於十六觀經以至發明難問以顯念佛本源次引蓮宗及龍舒諸說以示信願正行次列遠公以下二十六人以為實證後開勸念以至發揮念佛之義因果畢備較前修要門盡萃於此誠所謂淨土之指南矣豫謂是集也理事雙修因果並顯觀者以此為指歸則妙樂之境昭昭心目之閒不必求之十萬億土之外而受勝妙樂現諸日用行事之閒不待報謝神超而後為實證也是書之利真苦海之慈航長夜之慧炬也豈小小哉刻瑜伽佛事儀範序吾佛設教以一死生之理通幽明之故達鬼神之情無生不度無苦不拔故曰慈悲所緣緣苦衆生非衆生之劇苦無以見慈悲之廣大此瑜伽之教有自來矣梵語瑜伽此云相應謂心境表裏如一也然教有顯密顯則直指衆生本元心體令其了悟以脫生死之縛密乃諸佛心印是為神呪誦演則加持令諸衆生頓脫劇苦皆度生之儀軌也真言本自灌頂部中其所以幽冥拯沈魄始於阿難尊者夜坐林中見面然鬼王遂啓施食之教至於呪水呪食普濟河沙皆出自西域神僧而流於震旦傳為故事從不空三藏而宣密言漸至於梁武帝因郗氏夫人墮蟒身求度帝請志公和尚集諸大德沙門纂為水陸儀文則通三界幽顯靈祇靡不畢申其情自此僧徒相因為瑜伽佛事其來久矣至我聖祖制以禪講瑜伽三科度僧以楞伽金剛佛祖三經以試禪講以𦦨口施食津濟疏文以試瑜伽能通其一方許為僧今南都之天界為禪報恩為講能仁為瑜伽遵國制也此後流俗漸弊槩為非破律儀視為嬉戲然深失如來度生之本懷即其疏意達孝子慈親之情悃而祕密真言演諸如來之心印一偈而變地獄為淨土一語而化鑊湯為蓮池法音及而罪即滅鐘聲至而苦遂停豈細事哉失其旨不惟無益而自損之莫之省也楚僧某以瑜伽發足嗣參雪浪諸大講師聽習經論了如來度生之意及歸乃慨其流弊遂本水陸儀文纂集科儀以隨時變分條析理章章不紊使有所禱者各據其情盡其誠而沙門釋子亦得展悲心披誠欵而不失其本此利他之勝益集成公謝世門人某善繼公志欲刊行以廣其傳使為佛事者無紕繆黷神之愆有懇切精誠之旨令世之孝子慈親各盡心以達神明其功德固非淺淺乞豫為序而傳之豫以為凡有益於利生者皆為妙行故告以瑜伽之所自令知吾佛度生之遺意也千佛懺序原夫心佛衆生三無差別故衆生日用現行無明煩惱即諸佛之根本實智所謂諸佛心內衆生時時成道衆生心內諸佛念念證真斯則衆生與佛不隔一毫但以無明深厚不自覺知逐妄迷真起惑造業長淪生死而不能返誠可哀哉我世尊捨自法樂現身三界與民同患而度脫之四十九年所說諸法具有種種無量方便法門皆為衆生出苦之具耳菩薩修行不出自利利他二種行門利他之行至廣而自利之行最捷無非了達自心以為要妙至若了心之行有頓有漸頓則無踰參禪漸則不出止觀即此二行若上根利智業輕惑薄者自可直入中下之士積劫生死業重罪深即有志出苦而為惑業之所障者必積懺悔之功消惡業障方可得入是知懺悔一行最為修行出苦第一法門無論上中下根未有不從此為發軔者也即如華嚴圓頓法門普賢為法界導師而所修十願必首以禮敬諸佛次重懺悔業障楞嚴為顯密圓宗而必先以建立壇場禮十方佛勤求懺悔懺至罪滅慧生諸佛現身感應道交可許入道法華為實相大乘天台釋以百界千如具德圓宗列為止觀而必精嚴懺法以踐真修宗門永明禪師親證法界圓融而時禮法華懺儀終身不懈是知懺悔一門最為末法入道之第一行也嘗聞釋迦本師因聞五十三佛名字發心修行得成佛果展轉開示得三千人一一皆得成無上道所以稱三千諸佛是也其有已成未成而名號具彰藏典愧未盡探其始末因緣近世之禮千佛名者但有佛號而無披露之文梁朝一懺自昔流傳陳情之文雖備而三千佛號未圓嘗謂末法衆生罪深業重如世人犯法投託王家亦可獲免地獄衆生以苦逼一稱佛名得生淨土何況現前禮敬諸佛以同體大悲感應加庇故其出苦之要無越懺悔一門矣吳門某所集千佛懺法祖梁朝之舊章增未列之佛號采教中之成言敘披露之情悃始終條貫如出一轍述而不作無胸臆之論觀其利濟之心良亦勤矣閒有議其非者皆未原述者之心亦未信夫自心者也苟信自心是佛為恆沙業垢之所障蔽則禮恆沙之佛以消之未見其多法本是心則何法而非妙行耶幸無以佛多而生疲厭也三千諸佛皆吾本師開導法味既同而同一禮敬則諸佛法身入我性我性同共如來合如鏡交光互相攝入實借多佛之慈光消我多生之積罪又奚止赫日消霜露哉十日並出大地焚燒三千佛現罪垢頓滅不待求證而必信無疑矣觀者但自求出苦之心真信禮佛滅罪之功大而不必計作者之與否也特序之以為真修者勸楞嚴接光録序如來始從鹿苑終至雙林四十九年所說一代時教無非開示此心之指以衆生惑有厚薄根有利鈍故設三乘之漸次以十善而免三途之苦以明有以諦緣而三界生死之纏以明定以三觀而破定有之執以明中然雖巧設多方必以頓證法界一心為極則故以楞嚴大定為究竟圓滿歸趣此我本師出世一大事因緣始終之化法也是知三觀之設散在五時而教海汪洋末法行人難究其趣若夫廓法界一心攝一代時教揭三觀妙門顯一心之旨無尚此大佛頂首楞嚴一經矣大哉頂法真頓證一心之懸鑑也以十二部經之廣演而收於十軸之文詳十法界之因果而敷陳於六萬餘言之內以無量行海攝歸三觀妙門以曠劫難成之佛而圓滿於首楞嚴一定可謂至簡至要最深最奧之法門也此經自入震旦古今解者不啻數十家雖知見不一而各有所長或尅文言而昧其通途或尚理觀而略其文言要之無非欲明佛意惟佛智海十地望洋況居有漏乎故探教者如飲海魚龍蚊蚋亦各盡己量豈能盡海水耶然一滴已具百川之味矣豫逸老匡山閉關枯坐四一授公以所著楞嚴接光録見示且欲豫一言以辨愧豫老矣目已憒憒智乏藻鑑思不關微安能發其幽奧勉力一閲則見其提掇首尾指點血脉批導文字如遊刃焉以公廓達之才縱橫之筆脫落畦徑似不拘拘矩矱若以楔出楔亦從前所無愚謂有便上智圓機恐淺識者重增翳膜也是在觀者別具超方之眼獨得於文字之外由此悟入實非小緣倘一言有當如食金剛功德又可思議耶重刻六祖壇經序世尊說法四十九年乃云未說一字末後拈花迦葉破顏微笑於是有教外別傳之旨西天四七祖祖相傳是為心印達摩東來直指一心不立文字六傳至曹溪衣鉢乃止以其信心者衆矣六祖得黃梅心印以悟本來無一物遂為的骨子開法於曹溪以無說而說門人吠聲逐塊緝之曰壇經其所指示雖般若一心心外無法則口說者如天鼓音空谷響耳豈實法哉余蒙恩於嶺外幸作六祖奴郎聊為料理廢墜之緒因見經本數刻多有改竄不一蓋以後世聰明君子將謂老盧本賣柴漢目不識丁怪其所說無文彩故妄易之耳嗟乎大音希聲至文無文況闡無言之道假舌相以宣嗚乎夫水流風動皆演圓音又何文之有豫偶得古本乃為勘訂其所記參差者復為整齊分為十品以雅稱經名也刻於山中適大將軍張君樂齊先開府於閒訪豫於山中嘗以此經贈之別十年公歸林下豫過錢塘公一見歡若更生談及此經已重刻行感公力能荷法乃序之以見公為禪將軍其有以發見聞之勇猛於此事者勸刻法寶壇經序東海遺稿或謂吾佛四十九年末後拈花且道未談一字達摩西來直指人心見性成佛不立文字目為單傳此經豈非文字乎然殊不知此事人人本來具足不缺一法不立一法既本具足是則佛未出世塵塵剎剎未嘗不熾然常說祖未西來物物頭頭未嘗不分明直指如是觀之世尊終日直指達摩九年說法又何有教內教外單傳雙傳耶若人頓見自心者則說與不說皆戲論矣此壇經者人人皆知出於曹溪而不知曹溪出於人人自性人人皆知經為文字而不知文字直指自心心外無法法外無心一味平等原無纖毫回避處悲哉人者覿面不知知則諦信不疑本來無事無事則又何計佛祖出世不出世說法不說耶是則此刻刻空中鳥迹耳因明入正理論寐言序原夫一切法界統惟一真了然而無諸相也由迷之而成色心執之而為我法依他妄起種種遍計有無之見橫生圓成之性昧矣故我世尊特說三界惟心萬法惟識以直示之是為宗極大若標月之指耳逮自金輪掩耀玉毫收彩不百年間依然邪見參天性相割據爰有應真大士龍樹陳那諸師蹶起幟立論摧邪顯正其猶建瓴之勢以大破之既而商竭羅主撮略諸論要義提挈綱維名曰因明入正理論核實邪正量定因果三支綺互一性圓成務使離過絶非因是以明正宗之楷式可謂法界之關鑰實相之神符也得之可以闢幽扄佩之可以禦大敵諸法空座非此不足以據之慨夫東西異路南北殊涂且文略義深即匠石斫額嗟乎斯人望洋之歎久矣吾法兄雪浪恩公按轡先登蘊朴愚公從而步武萬歷庚寅秋公挂錫薊門一夕感夢金人名七銀人勝十告以遇田分介身有官而注焉覺即探即金勝二論深窮力究既而果遇界公新解值虞公長孺激發矢心遂倚雙林而搆思斯兩月而述成宛與夢符詔曰寐言蓋識夢也噫徵夫那蘭紀歲睹史質疑由是觀之愚公豈無謂哉余來自海上公脫稿示豫豫雖不敏不能洞見玄微彈花摘實至謂異品無其所立遮實自相相違改品以釋是非番我以明集聚斯皆出過深潛良是寤其幽寐然因正因不待全提緣了思已過半語固有之因修者易草創者難且夫託雞鳴而過關假弄丸而破敵者談何容易觀者若因是以明宗由指而見月直欲睹纖塵而知大地窺一隙以見太虗則於法界之功匪直排布之方也即隱几據梧將仰天而歎豈可以呻吟沈酣者較哉二十五圓通圖序為王憲長弘臺題毗盧遮那以法界為身則根根塵塵皆遍法界於身舉一毛孔遍則毛毛皆遍在境則拈一微塵遍則塵塵皆遍於心則念包十世古今劫念同時則念念皆遍如是則無一法而非圓通又何根塵識界七大之限量可局乎惟此乃普眼大人之境界豈劣解者可能入哉是以楞嚴會上世尊特借二十五大士普為諸人傍通一線大似含元殿裏指長安蓋曲為鈍根拈弄耳雖是門門有路處處皆通正眼看來未免翳目生花居士一齊折合卷舒自在若放行則山河大墜鱗介羽毛同放光明若把住則二十五人不免向弘臺居士手中乞命如是縱饒觀音大士善入圓通不免拖泥帶水也亦一場敗闕仔細簡點將來畢竟有甚氣息明眼人自能看取刻十無盡藏品序毗盧遮那法界為身以華嚴莊嚴而為報境由往昔因中稱法界心而修稱為藏者以此心在衆生名為藏識在佛名如來藏心故在依果名華藏世界蓋藏者含攝有餘之義如王家寶藏無物不有應用無盡是以菩薩修行名無盡藏以即心妙行而為功德法財充滿心量名無盡藏行惟此華嚴所宗法界心體而以妙行為莊嚴圓滿具足故名為佛然所修因行有十住十行十向十地之別此品當十行滿心將趣十向故修此十無盡藏行蘊積一心即回向三處謂衆生菩提及以實際積行以成藏行散而果成故趣佛地住行如積回向如散所謂積而能散由散以成德譬夫聖人損有餘以奉天下盛治之事也故曰有之以為利無之以為用是以吾佛世尊以盡法界之法藏濟稱自性之衆生資以莊嚴唯心之果報觀夫華藏莊嚴之妙事豈向心外求之哉第以衆生狹陋自私不能擴自心之量耳豫掩關靈湖之曇花精舍門人觀衡遠來相訊見豫批閲此品歡喜稽首而讚歎曰大哉妙行普照迷方誠如慧日之朗重昏也請序之刻以別行豫喜作法施願見聞隨喜者即此以見自心無盡之妙行苟信而持之則華藏莊嚴步步可登而佛果菩提念念可證其狹陋自私之習亦將化為無盡功德藏矣詎不成一大事因緣哉重興青原山七祖道場序佛法託之像教禪道寄之祖庭故瞻梵剎而三寶現前指道場而慧燈發𦦨蓋由道假人弘事因理顯是以諸祖法崛之不可泯者若人身之血脉不可一息閒也任道君子可不為之留心哉惟禪宗鼻祖西來直指最上一乘令人當下成佛此道六傳於曹溪而青原南嶽為的骨子兩人執幟大盛於江西湖南其下五燈分焰皆以二老為燧人此道昭昭如中天日月千百年來暗然而愈章者是知茲山為人心世道所關最重豫少年曾禮七祖見其僧非拔俗寺委荒榛惟諸賢祠宇尊祀其中時則慨然歎曰諸天奉佛諸賢事天然各尊其道理或宜然恐神有所未妥也徘徊而去閒嘗與紫柏禪師言謂禪宗寥落必源頭壅塞當同疏導之師大以為然師先候豫於匡山及乙未豫年五十以弘法致譴放於嶺外因得重𤀹曹溪之原以為禪道重興之兆辛苦八年而祖庭始開功雖未圓中興之機已見辛亥秋日安福鄒匡明子尹氏發心重整青原持鄒給諫公書為先談且云子尹為七祖忠臣豫聞之躍然乃先囑其妥神祠為第一義是時因緣未遇遂寢越癸丑遂之南嶽踐金簡曾儀部約公欲振之力未能也丙辰豫弔紫柏有吳越之行至雙徑見禪道大振參究者衆豫歎曰此曹溪一派重衍也丁巳夏歸匡山作休老計見東林蓮社重開石門禪期已結豫大歡喜不三日而給練公書亦至云大修青原冀得一指點蓋子尹夙心述豫之本願其祠已妥而首為檀度願成主佛者則劉晉卿張壽長郭陵舄也豫乃浩然歎曰六祖有言葉落歸根禪道自曹溪一脉始於青原而傳燈諸祖至中峰之後漸微我國初不多見矣豫自𤀹曹溪不數年而此道復振於越之天目雙徑之閒今且引歸匡山石門適青原大興千年之後復見今日豈非應葉落歸根之讖哉惟昔盛時莫盛於西江馬祖今也重振再見於青原是知道運旋轉與造化同流信夫意者將來八十一人同出馬駒之下者是有望於今日斯役也檀度之功任之者衆不俟豫言故特述禪道隆替之由以告諸同志不在莊嚴佛土而在光輝佛燈以助堯天舜日期與斯民共享無為之化也又豈可以尋常建一剎創一宇為佛事者同日而語耶萬歷四十五年仲夏十日續華嶽寺法派序達摩西來單傳直指以心印心妙悟者為的骨兒孫原無名字及六傳曹溪下從南嶽青原道分兩派以各從授受亦不拘拘及五宗各立門庭則稱某宗某宗者但以建立宗旨命知歸趣亦非以假名為道脉也自後禪林日衰師資口耳天下叢林但於開山之祖原系某宗下各尊為鼻祖以五家獨臨濟道遍天下故海內梵剎多推之特世諦流布其來尚矣衡州華藥寺本從臨濟出以重開山僧紹秀為始祖立二十字曰紹宗希普導正克嗣通玄圓明真性海法衍復崇源今已盡矣適豫來寓靈湖且將東遊時寺住持等領大衆焚香禮請立其派豫無復異即以源字為始起續四十字偈曰源自曹溪𤀹燈從南嶽傳廣開清淨理妙悟祖師禪頓了唯心旨歸依實智詮西來微密意福慧永無邊是足以嗣宗風乎特以假名說實相令不昧其本源耳後之子孫其尊奉毋忽南嶽重興天台寺建諸祖影堂序昔天台智者大師誦法華經親見靈山一會儼然未散求證南嶽思大師師曰此法華三昧也於是智者乃著止觀妙門西域梵師曰此與西域首楞嚴經大旨相同大師聞之日夜西望禮拜一十九年願見此經今南嶽天台寺即智者大師拜經處也千有餘年拜臺現存曾儀部金簡欲石刻楞嚴經於臺上以滿智者之望大願未果此天台一段因緣也豫與曾公為法門知己久期終老南嶽癸丑冬月長公扶搖𢹂乃翁書迎豫往湖東豫應命至則見諸祖道影八十八軸乃達觀禪師命丹陽弟子賀知忍資請丁南羽高士名筆也有三堂其二置五臺峨嵋此一專為南嶽者向久藏賀氏庚戌閒曾公遊南海道過曲阿賀君屬其請歸南嶽向以山中無可置之地故存湖東豫於是展禮道容如入諸祖丈室也比即發心願建影堂以奉之乃為募疏太僕蔡公槐亭身為行先願竟未果丙辰東遊吳越隨投老匡山越六年辛卯弟子如繹書來云已復天台欲重興之適曾長公遵先人遺命以祖影送入天台供養及豫前疏併付之豫聞而喜曰此豫末後未了願也嗟乎法緣與時互相為顯晦亦運而已矣惟佛所說萬法統乎一心故有性相二宗本乎一致佛滅未幾而性相角立分河飲水從來舊矣無論西域即此土教由天台說三觀以明一心禪自拈花二十八傳達摩東來為鼻祖五宗列派各立門庭互相詆訾率莫能一今也諸祖道影畢集於斯即楞嚴一經統教禪而會歸一心此二宗之究竟歸趣不期會而自會矣豫居湖東欲奉諸祖而願未滿第著楞嚴通議以發明佛祖向上一路會三觀一心之旨以暢智者未見之懷如繹今得居其地復奉諸祖於其中不但了余未了之緣抑滿智者未盡之心也幸何如哉繹也果能竭力忘身從事於此豫即老矣尚能坐拜石演楞嚴代我廣長舌相使千峰點首萬象低眉虗空結舌異幟盡降智者大師定側耳於常寂光中習氣猛發亦當起舞於蓮花藏海與諸祖一時謦咳彈指也其募疏已有前作故但述道影之因緣併繹興建之始末告諸檀越以為開導前茅也是為序焦山法系序傳燈所載諸祖法系惟以心印相傳原不以假名為實法也嗟乎禪道下衰真源漸昧自達摩西來六傳曹溪一法不立及五宗分派蓋以門庭施設不同而宗旨不異及宋而元燈燈相續至我明國初尚存典型此後宗門法系蔑如也以無明眼宗匠故耳其海內列剎如雲在在僧徒皆曰本出某宗某宗但以字派為嫡而未聞以心印心由此觀法則大可悲矣舉世皆然豈止一方而已耶況佛制四民出家同一釋姓如衆流入海今推原五宗真傳則法眼早入高麗溈仰絶響雲門在宋尚存而曹洞則少林獨擅方今天下僧寺法系多稱臨濟一派盛行至若正枝旁出可莫可考蓋隨人自立譬夫王綱失紀而僭者橫出迷方者衆誰得而正之哉京口焦山某禪人遠來匡山以法系字派為請且云茲山十葊原自始祖覺初祖心禪師本臨濟旁出為賈菩薩者近代兒孫皆迷其源禪人憂之乃考十葊先後之次緝為譜系正名分以垂後裔然雖假名是亦因名立教儻亦賴此以存僧徒上下之分無敢僭越而不至於蔑倫犯義者尤足以保我子孫亦存羊之意尚亦有利哉其先十六傳已盡故為續其三十二字以從俗諦若指此為宗則臨濟自謂正法眼藏早滅却矣鼎湖山詩後序鼎湖山白雲寺其來久矣昔曹溪法道盛時出其門者皆洞明心印人天師表志常禪師乃與青原南嶽諸老同侍巾瓶者二老道化一方常師遂隱此山以終焉梵幢猶存靈骨藏之於此信其為法門巢許也余少能讀書時則知有蒼梧之野鼎湖乘龍之故事將為好事者寓言高舉以為美談及丙申春蒙恩遣雷陽又二年戊戌冠巾說法於五羊之青門戈戟場中時門人寶貴字本淨者充第一座會罷作禮云且將隱於鼎湖余驚喜不已扣其遺迹則云久廢藩伯王公昔為郡端州時命父老重葺今又圮矣余因力贊貴公以居之且囑其死心定志以盡生平若果余當休老焉貴公以余言遂忘形事心以常公為任苦心勞力不堪其憂者又三年庚子余入山禮常公塔乃為貴公作經始計定其規模務在妥神靈以藏修足矣不期年而三寶重成佛像莊嚴煥然光奕余喜而嘉之癸卯秋日之曹溪且訂明年鼎湖結夏之盟甲辰季春出山謁制府即將有雷陽之行以病作不能就道遂維舟江滸且冀避暑山中俟徂秋而往不日乃奉按臺檄不敢少留悵望雲山眉睫閒不能一至豈非緣哉以一至而不可得以此觀夫常住茲山者清涼之福豈啻人天倍萬劫耶余病小可即以登途貴公時時相慰舟中余且愧見笑於山靈而不忍別遂賦詩五章託公以謝且問訊於常公異日者儻天假之緣吾當為公豎窣堵波於荒榛草莽中也徑山志序域內名山大川方輿載籍志之詳矣及佛法入中國則琳宮梵宇皆託迹於名山勝地者在在星羅此蓋道脉潛流殊非探奇仰異者比古稱方志為野史而佛剎之志則僧史也維雙徑乃東南奇勝自國一開山昔稱法崛以其山自崑崙而東走雄峙五嶽而南幹自衡湘迤邐數千里直聳黃山白嶽而蜚涌二目融結茲山以鍾靈秀故佛剎始創唐某年閒而歷宋元我明上下千載其閒相繼雄長法門者八十一人非山川蘊結之厚何能若是之悠久耶國初尚不乏人頃百年來法幢傾圮僧徒寂寥萬歷己丑閒達觀禪師蹶起立宗門赤幟時創刻方冊大藏初議五臺僧徒往請者繭足數千里未幾遷於山之寂照殿宇亦因是重新乃法輪再轉之機也居頃之馮太史復議啓古化城為藏板地當道藩臬諸公深心復達師入滅弟子淡居鎧公克荷其業而達師竟得塔於鵬摶峰下與大慧同條是豈小緣哉然昔之住茲山者雖善舉揚宗乘但引法海之一滴耳今則全攝如來藏海而注於茲為法門之全提則因緣勝前萬萬矣黃貞甫有言蕭何入關子女玉帛秋毫無犯惟收其圖籍卒以王漢今大藏乃法界之圖籍也盡收於此而拓法王之疆土者必大賴於是矣非此山之鍾氣博厚又何能負重法哉於戲因修者易創業者難今中興法門之大業非圖籍班班後世將何考焉是徑山之志不得不作非徒紀勝而已故重緝之以便考覽而特為之序菩提菴妙明堂序余坐菩提菴新搆丈室主人請堂名余題之曰妙明大衆請開示老人意取楞嚴經中性覺妙明本覺明妙二語也以滿慈聞前根身器界一一清淨本然因起疑曰既是清淨本然云何忽生山河大地諸有為法邪將謂清淨界中不容生此諸物也世尊到此實難措口故舉尋常所說性覺妙明本覺明妙二語雙關以詰之然上句不屬迷悟天然妙性本自靈者故云性覺妙明下句乃從迷中不失而修成者故云本覺明妙謂今雖修成而不從外得是各人本有之覺耳以此二語詰之者佛意將借迷悟關頭以開發之滿慈果認本覺明妙一語為得將謂性覺本自靈妙而明不假更明者斯則但有能明之明則無所明之覺耳意在有所明之覺乃恰當耳殊不知才有所明之覺則能所對待無窮妄法從此而生矣以一切衆生生死死生法法皆從清淨界中無故強起一念要明其覺然有明有覺能所宛然故向下發明能所之妄法歷歷分明則深窮法性之源也茲葊名菩提梵語菩提此云覺以人人皆知修成之佛不知本有之佛老人意在真修先要了悟不迷之性故雖修萬行不落常情則是不離當處而頓證菩提是在先悟妙明為初心耳故以名堂五臺山觀來石金蓮社序清凉乃金色界文殊一萬眷屬常住其中即雜花所載東北菩薩住處也自漢開山以來震旦歸依為人閒淨土歲往復者百千萬計至則蹈冰躡雪無厭其勞非真慈攝受何二千年來歲無虗日其山境殊勝名花異草閒錯開敷如七珍布地金蓮茂發妙麗相鮮信非塵寰有也高人勝士栖真養道者遍滿山谷列剎星羅鐘鼓相聞梵音敷奏與松響泉聲廣長舌相晝夜無閒豈非人閒一真淨土乎山中在在叢林向無以社名社自普門棲賢始近有觀來石鏡亭山主結金蓮社蓋由宰官李公所創公諱茂春河南杞縣人初母夢三僧入室因叱之二僧即去惟一不行乃曰吾五臺僧欲結緣耳是夜即生公公生而善啼母時呼曰爾僧性也至七歲猶常啼不樂母每以僧呼之即止公長而問母母言其初夢所以後登癸未進士官至鴈平兵憲因遊樓煩忽自憶往事乃曰遠公生於此而結蓮社於匡山我何忘其故鄉耶遂願結金蓮社於五臺先聞妙峰大師遂往歸依建靜室於靈鷲以寄焉既而欲自為念佛社因五臺僧幻住談臺山勝處言觀來石主人鏡亭有苦行公遂歸心即捐資屬修蓮社效匡山故事修念佛三昧余有雙徑之行鏡公特訊於山中且徵余敘其事余喟然歎曰寥寥宇宙泛泛波流往而不返者衆矣能知歸宿者幾何人哉淨土為苦海之彼岸若夫操舟揚䭵截流而度者上下千餘載幾何人斯遠公創匡山蓮社先後集者約一百二十三人且獨稱十八高賢現生西方遞相接引此自道法東來第一勝事李公興於百世之下抖擻濁惡揭厲樂非具宿世根力現宰官身何以有此余知斯社之興將與一萬眷屬同駕慈航揚䭵安流而徑登彼岸又何以百什計哉是在長年捩柁不惜餘力耳重修湖州天聖寺因緣序雜花說十方佛土如帝網孔挂於虗空成者住者壞者空者俱同一際一切諸佛與諸菩薩海會說法教化衆生種種神通妙用處處同時充滿亦如網珠交光相羅彼彼無雜亦無障礙而一切衆生於一切佛心智光中莊嚴佛土調伏衆生及造十惡五逆三界六道善惡業行而不自知故曰佛境界不可思議衆生心行不可思議今於湖之天聖寺具見之矣甲午歲暮寺僧祖定訪豫京之慈氏樓閣偶談寺之因緣則曰其殿廣博猶如空虗莊嚴密緻斗栱攢簇鱗踏重疊猶如羅網此其作者不可思議一也蓋始創於唐其原先不可考歷宋及元至今幾千年矣而各道之上梁栱之閒絶無纖塵故名之曰無塵殿此不可思議二也其兩楹露柱雕木為龍頭角須眉爪牙飛動宛若生龍左右升降嘗遊戲池中寺僧見而叱之其龍歸殿而左右錯盤又名之曰錯盤龍殿此其不可思議三也其殿壁縱橫二丈有奇向為粉地昔趙孟俯讀書其中而心悅之兩壁畫瀟湘煙雨圖二幅夫人管氏畫竹一幅前此數百年豈無丹青妙筆而必待子昂夫婦點染其中將為今之存亡舉耶此不可思議四也其殿中之佛乃以銅錢纍砌成形此固成者之心不可思議矣明嘉靖閒有人毀其佛者剔筋折骨坼錢網肉劈羅漢燒煮而食之其人竟感以鐵篦搔癢遍身皮肉盡脫見骨且遭刑而死然世人畏神而敬佛雖顛人醉酒尚悚然知歸而若人者乃醢之而甘心焉此又壞者之心不可思議也故其今也悽然草草寥落如空太宰五臺陸公過而慨焉即與郡宰官敬葊許公繼山沈公具區馮公輩發願修復命比丘祖定為倡導建立之初思求所以創業為根據者是夜大風折古桑一株旦而發之根柢得古負重斷披而讀之乃唐中和閒居士吳言捨宅為寺其基廣九十三畝時刺史王公表請額為景清禪院而天聖則宋時重建以年為號者非此莫知其源斯則木石無情乃應緣而成事此情與無情感應道交如水澄月現又大不可思議者矣由是觀之其佛土成住壞空業已不可思議即其人而知施者作者成者住者莊嚴者破壞者善惡心行種種不同今一旦炳然齊顯於諸佛大智光中如鏡現像纖毫不昧因果昭著總之皆不可思議也始也成者之心固不知有壞者之心而昔壞者之心又安知有今日成者之心斯則成者壞之因壞者成之緣若即境觀心正所謂交光相羅如寶珠網淨穢齊現善惡同彰過去未來一際平等耳況佛境如空無所依至若因緣成就如雲起長空又豈可得而思議耶今比丘定者苦心窮慮欲建空中之樓閣嚴象外之法身演無字之真經作難思之佛事譬若晴空望彼纖雲豈不瞪目成勞吾意空花亂起必瀰滿太清滴水為巖必橫流大地是將見妙莊嚴剎建於一毫清淨法身顯於一念必使諸佛讚言奇哉奇哉吾今成佛時普見一切天人修羅宰官長者優婆塞優婆夷四衆人等各各心中成等正覺轉大法輪使一切見者聞者皆發無上菩提之心向之成者住者壞者空者一齊同入蓮花藏海此段廣大功德因緣其實種種不可得而思議也海印沙門聞此因緣歎未曾有欲重宣此義而說偈言諸法空無相畢竟無起滅但以因緣故成壞各不同佛身如虗空智光如滿月其空遍一切月光與空等不擇淨與穢是水皆現影豈待清淨池而後方照矚一切衆生心與佛智無二善惡隨因緣業行固不同一切佛境界生於衆生心譬如空中花依空而出現初成即有壞本自空中生如何今日空不能成勝事天堂及地獄貴賤衆果報苦樂諸受用無不從心造自作自受用莊嚴自法身直從有相中即登常住果善哉諸佛子決定信自心各捨所愛珍莊嚴佛自土世閒皆是苦無常復無我生無一物來死無一文去來去本是空如何苦貪著遇此大因緣而不發勇猛一破慳愛根頓成無上覺凡是有緣人缺文築三潭護生隄引佛說孝名為戒謂孝順父母孝順三寶孝順至道之法孝順一切衆生然則奉佛戒者不能推及衆生自昔隋天台智者大師唐惟宣律師宋永明大師至我明獨雲栖大師而已其放生池除城中上方北園其外則自贖萬工池而弟子居士虞德園同大壑法師𤀹西湖三潭其廣大之心足以度恆沙衆生矣豫至湖心寺知舊有三塔久廢今欲重建與所度之生作光明幢昨偶有聚沙之夢已有成議矣又觀三潭之隄甚單薄不能與所放之生作金湯外護恐春水一漂則已度之生尋復漂流苦海矣斯則不惟虗其前功抑終不能收其後效大可憂也又且聚沙不可以旦夕計正在躊躇偶至長明寺會湯養惺居士乃雲栖之內親也言及無子將求度脫豫歡喜而䇿之曰昔佛無子以視三界衆生如一子至今人人皆稱為慈父居士何不以念子之心念一切衆生則將來慈父之稱充滿十方世界矣為今當念已度之生在三潭者能築保障以防護之使其中衆生如極樂國則彼現前皆稱慈父矣又何俟於將來乎願居士一倡而願為慈父者衆矣是則天宮淨土又何捨目前而別求乎諸有智者一聞萬感不俟言之畢矣老人大有所望焉
