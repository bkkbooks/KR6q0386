body:
  text: 侍者福善日録門人通炯編輯嶺南弟子劉起相重較法語示性淳禪人若論此事如青天白日十字街頭長安路上往往來來誰不覩面相呈何曾瞞昧絲毫又如杲日麗天山河大地草木昆蟲鱗甲羽毛飛潛動植誰不通同受用至若生盲雖從來不見亦未嘗不蒙利益也何獨於汝分上有所缺缺隱昧又勞汝費草鞋錢登山涉水遠遠迢迢尋師覓友偏向深山窮谷中求之而後得耶汝但自己不解向腳跟下一步勦絶命根被他無量劫來種種戲論習氣所弄恰似白日被鬼迷之相兩眼睜睜開口向人胡言亂語竟不知從何處發來亦不知誰之所使終日竟夜淹淹纏纏隨波逐浪波波劫劫更不知所作何事亦不知自己本來是甚麼人及至忽然夢省亦自大生慚愧甚至扼腕頓足切齒椎心恨不能㘞地跳向佛祖頂𩕳上行及乎遇境逢緣眨眼之閒不覺墮入黑山鬼窟去也此乃天下有志學道之人通病豈獨禪人為然然其病根直在不了自心但為習氣所弄耳老人生平有志此一大事恨般若緣淺習氣偏厚又無如古之真正明眼知識罏鞴且自發志出家操方學道以來以至入山冰雪寒巖一至萬死一生之地於中種種伎倆知解向者裏一毫用不著唯獨於冷地納被蒙頭時忽然得父母未生前一點消息便回視昔之種種顛倒皆夢中事耳且復自恨為他業緣牽引墮入種種幻化境界至濵萬死而獲一生所賴凍餓中博得一點孤光處處受用種種逆順境界以此為罏冶鉗錘煅煉習氣粗重緣影塵垢耳即今生死關頭未知何如禪道佛法未必能會至若的信自心不向他求一著以此為消磨歲月之具其他復何容啓齒哉禪人今且行矣即求老人法語一似含元殿裏覓長安若向自己腳根未動步一著解提得起放得下乃至日用見色聞聲未開眼時未入耳時早能耳親眼辨決不向生死窠中習氣隊裏頭出頭沒此所謂不涉途程一步早已超過則佛祖亦無挨身處閻老子豈奈伊何如此方不負雪浪開導之恩亦不負自己百劫千生帶來者一點種子不被三毒習氣熏蒸爛亦不負老人今日向戈戟場中為汝出氣其或未然縱使學得三藏十二部更有何益如昔為人縱能穿衣喫飯更喚作甚麼人即老人今日之語大以木人穿石女戴帽耳古人云初秋行腳汝等諸人只須向萬里無寸草處去且道如何是寸草處參參參示妙湛座主從上古人出家本為生死大事即佛祖出世亦特為開示此事而已非於生死外別有佛法非於佛法外別有生死所謂迷之則生死始悟之則輪回息是知古人參求只在生死路頭討端的求究竟非離此外別於紙墨文字三乘十二教中當作奇特事也所以達磨西來不立文字只在了悟自心以此心為一切聖凡十界依正之根本也全悟此心則為至聖大乘少悟即為二乘不悟即為凡夫若悟而不存證而無得即為超聖凡出生死之向上一路矣近代學人去聖逾遠不見古人真實行履向日用現前境界生死岸頭一一透過即此日用不離一法不住一法處處不輕放過便是真切工夫即此目前一切聲色逆順愛憎境界一一透得過處便是真實悟門即此悟處頭頭法法便是真實佛法非是聽座主撞鐘擊鼓登華座開大口學野干鳴側耳低頭閉目披衣時方為佛法也所以善財童子南歷百城參禮佛剎微塵數諸善知識故得開悟塵塵剎剎諸解脫法門然法門固無論即善知識安得有剎塵之多多耶殊不知剎剎塵塵者乃吾人日用妄想念慮情塵也苟能於日用起心動念處情根固結處愛憎交錯難解處貪瞋癡慢種種習氣難消磨處就於根本痛處劄錐一一勘破一一透過如此便是真實知識當下即登無礙自在大解脫無上法門捨此外更有何知識可參更有甚奇特法門可入耶示靈洲鏡上人余昔遊海門登妙高峯入無際三昧入棱伽室覩東坡老人代張方平手書棱伽經與佛印禪師留作金山常住是時舉身毛孔熙怡悅豫如春生百草不自知其所以然也及後覽教乘印證乃知為習氣橫發於中熏然不自覺耳自爾行腳雲水閒此海濶天空虗明昭曠之境時時如大圓鏡懸於眉睫閒也頃為幻業所弄直走瘴鄉舟行過曹溪口下湞陽峽經小金山而抵羊城未暇登眺戊戌秋日始得覽其勝與鏡心上人過東坡堂讀悟前身詩又爽然自失恍然若覩舊遊是知天地一幻具萬法一幻叢出沒一幻蹟死生一幻場江山一幻境鱗甲羽毛一幻物聖凡一幻衆爾我一幻遇耳上人降心白法日誦金剛經以為定課舊染頓祛心光漸朗蓋肯於刮垢磨光非泛泛波流業海者比也頃持卷索法語為進修之資老人猛思昔遊海門故事今此地見東坡如前身因歎人生生死幻化去來夢事若以法界海慧照之則三際十方當下平等天宮淨土一道齊平心佛衆生了無差別鑊湯罏炭實際清涼草樹庭莎風帆沙鳥煙雲變狀日月升沈舉目對揚無非普現色身三昧也吾學道人所貴金剛正眼爍破無明癡暗煥發本有智慧光明拈向現前日用咳唾掉臂揚眉瞬目之際拈匙舉筯之閒頓顯自性無垢法身是稱為得解脫人即如空生悟般若時涕淚悲泣對佛自謂實無有得名阿羅漢也一切世閒所有諸法豈有過此般若者哉然般若非他即吾人心鏡之光耳永嘉云比來塵鏡未曾磨今日分明方剖析上人號曰鏡心是以心為鏡耶是以鏡照心耶若以心為鏡則老盧道明鏡亦非臺非臺則無鏡可寄若以鏡照心心本無相又何從而照之耶如此非心則非鏡非鏡則非心心鏡兩非名從何立如此則上人名是假名名假則真亦非真是則所讀之般若又豈有文言字句寄於齒頰之端耶上人苟能悟此法門則江光水色鳥語潮音皆演般若實相晨鐘暮鼓送往迎來皆空生晏坐石室見法身時也如此則東坡之所書棱伽佛印之殺青灾木與老人今日荷三生之緣重過此山上人偶拈此卷以請益莫道又是前身夢語也經云一切有為法如夢幻泡影如露亦如電應作如是觀上人苟能不昧本因當習氣橫發試取此卷讀之不覺妄想顛倒情塵自然冰消瓦解矣示歐生伯羽嘗謂一切聖凡靡不皆以志願成就世出世業是知吾人有志於性命者志出生死有志於功名富貴者志入生死也吾師有言廣大智海變而為生死業海寶明妙性昧而為貪瞋癡慢生死之業性由是觀之吾人之性真妄之源既已不二苟知由貪瞋癡而入生死即可用貪瞋癡而出生死矣諺語有之恨小非君子無毒不丈夫余居常每念勾踐因會稽之恥志復吳仇乃臥薪嘗膽二十餘年衣不重綵食不重味竟滅吳以霸吾學道人視歷劫生死幽囚困辱於三界牢獄豈直會稽之恥貪瞋癡慢奪吾妙性之光破我涅槃之宅豈直吳仇吾人怡然如飴而與之嬉戲遊宴於其閒略無慚恥奮恨之心可謂大不知本矣其自視也可稱大丈夫哉伯羽有志於此當為切齒示馮生文孺庚子學道人第一要發決定長遠之志乃至盡此形壽以極三生五生十生百生千生萬生以至劫劫生生直是一定以悟為期若不悟此心決定不休縱然墮落地獄三途或經爐胎馬腹誓願不捨此決定成佛之志亦不以苦故退失今日之信心譬如有人發心有萬里之行決定以所至之處為的從今日出門發足一步直至入彼所至之門親彼所求之人以至升堂入室與之交歡浹洽以極忘形而後已如此方稱有決定志也苟無此判然決定之志只說出門要去回顧目前種種所愛放不下或因循延挨口去心不去或者幸有親朋大力之人促發出門及乎上了路頭悠悠蕩蕩或遇歌管隊裏富貴場中貪戀耳目近玩忘却未出門的念頭邈然不知所向往或中道緣差撞遇惡友惡緣弄得囊空資竭加之疾病纏綿進退回惶生無量苦或身體疲頓久沐風霜不奈勞苦便生退還之念或將近及門遇見一機一境一事之差或訛言誤聽以為實使其將見而不及見其人臨門而不得入其室如此者舉皆枉費辛勤終無實到究竟之地蓋緣初發心時無決定志耳苟如此欲作世閒小小功名事業亦不能成何況無上佛道了死生證菩提乎故曰佛道長遠久受勤苦乃可得成豈可取近效求速就哉雖然如是有決定之志更須要真實之見若知見不真志其所不當志行其所不當行亦更枉用工矣吾人求道既有此志須要的信自心當體是佛本來清淨無物本來光明廣大如此所以日用現前不得受用者只為彼此幻妄四大拘蔽介爾妄想浮心遮障難得透徹過此生死關捩子不啻若干生萬劫之遠也吾人既知此心諦信不疑今日發心定要以悟為期即從今日發心做工夫便是出門第一步今日親承善知識開導便是促發之者至其促發上路途中種種境界種種辛勤種種遲回留連不留連退惰不退惰皆在學人自己腳跟底本分上忖量皆非善知識所可與也馮生文孺有志於此剔起眉毛且看腳跟下最初出門一步示曾生六符壬寅聖人用心如鏡不將不迎來無所粘去無踪跡以其至虗而應萬有也故老子有言不出戶知天下豈妄想思慮機變智巧揣摩所能及哉所謂廓然大公聖人之心也古今智巧機變之士自謂思無不致智不可及故飾智自愚是心光未透本體未明墮於無明妄想網中而將以為智大若持螢火而與赫日爭光也曾生志道當以此自勉示贊侍者侍者真贊寫余小像焚香作禮請說法語老人驀拈拄杖趁之曰爾朝夕執侍尚不自知生尊重想又何以紙墨畫像為師範乎每親聞法教如春風度耳又何以紙上陳言為準則乎爾自發心出家求出離相而不決志修遠離行果真出家實為生死乎爾自心癡迷向外馳求不知頓歇狂心為成佛祕要區區執幻妄為真實迷頭認影了無出期即老人坐向汝胸中爾亦作熱病想耳佛言狂心不歇歇即菩提勝淨明心本非外得果能如此可稱坐參不勞遍禮知識自入無量法門也是則名為隨順覺性又何以包裹老人為爾自思惟二六時中除却穿衣喫飯迎賓待客折旋俯仰咳唾掉臂雜談戲論處如何是自己本來面目者裏參透許汝見老人一莖眉其或未然對面千里示明哲禪人余被放之四年己亥夏講棱伽新疏於五羊之青門旅泊庵禪人不遠數千里參余於瘴鄉余視其謹慤命典齊食且將令知三德而調六和攝一心而修萬行也禪人唯命是聽勤力半載餘矣適飲瘴煙浸染成疾自視四大不支難堪衆務乃乞度嶺北尋樂地以休養辭行老人因而勉之曰爾豈以苦樂為異地死生有彼此哉殊不知四大為假借苦樂為幻場死生為夜旦亦不知心乃衆惡之源身為衆苦之本也原自迷心為識執妄為身顛倒死生出沒苦道曾不知幾千萬劫譬如夢馳險道怖畏張惶求脫而不能欲離而不得憂愁悲楚望救無門疲頓精神暫息無術自謂終墮沈淪爾乃甘心汩沒矣又安知極力而呼猛然勃跳而大覺之則向之悲楚辛酸皆成笑具以今既覺與向之求脫何異天壤哉即爾而觀今之病苦呻吟作去就求脫之想正若夢中事耳不能自呼而覺余為大呼而汝猶不知是薾然長夜終無惺眼之時矣奈何以幻妄而甘苦辛認夢想而為真宅今既遇呼而不覺捨此而誰又呼之耶嗟嗟蒙冥顛倒長夜欲求覩慧日之光如今日之緣者難之難矣爾試思之忽然猛省回頭轉腦生死情關頓然迸裂便是破夢宅出險道之時也示舒中安禪人住山舒中禪人將誅茆南嶽請益山居法要老人因示之曰夫道不在山而居山必先見道見山忘道山即障根見道忘山觸目隨緣無非是道此古德名言永嘉之諦訓也子今志欲居山是見道而後居耶是居之而後見道耶若見道而後居居則有住住則道非真道若欲居山而後見道道本無住住則道不在山也子將以何為道而又何所居也子徒以山為山殊不知日用現前身心境界皆山也教云生老病死四山所逼又云五蘊山又云人我山又云涅槃山然涅槃心也人我境也五蘊身心乃生老病死之窟穴也梵語涅槃此云寂滅幻妄身心境界總屬動亂原其本致則真妄不二動靜皆如但以迷悟之分故有聖凡之別迷之則涅槃而成生死悟之則生死而證涅槃是知五蘊人我之山元是涅槃安宅也斯則一切聖凡出生入死未嘗不居此山而子之寢處長夜於此久矣夫何今欲居之耶若以欣厭取捨為入道之資是猶避溺而投火也故曰我欲逃之逃不得大方之外皆充塞又曰狂心不歇歇即菩提入道之要唯在歇狂心泯見聞絶知解忘能所息是非寂滅此心政不在逃形山谷飽食橫眠恣懶怠長我慢為道妙也梵語頭陀此云抖擻以其能抖擻客塵煩惱耳但淨其心是諸佛道子其勉之示極禪人辛丑佛祖出世但以本法示人元無剩法亦無實法蓋欲令人人自知本有而已即三藏十二部歷代祖師所指無非欲人頓識本有元不令向外馳求以世人不知本分具足將謂別有乃於一切言教中求公案上去參紙墨文字上覓以至種種伎倆思惟計較當作學佛法把作參禪了生死又作種種塵勞事業當作出世功行今日正眼看來都沒交涉何也皆是以思惟妄想造作如夢中事耳以未離心識故古人云損法財滅功德莫不由茲心意識然無量劫來生死根株栽向識情窠窟且又滋之以愛水培之以欲泥熏之以無明之火增長諸苦之芽即有佛法知見皆墮外道戲論但增苦本非出苦之要也末法弟子去聖時遙不蒙明眼真正知識開示往往自恃聰明大生邪慢不但以佛法知見凌人傲物當作超佛越祖之祕且復以世諦文言外道經書惡見議論以口舌辨利馳騁機警當作撥天關的手段將謂閻老子定管束不得亦不復知有世出世閒因果事此蓋由不識自心不知本法於己躬腳跟下一步了不干涉徒恃癡狂增長夢中顛倒耳禪人自出頭來便解恁麼親師擇友恁麼苦行種種因緣而求佛道是知本有而後發心耶是不知本有因發心後由師友指示而求之耶若知有而後發心則不是恁麼行腳若從師友指教而後知則又不必如此依然癡狂外邊走也即今掩關書經的事又作麼生且雜華乃入法界之經也且道以何為法界又作麼生入若能提起生鐵心腸睜開金剛眼睛一腳踢翻生死牢籠如脫鎖獅子自在遊行看他善財初發心時乍見文殊打破此關捩子便解搖搖擺擺南歷一百一十餘城參見剎塵知識然後毗盧老子亦不奈見便得與法界等與虗空等與毗盧等與普賢行願等若使渠最初不遇恁般人說破恁般事將恐至今埋在一微塵中牢牢緊閉猶如大鐵圍山又不止禪人今日之死關也安能一生成辦歷劫因果了却從前冤債哉禪人不信老夫之言試向一毛端頭拈起放下橫來豎去時親切著眼看若果一眼透方信老夫不欺汝亦信毗盧老子不欺汝歷代祖師亦不欺汝即汝自信本心亦不自欺也其或未然試聽末後句看示宗遠禪人住山余竄海外之五年庚子春宗遠紹禪人同慶堂福自南嶽來時悟心融佛嶺乾二子皆在伴老人以食息相與結夏壘壁將半復移居東華解制後各辭去宗遠稽首乞一語為住山法要老人揮汗以示之曰夫入深山住蘭若此從上佛祖第一入道因緣也惟我本師釋迦老子棄捨金輪辭親割愛走入雪山萬丈寒巖埋身千尺以至鵲巢其頂蘆穿其膝猶不知六年凍餓皮骨支持苦空寂寞之狀又何如也一旦覩明星而悟道朗長夜而獨明便見天龍拱衛神鬼欽崇為天人師作世閒眼至今光照四天道流百億聞名者喜見相者歸王臣敬仰有識傾心梵宇琳宮莊嚴殊麗無分遐邇百代如生如此澤流而無窮功垂而不朽者皆從雪山六年凍餓中博來只今後輩兒孫四事受用不盡此乃開天闢地一箇住山樣子也自斯已降法道東垂若遠公之蓮社僧遠之胡牀五祖之破頭老盧之獵隊西江之隱山石霜之枯木凡載傳燈列名僧史者未有一人不向深山窮谷苦空寂寞中出嗚呼世衰道微人心不古凡托跡空門寄形袈裟者靡不假我偷安罔然不知出家竟為何事將謂四事供養應當受用更不思生死大事為出家兒第一要務也古人出家專為生死一著參師訪友發明己事然後向深山窮谷草衣木食支折腳鐺煮脫粟飯盡將從前業識影子掃除蕩淨不留一絲單單的的提持向上一路身如枯木心似寒灰直至大徹而後已如此方稱佛之真子方能報佛深恩禪人今發大勇猛心以住山為志只須放下諸緣心如牆壁單提一念直欲上齊古人必以發明生死大事為期不明不已切不可效時輩作偷安計為養懶資也行矣為我前驅誅茅嶽麓待老人酬償債畢以送餘年也其念之哉示念松通禪人昔中峰禪師居天目久參高峰大事未明乃立懸崖撫孤松七日遂大徹即今崖松獨峙而追跡中峰者幾希通禪人往於松下誅茅結屋居之三年日誦華嚴為業其精苦固有之其期則過中峰遠之遠矣若夫發明箇事則猶未也達觀禪師字之曰念松欲其不忘本耳今禪人遠問余於瘴鄉且別余去將東遊過支提北入五臺尋文殊萬眷屬中得一侶傍金剛窟誦華嚴滿百部以畢餘生臨行乞一語為法要余乃掀髯而笑曰子作此見解是猶涉海而求河浴也以狹陋之習而入廣大法界此其難矣古德云盡大地是一卷經盡大地是沙門一隻眼以如是眼讀如是經盡未來際曾無閒歇又何去來之相彼此之見哉華嚴以平等法界為宗以無障礙為門苟能悟此宗入此門無一物不播遮那之體無一聲不闡圓妙之音無一時不修普賢之行無一人不是剎塵知識是則光網三昧舉目昭然普眼真經隨念具足舉足下步不離寂滅之場居塵出塵頓到般若之岸子將何處覓五臺以何法為大經乎故曰我欲逃之逃不得大方之外皆充塞子如當念了却又何必登山涉水尋伴侶誦文言以了餘生乎若了生本無生則住無所住能悟無住之旨自不作去來動靜生滅之想六祖大師於無所住而生其心一語打落從前百千萬劫顛倒知見子當於此剔起眉毛高著眼看切不得錯落出門一步全身入却荒草也示佛嶺乾首座刺血書華嚴經余昔居東海那羅延窟禪人自五臺來謁及余度嶺之五羊復從匡山來慰余於瘴鄉余乍見如隔世親因觀人閒夢幻如此乃於諸來弟子輩結夏壘壁閒及解制日乾作禮白云某將歸東林尋遠公之芳躅效蓮社之清修且願刺血手書華嚴大經以為莊嚴佛土之淨業願乞一言開示余曰佛子諦聽爾以何為大經以何為淨業爾以書寫紙墨為經乎語言文字為經乎以運動折旋為淨業乎以點畫分布為淨業乎若以書寫紙墨為經則市肆案牘無非大經若以語言文字為經則談呼戲笑世俗文字無非妙理斯則本無缺缺又何庸書若以運動折旋為淨業則日用尋常咳唾掉臂無非觀音入理之圓通若以點畫分布為淨業則迎賓待客舉筯拈匙無非普賢之妙行如是則本自具足又何別求捨此而言法行是猶知二五而不知十也雖然盡十方是常寂光元無明昧極法界是清淨土本沒精粗森羅萬象皆海印之靈文鱗甲羽毛盡法身之真體猿吟鳥噪皆談不二之圓音雨施雲行盡顯神通之妙用如是則無背向無去來無取捨無始終三際為之不遷十世圓成一念此法界無盡藏也爾欲於無盡藏中徒以區區生滅心行指色相莊嚴為法行求淨土之真因者是以牛糞為栴檀魚目為意珠也況一字法門海墨書而不盡爾欲以有限之四大涓滴之身血剎那之光陰而欲寫無盡之真經作難思之佛事是猶點染虗空捫摸電影也爾其參之如其未然試向五老峰頭諦觀山色湖光聽鳥語溪聲與毗盧老子坐普光明殿與十方無盡身雲剎塵海會說法界普照修多羅時有何差別參參示懷愚修禪人學人圖修自吳中一鉢走瘴鄉侍余二載餘余於戈戟場中而作佛事修精持一念作務為衆先晝夜無倦始終如一日余時時冷眼之頗有衲子氣息念末法向袈裟下提持此事者難得其人心甚愛之頃辭余欲參諸方知識臨行乃問四大本空五蘊非有病在甚麼處老人曰病在沒有處因說此偈以助行腳四大本空空是病五蘊非有有成非兩頭坐斷無消息始信家山到處歸示西樵居士吉水人圓覺經云居一切時不起妄念於諸妄心亦不息滅住妄想境不加了知於無了知不辨真實此語古德每每拈示學者多落思惟窠臼獨中峰各注一不字此金剛圈也示陳生資甫吉水人孔子曰知幾其神乎說者謂幾者動之微學者當於未動時著眼方乃得力喜怒哀樂之未發謂之中正好於六祖不思善不思惡如何是上座本來面目同參文者心之章也學者不達心體強以陳言逗湊是可為文乎須向自己胸中流出方始蓋天蓋地孟軻云食色性也此言似千七百則注腳殊非章句家可知古人云工夫在日用處此死句也今日坐在此語窠臼中縱是有志之士亦皆賣弄識神影子非言者之過執言之過耳宗鏡云聲處全聞見外無法此語非透出毗盧頂𩕳上行者定不知話頭落處儒生有志於道者獨向禪中求做工夫却不知念茲在茲便是上乘初地夜氣清明攝心端坐返觀內照寂然不昧處自見本來面目毋自欺也孔子云吾未見好德如好色者也足知天下不欺者鮮矣飄風驟雨颯然而至試觀風從何來雨從何至此觀識得分明萬物在己譬如嘉苗望其秀實賊蟊不除難其成矣不獨世閒叢林學道亦然示離際肇禪人若論此事本無向上向下才涉思惟便成剩法何況以有所得心入離言之實際乎禪人果能決定以生死為大事試將從前厭俗心念乃至出家已來所有一切聞見知識及發參求本分事上日用工夫著衣喫飯折旋俯仰動靜閒忙凡所經歷目前種種境界微細推求畢竟以何為向上事再將推求的心諦實觀察畢竟落在甚麼處凡有落處便成窠臼即是生死窟穴皆妄想邊事非實際也經云縱滅一切見聞覺知內守幽閒猶為法塵分別影事古人目為黑山鬼窟正是參禪大忌諱處何況以生滅心粗浮想像入究竟際遠之遠矣所謂舉心即錯動念即乖若將不舉心不動念當作玄妙又落玄妙窠臼有僧問趙州如何是玄中玄州云汝玄來多少時僧云玄之久矣州云若不是老僧幾乎玄殺你看古人一語如金剛王寶劍斷盡凡聖知見如是觀之此事豈唇吻能道紙墨文字可能形容只在學人日用舉心動念處諦實觀察但有絲毫情見乃至玄妙見解粘滯處便是妄想影子都落生死邊際非離際也離際之際名為實際實際無際無際則不落聖凡邊際聖凡不落生死情亡古人所謂一念不生前後際斷斷則無事矣方名無事道人事既無又向甚麼處求玄求妙所謂但盡凡情別無聖解到此如人飲水冷暖自知大似啞子喫黃柏難以吐露向人禪人但辦一片生鐵心腸如此一直行將去不必將心待悟亦不必計其歲月日時只須將前後無量劫數直下拈在目前任他生死去來起滅即此現前一念決定不為他浮光幻影遷移縱是刀山火聚淨土天宮亦任他頭出頭沒此一念孤光畢竟不被他搖奪如此可稱大力量人方才是真正出家兒不被生死籠不被聖凡埋沒不被三際遷訛如此始得名實相應乃是真實離際也禪人持此語請正諸方明眼知識切不可作禪道佛法會示懷愚修堂主古德云盡十方世界通是衲僧一隻眼虗空萬象鱗介羽毛洪纖巨細通是大毗盧藏一卷經以如是眼讀如是經盡未來際不休不息此普賢大士一毛孔中最微最細少分佛事一毛如此況一一毛孔乎正報毛孔如此況依報世界微塵乎一塵如此況塵塵乎且塵含巨剎況塵塵之剎剎剎之塵乎以此深觀則無邊剎海自他不隔於毫端十世古今始終不離於當念此普賢之真經能見此經則為文殊之智眼即以此眼觀塵中之衆生一一衆生盡說此經使之一一聽者當下了知一切聖凡本來無二無別吾人即具此眼轉此經度此衆生雖云使盡大悲行盡大願經剎塵劫了無疲厭縱然如是亦非衲僧本分事何以故以淨法界中本無動搖去來凡聖諸影像故此殊勝影像尚無況諸妄想知見佛法禪道種種取捨諸顛倒相虗妄影耶是知從上佛祖示人只教歇却狂心不從他覓所謂但自懷中解垢衣何勞向外誇精進又云但盡凡情別無聖解若作聖解即墮羣邪以上神通妙用皆本分事無奇特故即此一味平常何用別求佛法示了際禪人丙午豫中興曹溪重修寶林禪堂以接納四來時量禪人發願行乞以供大衆當結制初禪人拈香請益豫因示之曰諸佛利生妙行原非一種菩薩成佛妙門本非一路昔維摩大士以一鉢飯而為佛事三萬二千有量之衆食其食者皆入律行且道至今鉢盂仍舊香飯如常食之者律行何居持米者神通何在若於此透得正所謂於食等者於法亦等若透不得更須參訪知識決擇疑情直至不疑之地始與本地少分相應其或未然未免隨波逐浪所以僧參趙州乃云學人乍入叢林乞師指示州云喫粥也未僧云喫也州云洗鉢盂去其僧有省禪人若於趙州說處者僧省處會得便與維摩方丈中諸上善人把臂共行去也
