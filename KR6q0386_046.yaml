body:
  text: 侍者福善日録門人通炯編輯嶺南弟子劉起相重較徑山雜言師在徑山與諸弟子接見散口而談日出皆證後利生最親切者不宜散落某生平能領旨不能記誦師言波浪深闊而某又十日後方起此念不復能憶全語始次標目記其大略前話并續別開示者一一綴入為徑山法話以便刻施普及不枉大師唾沫之慈淡居師及大衆同此一心弟子朱鷺記此一大事須平實商量方得受用第一不得好玄妙唇舌波浪謂之弄精魂此事不從參究入者不得力不向教上印證者不得正知見不從境緣上打鍊者亦只是光影門頭事及臨逆順八風境界便被搖奪將去都透不過以宗入以教印以日用境緣為驗但於境上輕脫無滯著心即是用心得力處能以境緣自勘亦不必全靠善知識說話為實法耳咬定話頭不是要明話頭只借話頭發疑斬截妄想其參究須離話頭處參究下得疑方得力古德云離鈎三寸子何不道前人志之矣疑至情識不到語言不通時拶逼極處迸出些子光影謂之電光三昧正好進步不得歡喜若認此為是則得少為足貼體都被者點光覆住不復能出過後發出都被所使矣八識中含藏尚有多生習氣微細種子忽現前用力不得處須借呪力以消之問智識不同處但最初一念現量即是智才轉第二頭便是比量落情想矣又曰黏帶情來底是識不黏帶情來底是智咬住話頭正是把住情識來路不起第二念參悟亦非甚難事三個月一住氣定見下落第一不得先存待悟心才待悟即為等待他悟即此便是攔頭板則工夫再不得入矣又曰者事須是勇猛漢子做利根人多生得夙慧今生遇緣當下便了有不從參入者但要保任去透脫去如六祖便是其人鈍根人如何只要自肯鈍根不巧就從鈍處得力咬定話頭一切時中都用得著便刀山火聚上去也用得著者便是得定力處若有絲毫回避便全身墮落矣參禪人不得坐在潔白地上此是千生萬劫陷坑我欲為衆說破故作擔板歌教眼宗眼原無二眼永明師提宗全托教語印入恐人一向無義路邊錯下腳若不得教眼便落邪見我注金剛法華楞伽楞嚴等經書從情識不到處沒義路邊迸出者拈取却欲以教印宗學者當自得之在東海時一夕坐入身世俱空海印發光河山震動境界得相應慧有頃悟入楞嚴著緊處恍然在目急點燭書之手腕不及停盡五鼓漏而楞嚴懸鏡已竟矣侍者出候見殘燭在案訝之菩薩全以利生為事若不透過世閒種種法則不能投機利生學佛先發大悲心破我執為主舊公案在今時人以妄想量度則針鋒不對矣縱會得說得亦於己分上無力動中會易入靜中入無力從外知見入者無力自性內會入者得力問從緣薦得者如何緣有二見聞緣有退失境界緣無退失虗實不同故衆生欲忍二乘生忍菩薩無生忍佛寂滅忍只一佛知見是正却有菩薩知見二乘知見衆生知見外道知見諸皆淆訛所以世尊種種方便只要了一心入正知見名佛知見了得生滅心寂滅即了得生死如何是向上祇有箇放下祖師語句句活學人當實法則句句死日用工夫只消看破妄念不被他使無別用心處一切空不下時如何只了知是假一切能空一切能輕菩薩住在極樂做甚事我要扯他出來念阿彌陀佛句原同一話頭今人却便會到西方去也一切是幻人人曉得須有主張幻的作用方不為幻轉在海印時偶想六祖夜半人來斫頭公案便欲學其定力每夜開門習觀想假若有人來要借頭便歡喜捨之今夜然明夜亦然久之覺有定見力在忽一夜報盜入豫曰第呼來明燭正坐無怖怯心其人及門乃匍匐不敢入一長大漢也豫呼謂此閒無所有命取庫中二百錢與之若先無主張便惶遽了也住五臺山中喧聲如百萬鏖戰無有一息能安者一日聽泉極衝激處頃之忽然不聞才舉念何故又聞乃向極沸處坐若干日坐久之水聲寂然自此水聲不斷如不聞也此後安住山中不復為喧嚷動矣在東海時值皇太后遣內官齎銀若干至弗敢拒也度不可濫承當念地方饑荒可借以普太后之施內官不可豫告以各縣該地方受施者造一冊還報如之其後兩宮聞而大喜及至被難時竟得此一事力乃知臨財不可苟也在嶺南時人情未熟崖岸在不能使人狎無可親者有小孩兒欲近之輒畏我去一日學獅子調兒法勉自倒身眤狎之與之果蓏日狎一日遂不我畏自此人不我避忌日來親也初參謁某總府持揭庭下移時不命起去心解得應自呼名稟見耶顧不能出諸口如千鈞重無可奈何時奮自稱名某稟見乃得起去明日參謁復然竟一歲不少假借旁謂武人何知破常格待善知識也最後約同謁撫院日總府備一舟裝齊飯果品如賓席邀請過舟作禮揖上坐曰非我不能假借公知公有傲骨聊以相成也歡談促膝以別乃歎宰官中大有深心人在何問武耶讀書不細心體認不得其用豫注老子至天之道其猶張弓乎更數日思其合處不可得乃從他借一弓并弦張而懸之壁閒坐臥視之又二日忽悟張字對弛字說弓弛時弣高而有餘弰下而不足則無用也及張而用之則抑高舉下損弣補弰上下均停可以命中天道全以動為用主施而不主受適合之也重為輕根二句亦稽數年不敢草草解正當南行之日孤坐舟中情景無聊輕重靜躁之解恍然目前始悟太上語旨蓋身試之而後見未可謂紙上陳言無真味也故道德一注歷十三年乃脫稿非草草也豫著經必是凝神入觀體契佛心機倪忽自迸出者方副之紙若涉思議即不中用化生儀軌語曰聖人不出世萬古如長夜故我本師釋迦文佛示現王宮出家雪山六年苦行悟道成佛於鹿苑說法度生當佛未出世時西天外道有九十六種各立門庭皆稱師長及佛成道說法之時諸外道一一歸依出家為佛弟子依教修行證阿羅漢果故今靈山一會一千二百五十餘人皆是外道之儔也當是時也有信佛者則歸依佛法依教奉行其不信者則生驚疑乃至種種魔害毀謗墮惡道者不可勝數是知今之佛法未行之地皆以佛未出世之時智愚賢不肖雖有疑信之不一是皆不知我佛出世之本懷及度生漸次方便之軌則也故今略述化生方便之次第使未聞未信佛法者知我等為僧化生之法門非是一事一行一門而可入也故曰方便有多門歸源性無二要之四十九年皆隨機大小淺深之序所謂教不躐等也幸宜委悉勿謂常談一佛以一大事因緣出現世閒所謂開示衆生佛之知見使其悟入惟此一事更無餘事所云一大事者謂要衆生知生死為一大事也佛知見者乃衆生各各本有之佛性也由迷此佛性而成生死今要出生死苦必以悟佛知見為第一義如此豈非佛為直指人心見性成佛而出世閒是則禪道悟心一路不待達摩西來然佛特為此事而出世也爭奈衆生歷劫以來貪瞋癡愛煩惱惡見迷之已深不堪頓示悟心之大法故將一乘法分別說三以此故有三乘漸次之設所謂小乘中乘大乘也至有不堪小乘之法者則設五戒十善為人天善果且免墮三途地獄餓鬼畜生之苦故曰五戒不持人天路絶今為佛弟子遵奉佛教以度生為事業若不漸次方便誘引入道一旦示之以大法則反使橫生疑謗自取三途之苦是以醍醐為毒藥矣乃不善導之過也故今遵佛所制在家善男子名優婆塞善女人名優婆夷當持五戒以修人天善果在家五戒者一不殺生此戒感將來長壽及如意眷屬和合現在子孫昌盛之報二不偷盜凡不與而取皆名為盜此戒感來世得大富饒衣食豐足所求如意之報三不邪淫非己妻妾妄生淫欲名為邪淫此戒感來世得妻妾貞良父慈子孝眷屬六親和合之報四不妄語凡言不實鬬搆兩家名為妄語此戒感來世智慧過人言語真實聞者皆信依教而行之報五不飲酒酒能昏迷亂性發狂生禍為衆惡之本此戒感未來智慧明達識見超越之報右上五戒乃我佛出世初為世閒在家之人特設此教令人依戒修因則不負此生免墮惡道能感來世不失人身得長壽大富子孫家道豐盛文明特達之報凡今高官尊爵富厚豐盈聰明利達之人皆從修持五戒中來然此五戒即儒門五常不殺仁也不盜義也不邪淫禮也不飲酒智也不妄語信也故佛法有裨王道者以五戒化人則無詞訟省刑罰家治而風淳矣此吾佛最先所設化生之儀也今世俗之人不知佛法全無好善之心而返生謗佛謗法謗僧之見是自甘愚迷自取苦趣耳又有一等之人雖能喫蔬而不知佛法正修行路聽從無為外道邪人不敬佛祖天地不孝父母不燒香禮拜三寶專一味邪行邪說盲盲相引相聚妄談以為傳法全不知有正修行路而返謗佛法僧堅執不化此乃最愚癡人是可憐者即今奉詔旨所當禁者是也唯願當世高明君子辨白邪正是非凡遇此輩即當開示令其捨邪歸正不但護佛法是亦有助於王化也然學邪學正總是一念善心可惜不知是邪而誤墮今若知非又何不捨彼邪徒而為真正善人為聖世之良民乎右上五戒乃佛教修人道之因果又設十善業道為人天之因果所言十善者一身三惡業謂殺盜淫若斷此三惡則名三善道二口四惡業謂妄言綺語兩舌惡口若斷此四名四善道三意三惡業謂貪瞋癡若斷此三名三善道如上十惡乃常人日用而不知者今若能斷此十惡則名十善為生天之因是為純善之人此十善法即儒門正心誠意修身之道也若果能修此則現世為聖為賢則定感來世生在天宮受勝妙樂此萬萬真實之行世人何故愚迷不知而專向邪道為得豈不辜負此心哉如上五戒十善乃吾佛特為世閒在家之人所設之教要人依此修因不失人天之福此金口所宣不妄之談若不遵此修總是邪道非正行也總肯苦心修行都無利益反增苦果是謂以苦捨苦吾佛已深痛之矣今世閒五部六冊之說乃外道邪人妄稱師長偷竊佛祖言句雜集世俗鄙俚之言以惑愚民所謂邪道亂真者即今聖旨所禁皆此輩也在家之人既有好善之心何不歸依三寶而必墮此邪法豈智人哉又觀今世好善男子已能歸依三寶以自恃世智聰明伶利之見便生下劣魔心薄五戒十善而不為以好禪為上乘三業不修乃以祖師現成公案看了幾則記在胸中便逞利口動使機鋒當自己妙悟以此為是全不知非又且誹謗大乘經典為文字不足取又笑真修實行之僧為小乘妄起種種邪見全不信有因果罪福甚至慢佛慢法慢僧殊不知自墮愚迷業障坑中妻子聚首衆苦熱惱交煎且妄指目前是道如此愚癡之人是為大可憐憫者既有一念向上之心何不真真實實做些著落工夫所謂說得十分不若行得一分如此妄談譬如貧人妄稱帝王自取誅戮可不哀哉奉勸世之善士聰明利根有志出生死者當自量根器參禪固是向上一著以此乃佛祖專為上上根人說在諸人試自點檢果是上上根人否果能一一頓悟否果能當下便了百劫生死否如其根非上上即宜量自己力專心修淨土門回向西方願生極樂永捨娑婆之苦此一法門從古修因僧俗依之出生死者不可勝數所謂萬修萬人去最是穩穩當當一毫不錯之大法門也祖師云唯有徑路修行但念阿彌陀佛以此法門全不誤人若能放下身心依此修行所有應行規則略示於後一淨土一門往往士大夫談說專為中下根設殊不知此門三根普攝無機不收最為廣大且又簡而易行即古之祖師悟道之後回心向淨土者不少如永明中峰諸大祖師非一人也但修行念佛有上中下三根不同故淨土九品亦因根有別也然淨土有三種者一常寂光土二實報莊嚴土三方便有餘土此即凡聖同居土且此三土修因不同故所感各別試略言之一常寂光土即圓覺經所云大光明藏此中聖凡平等依正不分唯佛法身湛然常寂乃諸佛所證法身境界此唯從上諸祖一念頓悟法身妙契同體入佛境界者所居此正上上根人之淨土豈可輕視為中下人設也二實報莊嚴土此即二十重華藏世界乃我盧舍那佛曠劫修行感稱法界量無盡莊嚴之妙土即華嚴經所說重重無盡世界莊嚴者此乃報身佛所居單為十地菩薩轉大法輪之淨土即二乘聲聞不見不聞此即法華會上諸授記之人待多劫修因將來所感此中一分之淨土此殊非尋常易易可到也三方便有餘土亦名凡聖同居土此正九品分別乃阿彌陀佛之化土也以華藏世界有二十重從第一重有一佛剎微塵數世界圍繞下小上大如倒浮屠從此以上倍倍加增至第十三重然此娑婆世界乃十三重之中心主剎其極樂土與娑婆正等從中至西花葉邊際故云過十萬億佛土之外與娑婆並列者以十方佛土獨有娑婆為穢惡土石諸山雜穢充滿三途八難衆苦所聚名為堪忍衆生剛強最難調化故我釋迦文佛縱以十善化導人天亦在生死之中未出輪回若參禪悟心又難頓悟故設念佛求生淨土一門名橫超三界以仗阿彌陀佛因中願力云十方世界衆生有能念我名號不生我國者誓不成佛以仗此願力凡念佛者彌陀定來接引生彼淨土故易生耳然此淨土開有九品者若參禪悟心未能忘心境者則生上上品有念佛一心不亂者則生上中品有參禪未悟持名精純萬行莊嚴則生上下品若修萬行持大乘經專持名號志願往生則生中三品有精持五戒十善專心念佛發願回向不論僧俗多生下三品此雖未斷煩惱以但得生彼國見佛聞法居不退地永不落三界生死從此發願再來三界度生則來去自在不被生死苦惱羈留所以永明禪師說但得見彌陀何愁不開悟是也此一法門一生精誠可辦一得生彼頓脫生死永出輪回如此直捷法門又何患而不修且薄之耶然參禪了生死難念佛了生死易只要當人一念真實肯切苦心耳從古生淨土者無量無數皆世人眼見而不信又有何法可信耶今奉勸高明智士當信自心不可謬信邪說也即在法門中有禪淨兼修之士甚多如永明所說念佛參禪參禪念佛所謂有禪有淨土猶如帶角虎現世為人師將來作佛祖此亦最上之行也與夫妄稱悟道墮大妄語者天淵也惟夫一切衆生自迷本有之佛性墮落三界生死輪回六趣苦難之中長劫沈淪不得出離者皆因貪瞋癡愛以資淫殺盜妄諸惡之業捨身受身皆以淫欲而正性命生生世世父母妻子六親眷屬恩愛牽纏三界大火所燒無有一人能免之者故我本師釋迦文佛於常寂光土興起大悲救苦之心捨自性法樂從兜率降皇宮入母胎捨父母妻子割斷世閒深重恩愛頓棄金輪王位走入雪山剃除須髮六年凍餓苦行修持乃至悟道成佛此乃是第一箇為生死出家之樣子也及成佛後又遭魔害受金鎗馬麥之難種種堪忍拌捨身命受盡無量魔怨之難說法四十九年只是一念慈悲為度衆生救令出苦而已惟此一事更無餘事故靈山會上弟子一千二百五十人皆一時英靈豪傑之士學佛所行各各捨離世閒父母妻子恩愛依佛修行了悟恩愛得出生死證阿羅漢果如阿難為佛之弟亦隨出家隨衆受苦此乃吾佛所度弟子出家之榜樣也佛在世時投佛出家之弟子不知修行之法故佛因事設戒令其止惡防非得正熏修故初出家者名為沙彌則設有十戒及至比丘則設有二百五十戒女人出家名比丘尼則設有五百大戒乃至國王大臣宰官居士與在家出家四衆人等進修菩薩大戒則有梵網經說十重四十八輕戒此諸戒律乃吾佛法門之家法也故云若人受佛戒即入諸佛位若為僧不受戒者名為禿賊盜佛袈裟裨販如來非佛弟子此為僧奉法之不易也然佛在世時人壽百歲佛當壽百年以念末法弟子無福止住世八十年留二十年未盡之福與後世兒孫故今之弟子供養四事皆受用吾佛白毫光中一分功德即施主粒米莖菜分毫之施利皆佛所留之福田今入在法門為僧者竟不知佛是何人亦不知己為何事不知為何捨父母棄妻子剃除須髮不在俗家而住寺中亦不知不耕不織衣食從何而來只道是自己有能化得施主供養更不知施主信心膏血難消將來拖犁拽耙銜鐵負鞍酬償之苦此其大家一齊迷悶而不知者若是如此受用有能粗守戒行持經念佛守本分者猶自可也況又全不知僧體不受戒行縱放身心攀緣俗親出入不忌不避譏嫌乃至違法犯禁全不知非者又非一種矣竟不知為何出家為何捨俗為何剃除鬚髮也不但不知修行之事即燒香禮佛敬奉三寶之心絶然忘之混混一生醉生夢死全不知有出家正修行路即有見者返以為非此為最可憐愍者矣佛言三途地獄未是苦向袈裟下失却人身始為苦也總之不知僧為何物耳故四十二章經云佛言汝等比丘每於晨朝當自摩頭若肯自摩頭則返省自己為甚無鬚髮也以不知佛法出家規矩故師不成師而弟子亦不成為弟子上下絶分鳥獸同羣但知衣食為急全不知有生死之事不怕將來有三途之苦世閒以此習俗成風以為常事至有離鄉行腳操方者亦止知有叢林粥飯茫不知有佛法禪道此又大可憐愍者矣嗟乎去聖時遙法門頽斃一至於此不可救也雖然十室之邑必有忠信惟今在在諸山豈無英靈豪傑之士哉每於一方但有一二肯發心興起者自然有轉化之機矣故今惟望住剎有志之士各宜思省回頭當念生死大事痛改前非發起一念向道之心發心之初先要參請善知識秉受沙彌十戒若持十戒無犯則進比丘二百五十戒一一戒條委細檢點乃至進受梵網菩薩大戒以佛設教以戒定慧三學為成佛之本所謂因戒生定因定生慧是為三無漏學其諸戒相具載戒經請自檢閲不必細列既能受戒之後不論獨居隨衆定要半月半月對佛誦念戒品有毀犯者對衆懺悔改過自新則身心清淨業障消除乃為出苦之要也既能持戒為修行之本則當親近佛法縱不能出門他方聽講亦當自己發心專一持誦大乘經典或華嚴法華圓覺楞嚴諸大乘經以種般若因緣或有志專修西方淨土一門則以念佛為正行誦大乘經為助行六時發願回向求出生死苦趣如此方不負出家之莫大因緣亦不虗度此生矣若有上上根人發心脫離俗業操方參請知識志究己躬下生死大事者只須單提一念更不外求此又最上一乘之根器然但發肯心定有發明了悟之時是在各人根器志向何如耳如上所說持戒修行誦經念佛雖不能頓悟自心亦不空過時光亦不負出家之緣耳若夫悠悠縱情至死無成可不大哀也哉空過今生墮落三途則將來又不知何時出頭也如上所說在家出家修行之法雖淺深不同乃我佛出世初二十年所說之法也然佛說法四十九年所說之法有三乘謂小中大初二十年但說有教名為小乘謂有三界生死之苦可出有二乘涅槃可求有善道人天因果有惡業三途之因果一切諸法皆是實有故云四諦之法諦者實也四諦者乃苦集滅道四法也謂實實有苦可受集者貪瞋癡愛煩惱也言此煩惱為諸苦之因能招苦果故謂實實有煩惱之集可斷也滅者出三界外二乘偏空涅槃以出生死證此涅槃樂故謂實實有涅槃可證也道者乃修行之方法乃二乘人所修厭苦斷集慕滅修道謂八背捨五停心觀謂觀身不淨觀受是苦觀心無常觀法無我又有總相念別相念等觀此名小根所修出苦之法也名小乘教又有一等根器少利者名為中乘即廣前四諦說十二因緣之法謂無明緣行行緣識識緣名色名色緣六入六入緣觸觸緣受受緣愛愛緣取取緣有有緣生生緣老死憂悲苦惱是名十二有支此十二支該三世因果謂過去二支因乃無明行現在五支果乃識至受現在三支因謂愛取有未來二支果謂生老死憂悲苦惱緣者引也謂三世輪回因果相緣引而有也以中根人觀此十二因緣有流轉還滅二門謂從無明至老死等為流轉門若無明滅則十二有支齊滅為還滅門逆順觀之則悟無生證辟支佛獨覺之果為中乘之法也此二乘法說二十年以根機鈍劣不堪受大故為權耳從此二十年後機漸通泰方說大乘菩薩所修六度之法所謂布施持戒忍辱精進禪定智慧此六乃大乘菩薩所修名為大乘若修此六度單為下度衆生上求佛果此六度法以般若為主故佛第二時說般若經有二十二年其經最多來此方者有八部般若共六百卷此經純談般若真空智慧破前二乘生死涅槃之有見廣說六度乃至四諦十二因緣等法皆以般若真空為極則淘汰前執有之見即如金剛心經皆般若之宗極也以前二乘所執之空乃偏空所謂斷滅之空今此般若乃實相真空以佛說空假中三觀乃成佛之妙門惟此般若經一部單說一空觀故為入大乘之初門為菩薩修行之妙法梵語般若此云智慧故菩薩利生以智慧為首所謂無慧方便縛有慧方便解然此空觀一門雖載八部般若之中其實捷要只在心經一十四行業已該盡心經一卷又單在照見五蘊皆空一句已盡其義此一句之中若下手做工夫又只在照之一字而已此最簡最要之法門然禪門修行最初用心工夫只一照字即此一字法門在吾佛直待三十年方說以此看來修心之法豈是尋常凡夫易說易行哉此一字法門是謂教菩薩乃大乘之法也惟佛出世本懷直是要令一切衆生成佛更無別事即四十九年所說一代時教今為一大藏經總是學成佛之法門成佛之方便雖有六度萬行種種多門正意只是三觀為成佛之本三觀者乃空假中道三觀也一代教中總只說箇三觀若從前來說到般若方才說了空觀一門以此故知法不易說亦不易入也然般若會上其在會聞法二乘之人皆以般若非己智分全不餐采況親受佛教三十年尚且不信不入如今惡業凡夫口口談空妄說空法無佛無祖無修無證便自稱為上上根人豈非大妄誕人也惟佛已說般若真空觀然後才說假觀此一觀門所說之經乃解深密經所說唯識法門所謂迷如來藏名阿賴耶識依此賴耶具有三分變起根身器界一切山河大地衆生世界之假法乃唯識所變之影如鏡中像如水中月有而不實故名為假問曰然佛因何而說假觀耶答曰由前二乘之人執涅槃以為實有是墮偏空故佛說般若真空以破執有之見故令觀般若實相真空又有一類樂空增勝菩薩執但空而不能涉有不肯度生故佛說一切衆生身心世界皆唯識變現全是假法以此唯識法門和會空有要顯即空之有即有之空直觀唯識以證真如此乃教前菩薩出空入假度生之法門也故此一觀門在經有深密密嚴等經當說此經時在菩薩大根已能信受其小根二乘畢竟不敢入俗利生故佛說維摩一經以淨名居士示現處俗有妻子眷屬假託問疾因緣與文殊對談不二法門以呵斥二乘激發入俗度生之心其教名為彈偏斥小歎大圓為小不思議法門以祛二乘狹劣之見此乃吾佛深慈大悲為小根人種種方便權巧引入大乘之意也是知菩薩涉俗利生之事誠非小根劣檞之所能堪已經四十餘年教化之功尚費如此方便神力如今現在五濁煩惱生死苦海之人口口談空談禪說道動以向上一著為己任蔑視正法不懼因果不知揣己妄自狂誕之如此耶以觀吾佛利生之方便權巧費了多少苦心不敢輕易說教人成佛一字今人動說超佛越祖非妄而何可不懼哉唯吾佛出世說法四十九年所集諸經有一大藏始終只說了八箇字所謂三界唯心萬法唯識從初至此已經四十年才說破萬法唯識一句之義然猶未敢顯示唯心之旨以唯心乃萬法之極則也從上以來諸大弟子已聞唯識法門故此以後乃說楞伽經顯示三界唯心法門直欲令人悟此一心以為極則若攝前二空假泯絶二諦總歸一心然後圓滿一心融歸中道為理究竟故楞伽經云寂滅者名為一心一心者名如來藏謂識藏即如來藏非空非有直指一心離名絶相泯絶聖凡不屬修證階差頓觀藏性名為自覺聖智境界直離一切攀緣妄心但了妄想無性即悟無生是為頓教法門達摩祖師傳二祖可大師以此經為心印故此經獨被上上根人其二乘絶分祖師門下故初學參禪要離心意識參離妄想境界求出凡聖路學是乃純以此經為宗極也此教乃說一心之極則已經四十餘年多方開示歷過多少法門今方說此經小根尚爾絶分而今之僧俗教眼未明修行無路盲然無知自己心中妄想攀緣全然不知起滅頭數日夜未嘗一念清涼即以向上離心意識一著以為己任話頭亦未夢見便開大口說禪其自欺之心何如哉可謂大無慚愧人也可不懼哉且今不但俗人無知妄談即吾法門後學僧徒全未聞佛教修心法門全不知用心工夫但只妄想幾時全無正見便稱悟道自以為足此又誰之欺誰之誤耶戒之戒之慎之慎之在佛過此四十年後方示一心法門足見法不易說不易修不易悟也唯吾佛世尊特為一大事因緣故出現世閒一大事者所謂衆生佛之知見也以衆生本具佛之知見今迷之而為妄想生死之知見歷劫以來迷而不知譬如窮子持珠作丐枉受辛勤故佛興同體大悲特特出世而為開示衆生本有佛之知見使其悟入猶如指示窮子衣裏之珠令其自知得受用耳然佛知見者即是楞伽所說一心名自覺聖智是也一向不敢頓說以觀衆生根鈍不堪受此法故久默斯要不務速說直至四十年後多方淘汰根機已熟且化緣將畢故說楞伽經示一心法門以為顯理究竟此後即說法華經示諸法實相以顯事究竟此佛說法之次第也以理事究竟方盡一心之極則故諸二乘人到此始信佛心決定不疑亦悟各各自己本有佛性一向不失譬如窮子久逃他國今始歸來見父亦信父家業原是己有心相體信堪紹家業故長者委付嘗謂此法華一經如長者委付家業之囑書乃佛利生究竟之本懷故佛謂諸弟子一一授記將來必定成佛且云凡有聞法者無一不成佛此一大事因緣已畢故為終教過此不久即入涅槃然在法華一時已盡吾佛出世利生之本懷至於涅槃一經顯佛性義以收法華未盡之機以破前來弟子未盡之疑以佛說凡有聞法者無一不成佛此恐弟子前聞闡提無信之人不許成佛於此生疑故此經說闡提亦有佛性故假廣額屠兒放下屠刀便作佛事此則的信凡有知者畢竟成佛決定無疑如此方盡如來出世一番化利衆生之能事至此已畢故此即入涅槃也如上所說乃吾佛出世一代始終化生之儀軌漸次修因之法門雖觀衆生本有佛性各各具足無不願成佛者但以煩惱障厚罪業根深不堪頓示大法故將一乘法分別說三此乃一乘三乘之所由設也故楞伽以前乃三乘之權教楞伽法華乃一乘之實教故天台判為開權顯實之教是知四十年前所說皆為權設故為根機不等故也此上所說頓漸不一通為教義然楞伽頓示一心為如來清淨禪而教豈非禪宗也至若世尊自云我四十九年未說一字末後拈花示衆人天百萬罔然不知獨迦葉一人破顏微笑世尊乃云吾有正法眼藏涅槃妙心用付於汝是為教外別傳之旨從此二傳阿難以至西天四七東土二三達摩西來目為禪宗不立文字直指人心見性成佛謂之單傳法門故自曹溪以下二派五宗傳燈所載千七百人皆悟心大士凡有言句稱為公案以禪本離言但留此一言半句為心印之證據如世公庭之案牘非是要人以此為實法口耳流布以當自己之玄妙知見也然吾佛業已說了一大藏教至若一心法門何所不具而必以拈花為心要者以一心之旨離言說相離名字相離心緣相以從前聞者雖悟本心然有未能離相故假末後拈花為遣執言說之習氣乃治執名言之病以此為金篦耳今人不知教禪一心之旨乃吾佛化度衆生之方便各人妄執一端以為必當故執教者非禪執禪者非教然執教非禪者固已自誤而執禪非教者又誤之更甚也以執禪者執愚自是妄認己見以為自誤非毀大乘了義為文字以致究竟無成更可憐者觀今末法之世講席已微無大師匠故伶俐少年無多聞慧至有志向上參禪又無決定久遠之志以無明眼知識但只循情欺狂以致誤墮者多此可大為流涕者也且又有僧徒妄自以為悟道者誑惑世俗愚夫貪求供養有歸依者即開示參禪為向上一著有信之者話頭未熟妄想縱橫熱沸便以印正以為有悟八處以致誤墮邪見如此為害更甚此尤不可不知懼而自省也愚見不是不要參禪但說參之不真又無久遠決定之志妄自為悟誤人甚多愚意假若看教不能參禪與參禪之無決定者總不若專心淨業且不空過一生也智者自能鑒之請各自思幸無自欺自誤為望竊觀宰官士大夫參禪了悟者從古不少歷歷傳燈所載非一人也今世宰官中有志外護法門多以參禪為向上者此不比尋常一概固自有說蓋昔有法門參禪之士未大悟徹即發願護持佛法者亦有諸祖有大願力度生及菩薩示現救世者亦有昔在僧中參究未透而以習業牽引故今出世者雖在俗諦塵勞之中而宿習一念般若種子光明透露不能自掩故發為文章功名事業以為外護法門者種種方便作用不同其行門亦非一種有專向上者有專功行者有建立三寶證願護法者有單為自己生死者有發而為忠孝者種種所行皆菩薩道不可以僧中行門一概視之然在僧中不知禪教二宗亦有苦行頭陀者亦有專修淨業者亦有真實行門者亦有隨緣佛事助揚法門者亦有持誦書寫經典為求行門者此皆在佛白毫光中種種因緣而求佛道者亦不可以一概而取故宰官中凡有護法深心者但取僧中一行為得亦不必定要箇箇參禪方為正行耳然參禪雖妙其實非小根所能然在佛世人天百萬獨迦葉一人達摩西來只得二祖黃梅七百餘人唯六祖一人印心豈細事哉若在僧中但有一行可以為法門正事可以教化衆生即是菩薩故曰種種所行皆菩薩道苟一事可取則已超乘粥飯常流空過時光者萬萬矣所謂短中取長則無棄人長中取短則無全人自古世出世閒全人之難得也如上葛藤乃至佛化生儀軌之次第在佛豈不要人頓悟自心當下成佛但衆生根鈍不得不施權接引耳古人云僧徒不能了悟自心且於教法留心時光亦不空過豫則謂今之僧徒縱不能參禪看教有能持戒誦經作福護法者亦說勝尋常魔種萬萬矣在居士中但能持齊念佛助揚三寶者皆真實行也是在諸佛之所望也顧諸方高明達士當自信之慎無以愚言為妄也化儀之餘示宜華衆道人老人於癸丑冬日自東杖䇿來南嶽道經宜章善男子鄺紹楨等二十餘輩迎老人於經堂殷勤頂禮而作供養求請開示略說法要一宿而行既而老人隱寓靈湖蘭若建諷誦華嚴道場乙卯夏六月紹楨等遠來瞻禮正值老人為衆講說金剛般若隨喜聽聞大生歡喜拈香請示在家修行捷要老人因示之曰宜章當深山僻地無善知識經過在家善信雖多未聞正法今衆等各宜精持五戒以為正行此五戒者乃吾佛專為在家善男子說此五戒即儒家五常仁義禮智信也故曰五戒不持人天路絶是故在家善士應當奉持既持五戒不可聽信邪師邪教妄說法空撥無因果斷滅佛種造地獄業只當專依佛教修西方淨土法門一味以念佛為正行然淨土一門接引衆生利益最廣古今念佛得往生者甚多但以專精為主不是一月一兩會念佛幾千聲如此便作正行也第一要發心深厭娑婆是苦志求捨離存想西方淨土蓮花化生念念定要往生彼國親見彌陀以為本願每日早晚要刻定功課或持金剛經或持彌陀經或持往生呪定要念佛回向西方發願往生以此為定規二六時中無論閒忙動靜將一聲阿彌陀佛持在心中念念不忘心心不斷乃至睡夢之中亦不忘失如此打成一片無有閒斷名為一行三昧此念純熟一切境緣不被打斷開眼合眼一聲阿彌陀佛明明現前將一切世閒父母妻子種種恩愛妄想業念都被一聲佛號消磨清淨如此即得自心清淨經云心淨則佛土淨如此念佛如此用心念到臨命終時單單只有一聲阿彌陀佛現在目前一心不亂自然得見阿彌陀佛親來接引一念之頃即得往生淨土從此即得永脫生死之苦高登極樂蓮華化生便是一生念佛之效驗也如此精專若不往生則諸佛墮妄語矣若是悠悠歲月口說念佛心無實行是為自瞞自欺豈有效驗之時耶善男子等既發信心當行實行萬勿自欺涌泉寺湖心寺十二時念佛規制佛說衆生生死長時以積日夜以至劫數輪轉不休不息由念念妄想攀緣曾無一念之暫已者以妄想不斷故生死無窮長劫迅輪無暫停寢職此之由也佛說種種制心之法皆止輪之墊耳法門雖多以衆生垢重識昏難以攝入故唯念佛一門最為捷要所謂憶佛念佛現前當來必定見佛以衆生一切妄見皆屬生死獨許見佛之見為出生死法然見佛必從憶念而至妄念日夜無閒斷時特以念佛斷之此遠公之匡山蓮社六時刻漏所由作也是時社中百二十人稱高賢十八而已斯則真實念佛者又不多得今之視念佛為末品豈真知也哉近代唯牛山以念佛為行且以煉魔為名則苦於鉗錘太緊雖日夜不斷歲止三冬而人非一律亦難於長久頃雲棲力主念佛雖日以四時然於夜有睡眠又費呼喚警醒法缺微密今法師佛石玄津各發心以十二時為請此法固綿密而動靜飲食似難歸一若調理有度設法得宜此又古今之良規也請益老人因為創立規制庶事不繁而人心一致此乃微密妙行也乃為之制條牒如左凡念佛會建立隨人隨願廣狹不一若力大則堂多力微則堂一人亦如之但人不論多少均派六班晝夜班各二時照香輪流出班禮誦行道懺悔而餘皆靜坐隨聞默念或習觀門願者隨之此則靜多動少不繁不亂而佛聲不斷則妄想不生如相呼相喚不昏不散入則動靜一如自他不二寤寐恆常此則不起於座頓見彌陀是為第一如意妙行至若飲食亦宜如法調之務使內外一如則人我兩忘是非俱泯而道場之安恬寂漠亦無如此之妙者老人深思此法愧腳跟未措尚未遂心故特示之代為前驅他日觀聽者衆必處處建立而淨土將遍震旦矣是有望焉宗鏡堂結修證道場約語佛說一大藏教備列衆行總歸修證以為究竟所謂依一心以建立萬行以萬行還證一心故云無不從此法界流無不還歸此法界原夫法界不屬迷悟聖凡良由無明不覺迷此一心從迷積迷造種種業自取輪回生死之苦所言修證者但以淨除自心之三障復還自心之本體故名為證非離修外別有證也是以佛祖教人修行之訣必先了悟一心淨除三障以心難悟故設觀以通之障難除故設懺以淨之即華嚴法界圓宗尊普賢為毗盧長子而十種願王以懺悔業障為前列也是以從昔以來若天台親悟法華三昧猶尊懺法為妙行設有儀軌即永明大師乃淨土中人尚謹遵而力行之況其他乎嗟哉末法去聖逾遠衆生垢重積迷逾深既無了悟參究之功又乏懺摩悔罪之行將何法可望出生死乎唯永明大師鎔一大藏歸唯心之旨著書百卷名曰宗鏡至今堂存淨慈其書廣明一心如揭日月於中天朗萬法之幽邃學者苟能親習則徹見自心不俟更悟證入之要無出此矣大師生平自行日課誦念法華經一萬部秉天台法華懺儀依法修持率以為常故現住世時則冥府帝君圖其像以瞻禮之以其行超生死實證唯心者乃其人也今也其書現行堂具存孰能過而問焉者乎茲玄津壑法師乃其的嗣自幼出家於其寺剃髮之日即問大師之名何如人遂發心願禮其塔是豈往曾親近為侍者乎大師塔已湮堂已圮公能力起而復之大師之眉光復放於山川草木之閒者非無因也今諸緣小集公願暢明宗鏡之旨精懺悔修證之業將結真實法侶一十二人效圓覺之軌則誓為長期歲分四時每時撥二十一日為懺法遵法華懺儀餘則日披宗鏡録了悟唯心疑則為衆發明的旨不假枝葉但取直捷為本參冀其實證其以入期之衆為表率將引本山弟子為禪雛調其羽翼雙舉飛騰法性空遠登覺天而朗慧日在斯舉矣其結制規約因事施設務簡而易行真而無僞以踐實地然四事所需力不自持以安居不能效如來逐日行乞之軌又不敢覬天人送供之儀而核名取實發心供給則有望於發心之檀越今有居士談孟恂力任先登則一切有緣靡不歡呼響應矣以諸法從緣生佛種從緣起是則今日之緣雖近而成佛之遠蹈實借此為最初之方便也諸人聞而歡喜遂破其端則究竟之果是在諸同緣同行同事同心一發勇猛之力耳若以世閒生死之心而易出世之心以滋罪之財而養定慧之命諸有智者何慮而不為耶苟生一念疑心則當面錯過百千萬劫矣
