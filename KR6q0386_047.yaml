body:
  text: 侍者福善日録門人通炯編輯嶺南弟子劉起相重較夢遊詩集自序集稱夢遊何取哉曰三界夢宅浮生如夢逆順苦樂榮枯得失乃夢中事時其言也乃紀夢中遊歷之境而詩又境之親切者總之皆夢語也或曰佛戒綺語若文言已甚況詩又綺語之尤者且詩本乎情禪乃出情之法也若然者豈不墮於情想耶豫曰不然佛說生死涅槃猶如昨夢故佛祖亦夢中人一大藏經千七百則無非䆿語何獨於是僧之為詩者始於晉之支遠至唐則有釋子三十餘人我明國初有楚石見心季潭一初諸大老後則無聞焉嘉隆之際豫為童子時知有錢塘玉芝一人而詩無傳江南則豫與雪浪創起雪浪刻意酷嗜遍歷三吳諸名家切磋討論無停故聲動一時豫以耽枯禪蚤謝筆硯一鉢雲遊及守寂空山盡唾舊習胸中不留一字自五臺之東海二十年中時或習氣猛發而稿亦隨棄年五十矣偶因弘法罹難詔下獄濵九死既而蒙恩放嶺海豫以是為夢墮險道也故其說始存因見古詩之佳者多出於征戍羈旅以其情真而境實也且僧之從戍者古今不多見在唐末則谷泉而宋則大慧覺範二人在明則唯豫一人而已谷泉卒於軍中所傳者唯臨終一偈曰今朝六月六谷泉受罪足不是上天堂便是入地獄言訖而化大慧徙梅陽則發於禪語有宗門武庫覺範貶珠崖則有楞嚴頂論其詩集載亦不多顧豫道愧先德所遭過之而時且久所遇亦非昔比也丙申春二月初至戍所癘飢三年白骨蔽野豫即如坐尸陀林中懼其死而無聞也遂成楞伽筆記執戟大將軍轅門居壘壁間思效大慧冠巾說法搆丈室於穹廬時與諸來弟子作夢幻佛事乃以金鼓為鐘磬以旗幟為幡幢以刁斗為鉢盂以長戈為錫杖以三軍為法侶以行伍為清規以納喊為潮音以參謁為禮誦以諸魔為眷屬居然一大道場也故其所說若法語偈讚多出世法而詩則專為隨俗說也雖未升法堂踞華座拈槌竪拂而處塵勞混俗諦頓入不二法門固不減毗耶特少一散花天耳其說不純以對機不一乃應病之藥固無當於佛祖向上關其實為上下千載法門一段奇特夢幻因緣及蒙賜還初服之南嶽匡廬又若夢遊天姥也二十餘年侍者福善日積月纍門人通炯從居五乳編次成帙向有求者未敢拈出恐點清淨界中新安仰山門人海印請先以詩次第梓之豫知醒眼觀之如寒空鳥跡秋水魚蹤若以文字語言求之則翳目空華終不免為夢中說夢也天啓元年歲在辛酉春王正月上元日匡山逸叟憨山老人釋德清書於枯木菴中征途述懷十章章四句矯矯冥鴻載飛且鳴哀哀求侶悲此遠征一火雲若流白日如矢遐征不歸誰其念只二濯泉洗耳采薇充飢我豈無心彼何人斯三紫芝英英白石燦燦邈矣懷人夜以達旦四誰云滴水可以穿石孰云忘憂我心如織五曰亦可冷風亦可繫憂從中來不知所自六亭亭長松猿鶴依只悠悠白雲我心逝矣七載飢載渴易餐易飲嗟彼醉夫難以獨醒八有酒有旨實為友朋惟玄惟漠尊罍久空九嗟彼行人往來相顧扣其所以莫知其故十感時詩十五章章四句有序頃聞四方連年水旱加以蝗災民生惶惶朝不待夕有司請告皇慈愍之內外公府齊發金穀出賑百僚仰德各捐俸一年以助昔所未有感之以詩上天好生胡為其愆斯民逑安曷為不然一滔滔洪水禹則治之淫雨橫流孰能禦之二甘露瀼瀼時雨如漿片雲不興我民惶惶三雨澤愆期民之瘁矣矧此旱魃為祟甚矣四蝗飛蔽天胡為而然唼膏食脂使民睊睊五民之所親食逾父母易子而食斯言良苦六維皇之天斯民是愛斯民之命皇天是賴七皇仁浩浩施金與穀誰能噀水使天雨粟八以敬其天雨暘時若以哀其民所施逾博九報功之資上天所司匪曰同胞孰能𢌿之十邈矣上古嘉禾自生哀哉末運播植不登十一蠢蠢之生豫實同之皇皇上天豫共戴之十二安得地肥不勞民力安在軒皇任其食息十三康衢之民無時不有陶唐之化孰云匪久十四時之往矣不可挽也民生苦矣不可緩也十五咏懷園中作大塊總微塵滄溟一滴水茫茫宇宙間代謝無停止達人縱大觀上下千萬紀歷覽在目前賢愚可屈指美惡不足稱是非安可擬仲尼重知命老聃貴忘己惟我大雄尊超然出生死世界等浮漚身心類塵滓幻化祇如斯榮辱何憂喜顛倒任空華吾視此而已廬陵淨土菴受王性海諸居士齊因懷汪使君廬陵一粒米價重過須彌須彌尚可碎此粒無壞時化為香積飯轉作淨土資拈來信口餐一飽忘百飢如食金剛屑終竟透出皮此土多蓮華衆妙香芬披一人坐一華左右相追隨光明映日月彈指超僧祇華中少一人悠悠勞我思廬陵喜再逢王塘南翁有引余二十五歲曾遊青原晤翁時年五十今復晤之又過半矣宛然在昔以翁精心白業色若嬰兒感故念今喜而賦贈人生一百歲四分二十五初逢半之半再會十之五君已過三分宛然似初覩面如嬰兒色骨似金剛股心想入蓮華音聲出天鼓端坐七寶臺經行衆香樹不離五蘊身便是清淨土打破頻伽瓶即見華中主與君雖別離恰是相逢處六詠詩心金翅鳥命終骨肉盡消散唯有心不化圓明光燦爛龍王取為珠照破諸黑暗轉輪得如意能救一切難如何在人中日用而不見無常法性本無常亦不墮諸數譬彼空中雲當體即常住聖凡皆過客去來無二路是生不是生非新亦非故智眼明見人此外何所慕苦夢入大火聚怕怖多慞惶正當苦惱時滴水便清涼水盡火復然念慕何慨慷及至醒眼觀向者誰悲傷空須彌橫太虗大地浮香海六塵蔽性天四大遍法界劫火洞然時此箇壞不壞何必待燒盡然後無障礙無我一水作衆味酸醎苦辣具以本淡然故而能成衆事若實不隨者安肯隨他去唯有不隨者誰能識此趣生死生死不流轉流轉非生死若實不流轉生死無窮已諦觀流轉性流轉當下止不見流轉心是真出生死苦熱行人世苦炎熱余心何清涼直以無可觸故能安如常譬若火浣布得之愈增光視彼區區者錯然誰敢當月夜過三峽扁舟載明月隨流競奔頺帆影似轉變月光無去來心境本寂滅死生安在哉所寓即常樂此外俱塵埃懷淨土詩四首嗟哉堪忍土多慮而為人憂來百念結綢繆役其形衆苦集微軀臭腐搏青蠅憒憒不自知營營竟朝昏明潔日以虧汩沒疲精神安能滌情垢一旦返而真長揖大火宅從此謝囂塵逍遙清淨土其樂方無垠我聞至西極有國名極樂妙嚴飭宮殿寶網珠絲絡天人普集會光明相映奪園林敷雜華空中散天樂蓮開八德池香浮七寶閣微風吹簷端雲間響金鐸衆鳥相和鳴法音恣宣說凡情一經耳衆若當下脫極樂本非遙駕言十萬億但能一念淨觸目現前是蓮華生欲泥清涼發焰熾瓦礫等瓊瑤寶林出荊刺念結阻山河想銷破幽滯險道登坦途情根證初地誰知微密中淨穢苦樂具試觀空中華起滅了無際苦因憎愛生樂從清淨得譬若夢中人貴賤匪外覓情想本無端苦樂非預設瞻彼晴空雲倏忽多變滅愚者執為真逐境勞欣戚達人貴朗照了罔淨陳習一悟永不迷靈淵常湛寂願乘白毫光端居極樂國采珠行灼灼明月珠産向深淵底從空撈摝之魚龍盡驚起鮫人相抱泣灑淚忽成雨腥風撲遠岸鯨波奔萬里密網垂天雲輕帆展鵬翼一擘川后愁再擊海若徙盡剖蚌蛤腹不補蒼赤髓安得如意珠持歸報天子神光發中夜龍顏大欣喜七寶隨所求四時盡豐美展轉濟孤貧利樂無窮已用賞戰勝功傳為灌頂祉罷此批鱗役聊以釋附髀滄海不揚波溝瀆清塵滓願祝吾皇壽量同東海水咏龍變化無端倪噓吸作雲雨膏澤潤蒼生滂沱霑下土倏忽遍九垓頃刻被寰宇豈若沙中蟲與物同臭腐咏虎長嘯發山空悲風振林木颯颯秋雨寒凄凄夜鬼哭腥膻徒自矜皮毛甘可服何如偃鼠安飲河期滿腹贈曹溪行腳僧有引南韶觀察祝公下車之初痛念祖庭荒廢極意整頓且自號為曹溪行腳僧感而賦贈曹溪行腳來元自曹溪去久假而不歸忽憶曹溪路即墮宰官身依然無所住任運大化中褦襶安能韄猶記別時言菩提本無樹以是不迷人觸目多感悟隨緣到故鄉萬山滿烟霧未入曹溪門此心已如故況見昔時人凄然瀝情素提起屈眴衣宛若初分付椎碎墜腰石打開寶藏庫掇出如意珠獨誇長者富三車隨所施諸子忽驚怖一喝泣鬼神片言逐狐兔魍魎頓潛蹤龍蛇喜交錯經行寂滅場往來憑杖屨穿破澗底雲踏乾草頭露瓦礫盡生輝靈源永不涸誰知先後身主賓自相顧願執漚和鞭長驅白牛步酬董國博崇相過訪曹溪君向曹溪來直入曹溪路溪上忽逢君乍見已如故一笑心眼開主賓忘禮數促膝坐更深歷歷披情素高懷皎氷雪清言振金玉俯視六合空長軀千里步歲暮事遠遊理冥無去住把手送君行溪橋獨延伫緑槐社諸子過訊豫時掩關未面而去示之以此炎炎火宅中一片清涼地雖從長者施實係君王賜法侶喜相過高懷發幽祕洞見未語心直達無生意何必問毗耶此中真不二董太史玄宰寫山圖贈豫之雷陽賦答五臺三伏天江南臘月樹孤蹤空裏雲餘生草頭露寒熱本無端南北任去住隨地足清涼此中何所慕癸卯初度自五羊之曹溪舟中作今朝五十八明日五十九未來不可思過去何所有世相空裏花毀譽鏡中醜不推羊鹿車喜隨牛馬走自愧膝穿蘆却怪肘生柳髮散少冠束面厚多塵垢戰退生死軍打碎無明臼使盡老婆心笑破虗空口兩岸既不容中流非所守來往任風波去住絶偕耦天際望長安寒空一回首回首問時人誰是儂家友遊方廣寺朝披南嶽雲暮宿方廣寺岧嶤一徑深千峰鎖幽祕儼坐青蓮華頓入清涼地流泉和松聲如對談不二但絶世間心莫問西來意安能結枝棲以滿居山志休息芭蕉身涕唾空華事從此謝塵氛永絶生人纍遊南嶽登祝融峰我懷南嶽山夢想四十年天際七十峰居常在目前自愧無羽翰況為形纏牽頃踐故人約始得恣遊盤攝衣登祝融一望空楚天湘流引匹練星斗如腰纏去天不盈尺恍惚隨飛仙睥睨萬象小世界如彈丸身已入空虗足底浮雲烟若御泠風去從此超塵寰回首思古人三生竟何緣曹溪一滴水化為霖雨霑焦枯發靈芽法鼓醒瞑顛如何獅子窟今令狐兔潛梵宇空寥寥慧燈昏不然誰秉照天燭一破長夜眠徘徊轉悽惻飲泣如流泉安得巨神通彈指變大千頓成七寶土遍地敷金蓮一覩空中雲普集諸聖賢別南嶽山人鄺慕一我從曹溪來擬向山中老山靈不我欺滿目雲霞好歷覽古道場金沙墮叢篠懶殘煨芋處幽蹤莫可考遙想磨磚師成佛苦不早獅子窟中王誰能犯牙爪法雨久不潤靈苗竟枯槁嗟我來何遲臨風增懊惱幸遇餐霞人相期出世表欲與坐深巖玄言窮要眇愛此高尚心真能謝紛擾蓮華社未開又取東歸道良以天屬情日久縈懷抱今暫辭雲山此心終未了我登江上舟君隱山中豹因思李鄴侯君閒恐不保但留窗前雲待我歸來掃從南嶽東遊江上留別方覺之與子江上逢擬結山中好相期臥白雲可共終休老山靈不我留拽杖辭窈眇子亦倦遊人志在烟霞表潛神衆妙門久欲辭紛擾衷情繫所天未即恣懷抱今我駕慈航揚帆涉浩渺與子雖別離因緣猶未了假我未窮年重拈一莖草遲爾婚嫁畢歸來時尚早別衡山解嘲空林臥不堅復理東歸櫂縹眇辭雲山繾綣縈懷抱衡嶽七十峰久欲恣幽討適來即便去返遺山靈誚歸來既已遲言別亦何早我本山中人丘壑宿已飽杖屨烟霞生坐臥麋鹿繞眼耳不容塵心光離昏曉四大如空谷六根絶紛擾到處即深山何必戀枯槁試問山中人靜縛何時了打破琉璃瓶始識隨緣好武昌逢石浪岷嶽二禪人還蜀省親因示我本行腳僧忽逢行腳客借問行腳事相視無言說匡廬一片雲峨嵋千尺雪箇是行腳心去來水中月因思母子情念念不相隔今歸承歡顏恰似未曾別奉旨不奉甘問冷不問熱劈破娘生面乃見不生滅方是行腳人到家之時節示聞子與病中病從有我生我因煩惱集煩惱癡愛滋生死輪不息情根如機梭妄想相交織織成幻妄身衆苦皆叢積求出苦方便慧劍急揮斥斬斷妄想絲根境當下寂一念了無生四大各歸一求我不可得病從何處覓歸匡山有引余少志遠遊三十住山倏二十年忽被業風吹入幻海二十餘年而此一念未離寒巖冰雪中也頃幸晚歸匡山以遂投老蓋年七十二矣嗟嗟浮世人生幾何視此餘生如西山落日浮光瞬息乃為詩以紀之浮世無百年夢遊七十餘幻海渺洪波彼岸無方隅一葦隨天風飄飄任所如歷覽周八荒險阻非一途神疲力已倦削跡為遠圖烟霞結夢想巖穴心久辜垂老方遂志拂袖歸匡廬一超濁世緣衆念悉已枯千峰抱幽壑邈與人世殊七賢列雲中五老頻招呼眉目時相對嘯傲多歡娛明月有時來一鏡懸空虗清光入蓬蓽照我顏色舒白髮對青山形影如冰壺頽然踞石牀日夜雙跏趺返觀未生前本來一物無了知幻化緣胡為有生拘從此脫紛糾高登常樂都寄錢太史受之匡廬列雲霄江湖邈天際地湧青蓮華枝葉相鮮麗眷彼華中人超然隔塵世夢想五十年良緣圖未遂偶乘空中雲隨風至吳會東南美山水醒藉多佳士一見素心人精神恍如醉未語肝膽傾清言入微細相對形骸忘了然脫拘忌精白出世心太虗信可誓苦海方洪波願言駕津濟把別向河梁遂我歸山志長揖返匡廬藏蹤杳深邃五老與七賢日夜常瞻對誅茅臥空山烟霞為衣被視此芭蕉身一擲如棄涕緬想未歸人馳情勞夢寐安得駕長虹凌風倏然至暫謝塵世緣入我真三昧歸宗登金輪峰禮舍利塔我登金輪峰一覽乾坤窄衆山如蟻奔彭湖小如楪萬壑吼長風吹落天邊月夜靜俯下方燈火自明滅身一入空虗諸想頓消歇遙念救世尊法身遍一切舍利自西來至人布三業峰頭立浮屠莊嚴以金鐵爰感大丈夫建剎捨居宅遂為光明幢法緣從此結上下千餘年清涼解炎熱嗟彼衆生界四相轉成劫禪宮委荊榛金碧成瓦礫叢林遭斧斤孤松獨挺特根株半剝斷枝柯將夭折何期至人來呪願施膏澤以此卜重興法雷震前哲皮骨日夜長密茂返生色果滿金剛心荒蕪從此闢法藏自天來龍光照巖穴梵宇如雲興四衆增歡悅始知淨穢土轉變隨心別東林懷古少耽遠遊志夙慕東林師青山開白社高賢畢在斯惜刻蓮漏清修禮六時淨念絶塵想極樂為歸期高風振千載翹首結遐思光容如在眼夢寐相追隨垂老始攀陟撫景增餘悲荒林翳頺垣草莾重紛披徘徊三笑處莓苔露華滋影堂列羣彥倣佛見芳規古砌鎖寒烟白蓮開污池香谷發清響地籟天風吹邱陵有遷變至道無改移師有未了願重來亦何遲開林儻如初高蹤尚可追山靈久呵護神運常在茲我已畢命待濁世從此辭感遇詩奉酬南康袁使君有引九漈袁使君治郡南康匡南湖山盡歸化育不唯斯民戴德即巖穴之士儼若端居白毫相中也棲賢古剎久墮荒榛一旦舉而新之又架籋雲橋以濟險道此名山不朽勝事法雲開創實感護法精心承惠寺記一言足垂千載勒石告成俚言致謝匡廬高入雲乾坤鍾秀氣千峰列重霄青蓮擁天際往多餐霞人藏形養幽祕一自遠公來開林結真契高賢集如雲清修期出世山色映湖光人境兩相媚憶昔龍象儔法幢列如市眷彼棲賢老舌根如鼎沸拈槌竪拂間直指西來意誰知千載下造化潛更替寶階墮荒榛諸天委荊刺長者一莖草雖拈未見諦況復野干鳴難同獅子戲鐘磬寂無聲山空神鬼泣天假至人來靈山親授記示現宰官身隨緣作佛事法雨潤焦枯甘霖澤羣卉一片金剛心廣布如大地斯民若嬰兒慈母相盼睇吐哺不啜甘調劑剔所忌凡在指顧間鮮不為生計千里坐春風荒村無犬吠頓置含齒氓儼在葛天氏政暇多幽況尋山探靈異覩此祇陀林慨發重興志一舉運斤手丹榱若雲翼不日梵宮成恍忽如天至神力尚有餘莊嚴若未備絶壑架飛梁長虹帶蒼翠玉淵臥虬龍形影如顧視五老與七賢鬚眉雲中墜慈航設險道往來無困躦緬懷利濟恩豈特居方內每接咳唾餘玉屑灑肝肺琬𤥎勒佳章片石鍾鼎寄功德載名山匡君應列祀樵歌接梵音誦祝千萬空谷積雲霞盡為供奉器感此希世緣短吟寫胸臆願言保遐齡永錫天人類有所思與君一別數千里思君不斷如流水流水東馳去不還我心如環之無端舉首望長空長空杳無涯揮手邀明月明月有來時光影縱相顧可望不可攀安得君容如滿月使我一見開心顏觀侯生畫山水歌侯生貧壓夷門客執轡何人過其宅獨有丹青思入神風流足可稱癡絶一室懸罄冰雪清烟雲時向毛孔生空中麋鹿時時走暗裏山靈夜夜驚晝長閉戶門却掃梁肉不足烟霞飽含濡墨汁當醍醐時人却怪形容好頻年甲子六六支居間一半常苦飢尺布斗粟博美酒清泉白石令人𠷣有時獨向街頭立見人未語先羞澀都言窮骨軟如泥誰信剛腸徑似鐵三江五湖波浩蕩千巖萬壑爭奇狀閒披絹素淡揮毫一齊撮在眉尖上入山尋討橛木株松下一見歡相呼喫茶只恨千鍾少問法從來半字無老失肚大舌頭長吞吐萬里明月光星辰散落無收拾君堪與我為奚囊留君且向山中臥白雲片片青天幕渴飲清流嚼紫芝海枯石爛從他那曇花精舍歌贍祇園逸史杜將軍韜英我昔遨遊妙嚴國眼見曇花白似雪花下林林大士身容儀光照黃金色此花不是等閒開千年一度方苞胎至人將現花先發獨為因緣大事來大事因緣非一類千百億身皆度世三乘八部應念周十方法界隨心至或現天大將軍身威風八面如天神萬里橫行略無敵欃槍盡掃清烟塵變化無端甚希有亦似曇花開笑口月下吹笙鳳鳥來馬上揮戈獅子吼一開便作人間瑞人與花神兩無二人效祇陀布地心花作園林功德事將軍用武不離禪精舍小築祗園邊對花心入無生國閉戶身居極樂天殺機盡是降魔智色香妙露西來意見色聞香法界空當場戰入三摩地氤氳造化花中主文彩縱橫邁今古陽春號令發雷霆風雲變態驅龍虎園林廣大花無恙精舍剛剛方一丈古今天地芥裏空世界山河鏡中像曇花入鏡倍精神將軍亦是鏡中人萬里懸空如對面眼聽何如耳見真我亦祇園花下史時時灌溉禪那水五蘊蔓草久芟除四大幻身沒依止拋向炎荒如露布鑊湯爐炭無回互忽見花間舊主人寄聲莫忘來時路木菴歌有引淨泰禪人更字木菴南皋居士有贈因戲書之枯木菴枯木菴象嶺巖前獅子龕拳枝奇曲無可攀霜葉雲披何藍毿望之若杌不足取就之枯槁如真參雪老堂中如著此文殊前後何三三我已老朽識海乾與爾同坐枯木菴烏夜啼寒林積雪白日西慈烏啞啞枝上啼鴟梟在巢未敢棲飢不得食情慘悽虞人網羅亦何密飢烏之肉不足食何事綢繆日夜求返哺不遂情何極母子分飛兩不全況復母死歸黃泉啼聲不絶如杜䳌令子抱恨遺終天啼烏啼烏真可憐虞人忽死鴟梟殲明明天道何昭然遊浮山歌空中一島攢青霞宛如香海浮蓮花巖龕石寶簇花蕊又如帝網珠交加我來遙登華藏界一開雙眼無遮礙周圍行樹影重重分明炳若瓶中芥橫空殿閣雲中影法身不動青山穩飛來花氣暗香浮習習侵人重衲冷拽杖撥開巖中霧怪石崢嶸若棋布指點還如數列星一噴青天灑飛唾石門磴道一線通側身半壁足不容猿行鳥度亦不易如何使我筋力窮攀蘿直上妙高頂眼底湖光霞布錦足未離地身含空回看一似冰壺影小轉還過會聖巖巖廊石室何奇哉遠祖因棋善說法黑白未兆令人猜度溪西上蓮華石朵朵金蓮從地出徘徊不見華中人但聽松風廣長舌回禮金谷丈六身虗明無地容纖塵劫火洞然此不壞始信蒼巖是本真我欲誅茅依石室餘生借此藏蹤跡儻得安眠白日高身心世界都拋擲如何捨此從他去一葉浮空都是寄不若快便早歸來休教猿鶴常相憶華藏從來是故宅行盡十方出不得潛身頓入一微塵何人於此知消息擔板漢歌有引徑山法窟自大慧中與臨濟之道相續慧命代不乏人近來禪門寥落絶響久矣頃一時參究之士坐滿山中至有一念瞥地當體現前得大自在者惜乎坐在潔白地上不肯放捨以為奇特不知返成法礙也教中名為所知障所以古云直饒做到如寒潭皎月靜夜鐘聲隨叩擊以無虧觸波瀾而不散猶是生死岸頭事所謂荊棘林中下腳易夜明簾外轉身難名抱守竿頭靜沉死水尚不許坐住況有未到瞥地偶得電光三昧便以為得弄識神影子者乎此參禪得少為足古今之通病也恐落世諦流布疑誤多人因有請益者乃笑為擔板漢歌以示之歌曰擔板漢擔板漢如何被他苦相賺只圖肩頭輕不顧腳跟絆縱饒擔到未生前早已被他遮一半者片板項上枷渾身骨肉都屬他若不快便早拋却百千萬劫真冤家行也纍坐也纍明明障礙何不會只為當初錯認真清門淨戶生妖魅開眼見閉眼見白日太虗生閃電乾闥婆城影現空癡兒認作天宮殿要得輕須放下臭死蝦蟇爭甚價烏豆將來換眼睛魚目應須辨真假有條路最好行坦坦蕩蕩如天平但不留連傍花柳管取他年入帝京捨身命如大地牛馬駝驢不須避果能一擲過須彌劍樹刀山如兒戲若愛他被他害纍贅多因費管帶一朝打破琉璃瓶大地山河都粉碎我勸君不要擔髑髏有汁當下乾分身散影百千億從今不入死生關聞沈朗臞掩關姑蘇城中歌以寄之火宅炎炎夢未醒塵中一片清涼境但見燎空烈焰高道人一念如冰井市聲喧闐奔萬馬日夜不休何為者耳根寂滅心不生看來盡是空中假妻子對面如化人返觀亦似鏡中身終朝相見不相識兩眼何處容纖塵有時神遊華藏界揮毫一灑胸中塊朗善丹青水光山色影重重交羅攝入無障礙有時坐入蓮華土地平如掌金沙布八德池中菡萏開香風一觸心開悟方丈一室無壁落量含法界同寥廓十方海會入其中坐參更不勞行腳匡廬萬丈懸太虗與君恰似同室居不出不入不來往問君此際心何如從軍詩有引余以弘法罹難蒙恩發遣雷陽丙申春二月入五羊三月十日抵戍所時值其地饑且癘已三歲矣經年不雨道殣相望乓戈滿眼疫氣橫發死傷蔽野悲慘之狀甚不可言余經行途中觸目興懷偶成五言律詩若干首久耽枯寂不親筆硯其辭鄙俚殊不成章而情境逼真諒非綺語聊紀一時之事云楚澤非炎徼行吟愧獨醒瘴烟千嶂黑宿草四時青颶觸秋濤怒人靳厲鬼靈從來皆浪跡今日更飄萍火宅誰堪避清涼自可求天低偏近日樹老不知秋海月心何寂空雲思欲浮却憐無住客今復寄炎洲舊說雷陽道今過電白西萬山嵐氣合一錫瘴烟迷末路隨蓬纍殘生信馬蹄那堪深樹裏處處鷓鴣啼遠道經行地孤雲獨可憑有家俱是客無纍即為僧毒霧熏心醉炎風透骨蒸翻思舊遊處儼若履層冰行腳原吾事擔簦固所能心懸萬里月肩荷一枝藤吃食愁蠻語安禪喜俗僧降魔空說劍今日始先登出世還行役誰悲道路難長戈聊當錫短髮不勝冠沆瀣餘三島炎蒸厲百蠻天南回首處落日是長安皇天無不覆豈獨外遐荒曲折吾生短驅馳世路長但知心似雪忽覺𩯭如霜隨地堪埋骨君恩詎可忘昔住清涼界今登熱惱天燠寒風氣別南北地形偏萬里同明月千山隔暝烟塞鴻書縱寄不過雁峰前髫年從白業垂老脫緇衣豈是君恩薄多應世道違烟霞行李少冰雪眼中稀莫問前途事家山到處歸曉起占天候星河曙色分潮吞丹鳳日山吐毒龍雲飄泊還鷗侶棲遲憶鹿羣誰知逃世客臨老學從軍此日天涯道艱虞祇自憐海風腥釀雨山氣毒含烟畏路從人後衝泥向馬前始知行役苦多在戍兒邊旅宿悲寒食兵戈老歲年身經九死後心是未生前北伐思山甫南征憶馬淵梅花何處笛聽徹不成眠竄逐辭金地窮荒到海涯雲容飛赤鳥星尾曳丹蛇棄杖林成久揮戈日未斜天南并塞北是處有胡笳一鉢從師旅孤征任轉蓬形骸乘野馬心事托冥鴻雲出蒼梧白霞蒸海日紅吾生久已棄不待此時空浮世甘為客勞生恨此身舌存終是苦道在豈稱貧渴鹿爭趨𦦨飢烏習近人滄桑雖未變何地不飛塵一息餘生贅千山去路長問途逢牧馬挾䇿耦亡羊衷熱三秋日心寒六月霜所經如蹈鑊安敢任踈狂幻跡元無住逢山即當歸因看前路窄轉見此生微時抱桑間餓常懷漂母飢所欣無臘月不望寄寒衣獨坐浮世吾身外勞生逆旅中誰能一隻眼豁盡十方空碧海飛涼月青林散曉風胡牀箕踞坐瀟灑意無窮晚歸營門混俗希忘象臨戎想牧羝前驅芟忍草左袒拗伽黎落日江容醉歸雲樹色迷行藏同倦鳥漸漸向人低庚子歲即事四首豹虎中原遍星軺日夜馳詔無哀痛字人有向隅悲遠探驪龍窟深批弱木枝乾坤聊俯仰愁絶一雙眉清海初收捷珠崖始罷征劍門飛赤羽閣道走羌兵帝聽懷柔遠王師耻戰爭蠻夷應繫長不見請長纓滿目黃塵暗披肩短髮垂江湖歸路杳鷗鷺傍人疑康濟思今日安危望此時從來貂珥重寧不愧恩私生事人甘拙干戈鼎沸騰金珠欣積纍菅草畏追徵國是誰堪定天心未可憑南熏何日奏一為洗炎蒸過三峽萬壑奔流下千山紫翠連帆飛三峽雨人入九秋天客路浮雲外歸心落日前吾生猶未已江漢是餘年宿清溪驛夢得草蟲鳴斷岸沙鳥宿寒汀之句因續成詩遡流遵遠渚旅洎傍孤亭月隱山容淡魚潛水氣腥草蟲鳴斷岸沙鳥宿寒汀最惜飄零者浮生夢未醒酬朱叔祥惠斑竹禪几半榻供禪寂支頤臥白雲虗心偏愛我高節獨憐君細拭含湘淚精裁泣楚文最宜調病骨從此絶塵氛林參軍從余入山戎馬身經老風烟𩯭已班骨疲仇鐵甲心冷愛青山木札禪離味茶香事儘閒白雲欣共住肯放出松關重修曹溪採木入山一水縈紆入羣峰夾岸回人疑秦代住僧似竺乾來竹樹連雲長田疇逐地開誰知五嶺曲亦自有天台伐木百尺由萌蘖孤根出草萊歷窮烟瘴苦聽盡鶴聲哀用大應非折裁成豈是災祇憐今夜月空自照莓苔小金山坐月藏海浮香剎華幢湧梵宮青螺呈寶髻滿月現慈容世界平如掌江流淨似空應憐驅逐者俱墮法身中腰沽道中荒途無遠近曲折似兼程地逐河流轉人依鳥道行雲間孤鶩沒木末片帆輕回首長安路難聞塞雁聲太平驛䇿馬望郵亭長途舊所經終朝嵐氣白十月燒痕青面熱檳榔醉神昏海霧腥孤城笳鼓動悲壯不堪聽曉行殘月掛城頭征笳慘客愁北風吹短𩯭凉露溼重裘野燒連營壘邊烽暗戍樓孤雲聊淡伫瀟灑竟如浮化州道中岡巒盤廣漠曲折不知層夾路疑函谷居人似武陵林深藏虎豹天遠擊鸇鷹何事風塵道驅馳一老僧化州孤征過萬里道遠慨逾深山色蚺蛇氣人言鴂舌音蘧廬今日事冰雪一生心縱有參天木難同祇樹林石城行穿窮谷口樹杪見天涯野曠留殘照城荒帶落霞飢驅忘力倦欲速較途賒薄暮投山館安眠似到家橫山堡羣山低赴壑一水到回村平野開炎徼邊陲列戍屯民生空歲月時序失寒溫莫謂天涯遠扶桑近日暾至鮫宮修途煩足力廣衍入平川地勢南溟盡珠光北斗連遠山低並樹大海立齊天望若垂雲翼帆開摝寶船癸卯春日大廉即事炎方風物異歲事總難期臘盡蟲無蟄春來鳥不知豆花開舊莢榕葉落新枝因憶燕山雪陽和似有私春日偶成瓊海積春陰炎蒸宿霧深賽蘭香作瘴勒竹苦成林莫問勞生計單看近死心自嫌鬚髮纍日日愛抽簪放船秋水芙蓉滿扁舟一葉輕安流猶故宅飄泊是歸程踈雨炎蒸退清風縠浪生往來隨所適不信鷓鴣鳴中流望飛來寺兩岸山垂影千峰倒入空雲間飛鷲嶺水底現龍宮細落天花雨長鳴地籟風急流將繫舫小可不相容
