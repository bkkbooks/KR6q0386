body:
  text: 侍者福善日録門人通炯編輯嶺南弟子劉起相重較法語示歸宗堅音慈長老行乞莊嚴佛土匡山金輪峰頂有釋迦如來舍利乃法身常住之地從昔諸祖建大法幢先後三十七人其閒發明心地超脫生死不知其幾是知茲山之靈誠震旦之祇桓西江之鷲嶺也法運遷訛與時升降以致琳宮梵宇委墮荒蓁往紫柏大師遊履其地志興復之精誠冥感枯樹回榮兆亦奇矣於是有弟子法湛果公志存紹述誓圖鼎新堅強不拔之願如康會之求舍利於建初也未幾果感今上賜御藏以鎮山門時則舍利出現大放光明山川震吼草樹呈祥誠末法希有勝事老人於丙辰秋自南嶽來禮如來舍利瞻依奇絶俯仰興懷但見殿閣莊嚴大有未備若中道而餒無異昔在荒蓁也豈龍神呵護之意乎以本發心檀越邢來慈者願大而力弱是在吾徒沙門釋子之責故勸堅音慈公發廣大心作難遭想當布五體捨四大以作莊嚴況有十方昔在靈山受囑之宰官居士願王在何不普請羣集以成就勝事庶不負慈父之以家業託也慈公聞說大生勇猛乞老人一語以為前茅老人笑曰無庸此也法界海會蓮華藏中無邊佛剎微妙莊嚴盡在大心菩薩一念中現圓滿具足無缺無餘全在一念感發之力正如彌勒樓中含攝無量佛剎所以善財至前而不見者要假大士彈指之力耳是則老人之言如向閣前一輕彈指其莊嚴佛土但肯開門一時頓現又何假余力哉公往矣幸無怠示王自安居士捨子出家新都王自安居士有子應辰幼業儒一日思生死事大發心出家遂自剪髮走匡廬禮雲中敬堂和尚丙辰夏豫自南嶽來茲山居士訪子至以天屬至情有難割愛者豫因而示之曰舉世父母所望於子者欲其榮名顯親也故以三牲五鼎之養為盡孝殊不知養愈厚苦益深是纍其親非真孝也故吾佛世尊薄金輪而不為捨父母棄王宮苦行於雪山六年成道為三界尊人天之所宗仰苟不捨至貴割大愛何以博長劫不朽之業乎故稱之曰大孝釋迦尊纍劫報親恩此非以了悟無生普度衆生為報地乎佛說大戒首曰孝名為戒謂孝順父母孝順師僧三寶孝順至道孝順一切衆生故真學佛行者將視一切衆生為己多生父母豈一生之親而不報乎第恐出家不知其本也今若子以志悟無生為根地若果決其志不唯報有餘即養亦有餘也世之所謂孝者將以功名博牲鼎養以娛親也功名見制於造物牲鼎有待於所遇無論得之而資苦且舉世求之而未必盡得得之而未必能享抑有功名而不祿者亦有父母不能待者亦有待之而不樂者以其聽命而不由己也今有志於大道者求之在我享之亦在我操必得之䇿懷至樂之養此難與世俗比也居士能捨其子聽其志自今已往若子既潛形於山谷居士亦謝塵緣從子於山中既能割愛又能超塵有所樂地即草衣木食而錦繡甘旨不易也其父子日夜惟道是念朝參暮叩即斑衣戲彩無加也水流風動經聲佛號非繁絃急管可厭也明燈清香昏曉不斷非腥羶臭穢可比也千丈寒巖三閒芽屋視高堂廣廈卑卑也父子相度共成無上之道享不世之榮名此必得之事也其視一官之封一言之褒而不能必者又如雲泥天壤矣居士所捨者小而所博者大若子所逆者薄而所順者厚矣豈不為世之大孝乎居士欣然奉教請銘名願執為弟子老人命之曰福至言其福自今而至也字曰大來謂所捨者小所來者大矣故書此以為若子法門券示靈源覺禪人禪人住廬山歸宗有年謂自知根器下劣不能一超直入但發願願此生盡命誦妙法蓮華經萬部請乞證盟未審此行與參究工夫同異何如願聞示誨老人因示之曰諸佛說法譬如食蜜中邊皆甜本無取捨差別但由學人欣厭不同故有異耳所以吾佛出世特為開示衆生一大事因緣祖師西來直指單傳亦祇令人了悟此一大事因緣所言一大事者即指衆生本有之自心名為佛性種子耳是知經乃佛所開示之路禪乃欲人循路而行持經而不悟心與參禪而不見性者總非真行六祖云心迷法華轉心悟轉法華持經與參禪豈有二耶是在學人堅持久長不拔之志持經即參究參究即持經所以經中佛意若求末世持經之人斯豈求循行數墨者耶古人參究必拌三十年苦心今經萬部非三十年不足禪人苟能持此一念三十年住山不異佛祖定為摩頂安慰矣但辨肯心必不相賺切不可作二法會也示蘄陽宗遠庵歸宗常公常公有志向上事專持法華經聞老人至匡山匍匐而來相見於東林自陳誦法華經於十方佛土中唯有一乘法除佛方便說但以假名字引道於衆生於此懷疑不知如何是一乘如何是方便假名願垂開示老人謂之曰所云一乘者乃一切衆生之本心吾人日用現前知覺之自性也以此心性是一切聖凡之大本故說為乘乘者是運載義故曰三界上下法唯是一心作除此心外無片事可得即吾人日用六根門頭見聞不昧了了常知不被塵勞妄想之所遮障光明普照靈覺昭然即此一心是佛境界則運至於佛若以此心廣行六度攝化衆生不見有生可度亦不見有佛可成如是一心即菩薩境界則運至菩薩即以此心觀諸四諦能斷愛染煩惱苦因高超三界證寂滅樂如此便是二乘境界則運至二乘若以此心精修梵行四禪八定則是四聖四禪境界則運至梵天能修十善斷上品惡則感六欲諸天境界則運至諸天若迷此一心恣殺盜淫斷佛種性則感三途劇報則運至三惡道中是故佛說三界唯心除此一心無片事可得唯此一事更無餘事故說一乘非此心外別有一法可說也若心外有法是為外道邪見非正法也若了此心則知三賢十聖及一切衆生皆一心之影響道是假名則知佛所說三乘十二分教隨機施設皆是假名引導衆生元無實法與人也種種方便皆為開示此心不是更有異法為衆生說也不唯佛是方便即末後拈華迦葉微笑及達磨西來單傳心印亦是方便所言直指人心見性成佛若言直指早是曲矣末法學人不達自心專向外求到底絶無真實受用及有志參究向上事不知本來無法不了自心一味真實更要別求𢆯妙如此用心不唯正眼不明抑且墮落外道邪見名雖學道不知翻成地獄種子豈不哀哉老人嘗謂學人直貴真實用心自淨煩惱習氣業識種子破得一分業識便露一分佛知見達一分佛境界斷得十分業識便是十分佛境界豈有心外別將巧法逗凑將來可為佛境界乎禪人更莫狐疑但只了知自心即是一乘若悟諸法但有假名便是真實工夫直須一切處不迷如此著力做工夫不必更作一種思量較計都是邪見種子也示古愚拙禪人古愚禪人自浮梁來參金輪請益做工夫老人因問汝日用如何用心答云作唯心觀又問汝作觀時還見有境否答曰到這裏總不見有境老人曰既不見有境將什麼唯心禪人曰某甲只是不忘能老人曰汝說唯心是以知見做工夫其實未達唯心境界古德云未達境唯心起種種分別達境唯心已分別即不生汝於現前境界還生分別否若作觀時似乎忘境逢緣依然分別逐境生心如此捺硬說唯心終是不得實證縱是忘得前境若執著唯心則是不能忘心乃忘所未忘能故心境不得混融是名智礙況未得忘境強說唯心以作實法者乎古德云絲毫未透如隔千山直饒做到心境兩忘一法不立猶知見邊事況以思惟心作究竟想豈不為自瞞者乎禪人今去南嶽萬峰深處諦觀水流風動鳥語山光觸目盈耳了無身心世界之相打成一片只這唯心二字亦須拋向十方世界外更有事在若墮唯心窠臼依然無出頭分示袁公寥佛言蠢動含靈皆有佛性傳曰人可以為堯舜由是而知靈覺之性物之本也人莫不具竊觀古今生人豪傑不少而聖賢不槩見者何哉蓋以習染之偏隨情逐逐而不返也所謂百姓日用而不知苟能自求知則聖不難矣故曰自知者明以不自知故迷日厚而心日昏苟有豪傑之士塞情而復性則聖可期而事業當垂不朽矣佛之十戒孔之四毋禪之一心皆復性之要有志之士可不勉哉袁子道生今素亮者往通問豫於曹溪知為上根利器及豫過匡山生遠候豫見其所賦骨奇性敏但習重而氣高故但任習而不見性苟能奮力遠情復性則不驕不背不逆寡不雄成則器廣而不溢志堅而不移心冷氣消則可坐進此道矣聖賢可期況事功乎老人愛之示究心之法大似圯上之敝履耳因字之曰公寥冀其日淡於爽口也示參禪切要徑山禪堂小參禪門一宗為傳佛心印本非細事始自達磨西來立單傳之旨以棱伽四卷印心是則禪雖教外別傳其實以教應證方見佛祖無二之道也其參究工夫亦從教出棱伽經云靜坐山林上中下修能見自心妄想流注此實世尊的示做工夫之訣法也又云彼心意識自心所現自性境界虗妄之相生死有海業愛無知如是等因悉以超度此是如來的示悟心之妙旨也又云從上諸聖轉相傳受妄想無性此又的示祕密心印也此黃面老子教人參究之切要處及達磨示二祖云汝但外息諸緣內心無喘心如墻壁可以入道此達磨最初示人參究之要法也傳至黃梅求法嗣時六祖剛道得本來無一物便得衣鉢此相傳心印之的旨也及六祖南還示道明云不思善不思惡正恁麼時阿那箇是明上座本來面目此是六祖第一示人參究之的訣也是知從上佛祖只是教人了悟自心識得自己而已向未有公案話頭之說及南嶽青原而下諸祖隨宜開示多就疑處敲擊令人回頭轉腦便休即有不會者雖下鉗錘也只任他時節因緣至黃蘗始教人看話頭直到大慧禪師方才極力主張教學人參一則古人公案以為巴鼻謂之話頭要人切切提撕此何以故只為學人八識田中無量劫來惡習種子念念內熏相續流注妄想不斷無可奈何故將一則無義味話與你咬定先將一切內外心境妄想一齊放下因放不下故教提此話頭如斬亂絲一斷齊斷更不相續把斷意識再不放行此正是達磨外息諸緣內心無喘心如牆壁的規則也不如此下手決不見自己本來面目不是教你在公案語句上尋思當作疑情望他討分曉也即如大慧專教看話頭下毒手只是要你死偷心耳如示衆云參禪惟要虗却心把生死二字貼在額頭上如缺人萬貫錢債相似晝三夜三茶裏飯裏行時住時坐時臥時與朋友相酬酢時靜時閙時舉個話頭狗子還有佛性也無州云無只管向個裏看來看去沒滋味時如撞牆壁相似到結交頭如老鼠入牛角便見倒斷也要汝辦一片長遠身心與之撕挨驀然心華發明照十方剎一悟便徹底去也此一上是大慧老人尋常慣用的鉗錘其意只是要你將話頭堵截意根下妄想流注不行就在不行處看取本來面目不是教你向公案上尋思當疑情討分曉也如云心華發明豈從他得耶如上佛祖一一指示要你參究自己不是向他玄妙言句取覓今人參禪做工夫人人都說看話頭下疑情不知向根底究只管在話頭上求求來求去忽然想出一段光景就說悟了便說偈呈頌就當作奇貨便以為得了正不知全墮在妄想知見網中如此參禪豈不瞎却天下後世人眼睛今之少年蒲團未穩就稱悟道便逞口嘴弄精魂當作機鋒迅捷想著幾句沒下落胡言亂語稱作頌古是你自己妄想中來的幾曾夢見古人在若是如今人悟道這等容易則古人操履如長慶坐破七箇蒲團趙州三十年不雜用心似這般比來那古人是最鈍根人與你今人提草鞋也沒用處增上慢人未得謂得可不懼哉其參禪看話頭下疑情決不可少所謂小疑小悟大疑大悟不疑不悟只是要善用疑情若疑情破了則佛祖鼻孔自然一串穿却只如看念佛的公案但審實念佛的是誰不是疑佛是誰若是疑佛是誰只消聽座主講阿彌陀佛名無量光如此便當悟了作無量光的偈子幾首來如此喚作悟道則悟心者如麻似粟矣苦哉苦哉古人說話頭如敲門瓦子只是敲開門要見屋裏人不是在門外做活計以此足見依話頭起疑其疑不在話頭要在根底也只如夾山參船子問云垂絲千尺意在深潭離鉤三寸子何不道山擬開口師便一橈打落水中山才上船師又云道道山擬開口師又打山大悟乃點頭三下師曰竿頭絲線從君弄不犯清波意自殊若是夾山在鉤線上作活計船子如何捨命為得他此便是古人快便善出身路也在昔禪道盛時處處有明眼知識天下衲子參究者多到處有開發況云不是無禪只是無師今禪家寂寥久矣何幸一時發心參究者多雖有知識或量機權進隨情印證學人心淺便以為得又不信如來聖教不求真正路頭只管懵董做即便以冬瓜印子為的決不但自誤又且誤人可不懼哉且如古之宰官居士載傳燈者有數人而已今之塵勞中人粗戒不修濁亂妄想仗己聰明看了幾則古德機緣箇箇都以上上根自負見僧便鬬機鋒亦以自己為悟道此雖時弊良由吾徒一盲引衆盲耳老人今遵佛祖真正工夫切要處大家商量高明達士自有以正之示董智光董生斯張生長富貴之室早發求出生死之心蓋夙習般若勝緣內薰之力也先參雲棲大師授淨土法門頃參老人於雙徑願受優婆塞戒且自發露罪業深重願求出苦之要用何修習以滅罪愆老人因示之曰學人即知罪根深重古德教人隨時消舊業切莫造新殃佛為業重衆生開懺悔一門最是出苦方便偈曰衆罪如霜露慧日能消除若欲懺悔者端坐念實相是為正行此外皆助方便也衆生自性與佛平等本來無染亦無生死去來之相但以最初不覺迷本自性故號無明因無明故起諸妄想種種顛倒造種種業妄取三界生死之苦是皆無明不了自心隨妄想轉如人熟睡作諸惡夢種種境界種種怖畏衆苦難堪及至醒來求夢中事了不可得是故衆生墮在無明夢中隨妄想顛倒造種種業自取諸苦醒眼看來諸顛倒狀豈可得耶即今現在無明夢中如何能得消舊業須是以智慧光照破無明的信自心本來清淨不被妄想顛倒所使則諸業無因以妄想乃諸業之因也此何以故由無始來迷自本心生生世世以妄想心造種種業業習內積八識田中以無明水而灌溉之令此惡種發現業芽是為罪根一切惡業從此而生今欲舊業消除先要發起大智慧光照破無明不許妄想萌芽潛滋暗長若能於妄想起處一念斬斷則舊積業根當下消除所謂不怕念起只怕覺遲覺照稍遲則被他轉矣若能於日用起心動念處念念覺察念念消滅此所謂衆罪如霜露慧日能消除以無明黑暗唯智慧能破是謂智慧能消除也若晝夜不捨勤勤觀察不可放行但就妄想生處窮究了無生起之相看來看去畢竟不可得久久純熟則自心清淨無物無物之心是為實相若常觀此心又何妄想可容積業可寄耶如此用心是名觀照三昧若自心煩惱粗重無明障處不自覺知如此則古德有教學人參究即將念佛審實公案正當著力提起一聲佛號橫在胸中即便審究這念佛的畢竟是誰如是隨提隨審並不放空將此疑團橫在胸中如己命根更不放捨一切動靜間忙去來坐立唯此一事更無餘事如此用心才見妄想起時就將此話頭一拶則當下粉碎一切妄想自然掃踪滅跡矣以此話頭如日輪當空無幽不照只恐心力懈怠不肯著實提撕故不能敵妄想耳若敵得妄想消處便是舊業消滅時也捨此一著便向心外別求則諸佛出世亦無懺悔處此在自力非他力可代也若惡習強勝力不能敵者在昔佛有明誨若修行人習氣不除應當一心誦我無為心佛所說心呪此實格外方便也以各人藏識潛流習氣深厚智力不到不到之地必須仗佛心印以密破之譬如難破之賊必請上方之劍此須早晚二時自取方便唯以參究工夫為第一義耳老人以此指示大似與盲人拄杖子其實行在己躬非師友可代也以居士志歸法門故名之曰福覺要以覺照為行本也字之曰智光非智慧光又何以破癡暗耶但須覺照不昧智光現前便是了業障出生死之時節也示聞汝東維摩居士住毗耶離城家居盡屏所有獨寢一室以示疾說法即文殊等三十二大士窮其舌辨不能當杜口一默此從古在俗第一善作佛事者也老龐盡散家資從馬祖得西來大意乃云但願空諸所有切勿實諸所無此又善學維摩者也汝東居士其以二老作知識乎示徑山堂主幻有海禪人佛祖一心教禪一致宗門教外別傳非離心外別有一法可傳祇是要人離却語言文字單悟言外之旨耳今參禪人動即呵教不知教詮一心乃禪之本也但佛說一心就迷悟兩路說透宗門直指一心不屬迷悟要人悟透其實究竟無二如來藏中求於去來迷悟生死了不可得此豈屬迷悟耶二祖云覓心了不可得六祖云本來無一物即般若無五蘊根塵識界及出世三乘之法也以無所得故得菩提與覓心了不可得豈二法耶是知教說一心所多者凡情聖解耳參禪頓破無明是絶凡情也悟亦吐却是絶聖解也斯則禪呵知解而教未常不呵也今參禪人從教回心者不能忘知絶解提話頭不能忘情絶跡皆在所呵何其毀教謂不足取耶今棄教參禪者果能先解本無凡聖不屬迷悟是為見地依此參究當人一念若存絲毫情見及𢆯妙知解總是未透皆生死邊事豈可便以為得耶今無明眼知識印證若不以教印心終落邪魔外道但不可把佛說的語言文字及祖師𢆯妙語句當作自己知見必要參究做到相應處如經云一切煩惱應念化成無上知覺如此便是頓悟的樣子不得將煩惱習氣夾雜知見當作妙悟也亦不是別有只是消盡煩惱習氣露出本來面目耳故云悟了還同未悟時依然只是舊時人不改舊時行履處豈不見夾山未見船子時上堂有僧問如何是法身山云法身無相又問如何是法眼山云法眼無瑕是道吾在座不覺失笑既見船子後道吾遣僧往問如何是法身山仍曰法身無相又問如何是法眼山仍曰法眼無瑕僧回舉似道吾吾云這漢此回方徹此便是伶俐座主棄教參禪的樣子也海堂主久親教乘今棄所習單求向上一路且看夾山前後兩轉語一般道吾為甚肯後不肯前試看不肯在甚處肯在甚處這裏定當得出管取教意祖意一齊吐却他日便可把一大藏教一口吸盡字字化成光明藏也葛藤不少珍重珍重示徑山西堂靈鑒智禪人承教有言一切法不生我說剎那義初生即有滅不為愚者說古德云悟無生者方見剎那然既悟無生又何有剎那之可見若見有剎那則非悟無生今何云悟無生者方見剎那是則無生剎那一耶異耶佛依不生說剎那則非異矣祖師云悟無生者方見剎那則無生剎那又非一矣若離一異求之則無生意亦繫驢橛矣溈山云今人一念頓了自心名之為悟即以所悟淨除現業流識是名為修然流識者謂微細生滅即剎那心也言悟後而修則是悟而後見也且悟後方見剎那則前悟者非真無生明矣今參禪提話頭雖云著力而微細生滅流注潛行如石壓草黯然不見若不斷生滅如何得悟無生若非無生又何以敵生死若悟而後見則世尊依剎那而說無生又為剩法矣西堂飽餐教義今棄所習單提向上一路於此試定當看但不可作義理和會亦不可向意解中求能於一念剎那中頓見無生則佛祖鼻孔一串穿却示知希先山主山主久棲講肆從少林參諸祖機緣今盡屏所習單提向上一路弔影雙徑適老人來因拈香請益老人示之曰此事人人本無缺缺圓滿具足所以日用不知不得受用者直為無始惡習種子積劫熏染根深已是難拔今又新熏言教文字祖師公案種種知見更增一重障礙雖要求明自己轉求轉遠此何以故只為昧却自己向他取覓耳以積生煩惱習氣名煩惱障𢆯妙知見名所知障若二障消除本體自現今參究向上事先要將從前所學一切文字語言𢆯妙道理名為雜毒盡情吐却單提本參話頭重下疑情斬斷妄想煩惱根源使內不得出外不得入前後際斷中閒自孤只有一箇疑團作自己命根疑到疑不去用力不得處一定看他畢竟是個甚麼看來看去拶來拶去自有倒斷時也但存絲毫知見於中便隔千里萬里但看初祖云心如牆壁可以入道便是歸家第一條路也若心不肯死疑不切當則千生百劫終在途路耳山主但將精神收向此中管取他日得處定不是之乎者也可到萬萬勉之示嵩璞恩山主古德教人參禪做工夫先要內脫身心外遺世界一切放下絲毫不存單提一則公案話頭如趙州狗子還有佛性也無州云無或萬法歸一一歸何處或審實念佛的是誰隨舉一則橫在胸中如金剛王寶劍將一切思慮妄想一齊斬斷如斬亂絲內不容出外不容入把斷要津築塞咽喉不容吐氣如此著力一眼著這提話頭的畢竟是個甚麼如此下疑疑來疑去疑到心如牆壁一般再不容起第二念才有妄想潛流一見便又極力提起話頭再下疑情又審又疑將此疑團扼塞之心念不起妄想不行時正是得力處如此靠定一切行住坐臥動靜間忙中咬定牙關決不放捨乃至睡夢中亦不放捨唯有一念話頭是當人命根如有氣死人相似如此下毒手撕挨方是個參禪用工之人用力極處不計日月忽然冷灰豆𪹼便是大歡喜的時節若悠悠任意一暴十寒恐終無得力時也山主有志向上事當以此自勉示乘密顯禪人學人日用觀四大如影觀目前如夢事觀心如急流觀動作如機關木人觀聲音如谷響觀境界如空華作是觀時無我我所無動我者無作為者去來坐立無起無止應念無生是名入無諍三昧示曇衍宗禪人宗禪人少遊講肆習性相義久之以不見自性起疑參究有日未有所入遇老人至雙徑拈香請益因示之曰古人云不貴子行履只貴子見地所言行履者趣進工夫也見地者了達自心為行本也行本不明則趣操失旨故參學之士以見地為先所言見地者乃的信自心本來清淨了無一物不獨凡情聖亦不立但因無始無明自蔽妙明故起種種顛倒妄想分別造種種業譬如醒人無事而忽於睡中作種種夢夢中苦樂等事宛然現前及至覺來求之了不可得是謂無中生有豈實法耶但癡人顛倒執為實有此乃見不徹也及佛出世說種種法乃破夢之具耳亦無本也而學佛法者又執為己實有之法此乃夢中增夢耳今參禪之法無別妙訣直是打破夢想顛倒若了知本無的信自心清淨無物則達妄想非有了妄不有則知佛法破妄想者亦本非有佛法是藥妄想是病若藥病不立則本體安然如此則知藥病皆病今參究所提古人無字公案乃攻藥病之藥也是謂以毒去毒若知本無物則參之一字又下一毒也豈可將此作𢆯妙會耶若不信自心縱參亦是誤服毒藥禪人能信之乎當於一法不立處參示顧山子豫居雙徑之寂照居士顧山子來參扣其業曰事形家次至化城因指點山水談造化之精妙超乎形氣蓋得其精而遺其粗者因詰之謂嘗見悟一篇是篇乃豫門生周子所述豫嘗序之曰一乃萬物之本造化之蘊也故曰天得一以清地得一以寧聖人得一以為天下正正則不滑於邪而固其本也然人與物理與氣心與形均一也一得而衆理歸之語云識得一萬事畢故吾徒參𢆯之士必曰萬物歸一一歸何處斯則歸一可知一之所歸則不可知也今夫人者萬務交固萬慮攻心紛紛擾擾竟莫之寧乃不識一之過也居士既能觀天地造化之歸一而不識身心性命之歸一是知二五而不知為十也苟知性命之歸一則萬化備在於我矣可不務哉示談梁生談生根器最利蓋從夙習般若中來然般若乃衆生佛性各各具足而根有利鈍之不同者良由五欲習氣有厚薄之不等耳其利根者因久習般若淨除染污習氣及至今生聰慧明利而人不知返將利根聰明作染污惡習之資是名顛倒也以般若內熏故時時有出塵志且曰我至某時待世事了畢即去學道此等見識舉世皆然以有將來之念故目前種種應緣境界由抱未來高尚之志視為不足為亦不屑為以此虗想返增貢高我慢之心謂他人無此心皆庸品耳而自己將目前放過世出世閒二者俱失虗送光陰及至將來未必可如初志也且又心不檢細行情存鹵莾以我見作高明此尤誤之甚也如此喚作有志氣返不若三家村裏田舍翁他無別想歲歲生涯不缺可不愧哉聖人教人不躐等故曰素位而行老子曰跨者不行惟今既有此向道之志就從今日切切仔細就規矩上做將去將一片真實心學道不染污的現前行將去若目前時時刻刻不放過則將來不脫空若目前以虗想空頭且待將來是涉河求井而止渴也豈不愚哉談生請直看目前不虗放過一著便見平生下落示曹士居凡民日用不離見聞覺知而聖人亦然其用既同而有聖凡之別者在知與不知之閒耳故曰百姓日用而不知學人復聖工夫只在日用不知處求其固有之知若見本有之知則一切聲色貨利了然不被所感如是遇境逢緣如鏡現像無一物可動於中矣此入道之要門也示馮延齡學人向道第一要怕生死次要知生死根生死根者即日用現前種種憎愛取捨我慢貪瞋癡業是既此是生死苦根發心要斷更無他術只是起時就照見定不容他起當不起處則當處消滅消滅時更不相續如此用心念念不放過心心不昧其知自靈知若靈則觸境境不牽心觀心心不附境心境不到則生死無容寄矣如此用心不必別求玄妙示寒灰奇小師住山丙辰奇先禮達大師求出世法師許可令參老人為之剃染依老人數載以刻大藏因緣復歸本師執勞此大役非一日矣今以老病覓大休歇場意卜之無當也老人來雙徑見奇氣雖弱而心力更強以向十餘年來得單提向上一路少有把鼻但缺㘞地一聲耳談及歸休地老人示之曰盡大地是寂滅場唯在學人肯放下處便是休歇地耳又何從他覓哉古德云不離真有立處立處即真良由自心生滅一向循情種種取捨故頭頭障礙三祖大師云至道無難唯嫌揀擇又云良由取捨所以不如若不如則窮盡十方無可休之地矣老人觀雙徑乃八十八祖說法地大慧禪師亦歸宿於此即汝本師和尚腳跟遍海內立足無卓錐畢竟以刻大藏因緣故得埋骨與大慧同坑況汝隨本師願輪刻經於寂照開山皆汝用命之地即汝放捨身命處也老人知汝不能放捨者乃我見未忘非懶病也以淨法界中佛祖衆生大家有分獨我見者不能入若見有我則視佛祖皆是人相人與我相對如此則終無可避之人亦無可休之地矣汝自不休則無地可休汝若肯休則當下便休一切放下方為大休休則佛與衆生皆即避影亦無地可容渠矣汝求向上一路雖云奇特不若放下平貼耳古人云家平貼到人稀若到平貼地則佛亦不做更何向上可求耶示石鏡一禪人古人為生死大事不明走向山中吊影單棲專為究明己躬下事故云大事未明如喪考妣不是養懶圖安閒任意度時也必欲究此大事只可運糞出不可運糞入直須將妄想惡習文字知見一齊吐却放得胸中乾乾淨淨了無一法當情只是一個話頭作自己命根古人三十年不雜用心正是此耳若今住山任意悠悠隨情放曠妄想起來又要逗凑幾句詩作兩首偈當悟的道理消遣日子如此只是一個養懶的癡漢如何喚作住山道人不唯唐喪光陰抑且虗消信施挨到臘月三十日將什麼見閻老子不是將一首詩一首偈便可抵得他過也禪人當思為甚住山畢竟要討個下落方不負百劫千生一遇之勝緣古德云三途地獄受苦者未是苦也向袈裟下失却人身誠為苦也可不念哉
