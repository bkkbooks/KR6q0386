body:
  text: 侍者福善門人通炯日錄海幢法裔今照今光收藏示曹溪寶林昂堂主嶺南自漢方通中國始知有文物六百餘年至唐初六祖起新州得黃梅衣傳西來直指之道是時始知有佛法開曹溪寶林道場說法其中自爾道蔭寰宇天下禪宗皆以此為資始何其盛哉六祖滅後肉身雖存而道場漸衰至宋業三百餘年則叢林大壞極矣時有子超禪師蹶起而大振之由是重興其道至若傳燈所載者自六祖後不多見其人故道法雖播於十方而留心於根本地者寡矣道場無開化主人而僧徒習世俗之業頓忘其本固其所也由宋迄我明萬歷中又將五百年道場之壞尤甚於宋僧徒不遑其居而法窟皆棲狐兔矣丙申歲老人至嶺外得禮祖庭覩其不堪之狀大為痛心而去又五年庚子諸護法皆以法道為心亟欲老人往捄其弊至則誓願捨此身命志為六祖忠臣孝子也一時更新百廢具舉此仗佛祖護念之靈非人力也於時僧滿千眾有懼僧徒之不安者數人而已求其憂祖道不振後學無眼法幢之不固者獨昂而已至若知老人復之志誓死之心亦唯子而已嗟乎是知法門之得人為難也如此於時老人初入曹溪選諸僧徒可教者教之眾中物色亦唯子而已及老人住此八年之間凡所經畫為山門久計者眾皆罔然其所經心關涉鉅細無遺者亦唯子而已及獅蟲破法魔黨競作即前所稱為道場者數人亦皆在網羅求出之不暇求其苦心保護叢林憂祖道之崩裂深知老人建立之恩者亦唯子一人而已當是時也苟非子砥柱中流委曲調護曹溪卒無今日矣及老人捨之而去禪堂無主幾為獅蟲所食非子挺身撑拄其間不唯道場破壞後學無依即老人中興一片苦心竟付流水矣安望祖道之再振乎是以老人別曹溪來十年於茲子日夜苦思老人之復至望法道之更新念念含悲未甞一息忘之也老人之南嶽而子隨至既而老人逸老匡山子尋即遠來見其感恩之心益篤憂道日深且冀老人之復至或望至人之將來其誠葢難以言語形容者即古之忠臣孝子憂國憂家烈女節婦誓死無二心者不是過也適來山中老人留之已久其哀哀之心請益不一老人因而示之曰子之志固嘉而子之思亦過矣子未聞大道之替雖佛祖亦難逃於時節因緣因緣聚會葢不由人力也且道與時運相為升降殆不可強即其人亦不易得也諦觀六祖入滅以來今千年矣其道徧天下在在叢林開化一方不少求其為祖庭而經理家法者獨宋子超一人而已子超之後又五百年志為祖道力整頹綱者獨老人而已況在曹溪有眾千人之中求其憂祖道知老人者唯子而已是則法門之人以此為懷者豈易見哉今老人示子最勝法門所謂求人不如求己也且當六祖未出世時只一賣柴漢耳因有夙植靈根功夫醞藉已久一旦聞經一語頓悟自心遂得黃梅衣豈不是今日寶林道場乃六祖肩頭柴擔舂米腰石邊來故有如此廣大光明普天帀地禪宗一派一言一句皆從柴擔腰石邊流出至今供養香火如生時無異肉身堅固不壞如現在說法無異如是福澤亦從柴擔腰石邊來此豈有心要求人而後得也子既有志上憂祖道何必求人應之彼既丈夫我亦爾且六祖悟的一段般若光明人人有分不欠絲毫如今只當憂自心之不悟不必憂道場之不興若能了悟自心則能攪長河為酥酪變大地作黃金拈一莖艸作丈六金身以丈六金身當一莖草自然具大神通隨心轉變任意施為無可不可如是在我全具又何苦思癡癡望他人來作我家活計耶古人要悟自心在六祖已前都是當下一言便悟更無做工夫之說六祖得黃梅衣大庾嶺頭開示慧明道人一則公案後來便是做工夫參禪的樣子也從今向去教汝直將從前憂長憂短望人的心一齊拋却但當自己放下身心拌了一條性命單單一念只求悟明自心將慧明一則公案橫在胸中重下疑情晝夜六時行住坐臥迎賓待客應事接物茶裏飯裏拈匙舉筯一切不教放過疑來疑去定要見自己本來面目或提念佛話頭要見者念佛的畢竟是什麼人如此疑到似銀山鐵壁疑不得處忽然命根斷絕疑團迸破自己本來面目當下現前是時方知念佛的人如十字街頭見親爺一般更不必問人古人云善造道者千日之功亦有十年五年或二三十年或盡生不悟發願再出頭來又或有二生三生乃至十生多生不昧本願者生死時長常寂光中了無去來之相且子年力尚強果能決志從前日做起即十年二十年能悟今生尚遂我本願即今不悟賴有此參究功夫般若種子就是再出頭來猶是現成活計縱遠不過四五十年打箇筋斗如在目前那時整頓自家家事有何難哉捨此不憂更憂別事都是枉費心思妄想無益不唯無益且增無邊生死苦海是豈不為大愚癡者哉老人此說如棒打石人頭如此做工夫則是老人時時在汝眉目間放光動地也示曹溪旦過寮融堂主天下叢林為十方衲子行脚者之傳舍以萬里雲遊跋涉登山衝風冐雨躡雪履冰飢寒困苦弔影長涂而莫知所止故望一叢林以求一夕之安如窮子之望父母廬舍也萬一到處主者不得其人漠然而不加意使飢者不得食渴者不得飲勞者不得息病者不得安則其悽楚苦惱之懷又將何以控告耶從古接待十方叢林之設深有見於此也諸方四路各有退步或有鄰峰里市容可不得其所而更之他至若嶺南曹溪道場六祖肉身現在海內衲子所必往而禮覲者所至必數千里外單單度嶺特為此事況冐煙瘴之鄉出九死一生之地蠒足而至此中可無接待之設乎老人未到曹溪之日聞衲子至者無安居息肩之所求其一飲一食而不可得率皆旋行託僧房皆閉門而不納即得米升合又無炊鬻皆拾薪就㵎或得一食而行老人憂之乃逐屠沽之肆闢為接待十方禪堂別立齋廚以便其食所需皆取給於內堂必使周足聽其飢者食渴者飲勞者息病者調理污者澣濯任其久近隨其去來是以業海而為樂土矣但求一主者不易得且有即此而造地獄者比比也或有獅蟲集此以作魔撓力不能制者多未安也頃昂公來云近得融公為旦過堂主事事如宜足副建立之心居三年如一日也老人聞而喜曰此老人願力所至也常思菩薩修行以慰安眾生為本當思一切眾生老者如父少者為兄弟一以孝順心而敬事之況在法門有同體之誼又非其他可比苟能以孝順心而敬事之是則以佛心為心也梵網戒經乃佛之心地法門也首稱孝名為戒所謂孝順三寶孝順師僧孝順至道之法若能受此戒即入諸佛位是即以孝順為戒之本戒為成佛之本能行此行即是作佛之基不用別求佛法矣華嚴經云菩薩布施眾生頭目身肉手足有來乞者隨與而去且自慶曰彼來乞者皆我善知識為我不請之友能成就為無量功德令我堅固菩提願力由是觀之則今十方來者皆我不請之友融公若能以孝順心恭敬供養以滿金剛戒品為成佛種子即此一行全攝眾行又何捨此而別有玄玅佛法哉融公能諦信老人從此深心以盡身命供養十方堅志不退即是菩薩以頭目手足而施眾生等無有異求佛玅道又何加於此其或未然更將六祖本來無物一語橫在胸中久之一旦識得自己本來面目是時則將六祖鼻孔一串穿却乃見拈一莖草即是已建梵剎唯恐十方雲水之不早至又何疲厭之有哉嗟余老矣愧不能再為六祖作奴郎公能體此即是代老人常轉如是法輪也示曹溪沙彌達一老人逸老匡山寶林堂主昂公𢹂沙彌達一遠來參謁老人因示之曰汝等當思何修何福生在邊地得為六祖兒孫朝夕親近祖師肉身如現身說法無異何其至愚如生盲人不知日光所照己也汝又何緣何幸得老人至以金篦刮翳開其盲瞑始見天日猶然不知日光之照也汝等當思六祖未至黃梅但新州一賣柴漢耳一聞誦金剛經應無所住一語頓斷歷劫生死根株此豈由教習而然耶良以佛性種子人人具足未遇緣開發如種在地未得雨露之滋耳老人一向直示汝等種種方便皆得雨之功但汝等煩惱根深難生智種靈苗今遠來請益猶是昔潤之功也從今要智種發生則將六祖所悟無住一語會取參求忽然心地發明是時不但了却歷劫生死即六祖鼻孔盡在你諸人手裏把住放行只由自己如此便如親侍六祖說法時無異豈待更要老人打葛藤費婆心也老人雖不在曹溪汝只將當家一則公案說與同參諸沙彌等人人都要如此做工夫不可一念放捨如此即是老人常住此山時時為汝諸人說法也此事不是兒戲直要一片死心下毒手拚命根做將去若是朝三暮四一寒十暴不但智種不生抑恐作焦芽敗種也如是不唯辜負老人實辜負自己切不可空過時光恐大限到來一失人身萬劫難復汝當深思自勉勿忽示曹溪沙彌方覺達摩西來單傳直指之道衣鉢六傳至曹溪正法眼藏流布震旦今千餘年皆云曹溪一脈如孔門之洙泗葢所係法門非輕也予昔居東海時每慨禪門寥落必源頭壅閼嘗與達觀大師議欲往𤀹之期於匡廬未幾予弘法罹難達師以予不果行遂先獨往至其山見其僧皆田舍郎也止於檐下信宿而歸未幾余即以弘法罹難恩遣嶺外時則以為佛祖神力所攝也師候予於江上謂予曰某先探曹溪矣即六祖復生不能再振也予曰顧願力何如耳及予度嶺居五年庚子當事者以曹溪護法為心力致予往予至則始於祖庭及諸三門百廢齊舉其僧無論大小即諸沙彌率皆樵兒牧豎別修禪堂設為清規令其各從本業如是者百餘人惜乎般若之緣不深老人切示以佛法大義領荷者希第在威儀之間耳老人苦心八年寺僧闡提作難老人竟謝去之南嶽諸沙彌如失乳兒相繼而隨者不絕如覺侍者先候於南嶽今候於匡山乃拈香請益老人哀而謂之曰汝等生邊地不聞三寶名葢一難也幸遇老人為開導又何幸也雖受化有緣而卒不能深入佛法是未種般若之緣耳汝等念我不忘則信根既具而佛法終有時而入所謂欲識佛性義當觀時節因緣汝今既知捨離俗纏脫然方外此為入道正因且又親近知識知其所難則不當以妄想狂心當面錯過乃是知所重也若離俗緣自以為無拘束縱浪身心徒事虗華耽玩山水徒費草鞵錢竟有何益豈不為重增業苦耶汝今果能拌捨身命志求大法為生死大事參究向上趂色力強健三二十年直欲發明自性不悟不止如此立行乃是出家正行方不負老人開導之恩亦不負千生萬劫遇善知識之緣亦不負出家親近六祖肉身如生前無異仍須發願願弘祖道以救道場以存法門之標準如此操心立志乃是曹溪的骨兒孫若更悠悠度日執愚自是以朝名山禮祖庭隨喜道場此是粥飯庸流最下品人之行徑饒汝行盡名山依然俗骨凡胎毫無進益豈不辜負自己百千萬劫之大因緣耶汝諦思惟慎無自誤題門人超逸書華嚴經後此葢余壬寅孟冬在寶陀山題門人超逸為弟子實性補書華嚴經後述其發心始末因緣也余自蒙恩度嶺說法五羊教化數年緇衣中篤信歸依者唯菩提樹下數人而已數人中唯逸公與實性二人同志同行同發大心書大法性不及半遂蚤夭獨逸竟其業噫唯此不獨發心之難即已發心而能有緣遂其志願者尤更難也故我世尊於法會中歷言信法之難如云假使劫燒擔負乾草入中不燒是不為難我滅度後若持此經為一人說是則為難由是觀之又不獨為信法之難而持法之難更有難於萬萬者矣顧此南居海徼其俗與中國遠佛法始自達摩航海昔憩五羊而跋陀大師持楞伽來先開戒壇於法性寺既而智藥大師植菩提樹於壇側為六祖大師前茅幾百年而跋剌三藏持楞嚴經至宰相房公為筆授時則盧公起於樵斧間佛法亦自唐始盛其根發於新州暢於法性𤀹於曹溪散於海內是知文化由中國漸被嶺表而禪道實自嶺表達於中國此所以相須為用為度世之津梁耳予度嶺已十有二年憫祖道之荒穢振曹溪之家風以罪朽之身以當百折之鋒可幸無恙者六年於茲賴佛祖之寵靈諸凡有序草創法道之初時在法會親炙於余者獨超逸通炯二人而已此足見教化之難而得人誠難之難也逸自禮余余往雷陽走瘴鄉理曹溪往來奔走無甯日逸乃謹謹奉教閉門却埽書華嚴大經以為日課且以餘力求六祖戒壇故址收贖而重新之暇則率諸同志結放生會每月有常期漸達海濵遵為法式實余唱之而逸輩能衍之也今余苟完祖庭冀休老以了餘生逸又從余以遨遊盡生平唯是不獨發心之始難而更成終之難也然古所難而公獨易此非多世善根於般若緣厚者何易至此哉回視實性一息不來便成永劫即今求其見聞隨喜現前種種殊勝之緣豈可復得是則發心同而夙願異故生死殊途幽冥永隔吾徒有志於生死大事者於此足以觀感矣以逸與性同時請益書此經其讚法之辭具於前部之首今於逸所書不得贅譚獨申發心畢竟始終之難如此題實性禪人書華嚴經後我世尊毗盧遮那如來初成正覺於菩提場演大華嚴名曰普照法界修多羅說一切諸佛所證眾生自性法門故曰奇哉奇哉一切眾生具有如來智慧德相但以妄想顛倒執著而不證得若離妄想顛倒則一切智無師智自然現前又曰吾今於一切眾生身中成等正覺轉大法輪是以此經所詮純以一味平等大智圓照法界為體以一切聖凡依正有情無情悉皆同等一切眾生所作業行不出諸佛自性法身一切妄想無明貪瞋癡愛皆即諸佛所證真如實智一切山河大地鱗甲羽毛蠢動蜎飛皆即毗盧遮那普現色身是知吾人日用折旋俯仰欬唾掉臂乃至飲食起居皆即普賢玅行不出毗盧遮那如來海印三昧也何況修習正行而作白業者乎第吾人日用而不知耳悲夫人者迷此本有智慧無明業流沈淪生死往來六道備受諸苦不知其幾百千億恒河沙數世界微塵劫矣曾不自知返省故我大師以平等大悲捨自性法樂出現世間挺身三界而開導之深入火宅如長者之捄諸子也然父之於子其心不止苟免災患而已實望全付家業此本懷也故先最初即說此經頓示平等法界直指眾生自性法身令其頓得無量法樂故曰譬若一微塵中具含大千經卷書寫三千大千世界中事有一智人明見於中遂剖破微塵出此經卷拈示眾生轉為利益且一微塵者眾生妄想之心也大千經卷者乃眾生自性功德也明眼智人乃諸佛菩薩大悲主也剖微塵者乃破諸人妄想顛倒也剖微塵之方即諸佛所說一切經法也然法有頓漸其餘諸經皆漸剖之此華嚴經乃頓剖之方示諸佛所證廣大佛法寶藏欲令眾生一眼便見一念頓得無量受用也由是觀之則吾佛之恩德與眾生者豈淺尠哉嗟乎自有佛法以來此經流布寰區見聞不少求其能知諸佛恩德者幾何人哉吾佛滅度之後從上諸祖傳佛心印直指眾生佛性者皆我慈父克家之子也唯我菩提達摩大師特為此事航海而來此土少林面壁冷坐九年被人毒害數四唯得二祖一人即便抽身西去六傳至我大鑒禪師起於樵斧之中一聞經語便走黃梅負舂腰石竟得衣南來然被惡人加害不一避難於獵人隊中十有七年後際因緣時至聊借風旛一語震動人天始得剃髮披衣於法性菩提樹下說法於曹溪源頭千七百員知識從此一派流出惟此廣大功德皆從我大師忍苦一念中來豈非法王忠臣如來慈父真子者乎至今授戒之壇基尚在埋髮之道樹猶存凡在覆蔭之下靡不安然於葢載之間食大師之食衣大師之衣求其知大師之恩思大師之苦者無一人矣悲夫是可謂日用而不知也余忝在大師末法弟子列弘法罹難放遣雷陽丙申度嶺過曹溪瞻謁大師道骨儼然如生慨其法道寥落風俗隳頹泣數行下者久之乃之戍所是秋歸會城之青門壘壁間明年春饑癘之死白骨蔽野收而瘞之者萬計乃為津濟道場延諸僧眾越明年戊戌荷戈之暇乃引樹下弟子數輩為說無常苦空之法既而註楞伽寶經成為其開示又往樹下為諸沙彌說四十二章經則聽者日益眾矣弟子超逸實性執香作禮而白余願手書華嚴經一部以作苦海津梁予為歡喜讚嘆二弟子即閉戶焚香始於萬歷庚子執筆首事越明年辛丑實性奄忽而逝所書經止二十七卷其祖超珍復命實性之師明沾究竟卒業滿此勝緣嗚呼悲夫眾生流浪苦趣往來六道者如塵沙劫波於中能遇佛法能發信心者政若大海一眼之龜值浮木孔豈易得哉今實性生此末法仗此勝因不動步而遊華藏之天一投筆即覩剎塵海會覲毗盧於當下圓行海於多劫即已生非虗生死非浪死矣何況乘此津梁而遊不死不生之鄉者乎壬寅孟冬余將有雷陽之行超珍持性所書經至乞子一言以紀其事余冀後之見聞者因之而發信心但能一念回光即出曠劫生死是則實性又以一毛端頭出生廣長舌相而說眾生自性法門不減毗盧遮那坐菩提樹即此便是法身常住也題曹溪諸沙彌書華嚴經後大哉法界之經也惟我本尊盧舍那佛初成正覺坐阿蘭若法菩提場金剛心地入海印三昧稱性所演圓融無礙廣大威德自在法門七處九會不起而昇圓滿十身星羅法界塵剎眾生依正齊說熾然無間不可思議之法也曹溪六祖大師秉單傳心印西來衣留鎮此山是即法菩提場金剛地也肉身現在是即舍那法身常住也鐘鼓音聲朝夕無間是即剎塵熾然說法也嗟乎其徒在座如盲如聾是為覿面錯過久矣予往蒙聖慈以萬里調伏恩大難酬因誓捨此身重整道場為圖報地諸弟子輩全不知有此事無異聾瞽予因選諸童蒙沙彌教以習字書寫華嚴尊經意將仗此大法因緣以作金剛種子果不數年間發心書者可期十人堂主昂公乃昔所延教師也持來匡山予見而歎曰此即剖一微塵所出之經也觀其點畫皆從金剛心中流出況有最小沙彌願刺血而書之者斯即吾佛所說無師智自然智現在前矣予感激含涕惜予不能為諸沙彌作究竟導師耳雖然惟此即予心血所灑若自茲以往見聞隨喜發心興起緣緣無盡至未來際將令曹溪弟子人人入此法門即塵說剎說眾生說熾然常轉此法也斯即舍那現在說法六祖常住此間即予死不朽矣欣躍何如敬書始起因緣以示來者為發心地又為老人廣長舌也題曹溪沙彌血書普賢行願品予往住曹溪中興祖道作養諸沙彌冀不墜西來之業不十年間似有改觀眾中沙彌某發心刺血書寫普賢行願品以為終身誦持老人喟然而歎曰沙彌識法者也乃能刺血書寫此經行此難行之大事葢法界緣起不分迷悟不屬聖凡但有弘為皆歸真際所謂山河大地共轉根本法輪鱗甲羽毛普現色身三昧況此身血從法界流滴入此經豈不稱真法性者乎沙彌苟以如是書寫如是持誦盡命不懈則心心不出普賢行海步步不離華藏道場但當諦信不疑此外別無佛法如是則老人如法界而稱歎亦未能盡功德之量如其自昧本心動與法違縱親見願王猶然重增業識耳常住清規大師入山自二十八年九月二十日到寺十月初七日始至初九日止三日在殿精選合寺大小僧行諷經讀書初九日設立法華堂卯時鳴鐘三通齊赴佛殿擺設不許延遲仍要褊衫整齊各帶法華經一部少則二人共之俱在一時完備不許違誤十三日設立義學三處東廊館十月十三日午時開西廊館十月十三日寅時開延壽館十月十三日巳時開曹溪寶林禪堂十方常住清規惟我六祖大師說法曹溪天下衲子歸之祖設安居以容廣眾此禪堂之設最初之始也至百丈大師立律條以約多人此清規創初所由立也自此凡天下叢林皆有禪堂以行清規名為十方常住雖千萬指如一人之身頭目手足之相須耳惟曹溪禪堂自六祖之後今千年矣久而遂廢凡本寺僧徒分煙散火居止不一而清規不行即十方衲子禮祖而至者茫然無歸雖有祖庭之設無復清修之業甚至不異編氓豈禪源根本之地焉老人蒙聖恩度嶺承當道護法盛心不忍祖庭之零落命寺僧延予以整理之予至則苦心一志以中興祖道為心除修殿宇乃清寶林舊址僧房填塞遂捐資別買空地移僧房七所闢成一區復立內禪堂一座以安常住僧眾立外堂一座接納十方往來除常住香燈外別捐己資贖紫筍莊田山園地土以為供贍名為十方常住安居既就四事既周恐居是堂者不能律身進道及堂中主者不諳古德清規事有差舛言行乖違有壞法門不唯有辜創立之心實負龍天護法之意凡日用事宜略設條例如左賓主各宜遵守以圖永久光揚祖道庶使法門不墜道業可成老人仰續六祖如綫之脈亦稍攄其本願矣凡我弟子務宜守之慎勿輕忽佛說常住有二種一常住常住即今之寺立住持以主之稱曰長老為一寺領袖一十方常住即今之禪堂立堂主以主之為十方領袖故居是堂者無論內外皆稱十方以發心修行志超方外非世俗比也其清規禮法如住持例但住持與眾僧有上下之分若主禪堂法食均等者則有師資之分稱曰堂頭如今之少林若但掌禪堂事務稱曰堂主與眾有賓主之分即今之諸方凡在堂之僧日用助道四事因緣皆實賴之叢林一切大小事務皆仗荷之眾皆拱手而已非細事也是須遞相恭敬內外和合以道為懷勿妄生議論以求過端所處禮法清規自有定例務安分守成勿妄增減禪堂之設不輕堂主之任甚重以十方眼目指矚一人直須言行端潔以副眾望故居是任者務秉慈悲心廣大心軟和心忍辱心謙下心以菩薩修行心如橋梁如大地方堪荷負眾生乃稱玅行故凡日用飲食與眾同甘苦不得私自偏眾滴水莖菜以眾為心不得專任己意以取譏謗眾僧有過當白堂中板首婉言方便處之不得遽出暴言麤語任情呵責不得苛刻佃民以招怨謗凡一應執事務要斟酌賢否不得妄用匪人常住錢穀當撙節浮費不得過用若係當用宜與板首預先商確可否查書記簿明開支銷不得專任己意堂中歲計即常住租課每年不足三分之一所欠甚多並無實法但憑大眾修行以感龍天外護俱在堂主一肩募化萬一不足大眾只宜同甘淡薄不得過求豐美妄貸債負以累常住作務行人苦心勞力終歲辛勤冬夏二季必須量給單布以助道心但常住歲計不足實難定規是在堂主多方設處否則不能以安行人其堂中在單僧眾理宜均等但力所不及勢難措辦貸則返累常住難以持久若就八月會中緣難一定抑恐預有借辦當即填還今照所有施利先除還所負餘則斟酌多寡量散堂中以助道緣難為定例若更有餘者存𫎓以實常住不致空虗庶可持久儻有施主專意布施隨所發心不屬常例堂中歲計全在八月會中施主齊集所有齋僧布施米則入庫其有銀兩當立櫃一具簿一扇書記請公正一人同掌其有折米銀兩即當據實眼同登簿不得移作本色乾沒其辦齋銀兩亦登入簿儲積日逐當眾支用書記別登支銷簿以備稽查堂主不得私自出入其有念經拜懺銀兩亦登入簿以待會罷通融散眾堂中不得執為己有以在道場內外一力故不得專若外有送茶果之資係堂主者堂主自收入己有送堂中者及榜疏佛事等頃是在堂中專執施主專心則聽公取如越例而爭者準清規例據其所爭照數倍罰辦齋一供如不遵者不共住堂中坐單僧眾俱係作養本寺僧徒離居不遠切近親朋但恐熟處難忘不得時常託故回房縱意妄為飲酒博奕遊蕩嬉戲或酣醉到堂觸穢神明輕欺禮法犯者堂主白板首重者不共住輕者當眾罰跪香一炷懺悔改過若不遵者亦不共住在堂僧眾皆老人作養以光祖道唯以修行為心各宜謹守戒法調練三業制伏過非勿使造業不得聚首妄生議論蠱惑正人以啟事端或勾引匪人破壞常住盜取什物違者與犯者同坐堂中一切事務及歲計周支俱在堂主一力擔荷以一人而肩眾事誠難一一恰好倘有差失大眾亦當體亮念其勞苦不得求全責備妄指過端以生別議若果有過差當會同板首就方丈中茶話欵敘諫正不得遽發麤言以傷道體凡十方遠到衲子俱在外堂旦過寮安歇必須入堂問訊板首即當領眾回禮敘謝知賓欵茶不得坐慢取辠十方若是知識法師及高賢衲子即白堂主當延入內堂寢室安居或經冬夏務盡心恭敬供養大眾朝夕咨請法要不得輕慢以增罪過若在旦過寮借歇三五日者其齋食皆出內庫堂主務要時常經心檢點勿使缺乏當立寮主以司接納若內堂遇有辦齋次堂亦當普請禪堂事務至簡租課只就板首催取或堂主親徵故執事不必多立但知客一人必不可少以應答往來賓客接待十方衲子此職務在得人如缺其人即以堂中直日僧代管客至必須欵留待茶若施主專至者必白堂主禮待勿退信心若十方衲子亦須辨白賢愚勿輕去留叢林公務有事不分內外一例普請此天下古今之通規也今本山道糧則施主親齋莊租則佃民自送打柴則行人入山此外無多勞役唯有溪邊運柴園中料理蔬菜而已如遇普請堂中止留直日一人看堂其餘齊赴不得躲避違者罰跪香一炷天下叢林無論內外法屬同體而在堂者賴行人以助道業行人施力用以資修行其實勞者居多非道心堅固者不能久甘苦行大段非世俗役使者比也凡係常住公務而禪堂板首領眾指點作為一一皆聽不許抗違若各人私事非係熟情不得私自驅用即有務下行人叢雜或致喧爭及過費食物或偏眾飲食犯種種過者先有典座聽其約束如不和合聽堂主處分照清規例去留任理堂中儻見有過者亦當白堂主治之不許徑自麤言辱詈以致諍論以行人可否皆堂主通達其情非一偏可據故其莊民非公事不得擅用安務下行人專在堂主檢點安留堂中不得私情強留親友恐有不法破壞常住以累舉者事發有犯連坐在堂皆係作養本寺僧徒今見叢林有緒規模可觀或有本寺後進之徒素無德行不服受業師長教訓希圖安閒快意假以入堂為名者決不許入或已入堂不守清規戒律任情狂為不隨眾禮誦專一養嬾或不時在外仍行飲酒茹葷全無慚愧只託虗名不務實行攪羣亂眾者堂中板首悅眾請堂主同白住持頭首即遣出堂不許久留以傷眾德如不遵者住持當以法治慎勿狥情養成後害天下叢林自有百丈清規永為成法但本山禪堂名雖十方非諸方比也以老人入山之初切念祖道衰微僧失本業老人志在中興以人材為本故始捐束修以教習沙彌及披剃則建禪堂以教修行捐衣資以置供贍種種苦心作養無非上為六祖以續道脈下接十方以光叢林今奈老人薄德不能以滿本願中道棄置而去則立十方堂主以代老人之勞但一應所用欠缺尚多堂主縱體老人之心願亦無老人之道力恐有缺漏不能周至本寺頭首執事耆舊大眾各宜體亮當念祖庭無禪堂不足稱道場無堂主不能接十方保多眾若屬本寺未免狥俗則不久而廢是故本山與堂主有賓主之義各當以道為懷賓主各盡其禮不得任意苛責以傷和合則有壞叢林以負老人建立之意獲罪六祖取譴龍天是當謹戒右上條件甚多不能備悉即此所列事宜雖非古規乃切救時弊就此寶林道場苟能一一遵而行之則祖道之興在此舉矣幸勿視為尋常輕而忽之有負建立之心也凡在堂者各宜勉之萬歷四十一年十一月十二日中興曹溪寶林禪堂憨山老人德清書於十方常住憨大師曹溪中興錄序歲庚子余備兵南韶念曹溪末法之湮而佛界之幾為廛闠也悉逐諸屠酤亡賴及所畜雛豚鴈鶩之屬戒僧徒永斷酒肉即客至啜茗或飯蔬食庶幾稱清淨道場以無為肉身菩薩慁造累劫阿鼻惡業諸僧徒始而懍懍既乃讚歎踊躍若出湯火而沃以清泠語具余粤遊草中是時憨山大師方演法五羊遠近緇素仰若龍象余將以入賀萬壽行慮諸僧徒業習難洗末法且終就湮就請大師來主是山余從五羊面叩之謂寶林一片地千古一大事因緣非師孰與肩任師唯唯送余及靈洲而別迄今辛酉余復以籌海之命入粤過寶林荏苒二十餘年真屈伸臂頃而師之去寶林且八年所矣睹所更建條布犁然肅穆僧徒皆循循披緇諷唄視昔犢鼻荷鋤酣飽目不識之無字已恍若奪胎蛻骨在三生前者其跂慕師而冀旦夕復來不啻赤子之慕慈母因索余數行走匡廬強要師無何余蒙聖恩召還陪都歸舟薄清溪未及曹溪者三舍寺僧以師尺一並所纂曹溪實錄來發函而首以夢幻泡影語相質葢深有感於塵世去來離合之無常也及繙閱實錄則種種皆有為法夫既云入妄想中種種皆幻則寶林曹溪亦幻即梵宇遺蛻衣等當無不幻焉用此科條森列米鹽纖細以煩僧徒且實錄中不以常住法為僧徒律令乎一切有為皆常住法而所云夢幻泡影則不住法也夫有常住而後可以不住有不住而後可以常住常不住有常住常不住而後可以無住無不住惟常住而諸夢幻空不礙有惟常不住而後諸法有不礙空諸僧徒由不敢侮法入不泥法斯於我師所纂實錄所譚夢幻與所感去來離合空有相攝而不相礙是即佛祖本來之旨亦古德無盡之旨余且與師向夢幻泡影中權住幾劫更作商量師其函為一轉語報余天啟壬戌孟秋南京光祿寺少卿西浙祝以幽撰
