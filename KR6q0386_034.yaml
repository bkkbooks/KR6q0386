body:
  text: 侍者福善日録門人通炯編輯嶺南弟子劉起相重較贊天衣觀音大士贊稽首大悲主圓滿具足尊晏坐法界空皎若星中月普應衆生心如月臨衆水衆生日用中不知大士力欲現微妙身故借畫工手畫工與大士同入不思議影現一毫端如春在百花於最微妙中全體一齊現莊嚴極妙麗瓔珞百寶光天衣覆其身如薄霧籠月宛在白毫中覩此希有相故我一瞻依頓入寂滅海是知求者心清淨如止水感此微妙身隨念悉成就以此願所生同證金剛體常住照世閒解脫一切縛草衣觀音大士贊大士無相胡為示俗草衣蒲團隨意具足鬚髮抓搔不是不剪故意留之刺俗人眼大士非俗俗在觀者如空中花翳之過也能除我見大士即我既隨類應有何不可又如痛處痛者自知若知大士真俗皆非海潮觀音大士贊森羅普印性海湛然境風一擊波浪滔天圓滿法身端然常住於波浪中光明彌露是故衆生識浪作惡法身潛為見聞知覺是故智者於見聞中一念返觀業海頓空大士救苦匪從外來自心顯現不假安排既唯自心何用外尋但聞聞性名觀世音海月觀音贊海中一月大士坐於滿月之中惟我大士圓通妙應入生死海如月普印清淨光中法身湛然煩惱波浪一任滔天煩惱愈盛法身益顯故於衆生隨順不遠如水涵月月不離水光光相照原無彼此我觀大士不離此心故求之者如響應聲常光不昧死生不隔寂滅現前自然超越空海大士贊生死若海世界如空一片身心放捨此中空水混融波濤不惡此唯我師是真解脫現天大將軍身贊諸佛所證圓通門實從衆生六根入六根一際有淺深獨有耳根最圓滿大士故從耳門入根塵兩忘觀亦捨生滅滅已寂滅現一念與佛衆生等法身平等無不融十法界身一齊現但隨所願即得見猶如空谷答衆響是知天大將軍身求者有心即應手一身即具一切身如海水具百川味智者能離色相觀一切根塵俱寂滅降伏六魔大士贊我觀大士不思議常在生死苦海中身心普入諸有情降伏魔冤利含識諸魔不止八萬餘都以六根為橐籥六門寂滅妙用全即是大士威神力魔與大士本不二猶如虗空與日光若空與光有差別大士即為魔所攝是故禮拜及稱名不思議力應念現蒼崖翠竹等法身如如不動真解脫降十二魔大士贊佛未出世魔界空佛一出世魔即有佛魔本自無差別但從衆生顛倒見根塵對待魔壘封心境兩忘魔隊滅是故觀音妙智力降魔但只淨根塵六門洞逮法界空佛魔一時俱不現我今頂禮不思議願以無畏施衆生令我頓入圓通門常使諸魔為法侶魔能隨念建法幢始感大士威神力圓通大士贊惟大士身無處不在故大士心圓通無礙十方衆生原非分外色裏膠青水中土塊既無彼此難分疆界所以應求如此便快刺繡大士贊有引嘉禾夏母范氏年五十二持齊三十五年日夜誦金剛經偶患瘻疾苦劇婦馮氏性至孝願以身代乃刺繡觀音大士三年無懈成二十餘幅母疾果愈步履勝常婦竟病且死母思婦言笑如生其子錫書乞為之贊贊曰以無緣慈其身普遍入衆生心如針引線媳代姑病刺大士身隨手而應若影與形姑病既愈其媳亦死足見體同原無彼此媳託大士死亦不滅絲絲縷縷出廣長舌又法身本無形形隨衆生有衆生妄想興法身即出現故此有心人不憶念別事專注妙法身皎潔如光素乃以觀念針牽引妄想絲念念透法身絲絲成妙相精誠入微細毫髮無滲漏儼於一真地幻出無相身圓滿清淨心成就圓通根是故我瞻依頓入不思議繡渡海大士贊三毒海中波濤正惡頂𩕳上行全不濕腳入衆生心無處不遍從妄想絲法身出現念念不空心心要透普門示現自然成就千手大悲菩薩贊有引古婁居士正法以夙習緣一心頂禮千手大悲菩薩心持神呪精勤有年冀仗威神一生取辦因思諸佛菩薩救護衆生原無定法如溺大海隨得何物依憑必登彼岸又如雪山衆草無不是藥是知衆生有能願出生死者不論參禪念佛持呪誦經苟能的信自心堅強不退未有不出生死者況恃大士同體大悲加持之力及神呪力豈不一生取辦乎居士來參匡山請益老人無法可說乃為作此贊貽之若了明暗不二之旨則聖凡路絶生死情枯則日用頭頭通身毛孔皆大士手眼光明赫奕時也居士應如是觀一心具足不假外也贊曰衆生煩惱八萬四千以黑暗故六道周旋在大士身變成手眼毛孔光明隨黑暗轉是故衆生有苦必呼隨呼而應其暗頓無衆生大士原非兩般明來暗去應念現前諸有智者但求諸己凡聖二途本無彼此如燈破暗兩不相到以無二故乃見其妙能如是觀大士即己禮拜持名如水入水但從衆苦極處一提光明照耀日夜無虧四臂觀音大士贊通身手眼何只有四於無盡中聊爾如是寶杵空魔真經無字總是神通不思議事禮空中如來大士贊空中如來從何出現恰與大士當頭覿面自蚤成佛何必禮他將他顯己畢竟如何示現不一禮念不二普現色身真不思議火光三昧大士贊般若光明如大火聚大士此中入清涼地衆生煩惱乃般若光是故大士妙應無方寶掌菩薩贊問師是誰自稱寶掌伸手摩空忽然作響空響何聞手摩何觸倘遇毒龍一時難縮準提菩薩贊我聞諸佛出生處本從微妙祕密印密印即是諸佛心散入衆生妄想夢夢想若破諸佛現猶如寒空見日光若破衆生煩惱雲現仗如來密呪力持呪即持諸佛心我心原是祕密呪三緣會合本不二是故一念悉具足但能日用常現前如子得母不捨離佛心既入持呪心不用求佛自解脫日光菩薩贊有引曲阿邑東之觀音山廣福寺者有宋神僧號日光菩薩所建也菩薩初示逆行比丘不撿戒律時人眇之且責以建立道場乃處處現身一時募化尋其跡者猶然未出山門也四方感而異之遂成寶坊臨終自露其名至今號為日光菩薩寺廢住持通溙新之立相安奉請余贊曰惟日在天光明朗耀山川幽谷無處不照垢不能濁晴不能昏如水中影似影中痕心在衆生至神至靈與佛無二況比丘僧蓮出淤泥香潔不染摩尼處穢光明不減是故至人超乎垢盡不處形骸豈拘凡聖破壞威儀示同遊戲肉眼著相不知誰是不出戶庭身遍十方本無去來如日之光即生盲人賴以成事色相莊嚴猶是唾涕其跡如空其應如風隨處示現不約而同一日千古一心萬劫是故大士其神不竭維摩大士遊戲園林贊不見淨土故不愛住不見穢土故不厭居僧俗相狀是實是虗男女雜遝是有是無口大如空舌大如口不會說法以默遮醜身不是病以病病身苟非借用可笑殺人文殊未至安排等待及至到來一場敗壞千古被瞞見者圖度不是世尊大難摸索三十二人都被掉弄幸有文殊閒撕打閧我不識渠渠不識我且待彌勒下生勘破方才散夥陳如尊者贊象王遊行象子隨至聲氣相求緣會而聚以冤最重為道至親如車合轍是必有因三十三祖道影贊初祖摩訶迦葉尊者金色之形金剛為心奉持慧命常轉法輪世尊拈華破顏一笑至今令人思議不到二祖阿難尊者多聞如海飲縮法流諸佛出沒不離舌頭鼓簧法化節拍成令是故我師為偏中正三祖商那和修尊者般若靈根夙生已證故師將出瑞草先應以心印心如火投火狹路相逢定沒處躲四祖優波毱多尊者一人心空魔宮震動握金剛鋒誰敢輕弄若肯回光狂心頓歇禮拜歸依諸罪消滅五祖那提多迦尊者已悟本心如日照夜示生死夢光明超越師法本無我心不有如空合空舌不出口六祖彌迦尊者都因此來不為別事鬧市相逢自示其器縣見未然蚤知今日當行買賣不論價值七祖婆須蜜尊者從熟路來忽逢親友一言論義頓知未有乞甘露味示虗空法若謂有得落七落八八祖佛陀難提尊者不是不言言之不及不是不行本無踪跡今遇其人乃可開口從此便行不墮窠臼九祖伏䭾蜜多尊者住母胎中經六十年只待師來方遂前緣頂上光明原是本有一刮便透如獅子吼十祖脅尊者指地變金隨手而現聖人即至何等快便似乎空谷應聲答響是知我心本無來往十一祖富那夜奢尊者佛不識佛眼不見眼更向他覓故遭檢點將謂渾全蚤被解破猛省將來方知話墮十二祖馬鳴大士馬之悲鳴故自有因地涌女子原非其人魔本非魔佛亦非佛正眼看來竟是何物十三祖迦毗摩羅尊者從異中來得正知見路逢毒蛇慈悲心現更問毒龍都要調服眼見心知如響出谷十四祖龍樹尊者龍中化龍以毒攻毒尊者妙手一言調伏佛性三昧體若虗空百千法門盡入其中十五祖迦那提婆尊者以針投鉢妙契亡言示佛性義滿月現前至長者家將針引線假他因緣為己方便十六祖羅睺多尊者尋流得源水窮山盡忽見其人知其為聖香飯擎來分坐供食大衆同飲甘露如蜜十七祖僧伽難提尊者不樂王宮天開一路直抵窮源不知其故紫雲之下聖者所依果得童子會諸佛機十八祖伽耶舍多尊者七日而生不墮諸陰其體香潔本來清淨扣門一語答無者誰猛然喚醒當下知歸十九祖鳩摩羅多尊者既生天上不應起愛一念未忘便不自在以般若力復升梵世故來傳燈是其家事二十祖闍夜多尊者無生本具不用求真遇緣而發如花逢春求之太急去道轉遠當下知歸就路而返二十一祖婆修盤頭尊者明暗同體聖凡一路來處幽微莫知其故熟處難忘更求伴侶忽爾相逢肯心自許二十二祖摩拏羅尊者從受記來不為別事同類相從緣會必遇嗟彼鶴衆蜚鳴既久一言之言頓知本有二十三祖鶴勒那尊者從須彌頂持金環來嗟彼鶴衆其情可哀得獅子兒作大哮吼有氣貫天試驗其後二十四祖師子比丘相見索珠開手便有以先所付別來不久知有夙缺特來奉酬將頭臨刃白乳橫流二十五祖婆舍斯多尊者秉般若劒握如意珠雖云暫到此行不虗偶遇惡人恰得好伴因邪打正兩得其便二十六祖不如蜜多尊者從剎利種續傳燈𦦨真嗣不明幾乎失陷從鬧市中忽逢故人函蓋相合乃得其真二十七祖般若多羅尊者莫謂無因相逢便見來處自然不假方便今因其珠乃得其人開池得月買石饒雲二十八祖菩提達摩大師師心甚急其來太早一語不投此心不了冷坐少林幸得神光一臂墮落其道永昌二十九祖慧可大師航海特來多少苦心大唐國裏祇得一人覓不可得如水任器以此傳家是為第二三十祖僧燦大師通身是病不知來處忽逢醫王猛省其故心空骨剛且便行腳遇有力者一擔付託三十一祖道信大師少年出家利根捷疾六十餘年脅不至席學侶雲臻何待小兒以有夙約觀者不知三十二祖弘忍大師來歷不明出身恰好一件未完兩家都了破頭山中黃梅路上往來自由具大人相三十三祖慧能大師樵斧才拋以石墜腰靈根久植從此抽條源出曹溪橫流大地直至如今無處不是十八尊者贊有引昔李龍眠白描十八尊者精妙入神觀者目炫獨趙松雪倣之逼真近代歙人丁南羽畫諸祖道影不讓古人而白描亦稱擅美余嘗請作厲揭圖竟未能得頃在五羊南海侯約我王君出此卷索贊展之光明奪目神情超越如坐蓮華藏中聽如來說自性法門時也詰其作者乃黃梅伯羽汪生敬焚香稽首總為之贊曰清淨界中出生衆妙大地山河總歸圓照鱗介羽毛普現三昧何獨應真為希有事諸阿羅漢皆幻化身見之不識豈得其真遊戲神通咳唾掉臂俯仰屈信皆成佛事師子嚬呻凝神壁觀林下水邊生涯無算搦拳手酸降龍費力但歇妄心自然閴寂抱膝凝眸看他作怪不若持珠念佛自在坦腹熙怡貝葉在掌揮麈默談敲空作響聽之如聾說者似啞不比尋常之乎者也倦倚長松瞌睡打盹伸手從空忽然提醒骨瘦眉長腰曲腳直動步全憑荷負之力晏坐林閒心閒不過偶爾看經便成話墮鉢盂一具蓮華七軸即此是寶何須別物自受用處唯此而已天龍恭敬不以為喜由人愛憎任他束縛一味隨緣自性解脫只在毫端現此神力水底魚蹤空中鳥跡鏡像空花乾城水月作如是觀妙不可說又業識不枯飄流毒海魚鱉蛟龍夜叉鬼怪可笑爾輩一味駕空不敢類墮謂是神通苦被佛呵怕見摩詰幸爾此閒躲過黃檗渺渺長波滔滔巨浪不肯放身是何模樣自己占乾教他下水縱是便宜能得幾幾雖云遊戲終成虗誑喚不回頭倍增惆悵看爾鬬到龍華會中將甚鼻孔見我本師和尚又次依第合贊人持一經俱在目前道路各別養家一般踞地而坐兩眼瞪空有何所見樹此門風懸崖之下以杌為几香篆騰空如雲作雨骨瘦如柴精神已竭還要看經此心不歇背癢難抓聊假一手在恰好處妙不容口有何神通龍藏在瓶手鬆放出任其飛騰猛虎踞地威不可觸用盡神力如貓捕鼠經非文字當人不少莫道眼困昏沉不好耳中作聲似有一物及乎取之拏掇不出明月當空抱膝而坐如是清閒何等快活眉長纍墜時時遮眼老手無力翻費撩捲肚大難遮甚是褦襶只須放下方得輕快破衲藍衫費心連補一針一線十分辛苦手持明鏡自照其醜忽遇獅子一聲號吼同行渡水腳跟到底何必又要纍人纍鬼又園林遊戲圖合贊吾師神通自己有限全仗大家團頭聚面龍不可撓賴此一鉢不是者些縮手縮腳手掐數珠假此念佛捨己從人轉見忽突持一瓣香供養者誰有為功德不若無為擎拳合掌遞相恭敬臨鏡見頭空響谷應手執如意非無意手觀未執時本來何有猛地回頭為何顧伫待伴同行便非大步軍持之中不見傾注想是玻瓈內盛甘露少不努力老不歇心撥起眉毛還要看經以我觀來都成漏逗雖會騰雲未離窠臼前者已去後者未來趁步不上未免罣懷急走不動恐天落雨先戴篛笠又添辛苦貝葉無文真經無字只解口持不知心悟為他有塵故持白拂彼淨此污兩皆不足擎拳合掌同行獨往看他如意好借𭺗癢白羽扇頭皎潔如雪已斷煩惱如何又熱為問鉢盂有無齊飯若遇肚饑施主便辦猛虎爪牙大開血口幸遇我師馴伏而走一卷真經有無量義未展開時先已見諦種種遊戲皆成虗誑試看虗空是何模樣又渡海圖贊苦海無邊惡浪拍天橫身直過誰敢當先惟諸尊者神通自在拌命不顧往而不害以我空故無害我者內外無物故無可捨視淵如陵履險若平隨心而至寓目不驚縱有蛟龍夜叉鬼怪皆為我用以絶對待是知至人處生死中不與物忤物無不容由是觀之法本寂滅但不生心稱為妙絶又各隨其狀而贊之一右手擎金剛塔左手豎掌如作觀想以金剛塔聊表此心豎掌諦觀想念甚深二老病據梧童子搗藥此身不有病從何生對證之藥不知何名三手執如意安然晏坐手執如意如意纍手默然自觀畢竟何有四擎鉢伸空若有所乘本來無物向空妄求求無所得豈不含羞五六老清癯若不勝衣倚賴少年扶曳而行老瘦難行自宜休息何苦纍他拖曳費力七手持貝葉迅疾而行回顧老者若有所待獨行快便替人著急手中貝葉幾乎打失八九老前行扶仗童子少持香相隨作供旁有鬼若歸依狀步履艱難所賴童子此一炷香非為山鬼十飛錫陵空驚起山神尊者徐行回頭顧盼飛錫陵空山神驚起吾師且住法幢在此十一降龍因龍性猛師乃現粗但調其性不為其珠十二老邁無力手撫孤松一生行腳於今老矣身若枯松心如止水十三伏虎猛虎在山威振林木吾師道高自然馴伏十四看經真經無文牛皮遮眼若鑽不透終難放膽十五自在安禪獼猴獻果寂然淡泊胸中無物獼猴最狂亦知歸服十六朝陽補衲十七坦腹相對笑視而已針線工夫固是綿密大眼看來終是費力十八端然禪定大休歇處安閒自在冷眼看他都是揑怪又可笑此僧奈閒不住兩手捉摩不知何故佛戒威儀端嚴瀟灑張拳舞腳甚是不雅枯坐壁觀是渠本分如此缺伸想是心悶雄猛到此弓折箭盡猶張空拳徒勞發憤袈裟著身本來自在又假按摩似為揑怪伸手縮腳左撈右摸原有一物竟捉不著乞食街頭失却一物尋覓不見捶胸頓足不愛打眠去弄石頭儻磕破手惹一場愁反手捶背想是脊痛少年不覺老來沉重挺挺孤松是僧榜樣如此兒戲是何相狀雙手抱頭老大龍鍾不是偏風便是耳聾尊者容儀甚為雅肅但露腳跟者些不足瞌睡起來夢境未撇兩眼睜睜望空著楔是誰趕渠惡氣滿肚忙忙急走恐怕捉住不善經行平地喫跌縱跳起來已成敗闕四肢如拳百骸似綿想遇天寒凍餓使然請問尊者耆年幾何但看兩眉世上不多本來安穩自討事做如浪中船是誰之過又一對經卷爐香兀然端坐兀爾忘緣無思無慮經卷爐香是閒家具二看經持一卷經貴圖遮眼牛皮若透將長補短三橫擔拄杖而行拄杖橫擔獨行獨步但驀直去何須回顧四倚仗觀瀑布倚杖閒看千丈瀑布問從何來不知其故五撫麋鹿坐觀蛺蝶麋鹿忘機閒來伴坐蛺蝶蘧蘧熱夢未破六手執如意坦腹而坐坦腹頽然百無所有可惜未忘執如意手七手執經卷而行既登解脫無礙無罣手中者些翻成話𢺞八坐桃花下回首看經花下諦觀想不為別要使人知空即是色九伸手鉢中撈月鉢中有水水中有月伸手捉拏畢竟不得十遙空作禮平地作禮目前無物莫認虗空是法身佛十一降龍雲中之龍變化自在何故降他翻成揑怪十二撫樹觀泉獨撫枯樁靜觀流水盡世閒人閒不過爾十三仰觀高山流水流水高山知音者少吾師得之出入意表十四䇿杖閒行策杖閒行信步騰騰世閒少有此無事僧十五騎虎而行猛虎難馴見之者避吾師跨之視如兒戲十六坐觀水月皓月寒潭光明徹底此中著腳翻成塵滓十七以指點空以手指空空中何有雖為點破似揚家醜十八持杖坐磐石上已到忘懷快活無那手中拄杖何不放下又金畫騎獸十八尊者遊戲贊三毒已除生死不繫故得神通自在遊戲猛獸獰龍各各馴伏信意乘之任其馳逐以己忘機物亦忘我兩得其忘如火入火十方遊行往來無礙不相識者見之驚怪但瞞愚人難逃智眼若遇維摩定遭檢點於虗空中妄生分別縱是金塵亦眼中屑十六尊者應真圖贊欲行不行若有所思所思為誰吾師自知拄杖橫擔腰包肩荷猛地回頭恰是者箇跫然而立望之若遺遙空舉手對面是誰骨瘦如柴衣寬若袋不是忘形誰堪褦襶鉢中之水空中之龍拏雲之手別顯神通兀然而坐半恨半思鉢水湛然投針者誰飄然若狂愕然若怒縱是無心也落顧伫猛虎易馴迷心難解不是吾師幾成敗壞骨瘦神疲眉長纍極終日撥之手酸無力怯寒㨣衲抱膝若思掉頭不顧思之何為物之在空與爾無競無故索之豈稱為聖鞠躬低首合掌向空見法身故作禮真容篛笠如空拄杖如龍逍遙物外頓脫樊籠瓶本無物何來光怪自放自收無人管帶雙手徒搏兩腳急走雖為他忙却揚自醜衲被蒙頭冷眼偷視香煙起處只者便是十四尊者贊一衲被蒙頭合掌低頭一衲蒙頭諸緣坐透合掌稽首如是信受二降伏獅子抱獅子兒引之奮迅獅子奮迅大威猛力奪獅子兒豈不返擲三卓錫擎拳獨行獨步一錫撐空兩拳搦骨法力無邊稱南無佛四三人共坐如說法狀無舌而說無耳而聽法音如雷無人肯信五默然端坐歷劫妄想忙中不見正默坐時一齊出現六禪定衲被如空脊梁似鐵坐斷十方翻成點額七擎鉢雙手擎鉢滿盤托出汝試諦觀此中何物八大肚坦腹肚大難遮腳長難縮爾自生嫌非關我錯九月下看經月明如晝老眼不困起來誦經聊當解悶十坐具敷坐展開坐具略放一線不為坐禪和身打缺十一布袋行腳肩上郎當手中褦襶如此行腳可憎可怪十二手持如意手執如意如意纍手身著袈裟聊遮其醜十三持珠念佛佛自念佛向何處躲以我求我於何不可十四折蘆渡江苦海無涯腳跟難跕憑此一葉便到彼岸又苦海無際蓮葉為舟倚他當命老不知羞蘊空愛身心空有質如此顛倒莫道不識手中如意腳跟蘆葉忙忙碌碌幾時休歇怕海中怪踏金剛杵張拳努目如見老虎空中放光腳下踏經笑人長短豈稱為僧蠡中測海枝頭尋春覿面不見何名應真倒海移山伸手縮腳自在神通誰人敢說自踏實地看他下水穩穩當當乖不過你神龍之性原不可觸先奪其珠故不敢忤大海之中即得淺處念彼觀音時來救護快活不受被人拖帶老老大大不會自在衲被蒙頭快活欲死任他神通總不如爾十二尊者厲揭圖贊一攬衣渡水行腳遇水路頭差錯沒處回避直須要過二能涉負不能涉者膽大不怕膽小怕倒幸肯負戴兩家都好三四先登彼岸以杖接不能者十分過九一步不及賴他拄杖甚是得力已到彼岸復顧其伴極處一提何等方便五既涉濕衣童子扭之不知淺深信步奔行濕透衣裳返纍別人六已到樹下卸衣結束衣衫絡索泥水汩沒雖是拖過翻勞結束七跣坐樹下作嚏解盹費盡力氣閒坐打盹鼻孔撩天一噴頓醒八神疲力倦仰視盹者神思雖疲兩眼尚開看他昏者甚是癡呆九繫裙正涉水時怕他纏身既脫又著枉費精神十倚杖箕踞而坐箕踞石上神精軒豁忘却疲勞十分快活十一閒坐以如意𭺗癢自己癢處他人不知如意在手任我𭺗之十二倚杖危坐回看行者包裹衣鉢到休歇處何不放下纍他包裹好沒傝補衲尊者贊破落遍身從新要補針線工夫不辭辛苦又一領破衲百綴千補一針一劄甚是辛苦針針要透不透不休縱然補得只好蒙頭看經尊者自己不明却鑽故紙清淨界中翻成渣滓又生不識字強要看經耳聾眼花說與誰聽梵策多年蛀蟲鑽透字腳不真都是漏逗降龍尊者贊多瞋之物捉拿不住一味慈悲觀想凝注又驪龍正睡珠被師偷若值醒時怎肯甘休伏虎尊者贊惡性難調威猛無敵放捨全身費盡神力又爪牙已露猛氣未逞不是吾師幾驚市井調獅尊者贊法窟爪牙誰敢摩觸吾師神通視為玩物浮海尊者贊業海無邊滔滔不竭直登彼岸青蓮一葉此身非身荷擔錫杖空水連天無相之相空非有外水外無流誰能一喝截斷兩頭踏破太虗踢翻滄海線斷腳跟心無罣礙渡江尊者贊越無明流猶在半途妄想未斷水上葫蘆截流而過自可超越何故又憑貝多一葉芭蕉虗質雖是速朽不是借他幾乎出醜腳跟未穩瓦器不堅搖搖蕩蕩幸爾兩全獨往便休何為回頭若等箇伴就不唧𠺕貝葉在掌碧眼撐空高跨獨步吾師猶龍燒香尊者贊老不歇心少不努力撥火燒香不放一息本來沒事自尋忙如何到得無生國
