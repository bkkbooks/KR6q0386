body:
  text: 侍者福善日録門人通炯編輯嶺南弟子劉起相重較記廬山五乳峰法雲寺記廬山自南嶽發脈逆轉湘山界西北轉星子臨武界東至桂陽界吳楚庾嶺分派抽幹東走經武功一帶綿亘二千餘里直抵潯陽前彭蠡而後九江盤踞二百餘里如出水青蓮高插雲漢南臨吳越北眺中原直與五嶽爭雄誠寰中一巨麗也其來脈至圓通過峽突聳馬耳諸峰蜿蜒東走二十餘里特起一峰曰桃花上倚重霄為茲山主中主由是中分兩大幹其一東行列九奇如障至含鄱口北轉起乾剛嶺賓中主其勢盡東北江湖合抱回旋盤紆其嶺首抽東南一大幹為五老峰回望彭湖為西江捍門盡三疊泉最奇絶處也峰下諸蘭若中淨妙前五里曰白鹿洞為晦菴書院傳有李青蓮書堂不可考五老首拖岡嶺隨含鄱分水繞西而南下至星渚為南康郡城此五老之南面也其乾嶺北行至松光嶺分二派東北一幹為蓮花峰下走為吳障山直抵湖口內有慧日諸蘭若外衍平岡十餘里為周濂溪墓南面蓮花峰又二十餘里為九江郡城其嶺北幹西折為烏龍潭下抽一枝十餘里入平原為太平宮委蛇左轉十餘里為東林遠公蓮社處回望香爐峰白香山草堂在焉基尚存其烏龍西行經獅石大林水口御亭竹林佛手巖講經臺香爐諸勝結天池回顧桃花故為山之主剎巖下為石門即一山之水口其山之中曰黃龍潭如花心一蕊諸剎蘭若列布如蕊香幢此盡東幹之形勢也其桃花南發大幹逆背來龍西走中夾一谷最高者曰大漢陽峰為南面之主山雄峙中天面吞兩湖遠挹江南一帶諸峰羅列天際如星拱北一目千里直抵湖口回抱五老此實東南一大觀也漢陽之西盡處為谷簾泉前下平原為柴桑淵明故里從半中而下南抽一枝腰聳一峰孤立高數百尺如空中浮屠曰金輪晉梵師耶闍尊者負鐵建塔藏佛舍利於峰頂下二里許為董奉杏林至今稱之峰下平原為歸宗寺乃王右軍守江州時建宅於此後遇梵師跋陀多羅遂捨宅為寺今有墨池鵝池故寺與東林角勝自唐赤眼禪師說法於此相繼三十餘人在昔西江法道獨盛故為茲山首剎此匡南之大勢也其五乳則自大漢陽峰南面正中特抽一枝起伏數節即大開一障左背桃花曰石人諸峰東走而下外結為棲賢對五老由含鄱分水而下繞棲賢曰玉淵潭水滙為河入星渚左障內抱如倒捲蓮花中有石佛擊竹寶慶三蘭若而寶慶為昔大慧杲英邵武月公晦寶峰悅元首座諸大老隱居處久廢今重修又西為臥龍岡岡下一谷谷中有菴朱晦翁守南康時往來其中刻出師表於石菴廢石刻尚存此漢陽前左障也其右障列果子寨諸峰至黃巖瀑布從空而下注為潭潭上大石多古名人刻前為開光寺乃李中主買建伽藍為諸祖說法處山谷書七佛偈於崖石王陽明破宸濠有題寺左轉過一岡為萬杉寺此漢陽前之右障也其障正中獨抽一枝如馬𩮻下垂峰腹特起一峰如麟角曰胡鼻左曳如屏七峰并峙上插重霄曰七賢昔唐高士劉軻讀書於峰下後晦庵𢹂其子與門人陳正思陳彥忠俞季清甥魏愈時遊其中故以為名土人俗呼七尖訛也七賢之下有五突如乳故名五乳上下相連東抵臥龍潭分水而下此五乳之左龍也由胡鼻拱揖一峰連起曰石鼓冉冉而下蜿若雲中遊龍曲折線亘數里單提環抱中開一掌為古寺基倚七賢而面五老如戟枝蓮其寺深藏如蓮中之蔤為山南半腰最幽處也其中衆水歸壑繞寺而下出石罅中約五里至山足會玉淵河流內纏玉京山入湖山乃淵明舊居處詩云我昔家玉京是也五乳水口有石峰高數丈上有磐石方丈名劉軻讀書臺至今土人稱之志載軻有書院後改為凌雲菴在七尖下古寺兵事迹不可考遺礎存焉後見崖刻至正壬申四月重修工完其寺山場田地至嘉靖初始為民業萬歷丙辰歲豫自南嶽東遊避暑於金竹探幽及此愛其一邱一壑意將息焉且卜居適黃梅孝廉邢懋學用值購之為豫逸老地時黃梅大司馬汪公可受願為興建檀越浮梁尚寶陳公大受約某某捐資鳩材寺遂成金沙於公玉立居士繆公希雍捐置香火田故得安居工肇於丁巳落成於己未郡守袁公懋貞為文以記之由是四方衲子日益至遂成叢林居然蓮花一葉中也寺左嶺舊有望湖亭乃晦菴建基尚存其谷有蘭若一在石鼓峰下曰沖默齊豫有銘最幽勝高敞望湖外諸山一目千里羅列於前如坐華臺出廣長舌十方雲來聽法衆也一在七賢峰下曰芙蓉菴面五老而踏臥龍羣峰羅列如在几席由菴入數里大谷中名香谷有石屏前一大石面如几石下一洞異香從洞中出冉冉襲人不絶一在近寺龍水崖曰木石菴蓋見志也豫亦有銘是皆區內若花心蕊也其寺左谷中有觀音葊遺址志云有古井二口不知所在今得之荒榛中又左臂為歸一菴即接臥龍分水會歸大河又一區也東坡云不見廬山真面目只緣身在此山中以山似蓮花居者如坐花中故面目惟在山南獨五老七賢為最勝其寺居壑中倚漢陽諸峰為屏障回觀七賢五老坐於雲中彭湖繞其外湖外雲山千里內拱暗列於前儼一華藏玄都也梵侶日誦華嚴經聲琅琅鐘鼓交參與松濤泉響共演潮音又與茲山啓生色第未能效遠公刻蓮漏禮六時耳西湖淨慈寺宗鏡堂記武林西湖有山曰南屏有寺居其上曰淨慈宋高宗南渡崇五山十剎而首茲焉寺始於周顯德吳越錢忠懿王建初為永明院迎智覺壽禪師為開山第一代住持改今額大師得法於天台韶國師為法眼的骨孫妙契單傳心印博通三藏達佛一大藏教特顯三界唯心萬法唯識之旨以佛滅後西域唱導諸師以唯心唯識立性相二宗冰炭相攻以至分河飲水破壞正法及大教東來不三百年而達摩西來不立文字直指人心見性成佛是為禪宗於是遂有教外別傳之道六傳至曹溪而下南嶽青原次為五宗由唐至宋其道大盛於是禪教相非如性相相抵是皆不達唯心唯識之旨而各立門戶自梁唐而宋四百年來海內學者曉曉兢辨卒不能起大覺以折中之於是大師愍佛日之昏也乃集賢首慈恩天台三宗義學精於法義者百餘人館於兩閣博閲義海更相質難師則以心宗之衡準平之又集大乘經論六十部西天此土賢聖之言三百家證成唯心為書百卷名曰宗鏡録因以顏堂意以一心為宗照萬法為鏡撒三宗之藩籬顯一心之奧義其猶縣義象於性天攝殊流而歸法海不唯性相雙融即九流百氏技藝資生無不引歸實際又何教禪之不一知見之不泯哉良以衆生之執迷久矣雖性相教禪皆顯一心之妙但佛開遮心病末後拈花自語而自異卒無以一之由是執筌之徒認指失月孰能正之世尊入滅二千年矣自非大師蹶起而大通之竊恐終古曉曉究竟了無歸寧之日也是知大師厥功大矣集吾法之大成使釋迦復起功亦無越於此者豈非夫子賢於堯舜遠耶或曰從前諸祖皆了悟自心者乃云向上一著三世諸佛不許覷著又曰一大藏經是揩瘡膿故紙又見世尊初生指天指地即要一棒打殺乃至上堂示衆未嘗不痛斥文字不許親近教義大師今以和會性相強合一心豈非有違達摩西來之指耶抑諸古德有違一心之義耶曰此正以西來大意不明互起偏見故作今生之事耳即古德機緣皆顯如來之大機大用未嘗非佛之作略即如文殊起佛見法見貶向鐵圍山中又文殊亦曾持刀殺佛其諸弟子入維摩丈室種種受呵是皆諸祖之機用但為遮遣調伏衆生之法藥耳非實法也但今初心淺智不悟如來平等法界故不能達離相之旨惟如來說法以海印三昧印定諸法謂虗空為帝青寶虗明如鏡大地山林草芥人畜森羅萬象靡不現景於空鏡之中而大海波澄虗明洞徹則空鏡之景現於海中猶如印文如來說法以平等大慧圓照法界衆生心念皆知頭數閻浮提雨皆知其滴如此是名海印三昧由是觀之則無一物不是佛心無一法而非佛事無一行而非佛行一切諸法安有纖毫出於唯心之外者乎是知宗鏡之稱以以一心照法泯萬法歸一心則何法而非祖師心印又何性相教禪之別乎是則毀相者不達法性斥教者不達佛心不約佛祖之妙用而執為實法所以正法眼藏難明也可不痛哉今也寺面西湖湖水如鏡四山羅列六橋花柳樓船往來人物妍𡟎歌管遠近鐘鼓相參晝夜六時古今不斷於湖上而殿中如來安然寂默如入海印三昧時未嘗纖毫出於宗鏡即今松風泉響蚓吹蛙聲猶是大師坐宗鏡堂揮麈會義說法時也又何庸夫筆舌哉是知茲山之地甲於中州寺首於諸剎法超於教禪心境最勝到宗鏡之堂當與湖山相為終始矣大師入滅四百餘年骨塔沒於荒榛萬歷某年寺僧大壑求而得之移置於堂後斯實大師法身隱而復現當與茲堂常住不朽矣堂無記壑乞豫以志之徑山淩霄峰記按志龍遊閣居翠峰之頂畫拱璇題承雲納日而虗檐外曰淩霄之閣是峰頂有閣又記峰頂時見五色毫光因有寶光殿似閣前有殿今皆廢矣昔圓照禪師居峰頂十年有坐斷淩霄已十年匡宗扶教且隨緣之句既而古鼎禪師亦居十年由是觀之則先代住山靡不愛其孤絶但峰頂無水風高迥絶非藏修地也月庭法師亦曾於此為衆說華嚴經以此峰乃五峰之主雙徑之祖龍也頃梵懷慧公結菴於頂居十三年矣向苦於水公鑿石得泉可供百人大旱不竭手植引路松冀化龍也豫於丁巳新春登之四望寥廓一目千里豫因題其菴曰空中居志超世也時有詩以記之泉味甘冽以從空中出如天甘露因以名泉海虞尊勝菴記海虞僻處東隅佛化固未易及也豫頃過而觀焉則彼從事三寶者獨盛於他比閭相尚蓋鄉多薦紳先生素為護法有以觀感而興起者信乎佛性本有法化普周草芥微塵皆成佛種第在開導者何如耳今尊勝葊乃月輝法師明公所創公為邑之陳氏子幼即喃喃唱佛名及教習諸業皆不諳獨志出世年十七禮玉峰葊一源和尚為師禮雲棲大師授具戒復詣南都親雪浪法師講肆習賢首教義苦志七年己亥秋歸省母氏於虞山陽露臺掩關三年參究西來祖意壬寅復往諸方所至見老病者叢林多不納無所依歸因發願儻有把茅當與十方老病共之惜未就因循十年壬子秋邑孝廉翁兆吉願捨寺前空地約十畝建十方禪院及養老靜室公喜以為得地可酬宿願邑乘載有尊勝菴久廢開基入地丈餘得古井一口水甚甘冽疑即舊址也滄海桑田豈劫運哉啓工於萬歷丁巳夏落成於戊午秋以公生平持尊勝呪遂以尊勝名走書乞豫以記之曰大地衆生無一人而無佛性十方世界無一塵而非道場第在機緣會合感應道交則彈指出現以翁君之捨地何必祇園以明公之建化何俟百丈即以禪侶安居六時禮誦經聲佛號鐘鼓交參使老者佚病者安愚者智惰者勤勞者息飢者食渴者飲何莫而非尊勝功德耶使雲棲之清規不墜靈山之法道常存若天帝拈一莖草為梵剎殊未可以思議較計求之也且以上祝堯年下與斯民共躋仁壽又為大海潛流潤澤無窮豫也不敏何得而名焉錢吳越忠懿國王造銅阿育王舍利塔記昔世尊入滅茶毗得舍利八斛四斗分作三分天上人閒龍宮各建塔供養爾時阿育王親受一分散閻浮提震旦國得一十九座而明州阿育王塔乃其一也其式亦出自西域而舍利燦爛光明變現隨人各見不同亦有不見者蓋因障有厚薄耳二千年後五代時錢吳越忠懿國王承先業敬事三寶如式造小銅塔八萬四千座埋藏國內名山世未有知者我明萬歷初常熟顧耿光造其父憲副塋地中掘出一小銅塔高五寸許如阿育王塔式內刻款云吳越國王錢弘俶敬造八萬四千寶塔乙卯年記一十九字外四面鏤釋迦往因本行示相前則毗尸王割肉飼鷹救鴿後則慈力王割耳然燈左則薩埵太子投崖飼虎右則月光王捐捨寶首四事文理密緻滲以金飭顧為錢太史之母舅因公為忠懿王後遂以塔付之公得此自號聚沙居士志因也乃送興福蘭若豫東遊訪太史過洞聞上座覩其塔奇其事因記之曰佛以法界為身即草葉縷結皆成佛真體況託象者乎良以衆生迷本法身變為三毒成八萬四千煩惱佛以普光明智薰三毒為三德祕藏故變煩惱為八萬四千功德育王所造蓋表功德之數量也吳越王倣造銅塔如其數盡埋地中意表功德藏於衆生心地冀啓一塔則見一種功德即睹法界之全身如從一隙見無際空是可以色相視之哉法身堅固歷劫不磨隨緣應現太史此塔豈從因地示性空之一隙邪萬歷四十五年佛生日記讀異夢記幻人東遊吳越西還匡廬舟過蕪關關尹玉受劉君邀留信宿適吳門管茂才席之從別道來詰朝席之先至舟訊幻人即談玉受異夢事幻人驚異之及叩玉受出乾城遊草讀記異夢甚悉初玉受奉黔中聘道中病臥下雋驛亭夜夢一偉丈夫長喙突入似有所求而意氣尚陵厲不平揖玉受與之坐問其族氏其人抗聲應曰余宋將軍曹翰也以江州之役多殺不辜自貽伊戚今復何言玉受夢中未悉江州本末但憶翰與曹彬同將乃曰公受曹樞密節制仁厚不殺安所貽戚其人曰余憤江州久抗王命先殺守將胡則尋屠其城取快一時何知死受冥譴一時同事諸人并落異道余獨為豬蓋余生時性多怒罵舌鋒猛毒既得豬報聲多嚄嚄或見擒捉呼號四徹冥中譴罰尺寸不爽乞公拯之玉受聽之悚然因云余尚凡夫何以脫公其人云公性慈悲每見豫輩雅相憐愍可憶往年有所見夢荷公再生者即豫也蓋玉受曾於戊申春家奴以其租負數有豬償者夜夢一人乞命即命奴畜之踰年自斃夢中明憶往事即應曰實有之但不知是公耳今則余安所覓公其人云業報無定昨償一近縣人債不意有緣於此得復遇公今番又不知業運何所言下泣甚哀徐收淚云某幸在唐太宗朝為一小吏聽一法師說四十二章經某為設供感世世為宰官及宋初而報盡遽作惡業轉受此果然幸有夙種善因今得遇公自今乞公凡遇我輩或見執或聞聲或見食余肉為持準提呪或稱彌陀號余暫堪忍其苦定脫此報生人中誓不更造惡業負公也玉受曰此余夙心也矧奉教敢負約其人喜拜謝而去嗚呼異哉業報昭昭不爽如此觀曹翰之始為小吏以聞佛法作一飯僧功德遂世世受福及至善報將盡且為大將而恣殺業豈惡習隨福報而大耶良可畏也以殺業之慘歷受刀砧之苦又六百餘年仍以夙種善根兩現夢於劉君竟乞脫其苦趣然而劉君豈翰初身說經之法師耶觀曹翰之惡報不爽而劉君之善根亦有自來矣幻人初聞其說驚異之及觀劉君乾遊草中異夢記故為之說普告人天以崇放生戒殺之德彰明較著者也且聞聲見肉而持呪念佛尚冀堪忍脫其苦報況出真慈戒殺放生者乎豫是於雲棲之放生所深有感焉敬書此以告本寺知事當依規則凡在所放皆有緣者時看養殷勤說法開示念誦送死皆真實事幸勿疲厭若以佛性而觀則資糧亦彼當有分者幸無匱乏令彼飢虗也太和縣真如菴記太和之西北四十里早禾市有真如菴者乃雲棲弟子廣果所建也果吉安人早歲茹素敬事三寶中年挈妻子出家祝髮於廬山淨業堂受戒於雲棲大師復從古心和尚調練具足歸鄉至太和孝廉羅紹奎捨地五畝建菴請居之以接納往來八年於茲矣久之雲集日益衆建殿二座雲堂齊厨諸所畢備儼然一道場也慮無以贍大衆乃集信心作百子燈會儲其資買田若干畝為常住將以永供大衆四事無缺可以安居精修淨業無外募也事既就緒果走匡廬乞豫為記豫因謂之曰嘗聞十方淨土唯心所變心淨則土淨譬如夢事貴人夢苦事而呻吟貧人夢金寶而欣悅覺後雖空夢時未嘗不有也所謂生死涅槃猶如昨夢況世諦有為莊嚴功德乎昔達摩對武帝云有為之行實無功德淨智妙圓體自空寂雖然未悟空宗之體而棄有為之行詎非枵腹以待王膳望濟其飢乎所謂有為雖僞棄之則功行不成無為雖真擬之則聖果難克苟能達性空而建萬行可謂理事雙修真妄一契者也又何以建立為事行哉若果禪人居然一俗士也中年挈妻子同出塵勞頓修淨戒不十年而道場隨建豈非淨土唯心哉且此菴昔為荒鹵今為道場實成於一念由是觀之則西方淨土不離於目前詎不信哉清暢齊記京口為山川都會而曲阿尤異奧區惠山負郭枕流林木蓊湖光漭漾一碧如鏡岡嶺逶迤萬松叢翠天風時吹萬籟齊發洞心徹耳此塵中最勝處也圖南居士誅茅結廬宴坐其閒顏曰清暢意取晉徐邈節儉清修之意豫丁巳初夏過惠山居士周旋問法及豫歸匡廬居士走書乞記豫因謂之曰夫暢者之反也故天地而厲氣發糞壤而毒菌生人情而百病作是知暢乃氣之和而情之適也嗟彼沈湎富貴耽荒物欲取快一時而為暢是以為暢者也譬夫食毒爽口殊不知積久毒發而戕其生也昔有宦於西粵者嗜鷓鴣味以地多産此足充其欲非此不下食既而宦歸疾作舉體腫潰良醫束手有識者曰此半夏毒也謂鷓鴣以半夏為食嗜久而毒充五臟殆不可救世之嗜美疢而發毒者皆鷓鴣類也居士軒冕桎梏富貴浮雲博學強記潛心佛理究性命之源達死生之故放情霄漢寄興雲林而與造物者遊其所暢者六通四達將廓太虗以為舍潛極樂以為家又豈特節儉清修而髣佛其神理者哉居士課子讀書於其閒將以此暢世其業也豫特為之記放生功德記佛說法身非身以衆生為身菩薩妙行以度生為行故總萬行以六度而首之以檀然住相之施如來所呵以其物我未忘不能平等一視所作之功多成有漏如仰箭射空固其所矣惟其離相之行體合真空即種種莊嚴無踰放生功德為最何也以彼胎卵溼化蠢蠕蛸翹一以佛性視之愍其沈淪苦道而必拯之刀砧火鑊捐靡焦腐之地一旦出其籠繫置之飛空潛淵優遊極樂之鄉慈出無緣悲非愛見同體等觀了無一念望報之心故其功德福量猶如虗空不可思議豈非最上殊勝妙行者乎然人與物巨細雖殊佛性等也且夫人也一飯千金壺漿死報感恩懷德固所不忘況脫湯火於必死之地乎苟觀佛性而施必稱法性而報因果皎然若視白黑固其理也況人有限物無窮今輟一餐之食而活億萬之命其所施者又豈可得而較計耶故佛教弟子以護生為勝行此猶拘拘世外若夫涉世閒統貴賤定智愚無若放生為妙行也近世雲棲特標此行戒殺放生功德感應著之篇章海內奉行甚廣豫往過皖城觀其俗多奉佛蓋由宰官吳公身以倡之家諭戶曉洋洋佛國之風矣可鏡湛公奉雲棲法舉放生社置恆産以長轉無盡大悲法輪豫聞而喜之曰昔智者大師以海為放生池既而天台一宗盛行海外諸國識者謂是所放之生感報地湛公引一時宰官居士之法流度無量衆生同歸性海果真常不昧則蒙恩者轉蛻為人將見忠臣義士孝子慈孫萃集於一方同心護法城塹三寶建大法幢又不止諸蠻奉法而已惟是可徵於一紀二紀之閒收功不遠必有目睹其驗者功德又何爽焉歸宗寺復生松記佛說山河大地草木叢林皆成佛真體共轉法輪意顯三界唯心之旨及於無情成佛世所難信是不達唯心之義耳廬山歸宗寺乃赤眼禪師說法處相繼者明眼知識三十六人其地踞匡山之勝為靈久矣既廢之後琳宮梵宇委之草莽獨寺前古松一株挺立撑漢其根下為樵人剝已去其半枝柯枯悴勢將摧折時達觀禪師過而問之歎曰此歸宗惟存此一剎竿耳奈何遭於斧斤無此則道場之迹泯矣乃率諸弟子運石甃圍以土培之為之呪願誓曰若寺當重興此松復生如故徘徊賦纍丸翁而去不數年果重長皮膚完密枝葉榮茂未幾歲大饑寺有殘僧以松易米而食匠石睥睨顧將伐之適有丐者息蔭其下願乞米以贖匠氏感之乃已不數年閒果清湛公重興其寺竟感皇上頒賜大藏一時當道為建殿宇翻瓦礫為淨土其轉變之機豈不先見於一枯株耶若謂無情能若是乎雖然草木無知是在精誠感變而唯心之義彰明矣觀孟宗哭竹而冬抽筍生公說法而石點頭以法非心外感變由人即枯龜告人以吉凶七十二鑽而無遺䇿唯在志誠其應如響所謂若能轉物即同如來人物同體共轉法輪於是乎徵矣因記之以告來者知此松為法身常住也後世儻有損其一毛即為戕害法身斷佛慧命可不念哉廬山金輪峰釋迦文佛舍利塔記佛法自漢永平始入中國吳赤烏閒西域梵師康僧會至建康設像行道求舍利於長干里吳王建塔以藏之創建初寺此江南塔寺之始也東晉成帝咸康中梵師達摩多羅持禪經至時王右軍羲之守江州見而異之乃舍宅建歸宗寺以居之義熙中遠公至廬山開蓮社於東林梵師耶舍尊者至遠公邀入社乃以所𢹂釋迦文佛舍利建塔於歸宗金輪峰頂身負鐵以為浮屠此西江塔寺之首焉至唐元和閒赤眼常禪師得馬祖心印開法於歸宗而匡南諸名剎皆門下高弟一時之勝號稱法堀西來單傳之道大振於茲山自此相繼說法者三十餘人皆載傳燈及五季而宋道漸衰寺漸頽宋景德皇祐閒再重修之元豐中僧文淨復振及元末於兵自是塔寺廢山場田地盡為民業矣萬歷癸丑達大師弟子果清湛公因禮塔過而歎焉遂啓復之志遍謁諸薦紳檀越同時一力致感皇上敕頒大藏一部劄其徒修慈為住持當道建殿宇黃梅孝廉邢懋學捐資盡贖其山場田地居然一大道場也癸丑湛公欲重修其塔購鐵數萬斤未果即遷化甲寅修慈於吳中造毗盧大像回時塔舍利放光者三度照耀山谷寺後松結子如塔狀者五高八寸許各十三級遠近咸異之乙卯春慈秉師遺命冶鐵鑄浮屠十三級重開塔藏見舍利數百粒五色寶光眩曜人目瞻見者敬禮無不感悅是年秋九月安藏之期山谷震吼如雷者七次聞者皆知其為舍利瑞也慈恐鐵易薄蝕外以磁灰米汁搗而護之取堅密可垂久也豫於丙辰夏自南嶽來瞻禮見其奇峰峭拔獨立撑空狀若浮屠峰頂不二丈許石穴數尺僅容塔藏蓋天造地設非偶然也豫為記之曰昔釋迦文佛入滅茶毗得舍利八斛四斗天上人閒龍宮各分建塔阿育王分布閻浮於我震旦者一十有九惟明州建康者名最著其他未顯閒焉此豈其一耶舍利乃戒定之餘薰凝四大所成者以其血肉毛髮齒骨之不一故有五色之異其體堅剛能貫金石光明奪目超越世寶有堅凝而不動者有流動上下其狀變化不一者蓋各隨感而然也噫諸佛衆生同秉此心衆生以無明三毒妄想所熏故其體臭穢終成敗壞諸佛以金剛心戒定所熏故其體堅固光明照耀常住不壞正報如此依報亦然衆生依報感五濁惡世雜穢充滿諸佛淨土七寶莊嚴故雜花云其地堅固金剛所成是所謂唯心所變豈他力哉佛非淨土不居故舍利非勝地不載維此金輪匡廬南面傑立霄漢勢壓羣峰即人世空居而佛法身舍利常住其中豈小緣哉雖真常不壞而世相變遷故其浮屠興廢不一欲垂永久原其建立者之心與復者之志必有願力存焉是為記明州鄮山阿育王舍利塔記梵語舍利羅此云身骨惟我世尊於曠大劫以金剛心熏修金剛三昧直至成佛會無異念故變緣生五蘊幻身成金剛體即如來法身常住不壞永無生滅佛十身中有力持身此其一也如來應現娑婆示生迦維說法四十九年化緣已畢於拘尸羅城娑羅林雙樹閒入大涅槃時彼國王如法茶毗得舍利八斛分為三分天上人閒龍宮各起塔供養而人閒八國分之摩伽陀國阿闍世王得其一分有八萬四千顆至阿育王有大神力能役鬼神乃碎七寶末造八萬四千塔遍散四洲而南閻浮提為身教地故塔居多其來震旦者一十有九惟金陵長干與明州鄮山顯赫最著豫幼出家長干屢睹光瑞種種不可名言雖未至明州蚤聞感應之徵今見理公所寄育王山志讀之感而歎曰此我本師現在世閒說法處也夫舍利者何乃一真法界常住真心廣大光明之體也諸佛證之為清淨法身菩薩修之為金剛心地衆生迷之為阿賴耶識其不壞者為佛性種子名佛知見以其衆生本具故佛出世特為開示使其悟入祖師西來指之為心印是知衆生與佛無二無別第染淨熏變之不同耳以衆生無明業力念念熏蒸故感四大五蘊腥臭穢不淨無常敗壞之身其不壞者為輪回業果歷劫不忘菩薩以之為定慧熏習得意生身調伏衆生淨佛國土其不壞者微妙功德成就莊嚴惟佛證之為清淨法身常住寂光身土不二其現大身則無量光明相好居華藏莊嚴名實報身其現小化則丈六金身示生人閒與民同患而衆生見者但見緣生之佛不見法身真體將顯法化無二無常即常故入般涅槃而舍利攝受衆生名力持身以示金剛不壞法身常住世閒本無生滅去來之相故所現光相種種瑞應不可思議隨衆生心感而應現者即法身應機說法以離言三昧直指衆生本有佛性欲令見者當下了悟自心頓見法身不生滅性此與靈山踞座末後拈花有何異哉故佛出世說法無非指示此一大事而於法華一會開示衆生佛之知見以此知見即法身慧命故云此經在處應以七寶起塔況佛知見又為文字所障至若諸祖直捷示人而形於棒喝譏呵怒罵之閒而人又以機鋒目之將謂別有玄妙故悟之者希今者親見法身如來覿面為說不生滅法而人不悟諸己概以光明瑞相視之誠謂當面錯過矣可不哀哉嗟夫吾人沈淪多劫流轉生死今者何幸何緣一遇希有難遭之事猶自迷頭認影豈不上負真慈自昧本有可不為之大哀歟昔佛於法華會上自說法身壽量常住不滅此但託之空言未有若此見諸行事之深切著明者惟普賢以十大願顯示法身乃曰請佛住世勸轉法輪常隨佛學之三者義昭於此初僧會至長干吳主孫權命求舍利期以七日不應展三七日中夜猶不應會稽首哀請曰佛以慈悲為心苟不應則使此方衆生斷滅佛種矣於是痛舉佛號三稱遍身毛孔血汗迸灑即聽瓶中鏗然有聲光爥天地啓之則舍利宛在瓶中矣劉薩訶身陷地獄將無出期乃聽梵僧指求舍利為懺罪地故感寶塔從地涌出是知康為人劉為己均皆普賢勸請之意也若夫種種莊嚴供養守護讚歎者豈非常隨佛學者歟且也佛性之在衆生固其迷矣若夫般若光明常照而不昧者發於行事若世之忠臣孝子志士仁人凡所施作致君澤民而為不朽之事業者豈非法身所流衍乎其歷代帝王崇奉興隆者詎非法王之利見乎總之無一衆生而不具有此性故見聞隨喜禮拜供養者無異親承接足即布身命磬所有竭內外施而為莊嚴特為自性受用地耳若夫一睹舍利頓破無明了悟法身長揖生死永出迷途者是在上根利智夙具聞熏緣熟於當下者不無其人也由是觀之纍代王臣興建於前太宰陸公重興於昔司馬郭公再振於今且託法身於毛端三昧以見不朽是又皆普賢願輪所持也理公豈佛稱空生身子為長老乎豫自信靈山一會儼在目前說法音聲熾然無閒故特書此以告見聞隨喜禮拜供養者不得以色相求之也
