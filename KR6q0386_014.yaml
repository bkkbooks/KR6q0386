body:
  text: 侍者福善日録門人通炯編輯嶺南弟子劉起相重較書問與棲霞懶菴師吾師高臥煙霞燒松葉鬻鹿泉蓋三十餘年矣其視塵類如緣鉢蟲耳況此瘴鄉逐客乎楞伽筆記蓋紅盔下驢前馬後生涯奉供山中諸大士聊以泄此中毒氣耳聚首想發一大笑也與密藏開公昨日侵晨繞塔畢即抽身贊經及至奇哉是法華經藏深固幽遠無人能到此中可容無數分身諸佛是故遊戲林間相與謦咳彈指必聲震大千但此中衆生不覺不知耳公法緣若畢可來共坐食頃若未畢當究竟真實無以疲勞生厭倦也法身不動於何不樂某和南與悟心首座昔調達害佛佛以慈心三昧攝之竟以成就佛之忍力達磨初至少林中毒者五思大師以弘法被害者七此佛祖之槩可見者況吾輩生末法道德愧不若佛祖其時又更遠何足怪哉但老人本心為曹溪祖庭生平切以六祖不欠汝命一語作如幻三昧觀其定業必欲酬償期于生死路上無少罣礙果若欠渠宿債亦任酬之而已若其不欠如以禮從人其人不受耳此中大光明藏纖塵不立方是真實大受用處子其安心勉力盡道與體玄小師朽夫投身火宅真成毒海自非鐵石肝膽冰霜心地何以坐消白日諸所堪能惟浮漚脆質幻化死生不識可能苟存一息以待諸子掀髯長笑於高空明月間否顧多劫塵習非此不足鎔冶儻仗諸佛神力於此煆煉薰修使金剛種子脫體光明直令微細緣影蕩然淨盡成就最上因緣彌感聖恩何惜一死公萬萬勿以常情為朽夫憂也寄無相禪人佛言人身難得中國難生正信難發正法難聞今座下生塵勞中具此正信臨於晚年為佛弟子得遇善知識幸聞正法此難中之難蓋無量劫來善根種子薰發故遇緣而熟非偶然也今後將念佛話頭把作命根一息不可放過間忙動靜一切不失乃至念得夢中純熟即於大限生死頭上少分相應切要從前一切世俗煩惱習氣一齊斬斷於二六時中切不可橫發縱然發時就要照破決不記憶再結生死業又作地獄種子也與龍華主人嘗聞菩薩捨身喂虎割肉喂鷹臨當捨時實為難割乃作種種觀門所謂觀身如幻觀世如空百千方便而後捨者何也以其苦行難行耳今者賢師弟子捨此身肉手足喂諸菩薩之貪虎飼諸知識之餓鷹此身有限食者無窮且又歡喜無厭不假方便不生一念退墮之心若非賢師弟子以此求無上道即是來此末法酬償宿債也若酬之過當返徵其剩是則將來諸方知識定作今之龍華主人而賢師弟子定作諸大知識也此乃諸佛誠言非虗語也唯海印一人怕結來生債時時思算現前酬償當願以法供養而準折對之所謂於食等者於法亦等此本懷也但此時法力未充貧於法財待積畜三年定箕踞龍華樹下作師子㖃以謦咳之聲振動三千世界也是時譬如然香燒指無始宿債定要一時酬畢呵呵與月清上人生滅去來聚散起止皆病眼空花苟幻翳未除不無顛倒見耳朽夫生平志向上事於徹骨冰雪中死者不一唯博得𮌎中無事此外更無所有將謂修行無靈驗及經此段因緣於痛徹骨髓處拶破從前關捩子於生死臺前如入黃檗之室及遠投萬里飲瘴煙面忍飢虗日坐尸陀林中唯披閲楞伽忽見從上佛祖不是恁般知見始知從前皆沈幻化光影門頭惟此足超三十年行腳看來古人出家了生死不是等間事作真佛弟子者亦不是等間人説禪道佛法亦不是兒戲朽夫所謂因王法而入佛法者是知諸佛神力調伏衆生不止一方便今日可謂將此身心奉塵剎是則名為報佛恩也萬里無可為信特此報公歡喜耳其他復何所云與印庵法師臨行相視於圄中悲喜之狀宛然在目別來雖坐瘴鄉飲毒霧時復以此高懷消熱惱耳罪夫年來此中法味不少古人云鐵輪旋頂定慧不失罪夫何敢有此蓋三十年中歷此工夫差亦可見公知我者諒不以為妄也與方山衲雲師惟座下踞棗柏之室受天人之供挹性海之波運悲花之楫蓋已十年於方山石堀間也其所享法樂過於四禪尚以智眼覩迷方之客乎不慧身臨瘴壑心入寒空遙聆梵音嘹喨幾墮無想若非座下聲震塵剎則是不慧耳聞十方也不慧墮此炎荒不減鐵圍昔聞菩薩亦向此中作大佛事而如來光照兩山黑暗之間皆成淨土此非諸佛大言也近於穹廬中所作公案聊持一葉奉供九會之衆想十方諸佛見此希有事亦再嘆奇哉天南雁飛不到尺素難通獨有文殊右手可伸而至儻不捨有緣惟願攝之與幻一律師古云割髮宜及膚剪爪宜親體蓋爪髮疏而膚體親也憶下劣被罪之秋法門震蕩神鬼驚泣座下辟穀飲水再四周旋恨不得以身代之非有切於肌膚者又何以至此哉是所謂關心法門有同體之休戚者是以法為懷願以法謝楞伽一部是足以酬之與廬山圓通寺大衆曹溪糞掃頭陀敬白廬山圓通合山大衆惟吾曹溪六祖大師法道由南嶽馬祖大唱於江西至有宋時最盛於廬嶽而圓通甲於諸剎為第一弘法之所訥師峻節大覺高風迄今五百餘年水鳥樹林溪聲山色不異當年諸老升堂入室時也況殿宇巍峩鐘鼓交參向來無恙惜乎聖人已遠此道無聞汝等諸人墮於流俗但知粥飯氣息不知有從前佛祖向上事黑業更深心光埋沒以致龍天見怒回祿生瞋一旦遂為煨燼使琳宮梵宇委為荒榛是雖五運使然實由汝等業火所燒變淨土而為火宅也汝等能知及此乎所幸佛祖有靈先得總持作汝等依歸心忘人我力合異同令汝等各捨貪癡共為一命從前法道盛時不過合千萬人如一身耳今既如此又何患叢林不重興祖道不再振耶苟從茲以往心心不退念念專精一直向前至死不二即可化穢成淨土變火宅為蓮池況片瓦根椽咸出十方之力復何難哉所大患者心不等誓不堅耳總持長老來曹溪具述大衆懇意欲老夫權為汝等作導師此雖法門所當為吾徒分內事但老夫夙業未消罪根未拔安敢率意妄為重為法門笑具儻蒙佛祖冥資聖恩浩蕩使老夫頭顱光爍此時第一瓣香以祝吾皇聖壽第二瓣香以酬佛祖深恩第三瓣香則當供養南嶽廬山諸大知識定當熏及圓通是時汝等聞香悉知憨山老人降生出胎時節也汝等勉力幸勿遲疑珍重珍重與宗玄禪人公靈根夙植不失正因閉關藏修屏絶外緣正是吾輩真實行履但不審曾蒙善知識開示得正修心法門否關中定非悠悠歲月者比也書中具云因看老人金剛決疑夜夢通身骨肉俱被換却但求換心不可得此是公夙習般若靈機渙發因公靜中妄念潛消不覺夢中現此境界耳雖是夢幻正是用心得力處若以此夢時時參究向心不可得處著力看覷覷來覷去久久自有真光獨露時也豈不見二祖侍達磨乞師安心磨云將心來與汝安祖云覓心了不可得磨云與汝安心竟祖於言下大悟遂受西來衣鉢公求老人換心正好與此公案同參即今老人問公將心來與汝換公又作麼生把作夢中語會耶不作夢中語會耶豈不見佛言生死涅槃皆如昨夢政恐公將夢中事作實法會耳金剛以六喻為入般若之玄門且夢為六喻之首公能以此夢事例觀諸法則法法如夢畢竟不可得不可得處為般若歸極公若未了但將二祖問達磨公案時時參究自有忽然夢破時節也與雲棲寺大衆老朽仰暮大師三十餘年向以業牽未及一造丈室自恨生平闕緣昨持瓣香贍禮龕前儼在常寂光中與諸法侶周旋謦咳想大師必發一熙怡微笑也老朽自還匡山緬念大師存日説法不減靈山其調衆條章因事制宜即乘時律部精詳曲盡惟諸大德受化日深根已淳熟況枝葉不存唯有真實故叢林安逸四事充盈宛然大師踞華座時不減毫髮故大衆身心恬怡寂靜如明鏡止水何容纖塵妄想念慮哉誠如世尊言末法比丘能奉波羅提木叉如親我無異由是而知山中法侶從今日去至盡未來受用大師白毫光中一分功德猶不能盡何所欠少所欠少者一片休歇心耳若人人放下身心各各單求大休歇地則大明國裏無容更覓佛法禪道矣此中纖塵不立若生一念無慚愧心則不惟負恩而自負多矣聞惠文法師在山與古德法師二友相與夾輔叢林調和大衆如侍大師白槌之日但願在諦觀法王法法王法如是一語覿面不昧即大師日夜放光動地也老朽老矣後會無期故增忉怛言不盡意與巢松一雨二法師頃人來知公閉關誦華嚴經數卷尚有餘功閲疏鈔此等精神入法性海舉世讓公一籌矣念老朽老矣棲息空山舉目寥寥以是於二公伯仲不能去於寤寐也自恨生逢盛世竟未覩其盛豈特佛前佛後之難今哲人俱往獨遺朽物且幸有伯仲在況復各天欲一言笑而不可得抑恐終身無再見之日老朽此際諸念皆灰獨以伯仲為懷者所重在法門也老朽山中雨雪連月擁衲石牀纂華嚴經要至十地品夢中偶有一偈最可為公道或佛神力故假老朽以發伯仲悲願也別録寄覽用發一笑只作夢語看耳頃檢楞嚴通議前卷中破執文中似初機難於埋會儻於中果有不通處願公為我通之以法忘情正不當有人我見耳匡山景物最是愜心第助緣為難頃於七賢峰下如蓮華中結一草廬可稱極奇絶處思二公相對一談亦萬古快事也有懷不禁燈下草草與黃檗無念禪師心光洞照為日久矣不慧忝在法門道不勝習泛泛一生無所建立至於曹溪為六祖道場又以障重不能卒業往承師重念祖道託梅公為護法比時不慧已之南嶽機緣不偶有負慈念今來曹溪但了人情非敢妄意有為況年已衰時已過縱有夙願亦待來生耳昨過廬陵諸君子皆以青原未了公案切切痛心頃聞梅公轉虔臺舉皆相慶意將仰借文殊遙伸右手一摩其頂令其速證此莊嚴佛土大解脫門然曹溪青原嫡骨父子惟師以未盡曹溪之願施之於青原師以荷擔此道為心安住平等法界必不吝一彈指也何如答博山無異禪師老朽自愧道不勝習無補法門向為業力遷訛於海外者二十年所遠託異國若無聞見即令師大建法幢竟未一通消息丙辰夏避暑匡山因頑石乃能悉其道妙一班且恨未及見也頃聞令師入滅傷嗟乎法門薄怙哀悼久之比知座下開法於博山喜不自勝辱書幣遠及以令師塔銘見委喜懼交心義且不敢固讓因念我明二百年來禪道寥寥傳燈闕典何幸得令師蹶起一代之衰所係匪細苟不能開正眼綱宗則使後學無以接響此再四鄭重而不敢輕舉者也然老朽自信不謂非令師之知己故深入其三昧而略其粗迹況為文之體亦不能冗載銘中但舉其正令其餘實行別作一録可也深愧不文聊足以寫萬一其中無一字敢苟且恐將來為傳燈所采自有具眼者幸諭諸弟子不可妄意增換不唯傷文體且減令師之光明是可懼也幸心諒之在老朽為法門義當讚揚辱來儀斖疊增愧多矣敬為莊嚴三寶以重法乳之誠不盡又咫尺相望如在眉睫音聲相及不隔一毫乃辱惠問勤勤復承慧炬遠照破我暗冥相對灰心益我三昧法愛之厚無踰此者念茲末法宗門寥落正賴維持所悲後輩澆薄真實者少多恣黠慧偷心更甚非大冶紅爐不能鎔此陋習更願不倦津梁益加鉗錘是所至望所云若而人者以老朽為法門故曾有口業無怪爾爾普賢以虗空舌稱讚諸佛固其本行豈在報乎公當默然再不必以此置脣吻也與雲門湛然禪師西來一脈至我明百餘年一絲垂絶久未見有力振者何幸得公蹶起東南建大法幢獨揚單傳之道以開羣蒙使法門後進頓捨陋習而歸之如水赴壑誠一代之偉事也老朽昨遊吳越幸覩光儀慶法道之盛讚莫能已老朽愧辱法門一毫無補且今老矣比匿迹匡山以送餘日閉關絶緣一息待盡而已廬山故稱西江名勝不惟蓮社肇基即歸宗自晉開山有唐赤眼禪師大闡宗風下至佛印真淨諸大老三十七人皆傳燈盛烈墮荒榛者百餘年矣近以達師發起因緣重興以來二十餘年猶然故物老朽但有慨嘆而已護法汪公邢居士擬奉迎座下以光揚道場老朽聞之歡喜讚歎惟公正當盛化之時名山勝地地靈人傑因緣不偶想必欣然命錫大千掌果定不以山川遠近為懷也答四一授公投老匡山掩關養疴僅存一息遠遣手書以經論二疏見示辱委為序衰病連年眼目昏花頭重眩暈不敢展卷久視日唯昏睡是以未能盡閲始終不得妙指安敢妄擬以此不及奉命儻天假之年衰病少愈尚當讚嘆有分與關主修六逸公昨來一場惑亂想已平貼此事不是挾帶做得的要須斬斷命根處下手一直做將去更不當他如何我又如何才有絲毫存在胸中便被他掉弄矣今日此段因緣乃百千劫求不得的若是早有今日之緣則不流浪到今日矣今日幸有此大因緣豈可輕易放過百年光陰頃刻耳偷此三年工夫眨眼便過咬定牙關轉頭便是得做且做待三年後憑他如何縱不悟道也了此學道初心乃是出生死第一步又豈可出門便打退鼓也從此著實放下更莫管他如何就是刀鎗劒戟中也須放身命況平地白日見鬼作顛倒想耶切莫狐疑直須斬斷快著精彩不可被他纏繞也又久雨苦人不能遣訊此心未常一念放下也知公安居寂靜身心泰然妄念久自銷落矣但當妄念銷落之中自一輕安快活不可以輕安為受用也若以此為得則從此墮於任病只圖幽幽綿綿以無事為妙殊不知此病最毒久久抱守則毫無增進潛長無明流注業識命根不斷終是以唾擦死水銀絶無用處當此妄念銷落時正好著力提持話頭切切參究重下疑情若疑情得力靠定話頭晝夜審究愈究愈深終有冷灰𪹼豆之時若認定無事不起疑情終非真實工夫也高峰語録正好為師且不作玄妙道理會也勉之勉之與漢月藏公聞公以向上一路極力為人此末法中最為難得但衆生識情深固苟學人以思惟為參究以玄妙為悟門恐不能透祖師關亦難出妄想窠堀也公如真實為人切不可以偈語引發初機直使死偷心泯知見為第一著庶不負此段因緣耳若曰如來禪祖師禪如何如何皆餖飣耳聞寒灰同居誠為益友幸同以此見勉答頑石上人善知識為人如師子調兒雖一欠一伸必盡全力老朽向為公者誠不惜眉毛所幸入博山之室將謂脫體俱化矣適見來書猶然故吾悲矣足見入道之難也若此爐鞲不化則將為不祥之金矣公其勉力哉所須無足以當法眼姑置之幸以本分著力為望上山東德王伏惟賢王殿下聰明天縱善果夙培慈德內融仁恩外著深居宮壼存想山林此實般若因深誠福慧兩足者也切念貧道雲外野人屢荷垂慈眷顧殷勤馳情再四感激甚深慚愧無地昨幸親覲威光仰勞玉體問道談心超塵脫俗此實千載奇逢三生慶幸雖瞬息片時已勝多劫矣且感信心彌篤采納不疑句句投機心心在道況以有限生死為懼無常病苦為懷此在富貴所不留心者賢王令所刻意斯實迥出濁世之表歸依淨土之門若非多生善根何能如此伏承問日用工夫敬陳如左戒殺生可以延年壽寡淫欲可以却疾病息妄想可以明真心斷煩惱可以出苦趣念佛可以生淨土寬仁可以治國家懺悔可以滅罪障慈悲可以養臣民歌唱盈耳不如念佛千聲嬉遊終朝不如靜坐一日此上功德乃却病延年多嗣永祚之妙法也真心本來清淨因妄想染污而苦惱旋生佛身元是自心因無明障蔽而光明不現即心是佛自心作佛念佛念心觀心觀佛一念妄心起佛做衆生一念惡心起佛即造業一念覺心起衆生即化佛一念善心起地獄即變天堂所以道三界唯心萬法唯識心造天堂心造地獄心淨則佛土淨心穢則佛土穢除此心外無片事可得是故心想穢濁則夜夢夢顛倒心想淨則夢遊勝景然而生死如夜旦境界如夢幻皆從自心之所變現若人心心念佛念念淨土則現前觀想成就過去罪業消除臨終病苦不纏一念往生淨土即得見佛聞法親近彌陀與安養極樂世界諸大菩薩同遊蓮池海會將來垂悲願力轉去十方度生不被生死拘留往來得大自在此修行直捷法門除此心外皆是邪魔邪法也故曰惟有徑路修行但念阿彌陀佛切不可錯認穢濁五欲之樂遮障本有清淨真心失却本有清淨極樂也與蒲州山陰王憶念往昔乞食人間持鉢大檀之門即辱法眼相看忘形屈勢使野人區區自不知其固陋出入朱戶側傍玉顏若遊蓬蓽而狎鷗鷺自非達人深證無生兩忘物我者不能如此德香薰人不覺點染心骨別來十載端若須臾縱居冷地徹髓冰霜時或隱隱妄想潛興妙音色相儼然現我心鏡也自入臺山深賴妙師硺磨之力然雖上愧古人要且不失初心頗有自信之地未敢有負知己自爾雲散清涼妙師振迹蘆芽山野潛形東海亦復數年日坐海印光中安居澄平世界塵境幽然身心日遠是於大檀音問竟歸寂滅矣適萬固老衲隨緣海上入我堀中詢及大檀所證法門且云日深如幻三昧諸有併空寸心無住山野喜不自勝嘗聞輕拱璧駟馬而重坐進此道至有善入塵勞而作佛事者未見其人是今見之大檀足不負我輩知己者耳然雖山川幽邈且心光照明纖毫不隔第恐情生故自隔耳嗟乎此生已矣言笑無期惟願大檀安心一境平視死生是則把臂寂場至無盡際豈直千里同風者比哉未遂接足故託此寂音以扣玄默冀神珠朗照不在多言又不覲光相屈指十五秋矣人生悠悠夢幻顧如此耶惟妙契忘言真俗不二若檀越之於貧道兄弟者法親骨肉兩間屬目難再其人每妄想一興心光瞥爾頓現法身是知三千里外不隔寸絲殆非虗語龍華談上人來得奉法言手之三復足見深入無量義處但貧道黃楊木禪進寸退尺乃不自知量偶落語人間遂為好事揭露不意遙塵天眼實增慚愧何敢更辱印證過譽如此儻不吝法愛并流無窮使千載之下想見同風豈直音聲相和已耶妙師齎藏往雞足此誠一椎兩當但萬里雲遊此心不無縣縣向未有問達師當代師子也向云遊目三秦囑過門下一會未審至否然此師風骨真橫空寶劒使人一傍則愛根永斷豈但能輕萬戶耶嘗謂像代可無臨濟德山而末法不可無此老也又數年不通音問想檀越髮無遺墨矣人生夢幻如此豈不重增悲慨耶妙師造無縫塔已呈其樣必收檀越祕密藏中他日儻至借觀不識如何拈出山野住那羅堀中修行無力被山鬼搬弄直嚷動三十三天致驚天王震怒擲於大鞴爐中通身鍛鍊一番且使身心俱化骨肉全銷以至家破人亡迄今投之瘴海孤征萬里且喜火枷脫卸慶快行腳將補三十年前未完公案意檀越聞之必心生痛癢耳今已長發就道恐檀越愛心不斷必作天南地北夢想顛倒撓亂禪悅特此問訊乃報喜非報憂也惟檀越與妙師眉間光明照萬八千土然此萬里猶在眉睫間不知何以攝受我也又一往夢事前書具見既皆顛倒夫復何言第在世相有成虧於法性無加損智眼明照諒不以之撓泰定耳山野以幻化空身投之蠻煙毒霧中如坐千尺寒巖萬年冰雪即有骨未融而亦為之銷爍也不審異日賢王於何處索空生耶山野近在五羊得奉法旨讀之深委慈念眷注之切細披諸作皆精心中出自當光耀千古比於邸報見斷髮表誡疏此實賢王歷劫菩提習氣於此感發亦乃負荷衆生願力所持山野以為賢王果能親生死如一髮則必能以一髮引千鈞以此上為社稷下為蒼生致君堯舜夫復何難是不待越三界而取菩提儻或習發於忠以忠資習是不免於徉狂雖博名高難收實效而世出世法兩皆失之意賢王必有所以自處矣便當幸以教我翹首德音慰此縣切又塞北天南相縣萬里在智眼圓觀曾無間隔而妄情自蔽寧無去來之思乎不審比來檀越以法自娛能無衰惱耶嘗聞佛為波斯匿王指不遷之見以觀河印之惟我賢王終日臨流賭逝者如斯而見未嘗往者乎昔者每聆談者謂四大無常而佛性真常則以為祕印今則謂之不然何也以法性遍在無情而法法皆真是則五蘊元虗四大又何加損觀佛骨金剛舍利之光是以無生之念薰有漏之軀而成佛性常住不壞者比瞻六祖全身信乎佛言不妄矣賢王以此視幻軀如水月鏡像乎果於是中覓之而不得回視目前皆曰幻化而憂惱之情亦無地可寄矣鈍根未入此番爐鞴未免墮半生半滅之見今入楞伽法性海中則洞達昔之知見正若貴魚目耳由是知古人不肯輕易可人必到窮原絶迹之地殆非以知見凌物殊非把住放行之説此皆戲論觀永嘉之見六祖則一切狐疑頓然冰釋矣賢王智照以此為何如耶楞伽筆記皆鈍根年來懺悔公案寄上賢王同妙師判之若此中有容針地則鈍根又當貶入鐵圍矣又計與老居士一別幾三十年瞬息頃耳信乎念劫同一時也第恐人生浮世幻影幾何良友勝緣不能再得況參復商異路宛如隔世縱精神洞達而形迹靡從言之令人悲慨耳前大義自河中持法旨來今忽屈指又三年矣日月欺人亦至於此讀札語知法體耐老筋骨益強此老居士多劫以般若薰蒸金剛種子以為胚胎況為造物遷流者而作真宰於何不健深以為慰山野幻軀入此爐冶所賴天恩陶鎔渣滓漸見消落撫心感愧無以報稱雖坐瘴鄉不敢一念忘君恩佛慈也又人生天地間忽如遠行客況以一息餘生持浮脆之軀而為客中之客當此炎荒瘴海毒氣薰蒸者乎知賢王以此念我而不知我以此念賢王也自入罪鄉三接法音琅琅在耳回想舊遊不隔纖毫是知古人不遷之旨即在當人日用中也山野年來此中法味不淺但不得與知己共之耳昨某來具悉賢王起居狀備審長殿下仁孝純至此自般若種性中來況今得入聖胎又得滋培長養之力何慮不臻其妙且又喜以貧養志以恬養知此又從願力而得𦦨焰火宅中求此清涼人物豈易見哉惟賢王幻遊浮世百無可心可心者惟此淡薄滋味耳妙師無縫塔一手託出其樣子又在賢王幞頭角邊即今如從地涌而分身之衆未知集否又不知誰為彈指開寶塔戶普集人天盡見多寶全身也又不知幽暗衆生可能盡睹此段光明否與曾見齋太常惟公信心篤厚念道情真殊非聲音色相者比至若冥二利之行蘊護法之心而以斯道為任若公與二三君子者無多讓已末法之幸何幸如之鄙人私念塵中作主最難得人以其現處五濁煩惱深坑今欲就路還家不離當處而證菩提非勇猛丈夫不敢自視若果真為生死大事者第一要具金剛正眼破目前種種幻化不為五欲技兒之所引弄不為是非人我之所障蔽不為功名富貴之所惑亂不為身心世界之所籠不為妄想憎愛之所牽纏如是則處世如空居塵不染可謂善入無礙大解脫門所以慶喜示溺世尊獨以如幻三昧示之正謂此耳惟公特為生死事切願試入此三昧若入得其真則如大火聚觸處洞然彼何物而敢攖傍耶世人學道舉皆捨却目前別求玄妙不知妙在目前往往多作障礙不得真實受用且又別生無量臆見橫談竪説殊不知即在見聞覺知之間但只識破虗偽不被其瞞昧耳佛祖説法如猜謎之技止以空拳示人昧者不知謂將果有奇特之物生無量圖度之想若智者看破殊發一笑由是觀之則佛祖亦無奇特止是不為諸幻誘惑之人耳故云諸優戲場中一貴復一賤心知本是同所以無欣厭看破則無欣厭無欣厭則無取著無取著則無障礙無障礙則得解脫得解脫則無法無縛無法無縛則不被生死拘留如此可稱具金剛眼大智人矣不出生死而證真常不涉程途而登佛地豈非雄猛大丈夫哉鄙人憶昔偶以無礙大解脫門一語突出公前然公著意扣之鄙人常數舉其玦觀公眼目動定似未全身擔荷故雖去百餘城而法愛之心撲落不下不惜遙伸一手再為舉之殊不覺舌長拖地也又緬惟道誼真期頓超色相妙契忘言初無彼此良以獨居幽眇寂寞情深心境寥寥豈不依依法中骨肉頃月清上人來承動定勝常知己善於日用工夫漸增綿密逆順境緣無非佛事第恐於佛事中增益知見以為病刺耳看來此事原一平等真際任運現前了無遮障吾人所以不得真實受用者誠所謂四相潛神非覺違拒者也悲夫末法五欲熾盛盡被燒然孰肯留心冷地惟公力荷擔之自非般若緣深何能篤信如此更冀順時勉圖志登彼岸庶不負法門知己所望也那延僻處東鄙為蔑戾車衆埋沒倒置久矣鄙人不自量適當其衝非敢振起名山抑願度諸難度自非內恃寸心外仗諸大知識神力所被則所不敢留影石室也又十月得接西來法音儼如色相臨我石室不獨憶念精真抑及道心濃厚皎然徹見高抱矣欣躍何如悲夫世道交喪人心汩溺火馳而不返槩不知其誰為己有也豈得挂齒於生死大事哉惟公所云以此事為大且痛切如此實雄猛丈夫之所能者但不知於日用一切順逆境緣能照破否於一切煩惱習氣能消磨否然此事鄙人早年切切用志將謂萬分奇特只今十五年中窮歷冰雪冷地看來原無異樣願公但只於此身心世界圓觀一念照破如鏡中像來無所黏去無蹤迹直令此智現前如大冶紅爐一切境界煩惱習氣妄想觸之如片雪輕霜不可依傍又如太阿當空誰敢攖其鋒者此則名為大自在人矣何者良以吾人本體原是妙明真心圓照法界本無身心我人世界生死之相因最初一念妄動而有生因生有滅既有生滅即名生死既有生死則有身心世界虗妄之相宛然具足被其籠所謂迷本圓明是生虗妄者也由是吾人認以為實不能照破故為生死拘留故於一切境界若功名富貴人我是非喜怒哀樂妄想情慮兒女眷屬種種意態諸生死業皆在目前念念與之打交滾矣安有一念暫息哉一念暫息且不能又安能圓觀洞照當下消滅如片雪紅爐者乎是則雖為生死而不知生死之根本也由其不能於此照破加之求道之志與之角立便起無量欣厭思算之念思算日深則厭離日切苦惱日重將謂必待捨離而後能若終身不能則終身於此絶分矣豈不虗生浪死哉此蓋世有志者之通弊也至若有志於塵勞境緣上作工夫者又以見聞覺知昭昭靈靈緣塵對境生滅之念認為真實都謂即此便是此又病中之病最難治者也良以縱滅一切見聞覺知內守幽間猶為法塵分別影事此正所謂識神之影明妄想之機關生死之堀穴所知之大障此尚非真況彼緣塵擾擾者乎由其無真知見人與之決擇大都流入此弊見之不明照之不破若是則雖為生死而實重增生死豈不謂病中之病也惟公既為生死痛切則願不可坐在此中亦不可思算厭離等待將來但只日用工夫將一切境緣煩惱身心世界一一照破目前無有一法當情單單的的於一念妄想未生以前一定任他種種變幻起滅切不可追隨譬如明鏡當臺雖現色相而無去來之迹如此鑑照久自圓明圓明則生滅無寄生滅無寄則生死何從而寄之耶此則雖非要妙乃初心第一步之要緊處也惟公以道相看即道中骨肉既為生死痛切就當隨處下手更不可思算等待虗拋日月也信口不知所裁願公朗照而力圖之與汪南溟司馬某憶往昔參長者於毗耶離城辱慈光洞照不以下劣授我金剛如幻三昧是時猶住音聲色相間雖其心領神會尚成眼鈍頭迷至於廣大自在無礙解脫門深信長者獨證之餘皆無入者某固識之而未能也蒙以法示我動之以定拔之以智喫喫相為恨不能令我七日掩關一超直入爾時某雖暗鈍豈不勇猛躍然良以絲毫未透如隔千山此古人親證實到真切語也既而長者隱宰官身去復教某善事良友妙峰禪師長者無他念蓋悲法門寥落屬望區區將有以負荷耳臨行回旋説偈叮嚀懇懇言外不啻骨肉斯豈常情哉盡皆法愛也清涼分錫某傾一命以事知識如妙師者無二志是故十年巖穴耿耿孤明一念冰霜心心獨照雖痛徹骨髓有愧古人至若比比小歇場亦頗自信此皆自我長者大智光中所流出也敢忘所自有負於知己哉比知長者深證無生遊戲人世某固願一振錫走繞禪床三匝以謝慈惠良為宿業所引至於東海愛此深山大澤志卜納此枯骨以休其於長者妙音色相未嘗去於三昧也𭦟室老人豈不時時遙伸右手過有餘城為一摩頂攝受乎與周幼海天球往從長者遊王舍城嘗坐四衢高樓共談不二爾來瞬息十年都成夢幻法門矣鄙人居五臺十七年寒徹心骨幻體不禁遠尋東海暘谷結廬以居所居二牢東海名勝乃佛經所載古那羅延堀者鄙人卜於最深幽絶處其形則背負衆山面吞滄海羣峰擁抱中藏一菴天然奇妙建立禪堂數楹聊為裝點化工容此幻衆上倚重霄下臨無際儼如蜃結長波入座魚龍繞階而梵侶經行影沉空水端入琉璃之鏡竊憶長者年高苦無濟勝之具似不能入此海印三昧敢求妙書數篇縣之高閣再得長題數篇競秀乾坤則是長者法身常住此中矣長者能如願乎與瞿太虗貧道往持一鉢走王舍城首參長者重辱慧眼相照頓入不二法門連牀促膝每為終夜之談令諸初心大士皆發無上菩提此一段般若勝緣皆吾長者宿願所持也慨茲末法斯道寥寥求之真諦凡在色相之間者宛若陳人未嘗不拊髀深悼若夫揭疑霧於性天索玄珠於智海非長者罔象之手誰可當之西郊慰別雪滿祇林片言見心痛徹骨髓直使天華錯落釋梵欽崇慧日圓明魔宮震坼惟此因緣又非淺鮮也別後三千里外跬步不移百萬法門寸心無住在路沿緣長至日方抵白下諸凡無恙所持大藏入寺之期舍利散於重霄祥光現於塔表光光北向網網交羅瓦礫叢林普皆金色人天瞻仰不可勝計感應之徵一至於此豈非長者末後半偈預為授記耶期月效事即歸海上逼除二十五日業以入堀與諸龍象誦長者無量義各各皆發正等心但不審維摩室中諸大士身心能無疲厭否與顧朗哉別來坐此瘴鄉餐嵐煙而飲毒霧頗與嚙雪吞氈同味每念龍華樹下細語論心海印光中長吟發嘯此境此時但一興懷炎蒸頓失是又足下洗我此心也斯又夢想所不到耳長安火宅不減炎方誰與足下清涼熱惱耶山野此中冰雪心腸受用不盡者具在新刻數種之中願與足下共之謝毛文源待御鄙人初念世道寥寥自知匏落甘伏巖穴尋見末法之餘人心不古大都皮膚損益倒置故逃遁海上以自休焉不意聖澤無私法雲廣布光被海宇濫及草茅降斯盛典置此名山以垂萬世然而雖為正治之餘實所謂治天下者將以為真治之事爰自受命以來夙夜惶悚人微事重不能敷揚教化誠恐有負聖心湮沒聖典懼徹心骨比者天幸明公現宰官身而作佛事一彈指頃頓令海印發光須彌涌動天人欣悅磨幻傾摧使我法王正令全彰羣生向化非夫妙契契靈山亦乃乘宿願力以緣會象形鼓簧斯道者耶誠可謂世出世法真俗交歸人非人等歡喜無量恭惟盛世功德實並山海同其高深明公法身當與社稷相為常住矣營建之業奉承法旨獨檄鄙人一力任之此實省煩費所司尤為便益但寺居深山道路隔絶凡百運用不無艱難幸馬即墨力任持之邊鄙書刻無人多不如法止完三尚有一後序即續圖之其木植南方求之未至天氣逼寒亭俟於春融興造姑此先報以了現前公案惟此勝緣不易願乞明公會同大中丞各垂一機以當法施不獨山靈增重萬世之下猶窺妙音色相於孤峰片石間也草瀆威嚴不勝惶悚與張守菴嘗聞佛説學般若菩薩即為擔荷如來今見我公如是用心求無上菩提誠信世尊言不虗也切念末法法門衰替若非我公全身擔荷何得慈尊光照十方且如天人多受欲樂不省發菩提心又非我公天鼓音聲無思説法何由能解佛之智慧耶是則公為真報佛恩者不知誰為報公之恩耳嘗念常不輕菩薩授記人人成佛即有以惡罵捶打菩薩皆悉能忍此乃吾佛觀此末法衆生多剛強難化若菩薩願於此時弘通佛法者須具堅忍力精進力大慈悲力方能善入塵勞而作佛事若此三力不充但生一念退墮之心則不能頓超五濁矣鄙人自謂世尊現身東方安坐海印道場日每諷誦華嚴六時不斷且又善巧説法而以種種譬喻因緣演説諸法頓使天龍欣悅頑石點頭十方雲集菩薩推擁不開但毗耶室內多有小乘每於齋時見鉢中無水竈裏斷煙人人皆生疲厭望食之想鄙人雖善談不二愧無維摩神通遣人前往香積請飯以解大衆之飢耳承慈恩重會普光明殿昨構木南方今已登彼岸其法海無涯全仗神運耳喜不可言鄙思再得充滿三千則可三展淨土可容十方分身諸佛矣若少一毫端則不免又勞彈指也又昔人多為法忘身未見實事今于公見之矣今目前誰不強口高談向佛門中做地獄種子及拔一毛皆生死相關何人能似公生平解脫視生死如遊戲一切禍患了然不動於心古稱大力量人便是此等樣子也嘗聞菩薩為一切衆生甘受三途之苦公為大地衆生捨此身命猶是本少利多也記得與公別時語云願老和尚説法利生我安心歡喜為法門死只此一言入在貧道金剛心中窮劫不壞直至成佛亦不能昧此非大菩薩人安能如是貧道自入瘴鄉因此一言不能傾刻怠惰專以度生為事以佛法為命也今將三年內所著諸書皆發明佛祖心印究明大教旨趣以此祝聖壽無疆報護法之德萬分之一也但願公仗此法力早蒙解脫尚冀未盡之年廣作無邊佛事耳答龔修吾尋繹所問三則皆從山僧無念一語中來然非公真切工夫於本分事者究論不能至此大段今人作工夫多墮識情窠臼錯認光影門頭但以昭昭靈靈為妙悟却不知昭昭靈靈者正熠熠妄想耳且又將心待悟以謂此中實實有箇光景為所得之地此皆未達究竟心原而以有思維心圖度無思維境界也然山僧所言無念如空者非是斷滅無知豁達空也論云心體離念離念相者等虗空界以其吾人心體本自靈明廓徹廣大虗寂本無纖毫妄想情慮清淨光明了無一法永離諸見本無身心世界之相但有一念妄見即是生死根本何況種種思算計較耶吾人做工夫第一要諦信自心本來清淨光明廣大而觀此現在身心世界皆是幻化不實如夢中事如太虗浮雲倐起倐滅起滅自彼而吾心體寂滅湛然不動雖有種種分別計較之心總是妄想以清淨心中本無此事由其心本無生所以山僧説無念耳是則所無者但無一切分別妄念耳豈是斷滅頑然無知耶故老龐云但願空諸所有切勿實諸所無是以山僧示人作工夫先有的的信得自心如此而於一切時中但任運觀之凡有一念起處即是妄想當下一覷覷定勘此念畢竟向何處起不知起處莫道不疑疑至極處當自了知不知亦不許思算亦不得相續攀緣如此看來久久純熟自然心體靈明寂滅現前一切妄想情慮如湯消冰應念化為真心矣到此方信自心真個如此廣大靈明寂滅始信心佛衆生本來平等了然不疑無復他念耳若果無他念不妨念念而竟何念哉至此亦無光景可得即此便是工夫不用別求主宰然此段工夫切不可將心待悟亦不可向光影門頭把作實事亦不可將他古人言句存在胸中當作自己知見亦不可作道理玄會亦不得除去目前別尋好處心境本來一如不可話作兩橛亦不可説心在腔子裏黑漫漫地古人目為黑山鬼堀若墮此中最難出頭若心體離念即是常寂光土何用別求淨土若一念圓明心體離念觸處逢原可謂大自在人耳公果的信山僧此説則前來三疑頓斷不必分星擘兩也若一一搜求差排更增馳求妄想耳惟公為道真切但願從今以去將前一切伎倆知見放下再將求玄尋妙佛法知見一切放下若一切聖凡情盡非真而何所謂但盡凡情別無聖解耳
