body:
  text: 侍者福善門人通炯日録海幢法裔今照今光收藏憨山老人自序年譜實録下二十三年乙未豫年五十春正月豫從京師回海上即罹難初為欽頒藏經遣內使四送之其人先至東海先是上惜財素惡內使以佛事請用太煩時內庭偶以他故觸聖怒將及聖母左右大臣危之適內權責有忌送經使者欲死之因乘之以發難遂假前方士流言令東廠番役扮道士擊登聞鼓以進上覽之大怒下逮以有送經因緣故併及之豫聞報乃謂衆曰佛為一衆生不捨三途今東海蔑戾車地素不聞三寶名今豫教化十二年三歲赤子皆知念佛至若捨邪歸正者比鄉比戶也豫願足矣死復何憾第以重修本寺志未酬可痛心耳乃離即墨城中士民老小傾城而出涕泣追送足見人心之感化也及至京奉旨下鎮撫司打問執事者先受風旨欲盡招追向聖母所出諸名山施資不下數十萬計苦刑拷訊豫曰某愧為僧無以報國恩今安惜一死以傷皇上之大孝乎即曲意妄招網利奉上意以損綱常殊非臣子所以愛君之心也其如青史何以死力抵之止招前衆布施七百餘金上查內支簿及前山東代賑之册籍上意遂解由是母子如初乃擬上蒙聖恩矜察坐以私創寺院遣戍雷州豫以是年三月下獄京城諸剎皆為誦經禮懺保護衲子中有然香煉臂水齋持呪以加護之者安肅鄭大司馬範溪公子在金吾素未相識特設燕會在朝縉紳請救以至涕泣訴其無妄一時人心之為法如此在獄八閲月供饋者唯侍者福善一人冬十月發遣南行朝士大夫多褻服策蹇相送以津濟者出都日福善同衲子二三人隨行十一月至南京江上別老母作母子銘攜孤姪可久往初與達觀師於石經山因思禪門寥落謂曹溪禪源也必源頭壅閼乃志同往以濬之達師先往侯於匡山豫被難時師正居天池聞報大驚曰憨公已矣則曹溪之願未了也師遂先至曹溪回至聊城聞豫將出遂回金陵以待豫至則相別於江中旅泊菴中師意欲力為白其枉豫曰君父之命臣子之事無異也況定業乎師幸勿言臨岐把臂曰在天池聞師難即對佛許誦法華經百部以保無虞我之心師之舌也豫唯唯謝別師為作逐客説二十四年丙申豫年五十一春正月過文江訪鄒南臯給諫廬陵大行王性海禮豫江上請注楞伽二月度庾嶺至嶺頭觀惠明奪袈裟處詩弔之有翻思昔日宵行者何似今朝度嶺心因見道路崎嶇行人汗血乃屬一行者立捨茶菴於嶺頭一道者勸修路不數年為坦途至韶陽入山禮祖飲曹溪水偈曰曹溪滴水自靈源流入滄溟浪拍天多少魚龍從變化源頭一脈尚泠然見祖庭凋弊不堪言遂凄然而去抵五羊囚服見大將軍將軍為釋縛欵齋食寓海珠寺大參周海門公率門生數十人過訪坐間周公舉通乎晝夜之道而知發問衆中有一稱老道長者答云人人知覺日間應事時是如此知夜間做夢時亦是此知故曰通乎晝夜之道而知周公云大衆也都是這等説我心中未必然乃問豫曰老禪師請見教豫曰此語出何典公曰易之繫辭公連念幾句豫曰此聖人指示人要悟不屬生死的一著周公擊節曰直是老禪師指示親切衆皆罔然再問周公曰死生者晝夜之道也通晝夜則不屬晝夜耳一座歎服先是諸護法者以書通制府大司馬陳公遣郵符津濟三月十日抵雷州著伍寓城西之古寺夏四月一日即開手注楞伽時歲大飢疫癘橫發經年不雨死傷不可言豫如坐尸陀林中以法力加持晏然也時旱井水枯凋唯善侍者相從每夜半候得水一罐以充一日飢夫視之得一滴如天甘露也城之內外積骸暴露秋七月豫與孝廉柯時復勸衆收拾埋掩胔骼以萬計乃作濟度道場天即大雨平地水三尺自此厲氣解八月鎮府檄還五羊宇演武場時往來作從軍詩二十首初過電白之苦藤嶺盜之門戶也乃作銘建捨茶菴豫章丁大參右武以誣謫廣海至素相慕遂莫逆二十五年丁酉豫年五十二春正月時會城死傷多骸骨暴露豫令人收拾埋掩亦數千計乃建普濟道場七晝夜丁右武身為之佐先是粵人不知佛自此翕然知歸夏四月楞伽筆記成因諸士子有歸依者未入佛理故著中庸直指以發之初上下見豫為罪僧甚易之軍門陳大司馬如岡法極嚴無敢私謁者豫未往見即遣人侯之甚勤是年九月同右武往謁及門投報止之是晚親往拜豫於舟攜茶盒坐談漏三下人皆驚異後對諸當道極稱之曰僧中麟鳳也即三司亦諭往拜之自是人皆知僧為重矣二十六年戊戌豫年五十三春正月侍御樊公友軒以建儲議謫戍雷州初訪豫於五羊時豫較楞伽稿公問豫雷陽風景何如豫拈經卷示之曰此雷陽風景也公歎異即為疏募刻海門周公任粵臬時問道往來因攝南韶屬修曹溪志粵士子向不知佛適周公闡陽明之學乃集諸子問道於豫有龍生璋者聞豫議論心異之歸謂其友王生安舜馮生昌歷曰聞北來禪師説法甚奇二子俱來請益豫開示以向上事諦信不疑切志參究二生素有德業相率歸依日益衆自是始知有佛法僧矣此後法化大開三生之力也每憶達師許經之願其夏始搆禪堂於壘壁間將擬大慧冠巾説法乃集遠來法侶并法性寺菩提樹下諸弟子通岸超逸通炯等數十人誦法華經為衆講之至現寶塔品恍悟佛意要指娑婆人人目前即華藏也然須三變者特為劣根漸示一班耳古人以後六品率為流通亦未見佛意耳遂著法華擊節右武性急烈負慷慨知敬僧而不知佛法將歸豫送之舟中重下鉗錘公翻然大悟乃字之曰覺非居士示之以銘又作澄心銘以警之二十七年己亥豫年五十四春刻楞伽筆記成為衆講一過乃印百餘部遍致海內法門知識并護法宰官且令知豫處患難中未忘佛事耳俗固好殺遇中元皆以殺生祭先至時市積牲如積薪甚慘也豫因作盂蘭盆會講孝衡鈔勸是日齋僧放生用蔬祭從者甚衆自後凡喪祭大事父母壽日或祈禳皆拜懺放生齋素未幾則放生會在在有之為佛法轉化之一機也是年夏五月制府大司馬陳公移鎮會城初下車未拜一鄉宦乃先遣候豫頃之命取食器一百餘件俱最精者門下皆不知何用及設齋請豫特出新器人人皆知其所重如此未幾請告歸是年秋榷使四出地方自此日多事惠州楊少宰復所公往與豫有法門深契久以憂歸今秋乃訪之至之日公已卒於塋所詰朝將入山公靈已至城矣豫即往視殮為求棺槨值潮陽道觀察任公陪直指於惠陽請遊西湖登東坡白鶴峰而歸歸即欲掩關却掃矣二十八年庚子豫年五十五時榷使初出狠戾暴橫官民不堪地方震蕩加以倭警人心惶惶豫即散諸弟子閉關絶迹人素苦閩海之白艚運米恐騰貴也時以為亂新軍門閩人也公子舟次海上適大將軍請告將行稅使正畜意侵之偶有白艚數隻即藉口以大將軍為公子資行者嗾市民大鬨頃刻聚數千人投磚石打公子舟幾破圍帥府持戈相向甚急時三司府縣皆赴軍門行節禮會城無一正官卒無解救者勢變在呼吸也大將軍危之無已乃命中軍詣豫關前求解豫甚不可曰無神術也中軍跪泣曰師即不念賓主豈不念地方生靈乎豫聞之惕然遂破關往謁稅使者從容勸化開曉其意使者聞豫言果悟乃令自行招安以散亂民豫先往大言於衆曰諸君今所為欲食賤米耳今犯大法當取死即有賤米誰食之耶衆聞之愕然頃令至帥府圍即解會城遂以寧父老感豫欲尸祝之時三司正在軍門飯聞報民作亂皆投筯而起及回業已安堵然皆知豫之力也觀察任公聞之乃以書抵豫曰憨師不出其如地方何憨師既出其如憨師何豫亦自知此後無寧日矣是年秋南韶道祝公延豫入曹溪豫乘興遂入山為六祖奴郎新制府戴公知豫安亂民深德之意欲一見諭大將軍將豫往謁及見禮遇甚優留欵齋飯因辭往曹溪公遂願為護法豫是得安心焉二十九年辛丑豫年五十六春正月豫見曹溪四方流棍集於山門開張屠沽穢污之甚積弊百餘年矣墳墓率占祖山僧産多侵之且勾合外棍挾騙寺僧無敢正視者豫歎曰此心腹之疾也苟不去則六祖道場終將化為狐窟卒莫可救矣豫縱居此何為哉熟慮之無已乃往白制臺戴公公曰無難也豫試為公力行之即下令本縣坐守限三日內盡行驅逐不留一人鋪居盡拆不存片瓦自此曹溪山門積垢一旦如洗公因留豫齋飯坐談公曰六祖腥羶豫為公洗之矣目前地方生靈塗炭大菩薩有何慈悲以救之乎豫曰何為也公曰殊船千艘率皆海上巨盜今以欽採資之以勢罷採之日不歸橫行海上劫掠無已法不能禁此其一也地方開礦採役暴橫掘人之墓破人之産在在百姓受其毒害甚於劫掠由是民無安枕矣為之奈何豫曰此未易言也姑徐圖之採使者李公頗有信心是年秋至曹溪進香於六祖留山中數日聞法甚喜豫因勸為重興祖庭布金檀越慨然力荷之徐密啓之曰開採為害於地方甚矣非聖天子意也採船急設約束期往來過限以罪礦罷開採盡撤其差役第令所司歲額助解進秋毫無擾於民可乎採使唯唯力行之由是山海地方一旦遂以寧公深感之以書謝豫曰而今乃知佛祖慈悲之廣大也以此護法之心益切豫因是得以安心曹溪是年秋開闢祖庭改風水道路選僧受戒立義學作養沙彌設庫司清規查租課贖僧産歸侵占一歲之間百廢具舉三十年壬寅豫年五十七是年重修祖殿培後龍改路徑以屠肆為十方旦過寮闢神道移僧居拓禪堂創立規制三十一年癸卯豫年五十八冬十一月達觀禪師在京師遭妖書之厄逮下獄訊以為豫之故因此又及之豫心知不克安心以待荷聖恩寬之京院有通行是年侍者深光出家三十二年甲辰豫年五十九春正月以達師之故通行至按院檄豫還戍所遂去曹溪往雷州因憶達師云楞嚴説七趣因果世書無對解者豫曰春秋乃明明因果之書也遂著春秋左氏心法三十三年乙巳豫年六十春三月渡瓊海訪東坡桄榔菴白龍泉求覺範禪師遺迹不可得寓明昌塔院作春秋左氏心法序遊名山作瓊海探奇記金粟泉記夜望郡城索然若無人煙唯城西郭少有生氣豫因謂諸士子曰瓊城將有災急禳之人以為妄及豫渡海方半月地大震城東壁連門陷城中官舍盡傾塌明昌塔倒壓豫所居樓盡碎豫行時士大夫苦留之豫不肯止若不行則亦為灰粉矣月夜渡海觀瓊之勝概豫以為仙都乃十洲之一云夏四月制府檄豫回五羊秋七月至曹溪去時祖殿已拆修造工未止歸則完者十之六七所負工料將千金毫無出豫化兩內使者施盡償之是年修五羊長春菴為曹溪廨院為六祖辦供之所冬十月侍者廣益廣攝出家三十四年丙午豫年六十一春三月度嶺至南州候丁右武謝張相國洪陽公以豫在難時公居亞相知豫之難始末最詳相與一時力救之豫心感焉故往謝公欣然道故請豫齋於江上之間雲樓邀諸鄉友陪坐公曰人皆知憨公為僧中一大善知識不知大有社稷陰功也衆聞之悚然問公公言其概一座動色回過文江訪鄒給諫留數日至章貢陳二師將軍留署中病期月有臥病詩十二首歸曹溪秋八月皇長孫生有恩赦凡在戍老疾及詿誤者俱聽辨明釋放豫在例乃往告軍門準行勘復之雷州道勘明應赦按祭司類造候題遂開三十五年丁未豫年六十二春三月豫告回籍軍門檄韶州安置曹溪豫住山中時得為諸弟子説法是年注道德經成豫幼讀老子以文古意幽切究其旨有所得俗弟子請為之注始於壬辰屬意每參究透徹方落筆苟一字有疑而不通者決不輕放因此用功十五年攜於行間至今方完三十六年戊申豫年六十三議修曹溪大殿春二月馮元成公任嶺西道因訪豫入山宿夜夢大士現身有感詰朝殿禮佛至大士前見兩棟摧朽驚謂豫曰何不修此豫曰工大費多力不及耳問費幾何豫應以若干公曰無難也吾試為之歸白制府戴公公曰殆哉見孺子將入井必匍匐往救之況佛菩薩處此危地不動心非人也乃詰所費即以豫言告公曰猶未也即屬南韶道往勘估計且令請豫面議豫往見之公慨然欲獨為鼎建豫告曰若勞公家之費恐不便苟依法門故事請以募衆為之公屬嶺西道為疏十二簿三司道府各置一扇隨意施捨總會於府解歸於一無庸歸僧如此則不勞而易集公從之不期月而集將千金豫躬往西采大木至端州制府留修寶月臺乃別委官采辦冬寶月臺成豫作記材木俱積於端江之滸次第運之冬十一月初安南賊破欽州戴公請王師遠討因核論罷三十七年己酉豫年六十四春二月豫自端江運木回阻風於羚羊峽遊端溪有夢遊端溪記木運至濛江豫回寺方集衆經營衆中一二不肖者遂作孽抵牾因鼓衆為亂如叛民豫見而歎曰此豫重違佛教乃著相之過也衆方鼓噪豫獨坐堂上焚香誦金剛般若以前但誦文實不解義至是恍然有悟乃注金剛決疑稿成衆寂然不肖者不信豫心益危懼遂訟於按院準行司理豫是時即飄然出山聽理船居於芙蓉江上者二年資斧已竭別駕項公楚東抱關於浛洸邀豫往江行遭風破舟及至復大病幾死公延醫力救之及回郡乃臥病於旅邸將期年三十八年庚戌豫年六十五是年臥病旅邸秋七月直指按部至郡訊及豫司理聞之方為理反坐豫罪直指大不然駮之云某有大功於六祖向所捨為常住計者今姦僧得利而反罪之是謂平等法門乎復行本道嚴究之由是本府親詣山中按僧之所開狀逐欵審之盡妄言無當所誣侵常住八千餘金豫初立常住庫司清規置有號票凡一應錢穀收支有監寺書記秋毫出入皆執號票為據不妄發也至是當官研核查算以號票為準無分毫及豫者時上下內外方信豫之不妄也事乃白當道重怒其僧再三請豫留住山中豫心已厭倦力辭之寓五羊之長春菴三十九年辛亥豫年六十六春三月居端州鼎湖山養疴初奉赦候題向無按院覆命故延至今復奉重勘明始注銷聽自便時諸士子相依請益述大學決疑四十年壬子豫年六十七居長春菴為弟子講起信論八識規矩乃述百法直解以法華擊節文義聯絡不分學者難會乃著品節四十一年癸丑豫年六十八居長春菴夏為諸弟子講圓覺經方半即發背疽醫不能治幾危大將軍漢沖王公業為豫治後事人梁杏山者酒人也素以醫瘍名偶至視之曰甚矣少遲則莫救矣幸安心無傷也乃純采草藥以敷之隨手奏效猶如弄丸刻期取效至冬乃痊豫為文以謝之此疽蓋自初坐禪時所發知是冤債以誦華嚴經告假者每向於書寫讀誦華嚴則竊發隨禱而止即至粵中已兩舉不成患在身四十八年矣初起時偶忘之且不知為疽遂成大疾其冤業酬償蓋以身試之不爽也十月疾愈初與衡陽曾儀部金簡有南嶽休老之盟書以十數未能也今以書來請遂杖䇿而往乃去粵初豫至粵時法性弟子相從者數十久之漸零落唯通炯超逸風波患難疾病相從未離左右今將行皆不捨願從之炯尚有羈少遲之擔簦以從是年十一月至湖東先是弟子福善攜侍者深光北歸探親至是不數日亦追至四十二年甲寅豫年六十九春正月遊德山禮祖有詩四首訪馮元成公於武陵會龍參知朱陵受榮王齋大善寺衆僧請受戒馮公與諸同道各捐資修曇華精舍夏四月還湖東聞聖母賓天隨建報恩道場有恩詔乃對靈龕披剃謝恩還僧服因痛哭曰悲哉檀越往矣本寺之願已矣豈待再來耶楞嚴經自東海立意著通議久蘊於懷未暇述今夏五月方落筆五十日稿遂成十一月精舍成有山居詩度侍者慈力四十三年乙卯豫年七十春為衆講楞嚴通議夏四月著法華通義以雖有二節全文尚未融貫故重述之五十日稿成纂起信略疏秋八月遊南嶽中秋日登祝融秋九日馮公自武陵移守湖南陪遊方廣寺回巡道吳公生白過訪湖東談及楞嚴吳公大喜即與諸屬捐資刻之禮八十八祖道影吳公大讚歎乃命畫士臨小像册請豫各為傳贊馮公赴任未幾即請豫遊九疑冬十月至零陵留過冬於愚溪四十四年丙辰豫年七十一春正月歸自零陵方遺民從宦遊歸依於湖東命名福心更初達觀禪師入滅之次年豫弟子大義請靈龕回南緇白弟子奉供於徑山之寂照菴今一紀矣豫難忘法門之義向欲親往一弔故香亦未遣也適聞葬必欲一往將行華藥寺衆僧請齋為續法系遊梅雪堂弔遜菴宗師夏四月離湖東有去南嶽解嘲詩鄺慕一方遺民何仲益諸子送至樟木市五月至武昌會段給諫幻然禮大佛遊九峰六月至潯陽遊東林有懷古詩登匡廬弔徹空禪師避暑於金竹坪注肇論因見其山幽勝有歸隱之意遍覽無可居者七月遊歸宗登金輪峰禮舍利塔有詩有僧以五乳相送為靜室豫登覽觀其地不廣而其境頗幽遂受之江州邢來慈居士達師之弟子也願為布金檀越故豫有投老之意焉浮梁陳大參赤石公至山相訪聞豫有意匡山亦願為護法秋八月出山至黃梅禮四五祖訪汪司馬公入紫雲山留旬日汪公願作匡山建造檀越別去相城訪吳太史觀我吳中丞本如欲建如意菴以留遊浮山截江登九華十月初抵金沙于王合族與東禪浪崖耀公迎之居頃即之雙徑石門顏生之居士候迎於吳江乃過其家士備齋資以隨行長至月望至寂照十九日為達大師作茶毗佛事先為文以祭之預定是日無爽識者異之二十五日手拾靈骨藏於文殊臺弟子法鎧隨建塔豫為塔上之銘以盡生平法門之義焉遂留度歲時為禪堂衲子小參有參禪切要鎧公請益相宗為述性相通説諸請益者各説有法語作擔板歌粵弟子通岸先別獨超益同諸子福善法孫深光廣益廣攝慈伴行四十五年丁巳豫年七十二歲春正月下雙徑弔雲棲時緇白弟子千餘人久候於山中留二旬每夜小參聞法各各歡喜發揮蓮池大師生平密行弟子聞之至有涕泣謂豫發人所不知者乃請作塔銘回時玄津法師壑公同通郡宰官居士金中丞虞吏部翁大參諸公請留淨慈之宗鏡堂日繞數千指為説大戒作宗鏡堂記諸山各路名德法師俱集於湖上問法各申詰難時謂東南法會之最勝昔所未見也乃遊靈隱三竺西山諸名勝贊揚放生三池乃行城中宰官居士具舟放生餞別於湖上且具狀請留雲棲乃有三年之約遂行凡一過所經諸作玄津壑公談生孟㶷彚為東遊集四卷刻之回至吳門巢松一雨二法師請入華山遊天池玄墓鐵山諸勝寒山趙凡夫嚴天池徐仲容姚孟長文文起徐清之諸居士設供於山中馮元成申玄渚二宰官齋於家將行弟子洞聞漢月久候錢太史受之親迎至常熟遂至虞山信宿太史送至曲河賀知忍父子姪候於奔牛之三里菴請留園中結夏力辭之送至京口受三山緇白齋罷即返匡山五月一日過白下江上一宿見一二故人即揚帆而西五日至蕪湖劉繕部玉受欵留作異夢記説崔吏部鶴樓追晤江上五月十六日舟次星渚抵歸宗寓居未幾時汪司馬公業先具資為豫修靜室六月十五日弟子福善經營五乳開土於十月終始成一室乃得安居為衆講楞嚴起弟子超逸閉死關於金輪峰四十六年戊午豫年七十三是年修佛殿禪堂三月浮梁陳赤石公入山結中素鮑公我齋夏公為十友助修造資冬十二月殿堂成四十七年己未豫年七十四春正月粵弟子通炯至遂開堂啓諷華嚴長期為衆講法華楞嚴金剛起信唯識諸經論命炯首衆秋七月以五乳為十方養老常住八月望豫閉關謝事效遠公六時刻香代漏專心淨業每念華嚴一宗將失傳清涼疏鈔皆懼其繁廣心智不及故世多置之但宗合論因思清涼乃此方撰述之祖苟棄之則失其宗矣志欲但明疏文提挈大旨使觀者易了題曰綱要於關中批閲筆削始冬於關中為衆講楞伽起信四十八年庚申即泰昌元年豫年七十五春課餘侍者廣益請重述起信圓覺直解莊子內七篇注夏病足痛前任分巡衡陽吳公轉粵臬入曹溪禮祖託山中弟子寄乞諸祖傳贊豫病中為纂傳七十一首各系以贊親為書之初豫去曹溪之南嶽住匡山業已八年而曹溪衆僧深思豫歸堂主本昂等往來問訊十數欲請之而未能也吳公赴任便道入山見豫重興之功嗟歎久之衆僧因具白所以思豫歸請不能之狀吳公欣然為作護法即具書往請合山大衆及本省鄉縉紳居士同具狀昂同二三耆舊至匡山哀乞豫時以病謝天啓元年辛酉豫年七十六春弟子侍御王安舜入山問訊夏為衆請講楞伽時前任本道祝公亦轉粵海道同吳公具書再至豫又以病謝是年冬又為衆講楞伽肇論起信天啓二年壬戌豫年七十七春正月粵弟子孝廉劉起相陳迪祥陳迪純梁四相入山問訊起相與四相相伴山中住半載為講楞嚴起信金剛二月東吳弟子方遠隨至同作休老計秋七月王侍御復入山親請歸曹溪不諾時力提華嚴名綱要草就吳公朝覲回又遣書意更切韶陽太守張公特書專堂主昂至豫情不獲已意必一往於是年冬至月十日出匡山過螺江會太史蕭拙修劉韶也劉轉華馬季房曾堯臣賀可上鄒端侯諸居士過虔城江上會寧都蘇孝魏期諸君齋於江上有詩贈別度嶺過集龍菴會劉敬一諸故人十二月望入曹溪合山僧衆羅列香華如獲母天啓三年癸亥師年七十八居曹溪禪堂春正月郡守張公入山問訊三月省城法性諸弟子至師時專以法施為心四月為衆説戒講楞嚴起信等經論秋七月又為衆説戒十月初四蕭宗伯玄圃公應詔北上入山見師欣然留連且為師卜壽穴劇談一日夜甚歡出山師即示疾初六日侍者廣益省城回云來得恰好韶陽太守張公親入山延醫調治初八門人超逸至云再兩日不得見汝了師知幻緣將盡藥劑不服十一日巳時別張公申時飲水沐浴焚香示衆曰大衆當念生死事大無常迅速一心端坐而逝於時百鳥悲鳴四衆哀號不已星夜毫光燭天隔山之人咸疑寺中火也三日面色如生髮長唇紅鼻端微汗手足如綿蕭公聞訃悲慟久之即移書南韶二郡公為師建塔及造影堂先是師離匡山留首座通炯於五乳調理大衆至是三遣書促歸中有云汝早來一日便是一日來老人餘日無多力矣炯得書遂忙忙南還十月朔日抵曹溪師見之喜動顏色且云來得好遲時恐汝懊悔了炯初不會其意連日侍立所聞所叮寧者皆佛法大意惓惓以法門無人為歎提撕者又極緊切語去期已先露於炯未歸之前矣大師年譜自序實録向有手筆草藁為大師首座寄菴通炯所藏炯師歿後法孫今照今光住海幢寺華首和尚從二僧取得此藁繕寫封寄今遵依元藁付梓天啓三年癸亥實録乃大師入滅後上首弟子福善等續記附刻於後以大師為中興龍象一言一行關係人天眼目文取足徵事貴傳信不敢扳緣葛藤添附蛇足以滋法門增益之謗後有正眼幸鑒別焉戊戌孟夏佛成道日海印弟子錢謙益槃談謹書憨山大師託生辨湖南顓愚衡公作曹溪中興憨大師傳盛談靈異宿生為陳亞仙歿後應現為蕭公子諸方頗疑其誕天童木陳忞公見聞雜記云大師託生桐鄉為顏司理俊彥少兒三歲不語一日呼其父名曰汝我前身弟子也司理登第授官廣州皆先知之病痘不起召魏學使浣初至榻前執手道故囑撰銘證明末後事余讀而心訝之學使余里人也大師東遊未嘗摳衣禮足安得有執手道故之事司理屏居石門馳書迬詢其詳遂以崇禎二年七月南華僧智融本昂伸報文牒及塔記石本寄余僧牒曰二公子示現童真於菩薩家能令眷屬割世間恩愛作茶毗佛事火浴後頂齒不壞舍利無數大者如彈丸小者如菽色如白瑪瑙扣之鏗然有聲海衆共觀歎異以是月二日酉時安厝靈骨建塔於先大師塔院之左至人出生入死遊戲自在豈先大師遺蛻返匡山現此金鎖還鎮祖庭抑亦山中耆年宿乘願力來住此道場耶塔記則曰顏氏子名祉小字虎子生於天啓六年丙寅二月實大師示寂後三年生四歲而殤司理之官日虎子私語家人吾乘便得往曹溪矣以此言證知大師再來若忞公所載呼名敘昔云云則未之前聞也司理父子家業歸心信根牢固生生居士常夢護伽藍神趣迎賓頭盧越翼日大師至止慈容法筵宛如昔夢司理為書生大師摩頂記莂比為廣理申明大師規約復其侵田虎子以信心入胎自求父母良非偶然也童真示現各有所表吳粵往來表法界一地故痘疹發香表染淨一如故靈骨不損表靈相具足故四歲夭折表已入鳩摩羅地故歸骨塔院表依止大人故此則積劫熏修彈指幻化不可以思惟測度也若以是因緣證成為大師再來則竊謂不然何也古來佛祖應化入胎人天轉輪事非聊爾栽榕再世遘浣衣以寄生宣老六年仗白雲而勘辨莫不付囑相應機感歷然而今無是也吸引緣熟啐時同雙峰之香煙猶指五乳之真身有歸吾謂是子也多生此世必入大師室著大師衣受大師戒遣來作使告報異生即事徵理無可疑者嗚呼我大師人天之師末法中第一龍象也末後轉輪法門一大事因緣也僧徒無識縈心香火指法城為首丘認寶坊為華表章句小儒眼如針孔景掠李源圓澤身前身後剩語緇白郵傳寐言夢斷海形牛迹不已遼乎俗語不實流為丹青吾懼後之修僧史撰佛録者採獵異聞而訛濫正信也既屬忞公門人告於其師請為刊正而又書其説詒南華僧鑱諸塔院昭示後人俾勿惑歲在庚子四月望日海印弟子虞山錢謙益槃談謹述
