body:
  text: 侍者福善日録門人通炯編輯嶺南弟子劉起相重校序贈無盡上人授僧録覺義住持平陽淨土禪院序圜中作聖天子在宥之二十三年以四方饑饉東西多故司農告匱命大開恩例令草野之民凡有懷材抱藝願效一割之用者聽循例輸粟各授職有差無論方之內外即二氏之徒亦預焉無盡上人晉平陽楊氏子蚤歲祝髮於郡之淨土院每志向上乃擔簦百城遍參知識調練牛峰發明少室遁迹終南接納五頂結法社五十三人窮教海一十二部究徹一心備歷萬行因過故里其鄉宰官長者居士四衆人等願請說法乃各捐金遵明例輸授僧録覺義為淨土院住持上賴國家名器為護法地將以廣布津梁大開覺路都城名藍知識若淨葊潔上人輩咸為一方法道賀乞不慧為文以贈之曰聞大雄氏之御世也迹現迦維道被三界其設教也主清淨出世以廣大圓融無不含攝故不擇類而應身在隨方而利物機感交映如水澄月現不涉思惟若觀音之普門善財之遍禮由是觀之其出世之法果離世哉故不壞假名而說實相者妙在圓悟一心頓融萬法即世諦而證真如因衆行而躋極果固不以端居無為沈酣寂滅者為得爰自法派東流由漢迄今二千餘載無論象教遐敷即依法修持權實並運而彰明其道者又非一也故歷代君天下者崇其教重其人其制不一惟我聖祖神宗創業垂統其法度品詳該羅纖悉其徒繁衍乃立官以綱領之兩京設僧録以統諸郡邑郡邑各設僧綱正會以領諸寺其品有差選道行俱優者次第授職各有攸司所以然者蓋藉世法以護持佛法正要即世諦而證真諦尸其任者大都以弘法利生為能事即古以道扇一方者為之殆非以名位為榮也今無盡上人抗志塵表迹超方外其所以發明向上第一義諦者固在所祕即其四衆歸望之誠如器中鍠聲出於外豈無實而然哉是必有過人之行詎可以執假名而昧實相者比耶經云若以音聲色相求法者非見法也余故曰今此四衆若以聲色求菩提有負上人上人若執假名而說法有負四衆聞之負師者墮負衆者慢有一於此又何以明佛日報朝廷護法之恩乎上人行矣儻道經金色世界其以毗耶病叟之言質諸曼室將以普告大衆願各各即假名而證實相藉此津梁頓超彼岸也時諸比丘聞此語已作禮而去送建上人遊八桂序上人出家有年始因參老人發無上菩提之心比與諸同業延歐伯羽氏共結曇花社於菩提樹借庇蔭日就清涼之樂每月半旬請老人坐樹下據菩提座揮麈為衆說修習趣進無上菩提之法行自春徂夏已四越月矣上人作禮言將往八桂訪故人於青山白雲之閒且因行腳隨方遇緣而度欲令聞者見者皆發無上菩提之心為出世津梁之初步也老人歡喜而語之曰善哉佛子應知諸佛菩薩凡有所作常為一事者謂以此菩提心教化衆生故為一大事也即出生入死因此緣此除此一事更無餘事雖身經險道備歷三途但有能使一人發菩提心者即嬰衆苦亦所甘心故聖人所行不虗其事皆實以世出世閒無有一法過此菩提心行此菩提行作此菩提事者也所言菩提者乃梵語也此云覺也覺者乃一切衆生本有之佛性靈知寂照故曰真覺了然自悟故名獨覺朗然大徹照破重昏故稱大覺日用而不知故云不覺不覺則為凡民凡民即衆生也以衆生各各具此靈覺之性第日用而不知嗟乎具有而不自知可不哀與不知即不能用不能用則如持珠作丐懷寶迷方枉受辛苦驅馳生死甘墮苦海可不哀與是故聖人不哀其所不哀特哀其可哀所以出現世閒種種方便而開導之所謂自覺而能覺他即先覺覺後覺也夫自覺者則於物不迷覺他者則於物不棄不迷則會物歸己不棄則捨己從人由歸己則不見有物從人則不見有己不有物則萬物皆妙不有己則一己非真知己非真則己即物知物皆妙則物即真即物即真則物非物而己非己矣物我皆非去來無相萬緣冥寂一道虗閒此大覺氏之心宗諸菩薩之妙行也如此則二覺具二利足是所謂以寂滅行現諸威儀隨事利他而為菩提妙行者也否則驅馳險道跋涉山川勞筋骨苦形體增熱惱損善根長苦趣而非所以成就菩提教化衆生之事業也上人行矣遡流而上者蒼蒼雲山滿目皆真境猿啼鶴唳滿耳皆真經獞猺猩猩所遇皆真佛水流風動皆廣長舌天青月白皆清淨身如是而覺則處處菩提場步步極樂國念念皆真修事事皆真行又何計其世出世閒之分自利利他之別哉上人能信能受老人之言乎儻有所疑路經湘山請以質之無量壽佛壽僧綱一山敬上人序余被放嶺海之四年己亥秋七月望乃法性寺住山僧綱一山敬上人六十有一歲也爾時城中宰官居士及諸比丘四衆人等各持香花而作供養以祝上人時屬休夏自恣上人亦建盂蘭法會飯十方僧效目連故事以此為報親恩酬罔極也余時為衆講楞伽新經罷正以此為佛事聞上人發如是心歡喜讚歎而作是言曰夫世人之壽不出我人衆生所謂壽者相也吾佛不取而僧亦不住然佛所取者慧命所住者法臘故古之高僧曰世壽又曰法臘蓋不拘歲年而以初入受持戒品三月安居戒體無虧為一臘由以臘不以年故有年高而臘少者有童年而耆壽者凡重臘是以戒為本也以戒為本即佛之慧命所係矣是故戒根淨則慧命朗戒本固則慧命長經云若人受佛戒即入諸佛數且佛壽無量而曰才登戒品即頓獲之豈不以自性清淨而為佛達自性清淨而為僧耶所謂續佛慧命以是故耳惟吾佛說法四十九年末後拈花以正法眼藏付大迦葉二十八傳至菩提達摩達摩航海而來初至五羊先是宋求那跋陀𢹂楞伽四卷至即建創戒壇於其地達摩來必依止之及傳二祖且指楞伽為心印及智藥攜菩提樹來栽於壇側且曰百六十年有肉身大士於此樹下出家演最上乘及六祖果發迹於斯若合符節迄今宗分五派道被寰中皆以此寺為初地即達摩之道法不泯六祖之真身猶存豈非以戒根堅固慧命延長由古及今以至永永無窮耶故經云佛子住此地即是佛受用今上人住此地統此僧見六祖如生豈小緣哉余初入至其寺叩其門至再呼而不應者今豫居此不三年而諸僧濟濟一時翕然無論老幼皆發菩提心煥然一新耳目是豈諸人佛性昔無而今適有耶蓋佛性人人本具但無知識開導耳開導之功又在主之者力行則四衆歡感如時雨降油然榮茂而不自知其然矣今上人年六十一一旦發如是心作如是行以佛事而報親恩以淨戒而為壽本又能親近知識隨順修行後之弟子苟觀上人心效上人行從少至老由子及孫如此則化化無窮源源不竭萬一有六祖者出翻然如昔之盛時則此法中興之機又在今日上人功德無量即上人之慧命無窮矣又豈以區區世壽為匹哉乃命弟子通岸居士歐起鴻輩各持香花重宣此義為上人壽送蘊素穩禪人還金山序余少負遠遊之志以病未能隆慶己巳買舟過金山余愛其萬里江流拳石撑空孤標獨立真若丈夫挺然頂天立地氣象山主同公旻公余居二載諸弟子從遊者衆每飯食之餘與一二高士振衣濯足於高空明月之下秋水長天空洞一色真若履玻瓈而臨縣鏡自爾一別四十餘年恍忽思之端若夢事深沈瘴海十有二年飲蠻煙而餐毒霧馳火宅而坐炎蒸每一興懷則肌膚生粟毛骨清凉時特以此片石長流枕潄於蘧廬壘壁之閒為消塵解煩之利劑也惜乎遠隔萬里親舊凋疏音問寥闊嘗念妙高峰頂善財石上月色潮聲可似當年風味否然亦無從問訊也丁未春莫豫蒙恩在宥走端州謁制府奉檄雷陽以了前件歸五羊謁臬司以聽從事維舟珠江之滸適有上人從豫章持大參丁公書來謁開函亟讀知為金山虗舟鋐公之孫也豫感舊興懷誠所謂喜心倒劇嗚咽霑巾者也嗟乎人生一世歲月遷訛回首人閒居然夢幻耳余事竣還山穩公相隨曹溪今且言歸余因敘往事記別後之懷以謝諸故人且託問訊於山靈海若余將返棹楊子江頭重訪三山故事幸為驅風伯以清江流掃浮雲而放明月延我於妙高臺上坐楞伽室以說藏識海浪法身境界了蘇公與張方平未了公案穩公持此其無乾沒於飯籮瓦鉢閒也儻有問者為我報道今已鬚髮皤然無復似當年粥飯氣矣送吳將軍還越序將軍少從父行入粵志在疆場經涉山海搗平寇盜無役不有無戰不克視險如夷復淵如陵凡諸島酋情形備殫東倭發難談者望重溟若登九天視其𦦨如入火聚兩粵節制司馬公日與群僚計畫咸束手無䇿時薦將軍往偵之具得底裏東事遂以平還報業已失故主將軍功竟無以自鳴惟步趨行伍無復敢言天下事矣然皆上下舉知將軍能卒不能以振將軍也每遇盜賊盤錯則當事者莫不力言將軍將軍恨不以將軍坐隗上事既則曰非我不能也時若有言將軍者則亦皆曰將軍將軍哉故將軍竟以名生忌以能致禍幾不免者數矣時則向之稱將軍將軍者則又皆以繩墨自多且恐入將軍不深也嗚呼世故如此豈復敢言丈夫事哉南夷犯順諸肉食者色皆墨將軍時在囹圄中豫思有以任疆場之肩負者舍將軍指不再屈遂力請出將軍多方調護置之前鋒將軍犯重濤陟峻嶺連戰及花封攻巢破穴楊大將軍知將軍故不蔽其能而斬馘俘虜之功最於行閒將軍竟以忘身一創心膂俱竭事竣一病而死者幾矣由是而知將軍數亦奇矣將軍至是亦深知其不偶也乃負妻戴子而歸將為五湖之遊矣將軍塵埃中人也余非以意氣許可將軍者蓋蟷蠰怒臂以當車轍孰不知其力不足哉然而一怒以當之非在力也余以是知將軍若九方之相馬豈可以牝牡驪黃以盡其質哉余以是感慨世之皮相者規規乎毛色之閒非余所以稱將軍也行過曹溪將別余適遇於江上留連信宿乃為詩以言別非以將軍能高舉也辭不及意笑不在言周子悟一篇序周子希顏字如愚泰和人三世孤貧篤孝苦心堪輿海內名公大人莫不折節傾心信若谷響以其言有徵而事不爽故聽若聲音奇驗非一己卯秋杪因韶太守任使君入曹溪曹溪為六祖大師法身住處其山創開於梁初神僧智藥大師謂與西天寶林無異不世道場也余以凋弊竊疑之質諸周子周子曰陰陽不經故也以其左來而右去故始大而終小即此一言疑滯頓釋由是而知周子之言形家非直形也及出悟一諸篇益見周子之得於自性之真特藉形以發其奧耳嘗讀王維詩云山河天眼裏世界法身中且眼不能著纖塵而曰容山河法身不可以色相而曰包世界繇是觀之又奚可形色言之哉此理之微誡不可言傳而在妙悟故周子之論山川必本諸真氣真氣聚而成形譬若人身必有周身之血脉脈之融會而為穴故凡人之生也病苟砭得其穴則足以啓死生人之死也葬若阡得其穴則足以化凶吉固其理也語曰天地同根萬物一體是則大地一形也陰陽一氣也死生一致也以一氣而視大地則目無全牛以一穴而視死生則脉無遺髮若從一葉以視陽春則化工不易一縷矣由是而知周子之視形非在形也在使其形者也原夫四大各遍五行互融皆本於性情由性昧而為空太極也空暗而結色四大五形於是乎變形之本也性變而成形天地而位矣傳曰致中和天地位萬物育此理之至也內外五行原出於一情與無情共一體也人之生也動而有知得天地之中者則於一身為聰明利達故其死也靜而有靈得山川之和者則於子孫致福壽康寧天人合德其理至微所云葬乘生氣者其是之謂乎豫以是知世惑於堪輿而妄為禍福之論者皆不識一之故也周子之悟一非特為形家言而其術亦非為求形者說蓋本諸身而求乎性也故其名曰悟一旨哉是則有形之論前無周子不能發古人之祕後無周子不能知陰陽之實余謂其書可傳故三復深飫而致意焉特序以發之贈太和老人序老人不知何許人掀髯瓌瑋肩橫一杖足遍諸方隨身佛事到處指迷見形而歸心聆音而解縛者不知其無量億衆矣雲行鳥飛飄然度嶺來遊於余睹其短髮蕭騷雙瞳炯炯燁若明星聲音如鐘聽其議論風生機鋒電捲隨其所應而為現身說法察其根性應以何法而得度脫即其所應而度脫之於儒則揭盡性之旨於老則啓玄妙之樞於釋則無非佛事乃至邪魔外道鐵腹水潦靡不迎刃摧鋒望旌息鼓故其道不虗授言不虗發如養由之射師文之琴拈矢應弦理徽出水若此者亦不計其幾百千衆矣且其胸次豁然了無滯礙其來不將其去不留如古所稱得無礙解脫者非歟余與老人遊戲於漭漾之墟逍遙於曠蕩之野不知此身之在天地外物之在此身也神怡心醉如兀如癡老人方將曳杖而遊於寥廓余蘧然驚覺追之水𨽗乃歌以送之歌曰雲之旌兮前征雷之鼓兮無聲風飄飄兮吹衣樹渺渺兮含情君之心兮不生我所思兮神征望不及兮天際重歸來兮夢驚壽曹溪前住持東湖賢公八十一序曹溪前住持東湖賢公生於前丁亥歲今歷四百八十甲子矣七月二十三日乃出胎時也山中諸大弟子獨稱公為最上耆年感公德教素孚於衆心各各歡喜燒香散花而作供養一時作禮請豫作具壽因緣以壽公余欣然為衆而作是言曰夫壽者相出於我人衆生也故吾佛世尊斥而不許且云童壽又云無量壽是又以獨稱何耶蓋童壽者謂童年而有耆德也是以德不以年曰無量壽者是以心不以形也以其此心先天地而不為老後天地而不為終超四時而不遷括十方而無量故古之真人悟此心者萬古不磨千秋若在是以吾佛自謂我處靈鷲山常在而不滅若吾師六祖道骨凝然法身常住斯豈以形骸之可拘拘色相之可擬議者哉是故吾徒為佛祖兒孫者端在悟明此心不以世數為久近也歷觀傳燈所載千七百人盡出曹溪一脉是皆悟明此心者故以心印心如續長夜之燈以證不生不滅之果斯實由生以入無生因滅而至不滅不滅則法性常生無生則真常寂滅斯則寂滅而生則無生不生即生而滅則滅而不滅此實千聖之真傳一心之要旨也由是觀之則人同此心心同此壽無疑矣惟公生於曹溪而長於法門老於佛事由先以己身為衆身故今得以衆壽為己壽且茲山之衆千人人各有心心各其壽誠以衆壽壽公則復以公壽壽衆如是展轉以歷無窮如以一燈傳千燈燈燈相續而無窮無盡此則衆心之壽固無窮而公之壽亦無量矣以是而知八十之年如馬體之一毛太倉之一粟也今也集衆心以祝公期公以此心而為壽以公之歲歲歲如今壽公之人人人不減回睹世尊拈花之日非遙六祖揮麈之時不遠斯較童年而耆德者猶以蚊睫而注滄溟也大衆聞說歡喜作禮持此以壽贈良醫杏山梁先生序豫放嶺海十有八年驅馳炎荒飽飲瘴煙顧有漏形骸自非金石日見衰朽諸病交作癸丑夏六月偶患背疽若覆盂楚痛難堪醫者束手談者皆推梁先生先生天性好飲凡以病告初不計利終不伐功居鄉里循循謙讓有古人風豫病篤時市人告豫僕曰聞尊者恙得梁先生即愈矣言未訖而先生到若神靈所邀即請先生視之曰此蜂窠疽也形如蜂竇竇日生三子若日久則層疊侵骨不可治矣幸早發藥可無慮先生治之之術多方言痛痛止言腫腫消言腐腐潰隨病應手無不立效藥無金石咸用衆草豫視先生之治病痬洞見肺腑技若弄丸尅期收功若有神焉初先生治數日或舉他醫先生欣然讓之無難色既而他醫治不可先生復來無異辭是知藝高而心虗時從醫未決請禱再三獨許先生誠天假也感先生之治豫病因思古語丈夫處世達則為良相不達則為良醫方今天下之病百孔千瘡不啻豫之一身也醫治者誰耶即有盧扁之手舉之未必信信之而未必用況諱疾忌醫欲求完復太和元氣而收回生之功難矣先生之活人若有神回生之功非一初不責報積為陰德願先生之子若孫推先生之術以治天下國家應手而捷則先生之澤流無窮又不止今日之活我若人也先生向未生子醫豫之次月二日舉一男咸謂冥德之報也故喜為先生賀而贈之以言別陳生明瞻序萬曆初余乞食長安市會夷山陳先生衆中一見即識豫為畸人遂與莫逆豫時先知嶺南有歐楨伯與先生同客燕市自爾余謝人閒世先生亦遊宦途無聞焉丙申歲余奉詔遣嶺南二月至五羊訪先生則成千古時晤明瞻為愛弟也夷山先生豪舉超卓翩翩有出塵之思明瞻則精敏沈潛循循雅飭溶溶漠漠淡然了無世俗態余器重之每見默無一語且於豫言無不悅及乃兄勛卿菜峰公挂冠歸卜西園於龍津與浮丘光祿惟吾王公密邇時時招余齊食兩園之閒一飯必以明瞻先明瞻從二老無外遊惟二老節義為一代人倫冠不獨重嶺南明瞻生於重而長於重且習於重不獨知所重而固有所重也明瞻八歲能舉子業十歲能誦古文辭其父見背菜峰公以子視之及長而菜公且投閒日與明瞻討論古今上下人物咸指其所重者𢌿之以融其性習此又明瞻養得其重矣無惑乎明瞻不屑屑以輕於浮俗也子曰君子不重則不威學則不固是知君子之學固以重為本也嘗試論之人生之性也本直質而無僞第以前識導情浮華誘志故本喪而質渝明消而暗長是則不惟托根失地抑為所附匪親故日流於窪下渟滀其污濁致使不磷之體漸磨不淄之質暗垢顛瞑而不寤火馳而不返者衆矣此聖人所以貴親仁釋老所以重離欲也余目睹明瞻於此十年如一日始終如一念毀譽如一心不以離合異情不以去就二志即其攻苦茹淡孝弟篤誠此固天性良然而實以親習有本傳曰重為輕根靜為躁君故聖人之學得其重而輕則隨之專其靜而噪則化之此仲尼輕不義之富貴如浮雲老薄萬鍾如敝屣也苟能得其重則窮達一致死生同條古今一貫以此足徵方外之學非妄談西來之宗非迂怪也余與明瞻遊一紀未嘗一言及於禪以明瞻早以重自珍又何禪之有今言別亦不外此明瞻志之方子振奕微後序余少知方子振童年以奕鳴而未見及余乞食長安市所遇靡不亟稱之殊無議其短長者私識其人誠若李本寧太史所言非特奕也及余被放嶺海丙午秋杪子振同蕭觀察來過訪曹溪一見居然心鏡中人異哉乃出近與黃石甫所布奕微余固不測識及觀與蕭公對局則知子振之為奕以道而進乎技也嘗試論之道在天地凡得其精而神其化者謂之聖道德無論已若夫藝者左馬以文聖鍾王以書聖芝素以草聖何獨藝而技亦然若市僚之丸養由之射與秋之奕諸皆有述焉奕爭道也凡爭者以名相軋軋則氣勝而實德鮮子振獨不然循循雅飭不以長自多臨局若無意遇敵若不知敵虗而必告以實處勝而若不爭意氣閒閒笑傲自適胸次翛然局若澄波心如皓月機先而預定神動而天隨客往而不追敵來而順應因是而知其微乎微矣說者以奕喻兵余則謂奕可類禪蓋處乎不動而運乎動者也余固謂子振之奕以道而進乎技也余觀子振非獨技而其人亦然老氏有言夫惟不爭故天下莫能與之爭斯其品異而技亦神矣彼矜矜操刀而割者又何以稱哉豫雖不知奕今見子振對蕭公局愧不若浮山之對歐陽公因棋而說法也送堅音慈公住金沙東禪寺序金沙東禪古剎也自達觀大師重興弟子孫氏伯仲創其始太史王公成其終先得浪崖耀公住持莊嚴畢備乃聯諸同志結青蓮社背誦妙法華經遵戒定慧三學以為梵行不數年而能誦者三十餘人往耀公與諸檀越特建佛種堂迎豫休老丙辰冬豫東遊而來睹其規矩雅肅安居精潔四事豐美人境俱佳為末法一最勝道場也讚歎久之豫了達大師末後因緣即投老匡山耀公涕泣留之未能也及豫入山之二年耀公以障緣去一時檀越皆望豫令人以主之居無何堅音慈公至一衆歡喜懇請公初以歸宗為家山未妥乃還安置今應命往過別五乳豫喜而謂之曰大哉法界以緣起為宗也故一切諸法皆緣一心之所建立佛土淨穢隨心感變而成壞亦以之是以吾佛於菩提場初成正覺其地堅固金剛所成謂以金剛心之所感結故菩薩修行必以此心而為行本所言金剛心者即梵網所說金剛寶戒名為諸佛心地法門故命千百億釋迦流傳此法所謂為一大事因緣出現世閒蓋特傳此金剛戒耳惟此一戒為成佛之緣故曰佛種從緣起吾徒為佛子者苟不遵此戒則凡所建立世出世法皆不成就以無根本故耳即此社規遵三學之制三藏之中經宗法華律宗梵網論宗起信是則此三皆最上一乘發明一心之旨成佛之要無出此者乃目前現成公案也公今往矣若秉佛心而為住持即其地為金剛所成身心寂然是為入如來室若以法華為佛種子則一瞻一禮舉手低頭皆為妙行則一切因緣無非佛事了無疲厭若以智照一心了達無明則煩惱不生諸障自息日用頭頭皆真解脫且公素持行願普門二品以專淨業苟以大悲為心則普視同體冤親等觀了無人我之相若以普賢為行則捐捨身命以供大衆滴水普沾何有一己之私若以大圓覺為我伽藍十方聚會箇箇無為又何有於子孫之業公以如是住如是持如是安居則當下轉穢成淨三學圓於一心萬行成於一念所謂佛子住此地即是佛受用常在於其中經行及坐臥如此則不負檀那亦不負自己出世一大因緣也當以此語揭之佛種堂未必不為廣長舌相送無言道公住持少林序世尊出印土踞靈山以優鉢羅華為菩提種子既達摩以震旦少林為菩提初地十方無盡法流源源從此而出其如派多而源混故我雪庭大師總衆流而歸之其心大矣厥功懋哉自是當家種草代代而生以不生者世其業無言道公承二十五世幻休潤大師法流令人天推擁而住持其家諸大比丘剎利宰官居士衆皆歡喜讚歎豫來自東方那羅延堀亦隨喜合掌而言曰佛未出世祖未西來現成家業人人具足由其具足而不知故黃面碧眼忍俊不禁特地出身為人說破靈山百萬衆傳燈千七百都皆一喚回頭頓知本有此則知之一字衆妙之門矣噫佛祖元無實法與人豈期人人病眼空花且又邀花結果佛祖之心然哉此則知之一字衆禍之門也吾人若不重刮金篦何以世其家業嗟乎難矣然佛祖以法界為家大地為業虗空為量若不立一塵則不能現身若立一塵則不能度生今公以赤身而全荷其業拽百川而歸源豈易易哉公且行矣諦聽諦聽善思念之若不立一塵則負佛祖若立一塵則非佛祖所以望公者公其勉諸送仰崖慶講主畫諸祖道影序昔世尊居忉利三月優闐王思之不已乃命工者持旃檀香往刻其像鶖子慮衆工凡品無足盡其妙好遂以神力化三十二人各注一相相成請歸王城觀者與生佛等及世尊從天宮來乃拜之曰吾滅後賴爾度生無量其像亦垂手而答之故凡雕刻彩畫種種莊嚴遍十方界者皆自旃檀始噫夫豈佛然哉吾意諸祖皆同一身一智慧力無畏亦然故曰心如工畫師畫出諸形像夫形像可畫而神通妙用及度生事業又安得而畫之哉居常闕然及讀達師述丁生畫諸祖道影序并送慶公求畫是知神通妙用度生事業皆不離一毫端三昧耳嗟乎鶖子極盡神力以多人而方成一像今丁生以無作妙力從一手而現多身慶公於一念頃圓成度生事業而達師一彈指閒頓使法身彌布如雲起寒空影羅秋水如斯妙用乃法爾神通如是耶抑因緣會合而然耶觀者儻能覿面不疑始信各各當人自性本來具足如此也公行矣無倦繁興藉使於一身復現多身將逼塞虗空光流大地又不離丁生一毫端公其持此為我告之賀僧録左善世超如應公住持大慈壽寺序聖天子臨御之初年正沖太上母憂勤鞠育惟祖宗社稷天下重器所寄思無以上酬厚德下福蒼生乃薄供養損膳羞出其資建大慈壽寺將賴三寶弘護陰庇窮壤寺成選古風淳和尚為住持居三年謝世上命其孫本在授僧録左善世繼其寺事在師任事十二年上祝萬壽下接四來無厭朝莫即慈雲法雨遍滿寰區無不從此流出而師舒忠效力竭躬盡瘁以事煩務劇致形勞神枯四大交病即臞然骨立猶不忍棄事達觀禪師隨緣過慈壽見而驚曰公何為至此哉吾人固重以忘身為法其如生死大事何師潛然泣數行下曰在非戀戀浮名第念聖恩隆重香火無託故苟延耳禪師因問孰堪荷寺事者師即舉其弟子監寺圓應禪師請見乃大喜曰是豈乘願力而來者耶令解衣盤礴如九方相馬云此足當千里矣幸有此兒顧復何慮師聞已判然自決明日即以其事奏聖母可之旨下大宗伯檄應仍授僧録左善世為第三代住持諸名山大知識各各聞而歡喜屬不讚歎之曰惟吾佛世尊以法界為家以戒定慧為業以弘法利生為務以慈悲喜捨為範以教理行果為綱維三學具四心圓四維張教乃昌夫此家者以無心而住無我而持任因緣為進退順機宜為調伏此至人之能事豈常人可及哉故正法之代四維張而法道昌諦觀諸祖無論童耄一言之下克紹其業像法之世教流東土歷漢至唐代有其人葉葉相鮮花果茂實且曰無果至於末法則秀實希者以教理存而行果闕網已半弛將何以綱維家業撈漉人天哉今躋末法六百餘矣當世尊將涅槃時有六萬億菩薩願於末法影響流通且又將佛法付囑國王大臣故歷代相承惟我國家崇其教重其人上下一體至我聖母弘通三寶超越前代琳宮紺宇棋布星分獨此寺為天下大觀無盡法藏從此而出一切功德從此而入為法門之樞紐知識之蘧蘆當其任者持大教之綱維為四海之觀望殊非細事應公年甫二十即掌監寺職山門衆務一切以身任之不私己不憚勞不辭怨不識身之有世不知心之有身不識不知泛應無機所謂年童而德耆外實而中虗忘機類無心泛應類無我不計利害類任緣此真住持之能事觀禪師所稱乘願力而來者非歟余嘗私謂在師為舟應公為水水之積也不厚則負大舟也無力應公業已能負師十年有徵豈不能自負哉應公勉矣願造其真履其實為佛真子住持其家將此身心祝我聖君慈壽如天如地普覆無窮果如是則香幢影動鐘鼓聲飛塔殿橫空鈴音鐸響晝夜無閒皆廣長舌轉法輪時也公其勉之贈大輪端上人住持廣濟寺序王舍城北有大精舍曰廣濟乃大知識寶藏和尚說法之處和尚初隱終南發明心印後𢹂其弟子雙松平公輩止於此豎大法幢人天衆集和尚據師子座平公即領住持事接納四方名傾海內三十餘年和尚臘高八十而道風與日俱大振平公謝幻緣去復以其徒端公繼山門事都城耆年龍華瑞菴上人輩咸皆歡喜乞一言以讚歎之聞之佛住迦毗羅國祇桓精舍其弟子千二百衆各推所尚爾乃以長老稱空生空生問佛所住世尊乃告以應無所住而生其心不住色聲香味觸法生心且曰應如是住如是降伏其心果何住耶雖然豈以無住為住哉抑聞佛住大光明藏與十二大士密說圓滿修多羅門乃曰以大圓覺為我伽藍身心安居平等性智此所謂住寂滅場修無作行又豈以有所住而住哉雖然上人親授法於寶藏和尚和尚得法大川禪師據臨濟正令揚眉瞬目一棒一喝之閒五教齊收千門頓會人境俱奪理事雙忘此又豈可以王城精舍圓覺伽藍而擬議其精粗優劣耶上人果以此法住持是將可以續佛慧命上報國恩誠所謂佛子住持善超諸有也耆年聞說皆大歡喜即持此一葉以問訊上人上人其無謂我毗耶病夫非奪鉢之手也是為序送方山映川法師幻遊序幻人往遊都市遇方山子於大幻場中相與莫逆於心已而幻人從幻緣去方山子即入如幻大解脫門依寂滅場現諸幻事揭大藏於龍宮受天人之妙供幻人方避影東海據長空大谷與煙霞麋鹿爭雄方山子聞而喜之即杖䇿而來搜我於窮髮幻人相與把臂而遊登金剛之峰入那羅之窟乘堅固之筏泛海印之光捫摸虗無指揮萬象倦則鋪瑤草而臥長林饑則飲醍醐而餐栗棘時或鼓腹搘頤撫髀躍吸鯨波而吞滄海叱大塊而噫長風直使萬竅齊鳴殊流競驟曾不知爾我之在乾坤朝昏之為日月也又何浮光幻影野馬塵埃而點太清之量哉方山子喜而忘歸不覺兩更四序一瞬矣時則方山子蹶起而謂幻人曰聞之不死之鄉非蜉蝣之所擬廣漠之野非蟭螟之所知信乎願當與子死此耳幻緣未盡姑捨子去終當𢹂手同歸焉幻人于徐而進之曰嘻有是哉子作去來之想耶嘗試觀夫片雲起而太虗彌布纖塵舉而大地全收不分而遍則霈澤雱施不散而周則山嶽競秀由是觀之則諸法未嘗離於起立處耳子當勉矣無作去來之想也雖然空花結實翳目之所愚水泡穿珠癡兒之所惑子其行矣試為彈而刮之若珠破翳除其無忘我交臂之盟誓當與子死於那羅延堀
