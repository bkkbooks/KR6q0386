body:
  text: 侍者福善日録門人通炯編輯嶺南弟子劉起相重較疏五臺山造沉香文殊菩薩像疏伏以清涼勝境為萬聖之道場大智文殊乃七佛之師表迹垂震旦道化娑婆作衆生之福田開人天之眼目歸依者福等恆沙禮讚者德超塵劫況復鏤形範像布施莊嚴者哉山僧某濫叨形服幸託靈山居中臺之極嶺開十方之梵剎感大士之威光裂多生之業網由是發心願造沈香菩薩一軀請置本山供養前來南粵時歷三秋弔影南遊途經萬里愧福輕而緣薄且事重而人微荏苒因循向無寸效今日幸逢南華之勝會仗六祖之慈光攝四衆之高人結十方之善果伏願貴官長者達士名流頓開智眼剖破慳囊捨心香一寸而價重三千嚴法身一毛而福延萬劫儻三十二相而多人共成則百千億身而一時頓現如是則人人盡歸金色界個個同熏般若香功德難思福緣無量謹疏廣城西小福園募齊糧疏切以出塵離俗不妨迹繫人閒借假修真自信心超世表但以五行現在四事應須無能感動天人必欲仰資檀越山僧某挂錫五羊城外藏修小福園中六時禮誦刻白社之蓮華三業精勤揭青林之貝葉惟以杜緣日久時值歲凶貴賤同災賢愚一劫閉門連日獨看瓦釜生塵兀坐經旬誰問香厨絶粒既難分衛未免循方是以不惜千里辛勤普化十方長者幸生歡喜大破慳貪即一粒而至百千萬粒共積須彌以一人而引百千萬人徑歸寶所即摶食而為法食功德難量變熱惱而作清涼福田無盡金剛種子普布人天般若舟航齊登彼岸逆來順受虗往實回若能滿載而歸不負望風而至勝緣儻遇嘉會不常願隨發心諒無虗棄謹疏造旃檀香佛疏伏以法身非相托有相以明心妙行無為在即為而見諦苟非藉假修真何以轉凡成聖惟我如來應世道化無方捨己從人隨緣利物建言靈鷲開優鉢之名華遺範閻浮刻旃檀之瑞緣遂使見聞瞻仰同出迷途禮念歸依共登寶所爰自金光東曜白馬西來覩像教以興心用莊嚴而表法所以琳宮遍支那之境紺像滿祇樹之園尊崇者自天子以至庶人悟道者若王公及乎羣彚靡不布金殷重割愛投誠修行八萬四千門作福第一南朝四百八十寺靈隱居先山從西竺飛來猿向洞門呼出境同兜率勝出人寰山僧某蚤離塵俗託迹名山樂蘭若之清修志頭陀之苦行但以根機下劣未副上乘仰蓮社之高風效優填之故事敬刻旃檀香像安供菩提道場借以熏修依為淨業像高尺六表丈六之法身普化十方植三祇之佛種然雖人人即佛須見佛而發心縱使個個有緣必遇緣而成就山僧不辭萬里遠至五羊跋涉艱難辛勤勞頓顧茲南粵嶺表名區奇珍畢集乃商賈之稠林山水盤實文章之淵藪況此殊勝功德計所費不多豈無英靈豪傑脫體承當定遇勇猛丈夫全身擔荷由一人而勸十人百人衆擎易舉從一分而至百分千分聚少成多雖因一佛以化多人多人各成一佛伏願貴官長者達士高流共生歡喜各發誠心直須打破慳囊勿使當面錯過捨身外之浮雲作自心之真佛但能一念肯回光返照便見四八妙相端嚴優曇華再現三千菩提果頓超曠劫功非虗設福不唐捐惟決信不疑徑登寶所修南華寺祖塔疏佛土莊嚴雖是人天善果淨土布施即為般若根基若非推果尋因須要求田下種但看目前世事豈有我作他收何勞分外馳求定是自修己得千年田地曾言八百主人三寸氣消始恨一生空過何如六祖真身直至而今未壞十方常住應知歷劫不磨香煙塞漢顯自性之光明寶塔凌空現唯心之淨土但以煙雲幻化誰保精色窮年風雨摧殘頓見柱根破敗若不乘時急救誠恐異日難支苟能革故鼎新便見轉凡成聖切念功非一力假衆力以合成事屬多人種各人之福果一甎片瓦皆為最上良因粒米文錢盡是菩提種子只願隨心原無定法儻有勇猛丈夫亦任一肩擔荷將小就大接短補長同成一味醍醐圓滿十方海會便見七層妙塔涌現在於空中多寶全身入禪定於座上人天歡喜鬼神欽崇祝聖壽以無疆鎮皇圖於億載頓使西來祖意重拈出於天南東粵宗風再闡揚於嶺表優曇華現於三千金剛種培於百億功勛莫算福利何窮願智者早發誠心冀功果速完當下敬持短疏普告十方儻遇有緣請題芳姓重修曹溪祖庭殿堂疏伏以如來出世從兜率而降王宮法運開基自竺乾而來華夏菩提樹下為成道之場祇陀林中乃說法之所黃金布地開檀度之門白馬䭾經闢昏衢之路開三寶之良謨設一乘之軌範雖云極則猶在半途既乎跋提示滅化緣將終乃偃建立之旗翻繫塗毒之鼓驀爾拈華發揮要道直指當人之覿體頓見自心播揚向上之家風發明本性禪道由此興焉佛法因茲備矣西天四七般若之道大通東土二三達摩之宗始著自嵩少以濬源至嶺南而衍派從此道被寰區化霑海㝢者皆我曹溪六祖大鑑禪師之力也恭惟禪師德秉生知道光前聖遠自跋陀懸讖菩提樹植於宋朝智藥尋流寶林山開於梁代曹叔良效布金之遺事梵剎聿興陳亞仙捨坐具之福田叢林大振由是天王降紫泥之詔光昱林泉名儒施彩筆之文翰垂竹帛華夷瞻覩史之天龍象蹴經行之路偉哉勝事駕曠劫之津梁壯矣雄模立萬年之香火真天下之奇觀實寰中之勝概也自爾慧燈高照破永夜之重昏法鼓長鳴醒羣生之大夢從來歸依如市崇祀若神歷代相沿千秋一日奈何盛衰有數興廢由人法化寢微道緣漸墜僧徒遭魔障以壞清修殿宇被風雨而隳壯麗柱根腐敗梁棟摧斜慨將傾之大廈殊非一木所能支嗟未合之良緣必假多人而可就寺僧某等生叨盛世早入空門託迹名山忝承未裔朝參夕禮奉真像於當年暮鼓晨鐘繼香火於晚歲真覩生龍白象風氣宛然悲此破瓦敗椽殿堂頽毀使大士飲煙嵐之瘴癘如來披霧露之衣裳山色靄清淨之身鳥語說無窮之偈青蘚遍長廊豈是莊嚴佛土蒼鼠竄古瓦難云極樂道場境雖觸事而真人乃即真而俗若不亟其乘屋將恐倏爾傾湫苟能革故鼎新便見轉凡成聖是以弘發誓願運廣大心特重開寶地新佛日於中天冀再轉法輪駕慈航於苦海是以謹擇二十六年十月望日先啓華嚴勝會選戒僧五十三人坐千日之長期次化當代名公修殿堂一十二座祝萬年之聖壽使處處盡是道場願人人盡成佛果竊念非常之事須待非常之人希世之功必有希世之哲是以敬持短疏遍告大檀同修清淨之因共結菩提之果但以法無定相弘之由人財不拘多施之在己嘗聞一滴之水與渤海之潤性無差芥孔之空與太虗之容納匪別離相者福報難思滯跡者功德不廣儻歡喜發心頓見一毫端頭現寶王剎若謦咳彈指即能一微塵裏轉大法輪如是則使曹溪涸而復漲慧燈暗而又明優曇華現於三千般若種培於百億寶林倍價於當年鷲嶺重新於此日贊助者福壽等於高深護持者功德同於帶礪布皇風於八表灑甘露於十方見聞隨喜齊登仁壽之鄉禮念歸依共到菩提之岸願心既廣福德無邊仰望仁慈同聲唱和謹疏修曹溪五代祖師影堂疏南華禪寺寶林道場六祖真身現在達摩衣鉢儼存由二祖以至黃梅五代之傳至此自唐以至於今日一派之水隨流爰立五祖之堂用表授受之緒茲者年歲既久苦被風雨摧殘月化日遷頓見柱根腐敗若不乘時亟救誠恐異日難支苟能革故鼎新便見煥然奪目莊嚴樓閣涌現在於目前五祖全身入禪定於座上人天歡喜鬼神欽崇祝聖壽以無疆鎮皇圖於永固功勛莫算福利何窮願智者蚤發誠心冀功果速完當下書華嚴經接待十方疏不動一步而心遍十方謂之坐參不起滅定而現諸威儀名為妙行是在當人自信不須向外馳求恭聞華嚴大經乃毗盧根本之法輪曹溪古剎為六祖禪宗之正脈法界是衆聖之玄都叢林作十方之歸宿自古及今雲水高流禮祖而至者無時不有終年竟歲飲食安居因人而施者一向全無顧我老朽自到茲山最初以此為念於山門外立十方堂一座資以接納四來其飲食所需皆出禪堂常住奈何一向執事不得其人混集庸流翻成穢士不唯有負初心抑且虗消信施茲者弟子明中發廣大心修普賢行願就本堂安居書寫華嚴尊經一部借此法恩收攝身心即以接待十方賢聖老朽聞之讚歎歡喜而謂之曰昔善財童子參五十三諸善知識猶歷百城今子不離跬步而普禮十方世界諸來賢聖可謂最勝功德何幸生此末法住如是道場書如是大法修如是妙行積如是勝因可謂將此身心奉塵剎是則名為報佛恩矣所願見聞隨喜者福等恆沙贊助稱揚者功超曠劫何況施七寶而作莊嚴列四事而為供養者其福又不可得而思議矣高州電白縣苦藤嶺建施茶菴疏伏以人天路上全憑作福為先生死途中唯以濟人第一嘗聞侯門似海獨愛富而不敬貧聖道如天但周急而不繼富所以飢者易食故一飯而感千金之酬渴者易飲故壺漿而致扶輪之報此但有情人事尚乃感報如斯何況無為福田功德豈可思議者乎茲者高州之北神電之南崇山插漢峻嶺橫霄為海外之咽喉乃羅旁之門戶當年客旅車軌不得並行今日經商足迹焉能獨往誠名利之畏途實盜賊之淵藪所賴嘉隆之歲以後王師破賊以來變險道而為坦道易頑風而嚮皇風雖往來有跋涉之勞且進止無豺狼之戒第以炎方赤徼瘴癘煙嵐加之以毒氣蒸蒸又值溫泉滾滾以致天涯行客如蹈火而赴湯遠戍征人若錯焚而履鑊摩肩接踵聊乘袂以成雲陟巘攀林誠揮汗而若雨唇乾舌燥思勺水如大旱之望雲霓咽𦦨腸枯得涓滴若消渴而飲甘露況百里而傳一舍窮日而得半餐僕夫汗血輿馬沾濡舉目無親此苦莫告斯皆貪名逐利見得忘形祇知拈土作金誰解拋甎引玉況夫邊地下賤及蔑戾車俗好鬼而尚淫祠民輕生而喜殺盜雖尺布斗粟而妄取於人豈粒米文錢而樂施於己此其菩提種子轉見焦枯善根萌芽日歎腐敗是故惡者愈惡而貧者愈貧迷轉積迷而化更難化比者幸逢當道諸大宰官博愛施仁濟人利物以斯道而覺斯民繼往聖而開來學創浮屠於郡邑樹最勝之法幢建赤幟於祇園作難思之佛事可謂不世之舟航迷津之寶篾者也山僧某因弘法而罹難蒙恩遣於雷陽投萬里之遐荒乃荷戈於電白爰登苦藤之嶺渴乏高原因思甘露之漿低回險道偶見苾芻二衆築室道旁乃持香茗一盂盡恭馬首某也欣然飲泣愴爾興悲誰知瘴癘之鄉偶值天台之伴即稍憩於林閒遂勒銘於石上比時有茶菴銘書之於壁由是發願願於此地大建精藍將即事以明心欲藉茶而演法自爾歲月云徂倏經二載乃於戊戌之夏遇高州司理萬公邂逅仙羊之城對談靈鷲之緒言及至此大歎奇哉遂乞為護法之津梁敢請作慈悲之檀越期重建其化城引衆歸於寶所且欲就穢而變淨土將瓦石以易草茅縱不勞金碧交輝亦要使法食兼濟但念功非一力必須緣結多人是以敬修短疏普告十方託善男某某稽首貴官問訊長者經商客旅士宦高人伏願發廣大心作難遭想且人人是佛只要自肯承當法法皆真何物而非布施不拘多寡無論精粗墜露可以添流輕塵而能足嶽雖權設門外三車假名引導使直透向上一路實是慈悲但能打破慳囊頓見莊嚴佛土往者過而來者息聊進一盂趙老盞中泛輝輝之白雪渴者飲而飢者餐強吞七碗盧同腋下起習習之清風除熱惱而得清涼解疲勞而消困頓且以法水而溉菩提之種增長靈苗將善根而栽般若之田克成聖果從此襟懷灑落去住翛然可謂極樂之道場名為歡喜之佛事布慈風之浩蕩掃盡瘴海之嵐煙懸佛日之圓明照破昏衢之幻夢使闡提之輩消除殺盜之邪淫蔑戾之儔不墮羅剎之鬼國一人善而多人善善滿邊一家安而大家安安攘海宇同躋仁壽之鄉共覩熙皡之化以斯功德祝聖壽以無疆將此身心酬君恩之罔極福非虗設事豈妄談惟願贊成無勞顧佇謹疏萬曆戊戌仲秋朔旦書於仙城之旅泊齊重修南雄府太平橋普濟寺疏伏以嶺表名區一線引華夷之命脈太平古渡飛虹鎖百粵之咽喉寰中商旅何莫由斯海外珍奇必經於此悲夫迷津浩劫寶筏誰憑苦海狂瀾慈舟可渡恭惟太平鎮橋普濟寺者創規往代事仰前修面迎淩水儼舍衛之恆河背負梅魁宛迦維之祇樹扼南海之源頭據雄關之勝概誠終古之津梁實長途之利涉也但以日來月往雨薄風殘世異時遷梁摧棟腐幻華易謝陽𦦨難留使三寶閟而不彰衆心歸而靡託今者幸逢仁人在位欲革故而鼎新君子存心將救偏而補弊山僧某敢執鐸以揚聲士庶高人冀承風而接響惟其人性皆善必待感而遂通然雖佛化有緣豈不求而自應是以敬持短疏普告十方伏望富貴者竭力用酬前世之恩貧賤者施工希植未來之果但願慳囊破處金剛種子露光明愛水乾時般若舟航登彼岸不拘過往無論經商菩提種個個圓成極樂國人人可到休言福比河沙且喜心歸寶所功超有漏德載無疆祝聖壽於河山播流光於日月普願霜露所降咸服慈風舟車所通齊瞻慧日如斯利益贊莫能窮請注芳名冀垂不朽重建祇園寺疏伏以十方世界處處盡是道場具眼者能見八萬塵勞種種無非佛事達心者自知況有布金之規範遵為古佛家風嘗思留帶之嘉謨正是宰官令則但以事隨機會道假人弘時節難逢良緣偶合茲者祇園古剎創自唐朝志載分明尊崇典祝恨山靈之不守倏墮荊蓁仗護法之有知忽開茅塞向遭五逆之子佛祖幾以無依今賴三尺之天神人幸而有託但以殿宇傾頽金像淒淒風雨香燈泯沒梵音寂寂朝昏山僧如鑑偶來乞食挂錫淩江開精舍於恆河敞竹林於負郭但虞大廈非一木之可成必假高賢合衆力而易舉拈寸草而作梵剎自是天帝之爐錘剖微塵而出經卷除非普賢之作略伏望共出手眼各賭神通聚少成多由小至大直使鬼神輸運不讓須彌頓見金碧交輝宛成淨土轉變隨心受用在己感報以此為徵功德共垂不朽湖心寺重建放生普願成佛塔疏佛大慈悲普度十方盡法界衆生悉皆成佛故曰如一衆生未成佛者誓不取菩提此佛度生之願也般若云度無量無數無邊衆生俱得滅度實無有一衆生得滅度者此衆生成佛之實證也古今修行願成佛者多而現在度無邊之衆生者少以各各作念待成佛後方才度生殊不知即今現在能以佛心而度衆生者乃真成佛之妙行也廣度衆生之行無踰放生一門在昔天台大師次則永明大師嘗為吏時將官錢買生放以致不死此目前衆人皆知者自後至今唯雲棲大師能效二師之行其西湖古為放生池今但濬三潭築隄作池取多分之一耳且西湖從昔以來為歌舞地實酒池肉林之所今湖中有此三池所放衆生充滿其中是從業海中變出極樂佛國也而樓船歌舞過其池者曾不返省一觀是猶然醉夢中也一心淨穢苦樂以之如唯與阿相去幾何哉其池有湖心寺寺有三塔寺已建塔未造隄未能防水也豫隨喜池上讚歎玄津法師之慈悲慨其功未底績大有憾焉歸夜臥夢行隄上其沙襯足粒粒方面皆有佛字比隨行者不敢措足豫曰爾等知大地是佛無下足處此正是汝修行時也因論衆曰若聚此沙為佛塔則施者與所施共登極樂淨土矣覺而思之遂發普度之想謂彼所放之生願彼脫苦成佛也且彼蠢蠢以佛視之況現在人人最靈最明者豈可以衆生視之乎何不願目前易度之衆生先作成佛之想以衆多之願度彼多多之衆生如是不唯所度更廣以合衆心守此池則所守益堅如此行願豈非心佛衆生等無差別之觀乎故設普化之方人施十錢一錢念佛百聲合衆心於一佛集多人成三塔所施者小所成者大是為福聚功德之海此則以沙數之佛度沙數之衆生其力更大豈不為最勝之佛事乎若由此而興起意將來盡此湖為蓮池則此方衆生無論富貴貧賤一齊同生極樂佛土矣豈不為妙行哉重修龍華寺疏古杭山水靈秀有宋建剎星列鐘鼓相聞而龍華居南屏之西南蓋梁朝傅大士開創千餘年矣司馬溫公昔有祠於此今皆廢矣其地不唯居山水之勝而為普陀天台之要衝十方雲遊必過之所惟錢塘剎竿相望求行腳息肩之地不易有也前伏牛三空和尚至而愍焉江干居士洪雲泉延之於此創未成而集者常滿居頃尋罷禪者廣坤發廣大心志願興建為接待道場丁巳春豫偶過此見佛像微妙莊嚴重生渴仰徘徊形勢背御寨而面錢塘最勝處也十方行腳至此正力倦神疲求一暫息而不可得苟獲住足安身滴水霑唇如灌醍醐而飲甘露結此功德最勝緣也且見禪人慈悲慨切一時發心善男等各各踴躍乃最勝因也但寺功大而費巨日月長而衆多若非廣大檀那作難思佛事未易滿禪者之本願也豫感而讚仰為之開導凡宰官長者居士善男女等果能發希有心生難遭想割破慳囊莊嚴佛土是以不堅之財作不朽之業即捐身捨宅而龍神守之萬世不絶較之塵世之業千年田地八百主人者何啻天壤哉況作淨土之因緣成當來之佛種冀彌勒下生龍華三會中為上首眷屬豈不為出世第一最勝功德哉以人人有佛性各各具夙因定見今日之緣不肯當而錯過豈忍寶山赤手歸乎是在諸有智者頓發無量歡喜快著勇猛之力耳刺血和金書華嚴經發願文稽首遍法界十方及三際蓮華妙莊嚴清淨微塵剎大覺無上尊分身遍一切演說清淨海圓滿修多羅性相了義詮離諸文字相七處九會中文殊諸大士剎塵數知識清淨賢僧衆我今布三業敬禮畢竟空惟以無緣慈照我真實願念我無始來流浪諸生死展轉處苦趣猶大旋火輪捨身與受身不可思議數所作諸惡業唯佛自知見今承三寶力儻來人數中六根賴完具心識多暗冥以宿微善根早出恩愛海猶入俗稠林如避溺投火內假善力熏心心願遠離外得法雨潤忽生清淨芽塵習熾盛故時復見乾枯良哉大善友與我如天授以此大因緣得出離熱惱同歸清涼界覲禮曼室尊樂住阿練若最深寂靜處心想如猿猴轉見攀緣相般若力微弱難敵生死軍以是因緣故見行諸事行稽首蓮華藏圓妙最上乘誓發歸敬心盡形頂戴受曾聞普賢行廣大不思議六種受持中書寫為第一骨筆血為墨經於微塵劫積纍如是經量等大千界我聞如是願難可與等倫但取血為墨與金共和合書寫大經卷一字法門海以此殊勝因苦海為舟楫願我此身血滴滴稱法性融入華藏海普潤衆生界我以手書持點畫心自在願此虗幻身恆得金剛體身似紫金山端嚴最無比聞名及見形心生大喜悅手如大寶聚恆出世資財七寶及四事種種皆充滿十方法界中所有諸衆生貧窮及病苦所求皆如意願我成佛時國中極清淨純一上乘人無諸惡道苦恆演此法輪極盡塵界劫我生末法中信心力微少恆與癡蓋俱難逃生死業善根未成熟儻落輪回中仗此殊勝因不墮諸惡趣常生淨佛土不離三寶前早悟自性空頓超諸有漏凡所作所為永離三毒障我以願力持直至未來際願我此經卷三災不能壞彌勒將下生光從此經出普照十方界六種大震動彌勒下生已初坐龍華樹此經從地出踊在虗空中字字出妙音說我本所願天人百萬衆咸稱希有事我時在會中為演真實義佛佛出世閒最初三七日咸演大華嚴我當機第一我身雖幻妄從父母所生依此虗妄根作成真實事願父如淨梵母如耶夫人諸佛下生時依我父母出師長度脫我法恩最上尊願諸佛會下我師為導師我友最誠諦提挈行正道願友如文殊作第一知識檀那大信力廣施大資財願此諸智人永離慳愛苦諸佛出興世最初請說法不惜身命財廣修衆善業我作如是行仗諸執持者願此諸賢聖生生常不離隨在何佛國共興揚佛法凡諸見聞者讚歎及稱揚纖悉善因緣同歸華藏海我發如是願廣大不可窮極盡未來時究竟心圓滿放生文生自生矣何以放為又何以放生為佛事耶裴休有言曰血氣之屬必有知凡有知者必同體故曰蠢動含靈皆有佛性以性即佛故殺生者即為殺佛非曰殺佛然殺生者無慈悲心即為斷佛種性矣然彼蠢蠢之生將謂可殺殊不知自己本有明明佛性豈可斷耶以不殺之心慈悲心也慈即名仁悲即不忍不忍之心仁之端也故見生不忍見死聞聲不忍食肉聖賢之首唱奚獨佛氏哉儒以素位故但遠庖厨佛以平等行慈故普及一切第放生者有執相忘相之差而效之者不無放生殺生之弊故法重忘相妙在隨緣宗本無住功嫌有漏果能遇緣即宗則觸目生機逢場佛事物物頭頭皆喜捨之門念念心心盡慈悲之境又何必拘會約以執功勛設限期以嚴規則哉明禪人久含此願願以此行之則慈悲日溥化境日寬持之十年當有無量童子而作供養復何疑哉祭陸太宰五臺居士文嗚呼受靈山之密囑來濁世以利生其來也不來故不露本來之面目即其去也不去唯留生鐵之心腸八十餘年逢場作戲恆沙妙德遇佛即宗以佛心而事君唯君為佛以真心而愛物惟物即真故生平向上事不離幞頭角邊臨行末後句委付兒女子輩惟公現宰官非宰官之身愧我作比丘非比丘之相然雖道路各別其實養家一般感公將行未行之際飛半紙嶺南之書令我於空不空之中引一滴曹溪之水作甘露之供獻灌頂之尊嗚呼平湖滿月覩清淨之法身天樂盈空吐廣長之妙舌納斯法味用鑒蓬心尚饗祭大中丞順菴胡公文嗚呼痛哉公其生耶死耶反復求之而不得其故也忽聞公訃適言公死及讀公易簀詩則公明以不死告人而人不知唯我明明知公不死言之而恐人之莫我信也嗚呼悲哉顧我與公偶爾值於大化之中三十餘年如一日蓋亦奇矣始而遇公於首陽之野一見而心莫逆驟爾語公以一禍福齊生死時則公已怡然有當於心既而再索我於清涼之山跏趺於千尺寒巖之下談笑於萬年積雪之中嚼堅冰而餐𥺷浩劫一息時公已有登天撓霧之思超然遐舉之想矣第未知其祕也未幾余因訪公於雁門坐轅門如處空谷連牀共被三月不違日夜發以緒言時則公已了然默契於心由是而知視軒冕如塵垢身世如蜩翼也遂相期我於東海之上餐朝霞而結樓居已而公果以我脫塵鞅我則以公忘去就當是時也與公遊戲於海印光中萬里長波皎然一碧儼若臨寶鏡而履琉璃坐蓮華而居淨土不知此身之在天地外物之在此身其樂殊未央也俄爾天帝怒我以輕鑿混沌散朴澆淳乃罰我於九死放我於瘴鄉時與公永訣矣公以我為必死將託處些以招之忽爾十年如一息時時知公思我結想於寒雲哭我積淚如長河而殊不知我之與公遨遊如宿昔居然眉睫寤寐無間於毫髮也嗚呼悲哉是歲五月公走尺素慰我於萬里我遣侍者訊公於七月我樂懷公詩則曰酷似維摩病裏身書至而公已示疾矣公把我書誦我詩時公在口期月而逝是我慰公以生平公永訣我如對面斯亦奇矣我昔訣公不若公今訣我也使我思公哭公豈不若公之思我哭我耶公之生也不偶然負高明之見抱不世之才忠在社稷心在蒼生公之世有盡而才未盡形化而心不化也如公之臨終詩曰靈根常傍月華明以此觀之視死生如夜旦千古如一日也惟公神遊太漠聽鈞天而居廣府侶飛仙而壽無極其視昔也如糞壤孰知公今之樂殊絶勝於疇昔耶公既樂矣余復何悲嗚呼哀哉尚饗祭達觀大師文維萬曆四十四年歲次丙辰十一月庚子朔越十有九日丙戌前海印沙門辱教德清謹陳香積之供致祭於紫柏尊者達觀大師之靈曰嗚呼惟師之生也不生乘願力而來師之死也不死順解脫而去去來不落常情生死豈同世諦以師之住世也秉金剛心踞堅固地三十餘年家常茶飯脊骨純鋼千七百則陳爛葛藤鼻孔殘涕推倒彌勒釋迦不讓德山臨濟為人極盡慈悲臨機絶無忌諱誓護法若惜眼睛求大事如喪考妣不與世情和合便是真實行履晏坐水月光中獨步空華影裏初訪豫於東海也頓脫形骸既再晤於西山也搜窮骨髓當豫禍之未形也備告以隱微及豫難之既發也將為我以雪洗且酬宿約於曹溪將扣閽於帝里冒炎蒸於道路兮望影響而進止乃設法以多方冀出豫於九死嗚呼師之為法門也實抱程嬰杵臼之心師之為知己也殆非管鮑陳雷之比豫荷皇仁之薄罰兮在師心猶未已豫被放於嶺表兮師伫候於江沚一見悲歡而交集兮如九原之復起豫與師作永訣兮甘為炎方之厲鬼師囑豫以寧志兮冀幽扄之再啓豫揮涕以臨長路兮師執手含悲而不語維時關山一別兮日月若矢心知師之不我忘兮每丁寧其無以師以願力所持兮誓不負其本始乃斂太阿之光𦦨兮不願放於塵滓冀和璧之必信兮不惜隋珠之輕抵將扣君門兮九重倏飈風兮四起陸海波騰龍蛇披靡玉石俱焚法幢傾圮師登八道之康衢兮忽遇長蛇與封豕皇天實鑒其衷腸兮唯見逞於庸鄙幸此心之一白兮聊以發其蘊底師實曠然何憂何喜逆順隨宜死生遊戲何夙負之相尋兮信前緣之固爾悲五濁之不堪直一行之可恃乃盥潄以趺坐兮遂寂然而長往矣嗚呼痛哉師既不以禍患攖寧又何以去來為事撒手便行全無議擬惟師以金剛為心故留不壞之體有豫弟子奉師以旋兮就雙徑以歸止豫聞訃以摧心兮望長安而殞涕欲親禮於龕室兮奈業繫之羈縻擬生還以慰師靈兮忽星霜之踰紀匪此心之暫安兮第因緣之不我與頃幸遂其本懷兮始得陳辭而致誅嗚呼痛哉師何死兮我何生我不來兮師不寧形骸異兮共此心幽冥隔兮終合并誓同歸兮踐深盟寂光朗兮師安住我頂禮兮展哀慕陳香積兮灑甘露師臨機兮願來赴光明兮照曜翹勤兮延伫哀哉尚饗祭雲棲大師文嗚呼師本不生亦無所去以力持身順因緣故欲海波騰火宅𦦨熾師展願輪特來救濟出示塵勞早歸慈父一登覺路如白牛步視愛如唾觀親若冤彼蠅聚者孰不瞿然法界為家含靈是宅物我等觀無二無別開甘露門指歸淨土鱗甲羽毛一齊頓赴悲正法眼翳彼戒根以金剛篦刮垢剔昏三千威儀八萬細行於二六時悉令清淨身為衆目心為大宅十方來者癡狂頓歇四十餘年法幢高豎一雨普滋藥草諸樹才霑一滴枝葉並茂但有得者畢竟成就我觀吾師如獅子王高臥堀中羣走慞惶我又觀師如藥王樹凡有親者必瘳沈痼嗟我末法慧日久沈師於長夜持大智燈佛本無心心付在師薩埵無行行託師持故師應世一味無我即住百劫於何不可嗚呼師以緣現緣滅即去悲此羣盲失所依怙我數千里遠持瓣香展布五體敬禮寂光師悲同體以我知音願鑒我誠來格來歆嗚呼尚饗祭金竹續芳聯公文嗚呼公秉願輪生堪忍界蚤遇明師頓離恩愛發堅固心償慈悲債放身空山飢寒是耐敬守師訓躬身負戴志供十方平等無礙翦荊棘以成叢林驅狐兔而揚梵唄衲子雲臻天龍拱衛飯積如山來者飽餐如量如空居者無外具精進力至老不懈一身如寄毫無沾帶擬將𢹂手同歸何期先行不待撩起便行何等慶快遺金剛幢常住不壞法身湛然寂光自在惟靈不昧鑒此感慨嗚呼哀哉尚饗結社念佛修四十八願同生淨土文伏以惟心淨土處處道場自性彌陀人人具足只為塵勞遮障人我是非故感土石諸山穢惡充滿使本來清淨之體昧却當人圓滿智慧光明一毫不現終朝業識茫茫逐日境風浩浩但知受用目前誰解修因身後故我樂教主阿彌陀佛因地發心厭斯堪忍立四十八願願願度生修十六觀心心心作佛令人人知心是佛豈向外求使個個了願即真盡歸自性推倒人我之高山感寶地一平如掌打破塵勞之幻夢生蓮華廣大如輪我心清淨彼土現成休教過後追思只在現前結果不分男女總證菩提但是有緣皆登寶地但以天生彌勒猶須授記靈山自然釋迦也要莊嚴佛土痛念生居五濁命不保於須臾罪業多端苦難逃於長劫雖父慈子孝只顧各人兄愛弟恭豈能相代縱有富貴榮華到底總成一夢深思至此實可悲酸是以發願修因必欲一生取辦既知諸行無常豈可仍前貪戀已悟自心是佛只須直下承當攪長河為酥酪原在當人變大地作黃金實由自己伏望願心如佛即是佛心因果皆真必成真果發一願而四生九有同出苦輪施一滴而八難三途通歸樂土花開見佛如母子之馨香妄盡還源似氷霜之皎潔一心清淨萬德交歸大地山河總成極樂者矣祭匡廬徹空師文惟師之來也何事何為惟師之去也何心何慮現比丘身坐斷乾坤作師子吼驚走狐兔當索我於清涼也雲滿溪山復歸師之舊隱也月圓蓬戶尚把九曲之珠擬待師而暗度何其一旦長行哀音忽訃嗚呼使我有口難開含冤莫訴以其同生而不同死同歸而不同住賴有匡廬山高法身遍覆彭湖水清三昧昭著然雖倒却剎竿且幸扶起露柱頓令五老長呼千峰率舞白鹿悲風黃龍泣雨愈卷恆舒欲隱彌露是則可贊而不可歎可笑而不可哭嗚呼師且暫休聽末後句打破寂光掀翻淨土再來撞著惡辣闍梨拖住定不放師歸去惟靈尚饗對曾九龍居士靈幃小參文萬曆三十六年五月草六日當曾居士五七之辰同社友各擎香作禮請憨山和尚為居士小參居士聽麼佛說諸行無常是生滅法生滅滅已寂滅為樂居士會麼居士住世三十七年所作諸行正當作時是無常耶作後是無常耶直至今日是無常耶若言今日是無常則墮斷滅若言作後是無常則不待今日若正當作時是無常則舉世皆無常矣何獨居士居士會麼若了作是無常則無常無性誰為生滅無生滅者又何得而生死哉居士了此則今日正受寂滅樂時此則悲居士者皆生滅見也為達師茶毗舉火文性火真空性空真火狹路相逢定沒處躲恭惟紫柏尊者達觀大和尚偶來人世誤落塵寰赤力力脫盡娘生布衫光爍爍露出本來面目荷擔正法純剛煉就肩頭徹底為人生鐵鑄成肝膽死生路上直往直來今事門頭半開半掩六十餘年松風水月襟懷千七百則兔角龜毛拄杖饒他末後風流未免藏頭露尾撇下賊私誰料落在憨山道人手中今日特為人天衆前當陽拈出大衆還見麼以火把畫相云拄杖挑開雙徑雲通身涌出光明藏珍重諸人著眼看者回始信無遮障
