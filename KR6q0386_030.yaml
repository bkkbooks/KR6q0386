body:
  text: 侍者福善日録門人通炯編輯嶺南弟子劉起相重較傳南京僧録司左覺義兼大報恩寺住持高祖西林翁大和尚傳祖翁諱永寧別號西林六合縣郭氏子幼出家禮報恩無瑕玉公為師翁生性耿介持重言動不妄少即為衆所推年二十即持金剛經至老不輟武宗駕幸南都駐蹕本寺大宗伯慮僧無可承旨者遴選皆不稱先是翁與僧名惠遠者號東林相與莫逆兩人狀貌魁偉喬白巖為大司馬久與翁善遂舉兩人宗伯大喜即以遠為僧録右覺義以翁為本寺提點及上駕駐寺明日登大殿禮佛畢百官朝罷上諭作誦經佛事命呈疏草宗伯議須翰林祖翁曰佛疏別有體制須僧家當行可耳即舉遠公具疏草呈上覽之喜曰朕家有此僧耶宗伯即以僧録印付遠掌便行事也上至塔殿見地下一孔問執殿役僧曰此何物應曰金井上不懌祖翁跪奏曰此氣眼上曰何用祖翁曰有佛舍利藏於塔下留此以通氣耳上意解做道場七日其主壇場法事皆遠公其承旨內外一切事宜皆祖翁至上駕行竟無一缺繇是宗伯甚重之嘉靖十年衆舉為本寺住持綜理山門事二十年升僧録右覺義又五年升左覺義先是江南佛法未大行翁雖居官秩切以法門為憂每見僧徒見輕於士林歎曰為僧不學故取辱名教玷污法門耳初請先師雲谷和尚住三藏殿教諸習禪者於是始知有禪宗數年先師去隱棲霞適守愚先師南來五臺陸公為祠部主政謂祖翁曰頃見高僧守愚法師講演甚明當請至寺教習僧徒翁即禮請先師居三藏殿設常住供贍選僧數十衆日親領往聽講從此始知向佛法雲谷先師居棲霞陸公遊攝山見而雅重之即欲重興請師為住持師堅辭不可乃屬祖翁舉嵩山善公為棲霞住持由是重興道場復寺業開法社為接待叢林自是禪道佛法乃大行方知有十方接待皆吾祖翁力興起也先是僧多習俗不能對士君子一語翁居常謂僧徒以禪教為本業然欲通文義識忠孝大節須先從儒入乃延儒師教某等十餘人讀五經四書子史某所以粗知讀書文義及披剃即知聽講習禪即雪浪中興一代教法皆翁慈心攝持教養之力也翁掌僧録印二十五年諸山一體奉法惟謹山門事務一草一葉不敢輕棄視常住如眼睛故山門興而法運昌也每率衆僧上殿祝延聖壽見僧有懶墮不至者翁切責之曰此殿乃天宮淨土爾等懶慢如此他日求一瞻禮不可得也翁於嘉靖四十三年臘月除日集諸子孫敘生平行履因屬後事乃撫某背囑之曰吾年八十有三當行矣門庭多故一日無老人則支持甚難此兒雖年少饒有識量我身後汝等一門大小凡有事當立我像前聽此兒主張庶幾可保無虞耳少祖艮山厚公以下皆唯唯受命明年正月七日翁具袈裟巡寮遍謝合寺耆舊十日持僧録印謁禮部大宗伯請以老辭大宗伯慰留不允翁歸即封其印明日示微疾請醫進藥翁曰吾已矣竟不藥某侍翁病中聞誦金剛經不絶至十五中夜令舉衆大小圍繞念佛某扶翁坐懷中寂然而逝十四年正月十六日也翁素無蓄積簡篋不滿三十金喪禮葬送約費三百餘金皆借貸既葬合房舉無所措少祖憂之乃集大小於祖翁像前議無所出於是某立主張將翁所遺衣鉢什物凡可值者計之盡估以償貸者儻不足當以田變價盡償之苟無負纍則衣食易為耳衆如議乃設齋盡集諸貸主各執券照子母分給所負貸券一夕盡焚於是率保其房門子孫不散少祖始稱翁為知人是年二月方丈明年二月十五日大殿災奉旨以本寺官住頭首執事下法司者十五人以本寺為朝廷家佛堂凡物皆出內帑事干重典法當論死合寺僧懼盡逃去某獨身往法司看管鹽菜饘粥荷擔往來於中多方調護設法解救竟末減坐罰囚糧於是合寺安堵皆感誦翁為知人翁生於成化癸卯世壽八十有三今西林庵乃存日所修退居也全身葬於智安寺某年十二蒙翁度脫出家乃命以梅齋俊公為師教習經書十九披剃侍翁十年行事微細多不能記憶但見逐日侵晨持誦回向西方未嘗少廢每隨行履見其端莊挺特足不挽衣鐵面威嚴未見輕一啓齒笑容奉雲谷守愚二先師如對大賓至敬盡禮即諸山尋常僧來謁不整衣冠不見其撫某等讀書如慈母之嬰兒也懷感祖恩五十餘年向在東海記翁行實甚詳因被難失草今老矣忘者十九切念後之子孫不知先人所自記其大略以詔後裔庶先德典刑世世如在也贊曰天道循環與時升降而法道亦然故道將興也必應真乘時以啓之非偶然也觀江南佛法草昧如舍利未湧出時今則法雨充滿洋洋佛國之風孰致之耶吾翁雖非任道而道實因之詎非功侔作者耶雲谷先大師傳師諱法會別號雲谷嘉善胥山懷氏子生於弘治庚申幼志出世投邑大雲寺某公為師初習瑜伽師每思曰出家以生死大事為切何以碌碌衣食計為年十九即決志操方尋登壇受具聞天台小止觀法門專精修習法舟濟禪師續徑山之道掩關於郡之天寧師往參扣呈其所修舟曰止觀之要不依身心氣息內外脫然子之所修流於下乘豈西來的意耶學道必以悟心為主師悲仰請益舟授以念佛審實話頭直令重下疑情師依教日夜參究寢食俱廢一日受食食盡亦不自知碗忽墮地猛然有省恍如夢覺復請益舟乃蒙印可閲宗鏡録大悟唯心之旨從此一切經教及諸祖公案了然如覩家中故物於是韜晦叢林陸沉賤役一日閲鐔津集見明教大師護法深心初禮觀音大士日夜稱名十萬聲師願效其行遂頂戴觀音大士像通宵不寐禮拜經行終身不懈時江南佛法禪道絶然無聞師初至金陵寓天界毗盧閣下行道見者稱異魏國先王聞之乃請於西園叢桂庵供養師住此入定三日夜居無何豫先太師祖西林翁掌僧録兼報恩住持往謁師即請住本寺之三藏殿師危坐一龕絶無將迎足不越閫者三年人無知者偶有權貴人遊至見師端坐以為無禮謾辱之師拽杖之攝山棲霞棲霞乃梁朝開山武帝鑿千佛嶺纍朝賜供贍田地道場荒廢殿堂為虎狼巢師愛其幽深遂誅茅於千佛嶺下影不出山時有盜侵師竊去所有夜行至天明尚不離菴人獲之送至師師食以飲食盡與所有持去由是聞者感化太宰五臺陸公初仕為祠部主政訪古道場偶遊棲霞見師氣宇不凡雅重之信宿山中欲重興其寺請師為住持師堅辭舉嵩山善公以應命善公盡復寺故業斥豪民占據第宅為方丈建禪堂開講席納四來江南叢林肇於此師之力也道場既開往來者衆師乃移居於山之最深處曰天開巖弔影如初一時宰官居士因陸公開導多知有禪道聞師之風往往造謁凡參請者一見師即問曰日用事如何不論貴賤僧俗入室必擲蒲團於地令其端坐返觀自己本來面目甚至終日竟夜無一語臨別必叮嚀曰無空過日再見必問別後用心功夫難易若何故荒唐者茫無以應以慈愈切而嚴益重雖無門庭設施見者望崖不寒而栗然師一以等心相攝從來接人軟語低聲一味平懷未常有辭色士大夫歸依者日益衆即不能入山有請見者師以化導為心亦就見歲一往來城中必主於回光寺每至則在家二衆歸之如繞華座師一視如幻化人曾無一念分別心故親近者如嬰兒之傍慈母也出城多主於普德臞鶴悅公實稟其教先太師翁每延入丈室動經旬月豫童子時即親近執侍辱師器之訓誨不倦豫年十九有不欲出家意師知之問曰汝何背初心耶豫曰第厭其俗耳師曰汝知厭俗何不學高僧古之高僧天子不以臣禮待之父母不以子禮畜之天龍恭敬不以為喜當取傳燈録高僧傳讀之則知之矣豫即簡書笥得中峰廣録一部持白師師曰熟味此即知僧之為貴也豫由是決志剃染實蒙師之開發乃嘉靖甲子歲也丙寅冬師愍禪道絶響乃集五十三人結坐禪期於天界師力拔豫入衆同參指示向上一路教以念佛審實話頭是時始知有宗門事比南都諸剎從禪者四五人耳師垂老悲心益切雖最小沙彌一以慈眼視之遇之以禮凡動靜威儀無不耳提面命循循善誘見者人人以為親己然護法心深不輕初學不慢毀戒諸山僧多不律凡有千法紀者師一聞之不待求而往救必懇懇當事佛法付囑王臣為外護惟在仰體佛心辱僧即辱佛也聞者莫不改容釋然必至解脫而後已然竟罔聞於人者故聽者亦未嘗以多事為煩久久皆知出於無緣慈也了凡袁公未第時參師於山中相對默坐三日夜師示之以唯心立命之旨公奉教事詳省身録由是師道日益重隆慶辛未豫辭師北遊師誡之曰古人行腳單為求明己躬下事爾當思他日將何以見父母師友慎毋虗費草鞋錢也豫涕泣禮別壬申春嘉禾吏部尚書默泉吳公刑部尚書旦泉鄭公平湖太僕五臺陸公與弟雲臺同請師故山諸公時時入室問道每見必炷香請益執弟子禮達觀可禪師常同尚書平泉陸公中書思菴徐公謁師扣華嚴宗旨師為發揮四法界圓融之妙皆歎未曾有師尋常示人特揭唯心淨土法門生平任緣未常樹立門庭諸山但有禪講道場必請坐方丈至則舉揚百丈規矩務明先德典刑不少假借居恆安重寡言出語如空谷音定力攝持住山清修四十餘年如一日脅不至席終身禮誦未嘗輟一夕當江南禪道草昧之時出入多口之地始終無議之者其操行可知已師居鄉三載所蒙化千萬計一夜四鄉之人見師庵中大火發及明趨視師已寂然而逝矣萬曆三年乙亥正月初五日也師生於弘治庚申世壽七十有五僧臘五十弟子真印等茶毗葬於寺右豫自離師遍歷諸方所參知識未見操履平實真慈安詳之若師者每一興想師之音聲色相昭然心目以感法乳之深故至老而不能忘也師之發迹入道因緣蓋常親蒙開示第末後一著未知所歸前丁巳歲東遊赴沈定凡居士齋禮師塔於棲真乃募建塔亭置供贍田少盡一念見了凡先生銘未悉乃槩述見聞行履為之傳以示來者師為中興禪道之祖惜機語失録無以發揚祕妙耳釋德清曰達摩單傳之道五宗而下至我明徑山之後獅絃將絶響矣唯我大師從法舟禪師續如線之脈雖未大建法幢然當大法草昧之時挺然力振其道使人知有向上事其於見地穩密操履平實動靜不忘規矩猶存百丈之典刑遍閲諸方縱有作者無以越之豈非一代人天師表歟清愧鈍根下劣不能克紹家聲有負明教至若荷法之心未敢忘於一息也敬述師生平之槩後之觀者當有以見古人云敕建五臺山大護國聖光寺妙峰登禪師傳師諱福登別號妙峰山西平陽人姓續氏春秋續鞠居之後也師生方七歲父母值凶歲亡無殮具薦席而已師失怙恃年十二投近寺僧出家不得善視年十八遂逃攜一瓢至蒲坂郡東山有文昌閣萬固寺僧朗公居之師至日乞於市暮宿於閣朗公憐之居無何山陰王出遊見師奇之謂朗公曰當善視此子他日必成大器公遂留為弟子居頃之值地夜大震民居盡塌師被壓將為必死朗公亟搜之幸無恙王因謂師曰子臨大難不死此非尋常何不痛念生死大事乎師時年二十二即奮志遠遊王曰未可姑就中條山之棲岩寺修蘭若令師閉關師請益近之法師示以法界觀於關中依習禪觀日夜鵠立者三年心有開悟乃作偈呈王王見之曰此子見處早如此不折之他日必狂因取敝履割底封寄之乃書一偈曰者片臭鞋底封將寄與爾並不為別事專打作詩嘴師見之對佛作禮以線繫於項上自此絶無一言矣三年破關往見王則具大人相王甚喜乃曰子雖知本分事但未聞佛法恐墮邪見介休山中有講楞嚴經者促師往聽授具戒師年二十七王謂師曰子為僧未出山門如井蛙耳南方多知識子當往參他日歸來可當老夫行腳也乃親為師緝理操方具解自著絨衣襪外裰以藍縷手授之曰此防寒也師受教即單瓢隻杖南詢遍參知識至南海禮普陀回寧波染時症病幾死旅宿求滴水不可得乃探手就浴盆掬水飲之甚甘詰朝視之極穢濁遂大嘔吐忽自覺曰飲之甚甘視之甚濁淨穢由心耳即通身大汗病乃痊而遍體疥腫至南都時隆慶元年冬月也適先大師講法華經於天界豫居副講師執淨頭役豫每早起見廁潔即知行者為非常人宵偵之見師執燈灑掃洗籌杖近窺之乃一黃病頭陀耳心異之久之師病臥於客寮豫往視則瘡腫遍身手不能舉因問師安否師曰業障身病已難當饞病更難治豫曰何謂也師曰但見行齋饅頭恨不都放下豫心知為有道者明日袖餅果往候以手投師欣然咽之大快豫笑曰此真道人也因坐談師曰每聞師講心開意解英年妙悟如此豫曰此非本分事志將從師遠遊參究向上一著耳不旬日覔師不得知潛行恐以豫為纍也師歸王見甚喜且詢所見法門人物師述先德知識在初學則以豫為一人王繇是亦念之師既歸無意人間世乃於中條最深處誅茅弔影以居辟穀飲水三年大有發悟即以宗鏡印心深人唯心之旨王日重三寶於南山建梵宇成延師居之且欲求北藏經於大內促師親往師居山日久髮長未剪乃隨宦遊者至京師時豫已乞食長安師於馬上偶識豫於燕市舍館定乃物色於西山一見曰識得麼豫熟視之見雙瞳炯炯忽憶為天界病行者也曰識得師曰改頭換面也豫曰本來面目自在師笑而作禮齋罷別去明日往候連床夜談具述求藏因緣豫曰自別師無日不念今特相尋適來觀光上國以了他日妄想耳師曰儻不棄某當為師前驅打狗耳即別隆慶壬申冬月也明年春三月豫遊五臺志居之以不禁冰雪復回都門行乞左司馬伯玉汪公語豫曰法門寥落大自可悲觀公骨氣異日當為人天師幸無浪遊小子視方今無可為公師者捨妙峰公無友矣豫曰夙有盟公曰果同行小子當為津之是年秋師造藏完已束裝豫適至師即命登車未一言遂同行及至蒲王見甚歡安藏畢乃留結冬萬曆元年癸酉也師居常以二親魂未妥欲改葬山因國主分守查公平陽太守順庵胡公各助葬明年甲戌春正月豫同師結隱五臺東行便道過里合葬二親豫為卜城東高敝地葬之作墓志銘事畢遂至臺山卜居北臺之龍門冰雪堆中得老屋數椽共棲之越三年豫恆思無以報二親乃發願刺血泥金書華嚴經師亦刺舌血硃書各一部經將完師欲建無遮大會遂下山募資具期年緣畢集欲演大華嚴擬萬曆九年辛巳冬日開啓先是慈聖聖母為薦先帝保聖躬修五臺塔院寺舍利塔時工將竣求皇儲遣官於五臺時會方集於新寺豫與師議曰吾徒凡所作為無非為國報本也宜將一切盡歸之實方外臣子一念之忠耳師然之以是年冬十一月啓會明年壬午春三月圓滿期百二十日九邊八省緇白赴會者道路不絶每食不減數千人會罷將所餘金穀封付常住與師一鉢飄然長別矣豫東蹈海土師往蘆芽結庵以居期年聖母以求儲因緣訪豫二人獨得師就蘆芽賜建華嚴寺頃成一大道場於山頂造萬佛鐵塔一座高七級初蒲坂萬固寺為師故山有唐聖僧舍利塔十三級高三百尺及大佛殿皆傾圮鄉大司馬見川王公議重修延師居三年塔殿鼎新頃之三原大中丞廓菴李公請建渭河橋梁師往二年工既竣回蘆芽過寧化見石壁千仞一平如掌師喜之乃鑿為窟深廣高下各三丈五尺雕華藏世界十方佛剎圖萬佛菩薩像精密細妙遂成一大道場居無何宣府西院議建大河橋師應命至度之水濶沙深乃建橋二十三孔亦竟成師素願範滲金三大土像造銅殿三座送三大名山己亥春杖錫潞安謁瀋王王適造滲金普賢大士送峨嵋師言銅殿事王問費幾何師曰每座須萬金王欣然願造峨嵋者即具輜重送師至荊州聽自監製用取足於王殿高廣丈餘滲金雕鏤諸佛菩薩像精妙絶倫世所未有殿成送至峨嵋大中丞霽宇王公撫蜀聞師至請見問心要有契公即願助南海者乃采銅於蜀就匠氏於荊門工成載至龍江時普陀僧力拒之不果往遂卜地於南都之華山奏聖母賜建殿宇安置遂成一大剎師乃造五臺者所施皆出於民間未幾亦就乙巳春師躬送五臺議置臺懷顯通寺上聞遣御馬太監王忠聖母遣近侍太監陳儒各賫帑金往視卜地於寺建殿安奉以丙午夏五月興工鼎新創立以磚壘七處九會大殿前後六層周匝樓閣重重聳列規模壯麗賜額敕建大護國聖光永明寺工竣乃建華嚴七處九會道場上下千二百衆請十法師演華嚴經所費皆出內帑道場之盛蓋從前所未有也師初入臺山以道路崎嶇於是溪設橋梁石鋪大路三百餘里修阜平縣橋賜額普濟建接待院為往來息肩之所又於龍泉關外忍草石建茶菴敕賜惠濟院捨藥施茶歲常賜金若干隨蒙頒賜龍藏建磚閣安供後創七如來殿又於阜平立長壽莊奉聖母建殿閣前後七層範接引彌陀像高三丈六尺山門鐘鼓兩廊寮舍規模宏敞又為一大道場賜額慈佑圓明寺置供贍田數頃師居五臺當建立時亦應他緣山西撫臺請修崞縣要路滹沱河大橋晉王請修省城大塔寺殿宇完修會城橋長十里工未成壬子秋九月師以疾還山乃料理所建道場上下立為十方常住各得其人向來眷屬各令歸故山不留一人臘月十九日卯時端然而逝師生於嘉靖庚子入滅於萬曆壬子世壽七十有三法臘四十有奇師既化上聞之賜葬建塔於永明之西問師功德未完者悉令完之聖母賜千金布五百匹為葬事初侍御蘇公雲浦按山西因入山訪師問心要相契往返酬酢多語句未録師示恙公遣醫致藥石及遷化公為製塔銘常曰人以妙峰師為福田善知識實不知其超悟處也嗚呼師果何人哉起於孤微卒能於天人中作一代廣大佛事以豫蚤歲物色師於陸沉賤役中及年三十同行腳刻志修行既而臺山一別三十餘年始以小王助道終至聖天子聖母諸王為檀越凡所營建法施應念雲湧投足所至遂成寶坊果何緣而能致耶苟非心遊法界圓融性海所流不思議力而能若此也耶師自發迹操方住山行履從來一衲之外無長物恆隨侍者無一人如所建立皆秉明一心而金錢施利曾未染指隨立隨去略無介懷所成大剎十餘處無一弟子為居守住則隨緣一毫不私去則若忘寸絲不挂飄然若浮雲之聚散孤鶴之往來豈非深證唯心遇緣即宗者耶師貌古骨剛具五陋面嚴冷絶情識孤徑無緣飾終身脅不至席豫深感切磋之力名雖道友其實心師之也雖別三十餘年時時居然在目如臨師保生平不忘所自豈非宿緣哉悲豫老矣不能致瓣香於龕室以因緣障道世多肉眼槩以福田視師而不知其密造故述師生平之槩使後世知我明二百餘年其在法門建立之功行亦唯師一人而已豈易見哉贊曰古人一得金剛正眼則能攬長河為酥酪變大地作黃金非分外事然於法性空中特野馬塵埃師之自視也亦若是而已豫常竊謂假能以似師之緣攝歸一際作助道具建剎如那蘭陀性相並樹禪淨雙修則四十餘年足不離影而於法門之功當與清涼東林比隆矣觸目華藏淨土莊嚴又不止三山十剎而已也嗟乎往矣其或俟師再來耶雪浪法師恩公中興法道傳自白馬西來像教東興羅什淨名振其綱遠公涅槃挹其緒而大法始昌明於中夏六朝盛矣然其真宗猶未大樹立自天台標三觀以成一家有唐賢首始開華嚴法界之宗清涼獨擅其美玄奘闡唯識之旨窺基專業其門由是性相二宗之淵源一心三諦之旨始橫流於大地吾佛一代聖教如大海潛流於四天下教義幽宗如揭日月於中天矣自是著述多門標定非一無非探其本源而攝歸真際總皆遊泳如來之性海撈摝法界之魚龍不異覩白毫於靈山聽圓音於覺苑也自達摩西來立單傳之旨直指一心不尚文字由是教為佛眼禪為佛心禪教齊驅並行不悖及六祖而下禪道大興則不無尚執之呵而教禪始裂圭峰力挽未能永明會性相歸一心目為宗鏡而佛祖全體大用彰明大著矣惟我聖祖龍飛廓清寰宇開萬世太平之業初至建康劒甲未解即崇重佛氏洪武三年詔天下高僧安置於天界寺建普度道場於鐘山靈谷名流畢集大闡玄宗御駕躬臨親聞法喜而法道之盛不減在昔何其偉與由是於一門制立三教謂禪講瑜珈以禪悟自心講明法性瑜珈以濟幽冥乃建三大剎以天界安禪侶以天禧居義學以能仁居瑜珈汪汪洋洋天下朝宗自北遷之後而禪道不彰獨講演一宗集於大都而江南法道日漸靡無聞焉正嘉之際北方講席亦唯通泰二大老踞華座於京師海內學者畢集而南方學者習於軟暖望若登天惟我先大師無極和尚自淮陰從師一鉢往依焉飲冰囓雪廢寢忘餐者二十餘年具得賢首慈恩性相宗旨既而南歸至金陵魏國公子見而悅之遂為檀越請講圓覺經唱而不和聽者寥寥祠部主政五臺陸公往謁謂先太師翁西林和尚曰頃見北來高僧無極真人天師也聆其講説妙義深契佛心吾念報恩乃聖祖所設之講教僧徒居此安可絶無聞乎公為住持誠能禮請歸寺大演法道開誘羣蒙法門之幸也師翁唯唯即盡禮致幣敦請時嘉靖三十二年也師至安居於寺之三藏殿以玄奘大師髮塔在焉常住歲設常供太師翁乃選寺僧數十人躬領座下日聽講諸經附近諸山耆宿稍有應者久之則京城善士日集知供四事善化之風漸開時有居士黃公某者夫婦久持齋一日公攜幼子六郎往設供六郎即雪浪法師恩公也公生性超邁朗爽不羣唯好嬉戲作佛事及入社學先生訓句讀略不經心督之第相視而嘻固無當也是日設供值講八識規矩公一聞即有當於心傾聽之留二三日父歸喚公公不應父曰若愛出家耶公笑而點首父強之竟不歸父歸數日母思之切促父往攜之父至強之再三公暗袖剪刀潛至三藏塔前自剪頂髮手提向父曰將此寄與母父痛哭公視之而已由是竟不歸父回告母遂聽之公時年十二也從此為沙彌出入衆中作大人相一日大衆齋公先至飯堂坐第一座頃首座至咄曰小沙彌何得居此座公曰此座誰當居座曰通佛法者公曰如是則我當居之座曰汝通何佛法公曰請問座曰且問今日法座上講箇甚麼公隨口而應了了大意一衆驚歎曰此子再來人也公每聽講即嬉戲及問之無遺義焉公出家之明年豫十二歲亦出家太師翁攜豫參先大師公坐戲於佛殿一見豫而色喜若素親狎人視為同胞然豫以幼從讀誦未知義也公少居講肆見解超羣一衆敬服年十八即分座副講聞者悚悟然公天性不羈略不為意豫十九剃髮先大師於本寺演華嚴玄談豫即從授戒聽講心意開解如夙習焉時公器豫即以法為兄弟莫逆也公尚未習世俗文字豫偶作山居賦一首公粘於壁公姪博士黃生見之羡曰阿叔有愧此公多矣公曰是雕蟲技耳何足齒哉公年二十一佛法淹貫自是勵志始習世間經書子史百氏及古辭賦詩歌靡不搜索遊戲染翰意在筆先三吳名士切磨殆遍所出聲詩無不膾炙人口尺牘隻字得為珍祕嘗謂豫曰人言不讀萬卷書不知杜詩我説不讀萬卷書不知佛法常閲華嚴大疏至五地聖人博通世諦諸家之學方堪涉俗利生公之肆力於是豈無意乎豫從雲谷先師習禪於天界切志參究向上事公每見豫枯坐即呵曰用如三家村裏土地作麼頻激以聽講豫曰各從其志耳古德云若自性宗通回視文字如推門落臼固無難也公曰若果能此吾則兄事之自是豫於山林之志益切以始閲華嚴知有五臺山心日馳之年二十五志將北遊別公於雪浪菴公曰子色力孱弱北地苦寒固難堪也無已吾姑擕子遨遊三吳操其筋骨而後行未晚豫曰三吳乃枕席耳自知生平軟暖習氣不至無可使之地決不能治此固豫之志也公曰若必行俟吾少庀行李之資以備風雨豫笑曰兄視弟壽當幾何公曰安可計此豫曰兄即能資歲月計安能終餘日哉公意戀戀不已豫詒之曰兄如不釋然試略圖之公冒大雪方入城豫即攜一瓢長往矣公回山不見豫不覺放聲大哭以此知公生平也豫遂孤杖北遊公亦遊目嵩山至伏牛結冬而歸居常曰清兄去吾無友矣既聞豫在都下公瓢笠而尋至則豫行腳他方公遂留京師及豫同妙峰師入五臺結茅以居公聞之即登臺山問豫於冰雪堆中夜談因扣公志公曰吾見若此心如冰誓將同死生耳第念本師老矣奈何豫曰不然人各有志亦各有緣察兄之緣在弘法以續慧命非枯寂比也江南法道久湮幸本師和尚受佛付囑而開闢之觀座下似未有能振其家聲者兄乃克家的肖子將來法道之任匪輕且師長暮年非兄何以光前啓後幸速歸無久滯他方也公即理䇿歸濵行豫囑之曰兄素未以法自任此回乘本師老年就當侍座以收四方學者之心他日登壇則吾家故物耳幸無多讓公既歸則挺然以法為任久參夙學皆却步矣先師弘法以來三演大疏七講玄談公盡得華嚴法界圓融無礙之旨遊泳性海時稱獨步公素慕禪宗大章宗師開堂於少林公束包往參竟中止既而遜菴昂公從少室來至棲霞拈提公案公折節往從商確古德機緣得單傳之旨人或恥公公曰文殊為七佛師何妨為釋迦白槌自爾凡出語言頓脫拘忌從此安心禪觀及先師遷化公據華座日繞萬指一旦翻然盡掃訓詁俗習單提本文直探佛意拈示言外之旨恆教學人以理觀為入門由是學者耳目煥然一新如望長空撥雲霧而見天日法雷啓蟄羣彚昭蘇聞者莫不歎未曾有先是講肆所至多本色無文所入教義如抱樁搖櫓略無超脫之機及公出世如摩尼圓照五色相鮮隨方而應一雨普霑三草二木無不蒙潤且以慈攝之以威折之一時聰明特達之士無不出其座下始終説法幾三十年每期衆多萬指即間遊山水杖錫所至隨緣任意水邊樹下稱性揮麈若龍驤虎嘯風動雲從自昔南北法席之盛未有若此先師説法三十餘年門下出世不二三人亦未大振公之弟子可數者多分化四方南北法席師匠皆出公門除耶溪三明明宗已往現前若巢松浸一雨潤大唱於三吳蘊璞愚晚振於都下若昧智獨揭於江西心光敏宣揚於淮北海內凡稱説法者無不指歸公門非具四攝之力何能有此嗚呼豈尋常可測哉公每撤座則修壁觀嘗於長興山中結茅習靜入定二日林木屋宇為之振動此人所未知也天性坦夷不修城府不避譏嫌以適意為樂來去翛然如逸鶴凌空脫略拘忌達觀禪師頗有嗛於公豫曰師固不知雪浪吾觀其因地聽唯識而發心向藏塔而剪髮此再來人窺基後身也達師首肯曰吾自今不敢易視此公矣嘉靖末年本寺雷火災殿堂一夕煨燼豫與公相對而泣曰嗟乎佛説大火所燒淨土不毀何期與之俱化耶傷哉難矣方今之世捨爾我其誰歟惜乎年輕福薄無道力從此決志修行他日長養頭角崢嶸終當遂此興復之願由是豫北遊固志在生死大事其實中心二十餘年未嘗一日忘即五臺東海皆若子房之始終為韓也不幸而竟以賈害信乎大事因緣固未可以妄想求也及豫罹難被遣過故鄉公別豫於江上促膝夜談及初志豫曰事機已就若不遭此蹶指日可成今且奈何豫往矣兄試相時先唱當躬行乞於南都以警衆之耳目豫早晚天假生還尚可計也公頷之明發遂長往萬曆乙未冬十一月也豫度嶺之三年戊戌公見本寺塔頂傾側遂奮志修理一時當道助發給諫祝公首唱公親領衆數百次第行乞於都市一時人心躍然興起金錢集者動以千百計大役遂舉塔高二十五丈其安塔頂管心木約長七丈架半倍之則從空而下如芥投針其勢難矣公心苦極忽嘔血數升時管木即入在架之人如鳥棲柔條竟無小恙豈非心力所致哉會計所費數萬緡唯聖母賜三千金其餘皆出民間未動公家一髮也公生於富室人皆視為性習軟暖及中年操履篤於苦行於江東大巾立捨茶菴公自擔水日供不倦門人相從説法不輟即弱骨者日益強矣居常思結十方粥飯緣暮年就吳之望亭開接待院接納往來躬操薪水執作具領學人作務日則齋飯晚則澡浴夜則説法二利並施三吳之士翕然信向即闡提亦轉為護法未幾示微疾一日告衆曰汝等善自護持吾將行矣弟子乞師垂示公曰如空中花本無所有説箇甚麼問曰師即不諱用坐龕用棺木公曰坐死用龕子臥死用棺材相錫打瓶且莫安排言訖頃即索浴更衣端坐而逝弟子輩迎葬於雪浪山化之日悲感載道學人如喪考妣也公生於嘉靖乙巳九月九日入滅於萬曆丁未某月某日世壽六十三歲法臘四十五夏得度弟子雖多獨孫慧經字緣督者盡得心要且善相宗其唯識一論實從開發惜乎早夭傳法弟子出世者如前所列隱約者尚多多也嗟乎豫與公猶同胞也三十暌攜老未合併時為永歎每思當世知公者希況沒世乎因述公生平之槩為法道中興所係且令後之學者知大法因緣有自來也贊曰聞之菩薩往來人天留惑潤生尚有隔陰之昏而不通於宿命唯自驗之於夢中智者觀之以習氣毫無爽也豫以公出家因緣是知必為再來人至人潛行玩世逆順無方豈常情可測哉龍象蹴踏固非跛驢所堪無怪乎肉眼忽之也苟非乘夙願力豈能光流末世起百代之衰哉觀其生死脫然可知矣皖城浮山大華嚴寺中興住山朗目禪師智公傳公諱本智初號慧光曲靖李氏子先為金陵人後徙居滇南生而倜儻不羣負出塵之志曲城之陽有朗目山公之父出家居此號白齋和尚公年十二即往依出家遂剃髮為驅烏後行腳遇黃道月舍人與語投機為更其號曰朗目云白齋以華嚴為業公以聞熏發起即從事焉居常以生死大事為懷切志向上年十九受具白齋將順世公請益齋曰是惡知不旦暮為人壻也公發憤即決志操方北遊中原遍歷名山參訪知識足迹半天下氣吞諸方八九矣南北法門諸大老若伏牛之大方印宗南嶽之無盡廬山之大安薊門之遍融月心皆一時教禪師匠咸及其門經爐冶鉗鎚故若宗若教得其指歸第於參究己躬一著以未悟為切於是立禪一十二載始得心光透露由是機辨自在行腳北遊過六安大夫劉公為新中峰華嚴蘭若居之未幾去白下給諫宇淳鍾公為人傲物素少法門無攖其鋒者一日至天界寺問主者曰善世法門可有禪者麼主者推公出見請問禪師天界寺還在心內心外公曰寺且置借問爾把甚麼當作心鍾默然公曰莫道天界即三千諸佛只在山僧拂子頭上鍾良久作禮自是始知法門有人矣陶公允宜宦比部相與莫逆陶左遷廬州別駕署篆六安創鏡心精舍以待公皖之東九十里曰浮山昔遠公與歐陽公因棋説法處有華嚴道場古剎為一闡提所破廢太史觀我吳公每慨之欲興而未能也公自淝水飄然一錫而來吳公一見與語相印契再拜而啓曰浮度固為九帶宗乘近為古亭和尚演化地華嚴道場即重豎剎竿也今為有力者負之而趨其如茲山何古亭為滇南人師豈後身適來豈非理前願耶公聞而愕然曰豫少時每對古亭肉身瞻戀無已抑聞開法浮度不知即此山也因思華嚴乃出家本始皆若宿契遂欣然心許之於是拈香禱於護法善神遂腰包而去太史猶未知所向往也公至淮陰沁水劉中丞東星建節於淮夙慕方外友邂逅於龍興寺覩公機警喜愜素心乃館之公舍暇與語間及浮度因緣劉公欣然曰此彈指之力耳即檄下郡邑令一行闡提懾伏盡歸我汶陽之田百五十年之廢墜一言而興起之豈非願力耶寺既復遂北入京師會神廟為慈聖皇太后敕頒印施大藏尊經公乃奉璽書持大藏歸浮山始自戊戌迄於壬寅五年之間而浮山護國大華嚴寺巍然如從地湧豈人力也哉叢林就緒即付囑其徒圓某感劉公護法之恩走沁水致弔焉瀋王為佛法金湯剎利中最聞公入國欲致一見公語使者曰佛法付囑國王久嚮賢王深心外護法門若以世法相見則不敢辱王之明德使者覆王曰願聞法要也詰朝王坐中殿延公入長揖問王曰善哉世主富有國土貴無等倫作何勝因感斯妙果王曰從三寶中修來公曰既從三寶中修來因何見僧不禮生大我慢王悚然下座請入存心殿設香作禮請問法要因問華嚴梵行品云身語意業佛法僧寶俱非梵行畢竟何者是梵行公曰一切俱非處正是清淨梵行王聞歡喜遂執弟子禮所供種種獨受一紫伽黎及水晶念珠留鎮浮度山門王亦竟為華嚴檀越公雖往來都門與紫柏老人未接面於癸卯冬老人示遭王難惑者驚眩公歎曰紫柏不唯逆行方便超脫生死甚為希有即以一死酬世主四十年崇教之恩法門無此老豈不盡埋沒於一鉢中耶識者謂公親見紫柏吳太史曰知師者何必在弟子耶自法門一變京師叢林震驚人人自危即素稱師匠者皆鳥驚魚散獨公晏坐金剛地為魔陳之殿然竟無知公微意者詎非代紫柏一轉語耶居二年乙巳冬慈聖聖母周三百六十甲子建法會於都南之廣慈為增上祝延懿旨請公講演楞嚴公初不應命強之及講二軸未終至同別妄見處忽告衆曰生死去來皆目眚所見耳吾行矣華藏莊嚴吾所圖也今歸矣踞座端然而逝時萬曆乙巳十二月二十四日也公得力俗弟子唯墨池居士王舜鼎官兵部職方郎中先三日前公以書報別云行圖一晤了此寥廓且托以後事王答書有云滴水滴凍時目下如何逾日而化訃聞聖母悼恤有加賜金若干返靈骨於浮度妙高峰之南麓從公志也始末因緣具載吳太史塔銘豫居嶺外聞公名動一時往來衲子喧傳悉公人品魁梧奇偉胸中無物目中無人自少行腳橫趣諸方如脫索獅子豈矩矩腰包篛笠者比觀其機辨迅捷蓋夙根慧種亦秉願輪而來耶以遠公開浮山百餘年而墜久則古亭振起之古亭振百年而公適中興之由是觀之古亭非遠公之後身公非古亭之影響耶觀公之行事若幻化人太史公云古亭歸路為來路遠録宗乘入教來此實録也然公雖未匡徒即末後一著而舌根不壞矣贊曰聞之諸佛不捨衆生界菩薩不斷生死根故孤調解脫受焦敗之呵豈以守斷滅為真修耶況善財所參知識皆毗盧遮那眉光所現是以華嚴法界草芥塵毛皆菩薩行是知從上佛祖出沒三有之海以一滴而見百川之味也以是觀公始終以華嚴為究竟能幻化死生是則從緣無性以達無生者公實有焉淨明沙彌傳沙彌錢唐黃生也以臨終求剃髮作僧形坐脫故得沙彌稱俗諱承惠字元孚先皈依雲棲大師法名淨明生平性介不合俗不治生産居鄉里多忤衆即親友會獨頺然瞪目而已淡無嗜好山水翰墨外無事父死無遺資僅能贍八口性至孝事祖母生母嗣母即窘不能繼甘旨多方為之盡心焉祖母死病篤臥床褥間極力治喪事盡禮鄉人稱之性好施鄰媼寒無衣即解衣衣之鄰人貧無食傾囊止百錢盡與之其妻弟聞某見其孤硬可與入道頻説之喜而不入因導歸雲棲得名焉壬子冬得吐血症積三歲不痊乙卯春病劇厭家居乃移於城東邵氏園聞氏兄弟引之念佛意不屬以素無志於此猶未甘死心也聞撫然厲聲曰汝眼光落地後即今知痛知疼的畢竟落甚麼處生悚然起色曰將奈何聞即力教以念佛生曰教我念自性彌陀耶念極樂彌陀耶聞曰汝將謂有二耶明矍然有省請慧文法師至設觀佛像為説淨土因緣法音入耳生甚欣然乃亟請聞主張剃髮受沙彌戒披法服引鏡自照曰吾今得死所矣因屏家屬極力念佛默觀蓮花經七曰舉族皆聞蓮花香臨危忽破顏微笑口喃喃説偈曰一物不將來一物不將去高山頂上一輪秋此是本來真實意乃命家人作齋供佛請淨侶念佛回向願文至放光接引垂手提攜歡容可掬乃起端坐開眼諦視佛像安然而逝時某年某月某日也幻人曰聞之般若如大火聚太末蟲處處能泊獨不能泊於火聚之上衆生心處處能緣獨不能緣於般若之上是知火宅中人性剛介而不與世情合者此夙習般若內熏之力然也第迷不自照耳觀黃生素不念道及病苦之劇仗親知力指歸正道臨危遂發心出家作沙彌披法服就死念佛七日即能感佛接引端坐而逝此非般若熏習之驗與所謂一念回光頓同本有生實以之孰謂生死難出哉聞仲子小傳仲子姓聞氏名啓初字子與浙之錢塘人孝廉啓祥之弟也仲子幼善病故早戒舉子業素有出生死志無意於室家乃歸依雲棲受淨土法門篤信而力行之豫弔雲棲仲子作禮白言某為生死大事願剃髮而從知識後豫曰不然佛性四大不能拘豈毛髮可礙乎況親在不可遠遊佛子容為不孝乎仲子遂已比歸匡山知仲子病篤且死心甚哀之及讀伯氏傳乃大喜曰信哉雄猛丈夫也初仲子自恃信力強勝雖久病心力甚壯決以為往生無難及至臨危方生方死之際積習現前心神恍惚方知淨業未純往來不易乃蹶起大呼曰亟請知識念佛助我知識既集念佛連日而習境昏擾乃復呼曰生死根株知非他人可能拔也遂立起著衣盥洗對佛焚香煉臂懇倒懺悔苦切哀誠徹夜無倦頃則自知夙障冰消心安神逸淨土真境朗在目前怡然靜定急令剃髮披袈裟為僧伽相安然別衆端坐而逝嗟乎此豈常人所能哉常聞涅槃諸佛之安宅也非僧祇勤苦而不能證至若廣額屠兒放下屠刀立地便登淨土衆生之故家也至有身陷鑊湯一念回光即變而為八德蓮池二者吾聞其語未見其人也豫觀仲子臨終習境現前詎非惡道之先見歟何其勇猛蹶起大呼一怒而拔歷劫生死之根變苦趣為淨土豈非烈丈夫哉斯道也又可以音聲笑貌為之耶仲子行事具載伯子傳故特表著大略令談往生法門者於仲子有良驗焉
