body:
  text: 侍者福善日録門人通炯編輯嶺南弟子劉起相重較説雜説滾滾紅塵漫漫世路多少英雄盡被擔誤賞心樂事詩酒忘憂琴書雖雅猶讓一籌金谷蘭亭於今荒矣縱有虗名與人俱已竹下逢僧目中何有豈但偷間徒為借口是知出世最上一著可惜時人昧而不覺五欲場中種種惡緣如沸湯裂火能發一念為生死心如火中生蓮甚難得也苟不深生厭懼求出離道難免燒煮世之聰明之士生來但知世間功名富貴妻子愛戀之樂以為人生在世止此而已不知大有過於此者古之豪傑之士直出生死者無他特看破此耳佛言我於然燈佛所實無授記若有授記即為著我作佛猶恐著我況生死事業乎但願空諸所有切勿實諸所無此語不獨為老龐家傳之祕佛祖皆然前聖所知轉相傳授妄想無性若妄有性則佛祖無出頭處剎那剎那生滅之稱也悟無生者方見剎那此語疑殺天下人如幻三摩提金剛王寶覺彈指超無學此法神速若是仰山夢升兜率天白槌與文殊貶入鐵圍山公案是同是別世尊偏向魔王宮中説心地法門可笑別無淨土耶一切諸病從癡愛生癡愛不生顛倒想滅名為涅槃一切法不生我説剎那義當生即有滅不為愚者説是可與愚者説耶夢幻泡影露電陽𦦨鏡像水月乾城芭蕉此十種喻為入道基本知之者希妄想興而涅槃現煩惱起而佛道成此法唯五眼圓明方許知見三寸氣消誰是主百年身後漫虗名此語如來二十年破執之談無以過之真歇了禪師臥病詩云病後始知身是苦健時多為別人忙誠哉是言也性本非水火寒熱自然生此豫昔居海上時病中詩也今寄居海外故病忽作宛若舊態蓋病不因地異情不為境遷而趣味自別難以語人東坡云凡有所好必有所蔽余讀居儋耳集覺範後至海外就舊館訪其遺事有老嫗答曰蘇相公無奈好作詩何老嫗尚知其好豈非蔽耶東坡初被放至嶺外食荔枝美因云日啖荔枝三百顆不妨常作嶺南人余始誦之將謂其矯余居此幾六年矣每遇時新一度不覺誦此什伯過余平生愛書晉唐諸帖或雅事之宋之四家猶未經思及被放海外每想東坡居儋耳時桄榔葊中風味不覺書法近之獻之云外人那得知此語殊有味也書法之妙實未易言古來臨書者多皆非究竟語獨余有云如雁度長空影沈秋水此若禪家所説徹底掀翻一句也學者於此透得可參書法上乘昔人論詩皆以禪比之殊不知詩乃真禪也陶靖節云采菊東籬下悠然見南山山氣日夕佳飛鳥相與還末云此中有真意欲辨已忘言此等語句把作詩看猶乎蒙童讀上大人丘乙己也唐人獨李太白語自造玄妙在不知禪而能道耳若王維多佛語後人爭誇善禪要之豈非禪耶特文字禪耳非若陶李造乎文字之外余少時讀陳思王洛神賦翩若驚鴻婉若遊龍只作形容洛神語常私謂驚鴻可睹遊龍則未知也昔居海上時一日侵晨朝霞在空日未出紅萬里無雲海空一色忽見太虗片雲乍興海水倒流上天如銀河挂九天之狀大以為奇頃見一龍婉蜒雲中頭角鱗甲分明如掌中物自空落海其婉蜒之態妙不可言世間之物無可喻者始知古人言非苟發因回思非特龍也佛之利生威儀具足故稱大人行履如龍象云知止吾師佛聖人出家學道乃止雪山修行及成正覺即據菩提場中説法蓋雪山清涼處也意其衆生同處五欲都為煩惱之火晝夜燒煮熾然不息而吾人獨欲出離非夫置於盡絶之地埋此身心於萬仞冰雪之中使之徹骨嚴寒以之凍餓大死而復蘇者又何以止烈𦦨免銷鑠哉哉吾師止此而修行菩提覺場且曰其地金剛所成乃極堅固處也其所説法乃性海法門原夫智海無性迷之而為業為識故曰藏識海常住境界風所動悟之而為覺為智故曰覺海性澄圓圓澄覺元妙意顯衆生同此法性之原妄有動靜迷悟之別欲令吾人即動以觀靜即迷以照悟不為魔外之惑所傾不為境界之風所動非夫據乎最極堅固之地又何以摧邪外建大業哉故吾師據此而説法由是觀之吾師之所據欲吾人之共據也故豫有意於那羅延那羅延堅固也處臨大海儼乎法門居名海印炳乎三昧語曰於止知其所止吾人止此可謂止其所止矣又曰里仁為美擇不處仁焉得知又曰綿蠻黃鳥止於丘隅於止知其所止可以人而不如鳥乎吾將三復斯言安貧語曰貧而無諂富而無驕驕則失富諂則獻貧是故未若貧而樂也貧而樂則無不樂是以顏子之陋巷原憲之環堵子路之縕袍榮公之帶素豈無所樂而樂哉苟得其樂則雖天下不易已也噫宜乎許由務光囓缺披衣而荷決絶之行焉孔子亦曰飯蔬食飲水曲肱而枕之樂亦在其中矣不義而富且貴於我如浮雲學要嘗言為學有三要所謂不知春秋不能涉世不精老莊不能忘世不參禪不能出世此三者經世出世之學備矣缺則一偏缺二則隘三者無一而稱人者則肖之而已雖然不可以不知要要者宗也故曰言有宗事有君言而無宗則蔓衍無統事而無君則支離日紛學而無要則渙散寡成是故學者斷不可以不務要矣然是三者之要在一心務心之要在參禪參禪之要在忘世忘世之要在適時適時之要在達變達變之要在見理見理之要在定志定志之要在安分安分之要在寡欲寡欲之要在自知自知之要在重生重生之要在務內務內之要在顓一一得而天下之理得矣稱理而涉世則無不忘也無不有也不忘不有則物無不忘物無不有物無不忘物無不有則無入而不自得矣故曰天地與我並生萬物與我為一會萬物而為己者其唯聖人乎噫至矣盡矣妙極於一心而無遺事矣是故學者固不可以不知要牧心安心在乎虗持心在乎平用心在乎照悟心在乎忘心體本虗物欲交錯妄想集積了無一隙是以氣蒸體昏熠熠炎炎而不安矣故曰物撤疏明不撤則不虗不虗則不明不明則不安故安心在乎虗心本如如內外平等其不平者由乎重輕是以愚者重其外智者重其內聖人重兩忘重外者墜重內者矯兩忘者平平則無不中故持心在乎平心體本明無所不照由其汩昏故有所不照觀夫世人日益其汩昏雖用卒無以自鑒耳故用心在乎照心本不迷由失照故迷迷祛則照泯矣故悟心在乎忘觀心觀心第一微妙法門也夫心為一身之主萬行之本心不明欲身正而行端者鮮矣是故世間一切種種苦惱皆從妄想顛倒所生若顛倒不生則生無生矣無生則雖生而無生生而無生則念亦無念無念則顛倒何起有起則非正觀也正觀則無不正讀莊子真宰本無形超然塵垢外忽爾一念迷闖入者皮袋如被裹猿猴左右不自在起坐要奉承飢渴索管待名利為他忙田園盡典賣更有一種癡將臉要人愛脂粉摸臭皮恰似精鬼怪箇箇都為他惹下來生債傷嗟今古人誰肯自驚駭惟有漆園生此味少知解圓扇説豫己丑夏日偶為狂士所黷寓墨之東郭有出扇索書者因信口為説以記之大火橫流銷金鑠石甕牖兩間者鮮不為其燒煮矣嗟乎人者苟得吾皮骨以自持之則食息起居唯命是聽使清涼之樂頓生於肘腋炎蒸之狀即解於肌膚蚊蚋之隊指揮而立退嘬噆之苦擘畫而潛消又何誇生羽翩以御泠風乘飛雲而遊六合悲夫涼飈一至委成棄捐霜露才興視為長物是豈非為而不宰功成而不居者夫何以與此哉寂寞説寂寞之為言易而履之為難其自得於心尤難於履行焉即㳷㳷世故無論其低昂然在古豪傑士或出或處行顯而心隱誠難以概迹見非夫具超力之眼而持圓照之鑑者又何以壯其形容哉噫宜乎楚狂行歌於仲尼許由掉頭於堯舜雖然豈二子之是而三聖之非耶是各是其是而以是為得者原於大道皆影響耳惡影而和響者其難語寂寞之旨向道君子有寢處焉誠心説示曇支心不誠不明性不靜不定精不聚不完神不凝不逸志不一不篤氣不養不和忿不懲不平欲不窒不寡學不講不博問不辨不通節不立不堅操不持不徑是故君子之學在重其人所輕益其人所損取其人所棄得其人所無故道大德弘身裕名貴超然而無對者也澤山説聞之莊生有言曰藏舟於壑藏山於澤謂之固矣然有力者負之而趨昧者不覺蓋言有所藏則有所負無藏則無負矣雖然以無藏為至愚意有所藏則較不藏者勝焉故曰山懷玉而草木潤川貯珠而岸不枯豈非內有所藏而外有所光者耶是故君子貴藏器於身待時而後用也且夫山之積也厚故高而衆美具澤之積也深故下而衆德歸取象君子又有以焉覺夢説幻人方乘一葉而泊幻海之濱將與窈渺之衆居廣漠以休焉適有浮遊先生者觸而問曰嘻異哉吾覩子之難窮也望其形也飄若雲目其容也凄若氷叩其中也空空即之也溫繹之而淵且深緘乎若悶泛乎若乘擬之而似人非人何居何事而至此乎幻人無以應唯唯默默無知無識無示無説與之寢息坐臥飲食起居寤寐無間者旬日先生心爍意消而將與之俱化先生且行有請於幻人曰豫風波之民也願假舟楫即浮遊而之彼岸者以憑師無意乎曰居是何説也子獨不見夢人乎方其長夜之寢也必沈酣顛瞑精神惛瞀魂慮變懾形若尸解而心若魍魎居不移席而百怪生焉時不加頃而千載邈焉至其冥冥漠漠倣徨四顧或登無極之顛或臨不測之淵毒龍在前猛兕在後進之而履危却之而迫險入之而無罅升之而若墜且將攀枯枝而挹朽藤加以蜂蠆攢眸蛇蝎繫足當是時也窮心困智出之而無方脫之而無術救之而無人呼之而誰與為親是何惶惶業業現諸形色而發乎呻吟即有覺者竟何以寧惟其猛然叱吒躍然而起一覺而大寤之回視夢事若依稀倣佛然求之而不得語之而不及也是必將與覺者一笑而釋之矣噫豈獨夢人哉世盡然也先生試將持此自覺以覺諸夢者醫説贈李高士余被放之八年癸卯冬偶自曹溪隨緣乞食於凌江水西適有丈人龐眉皓髯訪余於旅泊覩其狀貌偉然知為隱者也扣其業則曰岐黃余是知為達士也或曰昔人有言達則為良相不達則為良醫余謂不然蓋達為醫而不達為相耳何者夫相之任燮陰陽而葆元氣劑衆物而仁羣生致人君於泰定措天下於又安此其職也而未必盡即盡而功未必忘以其先己後物因利輸忠且必外假人主之權資衆多之手以濟其事況兢兢於得失是非榮辱之場終身卒業而道未必光日夜營營勞神焦思以至戕生傷性老死而不悟者衆矣奚其達若夫醫則反是其職也以命為任以仁為心以義為質以物為己以去邪為務以正氣為理以經為度以權為用故其治也必致心君於晏然措四肢於調適凡遇危履困運獨斷之智持特立之操不惑於衆口不避其羣邪多方緩急進退合宜以大中為準以至靜為先及其奏效也不計其利不伐其功斯豈為而不宰功而不居者耶非天下之至達者又何以與於此由是觀之忘己之功大忘利之名高不忘者顯報而幽罰兼忘者先微而後著足知忘功者後必大也嗟乎人者苟能操良醫之心以治國則何國不治持忘己之心以御物則何物不容物容則并包國治則兼善此聖人之成功丈夫之能事也斯則術異而功一名異而實同又何以顯晦計其等差貴賤擬其神明者哉以丈人高其行而神其醫余因論醫之祕以贅丈人之行李冀觀者不獨知丈人之醫且因醫以進君子之業將施之於天下國家共覩軒黃之化也丈人達者也知丈人之心則無往而不達矣此光樓説曲阿曰鶴溪為紫柏大師演化地居士賀氏聚族而奉師最謹有雲峰長者先於丁亥歲建樓一區以奉三尊越丙申大師過而眉之曰此光又二十年大師入滅已一紀老人自嶺外走雙徑會大師入塔期取道溪上諸長者居士見老人如見師悲喜交集齋款連日有長者子懋謙得承此光未達本有作禮乞説志不忘也老人欣然謂曰此大師以斯樓作廣長舌也且盡十方是常寂光一切衆生用此光於六根門頭照天照地是故山河大地日月星辰草芥人畜鱗甲羽毛無不從此光中顯現斯則樓即此光光即此樓包含萬象無不融攝居此樓者敬事三寶禮念歸依磬聲佛號乃至妻子團圞食息起居十二時中折旋俯仰戲笑譏呵一切動容無非此光之妙用雖夢想顛倒猶是此光之所發揮苟能一念知歸則此光固是吾家本有天然自在不從外得如是現成一切受用豈可自昧甘為光外之人耶懋謙日用真見善能應用不孤本有不唯大師法身常住説無盡法門盈耳洞心即可不出塵勞端居極樂矣又何於光外別見此樓耶即老人此説大似日下挑燈畫蛇添足耳士其識之無情佛性義説豫養疴匡山閉關謝緣空一子扣關而請曰某甲乞食人間聞士君子談佛性義有不信無情説法者有謂衆生佛性各各分具如大海漚不信圓滿具足者願請大師為決所疑豫曰固哉此義甚深難解難入非夙具上根種子者未易信也即其所見亦佛所説但非了義之談耳苟不證信了義大乘參請明眼知識未悟唯心之旨者則鮮有不作如是解也無情説法教有明言華嚴經如來出現品云辟如諸天有大法鼓名為覺悟若諸天子行放逸時於虗空中出聲告言汝等當知一切欲樂皆悉無常虗妄顛倒須臾變壞但誑愚夫令其戀著汝莫放逸若放逸者陊諸惡趣後悔無及諸天聞已生大憂怖慚愧改悔且天鼓音豈有情耶而能説法覺悟諸天至若光明雲臺寶網各出妙音説偈讚佛乃至塵説剎説此又誰為舌相耶即光音天人全無覺觀語言但以光中出音各各辦事且光中之音豈從口出耶是皆無情説法之實證也又若宗門香嚴聞擊竹以明心靈雲覩桃花而悟道又從何善知識口門而入耶又云衆生佛性各各分具此亦教中有説但為三乘劣機覆相之談非究竟一乘極則語也即如華嚴經云我今普見於一切身中成等正覺且毗盧遮那一佛也一切衆生非一人也若衆生佛性各各分具則一切衆生各成一佛是則齊成有多佛矣若止一佛且是各具又何言一切衆生身中成正覺耶又云奇哉奇哉一切衆生具有如來智慧德相然如來德相法身全體也衆生具有豈分具耶三祖云圓同太虗無欠無餘此言人人與佛同體非但言佛也圓覺經云一切衆生皆證圓覺非特具也故阿難云我與如來寶覺明心各各圓滿所謂諸佛法身入我性我性還共如來合一月普現一切水一切水月一月攝一室千燈光光交映如此圓滿廣大法門昔二乘在座如盲如聾宜乎曲見驚怖其言而不信也惜乎俗諦學佛法者多習口耳知見未有真參實究工夫未悟廣大圓明之體即有所見但認昭昭靈靈識神影子把作實事且又執定血肉之軀封為我相其實未開隻眼故生種種分別以權説為了義以己見為究竟耳今不必論無情説法不説法佛性各具不各具豈不聞法界觀頌云若人欲識真空理心內真如還遍外情與無情共一體處處皆同真法界但將此偈蘊在胸中一切日用六根門頭見色聞聲處一印印定久久純熟自然內外一如有情無情打成一片一旦豁然了悟是時方知山河大地共轉根本法輪鱗甲羽毛普現色身三昧心外無法滿目青山到此方信趙州有時拈一莖草作丈六金身用有時將丈六金身作一莖草用古德示衆云大衆見麼即今十方諸佛歷代祖師一齊向老僧拂子頭放光動地斯乃稟明於心不假外也又何向含元殿裏覓長安耶空一子聞説歡喜踊躍作禮而退四願齋説四願者衆生無邊誓願度煩惱無盡誓願斷法門無量誓願學佛道無上誓願成之四者乃吾佛弟子修菩薩行者之所發也然菩薩非別人乃大心凡夫於塵勞中有志上求作佛者承教有言若要上求佛果必須下化衆生欲化衆生必先志斷煩惱欲斷煩惱必先廣學法門故此四事相與而有衆生乃佛之對也煩惱者衆生之本也法門者治煩惱之藥也以衆生無邊者因煩惱無盡也以煩惱無盡故法門亦無量也難度者願度難斷者願斷難學者願學三者既能則佛道雖無上亦可成矣是所謂四弘誓願有大心者方能發此大願具大願者方能建大業立大功成大名是皆以大行資願非虗願耳是四者非假外求乃求諸己而已矣何以明之以吾人自心本來是佛與衆生原無二體也因一念有我我一立則敵我者皆人人又一我衆我聚而衆生成矣衆生所本本乎煩惱煩惱堅執則我相益固我相固則人不亡我喪則人不立人不立則煩惱空是則我心煩惱若盡則返觀人我如空花耳我若空花則覓衆生若邀空花而結空果彼此求之了不可得矣所謂煩惱盡而衆生空斯則不度而自度矣是相與而無也然舉世之人莫不有我有我者皆以煩惱煩惱用事非真心也然煩惱者情也若斷煩惱而以煩惱之心斷之是借賊兵而齎盜糧也以情入情如以火投火名曰益多求欲斷之不可得也故不得不學法門耳法門者乃出情之法為消煩惱之具所謂空法也空法者佛之心也所明之事佛之行也學佛者以吾人之心體佛之心以日用之事效佛之行是以自心之佛心學自心之佛行斷自心之煩惱度自心之衆生則如湯消冰不勞餘力矣是則四願固難若返求之吾心中無不具足自不假於外也若知不假於外則吾人現前此身是有我也近而一家之兄弟妻奴遠而天下國家生民物類皆衆生也返求自心現前日用若以煩惱之心而為之然於自身六鑿相攘況家齊而國治天下平乎苟即此一念現前以空法而用事則念念煩惱轉為智光照了衆生同歸自性則與佛同體此則煩惱空而衆生盡衆生盡而佛道成民胞物與浩然大均又豈願為徒設哉由是觀之出世之法在即世而成吾人自今已往凡所作為無論致君澤民未嘗一事一行不出四弘誓願無非成佛之行豈特為操虗尚事耳目寄與而已哉某以此見志其有得於此乎感應説佛説一切世間善惡因果報應如影隨形毫不可爽而世人不信者謂為虗談孔聖安命之説世有信者每每推算但求福利勝事則喜而惡聞其災患此惑之甚也殊不知死生晝夜三世輪回如昨日今朝之事耳請以近事喻之譬夫請客凡設席之物無論精粗豐儉色色預備現成則臨時陳列一一具足若少有欠闕必不全美此一定之事也人生一世正報身命延促依報家産資財功名貧富貴賤秋毫皆是前生修定今生所受用者不從外來盡是自作自受耳故曰若知前世因今生受者是若知未來果今生作者是世人自恃智能才技可以致功名富貴殊不知功名富貴非才智可致以吾前世修定今世偶因才智會合而然故得之而喜者惑也又吾固有之富貴功名而為人之所破壞者則疾怨其人深恨其事殊不知我之福量所包者止此其破壞者皆非我分之所宜有亦或少欠彼人而失之以為憂者則反怨天尤人以致結冤而不解者過也是知孔聖之安命即吾佛之因果若知安命則貧富得失一切委之前定皆我自造則窮達壽夭皆吾命之固然若明信因果則今生受用一切皆我前世修成原非他人之可與亦非智力之可能即有才智而致之者亦是我分之固有也如此又何計較得失而勞苦心慮妄積恩怨於其間哉若明智之士的信因果報應不必計其前之得失但稱今生現前所有以種未來之福田如世之農者擇良田而深耕易耨播種及時則秋成所穫一以什伯計此又明白皎然者但在所種之田有肥瘠之不同耳佛説供養佛法僧三寶為勝田孝事父母為敬田濟貧拔苦為心田吾願世之智士不必計已往之得失但種未來之福田苟能省無益過度之費節身口侈靡之財種之於三田之中不惟增長未來福德莊嚴則將現世亦身安心樂為第一福人也若能種福於三田再能留心於佛法以念佛而消妄想以慈悲而轉貪瞋以軟和而化強暴以謙光而折我慢如此則是大心菩薩之行也居士果能信此當稱最勝勇猛丈夫張孝子甘露説余嘗讀方外志謂混沌初分而人始生體有光明蜚行自在吸風飲露不産五穀泉涌露降凝結如脂名曰地肥味若醍醐人食之甘嗜而無厭其體漸重不能自舉故地肥薄而五穀生五穀生而地肥絶矣人始穀食而情竇鑿欲火生故醇氣澆而露不甘泉不醴俟聖帝明王出天德合而醇氣守者故甘露降醴泉涌時則為禎為祥為靈為瑞感於人而應於天由是觀之今之瑞古之常也堯舜之世數致焉三代無紀春秋不載至西漢武帝降始以為年嗣是代有之我明洪武八年聖祖詣齋宮祀上帝甘露降於圜丘之松杪凝枝垂懸其狀如珠其甘若飴乃敕羣臣採而啖之命為詩歌制論以紀之世廟亦然是知甘露之瑞皆見於王者之德而未聞降於野今龍山張子鳴球以篤孝感甘露降庭槐香美異常經旬不散其故何哉嘗試論之孝者天之經也地之義也民之行也孝德至而中和之氣育中和育而醇氣守醇氣守而天德合天德合而禎祥應故甘露降醴泉涌也夫孝一也自天子以至庶人本無二致第心圓而氣足者應之速久近亦然余故謂張子之孝自有所不知故禎祥應之如此久而説之者猶有所未至也嗟乎人心之溺也久矣然靡不有此形有此形靡不有此性性既盡而孝德全而禎祥應而人有若張子者一孝興於家百孝興於鄉千萬億兆興於國以及於天下則人不減聖事不減古而天下國家可登於太上混茫均享華胥之樂吾將必謂露皆甘泉皆醴而飲啖隨宜不俟謳歌鼓腹又何以瑞應為哉不遷字説門人梁四相稽首作禮乞表其字余字之曰不遷意取肇公論旨也余少讀肇論至旋嵐偃嶽而常靜江河競注而不流野馬飄鼓而不動日月麗天而不周茫然莫知所指萬曆甲戌行腳至河中與道友妙峰結冬於山陰道院因校刻此論恍然有所悟入及揭簾覩風吹樹葉飄揚滿空乃自證之曰肇公真不吾欺也每以舉似於人咸曰遷中有不遷者余笑曰若然則為理不遷非肇公所謂物不遷也然既曰即物不遷豈捨物以求理釋動以求靜哉梁生諱四相然萬物靡不為此四相所遷而不遷之物非常情所可測識獨肇公洞見肺肝今梁生歸心法門其有志於此乎苟得不遷之妙則日用現前種種動靜間忙逆順苦樂得失勞逸利衰毀譽以至富貴貧賤大而禍患死生則了不見有纖毫去來相也即釋迦之分身觀音之隨應普賢之萬行莊嚴乃至世出世法一口吸盡又奚止於現宰官身而説法者乎由是觀之堯舜以之垂拱伊呂以之救民顏子以之簞瓢孔子所以無入而不自得也子在川上曰逝者如斯夫不捨晝夜嗟乎夫子此語真長夜夢中木鐸也肇公引而伸之老人以此字梁生能無負此語可稱聖門的骨子況法門乎黃用中字説黃生元衡余字之曰用中因為之説夫中非有體安可用耶以衡視之其中自見然衡為天下平萬物之準也人之所必信可不言而喻惜乎人知衡之可信而不知其用中在是猶凡人知食之可飽而不知可飽者味耳以味精而食粗也故曰惟精惟一允執厥中不知味則不知精不知中則不善用能用其中始稱大用黃生志之歐嘉可字説歐生興際遠來謁余少年勤苦余見而嘉其志因字之曰嘉可凡曰可者訓為僅可僅則有所未盡非也夫人之欲於心者可則嗜之不可則厭之且心之嗜欲不盡不止亦有欲盡而不止者豈曰僅哉是古今之人雖在可中而不知其可也獨禪門向上一路以心印心謂之印可在聖人則曰無可不可然無不可者則無有不可者矣故舉世之人與物世與時時與命皆有確然不易之可苟知其不易之道則窮達一際險夷一致出處一時如斯則無不可者矣人能洞見此可則無往而非所遇也歐生知此之際名為實際實際豈小可哉士修字説鄭生尚志問字於豫豫字之曰士修蓋志於道非修不足以盡道然道在吾人本來具足無欠無餘良由物欲葑蔽而失其固有以致六鑿相攘六官失職此愚不肖者所不及即有志者又或賢者行之過智者知之過聖人所以折衷之抑其太過引其不及歸於大中至正之體以完其本有不失其天真故謂之修耳非舍此之外別有修也故曰修道之謂教是知聖人教人非有益於人也但就其所賦而裁成之因其所志而引發之以至於日用見聞知覺之間起居食息之內無非本明獨露之地苦於夙習而障之故即其所明以通其蔽如目為色蔽即色以通之耳為聲蔽即聲以通之舌為味蔽即味以通之鼻為香蔽即香以通之身為觸蔽即觸以通之意以知蔽即知以通之洗其夙習而發其本明譬如磨鏡垢淨明現然鏡明本具非因磨洗而增益之也以其所習者道故用志以啓之苟無專一不拔之志必為習染所奪而日流於顛瞑邈然而不知返不足以為人矣又足以稱士哉故豫曰士貴乎志志貴乎修也為士修説徐子厚字説徐生天載作禮請字余字之曰子厚因為之説曰天乃吾性之本然者而言載者義取性能載物也傳曰致中和天地位焉萬物育焉蓋中乃性之體和乃性之德也吾人能致盡其性則體周而德廣則能位天地育萬物此特性分之固然第止性雖本具苟非所養則不能極廣大以盡精微故余取其厚者意欲深其所養以重其厚方能持載而不遺故曰風之積也不厚則負大翼也無力水之積也不厚則負大舟也無力然吾人本具性德雖天然廣大自非積養深厚則負大任也無力是故古之豪傑之士賦特達之才者靡不刻苦勵志以淬其利器以待天下國家之大用以建千載不朽之大業所以光照百世澤流無窮所謂源遠而流長厚之至也以其性為天地萬物之本故能盡其性則可與天地參方盡丈夫之能事能事畢則可名為人否則與物同腐朽又何以稱丈夫哉是以聖人處其厚不處其薄居其實不居其華去華取實厚之道也故余字之曰子厚子其勉之容我字説天地至大萬物無所不容而且曰容我豈我獨不能見容哉雖然必有説矣昔人有云誰云天地寬出門惟有礙是亦有不能見容者非天地不能容我由我不能容於天地耳是以聖人并包萬物而不為己有不為己有是無我無我則無物無物則無物與敵無物與敵則物我忘物我忘則物皆我物皆我則我混於萬物矣以其混同故能容我此聖人之能事也唯忘機者似之故以此字李丈人謝汝忠字説章貢孺子名曰上嘉請余為字字之曰汝忠謂移孝於忠固上之所嘉者也以孺子得丙而生丙火象君德也陽明而剛正外剛而中柔德之實也故曰柔嘉謂陽剛而陰柔君剛而臣柔此上下之正天地之和也以大來而小往陽求陰陰入陽故在卦為離為火在人為心為目心精而溢於目目視而主於心內外一也故君之求臣如心之於目臣之事君若目之於心是則內外一而用不異德合而功成故可嘉也否則殆已所謂耳視而目聽則天君失守五官失職求其嘉也詎不難乎哉是知人臣之事君若目之聽命於心者忠之至也故豫因其嘉而益嘉之以忠固可嘉也豫觀孺子神邁而骨駿氣和而心泰大人之質也語曰大人者不失赤子之心也其實則預秉大人之象業已見乎儀容體貌之間即仲尼之為兒戲陳俎豆設禮容豈非天有所授而人有以成之耶先生以是月送孺子進小學即詺此名豫字之曰以忠先生欲豫書此藏之珍襲將為孺子之左券云覺之字説方遺民氏從父宦遊衡禮豫問出世法因請法名詺之曰福心以心為福田之本衆善之所歸如膏壤而生百穀也復請字字之曰覺之以佛者覺也古德云即心即佛以此心本來是佛因迷之而為衆生是迷覺之變也吾人日用現前一念覺則一念佛念念常覺則為常住佛不覺則永墮迷途失其故有如人有目而居暗室一無所見所謂顛瞑而不自覺者也以心是福田以覺為種子日用不覺如有田不耕安可以望有秋乎吾故曰覺之覺之者種福之本也方子能覺則不辜本有乃福之大者也讀達師洞聞字説洞聞之語則遵文殊擇圓通以觀音耳根為勝又以普賢心聞洞十方為準則一以耳圓一以心洞也若在老憨分上看他虗空與眉毛廝結比比説法萬象皆聞則三大士一場懡㦬而紫柏此語亦無地可寄矣此處透得方稱洞聞與堂主天香更字無隱説堂主明桂舊字天香請海印老人易之以其近於俗也老人笑而應曰名是假名況真非可名凡可名者皆俗耳因而罷去一日偶詣丈室白曰弟子夜來夢師為更其字及問字何乃忘之矣老人復大笑曰生死涅槃皆如昨夢然所可名字者皆夢語也善知諸法如夢則一切名字語言無非夢事苟觀法如夢則佛法常現前因詺之曰無隱意取分明目前六根相對無非佛事且如靈雲見桃花而悟道香嚴聞擊竹以明心此皆即聲色門頭而實證者山谷道人依晦堂和尚乞指捷徑處堂曰祇如仲尼道二三子以我為隱乎吾無隱乎爾太史居常如何理論公擬對堂曰不是不是一日侍堂山行次時巖桂盛放堂問曰聞木樨華香麼公曰聞堂曰吾無隱乎爾公釋然即拜曰和尚恁麼老婆心切此乃者俗漢從香塵而得悟入者堂主莫道從香塵而入者可字無隱其他又有隱耶仲尼又曰吾無行而不與二三子者是丘也參虗懷字説五臺竹林大師入滅之明年戊午門人大謙遠來匡山求豫為塔銘公受業京都西山碧雲寺碧雲為王城勝剎四事之豐第一享僧中最勝欲樂者公能捨此而之寒巖冰雪中親近知識潛心佛法竹林門人以千百計獨公以末後光明不朽為念其存心重本可知已及豫與坐談扣其所蘊專注理觀謹於律行則其所趨又非世諦碌碌者比豫甚嘉之先字愈光豫嫌其衒也乃為更之曰虗懷蓋取其虗心而能受益也良以衆生長寢生死而不寤者直以沈瞑五欲積習濃厚煩滿胸襟故凡所舉措皆為業資以其執而不化其所有則積垢益深垢益深而業益重積迷不已而苦道愈長終無返省何光之有究其所以其心不虗之過也聖人虗己以遊世者以能捨其所執耳所執既捨則心自空心空則境自寂心空境寂則物我兼忘我忘則無能執之心物忘則絶所執之境斯則心境求之了不可得虗之至也其懷若此則超然獨立而與道同遊又何一物之可拘纖塵之為纍乎然以無有入無有妙行冥符橫身為物所謂不起滅定而現諸威儀此至人涉世之能事又豈止勞謙而已哉蓋光而不耀者也聶應如字説聶生遊於達觀禪師之門師字曰應如豫觀其字因知師所以授生者最上法門也乃為之説夫如非相似之説蓋直指吾人本體而言所謂真如者乃一心之異稱也然真則不妄如則不變故名真如以其心光明廣大湛若虗空其體寂然乃至日往月來昏明相代雲行鳥飛風動塵起四時循環日夜無隙種種變幻起滅不停而空體凝然寂然不動吾人稟此真如之性賴以成形而為妄想遷流榮辱憂喜好惡喜怒疾病禍患乃至死生代謝種種變幻而為遮障是則自體本如而今不如矣故禪師因其固有而導之曰子應當如故曰應如謂本來自如而今不如欲復本有不必外求但當如耳苟如其本如更何如哉是知吾人聖凡不隔端在迷悟如與不如之間不如則凡如則聖矣般若云所言如來者即諸法如義由是觀之不獨心體本如而一切諸法近取諸身則四大六根細而披剝則三十六物內外皆如遠取諸物則山河大地鱗介羽毛草木微塵極盡世間一切相狀靡不皆如故曰青青翠竹總是真如黃花無非般若以此而觀則諸法本自如如諸法既如又何好惡當情取捨而為生死之業所留礙哉所謂萬境本間而人自鬧若人轉物即同如來物轉則心境皆如物我兼忘聖凡平等生死去來如夢如幻與吾靈覺之體有何交涉是故吾人有志出生死者應當如也故曰應如子其識之何希有字説何生字希有篤志向道人能向道誠希有也若真能見道則更為希有余嘗讀金剛經至空生歎世尊曰希有余甚疑之及尋其未歎以前並無甚奇特亦無玄妙語惟言世尊著衣持鉢飯食經行洗足敷座而已更無別奇特也空生何所見而驚歎若是此語千載上下佛祖注解不破忽被空生看破世尊行履處不覺失聲乃爾何生希有果何所見而希有耶苟如空生看破世尊處看破自家屋裏此蓋家常日用過活事耳更指何法為希有法何事為希有事耶儻未著眼但以文字相而爭誇讚歎之恐他日回頭一覷則見又不希有矣何生乞法語以老人無法可説故因其説而説之以此香林字説大都慈善長老名真孝達師字之曰香林請余為説余居五羊時見西洋番舶載旃檀至詢其所産則曰産香之國最毒熱而多巨蛇其蛇自毒熱莫可解獨賴此香以解之故盤附其上以得清涼香因蛇毒而亦盛且其樹孤生生處不生衆草獨香成林故古德云旃檀內絶凡材今達師以香林美孝字豈無謂哉惟我釋迦本師出世説戒定慧三學獨專於戒戒品甚多獨尊梵網大戒此戒乃是教菩薩法非金剛心不能持之伏覩經開戒品以孝為本故經云孝名為戒謂孝順父母孝順師僧三寶孝順至道之法孝順一切衆生且律載戒品粗列五百細則三千威儀八萬細行佛獨指孝字為本意謂佛子能盡此孝則一切戒品一心具足此豈非若旃檀孤生三毒熱惱燒炙身心無可解救至依於戒乃得清涼豈非若旃檀能消蛇之大毒耶孝生於衆生熱惱心地自體清淨以消煩惱煩惱逼而戒光圓豈非若旃檀生於毒熱之地自體清涼而因熱毒以成其香耶一孝全而衆戒滿戒滿而孝愈真如栴檀林故曰香林以之為名不亦宜乎此乃達大師不説而説也余説為贅堅白字説壽公為京都住持雅志向上喜近知識雖未遊歷百城而諸方名行尊宿至者無不隨喜可稱坐參往親吾法兄古梅法師師深器重嘗以堅白字之豫因為之説曰佛性之在纏如摩尼之墮溷蓮花之處泥不為煩惱穢濁所昏不為五欲淤泥所污蓋其自性天然本然清淨光明皎潔若此也而人者見穢濁而不知摩尼之光明見淤泥而不知蓮花之香潔是以汩汩塵勞而不知自性之圓明也公生長塵中矯矯有出塵志心期極樂厭離生死是果一念孤明應緣常照方且即塵勞作佛事轉穢成淨土又豈直以堅白同異目之哉雖然志不磨不堅心不洗不白吾人志不堅磨以忍心不白洗以戒若忍至無生戒歸自性自性清淨即所謂磨之不磷者是也若磨之不磷則涅亦不緇矣堅則不壞白則不渝不壞不渝實相常住淨土無量壽義在是乎公果以吾言觀自心則懷中之物當自現前是不負其親友也不然則不獨負他人抑且自負公其勉旃是為説自性説嘗謂人生而主之者性性一而品不一至有聖賢之分者以有生知學知困知之不同由夫習之厚薄故成有難易生知之聖故不世見學困之知正在習之厚薄耳故曰性近習遠其是之謂乎吾人多在學地其用力之功不必向外馳求當知自性為主於此著力不能頓見自性當驗習氣厚薄切磋琢磨於根本處著力譬如磨鏡塵垢若除光明自現吾人日用工夫最簡最切無過於此故曰學道之要但治習習盡而性自盡耳以其自性本明更無增益唯在人欲障蔽貪瞋癡愛而為種子沈湎其中故為所困是知困非窮困之困蓋為惡習所困耳孔子曰不為酒困此特被困之一端凡厥有生所困非一不為諸障困便稱大力量人故學道人第一先具勇猛根骨如一人與萬人敵大似李廣單騎出入虜庭吾人果於聲色貨利物欲場中單刀出入足稱雄猛丈夫以此言學但於不困處便見自性非是離困之外別求學知之功也所以禪家言立地成佛者乃頓見自性而已非是別有一佛可成佛者覺也即自己本有光明覺性能見此性立地便是聖人到此則不見有生學困知之異始是盡性工夫此性一盡則以之事君為真忠以之事親為真孝以之交友為真信以之於夫婦為真和施之於天下國家凡有所作一事一法皆為不朽之功業所謂功大名顯者無他術由夫真耳己酉冬暮豫舟次芙蓉江上章含黎子見訪覩其光儀瑩然冰玉溫厚和雅是其多生遊心性地習氣消磨故發現於形儀之表者如此即從此增進用力不已直至私欲淨盡之地聖賢不期至而自至耳若夫功名事業如響應聲似影隨形猶咳唾之餘耳故曰道之真以治身其緒餘以為天下國家是皆自性之真光非分外事也君其志之
