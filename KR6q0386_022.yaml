body:
  text: 侍者福善日録門人通炯編輯嶺南弟子劉起相重較記復涿州石經山琬公塔院記昔嘗閲藏教睹南嶽思大師願文願色身常住奉持佛法以待慈氏斯已甚為希有矣及觀光上國游目小西天見石經何其偉哉蓋有隋大業中幽州智泉寺沙門靜琬尊者忍三災壞劫慮大法湮沒欲令佛種不斷乃創刻石藏經板封於涿州之西白帶山山有七洞洞洞皆滿由大業至唐貞觀十二年願未終而化門人導儀暹法四公相繼五世而經亦未完歷唐及宋代不乏人至有元至正閒高麗沙門慧月大師尚未卒業其事顛末具載雲居各樹幢閒惟我明無聞焉何哉噫苟非其人道不虗行佛種從緣起其是之謂乎初達觀可大師於萬曆丙戌秋訪清於那羅延堀北遊雲居至琬公塔一見則淚墮如雨若亡子見父母廬墓也抱幢痛哭徘徊久之而去南遊峩嵋回至金壇為報父母恩手書法華楞嚴二經完越六年壬辰六月走都下屬太僕徐君琰造琅函將送置蘆芽萬佛塔因暫憩潭柘聖母慈聖皇太后聞之遣侍臣陳儒齎齊具往供儒隨師再過雲居禮石經於雷音寺時忽光燭巖壑及揭殿中拜石石有函函中得銀匣銀匣盛金匣貯金瓶藏舍利三顆燦若金剛恍如故物一衆稱異悲喜交集已而再禮琬公是時塔院業已為寺僧賣之豪家公骨將與狐兔同巢矣師愴然而悲即以聖慈所供齊襯金贖之不足中貴人楊庭屬弟子徐法燈者助完之師因避暑上方山清亦來自東海謁師於兜率院談及此撫掌痛慨食頃師上足密藏開公持贖院券同琰至師躍然而喜即拉清同過雲居禮讚焉冒雨衝泥窮日而至右繞三匝默存儼然凜凜生氣嘆曰公其不朽哉因感遇與琰君共捐金購地若干畝為守奉香火資達師命清記其事顧清何人唯唯而作是言曰盡大地為常住法身唯至人能知一微塵有大千經卷唯智眼能見以如是身說如是經是法甚深奧少有能信者信之者豈易易哉是以吾佛世尊於曠大劫觀十方界無芥子許不是捨身命為衆生故而求此法處剛求而得之即於一毛端頭現寶王剎一微塵裏轉大法輪是則所說三藏十二部言言字字皆吾佛骨血心髓也故曰此經在處皆應起塔供養不須復安舍利以此中已有如來全身故是以能持此法者則為報佛深恩矣靈山會上佛欲以此法付囑有在是時人天百萬無一人敢吐氣荷擔者顧此大衆豈非英傑丈夫哉況親承佛教心領佛恩而猶逡巡畏縮如此必待從地涌出六十二億恆沙衆者此何以故且又但許如來滅後五百歲如是而已況待慈氏彌三災歷窮劫乎足見持法之難也如此由是觀之能起一念護法深心者則為諸佛護念矣良由佛非法無以成正覺法非佛無以度衆生生非法無以明自心心不明無以護正法法不護又何以報佛恩稱弟子哉惟其佛滅而法滅法常則佛身常住矣佛以常身據法界建大業至若守護封疆者固其多方惟我南嶽大師總持以願論不若琬公見之於行事雖然佛業固大非南嶽無以振其綱嶽願固弘非琬公無以纘其業琬公固高非慧月無以繼其志於戲因修者易草創者難續焰傳燈代有其人若夫崢嶸法界一始終同休戚苦心深慮克紹如來家業者除慶喜去童壽唯我琬公一人而已噫公功大矣窮劫衆生受其賜微公佛亦左袵矣是親承密印而來耶抑六十二億之一耶何其願力廣大如此也慨夫濁世知公者希則公者貴至若知公則公又唯我達觀大師一人而已唯公與師正謂千載旦暮之遇也嗟乎世不知公則不知佛然不知師又何以知公哉愚謂公心即佛公骨即經廣長舌相不滅不生佛法不朽賴公骨存骨與法界相為始終今師與公生死而肉骨之業既往而又復之則是重剖一塵而出法界之經也豈小緣哉嗚呼公之骨託於師師之心刻於石後之覽斯文而不墮淚者猶人聞父母心血骨髓而不動色斷斷乎非真子也清固謂吾徒有淚定當灑於琬公之骨涿州西石經山雷音堀舍利記有明萬曆二十年壬辰歲四月庚寅朔十有五日甲辰達觀可禪師自五臺來送龍子歸潭柘聖母慈聖皇太后聞之遣近臣陳儒趙贇等送齊供資五月庚申朔十二日辛未師𢹂侍者道開如奇太僕徐琰等至石經山雷音堀堀乃隋大業中靜琬尊者刻石藏經所師見堀中像設擁蔽石經薄蝕因命東雲居寺住持明亮芟刈之是日光燭巖壑風雷動地翌日啓洞中拜石石下有穴穴藏石函縱橫一尺面刻大隋大業十二年歲次丙子四月丁巳八日甲子於此函內安置佛舍利三粒願住持永劫計三十六字內貯靈骨四五升狀如石髓異香馥郁中有銀函方寸許中盛小金函半寸許中貯小金瓶如胡豆粒中安佛舍利三顆如粟米紫紅色如金剛開侍者請至師所師歡喜禮讚既而走書付趙贇屬徐法燈者請奏聖母皇太后太后欣然喜齊宿三日六月己丑朔迎入慈寧宮供養三日仍於小金函外加小玉函玉函復加小金函方一寸許坐銀函內以為莊嚴出帑銀五十兩乃造大石函總包藏之於萬曆二十年壬辰八月戊子朔二十日丁未復安置石穴願住持永劫生生世世緣會再睹命沙門德清記其事清一心合掌而言曰原夫舍利者乃吾佛因地最初發金剛心演戒定慧光明薰蒸有漏無常三業變化所成而有生身法身全分之別始從發覺以至習漏淨盡三德圓滿故隨緣所現色身相好光明赩如寶山閻浮檀金紫磨光聚三業六根內外瑩徹即無常身證金剛體故大般涅槃諸大弟子諸天大衆各執旃檀沈水為𧂐以焚其軀則皮骨血肉髮毛爪齒隨火光流一一化為金剛種子最極堅固入火不焚入水不溺如水銀隨地顆顆皆圓名曰舍利此云骨生此生身也分見而已是故其色但隨皮骨血肉髮毛爪齒而有紅黃白黑色色不同小者大者圓者直者如露如珠如粟如菽又因禪定行道願力三種所薰故有流動不流動現異不現異其禪定者凝然常寂其行道者宛轉瓶盤終古不息其願力者有求必應若曰我處靈鷲山常在而不滅豈非法身全體耶噫永嘉所謂幻化空身即法身豈虗語哉由是觀之則一切衆生具有如來智慧德相但以妄想無明業行所薰而成無常敗壞之身即日用現前念念潛注真光獨露迸灑八萬四千毛孔一一光明照耀無盡即此無常身心而為常住金剛矣若演此光明普照大地則一切山河草芥纏塵無非成佛真體畢竟堅固不動不壞一一皆為法身舍利豈有量哉但以隨衆生心緣力所見故舉世尊生身全體止獲八斛四斗耳且分為三而天上人閒龍宮各取建塔而供養之其流布人閒者即阿育王以大神力遣使鬼神所建窣堵滿閻浮提而我震旦可目而數者一十有九則明州育王適居首焉蓋亦二智所薰者是耶其我金陵長千神僧康會所求豈願力所薰者非耶至若代代高僧凡三學圓滿者閒多有之但曰堅固子耳嘗謂震旦故稱赤縣神州況其土人多大乘根器而吾佛舍利無數其所及者豈止十數而已哉竊自疑焉及讀舍利感應記見隋神尼智仙得舍利一顆文帝初生尼即舉而育之及文帝長負大業思報神尼尼但以所藏舍利付囑之曰兒當為普天慈父重興佛法用是盡建浮圖足矣何報我為帝受之如命凡今域內名山所至塔廟故大隋居多愚謂此堀所藏舍利者豈琬公親荷文帝授手而來者耶抑我世尊願力所持經藏將示少分真身欲令衆生頓見全體耶今我可禪師一至而舍利即出因以授受國母豈亦夙緣所逮也耶不然何其感應道交昭著之如此也竊謂當三吳時江左佛法未至而舍利何緣先在地中光騰霄漢僧會尋光而來吳尚異之及談此舍利且期三七懇求而至吳人由是變幻怪為尊信法道流通爰自此始代代相承千有餘年至我聖祖神宗尊崇敬事超越百代且賴此為金陵定鼎萬世洪基迄今浮屠光明照耀莊嚴妙麗與佛身等豈細事哉且此石經乃我琬公乘南嶽願輪以待慈氏經三災歷窮劫豈值億世惟此舍利埋之久矣今我可師一至不待求而出現惟我聖母尊居九重不期見而自至豈非吾佛以大願力弘護三寶應時出現以延我宗社福庇蒼生永永無窮使正法流通佛種不斷故耶抑考琬公所刻石經由隋及元六百餘年甫成其半洎及我明則然無聞豈我世尊示此少分如華一葉見無邊春欲令衆生從此經藏遠續如來法身慧命於窮劫者耶不然何其出現易易之如此也故清得以詳記始末以昭後世使見聞者知聖不虗應應必有由矣豈徒然哉是為記大都明因寺常住記惟吾佛世尊降神靈鷲說法度人而諸弟子輩非出尊姓淨行者不度非入無生者不住故所住無常但誡之曰日中一食樹下一宿以示旅泊殘生一往不復初非有意人世高廣安居豐美口體之謂也既而王城利物以給孤長者將請佛說法乃就祇陀乞園林造精舍以延之不惜布金遍地而重閣講堂於是乎啓大衆安居亦自此始然猶逐日行乞四事未嘗豐美也後因老病不能行乞者立常住是則常住蓋為老病者設豈圖今日之事哉教法東流琳宮大剎棊分星布煙火相望鐘鼓相聞去聖逾遠本旨大乖故百丈禪師起而大振之立清規以夾輔毗尼冀返初制嗟乎人者居之豈盡尊姓遺榮操淨行而契無生者耶是故建之者不無給孤應之者未必如佛居之者未必盡老病無生者也故曰不納客僧吾法當滅是則不但非福地且翻為毒海矣惟此未嘗不涕泗霑襟也都城之南有寺曰明因舊名三聖蓋雲崖大宗師所建也師生於保定甫七歲即披緇十八遊方遍參知識初五臺道場為羣寇扼其咽喉歸依阻絶先是有無住定大師以少林業依舊路嶺闢盜巢而建剎曰龍泉寺為往來休息曼殊法道於是乎大昌大師年登二十即輔定師以開拓之厥功大矣豈非夙願耶公居龍泉十載始入大都登壇受具即置三聖寺以納四方又五歲入選為大宗師奉欽命登華座傳毗尼法有年其道益昌於萬曆三年復修明因寺又十年而大師入滅又五年其孫仰崖慶公世其業然公以學行重當時據龍泉以說法內感聖母捐金重修其寺額曰護國明因蓋功德本於大宗師也萬曆壬辰秋余隨緣王城會達觀禪師於大慈壽慶公從禪師謁余曰明因固吾祖所創也慶因觸目諸方梵剎往往居之者不體先聖所以建立之意至若鬻身守綱者奈業纍何慶願以此為永永常住自今而後凡山門一食與衆同賢者可得而居之老病者安之往來者內之凡常住所須執事者許增而不許損凡我子孫許住而不許分凡所施利許公而不許私凡所田産許守而不許賣願世世香火如日月鐙明以紹隆三寶將以報佛恩祝聖壽綿遠無窮屬余紀其事余聞之歡喜踊躍而讚曰公以如來心為住持以百丈心為常住令後之居者以無分別為妙行借使天下聞風而興起者處處不減祇園矣正法嘉謨將或見於今日也公之功德可量哉聊以公心刻諸貞石以昭後世云開錦屏山觀音洞記中國名山多奇勝而太行為天地督自首陽抵山海秀氣盤結於京師故京之西山一帶琳宮梵宇如鱗砌然皆因人力裝點化工至若天然奇秀不假雕琢而妙出恆情者唯錦屏山觀音洞一境而已山去京西百里許洞踞山之胸一聯三堀如摩醯目其中玲瓏凝聚水乳成形千態萬狀不可名目山勢環抱名花異卉開若錦屏一水淵源來自深谷曲折周回澄渟山足故其群峰森挺如出水青蓮也父老相傳往往見雲霧中時有觀音大士現故以為名余於癸未春杖錫遨遊諸名勝辟穀三學洞中飛木廠王公珏謁余談及此遂往觀之余一見而深愛焉公遂請開拓先捨地三十畝為香火前導搆茶葊一所以濟往來是時余方厭遊人世未暇經營乃付法侶九峰真玉上人以主之即東蹈海上矣既而某官某公奉命來督厰事力為開山檀越掌厰某公輩同心助成拓土鳩工鑿空虗實將高就下歷數年成巖岸數十丈洞外又搆禪室兩楹昔日荊榛今為寶地矣余於壬辰秋持鉢王城再過此地乃喟然而嘆曰信乎境隨心變道在人為也嘗聞觀音大士圓通普應無處不現蓋住感應道交如水清月現耳況人人本是佛不修行無以成處處皆是道場不施工無以見此山固靈異若非王公與諸公仗因託緣熾然建立縱七寶莊嚴皆委荊棘又何敢望變荊棘為叢林哉今也鐘聲梵響共談般若蒼崖石壁皆顯法身聞者不迷見者即悟因此地證圓通者不可勝數其倡者施者作者助者之功皆永永無窮將以祝聖壽衍慈風以綿綿無盡矣澥印道人不忘其始不計其終乃為銘以銘之曰大地法身原無寸土峨峨蒼崖有目共睹落落圓音本不有聲湯湯流水有耳皆聞處處道場無往不在有力量人將金作由圓通大士隨類現身豈獨於此偏憐有情洞中本虗千奇萬狀自是圓通根本模樣時之未至久被塵埋時節適逢一擬便開聲振天門光騰大地見聞功德不可思議上祝皇圖奠安社稷聖壽無疆千秋萬祀修五臺山鳳林寺下院方順橋大慈宣文寺記并銘五臺為文殊道場有一萬菩薩於中說法應化無方靈異多端爰自漢永平摩騰著迹沿及三國六朝歷唐宋元纍代國家帝后妃主崇奉之典班班可指我成祖文皇帝延大寶法王居之以後琳宮梵宇歲歲增崇及我今上御宇萬曆初我聖母慈聖宣文明肅皇太后為資先帝保聖躬大作佛事天下名山自五臺始延高僧十二員以鳳林寺二虎禪師為首座師名德胤字徹天山西太原人始終發迹修行緣山素著中外聖母為建鳳林寺以居之寺完以臺山去京千里山深數百里仍就保定府滿城縣方順橋邊置接待寺一所額名大慈宣文又置贍寺地十頃餘畝以護香火將垂永久仍度沙彌明理為給侍師道重方外名達內庭聖恩隆重超越常流若供奉徐公清明王公時及諸搢紳先生大司馬吳公輩皆深重師故其道場隨處成叢林晨鐘夕梵香火星羅將以上祝聖壽無疆保皇圖億載固皆我聖母慈恩曠大實師有以感之也今斯地為衆僧資色身與慧命堅牢其功德福利豈可以數量計哉惟我聖母慈恩與天地同其博厚而此功德亦將共其悠久必有鬼神呵護於其閒後之近此地守此土者豈不推聖心所自敢忘君親之惠而取鬼神之責乎寺落成命沙門清紀其事謹稽首為銘以銘之曰至哉坤元萬物資生峨峨太行為天地經卓彼清涼惟聖道場羣靈堀宅爰枕北方外護藩籬內拱神京珠宮梵宇隨處叢林惟我聖母育成帝德凡所施為無非為國建此名藍以延梵侶從十方來如雲若堵思修慧命必藉色身不勞持鉢香積盈盈有土如膏有衆如雲聖母聖心以土為金此地常住惟功不朽祝我帝釐天長地久伏牛山慈光寺十方常住記自迦維降迹梵剎始興白馬東來僧居肇啓歷代修崇之典十方海會之林由百丈弘律制之規伏牛設練魔之業無非精修一心調伏三業雲來者以法為心安居者以和為事世衰道微去聖愈遠不但法無專門抑且人存我相使二利之誥徒存四事之緣虗費此世尊所以攢眉至人因之發慨者也恭惟我聖母慈聖宣文明肅皇太后承悲願力現國太身興隆三寶建大法幢使域內名山皆成寶地寰中勝迹盡化伽藍乃捐膳羞之資命近侍太監姜某於伏牛山建造慈光寺為十方海會叢林置太河川黑峪保莊田二所為永遠供奉香火命僧智明住持寺事明初受業於京西天台寺寶珠和尚以苦行聞當代聖母素所崇重者明行日和尚因誡之曰爾以一介凡愚叨承慈命撫心自省豈不永懷爾其以佛為心以法為命以十方為常住以衆僧為叢林一食必與衆同一事必通衆議以道德為首領以公廉為執事毋執己毋慢人晝夜六時磨鍊三業精勤萬行屏絶諸緣將以祝聖壽無疆報慈恩永劫其無忘我今日之言明奉戒而行以此聞聖母且以修途為遠慮仍命太監姜公料理之冀道場與二室爭光叢林比牛山並峙也工竣始末業已具載於功德記茲以智明所以住持其業者併志之以垂範叢林永為後誡將來住之者又以此誡復誡後人其如薪火之傳永永無盡也是為記重修之罘山神廟記并銘登郡城東南十里許有之罘山山有神曰浮佑矦是無所考嘗周覽方輿大概自崑崙東折而渤海注焉扶桑日出光影上下蓬萊三山隱隱雲霧閒宮闕恍惚金銀而神仙率都居之稱不死之鄉秦皇以是東遊黃腄而窮成山登之罘以臨朝陽刻石記焉則茲山始封其來尚矣迄今千五百年雖往來代謝觀其故事如指掌維是黔首歸依歲時伏臘而山亦産英效靈風雨時若使物不癘而年穀熟故廟祀不絶全真高常清者居之幾三十年躋九十而色若孺子郡人多雅事若戚將軍者尤善事之將軍視其神宇頽然出資若干鳩衆命工而一新之經始於萬曆丁亥秋殿四楹左右廊廡畢備不期年落成嘗清杖䇿過海印請豫為記乃為之銘曰造化胚胎大塊以成山川秀育靈産英惟茲大百川以歸崑崙東指之罘巍巍秦始來登蓬萊倣佛漢武神人大言恍惚惟山之靈千秋萬祀奠我家百祥無射惟民是福惟穀是登珠宮貝闕載緝載新鯨鐘鼉鼓朝吼莫吟祝我帝釐山高海深住京都吉祥院無極信禪師道行法原記無極禪師者臨濟二十六代孫也諱明信順德沙河宋氏子年八歲父母即捨出家禮郡之天寧深公為師稍長以生死為憂年十三即請本師以行腳事往牛山入大火聚精勤刻苦日夜煆煉者二十餘年塵勞雖覺暫謝然未有所悟入因覲省歸至郡之西山上棧坪迥絶人迹潛居六載一食朝昏諸念頓息頃之即參諸方知識北走京師登壇受具復隱銀山之中峰避影三載日以橡栗為食專注禪觀時忽心境皆空根塵頓脫豁然開悟自覺當體無依翠峰大和尚據臨濟正令開法於都門師往求印證機緣契合尋即謝隱京西之金山吉祥禪院以長養為懷堅持孤硬淡然若無所寓納衣鷇食二十餘年內府太監張公暹輩聞而謁之捐金重新梵宇諸方學者日益進居無何師念家山寥落有歸歟之嘆杖䇿西遊祖塔以謝度脫是時二三耆宿進曰惟我虗照祖翁遠承曹洞正脈其字派曰洪子有可福緣善慶定慧圓明永宗覺性今將已矣師何以續之師因說偈曰智能廣達妙用無方蘊空實際祖道崇香諸弟子唯唯志之未幾尋歸吉祥滅影人世接納四來道風日益大振一日無恙召衆說偈安然危坐而逝萬曆二年二月七日也世壽六十有三法臘三十有奇得度弟子某等奉茶毗禮收師靈骨葬於西嶺之隱寂石洞其徒某皆參少室小山和尚嗣曹洞血脈即今開法故山之天寧乃因龍華瑞葊大師持師狀乞記乃按其實以序之曰嘗聞吾佛世尊度生已畢宜乎說法四十九年未談一字末後拈花為別傳之旨自靈山迦葉破顏之後西天四七東土二三所施不可以限量計而竟不許其枝流深有旨焉及六傳之後南嶽青原下則分為五宗其門庭施設建立不同猶耳目口鼻之於身雖用各有異豈可以用異而異其體哉由是觀之所散未嘗一所歸未嘗二又豈可以門庭用異易其指歸然而後世悟之者雖各因所入至若曹洞臨濟機緣迄今不泯其故何哉惟具正眼當於佛未出世祖未西來以前剔眉以視則靈山一會少室九年皆為餘事是則君臣互換棒喝交馳函蓋乾坤投機暗證之說不啻若太虗閃電石火光中而趁師子遊戲也禪師其於寂滅定中振聲一喝直使大地耳聾諸有聞而不驚怖者斯即可謂將此深心奉塵剎是則名為報佛恩矣不然則竟以何法而續之耶是為記重修悟山觀音菴記并銘牢山之西南濵海羣峰衆岫奔騰齊峙而臨巨浸者一峰傑出曰悟山父老相傳昔有高僧藏修悟道之所因以名之明嘉靖中有僧名近悟就址結茅以居重修觀音大士殿三楹左右夾以耳室窗吞雲霧門引長波儼然坐蓮花而觀水月也菴搆成乞余為記因歡喜讚歎而銘之曰圓通大士隨處現身一微塵裏轉大法輪苦海無涯奔吞識浪大士觀之如鏡中像我依大士如幻三昧亦來於此證三摩地一草一木盡屬法身是名常住傳無盡燈照破暗冥水中火發火裏蓮生是真實法永劫歸依如是讚歎見聞之者齊登彼岸重修巨峰頂白雲菴玉皇殿記并銘牢山居即墨東南根盤二百餘里跨平原而枕溟渤岡巒起伏龍蛇逶迤衆草連芳長林蓊幽潛祕處石室巖龕故往多真人高士咸搆迹焉羣山競繞中則一峰傑出曰巨峰當二牢之凥上插重霄下臨無際最為奇絶頂有菴曰白雲故稱古剎就廢至我明嘉靖閒全真郭一句重起其徒李陽興繼業至孫高來德而大新之依巖鑿石嵌壁甃垣丹室圜宇左右畢備中建玉皇殿三楹邑人周氏某率萊中丞拙齊劉公助成之經營有年至萬曆己卯甫就余癸未夏遊目海上探索形勝䇿杖其顛適卜居太清乞余為記嘗聞之海山有三山曰閬苑蓬萊方丈宮闕咸金銀而神仙在焉故居塵埃而處混濁者聆之則神思蜚動願超脫高舉即離人世及至何無睹焉以其望洋渺漠無津涯非羽翼莫能之竟恣為荒唐豈是然哉蓋欣厭相敓耳目貴賤者也若慈峰之秀洞宇可以息形芝朮可以充餌幽深杳渺塵氛懸絶加之殿舍莊嚴羣靈託迹慕之者可望而不可即能至而不能止信目前之真境人世之蓬壺藉能頓解天叨坐隳桎梏何必駕長虹而挾羽翰假安期而探祕術者哉無建立功德自與山海共之又焉用記乃為之銘曰天地肇育山川是府羣靈以歸衆甫之祖唯山之高唯海之深允茲上帝實梁苦津紺殿崢嶸白雲繚繞為彼瞻依斯民之保莫匪爾功莫匪爾德志彼餐霞塵機永息仰矣穹蒼俯兮谷王配言聖壽億兆無疆重修靈山大覺禪寺記即墨當三齊之東披山帶海是稱雄邑左天柱而右馬嶺俯華樓而負靈山殊大觀焉靈山去治北三十里顛有大覺寺蓋唐宋古剎其來湮沒不可考至我明成化閒始遷山之北麓當社之乾肘故里俗休祥以之歲久殿堂日就傾圮法身頽然荒草中里人張某輩聚族而謀之曰大覺吾之望剎也憶昔盛時晨鐘夕梵惺吾之昏督吾之勤吾生是賴今閴然矣誰為吾津梁之非大善知識又無以自樹立乃僉議禮請桂峰禪師尸之禪師諱性香先出平度巨族少負奇氣為人魁梧倜儻始從學周孔家言自視生如浮切有志方外少焉棄所習扣黃老逃形之術乃曰猶在爐錘閒耳遂矢心釋氏禮邑之某寺某師已而躡屩擔簦西遊上國初從曙堂曉法師受天台賢首宗旨再參少室小山書禪師傳達摩心印學究華梵宗通性相一時義學之士莫不虗左斂袵遂東歸舊業隱約數年聞有茲山之請欣然起曰昔吾大覺氏降迹靈山法幢竪而邪風墜吾志在是矣即杖錫至院披草萊翦荊棘日與諸弟子講明所業未期年道風大振邪宗異端及門揮斥而規正者不可勝計師自居是孜孜建立捐衣鉢節飲食焦唇瀝胃儲積數年計資若干乃出與張子輩搆材鳩役開林拓土以某年某月首某年某月落成殿堂廊廡方丈廚庫山門鐘鼓百凡具備飛暈奪目煥然一新為墨之巨麗焉余癸未夏避名海上訪師於靈山之下因屬余為記嘗試論之曰齊俗尚功利喜誇詐自古概稱之矣然其民性郭朴可教故曰一變而至魯再變而至道也吾佛氏遠自西竺來至東夏以及九州之外教法流布寰區千有餘年歷觀方䇿所載於齊之東則蔑無一人其俗之功利誇詐豈天性然哉蓋未善導之耳禪師承百世之弊起偏僻之隅苦心勵志以吾道任孑然而立不數年閒頓令改觀東海洋洋是稱佛國之風可謂一變而至道極其速化者也後之居是剎者安禪宴寂朝參莫禮將以祝吾君福吾民衍慈風於億世輝佛日於重昏使後之睹是剎者即事明心望風易慮闡玄音於絶響闢枳棘於康衢則是師之法身常住於溪聲山色中也余方抱幽憂之病且與師先後步武寂場故詳為之記旃檀如來藏因緣記并讚震旦財富聚東南而巨商大賈稱淵藪歙郡之溪南吳氏最著康虞居士生長其閒獨傑然志向上事苟非夙習般若根深安能抽蓮花於欲泥耶士久執業達觀禪師是於法門有聞余向深知而未見也乙未冬余將之雷陽道過真州居士延之丈室偶出旃檀如來藏瞻禮之其藏本以海岸栴檀香一枝高五寸徑二寸許中分為二裂而為三鏤諸佛如來祕密藏其像二百有奇通為十方佛剎含攝其中其裂整半最下半寸許刊七寶池池中蓮花閒數白鶴孔鸚鵡舍利共命等鳥狀如巨蟻充雜花閒池上峙金剛臺於蓮花中欄楯行列亦高半寸許臺上結金剛座衛之以二力士次第三級級置樓閣一重下二七楹上一五楹各高一寸許中央設毗盧主佛一尊身量如欖核伴佛十一先後圍繞以象八方上下二重閣中亦各設伴佛十五以象上下二方證法者此上餘寸半許其狀如空空雲重疊每列十佛共三十軀以象此方主剎三世十方雲來集也其兩邊柱闊二分許竪鏤香水海雲雲中星羅十佛以像伴剎圍繞者各各身量大小如菽如麥舉皆鱗次重重以彰無盡此正半也其次半又分為二即為兩門闔則為一闢而為三以象總持製與正等其最下方與蓮華海會相若則各鏤二寶舟舟中各坐五大士合而為十以象十地菩薩濟度五濁惡世者此上樓臺三重每重兩瓣各列八佛共四十八以象大願此上與虗空等亦各雲中列十五佛合為三十以象他方伴剎三世十方雲來集也閣外有諸天八部持香華雲冉冉而來各各種種吉祥供養輪圍邊輻諸宮殿雲充滿羅列其異生衆內外雜沓合三十二以象隨應諸如是等身量各有差如芒如芴咸皆合掌相向曲盡威神至若樓閣莊嚴微妙纖悉靡不具足不可名言總之圓裹十虗包容三世取象三德祕藏焉主伴重重如琉璃瓶盛多芥子無邊海會炳然現於方寸之中此其幢也其下建立香水海中七寶輪圍衆山之上山高二寸許七寶閒錯以為莊嚴海水漩澓金沙布底宛若惢香娑竭跋陀二龍王從海涌出手執香花而作供養以摩尼寶雲而覆其上種種雜寶而校飾之雲中結一龕室高寸許安置毗盧變象三首六臂坐蓮花臺端嚴自在以象尊特總之佛境重重精嚴妙麗居然廣大佛剎攝入方寸閒此皆狀其可狀而不能狀非可狀也嘗聞諸佛神力不可思議衆生業行不可思議今以不可思議業力而作難思之佛事觀此雕鏤密緻之技深有不可得而思議者矣識者謂非神力不能致此美觀余謂不然夫聖人所作常為一事大都因物設象因象見心故棗柏論大經歷事表法深有旨哉然以旃檀象法身蓋取清遠潛通深入無閒之意耳故曰唯一堅密身一切塵中現良以衆生本有法身為無明業力所薰變成五蘊幻身故於日用而不覺沈冥久矣殊不知方寸覺心含攝難思佛事也余觀作者特以旃檀五寸而表示之然離之為三合而為一重重佛境具在其中正令觀者心存目想即此五蘊幻妄身心於一念頃頓見本真薰變三毒而為三德祕藏直使十方佛土了然心目閒也嗟乎觀者苟能藉此薰修一旦轉變自在睹華藏於目前見法身於當下斯則作者神力大有不可思議者存焉原此幢不知所由來意非天府不能有向在居士從子家藏久矣余謂是必出於西域巧幻術者之手或自晉唐梵師所持來者想至宋末散失流落江南民閒沿緣今日以得現身於居士前耶不然何以有此噫欲識佛性義當觀時節因緣居士得此豈非慈善根力所攝持耶非苟然也余瞻禮殷勤慶躍不已故詳記始末以俟觀者冀即境明心以作金剛種子斯則居士賈於佛性海中轉為度生事業矣異日儻能破一微塵而出大千經卷不獨以見作者之心將亦自知功德妙利較之區區毫末大有不可得而思議者焉余欲重宣其意以偈讚曰諸佛妙法身墮在五蘊中廣大神通力變為妄想業流轉生死海荼毒苦無涯爰有大智人巧施方便力乃以旃檀香修成祕密藏無量諸佛境含攝在其中種種妙莊嚴不可思議者我今觀此幢居然華藏海只在一微塵含大千經卷況以五寸香而不具法界唯以智眼觀了此難思業攝念樓閣前願見諸佛境借此彈指力其門忽然開頓見虗空中充滿十方剎始知眉睫閒方寸覺心地現此希有相不生奇特想丈夫善勇猛而於五欲中力破生死關如蓮花出水能以功德財建此難思事安置生死堀為出世因緣日用當現前明暗不捨離不動跬步閒遍參衆知識無量法門海攝在一微塵願轉此法輪直至未來際見聞瞻禮者讚歎及稱揚一念隨喜心頓成無上種
