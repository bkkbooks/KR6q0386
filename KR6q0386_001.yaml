body:
  text: 憨山大師夢遊全集序憨山大師夢遊全集嘉興藏函止刻法語五卷丙申歲龔孝升入海幢華首和尚得余書楗椎告衆訪求鼎湖棲壑禪師藏本曹秋嶽諸公僐寫歸吳謙益手自讐勘撰次為四十卷大師著述援筆立就文不加點字句不免繁芿段落間有失次東遊時曾以左氏心法序下委刊定見而色喜遂削前藁今茲讐勘僭有行墨改竄實稟承大師墜言非敢僭踰犯是不韙也既徹簡乃為之序曰佛祖闡教以文説法慈氏之演瑜伽龍樹之釋般若千門萬戶羅網交光郁郁乎燦燦乎千古之至文也大教東流人文漸啓遁遠濬發於南什肇弘演於北推輪大輅實惟其始隋唐以來天台清涼永明之文如日麗天如水行地大矣哉義理之津涉文字之淵海也逮及有宋教廣而文煩其最著者三家鐔津以孤亢崇教其文裁而辨石門以通敏扶宗其文而麗徑山以弘廣應機其文明而肆夫文而至於辨也麗也肆也其城塹日以堅其枝葉日以富其撈籠引接日以博浩浩乎巵言之日出而岌岌乎津梁之日疲也繫辭有之易之作也其於中古乎作易者其有憂患乎豈不信哉我大師廣智深慈真參實悟惟心識智夢授於慈氏華嚴法界悟徹於清涼被根應病橫説豎説千言萬偈一一從如來文字海中流出以鐔津之崇教者固其城塹以石門之扶宗者沃其枝葉以徑山之應機者暢其撈籠引接務欲使末法衆生霑被其一言半句皆將飲河滿腹同歸於智海而後已雜華言金翅鳥王以清淨眼觀察諸龍命應盡者以左右翅鼓揚海水悉令兩闢取而食之大師説法為人欲搏生死大海水取善根衆生置佛法中亦復如是日者廣南繕寫書生陳方侯觸語悲悟放筆剃髮大師搏取深心光芒昱曜凌紙怪發善根衆生應機吸受如方侯者歷河沙劫猶未艾也嗚呼偉矣哉大師與紫柏尊者皆以英雄不世出之資當獅絃絶響之候捨身為法一車兩輪紫柏之文雄健而斬截大師之文紆餘而悲婉其為昏塗之炬火則一也昔人嘆中峰輟席不知道隱何方又言楚石季潭而后拈花一枝幾熄由今觀之不歸於紫柏憨山而誰歸乎後五百年魔外鋒起篤生二匠為如來使佩大法印然大法燈殆亦儒家所謂名世間出者裨販剽賊之徒往往篡統系附師承竊竊然為蚍蜉之撼樹夫師之集行如日輪當陽魑魅斂影而黶寐者猶懵而未寤也然則大師同體大悲如作易之有憂患者其何時而止乎斯可為痛哭已矣夢遊集初傳武林天界覺浪和尚見而嘆曰人天眼目幸不墜矣亟草一疏唱導流通毛子子晉請獨任鏤版以伸其私淑之願子晉歿三子褒表扆聿追先志遂告成事其在嶺表共事搜葺者孝廉萬泰諸生何雲族孫朝鼎也其次助華首網羅散失者曹溪法融海幢月池及華首侍者今種今照今光也皆與有法乳之勞法當附書上章困敦之歲仲冬長至日海印白衣弟子虞山錢謙益焚香稽首謹序憨山老人自贊威威堂堂澄澄湛湛不設城府全無崖岸氣蓋乾坤目撑雲漢流落今事門頭不出威音那畔無論為俗為僧肩頭不離扁擔若非佛祖奴郎定是覺場小販不入大冶紅爐誰知他是鐵漢只待彌勒下生方了這重公案康居國會尊者像贊寄憨山大師并序三國為英雄之聚亦刀兵之聚慈悲般若無有入處而康祖一錫浮江三稱如來兩目流血舍利投瓶光燦六合澤綿千古當是時也吳之君臣莫不為之動心變色即事徵理知有佛而不疑六度既譯安般門開無擇黑白得法眼淨與夫禪思入微者不可計算皆我祖為之嚆矢也憨山清大師因弘法戍瘴海善以慈心三昧普使朽骨生春聖華居士聞風感慕特寫祖影寄上曹溪以為大師影響嗚呼曹溪肉佛所現自唐及宋飲曹溪而得道者代不乏人邇來曹溪涸矣寶林蕭然又藉憨師以謫戍為波瀾而曹源復活庸祖分身髑髏眼開恆沙難喻豈可以有思惟心測其功德淺深者哉達觀道人不解逆風把柁但解順水推舟為之讚曰康祖來吳清公謫髑髏大師金剛眼突瘴海之慘骨刺魂驚大師得戍彌感聖明曹溪蠱毒飲者皆喪大師飲之銷盡諸瘴指撮舍利康祖之貪貪不為我此心何慚弘法得罪命如單線千里瘴嶺茫鞋踏遍雷道岧嶤颶風正高瓶孤逝舌相昭昭南魍魎白日鼓掌我若無心菩薩影響有心之康祖愚癡章章甫適越其誰不疑石頭之別肝膈冰冷丁生吹火寫康祖影緣影得心心亡性冥大用無常鐘以眼聽根塵主客收放夢醒掌擎寶塔牢山之頂達觀可道人撰録夢遊全集小紀丁酉人日中丞龔公孝升過海幢出宗伯錢公牧齋書其於大師遺稿流通之心真切無比華首和尚觀之亦讚歎無比既以海幢所藏者簡附龔公矣復刊布諸剎為博訪全收之計又以八行致端州棲壑禪師索其全集禪師慮失原稿未發也二月之望前孝廉萬公履安來以錢公曾有專囑為謀之方伯曹公秋嶽作書重請於是再奉華首書遣喻如筏知客往稿乃發而曹公與學憲錢公黍谷各捐資為繕寫費適會城方有試事諸士子之歸依華首者聞之皆至舐筆落墨數日而畢其司較對則一靈種侍者也時一儒生陳方侯於作字頃有所感觸便求出家即日剃度法名古值字曰瞿滴余為書助緣偈曰憨山一部遺稿能使陳郎出家時節因緣相值將針引線無差現前同學大衆幫他搭起袈裟且看曹溪一滴水研池裏面涌蓮華此不獨見大師心光攝受無量亦見諸護法一片心光與無情筆墨同向花首堂前推出者僧作大佛事而此僧承是心光為一切人作發起導師又未可量則是書流通功德豈可量耶因記之以博數千里外一聲彈指三月初六日比丘今釋書夢遊全集日録編輯重較諸名幸各存之通炯號寄菴為大師首座今海幢諸僧皆其諸孫也劉起相號中當起家乙榜任撫州司李大師靈龕還曹溪及收藏遺稿皆與有力耳今釋再白憨山老人夢遊集目録卷之一像贊序記目録卷之二法語答鄭崑巖中丞已下古本卷一示無生祿禪人示奇侍者示無隱桂禪人示小師大義示洞聞乘禪師示優婆塞結念佛社示真遇禪人示優婆塞易真潭示本淨貴禪人云法錦禪人卷之三法語示性淳禪人示妙湛座主示靈洲鏡禪人示歐伯羽示馮文孺示曾六符示贊侍者示明哲禪人示舒中安禪人示極禪人示宗遠禪人示念松通禪人示佛嶺乾首座示懷愚修禪人示西樵居士示陳生資甫示離際肇禪人示懷愚修座主示了際禪人卷之四法語示容玉居士示自菴有禪人住山示慶雲禪人示如常禪人示小師德宗示慧侍者示鄧司直示妙光玄禪人示寬兩行人示如良禪人示周暘孺示舒伯損示文軫示劉平子示歐嘉範示李子晉示李子融示歐嘉可示梁騰霄示遊覺之示王伯選示寂覺禪人禮普陀示梁仲遷示劉仲安卷之五法語示觀智雲禪人已下古本卷二示了心海禪人示湘潭諸優婆塞示方覺之示智海岸書記示劉存赤示鍾衡頴示袁大塗示雙輪照禪人示顓愚衡禪人示李福淨示段幻然給諫示玉覺禪人示明益禪人示慧楞禪人示半偈聞禪人卷之六法語示歸宗慈長老示王自安捨子出家示靈原覺禪人示蘄陽歸宗常公示古愚拙禪人示袁公寥示參禪切要已下古本卷三示董智光示聞汝東示徑山幻有堂主示徑山西堂靈鑒智示知希先山主示嵩朴恩山主示乘密顯禪人示曇衍宗禪人示顧山子示談梁生示曹居士示馮延齡示寒灰奇小師住山示石鏡一禪人卷之七法語示太素元禪人示恆河智禪人持經示王鹿年示在顒侍者示在介侍者示在淨沙彌示性田行者示朱素臣示沈止止示淡居鎧公示念佛切要示雲棲侍者示等愚侍者示玄津壑公示了無深禪人示雪嶺峻禪人示劉道人示非石玉禪人示沈居士示王子顒示沈旅泊居士示顏福堅示顧汝平示顏仲先持呪示嘉禾楞嚴堂主示東禪浪崖耀禪人示王聖沖元深示孫詵白示薑養晦示衆卷之八法語示歸宗智監寺已下古本卷四示自宗念禪人示陸將軍示慧成信首座示自覺智禪人示龍花泰禪人示翠林禪人示順則易禪人示玄機參禪人示智沙彌示性覺禪人示寶藏禪人禮普陀示明輝少林禮祖示法界約禪人示祟觀禪人示六如坤公示西印淨公修淨土示沙彌性鎧卷之九法語示夜臺禪人示省然覺禪人示𩀙明道禪人示魏聖期示福敦禪人示福厚禪人示同塵睿禪人示修淨土法門示念佛參禪切要示海濶禪人書經示沙彌能化書經示惺初禪人書經示昭凡庸禪人示履初崇禪人示慧鏡心禪人示修六逸關主示慧玄後禪人示淨心居士示仁天老宿持經示沈大潔卷之十法語示本懷禪人示仰山本原覺禪人示陳善人示盛蓮生示吳啓高示無知鑑禪人示徐清之示若曇成禪人示觀智雲禪人示凝畜通禪人答山東德王兩問已下古本卷五卷之十一法語答湖州僧海印九問答武昌段給諫答徑山西堂廣智六問答沈大潔六問卷之十二法語答徑山淡居八問答王芥菴朱白民三問示蕭玄圃宗伯二則示周子寅四則示黃惟恆示馬居士示王生更字示周子潛示沙彌祖定示吳公敏示澄鋐二公示江吾與示王周二生示杜生卷之十三書問與達觀禪師九首已下古本卷六與妙峰禪師五首寄蓮池禪師二首與月川法師與五臺空印法師與雪浪恩兄三首與無言宗師三首與愚菴法師三首與交光法師與隱菴上人與靜修上人寄松谷師與靜堂師與萬安上人與梅翁本師囑弟子與曉塵上人卷之十四書問與懶菴師與密藏開公與悟心首座與體玄小師寄無宿上人與龍華主人與月清上人與印菴法師與衲雲法師與幻一律師與廬山圓通大衆與宗玄上人與雲棲大衆與巢松一雨二法師與無念禪師答無異禪師二首與湛然禪師答四一法師與修六關主二首與漢月藏公答頑石禪人上山東德王已下古本卷七與蒲州山陰王七首與曾健齋太常三首與汪南溟司馬與周幼海與瞿太虗與顧朗哉謝毛文源侍御與張守菴二首答龔修吾卷之十五書問與陸五臺太宰與李廓菴中丞與許鑑湖錦衣與孔原之與郭太史與吳運使與黃子光與高司馬與黃梧山與黃柏山與江吾與與即墨父老與陸長公與江仲嘉與管東溟僉憲與馮具區太史與唐抑所太史與王衷白太史二首與曾見臺太宰與王性海大行二首與傳金沙侍御二首與張大心答柯復元孝廉二首與丁南羽與遊二南與屠赤水與王念西太史與徐明宇侍御二首與陳劒南二師三首與楊元孺元戎卷之十六書問與周海門觀察三首已下古本卷八答任養弘觀察與祝惺存觀察與丁右武大參四首與湯海若祠部與劉存赤與鄭金吾與何金吾答鄭崑崖開府二首答葛自修與胡順菴中丞四首與周勵齋太史與子寅伯仲與焦從吾太史與楊復所少宰答戴給諫與殷參軍答鄭孝廉答鄒南臯給諫四首與嶽石帆計部二首與虞德園吏部與樊友軒侍御與邢梅陽孝廉與瞿洞觀三首卷之十七書問與汪靜峰司馬三首與繆覺休二首與賀知忍與于中甫比部四首與吳本如祠部與曾金簡儀部二首與馮啓南孝廉與龍元溫與元溫啓南答李湘州太史已下古本卷九與高瀛臺太守與談復之二首與穆象玄侍御與劉玉受繕部答杭城諸宰官謝蘄州荊王答荊世子答無錫翁廣文與聞子與與金省吾中丞與嚴天池中翰與王季和與顧履初明府與虞素心吏部與熊芝岡侍御與蔡五嶽使君答王於凡謝吳曙谷相國答阮淡宇太守卷之十八書問與王省東侍御答陳無異祠部答曹能始廉憲答徐明衡司馬答王東里明府三首與鮑中素儀部答錢受之太史七首與徐清之中翰覆段幻然給諫答袁滄孺使君二首與袁公寥與周海門太僕與賀函伯戶部答吳觀我太史三首答吳生白方伯答李三近答沈大潔答郭