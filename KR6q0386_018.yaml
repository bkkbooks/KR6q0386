body:
  text: 侍者福善日録門人通炯編輯嶺南弟子劉起相重較書問與王醒東侍御壬子冬別後次年大病幾絶更生及冬即度嶺之南嶽初有休老意因緣未果且達師有未了公案至丙辰夏即有吳越之行覓公音問竟不可得先至廬山結夏見其幽勝遂有終焉之志了達師事即於丁巳五月還歸匡廬卜得山南五乳峰下一邱一壑足了餘生其結搆之緣皆賴護法今幸已得安居二十年所慕垂老始遂足知人生山林之福未易得也去夏若公來遠辱書惠始知公內艱家居計釋服在邇入都可期舟過落星舉首雲山一牛鳴地佳會之緣日夜望之每念嶺南法道千年以來老朽雖未大振賴公入社諸子一時之盛得馮龍二生表率人人可觀嗟哉二子繼逝斯道寥寥獨恃公荷負之力奈不能久與諸子周旋散而無統大為可悲不意興衰之速如此惟公天縱有餘所恨法門未能深入則護法有心而於的當放捨一著似未打破故於世法佛法不無町畦若得大開重門內外洞然若揭日月於中天則曹溪衣鉢豈容陳腐若公大力量人不發無上菩提之心則大重昏終無慧炬矣老朽老矣餘日無多恆思此段因緣深為痛悼公其念及此乎修六閉死關於金輪峰頂甚為有望若惺今留山中姑為打葛藤且令入智慧門二子異日得公為護法大弘此道則老朽死耳不朽多劫之緣亦不虗矣他復何言萬里如面惟公鑒之答陳無異祠部山居與世益遠每聞時事驚心痛徹五內不意一變至此惟沖主子立政出多門所謂醫多脈亂無怪其然即盧扁亦當束手為之奈何比者前車已覆惟今只當慎行謹守以固藩籬培養元氣為上䇿若拘拘破器而以必完爽口快意為尚所謂病不死人而醫死之矣此外更有何術朝廷一時固多君子縱能執經按脈恐出奇多方亦未必能取捷公釋服在邇當即出補不必以治亂為行止所謂大火所燒時我此土安隱世事如奕棋當局者迷若有明眼傍觀即指點一著率收全功又何在於對奕耶第不宜攘臂其間令奕者厭此吾佛所説貴善巧方便行耳如何如何承示孤明時復透現第承當不勇若言透現乃自知之明若云承當不勇乃自信不及耳然透現乃念念透現豈但時復第看破透現處本無一物則念念現前者即本來面目如此念念著力念念無生全體出現又何有承當不承當耶以當人一念自信不及故起將謂別有之心所以當面錯過却道承當不勇此病在別求之心凡向道者皆以此誤公直就一念現前處看破無生無生則本來無物是則遠從無始一念未移從今而後只此一念更何別求既唯此一念更教誰承當耶六祖云若論此事輪刀上陳亦可做得願公諦信此心看破念念現前處則念念精進如此則一切處無非大解脫場又何有治亂之分耶因對晤時難不覺漏逗答曹能始廉憲山野早慕匡廬之勝垂老方投往丙辰歲一登此山則知有大宰官知識為護法幢及閲龍藏募疏則心折於摩詰有斷取大千之神力也比即誅茅五乳為休老計乃峰下倚天際七賢而望雲中五老居然眉睫為我山門護法矣藏公為道場拮據足無停影喜無知厭且尊慈有大願力將建法筵此為匡廬曠大因緣惟是必仗法身親臨此中乃可振大法鼓否則以一糞掃頭陀安能施無畏於十方雲來海衆乎此廣大心中必能建是希有之事也答徐明衡司馬日承枉顧荒山一見慧光獨露表裏洞然如冰壺玉鑑自是般若中人非一世二世善根熏修者及聞眇論所吐一片金剛心地發為忠肝義膽但有忠君愛國一念不復知有身家計真乘願力而來救苦衆生誠現宰官而作佛事者也遠惠德音知法體多病且云心強骨弱此在有漏形骸本來浮脆理固然也顧此血肉之軀原是妄想凝結念念熏蒸故少乖調攝則大不知恩況外欲薄𩞾增益病本唯佛一人純一以金剛心地念念熏變故令此身全成堅固舍利得不壞耳嘗聞聖道之真以治身其土苴以為天下國家此乃本末之論惟今志欲利人先立其本在所養堅固深厚而後忘身從事老子云後其身而身先外其身而身存必有道矣惟座下志大願大必心大身細而後可此在中有所守而外以事試之則漸入佳境譬如架閣必先因其基耳愚意願座下從今發心單持一呪或準提或金剛穢迹含之於心二六時中念念不忘久之發強剛毅之氣自然熏發不待強而自強矣知高明信心篤厚故敢妄談答王東里明府別後恆如霜天月夜對談時也此景此時都在睡夢中誰能醒真與世外人茗碗爐香説無生話也承諭近日閲楞伽有會心處甚喜以此經離文字相離心緣相唯忘言妙契方有入處從此不疑當有深證也別論一照即覺亦能轉境言打成一片則猶隔鐵圍此當自知不成一片過在何處以古人一片之説不是小事從初發心參禪即將一則公案作話頭如趙州狗子無佛性萬法歸一一歸何處等語以此橫在胸中塞斷意根再不放行著實疑情晝夜咬定牙關一念不捨久才純熟方即打成一片動即十年五年此是話頭成片未是悟成一片也知公雖諦信此事已有解會處但未下死工夫如古人參話頭雖會得此道理猶在光影門頭其生滅心未曾暫歇一念故間時無事見有道理及對境遇緣便被奪轉去是知此事不是以知見道理當得實用也又云作一合相觀以見破見以相離相以識去識以執破執此言固有理在但一合相不以兩頭湊泊可入者以心境兩忘正是悟到一片處不見有少法當情作礙頭頭消歸法法顯露如此方可入一合相今若以見識相破正如油入何能破得況見識乃病根非破敵之具如此作觀似有淆訛若依經教中入必如金剛般若六喻即一觀純熟自有十分相應若從楞伽入但於靜坐能見自心妄想流注方是工夫入頭又云妄想無性一語中得力便念念消歸若宗門中參只依六祖不思善不思惡那箇是上座本來面目此最真切日用做工夫如此時時不忘不必求一合相忽一念相應則忽然墮入一合中矣惟今願公不必求一合相亦不必怕境轉但時時隨心抱一則話頭日用中單看一念起處當下咬斷便消得去若妄想消得便不被一切境界轉若八識迸破大徹一番則無境可轉矣無境可轉則心境一如此真一合相也又東行幸見公真正道人可謂不虗往矣山野老年棲息青山白雲之中與世日遠公利生之願正弘晤言未有日也喜公進道工夫甚鋭誠一日千里但趨修固易而忘功絶證為難以耽著玄妙靜沈窠臼久之不覺墮落知見魔網此從古學道之難過一關也若透過此關是為百尺竿頭進一步到此一味平常更無甚奇特所謂依然只是舊時人不是舊時行履處如此則通身毛孔渾放光明決不是思量境界決不坐光影門頭此處只貴步步掃除自然得到大休歇耳又奉手教辱法愛惓惓心神契會不隔絲毫光明藏中本非形骸可隔信非虗語委悉近日工夫日見平貼已蹈省力安樂之境足徵大精進力所云舊時鼻孔一毫著不得正是得力處但就中一毫著不得處更有誵訛在直須透過古人謂有佛處不得住無佛處急走過正恐坐在無事甲裏若不勘破將來轉身更難豈不見雲門道有二種光不透脫一切處不明面前有物是一透得一切法空隱隱似的有個物相似亦是光不透法身亦有兩般病得到法身邊法執不忘己見猶存是一直饒透得放過即不可子細檢點將來有甚麼氣息亦是病古人初以見道為難及乎見道而法執最難遣多墮在此所謂認著依然還不是此中工夫雖無著精彩處而捨法見一著不可不知也高明以為何如昔從念念捨去捨到無可捨亦不坐在無可捨邊自然不被見縛則通身如大火聚矣與鮑中素儀部黃山白嶽久在鴻濛何緣山靈現瑞感大護法使蒼巖翠壁一旦幻出梵宇珠宮致黃金妙相從空而來貝葉真詮自天而降頓令無佛之國土涌出華藏之莊嚴攝化無量人天同入極樂世界如此妙用全在尊慈一念真心流出其功德利益豈小小哉山野欽聞遙空讚歎第恨衰老無能一瞻禮耳頃卜匡廬一壑以送餘年幸陳赤石公作山門檀越將邀海內高賢重刻蓮花之漏書來云荷長者為祗園首唱念匡廬名勝得高賢擊節嵒壑生光第山野有愧遠公不堪作東林社主耳又新歲承使者遠至辱慈念惓惓欲山僧一行以結法喜之緣初心欣然前已具悉頃得汪司馬公書云遼警甚急昨二月草日出師四路大將已喪其三八九萬生靈一旦虀粉大可寒心止留李將軍一路遼極難支恐其長驅大可憂也廟堂紛紜無畫一之䇿徵兵轉餉急於星火此何時也吾徒山林所賴太平念此人心洶洶之時屏迹傾誠誦祝之不暇又安敢輕事遨遊乎此其一也且聞京師震動南北禁僧而遊食之徒無措足地儻聞山野所至望風而趨難必其不來恐地方不便此其二也始以一行為快嗣有一事可虞故不敢輕進特此奉啓伏乞慈諒姑徐圖之以俟後期又承示近來做工夫於本地漸有入處欲得祕密一語以為捷徑原夫此事本來無密不密但在當人一念上做即看話頭一著亦是不得已而用之但要一識破日用現前知覺之心盡是妄想用事縱有道理玄妙之知見盡是識神影子皆心意識邊事總之不曾了知離心意識一著故凡舉心動念都落妄想窠臼耳所以佛云一切衆生皆由不知常住真心用諸妄想此想不真故有輪轉此即馬鳴所言一切衆生從本以來未曾離念是知衆生日用種種妄想究竟只是一妄念耳然此一念即是最初起迷之源從無始至今但只是此一念更無第二即心意識總屬一念上起惟今做工夫能將此一念看破則一切妄想情慮當下冰清矣此所謂離念相者等虗空界然因衆生祗見得心中妄念紛紛紜紜如此之多其實不知只是一念今無奈離念紛紜故古人教人提一話頭做工夫究之即話頭亦是妄念以但將此一念話頭堵截雜念歸之於一若窮究此一念深深覷之覷來覷去原無起處本自無生若一旦了悟一念無生則永劫情根當下頓脫此名為悟非是別有玄妙可悟也惟今老居士做工夫提話頭著力處只看此一念著力深深追究忽然看見此一念本無生處若了得一念無生則從此一切念念皆無生矣此六祖所謂無住生心也若求玄妙便是有住矣如此直捷處最為有力不在多求知見此中一字用不著只是先要將胸中一切妄想知見一齊放下放得心中空空地灑灑落落一𮈔不留看他一念起處便著力追究如此是為單刀直入更不容思前算後種種計較才有思算遠之遠矣老居士有志此事試如此下手何如答錢受之太史山野深愧破器有玷法門況復久沈瘴海甘填溝壑不謂天賜餘生尚有今日向以衰殘多病將匿影窮山適以雙徑有未了因緣義干生死不得少此一行故踉蹌而來雖不敢言善財南詢且幸得以遍參知識久嚮居士為當代裴楊法門保障且知慈念殷勤準擬一詣丈室昨云慈航曾待於錫山當面錯過大為悵然適辱慈音遠及法供種種捧誦再三彌感情至益令妄想飛越足不容緩但雨雪連綿少晴出山尚有雲棲一行湖上無多留連歸次吳門必入毗耶之室先此致謝不宣又山野居常恆憂法門寥落即外護金湯難得真實荷擔之人昨幸見居士大慰夙心現宰官身竪正法幢斯時大有望焉若山野朽株為法門棄物承法愛之深自信夙緣虞山之會匆匆未盡所懷辱聯舟遠送更感惓惓別後仲夏望後抵匡山卜居山南七賢五乳之間誅茅數椽聊爾棲息前寄八行時尚未得定止也一向老病相侵幻軀故有溼疾作楚冬來方覺小可護法編時對披讀諸老塔銘言言指歸向上一路得宗門正眼我明法運大開賴有此為衡鑑若刻施流通利法不淺其稿俟明春當專持上又向致楞伽筆記此經的為心宗正脈未審曾留意否近來東南衲子中參究向上者多苦無明眼宗匠指示都落光影門頭掉弄識神被冬瓜印子印壞又不肯親近教乘求真正知見實為難得宰官中向三十年來護法大心者不少而求真真潛心本地功夫者亦不多得大段士大夫太煞聰明無論若禪若教一狀領過從前目中大名者可槩見矣此時不但世諦即法門中更難言之為可流涕方今世道澆漓法門寥落之秋非大力量人出誰為匡持嘗謂匡世道在正人心護法門在正知見然正人心必以正知見為本所謂不偏不黨王道蕩蕩非至公無我之心何由一羣情而定衆志哉然無我之學必從法中參究功夫將身心世界大破一番揭露本有大光明藏方能觀身世如空花泡影視功名如夢幻水月自然齊生死一是非超毀譽如此方敢言視天下為一家視羣生為一身廓然大公斯則人心自正世道可淳而致君澤民之效無越於此矣諦觀宋濂溪之學實出於此故能羽翼聖祖開萬世太平之業讀護法編未嘗不撫卷而歎也季世末習大有不可挽者必若人然後可言太平之治且天道運而不息豈斯世而絶無斯人哉山野自愧為法門棄物生無補於世而憂法之心如出諸己故所望於居士者重且大切願乘時深畜厚養以胥天眷其於社稷蒼生引領翹足極矣安忍不發深心重願乎護法編文章不必重加批點但就諸祖塔銘開正眼處略發一二則已為贅幸蚤刻之為望近拙述楞嚴通議先已令致覽此經廣博包含一代聖教迷悟因果理無不徹向來解者未盡發揮山野此作大非故轍似更易入其法華通義亦盡翻舊案不知法華則不知如來救世之苦心不知楞嚴則不知修心迷悟之關鍵不知楞伽則不辨知見邪正之是非此三經者居士宜深心究之他日更有請焉又護法録即禪宗之傳燈也其所重在具宗門法眼觀其人則根器師資悟門操行建立至若末後一著尤所取大今於毫端通身寫出不獨文章之妙其於護法深心無字不從實際流出其於教法來源顯密授受詳盡無遺此古今絶唱一書非他掇拾之比今但就宗門諸大老塔銘中者以正見正行為主如居士之見者大同亦不敢更增染污其於記序文特文章耳則不必也今以後寄底本覆上若早刻一日則法門早受一日之惠也山僧向讀高皇文集有關佛教及諸經序文并南京天界報恩靈谷能仁雞鳴五放建寺中各有欽録簿中所載要緊事迹意要集成一書以見聖祖護法之心若同此録共成一部足見昭代開國君臣一體亦古今所未有也惟居士乘此留意一尋最為勝事實山僧所至願也又辱手教委悉近況且述眉公札中末後句此山野久所切心不待今也養老社蓋自慧誠首座願力山野贊歎願捨所居而已此何時也求安且不暇又何以多事自擾乎況年來衰病日至足有濕疾行履多艱山居草草聊爾棲息且懼餘日無多生死心切閉關絶緣單提一念待死而已昨於中秋業已從事念二十餘年苦海風波青山白雲時在夢想今幸一旦遂之又肯作等間看耶今關中一切禪道佛法束之高閣一味守拙每想古人有晝夜彌陀十萬聲今愧衰老色力不充自試常能強半特效遠公六時蓮漏以香代花數月以來身心自臻極樂知垂念之深故敢以告又侍者回得法音知近日心地脫灑此非真實工夫不易得也甚慰甚慰承示不二法門之要無越高座一機非特一法而已心法序誠孟浪之談辱大手改正頓成佳語真還丹點化之工非敢言必傳但存一種法門耳承念國事艱難無肯出死力者此言固然但觀從古捨身為國之人非臨時偶爾而發蓋此等人品有多因緣非容易可擬也一則當衆生大難之時自有一類大悲菩薩發願而來至其作用皆神通發現非妄想思慮計較中來無論在昔即如我聖祖同時英雄皆其人也二則天生應運匡扶世道之人內稟般若靈根外操應變之具先有其本及臨時運用如探囊中百發百中此留侯諸葛與平原忠定諸公即其人也三則亦自般若願力中來負多生忠義果敢習氣剛方中正確乎不可拔者勘定大事堅持不易如文信國明之孝孺諸公生性一定而不可奪者即其人也方今目中天下人物有一於此者乎觀其發言議論有能一定戡亂扶危之識見者乎無其本而欲責其實豈非過耶故古之忠臣有一定之材操有必可為之具不用則已用必見效即如當世才具兩全者誰其人哉故古之建不拔之功者皆預定於胸中如范蠡子房武侯進退裕如豈以空談為實事哉即如東坡亦文章氣節耳惟今居士乃一時所屬望者第自揣其具孰與於諸公耶其所存者特一片赤心耳苟材具不充何敢言天下大事哉此山野向者切切望居士深所養者此耳以老朽觀居士之心審處諸公可為之事業志能為之至若戡亂扶危操何術以為之是豈旋旋從中煅煉而能者耶即今之事特細故耳更有大於此者在惟願居士當早畜其具幸無以軀命付之為全䇿也天下皆迷豈一呼能覺以知居士將有出山之意故特遣訊幸緩前綏操具待時天必有意成就大業萬勿輕脫若素養已就相時而出一見便為如蒼鷹拏兔不留影迹方是大手作略豈為以顏面從人而以軀命付之為得耶高明以為何如又自得居士去秋出山手書云養身有待數語極慰鄙懷不意國運多故外患內憂朝野惶惶沖聖孑立巨肩為難幸一時夔龍濟濟上賴祖宗之靈下慰蒼生之望如居士正宜堅秉願力以負荷為心障回狂瀾切不可以慷慨意氣為任又難以隨時上下為善權方便也此山林蔬筍心腸在大光明藏中必有以寢處也所謂大道之妙難以言傳耳山野年來衰病日作意非久處人世者此生無復再晤之時矣言之悲酸山野所悲不獨時事即法道寥寥目中所賴護法之心如居士者指不再屈豈特金剛幢耶山野嶺南之行所得印心弟子一人為馮昌歷者即四先生逸書之一也惜乎早逝書尾闕數行與徐清之中翰承委悉近況深慰惓惓之念聖人云歲寒然後知松柏丈夫處世以多難成其志居士經歷此番過則骨剛氣柔心強力健以成福壽之晚操是則彼困橫者皆天之所以造就皆我善知識也如是則慶且有餘又何有以芥蒂乎語云人有可忘不可忘然有德於我者不可忘有怨於我者可忘況人生福祿秋毫皆前定其損益非彼皆我之固有也此後正宜精持道力遠無益之友省無益之費凡所舉念但作未來之福為心此誠沒量大人也何如何如復段幻然給諫連奉手書具見老居士憂國憂民及憂法門之心且辱問慮於山僧者情何至也山僧人雖草木素抱懷出世願為法王之忠臣慈父之孝子此非虗談蓋有所試至若奉佛定業之訓生平蓋有年矣今不幸垂老眼見世亂此乃舉遭劫數即完業安可逃哉顧逃之而不得者乃名定業若可逃而不逃乃愚癡況不以法門為重而固守愚癡豈智耶屢接明誨深感護法盛心非特為山僧一人也然所教者若一聞亂即推倒禪牀喝散大衆遂抽身而去此蒼皇失措似非智者所宜有山僧不能一也若云一鉢孤遊固是高傑但山僧年近八十有愧趙州二不能也若云秋月為養老可歸即可逃名聞秋月山場數十里果木養生之物滋設且恐力不能守乃投獻於王府求遍於宰官彼既好名如此豈避名之所宜耶若往則彼以我為奇貨且老牸不字此四不能也然近名為避名我到人到如靈龜曳尾此五不能也老居士之愛我憂我固切且深在山僧有不能奉教者五故趦趄不能自決耳前云曹溪亦不可隱若以地言之誠不可隱若以理揆之此老居士所未知也然云不可隱者以海寇為憂然曹溪去海將千里揚帆不至此無憂者一也然山雖不深而地處偏安即天下大亂乃不必爭者此無憂者二也然道場今已千年屢經更代大亂不過唐之五季而黃巢最慘且親兵至此感六祖之靈捨營地為供贍田至今為黃巢莊是以魔王為護法無憂者三也且祖庭禪堂乃山僧所興之叢林生平功業惟存此一事色色皆我之固有往如歸家不勞遠遁終南此無憂者四也且曹溪之兒孫皆山僧作養之弟子今彼思我如慈父往則如父視子不必投人此無憂者五也然所養贍不但舊日之檀越即現在之山田可耕蔬果可食不必遠求於世亦不必待他人此無憂者六也且六祖道骨如生乃法身常住若依此中則與法相依為命若法身壞而衆生乃死此無憂者七也聞之忠者以身殉國若死於封疆則死且不朽今山僧願為法王之忠臣以佛祖慧命為重若在匡山真非逸老之地即守定業亦死之無益若於曹溪以一日之暇開導來學以續慧命使佛法不斷山僧於此縱遇大亂即定業難逃死且不朽政若以身殉國者死於封疆則死亦得其所矣可不幸哉況遠五可憂而得七無憂抑乃取之於固有又何憚而不為耶彼中方伯監司已三致書請回山三年矣今本府具書出帖差僧來請坐守於此山僧情不得已應命而往誠恐老居士聞之以我有違大教故敢一一備陳奉慰護法之深心萬萬不必以流言悚聽也惟心諒之答袁滄孺使君屢承手書知歸心淨土決定無疑不疑則決定信矣幸甚幸甚且云但於天如淨土遠近如想天竺之喻未決然此喻原不親切至引夢喻最切且又未分別淨穢之想所以於唯心之旨不明耳惟佛説諸法如夢幻又云生死涅槃猶如昨夢又云淨穢隨心又云晝為想心夜形諸夢故以夢喻唯心之旨請試言之然想有染淨皆生死本故曰一切世界惟想所持然參禪要離想而淨土要顓想蓋以想除想乃博換法耳以衆生日用念念染想但造生死苦業今要出苦故念念淨想想佛淨土淨想勝則染想消染想消則淨想純淨想純則變穢土而為淨土矣如人想淫則夢有欲事然欲事雖假在夢不無即以為真若人白日專想淨土則夜夢化臺寶地極樂境界受用自在即為實事此則淨土但在夢覺之分豈有近遠之實哉所以佛説唯心淨土者專在一念淨想所感變耳故曰想澄成國土然娑婆穢土全是衆生染想感結純一穢惡而蠡髻梵王見之純一淨土正如恆河人見之是清冷之水餓鬼見之而為火是以二乘人見娑婆是穢土深生厭患以不了即穢是淨故佛於法華會上三變娑婆而為淨土要指目前日用行履步步頭頭皆是淨土如此豈有十萬億之遙耶然經説十萬億者乃佛指華藏世界娑婆之西越十萬億佛土有極樂國乃阿彌佛所居實報土令人知所歸向耳若言唯心即華藏亦是唯心況極樂耶請以近喻唯心之旨山野少年聽華嚴經聞五臺山萬年冰雪因而切切想住此山因而日夜想之久久但見目前一座雪山經行坐臥皆在此中縱經閙市亦不見一人但在雪山中行及後到五臺儼如昔所想以此觀之則淨土遠近可知矣然五臺尚要身到而淨土只要心到若是專心念佛念念觀想淨土境界久久純熟則現前日用步步頭頭如在淨土中坐臥經行即耳聞一切音聲皆是念佛之聲矣如此念到命終時則一切世間雜念都不現前惟有一念阿彌陀佛則精進不亂目前但見淨土境界或蓮花現前阿彌陀佛與諸菩薩親來接引神識安然直隨佛往生當下便登極樂國如前夢境無異如此豈有十萬億國之遠耶此所謂生則決定生去則實不去乃是真真實實地非是説道理也只是要一念淨想純熟博換得過穢想則自然變穢而成淨土矣然生淨土如夢之説不是譬喻乃是實話以菩薩修行乃至七地以前皆未破無明之夢一向教化衆生成就淨土皆是夢中佛事故八地菩薩如夢渡河猶未存覺直至於佛方稱大覺此乃明言具載華嚴經明明證據只是從來説者未曾拈著老居士於此會得則淨土遠近一切疑淨盡無餘矣然念佛法門彌陀經中所説只是一心不亂是究竟語其實此語亦不易到老居士自心試驗生淨土準不準只在一念亂不亂上看則默然自信如人飲水自然精進矣來云久在台宗今要淨土台宗三觀和會此事妙宗疏最是分明台宗家事所云觀雖十六言佛便周是以觀佛為總觀也即此觀佛念佛則念存三觀矣謂正當念佛觀時要將身心內外一齊放下絲毫不存心地如空不見一法即是空觀即於此空心中提一聲佛隨舉念處即觀佛像如觀目前歷歷分明不昧即是假觀然於正觀念時返照能觀能念心體空空寂寂當空寂中又觀念不忘如此不忘不著一心靈然即中道觀然此三觀不用安排但只舉念則三觀一心一念具足此中又不可將昔日安排三觀措心則不妙矣請試於此著力何如又知老居士為己躬下一著決志甚急此念生死事大當急時也但參究工夫一向都説提公案話頭若大慧禪師極力主張是知從前禪門悟心者皆從提話頭工夫做出但於中用心有多不同今時説提話頭更錯用心甚遠以祇知提起不知放下為要妙古人放下一著最為入道要説是知提之一字乃是放下處為提不是只想著話頭為提也馬鳴云心體離念等虗空界又云離念境界唯證相應以心體本來離念今人不知離念為正念故執持提起一心是以轉增迷悶耳何以放下處為提起只如以阿彌陀佛為話頭當未提佛時先要將外境放下次將內心一切妄想一齊放下次將此放下的一念也放下放到無可放處方於此中著力提起一聲佛來即看者一聲佛從何處來今落向何處去把定金剛眼睛一覷覷定覷到沒著落處又提又覷又追到一念無生處便見本來面目也初則用心覷追追到一念兩頭斷處中間自孤更向此孤處快著精彩直追忽然迸裂疑團則本來面目自現即此便是一念真無生意也學人但得此一念無生現前則一切處得大受用乃是出生死的時節也近世不知向放下處求離念一著死死執定話頭故返增障礙加之更起種種思想先存玄妙知見此是障道根本即老居士參究心雖切以未經説破放下一著也只被玄妙習氣影子作障礙故不得受用耳百千方便惟有放下一著最省力當此省力處做則日用念念即真實受用也高明省之與袁公寥嘗謂自古豪傑之士能建大功立大業者皆自忍辱中來即成佛亦以忍行為第一故曰無生法忍一切聖賢未有不成於忍而敗於不忍也老朽少年讀史記至韓信張良傳見其人能建大業看他畢竟從何處來因細詳其行事忽於淮陰市上受惡少胯下之辱信熟視之遂出胯下於此見史筆下一熟字寫盡生平學力及圯橋之履三進老人乃可之其博浪之椎折於一草履是知古人得力處老朽生平以此入佛法故前書云云乃淮市之胯圯上之履耳與周海門太僕別來忽忽二十年矣音問不通者亦十餘年精神固無間然不若承顏接響之為快也去春之雲棲準擬奉教於湖上久候不至悵然還山貧道天假餘生得待死於匡廬深為厚幸念此末法獨老居士一人為光明幢貧道老矣無復奉教之日所期當來龍華三會耳貧道荷蒙聖恩假以萬里之行於法門無補纖毫即向上一著亦不堪舉似向人所幸於教眼發明直指之宗若楞伽楞嚴法華三經大翻文字窠臼皆已梓行託汝定請證惟琅琊山中野狐潛蹤敢乞金剛正眼一為照破暗冥又為此法大助緣也與賀函伯戶部山中得奉手書知道味日深世情日遠且以楞伽究心遊泳智海觀察流注妄想久之澄徹淵源是則借彼逆緣為進道之資矣所不足者苦無明眼知識相伴提撕恐於文言滯礙大段此事以教印心如蜂採華但取其味不損其色故凡有看教典及古德機緣會心處領略不會則置之勿自穿鑿久自融通則言言冥合真心矣政不必以不會作障礙也公賦性高明當此妙齡精力有餘能蚤收攝如此不唯蹈大方坦途且為福壽之資天之所以成公者大矣幸自保愛以副區區厚望答吳觀我太史吳越之緣草草了事以不耐應接故即歸匡山而山中安居殊未易就投間入山而返為山纍衰朽之年大不宜此耳浮渡令姪肩之當省老居士之憂喜師蟲已淨繼者果得人乎法門寥落不但明眼宗匠難求即衲子中真心實行者亦不易見奈何法門淡泊至此老居士淨業精純法味日深心見發光當洞十方矣儻有緣徐會一談亦此生之餘幸也又年來山居雖與世遠每聞東西多警不無驚心然在別報固有定業但衆生劫難苦不忍聞況身經塗炭者乎惟老居士心棲淨土能無悲憫耶天造大運惟我聖祖德侔三五功超百王社稷靈長當享無疆但衆生業感自不能免耳每思法門一旦陵替至此回望興盛之時難再得也切念華嚴一宗為吾佛根本法輪清涼為此方著作之祖其疏精詳真萬世宏規但鈔文以求全之過不無太繁故使學者望洋而退士大夫獨喜合論明爽率皆讎視而義學亦將絶響矣嘗謂論固直捷唯發明大旨至於精詳文義或未及的指説者之意也切慨此大法失傳其如將來法眼何不但心遊法界安於理觀即文字師亦絶無人矣山野自少留心於此法門今嗟老矣掩關山中注意研窮欲單觀疏文提挈綱要去繁取簡務明大旨在不失作者之意既去其鈔又芟其科直取發明本文似為易了雖不能如論之宏肆而因疏明經適有以通説者之意或於疏義不續者間亦出愚意但取脈絡貫通亦不敢附贅此亦山野老年作懺悔地且為來者申法供養耳前二年因病不能致力幸今年無恙其功已完七八恨不能與老居士一面證之敢此附聞發一歡喜耳又辱示朗公因緣山僧向慕其為人惜未一見久聞末後一著心甚偉之第未知始末今讀塔銘行實諸書果愈所聞辱命為傳豈能更著一語然法門之誼固不敢辭但就中以蘭風為心印恐非所聞山僧昔曾見其人號為鐵𭪿一時皆以外道稱之宗門所不收即觀機緣一語未為超絶不若法有所住為佳然此亦非可以盡朗公之生平也但遇紫柏之事為法門一變而晏然不動且讚紫柏為希有以此一節乃朗公之深心於法門有王蠋存齊之意觀末後踞華座而逝正與紫柏一鼻孔出氣故傳中獨歸重於此即朗公寂光必以我為知己也然傳志不朽須有不朽之實者存老居士其然之乎答吳生白方伯曹溪僧持法旨至拜展三復深荷尊慈所以念祖庭法道愍愚僧而拯名山者心何切至也讀之不覺痛徹五內念山僧漂零苦海二十餘年今幸投老匡山以境幽心寂諸妄皆息無復他念矣令仰體尊慈以祖庭法道為心誼不容己但匡山道場乃諸宰官檀越特為山僧建立為逸老地經營尚未結局難以輕脫若安頓不妥大負一時信心有所不忍以此趦趄未能判然先遣報命容料理得宜當就道也答李三近來云修行感賴師友自古皆然要之力行在己師友但助發耳至若一針一鎚即能透悟者此非師友全力乃本分功純遇緣觸發啐同時譬之鐘鼓應擊而鳴若夫木石則徒勞耳若夫靈雲見桃花而悟道香巖聞擊竹而明心何借師友哉大都學道人之病在操志不剛次則我見堅固有此兩者如病者忌醫則盧扁束手矣答沈大潔鄭白生來云足下有剃髮之志鄙意未敢必然不意果能勇決如此然請親命許可此是佛法中正義最難欣許此菩薩助成也覽來問六則惟首二條為急餘似可緩力疾勉答未審能決疑否所云即欲回鄉踐拂水之約此雖護法有地第恐落窩臼禪耳足下志願廣大且不必上來古人但能取法雲栖四十年如一日則末法望足下又一大光明幢也答郭千秋承以令師塔銘見委愧昏耄疏陋不足以當盛意但在法門所係甚重誠不敢不申讚歎又不可以荒唐謬悠之言取罪以塔銘即世之僧史取信千載之下古之僧史列傳則有禪師以六祖之下五宗血脈為主有法師以賢首清涼天台教觀為主有神僧以佛圖澄諸梵師異行為主有高僧以遠公支公生公肇公高操為主四科之外其餘建立有為功行者不與也令師清修苦行山野仰慕久矣覽持來行似非所聞不敢以虗飾有纍實德故單取本色住山苦行清節生平以念佛為法門當與遠公並駕宜在高僧之列乃敢略載其正行以取信為主殆非敢妄意貶損惟高明裁之儻不可采不刻可也
