body:
  text: 侍者福善日録門人通炯編輯嶺南弟子劉起相重較序刻方册藏經序萬曆丙戌秋達觀大師密藏開公遠蹈東海訪清於那羅延堀具白重刻方册大藏因緣方且訂盟於堀中爾時清以荷法情深心重然諾豈不荷擔以洞門未開荊榛未闢意將有待而然也已而達師西遊開本二公從赴清涼以卜居質疑於曼室大士即蒙印許以金色界未幾諸緣畢集越庚寅秋幻余本公問余來入海印出所刻棗柏大論若干卷示清乃焚香稽首再拜受之喜徹藏心法香熏遍毛孔及讀諸大宰官長者居士緣起語備殫始末字字真心信乎無不從此法界流也且曰方册類俗諦固以流通為大方便第恐執梵策而致疑者煩頻解之至詳且盡夫復何言嗟夫人情之惑久矣迷方者衆顧玦數舉而不能悟一愚羽況大道乎嘗試論之始吾佛聖人説法也以法界無盡身雲稱性而演普門法界修多羅塵説剎説熾然説斯豈紙墨文字而可涯量見聞知覺而可流通者哉今所傳者特大小化身四十九年三百餘會隨機施設方便法門集之龍宮六通大士猶不能盡其名目量出少分𨤲為三藏二十部廣布西夏流來東土者又貝多之一葉耳付囑流通諸弘法者隨方建立曲就機宜故曰或邊地語説四諦或隨俗語説四諦或現己身或現他身或示己事或示他事種種所行皆菩薩道觀夫雜花所出諸善知識同具生身各各法門無非毗盧遮那海印三昧神威所現故世諦語言資生業等皆順正法法本無住遇緣即宗至若水流風動盡演圓音鳥噪猿吟皆談不二翠竹真如黃花般若斯又豈區區華梵可分紙㲲長短可較哉雖然語固有之人情安於常習惑其希睹復何怪哉藉令始也契書華策而梵䇿又以彼此為是非信乎是謂朝三也是以世尊利物妙在隨順機宜應以何身何法而得度者即隨所應而度脫之故順之則依逆之則違此常情耳今夫斯藏所詮乃佛真法身一切衆生自性也悲夫人者沈酣衆苦稠林昧之久矣故世尊自矢之曰我本立誓願欲令一切衆如我等無異非此又何以見佛身了自性出苦得樂住佛所住以適其願耶以此而度非隨順方便又何以令諦信令人人由之而悟入耶況衆生有種種欲種種好樂苟弘法者順其欲投其所好無不信樂歡喜者今所化之機有四衆計緇白之分若牛緇角而白毛能化之法若獨擅是則投緇而拒白其猶取角而棄毛何其一體異視而示吾法之不廣也如此欲令人人而得度復何望哉且真丹云多思維思維多則惑重惑重則智輕智輕則根鈍舉皆是也何以知其然耶嘗試觀夫世智辨聰率多殉耳目陸沈欲泥間有靈根宿植負英傑之氣者大都發於功名去此取彼即般若內重又道不勝習奈之何躊躇生死良亦可痛況茲末法奉教例多俑人豈稟鈍根法門所繫九鼎一絲外患內憂猶楚入郢悲夫悲夫當是時也孰能力起而振救之若大師者斯刻之舉不啻秦庭之哭真有敓軍拔幟之意其復法界之圖遠且大矣睹其金湯外護高深堅利若諸宰官居士者豈非地涌之衆親受付囑而來耶不然何以勇健如此故吾觀真諦真諦不有吾觀俗諦俗諦不無是役也吾輩且息肩其猶庖人不能治庖尸祝將越尊俎而代之也以彼易此兩其無幸哉雖然勿謂無人自顧所積何如耳聞之大塊噫氣萬竅怒號由其聲大而響齊故一唱而萬和同聲相應豈成虗語是知斯藏之役將計日獻捷斯刻之功將浩劫而不窮直使人人因之而見佛物物以之而明心睹法界於毫端覲毗盧於當下斯可謂人天共仰真俗交歸隨順方便之最上第一義諦廣大威德法門也或曰方册減敬將無慢法之罪耶豫曰性性湛然般若圓明諸流通者譬若分燈即大地俱焚曾未擇薪而本火固然不增不減試將以此廣大法炬遍周沙界窮未來際燒盡闡提即使衆生界空而本法猶湛然常住也二公勉矣前旌嗟豫小子慚愧形服以禪弓不張慧劒不利怯弱不敢先登敢辭執鞭之後淨慧寺喬宗紹公請方册大藏經序達磨航海西來由至五羊而入中國盧祖崛起新州衣鉢終止於曹溪般剌臂裹楞嚴房公筆授於制止是則南海為禪道佛法根本地也夫何千年以來道化不敷宛若佛未出世時不知三寶為何物始豫蒙恩以逆緣來因開法於青門一時緇白翕然歸向而法性諸弟子率為上首不數年間教化大行信乎若識佛性義當觀時節因緣也於時淨慧弟子喬宗紹公發心結社效東林故事專修淨業十餘年來如一日也頃者公以教化未廣見聞不博願請大藏普利人天適豫初歸曹溪公作禮拈香具白其事豫聞而喜曰佛性之在人心如大地之水空谷之響此不待別求本自有之雖然水固本有必鑿而蒙潤響雖無形必呼而後應又如貧子衣底之珠昧而不覺須賴親友指示使自披襟而得利益是則公之結社念佛如鑿井之人今請大藏若指珠之親友也若各得利濟之益要在人拂襟解帶之間非公與之實公指之耳如是展轉無窮將見迦維之化周遍炎海之濱較其功德豈可得而思議耶首楞嚴經通議序首楞嚴經者諸佛如來大總持門祕密心印統攝一大藏教五時三乘聖凡真妄迷悟因果攝法無遺修證邪正之階差輪回顛倒之情狀了然目前如觀掌果可謂徹一心之原該萬法之致無尚此經之廣大總備者如來以一大事因緣出現世間捨此別無開導矣判教者局於一時一教豈非管窺蠡測哉自入中土解者凡十餘家如會解之外近世緇白各出手眼而宏通者非一披文釋義靡不參詳精確發無餘蘊又何俟蛇足哉但歷覽諸説有所未愜者獨理觀未見會通故言句雖明而大旨未暢學者未免摸象之嘆余昔居五臺氷雪中參究向上以此經印證堅凝正心以照爥之豁然有得及至東海枯坐三年偶閲此經一夕於海湛空澄雪月交光之際恍然大悟忽身心世界當下平沈如空花影落是夜秉燭述懸鏡一卷乃依一心三觀融會一經謂迷悟不出一心究竟不離三觀以提大綱但以理觀為主於文則略如華嚴法界之設意在得義而言可忘也説者又以文字為障不能融入觀心猶以為缺故豫久有通議醞籍胸中及投炎荒雖波流瘴海而一念不忘者二十餘年萬曆甲寅投老南嶽寓靈湖之萬聖蘭若結夏門人超逸侍豫最久甘苦疾病患難靡不同之入室請益懸鏡觸發先心遂直筆成帙廣發一心三觀之旨題曰通議蓋取春秋經世先王之法議而不辨之意所謂議其條貫而通其大綱是於向上一路實以為贅其於初機之士可以飲海一滴而吞百川之味也或曰佛不思議法可得而議之耶曰不然法本離言而堅執邪見者非言不破佛説優波提舍名為論議以折邪慢之幢良以此經摧九界之邪鋒折聖凡之執壘靡不畢見於廣長舌端種種堅壁一鏃而破之直使智竭情枯降心歸順而後已以經盡發其情苟不議明正令無由以淨法界之妖氛彰覺皇之大化是可以文字目之哉得意遺言是在金剛正眼妙法蓮華經通義後序豫十九剃髮即從無極先師聽華嚴玄談於法界圓融宗旨諦信至海印三昧常住用恍然契悟遂歸心法界之宗既而聽法華經因聞此經純談實相乃不知實相為何物且謂若了實相則文字可略矣以此懷疑甚切每叨副講終盲然也及北遊行腳凡參耆宿必以如何是實相請益然竟無有啓發者向以志慕參禪專心向上一路遂棄文字入五臺習枯禪力究己躬下事八年少有自信之地復之東海一日衆請説法華經至方便品感佛恩深不覺痛哭流涕者再於實相之旨恍然不疑猶於經文言未大透徹似有礙眼無幾何乃因弘法上觸聖怒遣戍雷陽達觀大師與豫期禮曹溪乃先遲豫於匡廬及聞豫罹難報初意其必死乃對佛為許誦蓮經百部祈庇豫南行過龍江師候別豫於江上告以許經之故豫丙申三月至行間越戊戌乃結法社於五羊青門壘壁間集弟子數十輩諷誦法華以了前願衆請講演至現寶塔品了然如睹家中故物即信此為示佛知見及至神力後八品古判為流通豫深見其非也遂以開示悟入四字判其全經後乃入佛知見也時會聽者各各踊躍歡喜罷講請筆之因為擊節遂以四字通一經始終之旨法門間有許可者豫以文遠義奧恐初學難窺越壬子歲弟子衆請益仍為品節以會其義明年冬豫赴南嶽故人之請遂去至衡陽止於靈湖之萬聖寺一二護法為營安居於寺右落成欲顏之未就夜夢一僧告豫曰何不云曇華覺而知有宿因也弟子通岸超逸二人相從先於甲寅請述楞嚴通議葊成衆請就講演一周逸輩復請述法華通義將會品節以通全經也豫自念老朽無益法門儻一言有當嘉惠後學於入佛知見未必無助於乙卯六月朔屬草至八月朔擱筆但宗華嚴始終融之以理觀統一代時教而歸之性海以見吾佛出世以大事因緣之本懷其後六品判為入佛知見雖違古作而理實有宗非敢妄談以信佛心則不必取準於人也其文多率意矢口殊為草略弟子性融乃久踞法壇者相與校核三越月而成然非敢為妙契佛心至於文字般若亦讚嘆持經之一端也智者苟不以人廢言請虗懷以觀豫有望於知言者合刻法華文句記序毗盧遮那證窮法界踞菩提場説普照法界修多羅示佛境界佛知見地惟佛與佛乃能知之故劣根在座如盲如聾以是獨被上根攝機未盡因垂小化身入娑婆界現老比丘八相成道與民同患五性周旋三根普被故曰吾以一大事因緣出現於世所謂欲令衆生開示悟入佛之知見故然佛知見者以徹盡法界草芥微塵無非成佛真體了無剩法是為諸法實相普令衆生知此見此同入平等法性方稱如來出世本懷嗟乎衆生垢重信之者希況入之乎是以靈山一會英傑之士猶費敲擊四十餘年至法華會上方信佛心始有歸家之分一一授記豈細事哉及化身既隱此法獨存千年之下大教東來此經流傳三百餘年無能識者天台智者大師持此大經一日親見靈山一會儼然未散求證南嶽嶽曰此法華三昧也非子莫證非我莫識自是大師以三觀釋經於是九旬談妙故有玄義文句口授門人章安記之唐有荊溪釋籤以發其趣意指百界千如備彰諸法實相之旨頓顯十方佛土中惟有一乘法無二亦無三之説觀者了然自信其於佛之知見躍然而入得此開示無餘蘊矣即以觀心而見佛心豈假外耶向以經記各刻學者智劣難於會通前有會玄籤而略句記義有未盡紹覺法師通會一律草成未行智河行公深悲末法理觀之不明以覺公原稿合刻於經使後之覽者理觀分明由觀以達諸法實相悟佛知見其於入佛境界是猶乘萬派順流而入於海固無難矣但大師舊判經後八品為流通分豫少從講習即有疑焉及住山多年偶為學人演説至現寶塔品恍悟示佛境界即以此為示佛知見因以開示悟入各從品目則以後六品為入佛知見此似與流通相左諦觀所流通者佛知見也惟佛知見非觀不入不入將何法以流通乎意蓋大師引而未發者也然則言似左而義實符學者苟不以人廢言了此則誠不敢是今非古以啓謗法之罪也居士顏廣𥌳發心力荷而刻之是與智公與先會合者皆智者之功臣如來之遣使豈同靈山一會之人耶其法施功德當與實相等矣重刻心經直説小引棗柏謂無明十二緣生即普光明智以是而觀則般若無明覿體無二如乳之為酥酪醍醐不從外得蓋得酵為轉變之力耳今觀自在修深般若其功惟在照之一字而已以迷般若而為五蘊由照五蘊皆空即成般若則觀照之用得非五蘊之酵歟以用之者希故迷之者衆假而大地人人皆用則大地通成般若普光明藏矣噫聖凡之分一念轉變之力豈細事哉永為楚南鄙其俗能敦詩書者則為上至佛法則從來未聞豫隱南嶽會參知馮公守茲土邀豫過遊九疑一時諸子翕然信向歸依豫為開示般若之旨聞者躍然如大夢覺豈非般若種子純熟遇緣而發若時雨化門生陳某等刻而傳之四衆將為諸人佛種之酵歟佛言驢乳不成醍醐特為不信者言之耳金剛決疑解序般若真智為衆生佛性種子各各具足而不知故我世尊特為此事出現世間而開示之欲令悟入以脫衆苦之縛良由衆生垢重初聞驚而不信以其出情之法不涉名言思議而常情所執我法封蔀向以名言習氣深厚動則隨語生解潛起意言分別是以隨説隨疑不能頓悟離言之旨勞我世尊多方淘汰決斷羣疑直使了達般若本智以為成佛之真因故此經為入大聖之初門以拔二乘偏空之疑滯以實相真空為宗以斷疑生信為用空則空其所執之情信則信其本有之智以空故行無所住信則心無所疑不疑則的信自心與佛無二無二則生佛平等我法雙忘斯般若之玄門成佛之要訣也是知從上佛祖教人了悟自心直到不疑之地自然默與本智相應故六祖初聞無住生心一語當下頓斷歷劫之疑所以黃梅單以此經為心印然信為入道之根疑乃害信之毒故此專以斷疑為第一義也昔西域無著菩薩入日光三昧上升兜率請問彌勒為説八十頌以解其義無著以一十八住判一經之旨以授其弟天親天親依偈造論約斷二十七疑以釋最為顯著既而長水作刊定記文頗浩瀚初學之士似難領略卒莫定其旨趣豫蚤年誦習向未徹其源頃於曹溪偶為衆演説竊觀於意云何一語乃即就空生隨聞其説隨起疑情處當下剿絶不容擬議搏量以破意言分別如宗門所謂截斷衆流直使纖疑淨盡方與本智相應耳於是恍然了無剩法始知其疑不必拘其二十七則即於隨聞所起言外之計預揭於前則本經文以為破敵之具如此始終一貫直至情忘執謝般若玄旨燦然若視白黑矣門人如繹法性弟子超逸通炯各捐資重刻以廣其施余因序其始末將冀見聞隨喜同悟般若之正因以為歷劫金剛種子若夫得意忘言又在具正眼者決不作區區文字見也刻金剛決疑題辭般若為諸佛母菩薩之真因衆生之佛性生靈之大本也由向背之分故有聖凡之別是知衆生日用現前見聞知覺皆般若之光端在信與不信耳故曰諸佛智海以信得入靈山一會得度弟子雖出生死而不信此法無成佛之分勞我世尊多方淘汰種種彈訶而劣解之徒展轉生疑以為非己智分以疑根未拔故本智不現及至般若會上如來以金剛智而決斷之直使聖凡情盡生滅見亡而本有智光豁然披露始信自心清淨了無一法為己障礙此金剛般若直拔疑根為發最上乘者説殊非淺識薄德之能解故黃梅以此印心以其一法不立是為宗門正眼也昔天親列二十七疑解此一經以疑潛言外而此方義學執筌失指從前得意忘言者希豫自幼能誦而長不解每思六祖大師一言之下頓了此心何世無超悟之人由正眼不開返為性障因住曹溪偶為大衆發揮一過恍然有悟而言外之疑頓彰心目信乎此法離文字相非思量分別之所能解也因拈示一班以當法施初刻之嶺南再刻於五雲又刻南嶽學人方玉見而信受茲復刻於吳門將廣願四衆同開金剛正眼的信自心則成佛正因將以是為嗃矢也春秋左氏心法序春秋者聖人賞罰之書也何名乎春秋古者賞以春夏罰以秋冬蓋象天地之生殺而順布之故春秋者賞罰之名也賞罰明而人心覺覺則知懼故曰孔子成春秋而亂臣賊子懼周道衰諸侯僭禮義亡而綱紀絶人之不淪於禽獸者鮮矣天生德於仲尼蹶然欲起而賞罰之故曰必也正名乎然而世卒莫之用也乃因魯史以見志故曰吾志在春秋春秋云者亦曰賞善罰惡云爾善惡之機隱而彰賞罰之權志而晦慮後世之難明也故經成假手於丘明以為之傳冀來者因傳以明經因經以見志而善惡之機凜焉則反諸心而知懼一懼而春秋之能事畢矣由是觀之丘明之心即仲尼之志也不求其心而求之事與詞之間無當也先儒有言左氏𧰚而富其失也異譏其好言鬼神卜筮之事斯言過矣孔子曰君子有三畏畏天命畏大人畏聖人之言畏之為言懼也卜筮鬼神吉凶之先見善惡之昭明天命也君父大人也經聖人之言也易尊卜筮春秋尊君父皆聖人之言也易治之於未萌春秋治之於既亂易言神道之吉凶以懼之於幽春秋言人道之賞罰以懼之於顯二者相須如衣之有表裏如木之有根株豈有異哉故韓宣子聘魯見易象與魯春秋曰周禮盡在魯矣吾今而後知周公之德與周之所以王誠知言也左氏以春秋之事詞闡易之旨其所深譏者違卜蔑祀與僭君叛父同歸於敗善惡必稽其所終禍福必本其所始所謂俟諸聖人而不惑質諸鬼神而無疑者知者畏之以為天命而不知侮之以為異悲夫左氏之心不明而聖人之志隱亂臣賊子復何懼乎某以丁年棄詩書從竺乾氏業將移忠孝於法王慈父也既因弘法罹難幾死詔獄蒙恩宥遣雷陽置身行伍間不復敢以方外自居每自循念某之為孤臣孽子也天命之矣因內訟愆尤究心於忠臣孝子之實偶讀春秋忽於左氏之心有當始知異之為言未探其本也觀其所載列國及諸大夫之事委必有源本必有末吉凶賞罰不謀而符俯而讀仰而嘆不啻設身處地每於微言密旨欣然會心輒援筆識之勒為一書命曰左氏心法非左氏之心法也仲尼之心法也非仲尼之心法也千古出世經世諸聖人之心法也何以明之心者萬法之宗也萬法者心之相也死生者心之變善惡者心之迹報應輪回者心之影響其始為因其卒為果如華實耳不出君臣父子兄弟夫婦朋友人倫日用之際而因果森然固不待三世而後見也楞嚴殫研七趣披剝羣有而總之所以澄心春秋扶植三綱申明九法而總之所以傳心易之吉凶利害憂虞悔吝楞嚴之四生十二類生天墮獄左氏之興亡善敗與奪功罪總皆一心之自為感應而已乃獨以左氏為異豈不冤哉某用是深慨憫末學之無聞特攄愚見著為是編昔我高皇帝以春秋本魯史而列國之事錯見難究始終乃命東宮文學傅藻等纂分列國而類聚之附以左傳名曰春秋本末某服膺聖訓惜未見其書竊師其意妄以王二途通纂為七傳周王道之大統也魯王國之宗臣也五霸雖假其意在於宗周也晉乃宗藩故列五伯之首以親非以功也天王命二文專征不庭命魯公夾輔周室故晉主盟而魯主會凡討罪必書公如晉以魯先之如伐鄭之事仲尼之本意也背於桓而服於襄百七十年左氏因而終始之此其凡也暨於一國興亡之所係一人善敗之所由得失之難易功罪之重輕有一世二世而斬者有三世五世而斬者有百世祀而不絶者皆令皎然如視黑白其中報應影響之徵鬼神幽明死生之故隨事標旨據案明斷使亡者有知爽然知聖人賞罰之微意以服其心後世觀者凜然知懼又不待辭之畢也其或事涉數國所重在一條但以當國為主或事在彼而始於此或始於彼而終於此者不避混淆併載以見其因果若他國之事無與者則略而不録恐其枝也以意在心法不在史故不必具也舊例附傳以通經今則分經以證傳以重在傳非敢亂經以取戾也注則因之斷則不敢讓知我罪我無辭焉始於晉而終於周猶冀枝之歸本也亦如變風之終於豳言變之可正也或曰禪本忘言何子之曉曉乎某曰不然禪者心之異名也佛言萬法惟心即經以明心即法以明心心正而修齊治平舉是矣於禪奚尤焉夫言之為物也在悟則為障在迷則為藥病者衆惟恐藥之不瞑眩也迷者衆惟恐言之不深切也某將持一得之見以俟天下後世之知言者雖多言庸何傷萬曆乙巳孟夏日書於瓊海之明昌塔院刻起信論直解後序直指之道不待達摩西來吾佛世尊特為此一大事出現世間所謂惟以佛之知見開悟衆生故曰惟此一事實餘二則非真由是觀之四十九年所説一大藏教何莫而非直指一心之法耶但衆生根鈍惟佛大慈悲故婆心太切曲垂方便種種開示無非指歸第一義諦嗟乎衆生之迷也固矣當佛入滅未久而邪見橫興破壞正法無論外道即佛弟子親習權乘執為己見自滅正法況其他乎故西域性相二宗各立門庭甚至分河飲水其來已久當六百年有馬鳴大師出蹶起而大振之乃宗楞伽等百部大乘奧義著起信論以破邪執大開一心法界之門攝性相而會一源引三乘而執至極約及萬言即𭦟室復起亦不能增一語可謂修行之圓鑑也嗟夫馬鳴為傳心印之宗師乃宗楞伽以著論達摩乃禪宗之鼻祖亦指楞伽以印心所以然者正恐末世修行正眼不明墮落邪見以破壞正法耳夫何近世親教者不務明心但執文言為究境參禪者槩以盲修為向上痛斥教乘甘墮愚迷固守偏執為必當即此一論乃教禪之指南一心之朗鑑視為文字而讎之詎非大迷也哉嗚呼西域性相之執馬鳴既力破之即此方教禪之遍執圭山著禪源詮以一之永明又集宗鏡百卷發明性相一源之旨如白日麗天而後學竟不一覷此豈真究大事者哉豫蚤年即棄講義初聽諸經不知為何物切志參究既性地一開回視文字真似推門落臼於楞伽則有筆記於楞嚴則有懸鏡是皆即教乘而指歸向上一路奈何世之習教者概以豫為不師古參禪者概以豫為文字師豫雖舌長拖地莫可誰何無怪乎視馬鳴龍樹圭峰永明為門外漢謂一大藏經為揩膿涕紙也且斥發明一心之説為文字而執諸祖機緣為向上機緣豈非文字耶豫謂固守妄想增長我慢為參禪又不若親持經論為般若之正因種子也且參禪動以離心意識既能離心意識求向上豈不能離文字悟言外之旨乎法門此弊非學者之過良由師承正眼不明妄執己見之過耳此論舊遵賢首疏而長水記更繁衍學者望洋杳莫可究豫向纂舊疏去繁就簡為一貫既而語似欠順故祖疏義為直解就本文而疏通之直欲學者從此一門而入則教可離言得義而禪亦不墮邪途是救末法之大關鍵也此解見者多喜其直捷既刻之於嶺南安成今復刻之新安其倡導助緣者皆一時四衆法侶也注道德經序豫少喜讀老莊苦不解義惟所領會處想見其精神命脈故略得離言之旨及搜諸家注釋則多以己意為文若與之角則義愈晦及熟玩莊語則於老恍有得焉因謂注乃人人之老莊非老莊之老莊也以老文簡古而旨幽玄則莊實為之注疏苟能懸解則思過半矣空山禪暇細玩沈思言有會心即託之筆必得義遺言因言以見義或經旬而得一語或經年而得一章始於東海以至南粵自壬辰以至丙午周十五年乃能卒業是知古人立言之不易也以文太簡故不厭貫通要非枝也嘗謂儒宗堯舜以名為教故宗於仁義老宗軒黃道重無為如云失道德而後仁義此立言之本也故莊之誹薄殊非大言以超俗之論則駭俗故為放而不收也當仲尼問禮則嘆為猶龍聖不自聖豈無謂哉故老以無用為大用苟以之經世則化理治平如指諸掌尤以無為為宗極性命為真修即遠世遺榮殆非矯矯苟得其要則真妄之途雲泥自別所謂真以治身緒餘以為天下國家信非誣矣或曰子之禪貴忘言乃曉曉於世諦何所取大耶豫曰不然鴉鳴鵲噪咸自天機蟻聚蜂遊都歸神理是則何語非禪何法非道況釋智忘懷之談詎非入禪初地乎且禪以我蔽故破我以達禪老則先登矣若夫玩世蜉蝣尤當以此為樂土矣注成始刻於嶺南重刻於五雲南嶽與金陵今則再刻於吳門以尚之者衆故施不厭普矣紫柏老人全集序太虗寥廓長風鼓而萬竅怒號殊音衆響皆一氣之所宣又奚可以大小精粗謂靈根之有間哉惟吾佛以不思議智流出一切音聲陀羅尼故世諦語言皆悉顯示第一義諦若夫塵説剎説熾然説即水流風動皆演圓音況寓泰定而照羣情觸境而發無思而應如谷響者乎是以從上諸祖證無師自然智者即揚眉瞬目怒罵譏訶莫不直示西來大意又可以識情語言而擬議其形容哉達摩西來不立文字而曹溪則有壇經及二派五宗雖直指向上然皆曲為今時或上堂入室示衆舉揚機如雷電凡垂一語必緝為録大概聊爾門頭若大慧中峰至我明楚石皆其類也蓋借語傳心因言見道言其所絶言耳今去楚石二百餘年有達觀禪師出當禪宗已墜之時蹶起而力振之得無師智秉金剛心其荷負法門之志如李陵之血戰縱張空拳猶揮駐日雖未犂庭掃穴而一念孤忠與囓雪吞氎者未可以死生優劣議也真末法一大雄猛丈夫哉然師賦性不與世情和合至老見客未效一額手雖未踞華座竪椎拂然足迹所至半天下無論宰官居士望影歸心見形折節者不可億計以自性宗通故隨機之談如千鈞弩發應弦而倒無非指示西來的意稱性衝口曾無刻意為文也一唾便休弟子筆而藏之者伯什師初往來於金沙曲阿之間與于王二氏法緣最深于潤甫居士每得師片言隻字藏貯如拱璧及遊匡廬主邢孝廉來慈長杉館師之法語留邢氏者亦多師化後潤甫屬王君仲結集為一部豫久沈瘴海為師了末後因緣過金沙之東禪潤甫捧師集示余稽首請為其序余三讀其言喟然而嘆曰嗟乎末法降心力拔生死之根如一人與萬人敵者豫獨見師其人也睹其發強剛毅勇猛之氣往往獨露於毫端如巨靈揮斤真所謂與煩惱魔欲魔死魔共戰竟能超越死生如脫敝屣可謂戰勝有功者也故其所吐豈可以文字語言聲音色相求之者耶佛説欲為生死根師凡所舉必三致意痛處劄錐直欲剿絶命根即此可當金鎞矣又何庸夫門庭施設哉昔覺範禪宗妙悟超絶語言典則所著自目之曰文字禪故豫題曰紫柏老人集蓋非墮於俗數也觀者當具金剛正眼視之於言外則思過半矣雲棲老人全集序言以載道文以達理其治世語言雖聖經咸稱曰文獨佛語不然以世出世間情與出情之異耳蓋佛所説以實相印印定諸法凡所語言皆歸實相所謂言語道斷心行處滅不可得而思議者焉以文求之譬夫執氷而求火也豈特佛經即從上諸祖粗言及細語皆歸第一義況本於文而超於情者乎豫讀雲棲大師集三復而興嘆焉師以儒發家中年離俗單究佛未出世祖未西來一著遍參諸方有所發明遂挂瓢笠匿迹雲棲以恬養知非有意於人世也況為文乎久之聲光獨耀緇白問道而來者初則屨滿次則林立久則雲屯霧集皆有請焉以師所造者隱密所居者平常故於應機接物無門庭絶城府無崖異如鑑照物妍順應故無臧否無指謫一任其本懷故來者如蚊飲海應量而足諸弟子記其語者謂之文嗟乎豈以是盡大師哉豫少依講肆聞説者談佛應機之妙不知其謂何及老年讀金剛般若諸弟子從佛持鉢乞食歸來飯食洗足敷座而坐空生忽嘆希有世尊豫忽然如大夢覺是知世尊處世與人周旋前二十年無人知為何事者空生今日始乃窺之固知孔子之嘆莫我知也即顏子高弟但曰鑽之仰之而竟莫能入然則諸子所記之語豈盡孔子哉於戲聖人影響於世豈常人所能盡知耶信乎文者糟粕耳然禪門載道之言除佛經諸祖傳燈直指向上特其言者大有徑庭不近人情故望洋者衆即文字之師稱述佛祖之道而溺於情讀者如絮沾泥求其平實而易喻直捷而盡理如月照百川清濁並映能領之者如飲甘露無病不瘳如是而為佛祖之亞者豫於雲棲之文見之矣議者謂師為老師宿儒豫嘗謂師為法門之周孔也若以文視師則贅矣嘉禾嚴君某慕師而未親炙故梓其全集以照後世其亦斯道之功臣歟方外遺書序昔唐宋諸賢宰官棲心禪悅者載之簡册如裴楊張呂諸公與黃檗大慧諸大老遊戲法喜皆扣關擊節無不發明向上一路惟在一言半句如探竿影草至若刮垢磨光敲骨打髓用本色鉗椎煆煉習氣則施者不易而受者良難故不多見丁巳莫春子玄馮延齡送我吳門舟中乃祖開之太史所受達觀蓮池二大老遺書皆手迹不惟叮嚀法門克荷大事其於應病施藥如扁鵲之醫洞見肺腑而調劑之方不特砭膏肓起廢疾而已以此傳家子孫寶之當為慧命非獨墨寶手澤已也雲棲大師了義語序了義語者乃直指一心究竟顯了之説也吾佛出世特為衆生開示一心使其悟入徹法無遺從淺至深始於執相破相以至性相雙融三乘之設皆是遮護名為覆相之談俱未顯了至於分明指示一心了無剩法令其直下頓悟方名了義以迷有深淺故教分頓漸至末後拈花直指離言之道達摩西來單傳此道名為禪宗頓門然此頓宗之旨非獨一禪諸教中顯密所談者不一而足以執教者迷宗執禪者毀教皆不達佛了義之旨耳非獨於理至若所設六度萬行皆是求明一心之行較之於禪但頓漸不同及其成功一也至若淨土一門修念佛三昧此又統攝三根圓收頓漸一生取辦無越此者從上佛祖極力開示已非一矣無奈末學志尚虗玄以禪為高薄淨土而不為時當末法衆生垢重豈得人人皆稱上根以多自欺而不量己之德器但隨聲妄和曾無實行豈非自誤也耶嗟乎宗門久無明眼知識莫與正之至若義學之徒虗事浮談多乖實際不惟無禪而教眼不明亦無甚於今日也雲棲大師蚤悟唯心因極力主張淨土以救末法之弊自建叢林身教弟子日夜無替者幾四十年故海內緇白信從者衆大師所著彌陀疏鈔發明殆盡至於尋常開示言句提唯心以闡淨土之旨居多心空居士朱君為入室弟子所録此語目曰了義誠禪宗之圓鑑一心之指南直抉末法翳眼之金篦也頃宦遊星渚入山過訪以稿見示豫三復三嘆僭為代一轉語於編首
