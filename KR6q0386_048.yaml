body:
  text: 侍者福善日録門人通炯編輯嶺南弟子劉起相重較夢遊詩集下凌江喜雪有引嶺南自古無雪癸卯臘月偶過凌江一見喜而志之凍雨灑柴扉寒聲漸覺微乍疑梅影瘦不信雪花飛重壓芭蕉葉輕欺薜荔衣八年勞夢想今喜見光輝示寂空鑑禪人腰包從萬里七載遲炎方居卜恆河畔心牽一水長有身堪荷負無物可思量斷臂崖前樹重聞桂子香自曹溪檄還戍所委形隨大化去住豈容心縱使驅炎海還同坐寶林偷生根蒂淺絶迹道源深極目寒空色浮雲自古今登瓊州明昌塔大地浮香海孤標湧梵幢水天靈鷲現火窟毒龍降日月懸空鏡乾坤照夜缸望雲彈五指花雨墮虗窗丙午夏日自曹溪乞食度嶺至虔州因熱致病寓陳文績將軍池亭時觀魚戲新水清猿嘯月鶴鹿依人宛若深山相與夜坐感懷賦詩五首冷落將軍署棲遲放客過懶輸塵事少間勝白雲多揮麈慵調鹿臨池學愛鵝不知幽谷裏似此更如何白日炎如火高眠夜氣寒夢醒回月窟心想入冰盤鼓角轅門曉星河曙色闌覺來方散髮愁見籜皮冠池水江湖思遊魚樂未忘永懷臨大壑幽思寄濠梁新月沉鈎細垂楊引線長夜來風雨發鱗甲幾飛揚易謝諸塵纍難消大患身行藏容混俗老病豈饒人牛馬齒將缺猿猴心未純六根如割據不識與誰親老被間心使生為業力驅虗將三寸氣連絡百年軀藥石元非命心齋豈是愚祇愁人世苦願作佛家奴山行仄徑山腰細清流水帶長迎風松子落浥露稻花香村舍青蓮蕊人家白板房桃源如未到不必問漁郎晚下高峰遇雨宿蓮花寺薄暮下高峰山深暑尚濃氣蒸三伏日涼灑一林松風急催寒雨雲腥起臥龍促歸華藏宿夢醒上方鐘蓮花寺一片通香海千峰擁化城青蓮開細葉慧月朗高明世遠諸緣息心間五濁輕微塵如可破即此證無生凌江雨過放舟還山二首驟雨驅炎熱新秋爽氣生岸沙隨水沒江月傍人行聚沫勞生事浮雲過客情臨流觀泡影轉見此身輕一葉乘風去扁舟趂水還山盤旋若蟻江宛曲如環身與空雲合心將水月間萬峰歸臥穩寂寂掩松關烏徑果深寺山市依雲集花宮傍水開調生間不住䇿杖偶行來飯待檀那供蓮須社主栽可中清淨地堪結講經臺乞食晚歸落日晴偏好歸途寒更遲間心雲不厭倦意鳥應知世路終無盡勞生信有期回看萬峰裏誰嚼紫莖芝佛成道日今夜明星上當初夢醒時雪山仍在眼覺樹正垂枝遙想耽飢瘦因思獻乳麋六年寒徹骨心苦有誰知夜發凌江虗舟隨所適一水絶間關月色看逾好江聲聽轉間浮雲身外事白髮鏡中顏莫謂漂零久前途即故山舟過湞陽峽不住元為客虗舟信轉蓬夾江千尺岸帶雨半帆風掠石如飛燕乘流似履空迷津終古意都在去來中宿英州自笑何為者棲棲苦問津試摩三寸氣可繫百年身大地皆遷客勞生總聚塵請看江上月曾照幾多人春日苦雨二首炎徼多寒熱清和賴此辰可憐連夜雨斷送十分春易破關山夢難禁羈旅人桃花三月水自古會迷津滴滴心無緒絲絲意轉工一舟迷遠浦雙眼暗長空已失千村樹還吹萬竅風愁添新積水滾滾急流中擬投老南嶽初至湖東與藏六支公夜話投老依幽勝真期有道林百年今夜話歷劫此時心雪覆衡山白雲埋湘水深歸休今已矣不復費招尋病中示諸子厭世心成癖那堪病作魔已知餘日少更見此身多藥石充香積呻吟當羯磨文殊如有問一默竟如何湘江即事春雨過瀟湘輕帆挂曉霜急流回石鼓新水度衡陽嶽色看來近湖天望去長誰知塵海裏隨處是津梁宿橋口落照浸湖天沙明月在船鳥棲臨水樹人語隔林煙浮世止一宿餘生能幾年如何衰暮日猶滯楚江邊過龍鬚湖宿兔子口湖淺不難渡風帆未易施羊腸沙曲折鳥羽岸參差地折雙輪轉天空一鏡垂還看棲泊處新月照娥眉過天心湖羣山連地脈衆水注天心浩蕩乾坤大浮沉日月深帆飛隨獨鳥野望入平林儻逐扁舟去煙波何處尋龍陽縣粉堞隱朝霞孤城傍水涯沿堤多柳色繞郭是桃花天遠飛黃鵠江清走白沙武陵知不遠渡口見漁家德山禮祖四首師據空王令余來愧晚年遙瞻千載上常見一燈懸鳥語言前句山光格外禪手中生鐵棒刮盡野狐涎脫盡廉纖見來參古作家棒敲獅子骨舌吐鉢羅花光相含秋月靈龕隱暮霞室中方丈地曾辨幾龍蛇堂前間托鉢獅子慢調兒覿面難回處低頭不語時未明末後句翻使至今疑為問三年事因何得早知頂具金剛眼胸藏栗棘蓬片言轟霹𮦷四海走英雄祖意機前薦凡情當下空宗門生殺手凜凜見真風山居十首天地存吾道山林老更親間時開碧眼一望盡黃塵喜得無生意消磨有漏身幾多隨幻影都是去來人髮不如心白形還似木枯衆緣間處盡一念看來孤天已容踈拙禪應離有無餘生當落日步步是歸途生理元無住流光不可攀誰將新日月換却舊容顏獨坐唯聽鳥開門但見山幻緣消歇盡何必更求間混世多生厭歸山念自休幾曾千載計特為一人留浩浩成空劫涓涓積巨流但觀清淨理身世總如浮身已難憑藉支離各有因暫時連四大終是聚微塵萬籟含虗寂諸緣露本真從來聲色裏迷誤許多人斗大一菴居其中任卷舒雲霞生戶牖星月挂庭除念息心愈寂塵消境自如南熏時入座颯颯六窗虗飽食無餘事高眠晝不分晦明殊未覺鐘鼓幾曾聞四面幃青嶂和身臥白雲誰言茶力健能遣睡魔軍無意人間世遊神極樂天唯餘可漏子耻放拍盲禪獨羡搏風翼堪多出水蓮回觀塵土客誰不為纏眠此性元無著何為不自由祇因生管帶故被世遷流不識空花影堪憐大海漚但開清淨眼明見一毛頭揮麈元吾事間心奈懶何聊將精進力調伏睡眠魔寂寂吹天籟悠悠逝水波從來無一字應不怪維摩別南嶽面帶煙霞去中懷愧色行止緣酬舊約豈是逐浮名猿鶴休怨別松風不住聲唯留廣長舌日夜説無生舟行湘水通巴漢孤帆入楚天片雲低遠樹晴日照斜川處世常如寄浮生莫問年縱遵歸去路亦似渡頭船曉發湘潭曉發清潭曲揚舲信水流帆飛隨去鳥岸轉逐行舟樹遠疑天盡江空見地浮洞庭看咫尺漸近嶽陽樓借風亭天運移炎祚爭馳逐鹿秋誰知雲臥客借筯為前籌帝業三分定雄心一火酬東風千古恨江漢水悠悠過嘉魚舟停蒲水宿侵曉過嘉魚山露城頭小江含樹影疏天垂疑近日水遠若憑虗一葦乘風去飄飄任所如舟發武昌覽勝歷瀟湘乘流過武昌江山雄漢口雲雨誤襄王遠迹飛黃鶴輕帆挂夕陽生涯隨逝水不必問行藏過黃州七澤控荊襄連天一水長江流回赤壁山色擁黃岡作賦推漁父行歌憶楚狂向來思濯足今已在滄浪喜歸匡山六首山是前生住林從此日開誤嬰塵纍去喜仗夙緣來骨立羣峰瘦心間百念灰煙霞今已足何必問天台遁世元無悶居山不厭深密雲晴帶雨幽壑晝嘗陰乳鹿眠豐草歸鴉集暮林峰頭墮明月照破一生心垂老脫牽纏刳心易入禪偷生至今日怡逸感餘年夙負酬應盡良緣信未愆潛神一壞土當處湧青蓮盟主舊煙霞歸來便到家雲生如匹練山擁似蓮花熟睡忘昏曉癡禪閲歲華可中投足地不用一袈裟白髮照衰顏潛形賴有山餘生唯待化一息總歸間禪爛難開口雲深易掩關圓通入流水日夜響潺潺老與懶相宜形銷氣不支見聞渾似夢起坐忽如癡日月從朝暮榮枯任歲時所存唯一念寂爾入無思夜坐納涼三首夜色喜新晴迎秋爽氣生雨餘林葉重風度嶺雲輕靜慮觀無我藏修厭有名坐看空界月歷歷對孤明萬籟寂無聲心源似水清爐煙通夜細山月入窗明棲草蟲偏穩眠雲鶴不驚坐深諸想滅忽聽曉鐘鳴炎熱不須辭清涼信有時雲飛山色墮雷動雨聲隨短葛休嫌重商飇莫怨遲但依松下坐自待好風吹壁觀兀坐諦觀心來源未易尋動時分朕兆起處絶幽深寂寂敲空響綿綿出鷇音應知離念相總不屬浮沉病二首苦集是生因難消大患身支持唯賴骨動轉不由人一息微如縷殘軀眇若塵從來皆假借究竟與誰親久厭形為纍那堪老病侵自慚禪定淺轉覺病源深了法離諸相觀空見此心欲超生死路不向外邊尋衆粥罷經行因示粥罷慢經行沿流不問程腳如絲線斷身似片雲輕踏去山光透歸來月色明無勞重入室聽取夜鐘鳴秋深秋深寒氣重擁衲正相宜人老骨偏徑松枯枝更奇黃花生意淡白髮世情離獨坐忘緣後寥寥祗自知丙申二月抵廣州寓海珠寺天涯歷盡尚遐征百風煙不計程涉險始知塵海濶道窮轉見死生輕暫依水月光明住偶向琉璃寶地行到岸舟航今已棄上方鐘鼓為誰鳴丁右武王惟吾同遊星巖諸勝未還賦懷覽勝探奇讓謖邱況逢簫史是同遊千山緊附雙龍翼萬壑爭趨一葉舟洞裏丹砂誰可覓雲中芝朮幾時收莫看松下彈棋者半局令人易白頭將之雷陽暫憩小金山人間瓠落事多非聊向江心擬息機有寺不容僧暫住無家應與鶴爭歸慈雲暗覆空生室香霧間侵過客衣千古迷津懸寶筏急流肯止便歸依記公自廬山遠問曹溪遙向曹溪問鏡臺入門一見笑顏開身將廬嶽間雲至心帶燕山白雪來生死歷窮天外路寒暄寫盡嶺頭梅故人但得如君思此念令余早已灰甲辰曹溪奉臺檄還戍煙霞元自邈風塵渴愛林泉敢認真老去心如無火木生殘形似再陽春乾坤不許逃禪輩禮法難忘出世人獨有空山猿鶴侶頻隨清夢伴間身舊同妙峰師遊河東萬固寺今聞重新賦此寄懷四十年曾乞食過祗陀精舍傍恆河中條山湧青蓮髻華嶽雲騰碧海波城郭千家還舍衛法身三展變娑婆何時重荷降龍錫麻谷牀前再羯磨登烏徑水樓穿雲過峽度平田行盡溪源見市𢌅一線河流通大海四圍山色擁青蓮樓當水月清涼土人入空居自在天可似桃源避秦地往來但不是漁船端州壽馮元成使君廊廟江湖向各天相逢豈是此生緣居官善用慈悲行應世安心自在禪止有祿金堪布地更無塵迹可隨眠曇花一現三千歲今喜重開北斗邊舟中苦雨謝鍾二子見過積雨陰雲晝不開蓬窗深喜故人來松花獨許攢眉釀蓮社寧辭作賦才世事只看如指馬此心不説比寒灰坐聽日暮城頭笛陳陳輕風送落梅江上感懷風雨蕭蕭江上舟飄零才見養空遊夢回松頂棲雲鶴間看沙頭戲水鷗書札不須勞北雁世情早已付東流百年已過三之二縱有餘生總是浮南征道中遇雨北風吹雨暗山城歲暮天涯尚遠征避世想從麋鹿隊畏途心折鷓鴣聲十年瘴海孤蓬轉一夕霜華兩鬢生策馬衝泥投野宿不堪回首暮煙橫寄燕都慈壽寺別山長老當年一鉢久過從長夜披衣聽曉鐘飯食每懷香積界經行常憶妙高峰潛消瘴熱心含雪暗記流年手種松為掃蓮花師子座待余重舉絶言宗結夏法性若惺炯公蕉園蕉園何似坐祗園為借清風暫解煩緑葉幾供懷素筆重陰猶覆譯經軒有房公譯經筆授軒護生不許朝持鉢習定還應晝閉門聞道本來無一物故今終日對忘言鄒子胤過訪因示為參向上訪曹溪底事分明本不迷曉院風生吹翠竹春山雨過長青藜間來始覺諸緣靜悟後方知萬物齊最是喚人親切處五更夢破一聲雞德山禮祖後過定王陵當年一棒聖凡分的的真機泯見聞香火千秋占王氣河山終古覆慈雲空林麋鹿仍隨麈淨土蓮華已屬君杖倚春風還佇立夕陽紫翠正氤氳衡陽湖東結菴初成劉存赤鍾衡頴遠來相慰遂同度歲一載神交費所思相逢喜見歲窮時扁舟雪夜來千里淨土蓮花種一枝已老形骸俱長物從頭日月是新知匡山莫謂當年社此地重開定可期將東遊赴花藥寺齋二首舍衛城西古道場偶過三匝禮空王觀心已入唯心土説法還登善法堂香飯能令多衆飽醍醐獨許利根嘗當人未即輕拈出儻可重來再舉揚祗園開向大江西地湧蓮花最可棲佛國遠超諸相外法身高與四天齊暫來即請登華座久住應頻信杖藜可惜過從歸去曰不堪回首重悽悽過花藥寺梅雪堂遜菴宗師故居梅雪堂開骨更清齋餘間步一經行香浮石室花初放影入冰壺月倍明斷臂巖前留舊迹懷人笛裏憶新聲只今若問西來意隻履誰能識去程過九峰禮無念祖師梵王宮殿隱煙霞門外紅塵世路賒山自九峰開淨土僧從千葉坐蓮華光浮石室留宸翰影落諸天護絳紗若問西來端的意分明全付一袈裟宿九峰方丈貽聞圓長老遙向名山禮法壇此心須乞祖師安九峰夜月侵人白萬壑松風入骨寒已滅慧燈重發焰獨留衣鉢許誰傳應知天帝歸依日獅子音聲話未殘率諸弟子赴漢陽王章甫齋郊園遙訪漢江湄一似毗耶集衆時香飯飽餐天上供玄言喜見郢中辭平田舊是裁衣式高柳新垂灑露枝風雨夜深心境寂清涼疑坐藕花池信宿天光上座接待寺荊棘叢中古道場草年辛苦為誰忙堂開四海來龍象梵唄三時禮法王域內圓成華藏界眉間常放白毫光瞻依已入唯心土向上何須再舉揚過曲阿喜逢王東里明府出水青蓮住世心軒車亦似在山林空花鏡像塵何寂孤月寒江意更深鷲嶺想從親受記毗耶應是舊知音相逢一句無生話覿面分明不用尋登徑山凌霄峰獨上高峯倚杖藜侵人空翠轉凄迷西來二目如鵬翼東去千山似馬蹄絶壑久稱獅子窟空林終許象王棲只今欲説無生法麈尾才揮萬象低寄五嶽蔡使君曾向曹溪結勝緣別來冷落祖師禪時談不二思摩詰每話無生憶大年自信宰官為示現誰知案牘是真詮雪峰枯木堂前月此夕因君缺又圓喜歸匡山歷遍江湖久倦遊青山直到老方投形骸已謝空花影世事都從逝水流寂寂間身雲作伴蕭蕭白髮雪蒙頭餘年不必論多少一念無生曠劫休林觀海明府陳赤石大參入山見訪匡山白社憶當時此日高軒最可追入處即能忘世慮到來全不用攢眉身披萬壑雲容溼坐待千峰月色遲一夕清言成勝迹乾坤自古重心知鄉人至少小離鄉不記家回思往事總堪嗟故人猶想兒時面枯木難開舊日花河畔柳枝垂曉露門前山色帶朝霞唯餘此景年年在不必從前問歲華送修六逸公歸家山草載殷勤伴瘴鄉又隨瓶錫走諸方參玄直上金輪頂入室還依大法堂歸去家山雖有意老來泉石豈能忘餘年儻未填溝壑遲爾同棲寂滅場心光法姪持雪浪恩兄手澤讀之有感君來忽憶故人情究竟難忘出世盟乍見遺言猶對面細思談笑似多生知從兜率居高座直入菩提豈計程儻再相逢如昔日肯教同伴不同行中秋喜陳祠部無異入山見訪遙問空山鹿豕羣巾車入谷到斜曛披襟細語論衷曲煮茗焚香坐夜分喜對月明心似鏡深觀世事倏如雲當機若問西來意一物全無把似君示衆平生蹤迹任前緣慚愧形骸未脫然一片間心隨處見無端白髮暗中遷自知來日皆除日誰信添年是減年回首家山歸去後萬峰高枕石頭眠壽覺休繆居士居士由來應現身金剛心地淨無塵調生久悟無生忍住世還同出世人摩詰法門非是默龐公妻子不為親精神已入蓮華藏劫念何須問大椿山居十首平生蹤迹任東西投老那能擇木棲縱使脊梁剛似鐵奈何脛骨軟如泥間從絶壑看雲起坐倚千峯聽鳥啼不必更拈言外句現前聲色是全提依巖結搆草為菴乍可容身止一龕但得心源歸湛寂任從世事付癡憨三竿日上還高臥丈室雲封不放參佛祖直教蹤迹斷何須前後列三三回看五濁氣氤氳羣鬧啾啾器裏蚊瞥念未興迷悟絶一微才立聖凡分青山自許容藏拙火宅誰能為救焚翹首長空雙碧眼不堪大地總浮雲堪嗟往事夢中遊翳眼空花不可求心路信如雲散月形骸任似水浮漚生存一息餘三寸老入千峰勝十籌從此人間蹤迹斷更無憂喜上眉頭藏修今已遂初心自昔居山不厭深空外任從千嶂列目中豈受一塵侵松風時説無生法流水長鳴太古琴入室何勞重豎拂當機薦取在知音幽巖蘭蕙有餘芳習習松風送暗香暫借聞熏開性地勝傾甘露灌枯腸心心直入蓮華藏念念常明般若光知足便登兜率界何勞此外覓西方春深寒谷笋生芽又見松梢漸發花一鉢待來充午供衆僧專等試新茶空無神力諸天飯富有莊嚴五色霞為問長安歌舞客幾曾飛夢到山家三冬擁衲坐枯禪喜見春光最可憐瓦鼎野蔬將獻供地爐松火漸無煙青山覆雪重開面白髮防寒已及肩幸作太平雲臥客焚香朝暮祝堯年舊遊恍忽是前生每憶行藏暗著驚此日青山當日夢今時白社舊時盟酬機但用無星稱娛老唯留折腳鐺若問西來端的意曹溪一派水盈盈何事當年愛離家難忘舊著破袈裟祇因未了多生欠不是從前一念差半世業緣同夢幻百年妄想等空花歸來剩有青山在豈忍將金去博沙臥病蒲團香案日生塵老病難容世外身入夢泉聲清徹耳到牀月色冷侵人間心不與諸緣合白業唯存一念真究竟要知歸宿處蓮華已結未來親酬陸使君景鄴高車幾度過空山歷盡千峰直破關有舌不能酬密諦忘機正可對衰顏飛來白雪寒相照望入青雲思更間遙憶轅門端坐處匡廬時在兩眉間寄仰山靜光禪人一自匡廬問法歸別經歲月信音稀顧豫已入無生忍知爾常參向上機雨過雲開山骨瘦春深日暖蕨芽肥何時再振牀前錫拈示西來屈眴衣憶山居六首有引余圜中宛居深山因而有述榾柮千年火支撑獨木橋往來人境絶菴主淡無聊白雪在簷前飛來日如故不是爾無心如何常共住明月挂寒空光徹寒潭底上下本自同看來無彼此流水不是聲明月元非色聲色不相關此境誰會得風從何處來衆響動巖穴靜聽本無聲如何有起滅身在千巖裏門前路不通寂寥誰是伴唯有數株松舟泊珠江月色淡如水潮平寒似空孤舟橫野渡人在有無中軍中道場吟四首朝聞鼙鼓聲暮聽金磬響動靜雖不同唯在知音賞旌旗蔽浮雲幢幡影朝日試看生殺機兵不似禪密法鼓震龍宮喊聲動天地何似衆竅風噫出大塊氣曾坐東海上驚濤怒破山今聞震天雷入耳心逾間寄王金吾偶會忽言別再晤應更難思君心似雪飛夢薊門寒喜友人至人生會合期杳如風雨夕與子未見時宛似雲中日偶成四首風吹楊柳花東西南北走豈是愛隨他自身元不有野雉在樊中粱食亦不少何似處山林飲隨時了豹隱南山霧常恐羅網侵只以皮毛故是為身纍心膏火照夜行人益己受損豈不自愛惜生質固所稟憶家山竹池萬竹飛晴雨雙池引石泉別來三十載日日憶栽蓮瓊山奇甸香為國珠崖玉作山人從塵海渡儼若出天關五指山一葉浮天外千山落鏡中誰人揮五指劃破太虗空金粟泉粟泛黃金屑泉流白玉漿我來持一鉢足可獻空王明昌塔瓊海開龍藏香幢出梵天即看火宅內從地湧青蓮劉將軍邀觀玉龍泉二首清泉寒似玉嘉樹密如雲人有羲皇樂心同鹿豕群混沌何年鑿淵泉此地開人依空界立山入鏡中來題墨香深處四首碧草橫書帶幽蘭結佩香虗亭人獨坐心已到羲皇竹色侵簷緑荷花照水紅夜深涼露下人在暗香中芙蓉開似錦黃菊疊如錢醉眼熏心處端然自在禪雪逼梅舒蕚春催草發芽目前生意事誰識在山家寄膠東李生萬里路不遠寸心空更間不知思我者如隔幾重關懷丁右武大參落葉千山雨寒空一片雲舉頭聊縱目何處不思君咏松二首樹老心逾赤楓凋葉更紅可憐霜雪裏獨有一枝松霜幹龍鱗老風枝馬尾長濤聲清響發瑟瑟滿虗堂詠梅二首叢林秋已晚萬木盡凋傷獨有寒梅樹飛來雪裏香雪色春先到寒香夜更清一聲幽鳥語忽使夢魂騖詠竹五首寒飛千尺玉清灑一林霜縱是塵心重相看亦頓忘矯矯凌雲姿風生龍夜吼霜雪不知年真吾歲寒友霜幹寒如玉風枝響似琴瀟湘一夜雨滴碎客中心葉落根偏固心虗節更高一林寒吹發清夜伴松濤淇澳春雲碧瀟湘夜雨寒虗窗人靜聽颯颯響琅玕喜雨三首涼雨灑炎天飄風振林木輕雷響簷端隱隱似空谷元陽如烈火羣有若陶鑄忽然風雨來炎蒸在何處山空泉更寒暑氣無來往颯颯風雨生毛骨更清爽山中吟六首塵隔三千界心超十八禪鐘聲清夜發聽徹不成眠日月不知去此心應合空山樓時獨坐倣佛在鴻濛枝頓春已動草木氣相鮮靜裏觀時化心忘有漏年時折寶林松旋汲曹溪水來煮雪中茶此味無可比萬山寒色破地氣暖生春花落曹溪水何人肯問津無事晝打眠松風吹不徹何處木魚聲夢中響更別偶占一滴曹溪水千株逼漢松人依空界立宛在畫圖中示知事僧二首斷臂巖前雪而今血尚濃黃梅腰下石能得幾人舂積雪苦凝寒叢林盡凋沍一陽才動時枝頭春已露董國博過訪曹溪因贈曹溪一滴水流浪滿江湖隨君化霖雨到處灑焦枯夏日王癡過訪炎熱毒如火茶香冷似冰誰知天壤內除懶盡輸僧送悟心融首座二首一片江南雪來清瘴海炎君今度嶺去寒色帶眉尖七尺藤過頂三餐飯滿瓢何時萬峰裏倦飽臥雲霄對月雪嶺孤松老曹溪滴水寒誰知今夜月猶是昔時看舟過小金山四首一度一回新重來不厭頻祗因貪佛日時禮法王身青山常不改流水去還來獨有松間月清光照緑苔漁火夜深白沙雞清晝喧江空人境絶長日掩柴門階下魚龍穩沙頭鷗鷺間盈盈剛一水隔斷萬重山喜黃生公亮歸自薊門五首人生無百歲逢君時過半忽別又三年離合安可算昨日乘虗舟夜來忽風雨今朝喜逢君杳然如夢許塞上草頭白燕山楓葉丹唯餘寒雪色君尚在眉端驛路千行柳江湖萬里波往來空歲月誰不為蹉跎羅浮半輪月曹溪一滴水與爾共餐之意味無彼此喜曇欣慶公至君從白下來慰我炎方熱火宅喜相看如對燕山雪招慶公嘗荔枝長夏火雲紅五月荔枝熟與君坐珠江日日敲寒玉對慶公懷舊菴居與君鄰水竹清同好一別三十年相看今已老寄蒲坂襄垣震嵩二宗侯三首一派黃河水遙從天上來滔滔東入海借問幾時回華嶽雙峰出高空碧玉寒遙聞天樂響應是禮仙壇中條山色青朝霞散晴綺知有忘世人獨坐觀無始夢遊天台二首忽到天台山相遇雲中老想是避秦人顏色如此好飛上華頂峰忽聽天雞呌遙望蓬萊山掀髯發長嘯懷舊夢坐龍華樹聽殘長樂鐘醒來空谷裏萬壑吼松風懶殘老衲住山菴小山藏寺心虗芥衲空懶眠松下石坐斷最高峰將之雷陽別曇公于江上送別芙蓉江江水秋逾碧歸舟遡寒流來往心如織詠月湛海光如有寒空色若無誰知俯仰內千古照迷塗詠雲一點如纖翳瀰漫塞太虗但知已起後不見未生初試端硯三首君子愛佩玉溫潤象其德此石尤過之所寶在翰墨詞海萬里流筆峰千丈雪盡向此中生時時飛玉屑浩浩清江水磊磊紫石山誰知千古意元在混茫間化城菴二首山色自朝昏榕陰間古道多少往來人紅塵空浩浩鑿井在高原土深水難得施工極盡時淵泉流不息磬室斗室懷幽壑窮交見古人雖餘方寸地無處著囂塵明禪人施茶此心元不住白足本無塵時汲源頭水清涼熱惱人寄塵堂首座憶爾栽茶處滿園春雨滋何時掃松葉相對一烹之寄宗遠西堂曹溪春水漲衡嶽鴈歸時憶爾跏趺夜松門月上遲寄題龍興寺禪堂王氣鍾山嶽經聲徹帝宮法筵龍象衆萬世祝堯風寄皇陵供奉乾坤開帝業日月轉河山香火勤供奉晨昏仰聖顏題畫小景二十一首流雲覆春山輕寒凍欲坼何處踏青來歸時月華白芳樹夏初長輕舟湖水碧携琴訪故人雲深何處覓斷橋人影橫扁舟霜月白回首望雲山悠然塵市隔煙樹春雲緑江天落日紅不知何處醉歸向月明中風雨孤舟夜微茫草樹春茅簷驚犬吠定是渡江人江閣流雲細孤村白日間小橋橫野水隔斷萬重山晏坐桃花塢幽居遠市塵祗緣春色好不是為逃秦高樹咽新蟬深林掩茅屋斷橋人影橫白雲滿山谷瀑布寒空外孤亭水石間日長無個事結伴看春山秋水碧如玉遠山凝似脂夜深魚不食釣餌為誰施淅瀝寒林瘦潺湲水石清白雲千萬里相對總忘情萬木流雲密千山落照寒衡門長日掩酒伴暮相看遠樹晴煙合江空草閣寒行吟同澤畔始信獨醒難古木蒼松老清泉白石奇携琴問知己遙望酒家旗江閣坐忘機憑欄望夕暉沙頭人佇立擬待月明歸雲白天垂練江清水合空相携尋酒伴同過石橋東秋山雲氣薄紅樹曉霜清一帶湖天濶空留待月明山似天臺路花無秦代春漁郎坐溪口不見問津人彤雲四野迷層冰萬木折衝寒訪故人踏破連山雪萬山凝積雪高樹折輕冰何處寒梅發香勾一個僧秋山新雨霽遠水淡無垠湖上幽人宅悠然隔市塵
