body:
  text: 侍者福善日録門人通炯編輯嶺南弟子劉起相重校法語答鄭昆巖中丞若論此段大事因緣雖是人人本具各各現成不欠毫髮爭奈無始劫來愛根種子妄想情慮習染深厚障蔽妙明不得真實受用一向只在身心世界妄想影子裏作活計所以流浪生死佛祖出世千言萬語種種方便説禪説教無非隨順機宜破執之具元無實法與人所言修者只是隨順自心淨除妄想習氣影子於此用力故謂之修若一念妄想頓歇徹見自心本來圓滿光明廣大清淨本然了無一物名之曰悟非除此心之外別有可修可悟者以心體如鏡妄想攀緣影子乃真心之塵垢耳故曰想相為塵識情為垢若妄念消融本體自現譬如磨鏡垢淨明現法爾如此但吾人積劫習染堅固我愛根深難拔今生幸托本具般若內熏為因外藉善知識引發為緣自知本有發心趣向志願了脫生死要把無量劫來生死根株一時頓拔豈是細事若非大力量人赤身擔荷單刀直入者誠難之難古人道如一人與萬人敵非虗語也大約末法修行人多得真實受用者少費力者多得力者少此何以故蓋因不得直捷下手處只在從前聞見知解言語上以識情摶量遏捺妄想光影門頭做工夫先將古人𢆯言妙語蘊在胸中當作實法把作自己知見殊不知此中一點用不著此正謂依他作解塞自悟門如今做工夫先要剗去知解的的只在一念上做諦信自心本來乾乾淨淨寸絲不挂圓圓明明充滿法界本無身心世界亦無妄想情慮即此一念本自無生現前種種境界都是幻妄不實唯是真心中所現影子如此勘破就於妄念起滅處一定看他起向何處起滅向何處滅如此著力一拶任他何等妄念一拶粉碎當下冰消瓦解切不可隨他流轉亦不可相續永嘉謂要斷相續心者此也蓋虗妄浮心本無根緒切不可當作實事橫在胸中起時便咄一咄便消切不可遏捺則隨他使作如水上葫蘆只要把身心世界撇向一邊單單的的提此一念如橫空寶劍任他是佛是魔一齊斬絶如斬亂絲赤力力挨拶將去所謂直心正念真如正念者無念也能觀無念可謂向佛智矣修行最初發心要諦信唯心法門佛説三界唯心萬法唯識多少佛法只是解説得此八個字分明使人人信得及大段聖凡二途只是唯自心中迷悟兩路一切善惡因果除此心外無片事可得蓋吾人妙性天然本不屬悟又何可迷如今説迷只是不了自心本無一物不達身心世界本空被他障礙故説為迷一向專以妄想生滅心當以為真故於六塵境緣種種幻化認以為實如今發心趣向乃返流向上一著全要將從前知解盡情脫去一點知見巧法用不著只是將自己現前身心世界一眼看透全是自心中所現浮光幻影如鏡中像如水中月觀一切音聲如風過樹觀一切境界似雲浮空都是變幻不實的事不獨從外如此即自心妄想情慮一切愛根種子習氣煩惱都是虗浮幻化不實的如此深觀凡一念起決定就要勘他箇下落切不可輕易放過亦不可被他瞞昧如此做工夫稍近真切除此之外別扯𢆯妙知見巧法來逗湊全沒交涉就是説做工夫也是不得已譬如用兵兵者不祥之器不得已而用之古人説參禪提話頭都是不得已公案雖多唯獨念佛審實的話頭塵勞中極易得力雖是易得力不過如敲門瓦子一般終是要拋却只是少不得用一番如今用此做工夫須要信得及靠得定咬得住決不可猶豫不得今日如此明日又如彼又恐不得悟又嫌不𢆯妙者些思算都是障礙先要説破臨時不生疑慮至若工夫做得力處外境不入唯有心內煩惱無狀橫起或欲念橫發或心生煩悶或起種種障礙以致心疲力倦無可奈何此乃八識中含藏無量劫來習氣種子今日被工夫逼急都現出來此處最要分曉先要識得破透得過決不可被他籠決不可隨他調弄決不可當作實事但只抖擻精神奮發勇猛提起本參話頭就在此等念頭起處一直捱追將去我者裏元無此事問渠向何處來畢竟是甚麼決定要見箇下落如此一拶將去只教神鬼皆泣滅迹潛蹤務要趕盡殺絶不留寸絲如此著力自然得見好消息若一念拶得破則一切妄念一時脫謝如空華影落陽𦦨波澄過此一番便得無量輕安無量自在此乃初心得力處不為𢆯妙及乎輕安自在又不可生歡喜心若生歡喜心則歡喜魔附心又多一種障矣至若藏識中習氣愛根種子堅固深潛話頭用力不得處觀心照不及處自己下手不得須禮佛誦經懺悔又要密持呪心仗佛密印以消除之以諸密呪皆佛之金剛心印吾人用之如執金剛寶杵摧碎一切物物遇如微塵從上佛祖心印祕訣皆不出此故曰十方如來持此呪心得成無上正等正覺然佛則明言祖師門下恐落常情故祕而不言非不用也此須日有定課久久純熟得力甚多但不可希求神應耳凡修行人有先悟後修者有先修後悟者然悟有解證之不同若依佛祖言教明心者解悟也多落知見於一切境緣多不得力以心境角立不得混融觸途成滯多作障礙此名相似般若非真參也若證悟者從自己心中朴實做將去逼拶到水窮山盡處忽然一念頓歇徹了自心如十字街頭見親爺一般更無可疑如人飲水冷暖自知亦不能吐露向人此乃真參實悟然後即以悟處融會心境淨除現業流識妄想情慮皆鎔成一味真心此證悟也此之證悟亦有深淺不同若從根本上做工夫打破八識窠臼頓翻無明窟穴一超直入更無剩法此乃上上利根所證者深其餘漸修所證者淺最怕得少為足切忌墮在光影門頭何者以八識根本未破縱有作為皆是識神邊事若以此為真大似認賊為子古人云學道之人不識真只為從前認識神無量劫來生死本癡人認作本來人於此一關最要透過所言頓悟漸修者乃先悟已徹但有習氣未能頓淨就於一切境緣上以所悟之理起觀照之力歷境驗心融得一分境界證得一分法身消得一分妄想顯得一分本智是又全在綿密工夫於境界上做出更為得力凡利根信心勇猛的人修行肯做工夫事障易除理障難遣此中病痛略舉一二第一不得貪求𢆯妙以此事本來平平貼貼實實落落一味平常更無𢆯妙所以古人道悟了還同未悟時依然只是舊時人不是舊時行履處更無𢆯妙工夫若到自然平實蓋由吾人知解習氣未淨內熏般若般若為習氣所熏起諸幻化多生巧見綿著其心將謂𢆯妙深入不捨此正識神影明分別妄見之根亦名見刺比前粗浮妄想不同斯乃微細流注生滅亦名智障正是礙正知見者若人認以為真則起種種狂見最在所忌其次不得將心待悟以吾人妙圓真心本來絶待向因妄想凝結心境根塵對待角立故起惑造業今修行人但只一念放下身心世界單單提此一念向前切莫管他悟與不悟只管念念步步做將去若工夫到處自然得見本來面目何須早計若將心待悟即此待心便是生死根株待至窮劫亦不能悟以不了絶待真心將謂別有故耳若待心不除易生疲厭多成退墮譬如尋物不見便起休歇想耳其次不得希求妙果蓋衆生生死妄心元是如來果體今在迷中將諸佛神通妙用變作妄想情慮分別知見將真淨法身變作生死業質將清淨妙土變作六塵境界如今做工夫若一念頓悟自心則如大冶紅罏陶鎔萬象即此身心世界元是如來果體即此妄想情慮元是神通妙用換名不換體也永嘉云無明實性即佛性幻化空身即法身若能悟此法門則取捨情忘欣厭心歇步步華藏淨土心心彌勒下生若安心先求妙果即希求之心便是生死根本礙正知見轉求轉遠求之力疲則生厭倦矣其次不可自生疑慮凡做工夫一向放下身心屏絶見聞知覺脫去故步望前眇冥無安身立命處進無新證退失故居若前後籌慮則生疑心起無量思算較計得失或別生臆見動發邪思礙正知見此須勘破則決定直入無復顯慮大槩工夫做到做不得正是得力處更加精采則不退屈不然則墮憂愁魔矣其次不得生恐怖心謂工夫念力急切逼拶妄想一念頓歇忽然身心脫空便見大地無寸土深至無極則生大恐怖於此若不勘破則不敢向前或以此豁達空當作勝妙若認此空則起大邪見撥無因果此中最險其次決定信自心是佛然佛無別佛唯心即是以佛真法身猶若虗空若達妄元虗則本有法身自現光明寂照圓滿周遍無欠無餘更莫將心向外馳求若捨此心別求則心中變起種種無量夢想境界此正識神變現切不可作奇特想也然吾清淨心中本無一物更無一念凡起心動念即乖法體今之做工夫人總不知自心妄想元是虗妄將此妄想誤為真實專只與作對頭如小兒戲燈影相似轉戲轉沒交涉弄久則自生怕怖又有一等怕妄想的恨不得一把捉了拋向一邊此如捕風捉影終日與之打交滾費盡力氣再無一念休歇時纏綿日久信心日疲只説參禪無靈驗便生毀謗之心或生怕怖之心或生退墮之心此乃初心之通病也此無他蓋由不達常住真心不生滅性只將妄想認性實法耳者裏切須透過若要透得此關自有向上一路只須離心意識參離妄想境界求但有一念起處不管是善是惡當下撇過切莫與之作對諦信自心中本無此事但將本參話頭著力提起如金剛寶劍魔佛皆揮此處最要大勇猛力大精進力大忍力決不得思前算後決不得怯弱但得直心正念挺身向前自然巍巍堂堂不被此等妄想纏繞如脫鞲之鷹二六時中於一切境緣自然不干絆自然得大輕安得大自在此乃初心第一步工夫得力處也已上數則大似畫蛇添足乃一期方便語耳本非究竟亦非實法蓋在路途邊出門一步恐落差別岐徑枉費心力虗喪光陰必須要真正一門超出妙莊嚴路所謂行步平正其疾如風其所行履可以日劫相倍矣要之佛祖向上一路不涉程途其在初心方便也須從者裏透過始得示無生祿禪人乙未夏日在圜中説古人最初發心真正為生死大事決志出離故割愛辭親參師訪友歷盡艱辛心心念念只為己躬下事未明憂悲痛切如喪考妣若一見知識如嬰兒得母儻得一言半句開導心地如病得藥若一念相當胸中了悟如貧得寶拌身捨命陸沈賤役未嘗憚勞若二祖之安心斷臂六祖之墜腰負石百丈之執勞楊岐之供衆凡名載傳燈光照千古者無不從刻苦中來乃至過去諸佛求無上菩提捨身命如微塵數無一類而不受身無一身而不苦行百劫修因故感天上人間無量供養乃至末法兒孫猶受用白毫光中一分功德不盡豈有天生彌勒自然釋迦者哉痛念末法去聖時遙法門典刑已至掃地吾輩出家兒不知竟為何事生來祇知懼飢寒圖飽暖一入空門因循俗習遊談終日捧腹縱情徒騁六根備造衆惡不耕而美食不蠶而好友虗消信施唐喪光陰竟不知生從何來死從何去豈復知因果難逃罪福無爽一朝大限臨頭如石投水三途劇苦一報五千再得出頭知更何日興言及此痛可悲酸目擊時流滔滔皆是望吾人之修者如披沙揀金非曰絶無蓋亦鮮矣嗟乎三界牢獄四生桎梏大火所燒生死險宅何由能溼猛𦦨離衆苦至無畏處耶非丈夫兒具靈根含夙骨者不能奮發猛勇一超直入汝等幸爾生逢佛法形寓袈裟早值明師六根完具若不痛念無常深思大事思地獄苦發菩提心改往修來晝夜精勤早求出離因循度日縱放身心大限到頭悔之何及嗟乎行矣其無忘我臨岐叮嚀之言以負吾自負也將之雷陽舟中示奇侍者佛祖教人於生死中頓證無生法忍且每怪其於無生中妄見生滅此語如對市人説夢事聞者非不明目張膽但未證真耳要之所説非所聞所聞非所見也古人貴實證者直欲於生死法中親切勘破而已非別有奇特處也嘗見小兒怕鬼者每於夜中行恍然一物隨之大生驚怖雖慈母善諭本無亦未之信必待其自信不疑而後止苟自至不疑之地縱假鬼怖之將一笑而釋矣余昔遊塞上同健兒乘馬夜行道傍一石馬忽見而大驚幾墮地爾乃頓轡奮力鞭䇿繞石周行數十匝仍引熟視良久方縱逸而去馬自是遇物皆不驚余因是知道人遊生死險道歷境驗心必如是而後已是故華嚴以善財表證其所歷百城參多知識至於刀山火聚亦遲回待勸而後入及入之果得清涼大解脫門此其䇿馬繞石令其熟視之謂耶由是觀之佛祖殊無他長蓋能熟視世間相者耳世人所驚怖者非生死禍患乎佛祖乃欲令人於中證無生忍且又明言於無生中妄見生滅噫此果何謂哉苟非熟視自到不疑之地吾意雖慈尊善諭殆亦難免驚怖也余比以宏法罹難上干聖怒如白日雷霆聞者掩耳自被逮以至出離二百餘日備歷苦事不可言從始至終自視一念歡喜心竟未減於平昔觀者莫不驚異為非常然而生死禍患他人故為余驚矣及視余不減歡喜心乃又驚余不驚其所驚而人驚其所不驚是或有道焉奇侍者不遠三千里赴難問余於幽獄已而荷蒙聖恩貶竄嶺南奇乃伴行舟中遂書此為別嗟乎生死險道正在所驚其無聞我歡喜心如夢事耶異時驗子於寂滅場中無以今日之言為夢語示無隱桂禪人明桂西蜀李氏子年十七出家參伏牛法光和尚禮清涼感文殊光相燒一指供養如京謁遍融禪師從古梅座主聽講復從大方宗師請益機緣訪余於東海海印道場受金剛寶戒余觀其骨氣孤硬可為法門標幟第以名言厚習不能洞發性真初聞余言猶河漢而無極也因字之曰無隱每為曲唱傍通方便調伏者期年一日聞唯心宗旨恍然自信遂誓歸依三閲寒暑相從於患難又期年丙申十月來五羊依棲於壘壁者數月余方觀稜伽擬令入室冀入第一義心忽有歸省之思余以為忠於法門孝於師親其志一也因示之曰惟佛性之在纏如神光之在目雖明暗去來而照禮獨立以障翳厚薄故智用淺深是故從上佛祖必經多劫事多知識入多法門然後得見性真所以然者如人被縛自不能解必假手於他至若釋然解脫自在縱橫受用處又非解者所可與也即稱上根利智有能一念頓悟自心不從人得者未必不由積纍辛苦中來如萬里還家入門一步慶快平生回視向之跋涉艱難間關險阻依稀倣佛如夢中事然且大通十劫猶不現前身子發心中道退沮在聖尚爾況其他乎是知信向此段大事因緣能操久遠之志持畢竟之懷者從古為難得歷觀前修拌捨身命親師擇友動則三二十年乃至盡形畢壽不以窮達改心易慮以極願力所持窮劫而不化千載如一日者所以光明廣大一發則為人天師表非苟然也禪人以夙習般若聞熏之力不忘所先今幸為佛子歷事法門殷勤若是苟能執金剛心盡此形壽乃至周遍恆沙以極究竟菩提不退初心將布法雲於火宅圓智種於覺園未必不以今日為因地也子行矣即歸峨嵋親見普賢儻問諸變化人報言瘴海炎方不減白銀世界無恙無恙促小師大義歸家山侍養余少讀史竊慕程嬰公孫杵臼之為人念曰持此心為人臣子者可謂不忝所生矣及長出家乃曰吾佛為三界法王四生慈父苟能持二子之心為弟子者可謂不負己靈矣及讀傳燈諸祖機緣見神光之斷臂船子之覆舟百丈之於馬祖楊岐之於慈明歎曰苟忘身為法若諸老之為心者何患祖道之不昌法門之不振乎嗟夫丈夫處世既不能盡命竭力以事人主榮名顯親即當為法王忠臣慈父孝子易地皆然又何屑屑以事齷齪乎故豫自知有向上事以來此心翩翩負超世之思即處樊籠遊廛市未嘗不置身冰雪千巖萬壑中也隆慶初豫居龍河講肆識妙峰師於稠人中覩其貌悴骨剛知為法器雖未語而心許之矣萬歷癸亥余北遊上都適遇於長安市共坐龍華樹下一語而決生死乃結伴同參共遊方外過河中山陰檀越延之道院數月是時宗尚童年為沙彌明年余同妙師入清涼置身萬年冰雪中嚴寒徹骨幾死者數矣時豫幸有自信之地越丁丑山陰檀越以書抵清涼屬宗從事法門因著入槽廠宗躍然負米採薪履水踏雪百務惟先日夜無隙衆皆推其精勤然殊無短長越辛巳冬奉慈旨求皇儲薦先帝建大會於臺山日集萬指宗獨任點茶湯晝則周旋不失一人夜則以餘力課誦余始心知其力能荷負第未察其信根耳明年壬午春臺山會罷余與妙師訣師曰某即不能荷錫相從奈何吊影長途乎乃目宗謂此子可代執役因命宗曰古人從師為法誓死為期爾其盡形竭力儻中道志沮當此生不面爾其志之明發即理䇿東西余同龍華老人養痾於大行之障石巖宗隻身以從百務惟勤凡操食時必侍立輟餐而後已察意之可否以為憂喜豫飽亦飽豫偶不欲食則涕泗交亦終日不餐也余每每私察久之如一日因謂龍華老人此子天性純孝人也子夏問孝孔子曰色難其是之謂乎明年癸未余即東蹈海上藏修於牢山深處人迹所不能至神鬼之鄉也余因入那羅窟而居之披荊榛臥草莾犯風濤涉險阻艱難辛苦不可殫述人不堪其憂而宗實甘心焉余亦將謂老死丘壑無復人世矣居三年丙戌蒙聖天子詔為慈聖聖母頒大藏經布天下名山及二牢焉余乃喟然歎曰因緣障道往哲痛心福始禍先前修明誡意欲避之宗與同伴安桂二侍者進曰師即無意人世豈不上念聖心所以隆重法門為斯民之福利乎余乃翻然念曰惟我聖天子仁孝聖母慈恩以法為社稷蒼生福某敢不竭躬盡瘁以敷揚法化上報聖恩法王忠臣慈父孝子實豫所圖第此海嶠遐陬故稱蔑戾苟不等心死誓何以轉魔界而成佛土爾輩試揣其衷果能以法為心畢命從事則止之否則去之無使異日作世諦流布昧人天眼目也安等唯唯進曰師唯何人此惟何事願師安意以道自任為法忘情我輩敢不視師為行止余於是拜受慈命尅意建立經營事務無論巨細一切委宗而以安桂二人為知事豫但總其綱要耳上賴聖慈寵靈不三年叢林告成法道聿興四方衲子日益至時則東海洋洋佛國之風焉天人冥會轉化之機蓋亦神且速矣山門供衆法物畢備秋毫皆出宗心建立規模居然不減在昔觀者以為天降地湧將為東鄙法幢盛世永永福田也豎立未幾狂魔競作己丑歲即遭侵撓余所經涉無論污辱即祁寒溽暑奔走於風塵道路冒生死之際者不可指陳而此心一念孤光未嘗少易宗輩之志愈益堅三年如一日也或謂余曰古人言到處家山以師高致道眼視此不啻輕塵聚沫奈何惓惓於此余曰嘗聞世之君子以身殉國則死國以身殉法則死法今蒙慈恩以法見托而且表揚聖孝其事雖異其命實均避難不義棄命不忠不義不忠何以為法假而以此即有封疆尺寸之寄苟臨難而去之又何以自處寧效死而弗去不為苟生以失經或者唯唯頃亦魔風頓息矣又四年乙未春二月釁從中起以魔事為借資致聖天子震怒詔下金吾逮及者衆是時安已先去宗與桂共嬰此難余則以一死肩之荷蒙聖恩詔遣雷陽於是冬十月出長安與宗別余觀往事如夢遊亦未嘗一語及世諦常情也宗送余河梁余乃謂之曰丈夫處世固不戀戀為兒女態況吾釋子學出情法者乎第爾從老人幾二十年矣老人固未嘗以一語佛法纍汝不知汝於何處見老人乎宗稽首曰宗自事師以來自知愚鈍不敢外求上不見有佛祖下不見有禪道唯知作務供衆生於動靜間忙疾病禍患死生之際止此一念直觀師心而已是故師生則生師死則死余曰我心無相汝作麼觀宗曰師心若有相弟子則無今日也余乃大笑而別獨擕善侍者而南明春三月抵雷陽頻歲飢荒瘴癘大作余坐尸陀林中毒氣炎蒸交攻而至殆者亦數矣秋八月奉檄來五羊昔之在門者亦接踵而至余見則詬罵曰爾等各有出生死路腳跟誰無一尺土見我何為皆痛斥而去頃之宗亦自蒲中萬里相尋躬事㸑煮無間在昔省會亦遭疫癘骸骼蔽野余命宗率人親撿埋葬不下萬餘作津濟道場以拔之會罷促宗歸曰爾何戀戀於此耶余生平志在忘生以學出情法者今雖荷戈行伍何莫非佛事萬里比鄰太虗咫尺以法界海慧觀之了無去來生死之迹又何嗟嗟作夢中顛倒耶但冀爾識心達本以金剛𦦨爍破歷劫情塵務使愛根習氣緣影蕩盡毫無自欺如此可謂不負佛恩不辜本有方是老人不負汝處也否則抱佛而眠猶不免為魔伴況復守此幻身而增空華障翳究竟何為且爾父母師長今皆老矣若棄彼取此亦為法中之愚也豈正信哉爾其行矣幸為謝諸故人生當重相逢死則長別離異日常寂光中回視今日猶作夢中事也爾其識之無忘所囑丁酉仲春二十五日書於壘壁之旅泊齊示洞聞乘禪人洞聞法乘夙負上根初脫塵緣遇水潦鶴頃覺其非遂棄去入天目山與性融首座輩結庵居之切磋己躬下事堅忍數載復參達觀禪師親近有日以厭喧求寂之念未忘遂辭去隱於羅溪茲特謁老人於瘴鄉求心地法門老人遵梵網經為授金剛寶戒乘五體投地如泰山崩為法之勤一至於此老人以久飲瘴煙四大違損乃閉關却迹習靜以休乘亦禮拜歸山請授戒法因示之曰三世諸佛歷代祖師與一切衆生鱗介羽毛乃至地獄三途以極空散銷沈靡不眉毛廝結不隔纖毫其所同者金剛心地所異者情想愛憎耳由佛祖善用其心故轉穢成淨土化刀山為寶林即劇苦辛酸皆為極樂真境此無他術蓋於此心中情想不生愛憎無寄譬如淨目徹見晴空又何顛倒幻華自生起滅哉衆生返此無怪乎種種顛倒自取其咎耳佛祖憐愍此輩特特出世一番並無剩法與人不過直指此心令一切衆生當下知歸故毗盧老子初坐菩提場亦不過宣明過去十方三世諸佛此戒法耳千華臺上葉葉釋迦亦不過稟明諸佛此心宣傳此戒法即四十九年搖唇鼓舌波波挈挈為人委曲周旋者亦不過普令衆生信受此戒法及至末後拈花天人瞪目而不知者亦只迷此心戒耳金色頭陀破顏微笑乃至二十八傳遞代授手達磨西來神光立雪無言無説蓋亦分明直指此心戒耳展轉六傳至老盧俗漢子柴擔下聞金剛經云應無所住而生其心蓋乃頓悟此戒不從人得不因師授性自具足者也又更有何奇特哉及至黃梅印正即解道本來無一物何處惹塵埃因此黃梅老人亦不奈伊何只得無語歸方丈即三更密付大似烏豆換人眼睛豈此外更有奇特哉從此兒孫滿目遍滿寰中得之者死失之者生千七百人鼓簧播弄亦不過遞相發明此心地法門豈此心外別求妙悟耶若離此外別求即墮外道邪徑故梵網經云盧舍那佛心地初發心中所誦一名戒光明金剛寶戒是一切佛本源一切菩薩本源佛性種子一切衆生皆有佛性一切意識色心是情是心皆入佛性戒中又云衆生受佛戒即入諸佛位位同大覺已真是諸佛子故五十五位進修未見佛性皆墮塗程及至末後等覺位中乃云是人始獲金剛心中初乾慧地到此直入佛性海中由是觀之從凡入聖成佛作祖之要捨此金剛心外豈復更有剩法耶是知此戒不易悟悟則名為住位不易行行則名為行位不易通通則名為向位不易淨淨則名為登地位不易忘忘則名為人佛位矣法乘今日誠當自揣以何心為出家以何心為參師訪友以何心為樂求佛法以何心而願受此戒苟得其心則三世諸佛歷代祖師普及一切衆生一齊向老人一毛端頭放光動地則汝二六時中與諸聖凡眉毛廝結也此則是名真持戒者否則險險則墮參參參洞聞初禮鐵嘴蘭風為師此云水潦鶴者指蘭風也示優婆塞結念佛社惟吾佛住世説法利生四衆人等各皆得度隨機教化各有方便普令獲益譬若時雨三草二木無不蒙潤隨分充足各得生長是故法有千差源無二致然以佛性而觀衆生則無一生而不可度以自心而觀佛性則無一人而不可修但衆生自迷而不知又無真正善知識開導故甘墮沈淪枉受辛苦耳所以盧祖初至黃梅問何處人答曰嶺南人黃梅道獦獠亦有佛性耶祖曰人有南北佛性豈有二耶自此一語如雷驚羣蟄流布人間知之者希悟之者鮮是則嶺南為禪道佛法之源頭爰自盧祖演化道被中原而門庭之前竟埋荒草寥寥幾千載矣談者皆謂非善根地是不達佛性之旨耳余蒙恩遣雷陽以丙申春至秋來五羊壘壁間注稜伽經完戊戌夏即為諸來弟子演説每一座中見諸善男子輩亹亹而來余深嘉之未幾有善士十餘人作禮願乞教授優婆塞五戒法余欣然應請即為羯磨自是歸心日誠聽法彌篤余哀其未悟愍其不達進修自度工夫因授以念佛三昧教以專心淨業痛厭苦緣歸向極樂月會以期立有規制以三時稱名禮誦懺悔為行欲令信心日誠罪障日消必以往生為願果能此道雖在塵勞可謂生不虗生死不浪死豈非真實功行哉然佛者覺也即衆生之佛性以迷之而為衆生悟之即名為佛今所念之佛即自性彌陀所求淨土即唯心極樂諸人苟能念念不忘心心彌陀出現步步極樂家鄉又何必遠企於十萬億國之外別有淨土可歸耶所以道心淨則土亦淨心穢則土亦穢是則一念惡心起刀林劍樹樅然一念善心生寶地華池宛爾天堂地獄又豈外於此心哉諸善男子各諦思惟應當痛念生死事大無常迅速一失人身萬劫難復日月如流時不可待儻負此緣當面錯過大限臨頭悔之何及各宜努力珍重珍重示真遇禪人禪人真遇生長盧陵棄妻子出家樂遠離行志向名山參訪知識幻人以幻業遷訛至嶺海禪人因得來參頃辭往普陀禮達觀師授以毗舍浮佛偈復持來五羊幻人於幻化場中作如幻佛事開諸幻衆説如幻法門禪人作禮請益幻人乃依如幻三昧為説一切諸法皆如幻夢境界而開示之曰善哉佛子當善思惟一切諸佛依幻力而示現一切菩薩依幻力而修持一切二乘依幻力而趣寂一切外道依幻力而昏迷一切衆生依幻力而生死若夫天宮淨土依幻力而建立瓊林寶樹依幻力而敷榮鐵牀銅柱依幻力而施設鑊湯罏炭依幻力而沸騰鱗甲羽毛依幻力而飛潛蠢蠕蛸翹依幻力而動息以極三世諸佛之所證六代祖師之所傳總不出此幻網三昧禪人安得而逃之耶汝試諦思何因而落生死何因而入母胎何因而汩沒愛纏何因而願出沈淪何因而發足超方何因而參訪知識何因而履名山登福地穿叢林入保社今年而南海明年而五臺後年而峩眉汝將遍歷寰中縱經塵劫窮盡十方微塵國土承事十方諸大知識總皆不出幻化門頭非究竟真實處也然雖如是喚作迷頭認影不訪就路還家苟能一步踏斷幻結則無邊幻網一時頓裂無涯幻海一時頓枯無量幻業一時頓消無邊幻行一時頓得無量幻生一時頓度此則是名以幻修幻所謂衆生幻心還依幻滅者也其或未然則縱經三生六十劫以文殊為父觀音為母普賢為師而欲恃此親因以求出生死事遠之遠矣汝諦思惟其無謂我為幻化人非真實語也參參示優婆塞易真潭佛性善根如草種在地但有土處莫不有之若遇時雨靡不發生第雨有早晚故生有遲速耳人人皆有善根種子若遇大善知識開導如時雨降則勃然生芽抽條長幹開花結實鮮不成就所謂有情來下種因地果還生未有無因而招果者此從上佛祖教化門頭貴在觀根逗機善為開導使其自性成熟非有別法以誇誕衆生也善土易真潭生在邊地長於塵勞汩汩口體不暇安有留心出世切念生死事大乎自非夙種善根深厚油然於中而不容己者何乃遇緣即發不待教而能若是耳余初貶雷陽未度嶺時談者謂邊俗好鬼而噉血食絶無善人且據佛言邊地下賤篾戾車種以為六難以其斷絶佛種破滅善根不聞三寶名字故余以為實然頃過電白見潭攜善士數輩頭面作禮余甚異之及過苦藤嶺誅茅茨施茶結緣蓋潭創為佛事集衆信而為之者此則不因開導而自為之豈非善根純熟時節因緣已至有不能自止觸事而現遇緣而成者耶由是觀之佛性未必盡善魔性未必盡惡隨其所習故有異耳佛説邊地惡種蓋言其重者欲人生正信生中國聞正法故也余見潭純誠篤信創建善緣足見佛法廣大不難行於邊地乃作疏命潭與二三善友同心一力果期年而功成三年而化行即今海外路人皆作佛事將轉魔界而成佛界未必不從此一人一事倡始也一陰以至堅冰一陽而炎赫日造化之機如此道化之機亦然佛言無佛法處建立三寶非菩薩人不能克成梵語菩薩此云大心衆生潭豈非大心衆生耶若從此增進信心不退善根轉深勇猛精進頓悟本心即永斷生死一超直入菩提彼岸未必不從今日出門一步為初地也但辦肯心決不相賺勉之示本淨貴禪人禪人寶貴以守護佛法為心初書金字法華諸經募造旃檀釋迦彌陀二聖像成居端州之鼎湖時往來五羊稽首請益豫示之曰吾佛有言諸法從緣生諸法從緣滅是知一切諸法緣會而生緣會而生則未生無有未生無有則雖有而性常自空性空則諸法本無自性矣故曰知法常無性佛種從緣起能達緣起無性者則為成佛真種矣善哉佛子汝之所書諸經者法也所造旃檀如來者佛也以汝之信力為因托諸所化為緣是則佛從緣起而法亦從緣起於法性中法即佛而佛即法也第不審果了此法性空乎性不空乎若言其性空則現見佛之相好莊嚴畢竟光明熾盛赩如寶山而華嚴八十一卷靈文三十九品之次第五周因果之行布四十二位之森嚴不欠一字法華之三周授記懺法之諸佛洪名不少一人燦然滿目煥乎全彰謂之性空無物可乎若言其性不空方其緣之聚也則紙自紙墨自墨金自金而香自香如是紙墨皆為世諦流布如是金香皆為惡業莊嚴如是佛法之名又何從而有耶求其本無則性自空矣方其今之緣聚也即以世諦之金香而為佛即以世諦之紙墨而為經然紙墨之相不異當時體不增於昔日而佛法之名既彰則敬慢之心懸隔其助成之人雖不改於故武而善惡之機天淵矣由是觀之則一切諸法本無自性從緣會而生者明矣斯則能達此佛此法本無自性則為成佛真種矣而汝所作種種諸勝緣不審達無性而作耶不達無性而作耶由作而後得無性耶若達無性而作則佛法在己而不在物若不達無性而作則佛法在物而不在己若由作而後達無性者則己與物皆無性矣達己無性則無能作之人達法無性則無所作之法人法雙空是非齊泯則己與物皆無迹矣又從何而分別耶如是則功德不可思議菩提亦不可思議佛子如是而知則為真知如是而作則為妙行否則以思惟心而作難思之佛事譬如手把螢火而燒須彌祇益自勞又何從而究竟耶善哉佛子諦觀法王法法王法如是應如是作應如是持可謂善超諸有矣示法錦禪人法錦自言性多瞋習老人因以方便調伏而示之以忍辱法門更為開導之曰永嘉大師有言我師得見然燈佛多劫曾為忍辱仙是知忍之一行為成佛之第一妙行也故我師釋迦老子生生世世為提婆達多之所謗害至於今生出世種種破法無所不至甚而殺害其命者非一及法華會上為其授記作佛且曰我之三十二相八十種好勝妙功德皆由提婆達多善知識故之所成就豈非以忍之一行為成佛之要行耶又云昔我於歌利王割截身體我於爾時無我相無人相無衆生相無壽者相若有我相人相衆生相壽者相然燈佛即不與我授記由是觀之一切衆生生死苦具皆以有我而成無上菩提福慧莊嚴皆以無我而至以我與物敵故是非生是非生則愛憎立愛憎立則喜怒滋自性濁而心地昏心地昏則諸惡長諸惡長則衆苦集衆苦集而生死長矣是皆從我之所致甚矣我之為害譬如嚴城堅兵豈易破哉老氏有言曰柔勝剛弱勝強此蓋忍行之初地也衆生恃其我見堅牢難破所以一言之逆不能受一事之違不能安一飢一寒之不能耐一念之欲不能淨斯皆不知忍之之方徒增我見之執耳所以佛教諸弟子修和合行又曰苦法忍苦法智又曰無生法忍八地乃得是知從生法忍忍至無生則妙行圓佛果成矣忍之一行豈淺淺哉故曰凡有所作皆當忍之是則舉心動念處以忍試之舉足動步處以忍先之折旋動容處以忍持之喜怒哀樂處以忍驗之如斯則心有不敢妄動身有不敢妄作事有不敢妄為情有不敢妄發故老氏曰不敢為天下先不敢即忍之異名由不敢為天下先故忍為成佛第一行如此則忍大而我小故忍能衣被於我亦能衣被於物自利利他之德無出此者故曰柔和忍辱衣謂是故也禪人求法語故余題之曰忍辱為衣禪人勉而行之其無以為口頭話且又無以此博飯具也
