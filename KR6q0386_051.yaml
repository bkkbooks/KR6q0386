body:
  text: 菩薩戒弟子僧本昂馮昌歷僧知融日録宰官弟子王安舜劉起相纂輯長春社弟子陳迪祥梁四相同較曹溪中興録下為靈通侍者戒酒文有引憨山道者著余初至曹溪懷瓣香敬謁六祖大師見主塔僧每月朔望之次以酒供奉靈通侍者詰其所因僧曰侍者乃西域波斯國人乘海舶至廣州聞六祖大師因隨喜歸依願為侍者永充護法衛安曹溪道場但性嗜酒不能戒飲六祖大師許其偷飲以此妄傳愚盲不達遂為常規相習至今幾千年矣未有能為侍者洗其汙者末法弟子某荷蒙祖師攝受來整曹溪已經期年今於萬歷辛丑年臘月八日乃吾佛成道之辰特為合山衆僧普授戒法誠恐愚僧執迷不化乃為侍者洗白一心以謝衆口敬拈瓣香上稟祖命告侍者曰恭惟靈通勿問所從既充護法當合至公侍者當初聽祖說法本來無物如何不達既達本無五蘊何有豈有真空而好飲酒祖師教人飲甘露漿非以糟汁灌此枯腸我觀侍者不離祖師終日聽法豈可不知知之既真悟之已久寧有復迷自揚家醜我惟侍者決無此情愚僧不達認以為真大家昏迷日夜酣醉是以祖師豈不為纍我戒衆僧不許飲酒衆以侍者便為藉口衆僧壞法侍者為倡今日不止展轉虗妄嗟此末法叢林凋弊我願侍者蚤為之計若真護法請從此始侍者不飲誰敢啓齒我今稽首哀鳴祖師徹底掀翻破此愚癡打破疑團捽碎飲器齊證無生同登佛地今後供養三德六味侍者受用與祖無異以此護法功德無比內外清淨頓消塵滓靈源迸溢枯木回春山河大地共轉法輪謹告曹溪祖庭地脈形勢緣起說匡山逸叟憨山德清述曹溪祖庭道場始於梁智藥三藏從西天來至五羊入中國舟過溪口掬水飲之香美乃曰此西天水也源上必有勝地乃循水而上見象山歎曰此宛然西天寶林山也遂與居人曹叔良言曰此山乃聖道場一百七十年後當有聖人於此說法度人無量宜建梵剎以待之叔良白牧侯奏請武帝敕建寶林寺此開山之始也至唐元朔間六祖起新州得黃梅衣鉢回入寶林時寺已毀唯一尼僧名無盡者郡人也菴居於後六祖訪之尼看涅槃經乃問其字祖曰字即不識義當問之尼曰字尚不識安知義乎祖曰諸佛妙義非關文字即力開說尼知為異人即告父兄鄉里率衆重修其寺請祖居之九越月惡人尋逐祖受黃梅之囑遂逃去隱於懷會之間獵人隊中一十五年儀鳳間廣州法性寺因聞二僧風幡之辨祖曰非風非幡仁者心動時衆聞之驚異詰之乃知黃梅衣鉢所在遂請示大衆即剃髮於菩提樹下送歸曹溪寶林爰自梁天監丙午至唐高宗儀鳳元年丙子得一百七十年應智藥三藏云祖既說法於此三十餘年座下悟道者四十三人南嶽青原為上首於是道分兩派後出五宗是則傳燈所載禪宗一脈發於曹溪若孔門洙泗也祖晚年歸者日衆堂宇湫隘乃謁里人陳亞仙曰老僧欲就檀越乞一坐具地得否仙曰和尚坐具幾許闊祖出示之亞仙唯然祖以坐具一展盡曹溪四境四天王現身坐鎮四隅亞仙曰也知和尚法力廣大但吾高祖墳墓在此他日營建冀望存留餘願盡捨永為寶坊然此地乃生龍白象之來脈只可平天不可平地遂捨之竟成大法社焉此寺之大成也豫居常念禪門法道寥落思天下禪宗一脈出於曹溪今其道不彰必源頭壅塞宜疏𤀹之此久願也萬歷丙申豫以弘法罹難恩遣雷陽初謁六祖入曹溪觀其山川形勢宛若踞地之象牙足儼然初寶林寺包於左頷之內而祖殿正坐於象鼻豫細察之其當鼻中穿一後路截為兩斷又思象命在鼻必有數節見祖殿後低窪空闕北風大吹歎曰山脈已斷此法道所以凋零也時寺僧被流棍夥住屠沽作難道場幾不可保矣於是種種方便而調護之及庚子歲時本道祝公心切憐憫連請一整理之豫初入山即塞來龍之路擔土培祖殿後山一座疏卓錫泉引入香積廚繞於殿前衆得飲之乃請制臺令行本縣盡驅逐流棍由是道場一清此中興之最初一步也豫見寺之舊制雜亂參差不齊殊不可觀經畫為難且工程浩大力難頓整殿宇僧房扼塞不通日夜詳察思之乃因其勢列為三局以祖庭為正中主剎先開闢回廊門徑神路廓其胸次開真眉目其左局即古寶林寺也以方丈為主前法堂之下即當時諸祖悟道之禪堂及香積廚盡設為僧居豫買空地移僧房八主乃得其故址修堂宇以安作養本寺僧徒業已拮据八年於茲所費不資心力已竭而願猶未滿其大佛殿一區列位右局因見殿前坑窪填尚未平殿前正面為羅漢樓乃深陷丈餘樓前即虎沙塞胸猶是荒山中出山門一徑如車廂之陜隘殊無大體深思所以乃悟知為六祖晚年未竟之功也以正殿之基本是一潭詳其山形始為象之兩牙交合處其中渟滀一山之水故其最靈有龍居焉號為龍潭當鼻之右頷乃亞仙祖墓之前下沙今為祖殿之右臂也想六祖乞陳亞仙地時欲修殿乃先降其龍鑿斷合處似成一渠以放水出方填其潭以建大殿其殿方成而祖即入滅故殿前潭尚未及填平放水之道不及料理後人因其缺陷遂建樓於上而下即塑天王像其苟且狹陋全失大體此其山脈已鑿地又失形故千年以來細閲傳燈而曹溪未見出一人也由是觀之道脈豈不係地脈耶此豫所以日夜腐心而不能忘情於此也故先將兩局粗粗料理略有其次將重整右局其工力不減於六祖開創時也以從山門之後殿堂八座盡皆朽敗非仗神運之力安能為之耶先是戊申歲嶺西道馮文所公入山見其正殿將傾遂發心重修隨白制府戴公慨然樂助一時司道府縣上下共施千金先辦木料豫躬自經營方運木到山而魔氣即發遂阻其功豫即浩然長往矣今已十年於茲奈形骸已衰心願未滿將作來世公案耳但念佛法禪道自達磨西來衣鉢止於曹溪而道脈源流佛祖慧命乾坤正氣並如洙泗終古人心世道所關乃我震旦國中第一最上功德之事雖法有隆替世有代謝而大道一脈亘窮劫而常然不朽者此在象教所係山川之靈也此外更有何法為天地綱常哉此愚思報佛恩君恩未敢一息忘之也豫初心願代六祖了未竟之功第一重修正殿欲培全龍脈將殿前鑿斷之渠重築如故內留一池滀一山之水以聚其靈將羅漢樓改為大毗盧殿以為主剎樓前虎沙取用大開明堂修兩廊以安羅漢前立天王殿以完正局外山門從舊其鐘鼓樓原係古寶林寺者今在左局禪堂之前已不可動但於山門之外左右築兩高臺建鐘鼓於上以全一寺之規模其餘殿後大藏經閣諸所皆因其舊制而重新之法堂重修但正其向即此一圖以收三局為一寺其功不減於最初開創時也切念豫今老矣餘日無多況此何時安敢復萌此念乎第以天地大運揆之近見黃河已清聖人復出堯舜利見夔龍挺生三五之化將在今日仰仗聖明之覆育社稷之寵靈風雲際會豈無大心菩薩現應化身作大佛事者乎嗟豫老矣即填溝壑特特留此重見建規以待命世之真人即有作者照此規式乃不負區區初心以全山川之道脈是即六祖在現於世也九原之下切有望焉大師示曹溪僧衆法語示曹溪塔主佛言如來出世如優曇華蓋優曇華非已見今見當見甚言其希有耳故昔人每云見善知識如覩優曇華開善知識者暫時一見而不可得況日夜親近隨順者乎昔法華會上久滅度多寶如來在寶塔中全身不散如入禪定是時十方諸佛各各侍者並靈山會上願見多寶而不可得乃憑如來神力開寶塔戶忽使人天百萬一時得見而見者各各皆獲無生法忍乃至發無上菩提之心者不可計也今觀六祖大師雖久滅度而全身不散如入禪定我則謂之與多寶如來無異即大師未入滅時與今日無異彼是時也如永嘉一見即證無生強留一宿而不可得南嶽青原皆執侍十餘年所得種種三昧妙門不可思議故發揮佛祖光明如清暘升天只今道滿寰區如盛夏赫日蒙者無不抽條發幹敷華秀實而復散為金剛種子不可勝數斯皆一見善知識之功也曹溪塔主執侍大師朝夕盥漱茶湯粥食與現生無異晨昏鐘鼓音聲大師廣長舌相熾然說法未嘗暫歇執侍之儔朝夕目覩耳聞未嘗暫隱不審諸侍者還有如永嘉之證無生者乎有若南嶽青原之妙證者乎有則如優曇華一時出現無則如優曇華終不可見耳既曰善知識如優曇華則諸執侍者六時禮拜親近供養皆灌溉之功也噫靈根既在智種深埋苟灌溉功成因緣時至何慮曇華不一時出現老人在旅泊齊中書付曹溪塔主持之以為異日華開之驗示曹溪諸僧曹溪為天下禪宗道脈之源而山川之勝冠嶺表故叢林甲於諸方自大鑒禪師入滅青原南嶽二大老抽枝發幹普蔭人天一言半句揚眉瞬目之間得超生脫死者不可勝數自爾此山寂寥幾千年矣豈非枝大而批其本耶然其道雖曰無相而實寓有形與時升降固其理也遠求五宗之源其本無二建立之旨亦在隨宜自宋而元如高峰斷崖中峰諸大老皆力振家聲雷電之機不減叢林盛時明興以來其風浸微不敢望真履實證求其有志向上一路者蓋亦幾希然他方尚或有一二知此道者若曹溪為當家的骨兒孫獨不識袈裟為何物剃髮為何事豈獨人與道違即山川之勝叢林之茂亦無復當時矣況為惡魔所侵作難非一豈非其道與時升降而與山川共為休戚乎余於丙申春蒙恩遣雷陽道經曹溪口因得參謁六祖大師正值衆僧燒煮之餘鼎沸未消余為潸然者久之而去明年秋制臺大司馬陳公念曹溪禪門洙泗欲置余於其間為供灑掃余是時慚愧為法門玷懼辱祖庭以謝又明年觀察海門周公攝治南韶心與陳公合余堅讓不已但命執筆重纂其志周公以入賀去觀察惺存祝公蒞政公自號曹溪行腳僧下車不日盜弭訟息民享泰和曹溪山門百廢一時悉舉宛若大鑒重拈袈裟角耳向者不識不知之僧皆煥發佛性光明此豈非有情來下種因地果還生耶公久欲得區區為大鑒侍者冀將焚香洗鉢之勞以續破法之愆余慚愧者久之公以入賀去濵行令寺僧長老率諸大衆作禮公先以書抵復面叮嚀懇懇至再余感公此行不以官為得而喜得作曹溪主人是其幻化門頭現宰官身而作佛事者乎蓋亦世道交興故能令此山色溪聲挺露法身而吐廣長舌相也區區罪垢之軀不敢蹈寶華撾毒鼓聊書此以付來僧且為異日得度因緣作升堂入室之券時庚子三月既望示曹溪素林裕木菴泰兩監寺丙申春豫度嶺過曹溪禮六祖大師瞻仰道骨如生想當時踞華座萬指圍繞無異今則堂宇傾頽叢林凋弊寶林福地翻為狐兔之巢徘徊久之而去未幾外魔熾起僧徒遭難余心愍之因求當道宰官作大護法制府陳公屯鹽周公皆力振之魔風稍息而僧力已疲極矣時則寺僧有若素林裕木菴泰海月珊見傳識與中興為住持者象漢權之數人者皆誓捨身命力持祖業以保安衆僧日夜辛勤苦心周慮求為能與祖庭作一日依怙者志甚殷也由是衆等投誠歸依授戒即請豫入山聖恩有在未敢輕諾然身雖未入而心已如金剛矣萬歷己亥南韶祝觀察以荷曹溪為己任力命大衆禮請庚子冬始應命入山不三月而百廢具舉祛宿螙選僧徒設義學授戒法一時翻然成化乃為重闢規模大開祖道不五年而功成過半斯實祖靈默啓天龍冥護而裕輩一念血誠真不減包胥秦庭之哭真心實行所感召者自不可誣也余住茲已逾五年而奔走過半皆為經營之勞衆等事我如一日猶我視衆等如一子地耳頃蒙恩詔赦宥即身未披衣而心已解脫一時諸弟子等各各歡喜焚香作禮執卷乞語乃拈筆以示之曰諸佛衆生心無差別所言無差別之心即所謂金剛心地也且此一心諸佛證之而說法諸祖悟之而度生菩薩修之而成道聲聞取之為涅槃外道執之而謗法衆生迷之而造業三途昧之而受苦凡夫日用而不知吾人以之而應緣即爾輩為佛弟子為祖兒孫凡有施為莫不皆從此心流出但順佛祖之教為佛祖之事心心常住念念不壞即此以往歷劫不磨便為金剛心地為成佛作祖之正因種子若夫逆之背之雖身著袈裟心存業道即此以往便為苦趣苦因亦長劫不壞生死之苦果也故曰三界上下法唯是一心作順之即聖背之即凡豈虗語哉裕等數人同此心即合山千人亦同此心也若以此心用之於佛祖故如金剛則將來受用亦同金剛若夫用之於一身謀之為一己視區區糞壤而為樂地受用如苦蟲心心作業轉眼之間一息不來便入三途苦果無窮亦劫劫生生受用不盡此無他故但以不明此心是成佛作祖之真種子福田耳裕自從余授戒即願持誦金剛般若經誓盡形壽且此經乃吾六祖大師之心地也能持之不忘得之於己則將來歷劫受用無窮即此身心常住於曹溪故曰佛子住此地即是佛受用常在於其中經行及坐臥也汝等明見今日老人轉曹溪為淨土驅魔衆為法侶苟信此心之妙則汝等諸人出生死證菩提不出一念之頃其或未然依舊流浪三途沒溺苦海去也其念之哉示沙彌智融豫蒙恩南來諸護法延豫住曹溪初入山首以作養人才為急乃選諸沙彌延明師教以本業習威儀禮誦設禪堂以安居之律以清規衆如一指老人以業緣牽引不能安居時為說法更延大德闍黎以尸之又數年而規模造就山門改觀老人嘗謂佛法所貴聞熏成種嶺南久無佛法熏習以乏種子故信心難生每願教僧五十三人各書華嚴大經一部一以法緣廣大為最勝種子二以借書寫攝持之力資初心觀行以助入道資糧向以內魔所汩有願未成衆中沙彌智融者最先發心願書大經老人甚嘉其志開端書不半而司學沙彌一時發心書寫者今七人矣嗟乎人之根性豈可局量哉昔吾師釋迦牟尼往劫為凡夫時同千人聞五十三佛名一時發心修行後各次第成賢劫千佛吾師以願力勇猛故先於衆又為十六王子時聽法華經為一乘緣種於八方各得成佛況華嚴乃一乘圓頓法界無礙緣起之大經也所謂八難超十地之階一生圓曠劫之果以一字統法界之經一行攝無邊之海況點點畫畫心光流溢大用現前果當人不昧則不必更參機緣而觀行自足諸法門海不勞遠歷百城而坐參知識豈不為最上法緣乎若以所書之經具在目前終身讀誦受持何用別求佛法即六祖法化所流千七百員知識可一齊普現於毫端三昧矣汝當作如是觀無為俗習情塵障智眼也勉之勉之示曹溪俯無昂監寺鄧林之木雖多成材者寡滄海之産雖衆稱寶者希孔子曰才難不其然乎即吾佛說法四十九年但以十大弟子各稱第一而得正法眼藏者人天百萬獨迦葉契心古今傳道稱的骨兒孫者亦不易也我六祖大師說法曹溪座下不少千僧壇經載悟道者有四十三人而見稱者唯五六人大闡其道者獨南嶽青原二大老而已嶽師侍祖精勤日夜不離左右逾十九年與青原共命終祖之世故自有叢林以來凡善知識開堂說法務在得人單以二老之苦心為家範此得人之難而求其師表百世者亦更難也老人度嶺之初過曹溪謁六祖大師視其山門破壞幾至掃地一衆惶惶無所依怙所以願興叢林安大衆以存祖師一脈如線之緒者於千僧中得裕權識泰五人焉其所願老人為依怙者若嬰兒之望慈母其所以存叢林之志不減包胥之存楚而乞於余者不減秦庭之哭也於是老人哀其誠而來力任中興之責則蠧釐弊百務具舉選衆僧學禮誦法擇其中堪為童蒙表率而稱教授師者得三人焉既處之歲月察其心術之微操履之端言行相符以成後學繼前修念祖道保護叢林者唯昂監寺一人而已三人之中誰不曰比肩而趨操不一志行不齊衡石重輕之在人耳目者非一日如視黑白暸如也余目擊其操履如孔子觀人之法察之亦非一日故諸監寺之乞余言欣然即發獨此三卷藏之五年未敢輕諾非吝法也以古人授受之際不妄許可儻一失言不唯失人抑且失法眼矣知人之難聖哲所病所謂人心險於山川難於知天天猶有四時之序而人者深情厚貌外威儀而中蛇虎者不易知也語云疾風知徑草板蕩識忠臣若人人皆可稱忠孝則世之忠臣孝子蓋多多不足奇矣以其希故見其難以其難故為忠臣孝子者不易也余嘗謂宣孟稱得士而冒死立孤者獨程嬰杵臼二人楚國號多材而捐軀復楚者獨一申包胥嗟乎吾徒之為沙門釋子者骨肉肝腸皆佛祖之所化也生死升沉亦佛祖之所賴以轉也求其一心如古豪傑之所為者希以其自愛業身而造苦具不惜橫身捨命而甘心焉求其一念知非能體祖師之家業者難得其人矣是知家無賊子家不破國無賊臣國不亡人無惡行身不殞士無苦行名不揚善無橫逆道不高心無堅忍道不大是知善惡雖殊儻不負堅忍不拔之志不能成其善惡之實苟無善惡之實而其報應不舛者不足憑也語曰積善成名積惡殺身積水成海積土成嶽昂子知此不必患彼惡者之自積當患己躬下忠貞道業之不積耳孔子曰不患莫己知求為可知也藉六祖知子有此心亦只如老人之所告子者勉之耳更有何法則為墮增益語障示曹溪海月珊監寺余當丙申春二月過曹溪謁六祖大師見其香燈寥寥叢林凋敝徘徊久之有僧具威儀向前作禮問訊甚恭豫見其精誠端慤喜而謂曰此本色山僧也明年丁酉魔風競作此道場幾至破壞僧徒無依珊公與同儕數輩謁余於五羊請豫為授戒法余始知向作禮者為珊公也庚子冬豫應請入山公率諸弟子侍祖師塔察其供養之精誠宛若祖師在生無異余因歎曰祖庭千年不朽者所賴兒孫一點孝敬心耳故世尊曰孝名為戒即儒之孝為仁本此道根也及余住山中最初安居凡所經營固出衆心而任勞任怨珊公居多其憂勤惕厲小心敬慎端若孝子之於慈父憂喜疾痛靡不關之是知事祖之心不異事余故余屬之常住與衆等心一力忘身殉道即今日叢林再整法化重興固祖靈之默啓實珊等孝誠所感格也語曰苟非其人道不虗行嘗念余非祖師攝受不能至曹溪曹溪非余來不能有今日即非公等之孝敬無以繫余心而叢林中興之功德非純誠難以取究竟全始終總是一大事因緣實非偶然且幸修建祖庭工程苟完余於丙午八月二十日即蒙恩詔許為僧以此始末徵之足見余非無因而來公等亦非無因而生斯世遇斯事也想昔日當祖道大盛之時悟道弟子三十餘人公等為灑掃執侍人耳不然何以有緣見我親近哉昔世尊於大通智勝佛時為諸弟子說法華經畢竟至釋迦出世同出一會一一受記成佛以昔日之夙緣今日之現證則將來彌勒補處龍華會中豈少一人即堅持此心以光祖道為任護三寶為懷即一莖一葉滴水莖薪凡有益於叢林有補法道者即為金剛種子成佛真因使永劫瞻依十方攸賴即同祖法身常住矣可不勉哉寄示曹溪耆舊老人住祖庭一番持為發揚六祖出世一大事因緣欲令大家修出世因以種淨土之緣不料中道緣差魔風破壞獅蟲作祟使我不遂初心一旦違遠祖師棄捨大衆即今雖居寂寞之濵未嘗一念忘其本願其後學似有向上之志苦無明師良友引進修行之路其耆舊衆中有知老人之心及痛念生死大事者又無老人依歸不能聚集一處同作佛事堪嗟日月如流衰老漸侵死期將至黃泉路上資糧不具憑何法以脫三途地獄之苦報乎言及至此可悲可痛古人云生死事大無常迅速火急修行早是遲矣老人因此熟思再三無可為大衆決䇿者適堂主來省正愜老人之心因叮嚀渠回山將老人之心揭示衆耆舊儻真實為生死者須大家集會一處結念佛會同修淨業同出生死誓願遞相度脫社中若有一人先滅度者同力資助往生豈不為第一最上因緣即此餘年已勝百劫千生虗過也會所最要清淨無擾乃能成辦道業禪堂但有後學諷誦事業似屬煩雜唯有老人所修無盡菴最極寂靜色色現成不若就此為淨業堂成殊勝事不獨不枉老人苦心一場亦可以酬施主功德也其修進之規古人六時念佛晝夜殷勤雖是精進恐老者不能令折中當以四時為準二時功課二時跪諷行願品一卷念佛千聲發願回向期不計限人不計數但要老成信心篤實者忘賓主泯人我絶是非戒戲論一心念佛不通賓客專以寂靜為主即是真阿練若正修行處也若大衆果能洞見老人之心諦信老人之言依法修持便是出生死的時節便是與老人生生世世不相捨離常生佛前同聽法音之時其會集結社之人及安居之處一聽堂主主之便是奉行老人之教命也其精進道業又在大衆各自努力古人云把手他人行不得為人自肯乃方親所謂但辦肯心必不相賺珍重努力寄示曹溪禪堂諸弟子老人初為祖師建立之時大衆不知老人之心今日老人行後凡山門利害及禪堂設立汝等皆樂入堂安居是知老人之苦心也若知老人之心則當知佛祖之心矣汝等今思得老人似前教誨不可得也然聚散之緣雖佛祖不免在諸弟子能知恩報恩依教修行雖佛祖滅後亦同在世親近不異故佛臨入滅時諸大弟子請問若佛滅後衆等以何為師佛言當尊重波羅提木叉是汝等大師梵語波羅提木叉此云戒也佛常言汝等比丘能守吾戒雖千里外如在左右若不奉我戒縱對面猶千里也此吾佛大師金口親囑之語可不遵乎況今末法去聖時遙若佛弟子不秉佛戒將何以為修行之地賴何以出生死之苦海乎老人臨行特為汝等說梵網戒不知汝等一一能堅持否佛制比丘半月半月誦此戒經如從佛親聞作法羯磨毋令毀犯令三業六根念念檢點觀察不許暗生罪過不得毀犯戒根即此便是真實修行坐進此道不必遠訪明師徒增辛苦也若汝等向來未能堅持則當從今依法半月半月對佛宣誦梵網戒經十重四十八輕一一戒條熟記分明如犯一條則於誦戒之日請軌範師作證衆中遞相檢舉犯者對衆懺悔再不許犯如此則改過自新道業可就其所犯之罪除懺悔外衆等議定清規罰例以便遵守如老人向日所遺改條可為常法也衆等戒經習熟則當背誦四十二章佛遺教經楞嚴法華楞伽諸經以為佛種其參禪一著當遵六祖開示慧明不思善不思惡如何是當人本來面目公案蘊在胸中時時參究久之自有發明時節如此方是續佛祖慧命之大事因緣也汝等能遵此語則如老人常住曹溪汝等亦不必操方行腳矣示曹溪沙彌庚子歲當道延余料理曹溪余應之至則百廢概不能舉因思為治之道以養材為木遂選諸沙彌設義學延賓師以教習威儀誦讀內外經書稍知信向則披剃立禪堂使就清規受戒法晝夜禮誦是時諸沙彌始知有出家業皆厭耕鑿而慕清修矣余苦心十年差有可觀遂棄去今老矣隱居南嶽諸沙彌昔受化者先未深知老人今乃深思之雖求一日之執侍一言之教導難矣沙彌某比時在孩稚今從衆中始知老人心求親近不可得乃具冊遙乞開示老人聞而悲且喜也昔佛在時恐久住世間薄信衆生多不敬信遂上升忉利令衆慕而後來則人人皆生難遭想矣若老人久住曹溪諸人安能戀慕如今日哉沙彌若思老人不若思念佛思念六祖也若思念佛當來必有見佛之時若得見佛便是出生死時也思念六祖當初一賣柴漢耳如何得今日人天供養再思今日供養乃從拋却母親恩愛走向黃梅會下負石舂米辛苦中來再思六祖三更入黃梅方丈得受衣憑何知見向五百衆中獨自得之且人人一箇臭皮袋死了三五日便臭爛不堪為何六祖一具肉身千年以來如生一般此是何等修行得如此堅固不壞沙彌如此細細一一思想思想不透但將壇經熟讀細參參之又參全部不能但只將本來無一物何處惹塵埃一句蘊在胸中行住坐臥喫茶喫飯搬柴運水迎賓待客二六時中一切處頭頭提撕直使現前定要見本來無一物是箇甚麼如何是不惹塵埃的光景若能如此用心是名參禪若參到自信不疑之地則能真見六祖面目方知老人鼻孔方是沙彌真正出家了生死的時節也若不肯向己心中苦求本分事空思老人有何利益一往諸沙彌但知親受老人教導唯習威儀動靜禮誦文字而已若從今日始都與沙彌所請開示如此一力做工夫方是老人真實訓誨老人老矣此乃最後開示也若錯過今日將來縱向十方世界參訪知識總是他家活計慎勿以老人此言為空談也示法空選殿主佛教末法弟子修四安樂行謂正身正語正意大慈悲心依此而修是為妙行然此四行以行處近處為初心行處謂步步不離道場近處謂念念不離三寶余觀末法比丘能踐此行者唯知殿之役最為親切以沙門釋子不知修行之要縱浪身心不能檢束三業動成過惡故罪業日深生死難出即能遠參知識亦不必能步步相隨心心親近唯有侍奉三寶晝夜香燈是不忘佛也晨昏鐘鼓集衆禮誦是不忘法也大衆和合六時周旋是不忘僧也坐臥經行不離佛殿是步步道場也苟能自淨其心則一香一華皆成佛真體舉手低頭皆為妙行是則不動腳跟而遍參知識豈不為最勝因緣哉安樂妙行無尚此矣行者勉力以盡形壽何用別求佛法示曹溪基莊主六祖居曹溪寶林不容廣衆乃向居人陳亞仙乞一袈裟地盡曹溪四境而山背紫筍莊者乃袈裟一角也向僧居寮舍當寺之半久之僧多忘本外侮漸侵豪右蠶食其山場田地多入豪強僧業廢於八九而祖龍一背盡失之矣居民樵采已及其內地將見侵於肘腋老人初入曹溪乃悉其故因謂衆曰土地者叢林之本也況吾祖袈裟猶故亞仙之祖墳墓尚存是以謂祖翁田地也安可失乎遂集衆鳴於制府準令本府清其故土正其疆界衆皆瞢然不知所止即有知者亦畏縮不言獨基公以昔居此歷歷指掌以是豪強氣沮老人乃募資收贖其故有之田地山場盡以供膳寶林禪堂贍養寺後學僧徒肯辦道業者將以贖六祖如線之脈因以基公為莊主公佐助老人中興曹溪清理常住錢穀及一切事務井井有條苟能守之即千載猶一朝也老人去曹溪將十載諸規盡廢唯禪堂得昂公守之如故而基莊主精白一心未忘初念視老人如在左右保護常住秋毫皆如護眼目也老人愧無緣不能盡興祖道因思昔黃龍有不豫之色首座問之答曰監收未得人是知古人用一監收為深慮如此而莊主之責豈細事哉自古國家皆以得人為難而叢林亦然曹溪千僧老人居十年淘汰只得一禪堂主一莊主兩人而已更有二三人能為之輔翼者則德不孤事易行而祖師道場亦可保其無虞矣堂主來省老人於匡山基公因以問訊寄此卷請益老人復何言哉惟吾佛出世竝無別事但為護念付囑二事而已所以護念者為欲得人以續慧命也付囑者以佛家業有所付託如長者以家業委付其子也即歷代諸祖皆如佛意志在慧命不斷耳今佛祖之道寄在曹溪一脈而曹溪務在得人得人要在膳養膳養賴其四事四事賴其主者苟主者得人則衆有歸道可辦而叢林可振法道可興法道興利佛祖慧命相續不斷永永未來端有賴於今日也但能保護慧命即是深報佛恩如此即名真是佛子矣基公可謂能報祖師恩德矣從今更能深念六祖於大庾嶺頭教慧明公案懷在胸中重下疑情疑來疑去疑到疑不得處忽然迸破疑團露出本來面目是乃可稱六祖的骨兒孫較之保護祖翁田地者可謂百尺竿頭進一步也此則公案是六祖命脈苟有一人於此參透則六祖常住世間未滅度也今千載陳爛骨董老人重新拈出因公增價則此後常放光明照天照地直當判此身命堅固其心不可一息懈怠也勉之
