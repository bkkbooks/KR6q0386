body:
  text: 侍者福善日録門人通炯編輯嶺南弟子劉起相重較塔銘徑山達觀可禪師塔銘夫大地生死顛瞑長夜情關固閉識鎖難開有能蹶起一擊碎之掉臂獨往者自非雄猛丈夫具超世之量者未易及也歷觀傳燈諸老咸其人哉余今於達觀禪師見之矣師諱真可字達觀晚號紫柏門人稱尊者重法故也其先句曲人父沈連世居吳江太湖之灘缺師其季子也母夢異人授其附葉大鮮桃寤而香滿室遂有娠師生五歲不語有異僧過其門摩頂謂其父曰此兒出家當為人天師言訖忽不見師遂能語先時見巨人迹下於庭自是不復見髫年性雄猛慷慨激烈貌偉不羣弱不好弄生不喜見婦人浴不許先一日姊誤前就浴師大怒自後至親戚婦女無敢近者長志日益大父母不能拘嘗有詩曰屠狗雄心未易消蓋實録也年十七方仗劒遠遊塞上行至蘇州閶門遊市中天大雨值虎邱僧明覺相顧盻壯其貌因以傘蔽之遂同歸寺具晚餐歡甚聞僧夜誦八十八佛名心大快悅侵晨入覺室曰吾兩人有大寶何以污在此中耶解腰纏十餘金授覺令設驚請剃髮遂禮覺為師是夜即兀坐達旦每私語三嘆曰視之無肉喫之有味覺欲化鐵萬斤造大鐘師曰吾助之遂往平湖巨室門外趺坐主人進食師不食主問何所須師曰化鐵萬斤造大鐘有即受食主人立出鐵萬斤於門外師笑食畢徑載回虎邱歸即閉戶讀書年半不越閫見僧有飲酒茹葷者師曰出家兒如此可殺也僧咸畏憚之年二十從講師受具戒嘗至常熟遇相國嚴養齋翁識為奇器留月餘之嘉興東塔寺見僧書華嚴經跪看良久歎曰吾輩能此足矣遂之武塘景德寺掩關三年復回吳門辭覺曰吾當去行腳諸方歷參知識究明大事遂策杖去一日聞僧誦張拙見道偈至斷除妄想重增病趨向真如亦是邪師曰錯也當云方無病不是邪僧云你錯他不錯師大疑之到處書二語於壁間疑至頭面俱腫一日齋次忽悟頭面立消自是凌躒諸方嘗曰使我在臨濟德山座下一掌便醒安用如何如何過匡山窮相宗奧義一日行二十里足痛師以石砥腳底至日行二百里乃止遊五臺至峭壁空巖有老宿孤坐師作禮因問一念未生時如何宿竪一指又問既生後如何宿展兩手師於言下領旨尋迹之失其處至京師參遍融大老融問從何來曰江南來又問來此作麼曰習講又問習講作麼曰貫通經旨代佛揚化融曰你須清淨説法師曰只今不染一塵融命褫師直裰施傍僧顧謂師曰脫了一層還一層師笑領之遂留挂塔知識嘯巖法主暹理諸大老師皆及門去九年復歸虎邱省覺乃之淞江掩關百日之吳縣聊城傅君光宅為縣令其子利根命禮師子不懌子一日搦二花問師云是一是二師曰是一子開手曰此花是二師何言一師曰我言其本汝言其末子遂作禮之天池遇管公東溟聞其語深器之師因拈薔薇一蒂二花問公公曰此花同本生也師分為二德問公公無語因罰齋一供遂相與莫逆時上御極之三年大千潤公開堂於少林師結友巢林介如輩往參叩及至見上堂講公案以口耳為心印以帕子為真傳師耻之歎曰西來意固如是邪遂不入衆尋即南還至嘉禾見太宰陸五臺翁心大相契先是有密藏道開者南昌人棄青襟出家披剃於南海聞師風往歸之師知為法器留為侍者郡城楞嚴寺為長水疏經處久廢有力者侵為園亭師有詩弔之曰明月一輪簾外冷夜深曾照坐禪人志欲復乃囑開公任復之事而屬太宰為護法太宰公弟雲臺公施建禪堂五楹既成請師題其柱師為聯語曰若不究心坐禪徒增業苦如能護念罵佛猶益真修遂引錐刺臂流血盈碗書之自是接納往來後二十餘年太守槐亭蔡公始克修復蓋師願力所持也師見象季法道陵遲惟以弘法利生為家務念大藏卷帙重多遐方僻陬有終不聞佛法名字者欲刻方册易為流通普使見聞作金剛種子即有謗者罪當自代遂與太宰公及司成馮公夢禎廷尉曾公同亨冏卿瞿公汝稷等定議命開公董其事萬曆己丑創刻於五臺居四年以氷雪苦寒復移於徑山寂照庵工既行開公以病隱去續蕆其役者弟子寒灰如奇奇子幻豫本及最後弟子淡居鎧也初桐城吳公用先為儀曹郎參師入室從容及刻藏事師遽曰君與此法有大因緣師化後吳公出長浙藩用馮司成初議修復化城為徑山下院藏貯經版固吳公信力亦師預讖云師於嘉禾刻藏有成議乃返吳門省得度師覺公覺已還俗以醫名聞師來懾甚師偽為賈人裝僵臥小舟中請覺診視覺見師大驚師涕泣曰爾何迷至此耶今且奈何覺曰唯命是聽師立命剃髮載去覺慚服願執弟子禮親近之師來之日覺夕餐飯盂忽墮地迸裂其誠感如此師初過吳江沈周二氏聚族而歸之至曲阿金沙賀孫于王四氏合族歸禮師於于園書法華經以報二親顏書經處曰墨光亭今在焉聞妙峰師建鐵塔于蘆芽乃送經安置塔中且與計藏事復之都門乃訪豫於東海萬曆丙戌秋七月也豫以五臺因緣有聞於內避名於東海那羅延窟慈聖皇大后為保聖躬延國祚印施大藏十五部皇上頒降海內名山首及東海豫以謝恩入長安師携開公走海上至膠西秋水泛漲衆度必不能渡師解衣先涉疾呼衆水已及肩師躍然而前既渡顧謂弟子曰死生關頭須直過為得耳衆心欽服豫在長安聞之亟促裝歸兼程至即墨師已出山在腳院詰朝將長發是夜一見大歡笑明發請還山留旬日心相印契師即以豫為知言許生平矣師返都門訪石經山禮隋琬公塔念琬公慮三災劫壞正法澌滅創刻石藏經藏於巖洞感其護法深心淚下如雨琬公塔院地已歸豪右矢復之而未果乃決策西遊峨嵋由三晉歷關中跨棧道至蜀禮普賢大士順流下瞿塘過荊襄登太和至匡廬尋歸宗故址唯古松一株寺僧售米五斗匠石將伐之丐者憐而乞米贖之以存寺迹師聞而興感樹根為樵斧剝斫勢將折師砌石填土呪願復生以卜寺重興兆後樹日長寺竟復其願力固如此江州孝廉邢懋學延居長松館師為説法語名長松茹退鄒給諫爾瞻丁大參勺原留駐錫匡山未果遂行過安慶阮君自華請遊皖公山馬祖庵師喜其境超絶屬建梵剎江陰居士趙我聞謁請出家遂剃髮於山中師詺名曰法鎧所謂最後弟子也師復北遊至潭柘慈聖聖母聞師至命近侍陳儒致齋供特賜紫伽黎師固讓曰自慚貧骨難披紫施與高人福倍增儒隨師過雲居禮石經於雷音寺啓石室佛座下得金函貯佛舍利三枚光燭巖壑因請舍利入內供三日出帑金重藏于石窟以聖母齋襯餘金贖琬公塔遂拉豫偕往瞻禮屬豫作記回寓慈壽同居西郊園中對談四十晝夜目不交睫信為生平至快事遍融老已入滅為文弔之有嗣德不嗣法之語師在潭柘居常禮佛後方食一日客至誤先舉一食乃對知事曰今日有犯戒者命爾痛責三十棒輕則陪之知事愕不知為誰頃師授杖自伏地于佛前受責如數兩股如墨乃云衆生無始習氣如油入麵牢不可破苟折情不痛未易調伏也師與豫計修我朝傳燈録豫以禪宗凋敝與師約往濬曹溪以開法脈師先至匡山以待癸巳秋七月也越三年乙未豫供奉聖母賜大藏經建海印寺成以別緣觸聖怒詔逮下獄鞫無他辭蒙恩免死遣戍雷陽毀其寺師在匡山聞報許誦法華經百部冀祐不死即往探曹溪回將赴都下救豫聞豫南放遂待於江滸是年十一月會師於下關旅泊庵師執豫手歎曰公以死荷負大法古人為法有程嬰公孫杵臼之心我何人哉公不生還吾不有生日豫慰之再三瀕行師囑曰吾他日即先公死後事屬公遂長別豫度嶺之五年庚子上以三殿工榷礦稅中使者駐湖口南康太守吳寶秀劾奏被逮其夫人哀憤以繯死師在匡山聞之曰時事至此其如世道何遂䇿杖赴都門吳入獄師多方調護授以毗舍浮佛半偈囑誦滿十萬當出獄吳持至八萬蒙上意解得末減師以豫未歸初服每歎曰法門無人矣若坐視法幢之摧則紹隆三寶者當於何處用心耶老憨不歸則我出世一大負礦稅不止則我救世一大負傳燈未續則我慧命一大負若釋此三負當不復走王舍城矣癸卯秋豫在曹溪飛書屬門人計偕者招師入山中報書直云捨此一具貧骨居無何忽妖書發震動中外忌者乘間劾師師竟以是罹難先是聖上以輪主乘願力敬重大法手書金剛般若偶汗下漬紙疑當更易遣近侍曹公質於師師以偈進曰御汗一滴萬世津梁無窮法藏從此放光上覽之大悅由是注意適見章奏意甚憐之在法不能免因逮及旨下云著審而已金吾訊鞫但以三負事對絶無他辭送司寇時執政欲死師師聞之曰世法如此久住何為乃索浴罷囑侍者小道人性田曰吾去矣幸謝江南諸護法道人哭師叱之曰爾侍豫二十年仍作這般去就耶乃説偈訖端坐安然而逝御史曹公學程以建言逮繫問道於師聞之急趨至撫之曰師去得好師復開目微笑而別癸卯十二月十七日也師生於癸卯六月十二日世壽六十有一法臘四十有奇師生平行履疑信相半即此末後快便一著上下聞之無不歎服於戲師於死生視四大如脫敝屣何法所致哉師常以毗舍浮佛偈示人豫問曰師亦持否師曰吾持二十餘年已熟句半若熟兩句吾於死生無慮矣豈其驗耶師化後待命六日顏色不改及出徙身浮葬於慈慧寺外次年春夏霖雨及秋陸長公西源欲致師肉身南還啓之安然不動豫弟子大義奉師龕至經潞河馬侍御經綸以感師與李卓吾事心最慟因啓龕拂面痛哭之至京口金沙曲阿諸弟子奉歸徑山供寂照庵師臨終有偈云怪來雙徑為雙樹貝葉如雲日自屯以是故耳時甲辰秋九月也越十一年乙卯弟子葬師全身於雙徑山後司成朱公國禎禮師塔知有水囑弟子法鎧啓之俗弟子繆希雍相得五峰內大慧塔後開山第二代之左曰文殊臺卜於丙辰十一月十九日茶毗草三日歸靈骨塔於此豫始在行間聞師訃欲親往弔因循一紀未遂本懷頃從南嶽數千里來無意與期會而預定祭日蓋精神感孚亦奇矣師後事豫幸目擊得以少盡心焉於戲師生平行履豈易及哉始自出家即脅不至席四十餘年性剛猛精進律身至嚴近者不寒而栗常露坐不避風霜幼奉母訓不坐閾則盡命立不近閫秉金剛心獨以荷負大法為懷每見古剎荒廢必至復始從楞嚴終至歸宗雲居等重興梵剎一十五所除刻大藏凡古名尊宿語録若寂音尊者所著諸經論文集及蘇長公易解盡搜出刻行於世性耽山水生平雲行鳥飛一衲無餘無容足地嚴重君親忠孝之大節入佛殿見萬歲牌必致敬閲曆書必加額而後覽偶讀長沙志見忠臣李芾城垂陷不欲死於賊授部將一劒令斬其全家部將慟哭奉命既推刃因復自殺師至此淚直迸灑弟子有傍侍者不哭師呵曰當推墮汝於崖下其忠義感激類如此師氣雄體豐面目嚴冷其立心最慈每示弟子必令自參以發其悟直至疑根盡拔而後已接人不以常情為法求人如蒼鷹攫兔一見即欲生擒故凡入室不契者心愈慈而恨愈深一棒之下直欲頓斷命根故親近者希凄然暖然師實有焉於戲師豈常人哉即其見地直捷穩密當上追古人其悲願利生弘護三寶是名應身大士有人問師何如人豫曰正法可無臨濟德山末法不可無此老也師每慨五家綱宗不振常提此示人豫嘗嘆曰綱宗之不振其如慧命何原其曹洞則專主少林溈仰圓相久隱雲門自韓大伯後則難見其人法眼大盛於永明後則流入高麗獨臨濟一派流布寰區至宋大慧中興其道及國初楚石無念諸大老後傳至弘正末有濟關主其門人為先師雲谷和尚典則尚存五十年來師絃絶響近則蒲團未穩正眼未明遂妄自尊稱臨濟幾十幾代於戲邪魔亂法可不悲乎豫以師之見地誠可遠追臨濟上接大慧以前無師派未敢妄推若據堯舜之道傳至孔子孟軻軻死不得其傳至宋濂雒諸儒遙續其脈以此證之師固不忝為轉輪真子矣姑録大略以俟後之明眼宗匠續傳燈者采焉以師未出世故無上堂普説示衆諸語但就參請機緣開示門人緝之有內外集若干卷行於世入室緇白弟子甚多而宰官居士尤衆師生平行履不能具載別有傳乃為之銘銘曰佛未出世祖未西來擊塗毒鼓誰其人哉鷲嶺拈花少室面壁只道快便翻成狼籍黃梅夜半老盧竊逃誰料嶺南有此獦獠南嶽青原擦膿涕漢多少癡人被他誆賺五家手快如撫舜琴南熏倐至辨者知音兒孫惡辣觸者先亡但放一線其家永昌門戶孤單命在一絲有救之者定是嫡兒如漢張良為韓報仇縱然國破宗祧可求是生吾師如石迸笋出則凌霄孰知其本為法力戰通身汗血大似李陵空拳不怯身雖陷虜其心不亡千秋之下畢竟歸王師金剛心盡化為骨逼塞虗空豈在山麓師不知我誰當知師一死一生春在花枝雲棲蓮池宏大師塔銘師諱袾宏字佛慧別號蓮池志所歸也俗姓沈氏古杭仁和人世為名族父德鑑號明齋先生母周氏師生而頴異世味淡如年十七補邑庠試屢冠諸生以學行重一時於科第猶掇之也顧志在出世每書生死事大四字於案頭從遊講藝必折歸佛理業已棲心淨土矣家戒殺生祭必素居常太息曰人命過隙耳浮生幾何吾三十不售定超然長往何終身事齷齪哉前婦張氏生一子殤婦亡即不欲娶母強之議婚湯氏湯貧女齋蔬有富者欲得師為佳壻陰間之師竟納湯然意不欲成夫婦禮年二十七父喪三十一母喪因涕泣曰親恩罔極正吾報答時也至是長往之志決矣嘉靖乙丑除日師命湯點茶捧至案盞裂師笑曰因緣無不散之理明年丙寅訣湯曰恩愛不常生死莫代吾往矣汝自為計湯亦灑然曰君先往吾徐行耳師乃作一筆勾詞竟投性天理和尚祝髮乞昭慶寺無塵玉律師就壇受具居頃即單瓢隻杖遊諸方遍參知識北遊五臺感文殊放光至伏牛隨衆煉廣入京師參遍融笑巖二大老皆有開發過東昌忽有語作偈曰二十年前事可疑三千里外遇何奇焚香擲戟渾如夢魔佛空爭是與非師以母服未闋乃懷木主以遊每食必供居必奉其哀慕如此至金陵瓦官寺病幾絶時即欲就茶毗師微曰吾一息尚存耳乃止病間歸越中多禪期師與會者五終不知鄰單性字隆慶辛未師乞食梵村見雲棲山水幽寂遂有終焉之志山故伏虎禪師剎也楊國柱陳如玉等為結茅三楹以棲之師弔影寒巖曾絶糧七日倚壁危坐而已村多虎環山四十里歲傷不下數十人居民最苦之師發悲懇為諷經施食虎患遂寧歲亢旱村民乞師禱雨師笑曰吾但知念佛無他術也衆堅請師不得已出乃擊木魚循田念佛時雨隨注如是所及民異之相與纍纍然挈材木荷鋤钁競發其地得柱礎而指之曰此雲棲寺故物也師福吾村吾願鼎新之以永吾福不日成蘭若外無崇門中無大殿惟禪堂安僧法堂奉經像餘取蔽風雨耳自此法道大振海內衲子歸心遂成叢林師悲末法教網滅裂禪道不明衆生業深垢重以醍醐而貯穢器吾所懼也且佛設三學以化羣生戒為基本基不立定慧何依思行利導必固本根第國制南北戒壇久禁不行豫即願振頺綱亦何敢違憲令因令衆半月半月誦梵網戒經及比丘諸戒品由是遠近皆歸師以精嚴律制為第一行著沙彌要略具戒便蒙梵網經疏發隱以發明之初師發足參方從參究念佛得力至是遂開淨土一門普攝三根極力主張乃著彌陀疏鈔十萬餘言融會事理指歸唯心又憶昔見高峰語録謂自來參究此事最極精鋭無逾此師之純鋼鑄就者向懷之行腳惟時師意併匡山永明而一之更録古德機緣中喫緊語編之曰禪關䇿進併刻之以示參究之訣蓋顯禪淨雙修不出一心是知師之化權微矣萬曆戊子歲大疫日斃千人太守余公良樞請公詣靈芝寺禳之疫遂止梵村舊有朱橋潮汐衝塌行者病涉余公請師倡造師云欲我為者無論貧富貴賤人施銀八分而止獨用八者意取坤土以制水也或言工大施微恐難峻事師云心力多則功自不朽不日纍千金鳩工築基每下一樁持呪百遍潮汐不至者數日橋竟成昔錢王以萬弩射潮師以一心力當之何術哉師道價日增十方衲子如歸師一以慈接之弟子日集居日隘師意不莊嚴屋宇取安適支閣而已其設清規益肅衆有通堂若精進若老病若十方各別有堂百執事各有寮一一具鎖鑰啓閉以時各有警䇿語依期宣説夜有巡警擊板念佛聲傳山谷即倦者眠不安寢不夢布薩羯磨舉功過行賞罰凜若氷霜即佛住祇桓尚有六羣擾衆此中無一敢諍而故犯者不盡局百丈規繩而適時救斃古今叢林未有如今日者具如僧規約及諸警語赫如也極意戒殺生崇放生著文久行於世海內多奉尊之曾講圓覺經於淨慈聽者日數萬指如屏四匝因贖寺前萬工池為放生池師八十誕辰又增拓之今城中上方長壽兩池歲費計百餘金山中設放生所救贖飛走諸生物充牣於中衆僧減口以養之歲約費栗二百石亦有警䇿守者依期往宣白即羽族善鳴噪者聞木魚聲悉寂然而聽宣罷乃鼓翅暄鳴非佛性哉噫佛説孝名為戒儒呵有養無敬師於物養而敬且有禮者也非達孝哉師道風日播海內賢豪無論朝野靡不歸心感化若大司馬宋公應昌大宰陸光公祖宮諭張公元忭司成馮公夢禎陶公望齡次第及門問道者以百計皆扣關擊節徵究大事靡不心折盡入陶鑄監司守相下車伏謁及賢豪候參者無加禮不設饌皆甘糲飯臥敗席任蜥緣蚊嘬無改容皆忘形屈勢至則空其所有非精誠感物何能至是哉侍郎王公宗沐問夜來老鼠唧唧説盡一部華嚴經師云貓兒突出時如何王無語師自代云走却法師留下講案又書頌曰老鼠唧唧華嚴歷歷奇哉王侍郎却被畜生惑貓兒突出畫堂前床頭説法無消息無消息大方廣佛華嚴經世主妙嚴品第一侍御左公宗郢問念佛得悟否師曰返聞聞自性性成無上道又何疑返念念自性耶仁和令樊公良樞問心雜亂如何得靜師曰置之一處無事不辦坐中一士曰專格一物是置之一處辦得何事師曰論格物只當依朱子豁然貫通去何事不辦得或問師何不貴前知師云譬如兩人觀琵琶記一人不曾經見一人曾見而預道之畢竟同觀終場能增減一齣否今上慈聖皇太后崇重三寶偶見師放生文甚嘉歎遣內侍賫紫袈裟齋資往供問法要師拜受以偈答之師極意悲幽冥苦趣自習焰口時親設放嘗有見師座上現如來相者蓋觀力然也師天性朴實簡淡無緣飾虗懷應物貌溫粹弱不勝衣而聲若洪鐘胸無崖岸而守若嚴城禦若堅兵善藏其用文理密察經濟洪纖不遺針芥即畫叢林日用量施利酌厚薄核因果明罪福養老病公衆僧不滲滴水自有叢林以來五十年中未嘗妄用一錢居常數千指不設化主聽其自至稍有盈餘輒散施諸山庫無儲蓄凡設齋外別持金銀作供者隨手散去施衣藥救貧病略無虗日偶檢私記近七載中實用五千餘金不屬常住則前此歲歲可知已師生平惜福嘗著三十二條自警垂老自浣濯出溺器亦不勞侍者終身衣布素一麻布幃乃丁母艱時物今尚存他可知已總師之操履以平等大悲攝化一切非佛言不言非佛行不行非佛事不作佛囑末世護持正法者依四安樂行師實以之歷觀從上諸祖單提正令未必盡修萬行若夫即萬行以彰一心即塵勞而見佛性者古今除永明惟師一人而已先儒稱寂音為僧中班馬豫則謂師為法門之周孔以荷法即任道也惟師之才足以經世悟足以傳心教足以契機戒足以護法操足以勵世規足以救斃至若慈能與樂悲能拔苦廣運六度何莫而非妙行耶出世始終無一可議者可謂法門得佛之全體大用者也非夫應身大士朗末法之重昏者何能至此哉臨終時預於半月前入城別諸弟子及故舊但曰吾將他往矣還山連下堂具茶湯設供與衆話別云此處吾不住將他往矣中元設盂蘭盆各薦先宗師曰今歲我不與會矣有簿記師密題曰雲棲寺直院僧代為堂上蓮池和尚追薦沈氏宗親云過後始知其懸祀也七月朔晚入堂坐囑大衆曰我言衆不聽我如風中燭燈盡油乾矣只待一撞一跌才信我也明日要遠行衆留之師作三可惜十可嘆以警衆淞江居士徐琳等五人在寺令侍者送遺囑五本次夜入丈室示微疾瞑目無語城中諸弟子至圍繞師復開目云大衆老實念佛毋揑怪毋壞我規矩衆問誰可主叢林師曰戒行雙全者又問目前師曰姑依戒次言訖面西念佛端然而逝萬曆四十三年七月初四日午時也師生於嘉靖乙未世壽八十有一僧臘五十師自卜寺左嶺下遂全身塔於此其先耦湯氏後師祝髮建孝義庵為女叢林主先一載而化亦塔於寺外之右山師得度弟子廣孝等為最初上首其及門授戒得度者不下數千計在家無與焉縉紳士君子及門者亦以千計私淑者無與焉其所著述除經疏餘雜録如竹窗三筆等二十餘種行於世率皆警發語師素誡弟子貴真修勿顯異故多靈異不具載嗚呼我聞世尊深念末法衆生雖度恐斷慧命靈山會上求護正法者即親蒙授記亦不敢入惟地湧之衆力任之且曰我等末世持經當具大忍力大精進力即有現身此中亦不自言其本泄佛密因但臨終陰有以示之耳觀師之行事潛神密用安忍精進之力豈非地湧之一乎抑自淨土而來乎不然從凡夫地求自利尚不足安能廣行利他護持正法始終無缺者乎豫有感而來略拾師之行事以昭來世其他具諸別傳乃為之銘曰三毒焰熾五熱周章孰能藥石頓使清涼欲海橫流波浪滔天誰能濟度駕大法船惟我大師實乘願力放身其中隨宜調適蚤斷愛根如獅脫索才出塵勞便露頭角開淨土門張法界網撈漉三根其赴如響以金剛鎞刮翳眼膜根本不生枝葉自落大冶紅爐慈悲忍力入此陶鎔癡狂頓息毛孔光明通身手眼從無用中法輪常轉若非付囑定是地湧豈屬尋常具大勇猛師徒空來亦從空去雖善藏身欲隱彌露鐘鼓交參雲霞綺互塔影高標法身常住敕賜清涼山竹林寺空印澄法師塔銘諸佛法身托於文字般若故如來應世獨重持經法師欲其慧命不斷故也爰自白毫斂耀像季弘經則馬鳴龍樹無著天親性相標宗各擅其美及大法東流惟清涼大師濬法界之源綱維教網撈摝人天以其自性宗通而弘四辨之説無礙圓融圭山而下難其人矣近代遠紹芳規傑然師表者惟我竹林空印澄公大師師諱鎮澄別號空印金臺宛平桑峪李氏子父仲武母呂氏初夢一僧持錫入室覺而遂生幼聰慧不羣為兒嬉喜佛事蚤有出世志年十五即投禮西山廣應寺引公為師得度為沙彌服勤三年登壇受具一江澧西峰深守菴中諸大法師弘教於大都師尋依講肆參窮性相宗旨融貫華嚴靡不該練如是者十餘年復從小山笑巖二大知識究西來密意妙契心印一時義學推為上首先是豫遊京師法會衆中獨目師當為法匠既而同妙峰禪師結隱五臺將建無遮法會集海內耆碩囑妙峰力招師果至豫大喜為臺山得人時萬曆壬午歲也法會罷豫與妙師分携瀕行不忍與師別夜談連宵力勸師曰時當末運法門寥落撑持者難得其人公慎勿住人間當留心此山深畜利器他時當為金色主人師問其故豫曰昔司馬頭陀相溈山以形與山相稱耳師欣然應諾豫即以所居紫霞蘭若居之師住此壁觀三年大有開悟塔院主人大方廣公請修清涼傳隨留講諸經聲光赫奕四方學者日益集未幾與雪峰創獅子窟建萬佛琉璃塔遂成叢林於中講演華嚴大經學者數千指坐寒巖氷雪儼在金剛窟中也聖母皇上為國祈福注意臺山聞師風雅重之特賜大藏尊經安供尋復命師於都城千佛寺講師自著楞嚴正觀復於慈因寺講演諸經時妙師造千佛銅殿安置大顯通寺上嘉其功行命重修改賜額永明建七處九會道場延諸大法師講演華嚴以師主第一座會罷師以古竹林寺文殊現身處也廢久復緝所用多出內帑未幾幻出一大道場乃集諸弟子重講華殿疏一周復修南臺為文殊化境師自是疲於津梁矣遂謝諸弟子單提末後一著默然兀坐衆有請説法者師曰吾隨幻緣力任大法恆以生死大事為念今老矣人世幾何學者以究心為要豈復以播弄唇吻為得耶爾輩當以此自勉吾將行矣居頃之示微恙危坐三日夜談笑如常中夜寂然而逝萬曆丁巳六月十四日也師生而安重寡言笑律身嚴御衆寬不肅而威説法三十餘年三演華嚴雖登華座萬指圍繞意若無人天厨日至而粗糲自如居嘗專注理觀脅不至席淵沉靜默老無惰容受法弟子以千百計出其門者率皆質朴無浮習蓋有以師表之其於講演提綱挈要時出新意北方法席之盛稽之前輩無有出其右者所著有楞嚴正觀金剛正眼般若照真論因明起信攝論永嘉集諸解行於世師生於嘉靖丁未世壽七十有一僧臘五十有奇全身葬於竹林之左上聞師遷化賜帑金建窣堵波額曰空印大法師應身之塔惟我國初禪講諸師多啓宸衷膺寵渥二百年來未有福德深厚上致眷顧隆恩之若此者豈非曼室應身而來者耶抑清涼之影響耶師得度弟子惟棟等七人受法門人遠清等數百人多能開化一方明年戊午冬法孫方茂門人大謙持師行狀遠來匡山求為塔上之銘豫與師稱法門知己銘捨豫孰為之乃為銘曰法身無形遇物而彰文字煥發般若之光故持經者慧命是託了達性空説不可説西天此土代不乏人爰有清涼曼室化身性海波翻義天星燦法界圓融炳然齊現居金色界據寶華座出廣長舌雜華紛播千載而下適生大師芳規遠紹獅子的兒高踞窟中發大哮吼百獸震驚聞聲奔走雙提性相大開寶藏一雨普滋三根應量名聞九重隆恩眷顧梵剎聿興法幢高竪三十餘年誨人不倦以知見力隨順方便律身精嚴潛神淡泊回彼狂飇還醇返朴示幻此身人天師表於末法中實為僧寶塔影撑空法身獨露風動水流圓音彌布千尺寒巖萬年氷雪日月無窮光明不滅
