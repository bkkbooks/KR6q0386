body:
  text: 侍者福善日錄門人通炯編輯嶺南弟子劉起相重較記觀楞伽寶經閣筆記觀楞伽寶經記葢為觀經而作也以此經直指眾生識藏即如來藏顯發日用現前境界令其隨順觀察自心現量頓證諸佛自覺聖智故名佛語心非文字也又豈可以文字而解之哉故今不曰註疏而曰觀經記葢以觀遊心所記觀中之境耳此經為發最上乘者說所謂是法甚深奧少有能信者以文險義幽老師宿學讀之不能句況遺言得義以入自心現量乎昔達摩授二祖以此為心印自五祖教人讀金剛則此經不獨為文字且束之高閣而知之者希望崖者眾矣惟我聖祖以廣大不二真心禦寰宇修文之暇乃以楞伽金剛佛祖三經試僧得度如儒科特命僧宗泐等註釋頒布海內浸久而奉行者亦希清幼入空門切志向上事愧未多歷講肄嘗見古人謂文字之學不能洞當人之性源貴在妙悟自心心一悟則回觀文字如推門落臼固不難矣因入山習枯禪直至一字不識之地一旦脫然自信回視諸經果了然如視歸家故道獨於此經苦不能句萬曆壬辰夏余居海上偶患足痛不能忍因請此經置案頭潛心力究忽寂爾忘身及開卷讀百八義了然如眡白黑因憶昔五臺梵師言遂落筆記之至生滅章其患即愈及乙未春因弘法罹難幽困之中一念孤光未昧實仗此法門威德力也頃蒙恩遣雷陽丙申春過吉州遇大行王公性澥於淨土中請益是經因出前草二章公首肯遂以正受註并三譯本稽首屬余請卒業焉余𢹂之以行是年三月十日抵戍所於四月朔即命筆時值饑癘死傷蔽野余坐毒霧屍陀林中日究此經至忘寢食了然如處清涼國至七月朔甫完卷半與柯孝廉復元率諸父老掩胔骼至四千頭有奇建盂蘭會說幽冥戒普濟之時天廼雨而癘隨止遂令蔑戾車地大生歡喜心無廼借性澥一滴潤此焦枯乎已而奉鎮檄來五羊憩東郭壘壁閒又首事於十月朔至明年佛成道日廼擱筆焉愚竊思多生以謗法因緣今感此報荷蒙聖慈以萬里之行而調伏之使入其難入期年之內奔走居半而能了此積劫廣大因緣非荷諸佛神力加持何能以思維心測度如來自覺聖智境界乃爾以是彌感聖恩析骨難醻也稿成觀察海門周公欲梓之以入賀未果戊戌冬侍御樊公友軒以建儲議謫雷陽與余同伍道過仙城問雷陽風景何如余笑曰在人不在境因出草示之曰此余雷陽風景也公嘆曰信光明幢哉願廣法施遂為疏募眾梓之諸宰官長者居士各歡喜成之願將此勝因回向楞伽法性海中仰憑慧光圓照破此夙愆蚤登解脫冀見聞隨喜同入自心現量共轉此法輪直至未來際以斯功德上報聖恩下苦趣齊登涅槃彼岸耳此經單破外道二乘偏邪之見令生正智以一心為真宗以摧邪顯正為大用其所破之執各有所據皆載彼宗瘴鄉苦無經論參考即所引證咸以起信唯識提挈綱宗務在融會三譯血脈貫通若夫單提向上直指一心枝詞異說刷洗殆盡冥契祖印何敢讓焉因為述其始末如此萬曆己亥季夏望日海印沙門德清記南華寺修建華嚴道場千日長期記銘曹溪為天下禪林冠一脈派五宗源如洙泗第僻處嶺外道路閒關故高人上士足迹罕至其徒見聞狹陋以種田博飯無復知有向上事其習俗久矣余素與達觀師深有慨焉常有願而未能及也丙申春蒙恩遣海外取道覲六祖肉身覩其香火崇祀之嚴叢林凋落之甚不覺涕下霑衣一食而去居無幾何制臺左司馬陳公深念名山寥落欲以余託迹焉余自知取辱法門且在行閒安敢事事既而觀察海門周公惺存祝公皆力致之余始翻然猶未遑安處戊戌秋九月淨空上人同寺僧行真權淨泰輩謁余於五羊余一見跫然而喜上人云某生西蜀近峨嵋效普賢願力因徧歷諸方以飯僧為佛事比自北而南謁六祖於曹溪願就勝道場地結飯僧緣十萬八千計以醻本願余欣然而起曰大哉上人願力普則普矣而所施之地猶未然也且結眾緣須天下之交路人半僧之所可耳今曹溪遠隔嶺表衲子畏途足迹罕至安以一飯之故而蹈山川之險乎且不為食來聖訓在耳法食平等摩詰傳心上人其以法為導而以食為資是所謂由香飯而入律儀此吾佛利世之嘉謨菩薩所修之妙行也上人聞而歡喜躍然從事乃與權泰輩竭力經營志結千日長期糾實行僧四十八人跪諷華嚴大經若干部即卜是年十月為始至辛丑十月望為終當結制之初剎竿方竪遠近嚮風金粟雲委六時禮誦鐘梵交參雖無華座之師而音聲色相足以感諸天而驚四眾三年如一日矣自非六祖大師寂光朗照山靈呵衛何以至此斯亦法道之前茅也上人喜大願已醻將杖錫遠遊又願以此施者受者著名貞石用以彰往開來以垂不朽余時方執修崇之役畢期入山睹其列者如林歡喜合掌而為之讚曰清淨法身草木瓦礫觸目常光見者不識寶林之山其狀自別曹溪之水其味更冽祖師未來山水已開祖師既至其道乃熾祖師滅度山水露布飲安居不知其故不聾不瞽如盲若癡採薪汲水用之靡宜叢林秋晚草枯水涸我念歸依思之如渴枝葉雖凋逝者如斯我卓錫來將欲𤀹之爰有上人亦隨我願引華藏流先開一綫積粒粒米如香飯界勺滴滴水灌華藏海食者之腹量等虗空施者之福福更無窮上人志滿我願未足一口吸盡祖師乃出重修彭城洪福寺記佛法引攝眾緣若合殊流而歸於海故曰辟如四海以海為極惟黃乃四河之一從崑崙東注真丹始也洪流滔天爰有神禹鑿龍門疏九河導百川而下抵徐開呂梁引眾派而歸之海逝者如斯則治之功終古一脈耳吾法自西至東亦猶是也竊觀中國名山大剎珠宮梵宇凡所以流通道脈源源不絕者其開剏之功豈直神禹且禹之所治者非性水也有為之迹況乃腓脛剝膚三過其門而不入必辛苦憔悴而後成功今也吾人鑿無明之堅礙疏法性之洪流躡差別之機緣而會歸覺海豈易為力哉非等心死誓斷斷乎難矣彭城當黃河之要衝天上傾流建瓴至此可謂極矣其奔騰迅駛孰能當之故其為害不淺即有神禹獨且奈之何哉東坡居士曾守是郡懷終古之憂乃築黃樓以彈壓之葢黃土也取克治之義城北乃建黃福寺以枕洪流託之棲禪然居士深有見於性相之源義取相融融則不相陵奪則滔滔安流將為有土蒼生永永之福故今之傳者亦曰洪福其旨微矣寺今亦為河水漂突豈非妙達性水真空者主之耶達觀可禪師北遊頻駐錫於此深慨焉因大開法社屬闍黎慈峰朝公令其精持性戒即為疏攝眾緣普會而一新之將使往者過來者息各各同入法性海中以導西來一脈期為大地眾生永永之福惟師之心神禹哉良亦苦矣諸大宰官居士一時同發無上道緣此猶三門既開七井既鑿中流砥柱矻立頹波而千里安流風䭵往來舟檝上下則引攝之功亦易易耳朝公乘橇䟦涉當不惜腓脛必等心死誓極力而蚤圖之無淹歲月雖然圖難於易為大於細嘗謂滴水入海與渤海同枯苟不讓細流漸成深廣以此前驅則萬鈞易舉異日輪奐莊嚴如祇桓精舍吾當以廣長舌吐無盡流籌量此會人天之福萬曆乙未長至十日余以弘法罹難詔戍嶺海達大師蠒足數千里北走唁余期會於此及余至大師已買舟南下矣主人出其疏讀之憮然長慨遂秉燭信筆書此以結他日之緣語似不倫亦慣曾為旅偏憐客耳剏建長壽葊記粤城西三里許曰小圃園負山帶海為叢林奧區其地蘊靈秀由來久矣萬曆庚辰有禪僧如受者自楚中來衍化及此一時富商大賈及居人之有名行者率多歸依咸願請為唱導師各布金建精舍為說法所購土人潘氏地輸財鳩工不日成之額曰長壽葊上下殿堂兩翼方丈齋厨禪室輪稛連棬丹飭煥然又以鋦範如來諸大士像香華鐘磬鼓樂莊嚴靡不畢俻淖音梵唄日夜交參居然地涌祇桓一勝道場也如受化去其徒性亮繼之庚寅亮復拓地範圍門牆巍然一新丙申春余恩遣雷陽道經此葊信宿而去明年丁酉夏余奉鎮檄去五羊亮乃率諸檀越弟子稽首作禮乞余記其事余欣然攝衣據席揮麈而普告之曰諸佛子善哉諦聽山河大地無一處非道場鱗介羽毛無一物非佛性況茲地為兩閒之鉅麗顧斯人類為萬物之最靈詎不頓現淨土而見法身者乎憶昔世尊與帝釋行次偶指其地曰此處宜建梵剎乃我昔為然燈布髮掩泥之所時長者即拈一草插之曰建梵剎竟諸天讚歎諸佛子由此觀之隨所行處皆是如來因地隨所施為即建道場況夫瀝膏剔髓汗血泥途而為輪奐莊嚴者乎固在施者受者何如耳苟施者不著相則功德如空應量無際而果報不可思議如是則束草滴水粒米莖菜皆法界性與虗空等否則計功思利雖施七寶滿恒河沙適足以增有為業累況得無上福田為菩提種子乎苟受之者不滯迹則唯心淨土自性彌陀觸目無非極樂如是則高巖深谷樹下塚間皆常寂光等否則假我偷安雖居兜率住梵天亦祇以增生死業果況能自他二利開人天眼乎諸佛子施者受者能忘緣離相則心境俱空而所作功德亦如空所護果報亦如空是則此葊雖小可以含法界包虗空晨鐘夕梵水月松風皆演無盡法音以祝我聖天子無疆之壽以培斯民無窮之福推之以盡大地無一處而非樂土廣之以極十方無一人而不證真是則菴即極樂場人即無量壽如是其志之曰長壽宜矣否則水土木石有為四相代謝遷流不啻陽𦦨空花又何長之有諸大眾聞說歡喜作禮而退遂以此書重修英德縣堯山天心寺記并銘嶺表僻處東南與諸羗接周秦貢服不稱今也不獨為文憲大雅之風洋洋中國即琳宮梵宇在在稱雄爰自梁朝達摩航海來於西竺有唐六祖衣鉢著於曹溪而禪林道化為東土宗斯豈以天地限其道山川私其氣哉固在弘之得人行之以時耳韶之英德去曹溪咫尺府治之西百里許曰堯山天心寺葢亦剏自前代豈曹溪之苗裔耶湮不可攷今上議東宮大禮先有採珠之令特遣乾清宮近侍御馬監太監李公至督其役以萬曆戊戌秋七月至青鸚未幾復以兩宮三殿災方事大工東西軍興司農告匱再下開礦之命總歸於公公奉命唯謹入海犯風濤陟山冒虎兕事上育下以忠愛為心安靜無擾人受公之惠亦已厚矣己亥秋行部至英德深窮礦所道徑廢寺公乃愀然謂父老曰神者山川之靈禍福之宰也況佛聖為世所尊梵剎為民之福田安可荒涼若是乎遂捐廩金若干復以疏付土之良民募眾力以成其功未幾而緣果集鳩工緝梓首事於是年冬落成於辛丑秋風聲響應百力駢集殿堂廊廡山門僧舍煥然一新公屬為文以勒之貞石用垂不朽余因感公德意嘉惠斯民乃為銘以銘之銘曰天地種靈山川含英鬼神來舍禍福無淫大哉慈氏兩足稱尊含齒戴髮各稟性真洋洋道化雲行八表有識歸依如風偃草顧嶺之東惟韶之陽載英之土天心惟皇惟皇於何大哉大覺釋梵之雄金口之鐸琳宮淨土在在有之蒼梧之野實惟建之歲月遷譌風薄雨蝕有形皆化況茲朽植像教日頹孰導迷途曰惟我公握天之符山靈海若載欣載犇過茲窮髮投誠布金赤旘一立其應如響妙麗莊嚴地平如掌神欽鬼伏天人普集福被河沙功超百億鐘聲梵唄朝昏祝釐願吾皇壽與天地齊惟公功德山川共久帶礪同盟咸皆額手忠勇廟記并銘粤居嶺表山海故多盜賊往往鉅奸大猾雄據崇山峻嶺長波巨浸環紆襟帶諸島星列恃為金城天府從來舊矣無論倭夷內侵即此輩跳梁接踵而發若吳平曾一本猖獗於嘉隆閒橫行海上黃纛赭衣竊號靜海勞我王師干戈歲無寧日而海畔蒼生死者澤若焦矣及一本就擒其餘黨若鄭大漢林道乾朱良寶許俊美林鳳紅老輩各蜂分一隅更為流毒時越人吳天賞者先藉名諸生閒屢試不售遂棄舉子業從史椽奉部檄為制府記室司馬殷公心識其能因引為參軍時與籌畫諸巢穴部曲事每發無遺䇿司馬公大奇之遂力薦之天子先後七疏始報可部議擢賞於行閒起為招討將軍領白鴿寨軍事而將軍父子兄弟皆在軍旅從事焉先是以將軍䇿大樹赤旘自閩廣一帶環海之涯嚴守備設方略即大將軍下無論諸將領士卒皆知將軍能無不嚮將軍意指者因而羣盜日就擒獨道乾乘大艘逃暹羅將軍之子汝實尾其後追之未獲所遺者唯鄭大漢據柳杜澳紅老據珠池未下仍以實提兵千人襲紅老遂斬老及黨三百餘級而鄭大漢則以將軍及弟天祥力當之大漢者廣人魁梧奇偉身長八尺勇冠羣盜卒徒皆精銳梟悍凡轉戰無敢當鋒者將軍以撫民二千人皆素不識兵者軍杜澳會戰天祥賈勇先登陷陣遂力戰而死將軍奮怒一呼鼓而乘之大漢遂就擒餘黨潰散自是海上瘡痍方瘳蒼生始可安食矣司馬公大奇將軍功而哀祥死乃具報天子上嘉之下大司馬紀其勛將敘績焉時杜澳土人感祥以死易其生乃立廟貌歲時祀之額曰忠勇頃以倭奴犯東鄙連兵數年將軍子實猶為兩廣制府參軍以司馬公命往日本閒諜之關白果死實乃𢹂碧蹏所亡火器歸諸執事奇之未及報命而朝鮮倭已退後司馬竟寢之且以廣海兵分屬實以禦倭奴遊盜而柳杜適其其部實因感往事痛叔祥死而草血未乾旌旗居然在目不覺髮上指冠也蒞事之初即走余乞一言以紀其事余聞土人備談其故事因嘉實之功而壯祥之死乃為銘以銘之曰皇皇上天福善禍淫彼桀黠者胡為有生桀黠既生長蛇封彘噆腦吸膏日無寧已於赫皇威爰整其旅桓桓虎將郊壘是恥窮獸逃林猛虎突犇驅市而戰祥用先登以虎博虎其力兩當牙銛爪利禿者先傷禿者既傷亦折其利遺臭流芳處死則異其芳愈流其榮愈久廟貌如生童犇婺走童犇婺走生氣益靈歲時伏臘山傾海吞餚山醞海飲之之千秋萬祀其福無涯電白苦藤嶺化城菴記萬曆丙申春二月予之雷陽道過電白西二十五里許曰苦藤嶺見茅茨施茶結緣者余以乍入瘴鄉炎蒸毒人心悶力疲適見津梁欣然如入化城也乃解衣盤礴熟睡而起訽其所因乃善男子易真潭集善士十餘輩同設以茲地為羅旁後戶昔未平時盜賊出沒道路阻塞今雖平猶為畏途況當瓊雷喉舌地行者戒心下有湯泉滾滾履如蹈鑊故藉茶以慰往來非演法也且云期以三年余誡之曰慎無以限量心行難思事他日將建梵剎於此為終古清涼地也秋八月制府檄回五羊越二年戊戌施茶期滿行者二人謁余於壘壁余與授具戒仍令回其所隨具疏令真潭等募為興建資不二年而告成額曰化城意取前往寶所中路以止疲極之意也今年庚戌真潭年七十婚嫁畢乃禮曹溪願乞披剃為佛子余欣然為薙染焉法名福城意取善財南詢參訪知識為發足地以蔑戾車有人能垂老披緇信根不易見也以此道場始終於真潭一人仍令回菴專修淨業禮誦六時是余南來立一莖草度一頭陀將期傳慧燈於炎方灑甘露於瘴地作苦海之津梁濕火宅之乾𦦨以衍無窮之利益也故特具始末以垂貞石冀不朽云法性寺優曇華記并銘萬曆己亥春王二月朔余遷粤之四年先是釋楞伽成為菩提樹下諸弟子演法華楞嚴唯識經論各一帀緇白傾心翕然嚮風是時法性寺主延歐生伯羽為諸沙彌教授師具禮余主盟斯道時時激揚之乃立法會於毗盧殿之玄冥所建會之先二日余適至弟子通烔告余曰庭除涌金蓮華一朵請師觀之余見而喜曰此余所聞者一而見之者今再矣斯為法道之應其華產於蕉本抽莖而挺生其中宛若芙蕖而色若黃金其葉堅厚倍之瓣瓣叢簇含裹香蕊狀如玉簪中虗而體潔盛甘露漿吸而飲之香沃肺腑葢世所希見者如佛所云優曇華解之曰瑞應豈是之謂乎經云佛現於世閒譬如優曇華時乃一出正猶麟鳳芝草之生於嘉運耳昔姚秦時連理華生於殿庭占之謂有西方聖人至因訪襄陽之道安安薦羅什萇遂興鐵甲之師十萬以呂光為大將伐龜茲而求什什至而秦之佛法自此興葢連理華即俗所稱並頭蓮耳甞憶余齠年初棄家吾祖西林大師延守愚先師住奘師塔院先是三年殿庭忽涌金蓮產於蕉本觀者日數十萬指識者謂為法道之瑞未幾而迎先師居其院江南法道之興果自此始余法兄雪浪迄今名播寰中不忝慈恩之窺基此余聞此華而徵之者一也及余年二十五臥病三月先於庭前手植蕉一樹其葉扶疏高丈餘其中抽金蓮華一朵大倍今之所見者每侵晨接甘露盈杯飲之清涼五內如是三月不萎疾竟以瘳長老咸謂宛如奘師塔院者余私喜曰斯豈佛法之兆耶是年冬予即棄家從遠遊以至今日而今之所見此華者再也豈無謂耶且夫麟鳳芝草為造化之精英天地之正氣鍾之在物為嘉祥之瑞應在人為羣生之利見故如來出世如優曇華孔子曰鳳鳥不至河不出圖吾已矣夫由是觀之瑞不虗應應必有由矣昔者禪脈東流其於也䟦陀建金剛於法性智藥種菩提於戒壇且曰百六十年有聖人出及達摩初至於五羊盧祖露頴於風旛寶林開墓曹溪衍派光昭日月道被寰宇而此地寥寥幾千載矣豈非枝之大者披其本耶祖曰葉落歸根來時無口有情來下種因地果還生嗚呼優曇再現佛日重輝曹溪涸而復漲覺華凋而再榮是有望於今日也廼記其始末而為之銘曰耿耿景星燁燁慶雲瞻彼至人我心匪寧鳳兮在郊鱗兮在野邈矣至人我思曷已彼曇者華為蓮之瑞從空湧見豈曰無謂閻浮之金華色如之甘露之漿其味若斯連理於庭鐵甲於疆至人實來斯道孔章航海越漠於茲立旘拔者伊何獵人之隊旘之拔矣逝之極矣無往不復優曇出矣優曇載出於窪之隆我生三見斯道何窮重修龍川縣南山淨土寺記南名山多福地其源自衡岳而下度庾嶺至韶石結為曹溪開禪源一脈又東千里經會城而出羅浮仙蹤聖概為鉅麗焉又東數百里適潮惠之中曰龍川古循州也其治據惠上遊當甌粤之衝地接䖍漳崇山峻嶺獞猺雜處往多賊巢民獷猂而難治昔之蒞茲土者鄙視為傳舍坐瘴煙毒霧中憂悲眩瞑將自治之不暇又何暇治禮義興教化哉其俗自漢趙佗歸仁始知有君至唐韓公祭鱷始知有文其化自六祖傳衣大顛振錫始知有佛是知天地有常經造化無常準山川之待人若形之待心心真則形化人傑則地靈良有以也若循之山川猶故吾民俗猶昔人往時以遷客名未聞以吏治振者今孫公之治茲邑不三年而化成摩民以義導蒙以漸因事以權置學田建梅閣造橋梁築新城皆捐俸廩為之至若修南山佛剎則皆亡夫人之簪珥奩具盡捨以作莊嚴將資淨土以修冥福是皆神道設教即事見心為苦海之慈航長夜之慧炬也其山當邑南面㠂峰而環大江山川奇絕林木蓊其寺始於唐意剏自大顛禪師法盛時也後因故址為二賢祠以祀宋門下侍郎蘇公轍諫議大夫陳公次升後為羅姓者踞為墓地嘉靖己亥督學吳公復為祠并宋丞相吳公潛而祀之曰三賢則寺之名幾漸滅矣公政暇每出遊其閒流觀俯仰素有慨焉及夫人卒於宦邸臨訣時神情靜定端然念佛而逝超然蓮華中人公有感遂傾奩以重新其寺別祠宇為殿三楹塑蓮池海會諸佛菩薩八部諸天像森羅雲列莊嚴妙麗光明燦爍儼然淨土真境也其左右配列齋厨禪室靡不具備延僧某住持朝參莫禮鐘梵交音斯則西方淨土端在目前神識往生不離當處語曰境隨心變地以人靈以其大墜山河不出此心之外也由是觀之則公之心高揭於山川夫人之靈常居於淨土上祝國釐下為民福公之功德將垂之無窮豈區區福田利益而已哉工經始於某年某月落成於某年某月舊稱南山今名淨土志本因也公姓孫諱雲翼字圖南金沙人記之者白下長干僧德清也休糧山社記余昔行脚時同妙峰師過平陽之墟結霍山之陽遙望羣峰蒼翠秀雲漢煙林蓊意必有聖道場者師曰此休糧山也昔有道者啖柏於此因以為名後建梵剎曰慈雲予未及登覧而過焉予居五臺去東海之嶺外迄今三十七年居常恍然心目閒也壬子春清涼竹林空印師遣弟子悟慈持書訊余於瘴鄉因詢師法道之盛且云諸弟子輩久受法利者皆各散隱居擇名勝以養道緣因出師休糧山社約及本寧李太史序予讀之喟然嘆曰嗟乎山川之勝待人而興苟非其人道不虗行豈無謂哉緬惟釋迦降神迦維應真英傑之士萃於靈鷲因緣唱道祇桓雞園皆隨緣應化之迹此葢法社所由啟也道法東垂凡域內名山在在皆為唱道之所從古至人未有不踞勝概託靈秀而能永垂法化者清涼觀國師剏演華嚴於五臺道被寰宇為有唐七帝之門師自爾以來寥寥千載今空師重開竹林大弘圓頓之教十方雲集萬指圍繞豈非一代之盛歟今其徒能以體道為懷志尚幽棲心存白業追休糧之遺事布法雨於慈雲集諸緇白勝流開不二之門建平等之會六時蓮漏一念精修晝則講演以明宗夜則安禪以息念戒奉波離行遵般若頓使巖樹庭莎猿嗁鶴唳皆挺法身而宣妙義向者幽陰窮寂之鄉煥為耀古輝今之地豈非山靈有待於人道與時行機緣會合而然耶抑啖柏之心不泯於今日也耶余因昔過其地觀望其形勝今居瘴鄉遙聞斯舉心地清涼想見其嘉會略記廢興之概以結異世之緣若夫建立之規自有主者約法在重修海會葊記并銘嶺南與楚接壤曹溪望南岳相去千里皆崇山峻嶺岡巒盤處處多佳山水自六祖大師道振嶺表弟子讓師開法南岳自是名僧大德肥遁之所在在有之凡經單棲者久而遂成寶坊福地為一方觀望隨地有焉宜章當兩山之中近韶石而隷衡陽往來通途所必由去治五里許有山名厚培峰巒奇秀叢林茂居然一勝道場也近為里人李君業乃捨為菴延大用弟子真潤居之以為十方雲水高流暫息之所名曰海會葺始於萬曆己卯迄今癸卯又為風雨所薄蝕潤之徒如堯復重新之上有佛殿山門各三楹左右方丈齋厨諸所畢備有田百畝可輸糧二石其畊可給十餘人往來雲水一飡一宿可無外求斯則猶然一化城也余居嶺外八年當道延入曹溪為六祖大師執灑埽役葊僧如堯謁余請記因直記其事乃為銘以銘之銘曰於維南岳奠彼荊湘抽枝發幹裔彼遐荒蜿蜒千里庾嶺高盤寶林中峙曹溪水寒曹溪之水源從西竺爰有至人濯斯道骨道骨如生水流不息散作醍醐為霖為澤宜章之陽厚培之麓乃涌化城為斯民福化城不遠寶處所近接彼疲息齊來歸命歸命我師得禮真容願保斯土福祉無窮南雄水西集龍葊記庾嶺自衡岳聳幹東走而下南浦領江湖而北朝宗其淩水則背馳而逝入南海雄府據上流綜百粤搤其咽喉屏翰中原實東南都會挈建瓴而督百川此其要也郡城負嶺襟江兩河合抱居然雄峙望大海若空中乾城遡流而上者若登天摩雲可望而不可即此其山飛水走停瀦不滀則生理不留故民生遑遑逐利如逐波浪求其殷實集儲以備一歲之不時者鮮矣故天地山川如四時之不並難得而完固必賴人以裁成是以補天之說非誣也觀昔之治茲郡者稍具法眼則不免乎蒿目之憂而有輓頹波障百川之志則必為之假人力以補之凡有事於此者則必建廟貌竪浮屠設鐘鼓以當之往往奏捷如聲響而人竟莫知其故請試言之凡物之靈而變化莫測者為龍故人君象之聖人猶龍而雲行雨施萬物資焉至若堪輿家言九流之不齒也且曰尋龍而鍼其穴得則燀赫如燎然何耶葢鍼灸而得其脈則擅起死回生之功如人之疾在膏肓者藥飲不能達則必以鍼艾而達之是知截風龍注地脈則必建廟貌竪浮屠設鐘鼓猶夫治膏肓以鍼艾也且而天地一身也陰陽一氣也山骨而川脈夫龍德而隱者也性𦦨而莫能制昔之豢龍者必有術焉操其術則望影而伏凡術之靈者必至要不知者以為神奇然物有所好則必有所惡如人惡濕鰍惡燥水火相制寒暑相劘固其理也復何難哉夫龍好隱而惡顯畏金鐵而懼鐘鼓是以身觸則戰耳觸則震心觸則伏故古人降龍者必以鉢盂錮鐵也故能馴其性而匿其形故以聲而隨入之則化是可以留掌握伴形影而不離此其祕者無他得其性也故地亦以之嘗竊觀夫雄郡之勢山水躍如飛龍也豈易制哉故東河上流則鍼以延祥之塔此百會也西河右腋則鍼以仁和之塔此腰腧也至若水西則命門也菴曰集龍豈無謂哉葢若周身之脈而綜於命門包氣海而注精華最為要者惜乎規模狹小而不足以當之如體大氣薄疾深而劑微況復尾閭以洩豈易捷耶故昔之幾廢而再振勢使然也今夫三峰水口猶尾閭也比建塔院以鎮之如扞門然噫斯舉也非夫具法眼而操降龍之術者何以與此此塔之施艾如塞尾閭以收命門實精華而保元氣實於雄郡生死相關者也豈特休戚已耶儻能拓其基址弘其規模考伐其鐘鼓諷誦其經聲輸精誠以達神明使龍聞而伏天聞而悅人聞而感化物沾而敷榮雨暘時若災祥殄若福斯民於億兆祝皇圖於永固保斯土於無疆由是觀之福之聚龍之集也菴名集龍以龍之集集於是耳菴之剏其來不可攷隆慶初僧真亮苦居之以誦經貲置贍僧田若干畝未幾化去其徒不能守予居五羊門人如鑑至此憩息跪誦襍華經精苦三年郡人信禮之欲行而固留乃大更新又三年而功苟完越癸卯冬余往曹溪執役六祖親過此菴知不獨為一郡要且為嶺外雲水衝也余又將聚雲水為龍之命脈山川之靈得人以參贊之又溥法雨於恒沙潤靈根於浩劫斯其福利又不獨為一郡一人而設也周覧茲土旬日而得其概因茲菴之小以喻山川之大直發其蘊以告未聞
