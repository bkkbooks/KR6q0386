body:
  text: 侍者福善日録門人通炯編輯嶺南弟子劉起相重校書問與周海門觀察頭陀蒙以甘露見灑清涼心骨頓啓沈疴此段因緣實非淺淺別後之懷大似空生晏坐石室時見法身不離心目間也嘗謂個中事須是個中人嶺南法道久湮幸得大悲手眼一發揚之使闡提之輩頓發無上善根比雖入室者希而知有者衆歸依者日益漸隹如菩提樹下與曹溪諸僧最難調伏近來回心信向者蓋已十之二三矣惟此一段真風皆從大光明藏中流出足證居士此番宦遊實是龍天推出乘大願輪而行也曹溪志今始刻完幸垂一語置之篇首發揮六祖光明點開人天眼目庶不負此嘉會也又柯孝廉於五月省中相見如再生人此君根性猛利能於憂愁疾病關頭頓然打破生死窠窟真豪傑士憶居士云人人皆上根第無大爐鞴耳此君非座下何能一開發如此非上根又何能猛勇如此將來海表正法命脉實賴此君願佛力加持以色力康強不患不如古人山野年來說法如與木人聽方外弟子中近得一二人稍可鉗錘俗諦中一時信向而真履實踐者獨順德馮生昌歷此子少年靈根頗深鄉黨一時歸重無問老少及門者咸師事之其真誠動物故孚教如此觀此子決志則將來不退可起江門之續斯蓋嶺表法道機緣運轉之會也近聞與陶石簣太史遊此公氷雪心腸非一世清淨戒中來與山僧相會時惜機緣未深耳若得周旋更大快事屠長卿近與德園同志亦當時導引入此向上一路也鄭崑崖中丞公蓋真為生死人近在林下深知愜懷第與山僧會時此向上一竅尚未開發居士能以此事委曲通問相慰足荷慈悲不淺也此中法緣漸開弟子中受化之機前書已具聞之尚有二三未成熟者儻天假之以三年或稍有可成就者足以不負此行諸佛所護如來所使併法門知己所望耳答任養弘觀察此段工夫只在急流中石火電光裏手親眼快方是大力量耳承示此中得大清涼安隱便是頓證菩提之第一義也第恐照力不堅被他流轉而不覺知若覺知則雲散雨收光風霽月其樂自不可喻矣與祝惺存觀察名以豳我聞佛說一切有為法如夢幻泡影憶昔奉教周旋今則恍忽如夢別後曹溪如命種種皆如幻事今則視之如泡然妄想心中但如影耳惟大智觀之豈外此耶曹溪中興一段因緣秋毫皆出慈心三昧即山野無量苦心總皆悲願攝持功雖未竟而大概規模聊為中興祖道一代事業在山野固不足録惟尊慈一段護法光明終不可泯茲弟子輩手録一往實事列為十款敢乞法施為文作金剛幢當與六祖法身相與無窮實千載之下中興一大事因緣惟願出廣長舌遍覆大千令見聞者普入大光明藏也與丁右武大參字覺非公與山野此段因緣固自大奇海內識者亦莫不稱奇良由我輩皆墮世出世閒二種知見我慢大障習氣種子覆蔽本有智慧光明公墮此故鍛羽中途不展搏風之翼山野墮此故法幢中折不克振佛祖家聲賴諸佛廣大真慈不思議神力同以迅疾法雷而擊破之彼此人事不同而所遭爐鞴同既而所投苦趣同且竟以性命相依同豈不欲出生死同證菩提同耶故共將一篾束之一齊拋擲東洋大海直欲吾輩頓將歷劫粗浮習氣人我是非恩怨得失種種垢濁一洗殆盡耳不然何其同死同生亦至於此耶嘗謂此則公案古人難調伏者都用此一機如昌黎東坡吾門覺範諸老皆是物也若昌黎之固執非大顛不化東坡之我慢非儋耳不消覺範之見習非瓊崖不泯然此數公陶冶皆同而所遇不同故不稱千古奇事惟公固非昌黎而山野竊不敢望崖顛老山野雖有愧覺範而公不讓東坡即其今日因緣大越前修真千載一時慶幸多矣若公無禪喜見志山僧無楞伽印心仍循故道而歸豈不負此良緣有孤天造耶所以同處經年不敢以此向上一著略露微芒者以公之上根利器自可一超直入正如涅槃會上廣額屠兒放下屠刀便作佛事殊非區區者比蓋入道因緣固自有時節耳不意遽爾言別真念百劫難逢今幸相值豈肯輕易放過故山野不自知固陋而於風波之末若冀承歡喜一決死生無三水之猛省回淇之堅誓山野定不捨跬步必追至曹溪原頭水窮山盡大休大歇而後已也所以然者惟公以菩薩信山野之心以骨肉待山野之身海內知己皆以出世奇公與山野之遇苟山野不以此段大事因緣剜心摘膽以呈公又何以慰知己之望報公非常之愛哉公不以荷擔如來為己躬真切事亦非所以愛山野酬知己也此段工夫萬萬不難惟公真心本體般若光明堂堂獨露所以胸包星象氣蓋乾坤直以粗浮瞋慢習氣時時發現自障妙明故吐盡肝膽而人或不見信費盡慈悲而人或不知感公諦思此外更有何事愧於人哉吾佛有言一念瞋心起百萬障門開此普賢菩薩利生之大忌以瞋與慈悲不兩立耳唯今但願消得一分習氣便露十分光明除得一分瞋慢便立百分功德古人所謂不用求真惟須息見又云不必別求放下便是又云看得破佛也做永嘉云從他謗任地非把火燒天徒自疲我聞恰似飲甘露消融頓入不思議於此足見古人無他長只是肯將胸中不可人意的事一齊放得下只是人所不堪忍處自己忍得過始也生忍若忍至無生則頓登佛地又有何微妙伎倆以塗人之耳目哉前曾有聯云念頭起處即看破事未至時莫妄生此言雖小可以喻大此後願公第一入忍辱法門做省心工夫作放下事業回視從前半生行腳都是夢事一口吐盡不留絲毫赤力力𨁝跳打起精神踢翻窠窟揭出斬新日月別立生涯如此方始是大丈夫蓋天蓋地不負生平之氣象自有天龍拱手魍魎潛踪此正修天爵則人爵自至以此較之虗浮想相與作真實不朽之功德者蓋霄壤矣如是可名覺非居士孟浪極此高明以為何如儻知己不以為欺則芝蘭不足比其契金石不足方其盟是乃金剛種子歷劫不磨願與公生生世世同為出世津梁共作慈悲眷屬度盡衆生而不相捨離也山野今日之言方畢露肝膽痛絶常情出世之盟訂之於此若果見信乞將從前與公札子一火燒盡不餘一字則百念成灰請從今以去凡與公書非藥石不發字字願效吾佛真語實語不妄不綺之戒公之所教但願以別後日用工夫省力費力處易過難過處互相激揚以成一代偉績願公先向生死關頭作一關吏耳此關一透則可掉臂遊戲戈戟場中是非堆裏處處頭頭放光動地現宰官身作大佛事如是可稱出世雄猛丈夫殆非古今世諦豪傑可比萬一也別離不遠生死情長悵望各天葛藤遍地願慧劍一揮不留毫髮惟高明努力圖之又別後日復一日杳無音問去人滋遠思人滋深每見惟吾未嘗不驚吒相問以何因緣而消息頓斷如此忽得手書雲中冉冉而至開函恍見顏色且字字皆從真心實際流出悲喜交集及觀照心時現行住坐臥不離者個數語不覺喜心倒劇不謂於今忽然得聞希有之法也嘗謂此道在人本自具足根不論利鈍悟不拘遲速只在當人自信自肯耳所謂一念回光便同本有豈向他覓第開發自有時節因緣向所得三吳諸故人書企望居士頓入此道以同體念切故有許多擔憂似乎居士習氣偏勝於此為難獨山野觀居士脫體瑩徹如駭雞犀枕即有所偏皆屬客邪所感非本然也以入道如一鏃破三關耳但肯心一發則真有一夫當關萬夫莫當之勢又何敢較其遲速分其利鈍乎是則為居士憂者如為郊邯鄲之步者憂其不成武耳從古自有出格沒量漢安可與尋常比耶大概此事直是貴在勇猛一踏到底若習氣忽發但猛的一拶如霸王之力山舉鼎一齊用盡又如一聲叱吒千人皆廢如此又何患習氣不能消磨才有一毫不能消磨之念便墮怯弱就覺不丈夫氣矣此事端在關心愛憎最難打破處著力一椎若此處一破則百千萬種關棙子一時齊破若難處不破縱將百千萬種佛法知見道理一口吸盡都無半點實用世出世閒通無利益何以故以病根未拔猶如鼠毒遇雷便發若病根發任作多少功名事種種伎倆都是病行大非雄猛丈夫行也既行非丈夫又何以稱丈夫負超世之量哉竊歎居士人品才華功名事業天資學問件件過人若病根不拔但能陵轢一世不能陵轢千古若肯將生平所負聰明力量一齊收束聚精會神攢簇於此一大事因緣上一旦打破則將從前萬劫千生種種恩怨榮辱是非得失煩惱業障一齊化成無上菩提光明種子矣從此一番出頭來凡有所作所為纖毫事業皆從此段光明種子中發揮事事法法皆成不朽此吾釋迦老子棄捨王宮割斷恩愛雪山六年苦行博得底在居士一旦席捲而囊裹之豈非一大雄猛丈夫哉常笑勾踐以會稽之恥乃二十餘年臥薪嘗膽其志止於吞吳而已何其陋哉山野每謂煩惱之賊歷劫侵吾正信不止一吳以之隳法淨土破涅槃城置身苦海漂流無涯不止會稽之恥吾人苟能切齒立勾踐之志以復歷劫生死之讎正不必二十年之功也以彼為之在人而此為之在我既為之在我又何憚而不為耶又承示當此逆境大得受用極為歡喜大段於逆境中得大受用皆大丈夫之能事特家常過活耳無甚奇特處只是日用現前順境熟習慣便處不覺發現被他瞞過此處為難耳且如目前無論大小不如意事此逆境也觸著便怒即被他觸動動則有苦便不受用此正是熟處難忘耳生死機關只在此一轉處此處轉得過立地便是聖人若轉不過依然墮在煩惱窠窟裏此急流處一撥轉關棙子便是撥天關之力量非居士大力量人金剛心地斷難施展古人所謂佛法無多子正此謂也大概煩惱處得受用快活方為真受用耳居士生平煩惱極大而快活處亦大即今若能將煩惱窠窟一椎打得粉碎全身跳入快活場中回視百劫千生習氣影子一口唾盡此真是天上天下第一自在沒量大快活人也居士能以此為孟浪否乎今日完滿道場目前無量快活事恨不得與居士共之聊以此報平安耳又貧道此萬里之行仰仗諸佛慈力聖主弘恩坐此瘴鄉得了此一段大事真百千萬億劫最上因緣也惟念居士與貧道同此甘苦豈不能同此法味乎諺云日出事還生塵海茫茫終無究竟得偷閒處且偷閒念此丈夫之軀撑拄乾坤除却世閒事更有出世閒無窮樂地豈可以目前幻化世閒妄想便為究竟乎居士別來二載想於看破處腳跟一步必能漸入佳境矣居士金剛心中一咳唾耳何如與湯海若祠部長干一別眨眼十年舍利身光居然在目即種種幻化之緣皆屬空華佛事耳山僧坐此瘴鄉賴三寶真慈攝受之力無諸煩惱且以法緣消磨歲月刁斗不異折腳鐺耳無奈歷生文言習氣橫發於無事甲裏千日之期除奔走行伍供役之暇諸著述不下數十萬言雖無補於至道聊見區區一念孤光不昧於羅剎鬼國耳諒知我者不以此為迂也與劉存赤吾人多生積劫五欲淤泥七情業火深而且熾豪傑之士靡不為其陷溺燒煮求一念回心了不可得況望其生遠離心求出苦道專念栖心於淨土乎此又不獨蓮出淤泥而又根從火發也何喜如之吾人欲出生死者要知生死之根欲求淨土之本殊不知淨土之本即生死之根也是在此心一念轉變之閒不遺餘力耳願公諦於日用現前境界妻子團圞之際朋友交接之閒義利交攻之處喜怒未發之前預先著眼覷定真真實實諦諦當當要見如何是生死根即當極力拔之然而吾心本淨其所以穢濁者實此根株之弊垢也苟能力拔其根則淨土不求至而自至矣所謂一根既返原六根成解脫者正此謂也若於根本一念覷透則日用頭頭無非解脫之場盡歸極樂之境斯實身雖未到蓮華內先送心歸極樂天矣與鄭金吾貧道下劣無似第一朽株耳昨者雷霆震驚時望者如傍劫火乃承座下橫放身心攘臂而援之種種方便救濟志在必生而後已不減長者之於火宅諸子也別來兀坐瘴鄉每生疲厭則興懷座下不覺頓增無量勇猛度生之願今蒙聖恩所賜餘年即其所說之法所利之生皆出於座下之金剛心地行願無窮而功德亦無盡矣下劣走入瘴鄉瞬息千餘日愧有漏之因不足以酬無相之施願以法謝謹持近來所作佛事法言數種奉慰慈念以報知己更試省覽聊見空中鳥迹以尋道人行腳事不離車塵馬足閒也與何金吾嘗憶古人白頭如新傾蓋如故與夫不言而道自存者有之至若當患難死生之際睇盼於縲絏桎梏不言而心識者蓋亦希矣何者人易感於心知恩難施於不報耳往者山野以無狀上干宸怒下鎮撫鞫時雷霆在上鼎鑊在前即昭昭耿耿之懷無容見白執事奉節監刑且低回猶豫於捶楚之閒藉令形如金石豈能當其爐韛耳幸賴足下一言而決之真若灑霈雨於烈焰投甘露於枯腸頓令五內清涼躍然生色亦不自知在刀鋸閒也在朝廷三尺之法未少假藉第側觀足下不忍之心油然現於眉睫蓋已深知足下為仁人君子矣徒銘感於心然不知足下為誰氏也山野深入瘴鄉當饑饉之餘濵九死之際念足下高義未嘗去懷頃值貴僚友詢之始知足下為何君也謹修尺素用布懷德之私答鄭崑崖開府遠蒙白毫東照萬八千土光中苦行頭陀儼如面禮慈容親聞妙義復荷甘露見灑塵習頓空踴躍之懷非言可喻貧道聞菩薩妙行妙在歷境驗心煩惱空處不用別求般若諸塵透處即此便是玄門伏誦實際一語真翳目之金篦也親承有願接足無時妄情依依益增傾倒惟真慈攝受不捨有緣風便更希遙垂一手是所欽渴又五羊久稱蔑戾所居壘壁非蘭若也貧道仗聖慈以萬里為調伏兢兢執役爐錘閒且幸以毒除毒其於狹劣習氣似漸銷鎔誠如飲水然終似陸魚溥沫耳嶺南曹溪乃六祖演化地禪門洙泗肉身在也貧道竊願持一培土以徼靈於寂光潛消舊業初不敢放捨身心第恐失伍時復往來行閒今賴當台寬假似可息肩頃乞食凌江忽奉瑤函自天而下如天鼓音三復慈旨真無邊大悲不捨有緣於微塵毛孔耳獵隱一語誠痛處劄錐感激熏心頂謝無量承示隨處安心此正塵塵解脫願善調伏以廣舟航是所至望答葛自修承示自幼即知自問心是何物將謂肉團是心死後身尚在如何不靈於此覓心不得數語不覺驚歎不已以山野自入法向道入山修行以來今已三十餘年所閲海內緇白中初心向道者蓋未見有此等發覺初心也良以一切衆生佛性是同但以宿習般若緣分淺深不一及多生所近知識聞熏種子邪正頓漸之不同故入道之志有邪正誠僞遲速之不等耳足下所言皆多生親近真正知識聞熏無上般若種子習氣內發故自幼不覺失口吐露且此種子根深故切切橫在胸中扼塞不能暫捨是以吞不下吐不出大似一物梗概於中只是覓不得耳由把作一物却覓不得生平思慮不能自信自決但逢人即向他尋覓見指點虗空便只當虗空會及聞一喝又作一喝會且虗空是色一喝是聲由多生在聲色裏流轉習熟所以今又被他流轉將去所以被他流轉者只是將此心當作一物把聲色當作聲色所以日用見色聞聲便與心作冤對耳此正謂含元殿裏覓長安如何能得脫樊籠哉豈不見古人道喚作一物即不中又云切忌從他覓迢迢與我疏又云見色非關色聞聲不是聲又云聲處全聞見外無法此等言句雖能令人死亦能令人活大概生者令死死者令活耳足下自謂覓心不可得此等最是親切處如何不信自心反更別生種種思慮而他求耶豈不見達磨面壁時二祖神光曰我心未寧乞師安心磨云將心來與汝安光良久云覓心了不可得磨云與汝安心竟自此以後此語流布人間謂之單傳直指六祖以下南嶽青原以至五家千七百則普天匝地說禪說道了生死者不可稱計是皆從神光覓心了不可得一語而來足下必謂心是一物可向人覓而師資亦可授手者且看達磨將甚麼物親手遞與神先又親手接得個甚麼來且人觀光覓心了不可得一語與足下語一樣如何神光便是而足下不信若謂足下志與神光有二則衆生佛性有二若與神光無二如何神光不疑而足下更疑若謂即此不可得者就便是悟如何神光一悟永悟而足下聞喝之後既云疑團不知向何處去何以今日於祖師公案上又不通而文字又作障礙耶但看過在甚麼處且當正聞無念喝時如何得疑團頓去見個甚麼便得瀟灑今日為何又不灑落即看不灑落處是誰拘縛文機不通處是誰障礙足下但著力就在痛處下錐錐到沒下落處忽然親眼看破方信此心不是物不假外求始知從前錯錯到底不錯不錯到底如此時節方信山僧今日之言大似揚聲止響畫蛇添足也語不及意信筆草草不覺葛藤遍地足下覽過即唾却燒却又不可留與後人作話𢺞起疑團也與胡順菴中丞法駕東歸之計知公肝膽決無遺䇿斯亦下願耳但人生福祿皆自前世預定豈可以人勝天萬一不能如此又豈可坐待解脫方能進道即今外居軒冕內蘊佛心至若遇物臨機興慈運悲所謂觸目皆是成佛種子無盡福田但能稍加留神即一日之閒所作功德尤較區區千萬什倍且公權如天地生殺所在善惡之機諒能明察而幾微之間所係極大運籌安攘之略在公大智之中猶一𬱂耳但以慈為根以悲濟物廣行方便安然取乎大定之中如此即是現宰官身而作佛事豈可與為一身之榮者同年而語耶藉斯梏桎轉為濟勝之具矣又何汲汲却跡逃形而坐馳日月也千里之思無以為獻此腐言用發公一唾何如又山野生平以直了生死為念二十餘年若志山林即不能徹證上齊古人至若生死關頭良以自信一切魔冤皆究竟菩提莊嚴佛果其他禍患得失是非毀譽付之自然又何攖寧故自罹難以來一念清凉心地未嘗暫移從去冬十月於濟城馬首南向徹骨氷雪於臘月至白下迎老母於江上歡然作別八日即揚帆而西也所賴情枯智竭幻影全消明鏡止水聊以自適此段因緣從大冶爐中煅煉將來幸無為我縈抱但願靜養天和以胥至樂儻天假生還尚圖了未盡因緣相伴餘年也又貧道自涉難以來實濵九死直今正眼覷之然未見纖毫動靜相即萬里相懸其實不離跬步也念與居士忘形半生諒能入此法門久矣豈復效常情馳去來想栩栩然作夢中悲酸耶貧道此段因緣不獨超三十年行腳適足以超曠劫修行雷陽炎蒸如火鑊瘴癘死者澤若沃焦貧道兀坐尸陀林中飲瘴烟如灌甘露忍饑虗若飽醍醐苟非智竭情枯何以消受近得大將軍為護法已借一枝於會城壘壁間荷戈之暇閉門枯坐諸緣頓斷唯披閲楞伽究西來心印了未了公案福善金剛心已化作光明幢可不忝門牆古人嘗謂祖禰不了殃及兒孫貧道所幸不墮此語矣佛謂以七寶施滿恆沙不如持此經四句知居士不忘貧子敢此以慰其他復何所云又山野坐蠻烟瘴霧中且喜生緣日薄道緣日厚形骸愈苦心地愈樂是則何地而非君恩何莫而非佛力耶此可與知己者道難與俗人言也不審法體何如摩詰有言欲知除老病惟有學無生況百歲光陰如撚指能幾何哉居士春秋日高前景日窄從來濁世滋味備嘗殆盡諺云到底鹽如此鹹醋如此酸到了作何究竟古人云來時儘好只恐去時不如來時此非虗語居士諦思從前功名事業與夫兒女計皆是他家活計如何是自家活計耶若一念猛省至此不覺失聲自然著急打整自己腳跟下生死大事若不著急打整還是不曾猛省不猛省一下又大非居士此等豪傑丈夫事山野二十年前即證居士言此一著故不惜身命願與之遊然雖半積陰功半養身混到今日就中一點赤心大似張良始終為韓之意與居士相與談笑十餘年只是虗華境界人情佛事而已其實未曾打破肝膽然與居士一寸心腸炯然相照亦未嘗不知山野此段衷曲將期白首同歸共了此事豈其一旦分崩離析亦至於此即此可以觀生死矣況今同在乾坤之內縱隔萬里天眼看來猶比鄰耳不能一承顏接色歡如昔日何況生死長途一別杳冥相逢何日儻山野不能生還是與居士長別再出頭來不知可能如今生今日也興言及此大可悲酸山野受居士知己之義非此不足以報居士信山野不至此地又非所以答知己也與周礪齊太史向雖心竊嚮公雅量未得深語昨持鉢王城幸接公於龍華樹下睹其道念精真喜徹心府然古人輕千金而重一諾者士誠貴在知己耳自爾山僧當盡命山海無復他慕賴公法眼圓明何當復咎瞶瞶者私念東方文運啓自我公而法運或當屬之鄙人耶世出世閒交相為用是亦兩閒奇事此非狂言實所望公以道自重者如此答周子寅伯仲世間聚散起止成住壞空有為法中理合如此何足為悲可悲者長夜冥冥中失此慧炬使諸佛子無所依歸將智種靈苗日為五欲烈焰之所焦枯不能圓成勝果耳惟六塵蔽乎性天愛草荒乎心地煩惱翳功德之林貪瞋攻涅槃之宅伐之以酒色之斧縱之以猿馬之蹂將日見荒蕪竟為鹵莾願足下心心念念以此自悲而滋培耘耨戒勒提防將鮮敷覺華莊嚴寶地冀普使天人各懷智種蠢蠕翹蛸齊登覺岸以足下不獨振家聲於永世適足以洗法門今日之羞非此何以望足下伯仲間也行役萬里足下體此猶比鄰耳與焦從吾太史念此末法寥寥龍天推公現宰官身建大法幢以作當代人天眼目非小緣也睽隔多年昨樹下相逢儼如異世人生悠悠夢幻如此且瞻道貌天形誠不起滅定而現諸威儀者自非心光密回何以圓照如此安可以音聲色相耶歡喜無量某愧鈍根下劣二十年來苦心山林猶坐竿頭殊無放捨之地然大事因緣誠不易易別時承教一語感荷無涯歸來兀兀虗巖心心獨照敢負知己時復海湛空澄法身頓現此中豈非感應道交耶閒披老莊翼乃集諸家之大成雖注疏多峻乃人人老莊非老莊老莊也惟公入此三昧甚深何不徹底掀翻耶某常論此老出無佛世竊且以類辟支如莊則法執未忘自入遊戲神通變化多端眩人眼目自非把臂共行鮮不為其播弄若覷破底蘊真有別解脫門此老萬世之下與公可謂旦暮之遇也某昔行腳中嘗以二老為伴時時察其舉動頗有當心者但難以言語形容耳內篇曾有數字點掇尚未録出容當請正與楊復所少宰讀曹溪通志序言言皆從大慈真心流出比見聞者莫不大生歡喜況千載之下不知喚醒多少夢中人也惟我盧祖大寂定中必現熙怡合掌讚歎耳黃生來復接法言且云猶有所未安第揄揚山野者似已太過惟海門公為入曹溪室中人敢徼一語更增光𦦨耳答載給諫承示因果之說了然不疑毫髮無爽所謂影響耳但前知惡人之說此理最幽而難明亦易信為必然者惟聖人之心洞然朗照前觀無始後觀無終如大圓鏡照徹十方一切精粗境界無不分明影現雖八萬劫事猶未為奇況數百千萬年乎所言善惡之人所作善惡之事此正因果昭然而易信者然百千年後惡人雖未生而其人惡業固已造就於多生之前冤對酬償固已分明定於先世矣業因未熟惡緣未至其人雖在十方世界輪回顛倒之中不自覺知而聖人蚤已照見於大光明藏中及惡緣一熟冤家會遇惡果成就即惡果之終一如惡因之始不待生心動念自然了知所謂觀彼久遠猶若今日此聖人真常之心也且夫因果無差不昧分毫所謂假使百千劫所作業不亡因緣會遇時果報還自受此必然之理也明公能諦信於此乎由是觀之不善之人非天定也乃自作耳與殷參軍與足下別來忽忽兩歲聞此時從征尚在黎中蒸暑已過玉體無恙此輩非黠鼠皆天民也殺戮過情大傷和氣知足下必不以此為功高也昨鎮府標總劉晴海去已屬之再三矣萬無以殺為功見時當浹洽耳舊有望瓊海拙作蓋言黎乃太古民也書之箑頭以見意答鄭孝廉頃辱書來乃知潛心此道且云於日用中善念現前吾人性自本善但為塵習所染故蔽其靈明於日用中祇用情習不用性真耳此所以凡民日用而不知知則聖賢可立待也公即於日用善念現前不昧處便是本來面目發現時也若時時現前念念知覺覺至純善之地則性真自復本體光明自然披露耳答鄒南皋給諫山野向在絶緣頃復幻病相仍養疴深居其緣益絶此實天賜為閒人回視塵寰擾擾勞生求無事人能得幾想知己必時時為一鼓掌也賴此護法得以安禪寂靜於楞伽三昧所入益深頃王光祿同丁大參赴端州制府約得書云大有流言於制府中傷山野者甚衆二公為之力辨幾於髮豎眥裂此果何謂哉以此知娑婆穢土土石諸山難與淨土地平如掌同日語也向北來徒輩相從者以無門托鉢今盡遣歸惟山野單丁寄此旅泊尤為輕快枯木寒嵒不減在昔非此無以破炎蒸消瘴毒也時惟國事艱難蒼生引領大慈悲者而津梁之願努力加餐為國自重為道自愛又屢荷手書辱慈念拳拳周至委悉自非同體大悲等心愛物者何能切切如此山野處此患難幸得以參塵中知識兢兢自持所入法門不淺年來寂寞苦空不減深山窮谷屏絶諸緣迹不入俗城中知己獨王勛丞一人經年不三過其門所幸與右武時相往來真天涯骨肉一食不忘非獨道義相裨即所資給亦損口分衛性命相依此段因緣大非淺淺此公肝膽照人猶如秦鏡遇物應機洞徹五內其為載道最稱上根利器此番天德陶鑄所進益大非尋常異日莊嚴佛土成就衆生不可思議面時想當歡喜無量也又中自庚子歲世相一變日見險詖苦海波濤望無涯際貧道隨風漂泊略無寧止始知古人以塵中作主大非細事隨緣解脫誠不易得每憶別時叮嚀之言及接來教切切以此再三致意諺語有之要知山下路便問去來人自非居士深入如幻三昧何能徹法如此嘗聞煩惱烈𦦨正是聖賢爐冶種種執著之習非此不足以銷鑠之苟非聖恩何以臻此久而愈見恩大難酬也此中轉塵勞為佛事更為六祖曹溪作無量功德此蓋從真切苦心中來較之昔日依無憂樹喫大家飯者實霄壤矣曹溪祖道源頭雜穢充塞久為魔窟今已灑掃潔淨尚有未了公案奈此中力竭正欲遣致尊慈作金剛幢適辱使者至斯豈祖意攝受哉敬以此中因緣述其大槩持入慧照儻念末法斯道寂寥望震天鼓音聲普告有緣一覺夢幻耳何如又憂患人情皆本體也非握至真之符又何能轉煩惱作菩提轉生死作涅槃惟居士年來所處如此足知大有所轉矣非此又何以消遣哉從來學道人皆在生死關頭掉臂而過前輩不能盡知近年若羅近溪則其人也貧道身在瘴鄉心存左右無時不共周旋是故居士種種三昧洞然無隱耳嶺南自曹溪偃化大顛絶響江門不起比得楊復老大樹性宗之幟貧道幸坐其地歡喜讚歎不窮也諸生俗習稍稍破執此亦開化之基昨復老為作曹溪志序真赤心片片可謂舌長拖地也呈上幸覽為此羣蒙歡喜耳與嶽石䭵別來兩奉手書知有鄒魯之閧嗟夫直道既不容於朝廷復見棄於鄉里世道可知已聞避地會城亦非久計聞之菩薩攝伏衆生深入如幻三昧原非實法公久入此法門幸無深搆當有排解者一笑而釋可也山野卜隱匡山甚得其宜但所云護法者荷擔有心檀門未闢未見拮据儻得文殊遙伸右手則可頓見樓閣門開也公其能無意乎又往辱顧視司城獄中不減慶喜之問調達於鐵圍也是時以醍醐灌口甘露灑心竟作兩閒奇事屈指塵寰豈能再見比於座中覩金剛烈焰閃爍人目別來畢竟忍俊不禁蚤為吐露不識邇於寂滅海中時復漚生漚滅否貧道走入瘴鄉所賴佛祖神力攝受以車塵為華座以馬捶為拂子時向羅剎鬼國談無生話令無數髑髓眼開光破黑暗誠不自知為業力所使又不知為願力所致耶諒知我者聞之必資一唾耳與虞德園吏部遙望居士踞天目之師子叱露地之白牛遊戲於西湖三竺之間水足草足況復師彌勒而弟無著聆性戒而覩華光其寂滅之樂知廣長舌相不能宣其萬一矣若貧道者以空華而邀空果持罪藪而入罪鄉雖於法性無虧第妄想者不無顛倒見耳如居士以法眼視我者能幾何哉覺音來持至言盈尺深荷慈念之至覩護法精心真能令人毛孔酸澀嗟此末法佛性之在吾徒如神珠之在溷廁不獨光明不露抑且惡氣逼人又豈直作夜合花美人子哉與樊友軒侍御先後接手教纍帙具悉起居比柯君來更審善安隱樂此中三昧如人飲水冷暖自知柯君別經年亦能長進如此足見憂患困厄皆助道具耳座下瘴鄉得此良友蓋天緣也楞伽新疏因緣皆從無相心中變現功德今仗加被業已苟完先致一部求正諒靜裏遊目不無漏逗萬乞指摘金篦更為一大法施也聞門下諸生日益進我聞如來不捨一衆生以大悲為首惟瘴鄉正座下悲願地冀無倦津梁為斯道幸與邢梅陽孝廉江州為匡山諸祖近寺檀越地般若種子於此偏多或焦之者衆獨足下抽芽發𠏉敷華秀實傑出前輩此非願力之深亦不能固蒂如此也達師往來層雲五老之閒非足下同遊山靈何以生色貧道嚮慕久矣恨無緣一把臂耳與瞿洞觀中甫文卿二友入京妙師已至法喜遊泳諒不索寞念茲末法二諦無人惟公現宰官身主盟斯道可謂法施無窮願以無限大悲度諸未度令其見聞獲益下智種於今生證菩提於後世是時回視昔因未必不自今日始也前所見諸公皆信心真切者願公時以法水溉灌靈苗不負其夙種耳是須以幻網三昧普入其身以一切智善巧回轉是則非公其誰哉鄙人深知滅裂有濫袈裟然切不敢增慢所幸辱在心知真期不二慶慰何言歸來諸念皆灰一心無寄日沈枯寂臨別數語實自圖之時方火宅燒然五熱正燃願公為道自攝無疲津濟是所至望又承慈眼相視供以五燈會元即公惠我三昧也山僧時時參請深愧鈍根下劣不能親見古人然亦略領剗除知見邊事恨不㘞地一聲以為慶快生平耳從此拈轉話頭他日或當有報知己豈敢有忘因地耶惟公塵塵按指海印發光遇物舉揚無非佛事但不知新發意中亦有堪能大事者否願公不違本誓隨宜調伏令種金剛種子耳每想威音餘賚智勝遺塵偶遇靈山一會意非此類則如來出世誰為當機然後之視今亦猶今之視昔也尊慈以為何如嘗來多寶問訊世尊無多憍慢嫉妒衆生否是當以此訊足下願時時為道珍護又龍華一別直至而今回視世間真同夢事思晤語印心如初會者豈能再得惟居士利生之願日廣入理之門益深福慧兩足自他俱利之行直進乎金剛心地矣山野為業風飄鼓一至於此且幸如幻三昧拔理障之坑此荷諸佛神力為之勸橋想居士知我者必大為之慶快矣丙申冬被放荷䇿南來時於都門別天池居士前擬取道黃岡入維摩之室不意路頭緣差竟過南康自入瘴鄉仗慈被頗能以氷雪心腸飲嵐癘之氣比及三年可免四大增損耳曾憶與居士夜談三教之宗以唯識證二氏之旨辱心印相可是時還海上偶筆之成書曰觀老莊影響論今始菑木楊少宰稱千古定論楞伽每慨讀不能句鼻祖指此為心印而宗教兩途竟為眥讎山野頃荷聖恩賜以空閒之地深悲無以贖壞法之愆荷戈之暇力究此經凡一言有得遂筆以記之不覺終軸謹併前論持請法眼決擇儻其不謬則山野不獨不虗此行實以不虗此生矣顧此乃文言之末不足以發當人之性源若夫於佛祖建立門頭曲唱傍通聊可以引一線耳
