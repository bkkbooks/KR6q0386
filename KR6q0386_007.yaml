body:
  text: 侍者福善日録門人通炯編輯嶺南弟子劉起相重較法語示太素元禪人凡學人先習教乘回心向上一路雖是有志無奈藏識中有新熏文字雜毒習氣舊熏貪瞋癡愛煩惱習氣內外交攻最難打疊要放放不下要斷斷不得要止止不住因此要提話頭如水上葫蘆遏捺不下只管與之打交滾最是難下手及下手不得便打退鼓了也如此乃是沒志氣無力量人説甚參禪如今初心只管將心內外一切道理知見及妄想思慮一齊放下放了又放放到無可放處方才提起一則公案話頭如趙州無字橫在胸中因甚道無重下疑情若疑情得力則妄想不起若才見起時切不可與之作對將心要斷他亦不得將心止他亦不可相續他但只見便撇過一撇便消急急提起話頭深深看則彼妄想自然掃蹤絶迹矣此是初心下手做工夫的訣若話頭純熟妄想自稀不作障礙久久疑情得力妄想暫歇時便得一念歡喜也得些歡喜處不可當奇特但從此好用功耳禪人棄教從禪初心最難故以此示之切不可視作小事示恆河智禪人持法華經禪人出家浮渡久執侍淡公得任持法門居化城有年化城乃刻大藏地為海內法窟禪人力任常住綱維百務老人適來雙徑禪人作禮請益願持法華經老人因示之曰佛為一大事因緣故出現於世所謂開示一切衆生佛之知見令其悟入所言佛知見者乃衆生本有之佛性也今被無明封蔀而為妄想知見故日用見聞知覺隨情造業以取生死之苦不自覺知我釋迦大師特特出世一番單為開示此事使之悟其本有不假外求若悟此本有則日用六根門頭應緣作用者皆佛智現前名佛知見非衆生妄想知見也若悟此知見則頭頭法法皆真實用心凡一切動用諸行皆真實妙行都為成佛真因矣故經云乃至舉一手或復小低頭乃至一香一華以此供養佛皆已成佛道微因小善皆成佛真因況身任衆務捨命為法豈非成佛之真種乎吾佛教人持法華經者入如來室著如來衣坐如來座如來室者大慈悲心是如來衣者柔和忍辱心是如來座者一切法空是禪人能奉如來三者之教乃名真持經人若不能入此三法門則單持安樂行品念念思惟心心願入晝夜不忘如此則六萬餘言字字光明現於六根門頭矣若不入此法門縱能持百千萬部但是與義作讐家豈真持經者耶若不信老人更當請問文殊彌勒示王鹿年丁巳元旦六日王生鹿年生長淮西來禮徑山謁老人乞語老人見其負義氣而有慈心因謂之曰子聞之古有大力之人乎敵人者愚敵己者智愚者常弱智者常勝之道也聖人教人以不用為用故曰柔勝剛弱勝強易曰剛而能柔吉之道也項羽拔山舉鼎力雄千古及敗別虞姬噓唏泣數行下是能敵人而不能敵己者也聖示人直顏子曰克己復禮為仁古今學者皆知克己之語而不能作勝己之業豈智也哉王生有力於此當不墮凡夫數可耳示在顒侍者顒侍者生於西蜀少沈賤役幸般若之因不昧少小即知參妙峰大師發出世心亦夙種內熏而使之然適遇淡居和尚入蜀時顒執侍直指徐公素喜其信心遂命禮淡和尚求出苦法剃髮為沙彌老人來雙徑顒充侍者日夜精勤無怠老人初憐其蠢蠢時時激發顒時聞老人開示衲子亦眉間津津動色是知衆生佛性種子待時而發也因請益老人乃開示以念佛審誰字公案教其參究顒亦能領荷第恐無決定為生死心不能𢬵命到底又恐宿習惡知惡見中道遮障流入邪網除此二病則單一念晝夜六時緊抱疑團即二三十年不悟不休縱今生不悟將作勝因來世出頭便知此事雖經多劫終不失正因種子若立志不堅用心不切別起邪思不但辜負此生即千生萬劫亦無出頭分也示在介侍者紫柏老人全身荷負大法欲建法門中興之業故刻力册大藏經此一段大事因緣非小小也末後全付擔於淡公一肩荷之經既刻而貯不得其宜則復化城之功又非小小化城復非一手一足之力侍者在介事事賈勇先登不避艱險其功居多此又衆中之尤難也嘗謂世人未有無所為而樂用者即古豪傑皆然況其他乎漢高帝天下既定功臣未封忽見沙中偶語問子房子房曰此從兵戈中冒矢石經萬死一生者皆欲得尺寸之封今未見封故偶語耳於是即封之此古昔用人之格也今觀介侍者初心無他圖圖出家耳今奔走七年化城定矣大法已得所矣其居功者寧無偶語乎老人謂今當可以如來之賞而賞之也介侍者即以老人得如來之大賞若不能奉如來法持如來戒行如來事萬一破戒壞法如來亦有三尺在也慎之哉示在淨沙彌佛説二十難中云得人身難生中國難得遇佛法難親近善知識難生正信難此五乃難之難者沙淨彌已具其四所欠者唯生正信耳今幸出家得遇大善知識為依歸又渾身跳在佛法大海此何修而得何緣而至若不奮發勇猛生大正信將此一片幻妄身心洗得乾乾淨淨𢬵一條性命志出生死廣修萬行結成佛無上之大緣豈不當面錯過失多生善根種子耶古德云三途地獄受苦者未是苦向袈裟下失却人身為誠苦耳佛言心如絃直可以入道所言絃直者謂無委曲相也如何是委曲相謂機械巧心偷心乖心覆過心無慚愧心懶惰偷安心見人過失心貢高我慢心自是非他心不生孝順心慈愍心總之一切不善心皆是自心之委曲相也今要發心只須將前一切心盡行掃除時時撿點念念照管不許放行恐不能頓斷將古人一則公案橫在胸中習氣發時便提此話頭與之撕捱久久純熟則心自條直而道念日增行門日進心地日明如此一生始謂不虗度也不然待生死到將何抵對沙彌當自思之切不可作等間輕意放過示性田徒海耕行者歷觀古之豪傑涉艱難困苦操長遠不退之志者槩不多見其人若晉五臣從重耳亡在外十九年無怠心者蓋亦日夜望咫尺之封垂不朽於竹帛耳此乃名利牽心故忘身從事古今世人之常情也若田道人者從達大師二十餘年寢食俱廢一息未嘗少怠小有過差痛責重杖居常兩腿如墨竟不起一怨心出一怨言以至觸犯大難以死從事在寂寞苦空門中竟何所圖乃能精進堅強不拔如此哉由是觀之較古忠臣義士所絶少者今於道人見之矣及死得從葬大師於雙徑豫謂此一壞土不但俗人即僧徒亦不易得是於法國土中已得茅土之封也非亡身血戰何以有此臨終以此卷付其徒朱道人今淡公為名曰海耕亦法門功臣世業之券也豈小緣哉示朱素臣士人學道多以讀書為妨礙老人曰讀書何礙道但不讀書時多被無端妄想擾亂若就間時能攝心一處把斷妄想不行心心在道念念不忘如此則學道時多讀書時少也老人嘗示學人當要念頭起處即看破事未至時莫妄生果能如此用心則妄想自斷外事自然無擾道力自強工夫必易就耳示沈止止道不欲雜雜則多多則擾擾則憂憂則不入古云學道志當歸一吾所謂一者一其志耳今既知參究功夫即將所參公案橫在胸中不論間忙動靜迎賓待客日用云為一切處提撕不得放過放過則被境擾擾則生厭厭則但有求間之心無念道之心矣心志歸一則百事可做凡用心處只在念頭起處著力起即看破看破即當下潛消更不相續被他掉弄是參究訣法故曰圖難於易為大於細此正易處細處下手便覺省力若捨此更待間時靜時方做工夫如此則盡此生無入道之時也沈生但就一念上做不必向外馳求即禮佛持呪也只在一念信力上做總之種種方便皆是攝心之法耳示淡居鎧公古之忠義之士非有大力不足以任大事力有心力有氣力語云志至焉氣次焉又曰持其志無暴其氣以形太勞則枯精太勞則竭神太勞則歇莊周言以有涯隨無涯殆已已而為知者殆而已矣此言過用而不知所養也故老氏曰治人事天莫若嗇嗇者有而不盡用也養形謂治人養性謂事天吾佛所謂六根奔於六塵之境久而遂勞謂是故也是知古人任大事者未有不以有餘而從事於物也如漢高帝以力取天下百戰百不勝及一勝即成大事豈非善守有餘以治不足者哉先大師以法門大事付公一肩荷之不遺餘力當百折之衝秋毫皆窮神極力以應之以其志有餘而不暇顧其形之易瘁也今也有形易化時往難復當及時休養以全其天和所謂本立而道生也以公生平所學以明心為格若心廣而形眇則力全而任有餘未盡之業猶千里之行以暫息而至公必有以自處也何如示念佛切要在雲棲為聞子將子與母氏説念佛求生淨土一門元是要了生死大事故云念佛了生死今人發心因要了生死方才肯念佛只説佛可以了生死若不知生死根株畢竟向何處念若念佛的心斷不得生死根株如何了得生死如何是生死根株古人云業不重不生娑婆愛不斷不生淨土是知愛根乃生死之根株以一切衆生受生死之苦皆愛欲之過也推此愛根不是今生有的也不是一二三四生有的乃自從無始最初有生死以來生生世世捨身受身皆是愛欲流轉直至今日翻思從前何曾有一念暫離此愛根耶如此愛根種子積劫深厚故生死無窮今日方才發心念佛只望空求生西方連愛是生死之根的名字也不知何曾有一念斷著既不知生死之根則念佛一邊念生死根只聽長如此念佛與生死兩不相關這等任你如何念念到臨命終時只見生死愛根現前那時方知佛全不得力却怨念佛無靈驗悔之遲矣故勸今念佛的人先要知愛是生死根本而今念佛念念要斷這愛根即日用現前在家念佛眼中見得兒女子孫家緣財産無一件不是愛的則無一事無一念不是生死活計如全身在火坑中一般不知正念佛時心中愛根未曾一念放得下直如正念佛時只説念不切不知愛是主宰念佛是皮面如此佛只聽念愛只聽長且如兒女之情現前時回光看看這一聲佛果能敵得這愛麼果然斷得這愛麼若斷不得這愛畢竟如何了得生死以愛緣多生習熟念佛才發心甚生疏又不切實因此不得力若目前愛境主張不得則臨命終時畢竟主張不得故勸念佛人第一要知為生死心切要斷生死心切要在生死根株上念念斬斷則念念是了生死之時也何必待到臘月三十日方才了得晚之晚矣所謂目前都是生死事目前了得生死空如此念念真切刀刀見血這般用心若不出生死則諸佛墮妄語矣故在家出家但知生死心便是出生死的時節也豈更有別妙法哉示雲棲侍者大師未入滅時前十九年起居食息侍者日夜周旋凡一切密行無不覩一切微言無不聞一切應機無不達一切心事無不知是則大師之全身色相音聲無不昭昭於心目之間即親近數千萬衆皆不如侍者之真知實見者也即今大衆人人見大師滅度只侍者獨不作滅度想耳末法修行淨土都要説想彌陀妙相以未得親見面目即想亦不真要聞彌陀説法則思亦不真我觀大師則彌陀之化身侍者執侍已久豈可忘却大師又向他家求佛法開示我謂侍者更不必作別想只想大師如生前一一規模法範音聲語言作事威儀修行觀念利生慈悲細細從頭至足終日竟夜一一通想一過如此則念念想時就是彌陀出現時也才有一念忘却便是負恩德入生死之時老人無法可説但以大師全身安向汝心中不可吐却便是我老漢隱身三昧也汝諦思之示等愚侍者自心念佛念佛念心心佛無二念念不住能念不立所念性空性空寂滅能所兩忘是名即心成自性佛一念遺失便墮魔業示玄津壑公公受業淨慈乃永明禪師唱道地初剃髮禮永明塔於荒榛凡事一遵遺範手自行録為師承卜遷師塔於宗鏡堂後誓不募化唯行法華懺儀堅持其願而集者如雲塔工既成修宗鏡堂築三潭放生池皆永明本願也余弔雲棲大師將往淨慈公料理宗鏡堂為駐錫所豫入門禮永明大師塔觀其精妙細密經畫如法纖悉毫末咸中規矩豫留旬日繞千百衆人人充足法喜內外不遺諸凡井井指適可如不經意豫以是見公才堪經世慈足利生不獨有深心實具無方妙行非乘宿願未易能也豫既行公送別請益豫因示之曰為佛弟子人有真偽行有理事才有體用心有廣狹均名僧也而就中不同如霄壤故菩薩利生之門有其多種佛呵聲聞為名字羅漢斥非真也佛所最重者唯末世中護慧命者為極難其人以處剛強濁世自救不暇安能為法門乎周身不給安肯愛護衆生乎諸大乘教中皆稱能護法者為真佛弟子以能克荷其家業耳佛憂滅度之後求持經者為難然經即佛之法身慧命非紙墨文字也且法身流轉五道而為衆生是知能護衆生即護佛慧命故般若教菩薩法以度衆生為第一以不住衆生相為妙行所謂滅度無量無數衆生實無一衆生可度是了衆生相空也然我即衆生之衆生也衆生既空我亦何有我人皆空中間事業誰作誰受物我兩忘中間自寂三輪若空則實相如如平等一照菩提涅槃皆如幻夢又何有佛法之可説禪道之可修萬行之可作哉所以法華會上讚持經者曰舉手低頭皆已成佛是乃以已成之佛心作現前之衆行故一一行皆是佛行行之妙者無踰於此如此是名真佛弟子矣佛言慈悲所緣緣苦衆生若無衆生則無菩提所以菩薩如大地心荷負衆生故如橋梁心濟渡衆生故毗盧以普賢為身普賢以衆生為身若以衆生為心是為荷擔如來矣公試觀豫言以印證其心若見自心果於法合則法外無法如空外無空若有草芥塵毛而不舉體全歸法性者則是心外有法法外有心人我樅然是非未泯捨此法門更於何處求向上一路乎佛元無法與人祖師亦願自度若存一法之見即是自心未度自不能度求甚佛祖作擔糞奴郎耶公自此以往更須高著眼睛自點撿看莫道老僧饒舌示了無深禪人佛言比丘心如絃直可以入道淨名云直心是道場聖人亦云人之生也直是知佛心無別妙處只是衆生中直心人耳直則無委曲相所言直者乃一塵不立方謂之直譬如弓絃之直能容何物哉才有一念不直便是過錯能念念直則念念不容一物物不立處則本體自現故六祖大師云常自見己過即此一語便是成祖作祖之要訣所言過者非作事之差乃自心之妄耳以此心本無一物平平貼貼才有一念則為過矣一念為過況種種惡習念念發現不自覺知豈能免過學人用心不在一念上著力則終身參學不能得真實受用以用浮想緣影為功故錯到底耳禪人初參老人於徑山老人即字之曰了無欲要著力於本來無一物耳送別舟中貽此勉之示雪嶺峻禪人學道人第一要骨氣剛次要識量大次要生死心切骨氣識量乃夙習種性苟為生死心現前立志三事具足是為向道至若用心參究古人教人最初下手便要離心意識參出凡聖路學此語學者皆知及至用心才舉一念便落意識窠臼如何離得以多生習氣一向在身心世界裏做活計墮在五蘊區宇被他籠超脫不得至做工夫現出種種怪事皆此過也是須要識量廣大見處超卓先將身心世界撇過舉起本參話頭如虗空中橛子相似久久忽然虗空迸碎便是大人眼界定不是尋常默照邪禪可比也此段力量須是一塊剛骨方才立得腳跟穩當若是軟暖柔懦粥飯氣習者何敢傍其萬一至於看話頭最怕落在玄妙知見窠臼是為黑山鬼窟才有絲毫玄妙知見挂在胸中或將古人言句蘊之不捨便墮外道邪見以此中纖塵著不得著不得處便是得力時也只須徹底打破漆桶方是真實又不可將心待悟作欄頭板也禪人只麼用力去他日自信老僧不欺示劉道人汝為生死出家獨坐孤峰頂上十年於此何等真切聞被魔害數十次其心不動衆皆勸往他處避之畢竟不去何等忍力此必於本分事上大有得力處既能一念如此當視四大如空花水月視死生如夢幻若果得解脫便坐脫立亡去如其不能就當一念不動任他刀割香塗節節肢解畢竟不動一念方是正見正行今聞欲絶粒而死此是魔所攝持即當看破此念決不可如此認著不唯可惜自己為生死苦心抑恐令他入邪見網也示非石玉禪人末法學人多尚浮習不詣真實故於佛法教道但執名言不達究竟之旨增益知見生大我慢是又以佛法結生死根良由最初發心不從生死上著腳亦不知生死為何物將謂與己無干瞢然夜行故不得正修行路且佛教人言言句句乃出生死法豈意今人反墮耶此非佛咎咎在學人無正信正見向未親近真善知識指點説破耳學人方玉昔參老人於嶺外真實朴素老人東遊吳越刻稜嚴法華新疏命玉校讐參詳斟酌得老人言外之旨老人今歸匡廬休老異日玉能相伴於空間寂寞之中參究向上事當不被宿習文字作所知障也老人行矣七賢峰頭有牛糞火煨芋以待子其念之示吳江沈居士一切衆生皆以我執而為生死根本以有我則有物物與我對則形敵生以我招敵則衆忤皆歸忤則為其所惑矣故眼為色惑耳為聲惑鼻為香惑舌為味惑身為觸惑意為法惑惑則擾擾則亂亂則失其正既失其正則被所傷者多矣世之人皆為其惑而不自知為其所傷而不知痛愚之甚矣且將以為資我也而又愛而執之取之又愚之愚者也惟有智者知其不我益也故遠而避之苟避之不若忘我誠能忘我則於衆敵猶夫衆箭攢空則無可寄矣有志道者試從此始示王子顒世人一向在幻妄身心境界上作活計從生至死未曾一念返覺自心本來面目由其不覺故不知其病根所在以水火相違四大交攻是為身病妄想攀緣愛憎取捨是為心病然身病藥石可治而心病則無藥可治佛為世醫王及調治衆生心病種種方便究竟單以覺破妄想無性為回生妙藥學人要求安樂法門先須識破身非我有但看父母未生前何曾有此血肉之軀及四大分離即今此身更向何處安立如此時時觀察久則忽然一念覺破即不為此身所苦是為治身病之妙藥一切病元皆從妄想心生只須日用念念觀察凡一切善惡念頭起處即是病根發現直須當念著力就在起處觀察看他畢竟從何處起畢竟是誰起滅及至妄想滅時定要追察畢竟滅向何處去如此追究到起無起處滅無滅處是謂起滅無從則心體安然得大自在如此把斷要關則前後不續中間一念自孤即此一念獨立處久久純熟則妄想病根自拔一切心垢亦無地可寄矣是為治心病之妙藥也子顒切志向上事但差在言語文字中求不知向自己心地上求以自心妄想已是病根又將他人言語把作實法是謂重增一重障礙耳從今但直覺破自心妄想不被率轉但看妄想起處決不可相續佛言狂心若歇歇即菩提勝淨明心本無外得如此用心不退即此現前自心便是大安樂解脫法門老人因請益詺其名曰福覺以其覺乃第一無量之福也其勉之哉示旅泊居士沈豫昌居士生十善之家居富貴之室以菩薩人為父母以善知識為眷屬以同行同願為奴僕以慈力示現為兒女而身處其中如青蓮出水挺挺淤泥既發信心修諸福德事事如意繞宅湖池約數里許所養之魚稱湖沙數初請藏經過蘆洲滿蕩之魚夜乘紅光而盡生天其所遇福緣勝廣如是但以行道不力為愧請益老人老人因示之曰是誠可愧者矣何也以外施為易內施不足是捨心不若捨物之易耳雖然亦丈夫所難也由歷劫生死情根深固難拔非發大勇猛決烈之志求其如法修行實非易易若老人正眼視之固不難耳居士諦信誠能以物觀身則身易輕以身觀心則心易忘以心觀情則情易折以情觀性則性易明以性觀念則念不生念不生則道在我而不在物矣如是則與池魚之望法影而頓脫生死何以異哉居士能信不疑則居家而入非家即世而能離世一切資財眷屬皆入如幻三昧又何道之難行情根之難拔乎居士欲入毗耶不二法門當從此入示顏福堅佛説世間無一法可堅固者謂無常苦空無我等法如夢幻泡影速起速滅無常生死敗壞之法皆如是也唯有佛性種子雖在生死之中歷劫不壞是真堅固世人錯認無常為常是以不堅為堅名顛倒見然顛倒之根乃罪惡之性也何福之有今一念返醒於無常生死法中發心願求佛性種子則能捨不堅之財易堅固之法財捨不堅之身命求堅固之慧命此乃出世之福福之大者是故就汝歸依之信心詺其名曰福堅只欲發其堅固之心所謂自求多福耳豈虗名足尚哉示顧汝平汝平侍紫柏老人最久昔豫被難繫圜中以書覆紫柏汝平侍側即以書付之囑曰執此他日必有見面之時以此為左券越二十二年丙辰長至月豫自南嶽來雙徑赴紫柏入塔之期汝平迎豫松陵至陋巷顏生生宅因禮請益出此卷見紫柏手澤及豫昔日書嗟乎法性海中聖凡出沒如大海之漚起滅無從去來無所即死生夢幻於湛寂中了不可得且豫昔之死也不死故今之生也非生不死不生湛然一際是知紫柏今之死也豈真死哉手澤宛然法身常住昔紫柏視今日如眉睫子今見紫柏當日之寸心耿耿孤光昭揭如日月既生不以形骸隔又安可以幽明間哉佛言觀彼久遠猶若今日不但豫與紫柏如巨海之漚即一切凡聖若空中電影耳汝平久入紫柏之室於此一際平等法門必若入大海浴使百川之水浸透遍身毛孔耳紫柏老人或未拈及此故豫特為點破令其自信此法得大受用其或未然試向父母未生前著眼看久久當知見豫與未見時無前後際也示顏仲先持準提呪在家居士五欲濃厚煩惱根深日逐現行交錯於前如沸湯滾滾安得一念清涼縱發心修行難下手做工夫有聰明看教不過學些知見資談柄絶無實用念佛又把作尋常看不肯下死心縱肯亦不得力以但在浮想上念其實藏識中習氣潛流全不看見故念佛從來不見一念下落若念佛得力豈可別求𢆯妙耶今有一等好高慕異聞參禪頓悟就以上根自負不要修行恐落漸次在古德機緣上記幾則合頭語稱口亂談只圖快便為機鋒此等最可憐愍者看來若是真實發心怕生死的不若持呪入門以先用一片肯切心故易得耳顏生福持問在家修行之要故示之以此觀者切莫作沒道理會以道理誤人太多故此法門尤勝參柏樹子乾屎橛也示嘉禾稜嚴堂主經云佛種從緣起所謂欲識佛性義當觀時節因緣是知法界以緣起為宗諦觀世出世間未有一法不從因緣而起者稜嚴古剎創自唐朝長水疏稜嚴於此其來久矣以當王城闤闠之中向為力者所侵五臺陸翁於此土受靈山付屬生以護法為心達觀禪師乘時而出與翁有大因緣一見心相印契即議欲復之而荷擔者難得其人密藏開公棄青襟出家依達師為入室弟子聞有復稜嚴議全身荷之禪堂告成議刻方册大藏以廣法運復蒙聖慈頒賜大藏而大殿未有成也不幸開公隱去未克卒業五臺翁復下世郡守蔡槐亭先生至則一旦興起得包心絃居士為領袖一時人心翕聚如響不期年紺殿巍峩金像晃耀何其偉哉揆之重興之議幾二十年時節因緣故有不思議者存焉豫來雙徑為作達師茶毗佛事回過稜嚴觀其規模宏敝真塵中淨土其禪堂精潔誠幻海梵宮及見主者林公其人端莊循雅忍辱慈和可謂叢林之領袖也嘗竊悲夫五濁惡世佛事付囑菩薩尚不敢涉此利生而況博地凡夫乎以林子之端雅故見者無不敬以林子之慈忍故歸者無不悅以人皆敬皆悅之心成未圓未就之事如順風揚帆而行安流其到彼岸也何難哉豫謂獅絃將絶響矣而幸有子繼之亦因緣所屬耳唯在子堅忍不拔之願力以守難成不易之道場將為無窮不朽之佛事大法流通即子之心光所遍也又何以不堅血肉之軀而為三寶所惜乎示東禪浪崖耀禪人金沙東禪寺太史念西王公之所建也以浪崖耀公主之適聞老人有雙徑之行特專嗣南容公來請經營安居將為老人林歇地九月既望老人適至見其精誠嚴整大衆清肅專以背誦法華為業期方七年而成誦者三十餘人此希有之事也居無幾何即往徑山緣畢將歸匡廬長揖人世公懇留老人意未能已臨別貽此示之曰法界性中安有去來之相耶智眼未開情塵斯隔離合之見闋心聚散之緣繫念非夫達三際不遷十方靡間者未易臻無二之境也且法華以實相為宗過去之多寶現存即今之釋迦不滅常住一心永劫不昧大通王子之因直至於今燈明授記之緣法爾現證由是觀之安有纖毫遷訛之相耶試觀白毫一光洞照無礙一切聖凡始終因果居然目前老人之去來猶長江之皎月東西各行而本月湛然苟一念純真則心光交徹其無以世諦恆情作生死常見也願公以法華三昧究竟未來則與老人眉毛廝結同歸實際長劫相依久遠不離又何區區於幻化空身水月鏡像妄生彼此之念耶老人行矣公其勉之示王聖沖元深二生佛性之在人如水在高原有穿鑿者無不得之良以吾人煩惱根深愛憎情固不啻高原之土也苟能力鑿深求施工不已務在拔煩惱之根裂愛憎之網則法性淵泉源源不竭溉靈根而沃智慧之芽不唯道果可期且將濬潛流而潤焦枯普益人天同歸法海涓滴而與渤澥同彼此豈外求之耶聖沖元深昆季久入紫柏之室哲人往矣恐性水清流不無雍閼老人適來而為疏之今則開發源頭從此永無枯竭其無以煩惱乾土投而濁之也示孫詵白無明生死根株只在現前一念如人周行十方盡生平力而不已者將謂已涉千萬途程殊不知未離腳跟一步也是知歷劫妄想遷流生死輪轉實未離當人一念耳若能日用現前見聞覺知念念生處著力破生處不生則歷劫生死情根當下頓斷其實不假他力也佛説狂心不歇歇即菩提豈虗語哉老人指示父母未生前一句著力參看他日當有自信之時也示薑養晦薑生少年英發骨氣不凡非靈根夙植般若種子深厚未易得此美質也幼稚曾見紫柏大師即命之曰信光意謂性具般若之光也適參老人請益因字之曰養晦吾人日用見聞知覺皆智光煥發第被無明蒙蔽變為情識故暗而不彰苟能自信本有真光不昧於現前境界愛惡關頭昏暗之中靈光獨耀不被情根之所蒙蔽是於晦而能養則光體愈明而真元可復矣用其光無遺身殃薑生體此則廣大光明當發現於動作云為之間功名建立皆不朽之盛業豈可自昧而不信耶但在我慢幢摧則光明自露耳示衆近來諸方少年有志參禪者多及乎相見都是顛倒漢以固守妄想為誓願以養懶惰為苦功以長我慢為孤高以弄唇舌為機鋒以執愚癡為向上以背佛祖為自是以恃黠慧為妙悟故每到叢林身業不能入衆口意不能和衆縱情任意三業不修以禮誦為下劣以行門為賤役以佛法為冤家以套語為己見縱有能看話頭做工夫者先要將心覓悟故蒲團未穩瞌睡未醒夢也未夢見在即自負貢高走見善知識説𢆯説妙呈悟呈解便將幾句沒下落胡説求印正若是有緣遇明眼善知識即為打破窠臼可謂大幸若是不幸撞見拍盲禪將冬瓜印子一印便斷送入外道邪坑墮落百千萬劫無有出頭之時豈非可憐愍者哉此等愚癡之輩自失正因又遭邪毒縱見臨濟德山亦不能解其迷執豈不為大可憐愍者哉禪門之弊一至於此諦觀從上古人決不是這等但看百丈侍馬祖每在田中作活如插鍬子野鴨子公案便是真實勘驗工夫處以此故有一日不作一日不食之誡楊岐之事慈明二十餘年行門親操執事百千辛苦未嘗憚勞故得光明碩大照耀今古若懶融之負米黃梅之碓房歷觀古人無一不從辛苦中來何其今之少年才入叢林便以參禪為向上只圖端坐現成受用袖手不展一草不拈如此薄福絶無慚愧之心縱有妙悟只成孤調絶無人天供養況無真實修行虗消信施甘墮沈淪者乎若是真實為生死漢子當觀本師釋迦文佛於三千大千世界無有如芥子許不是為求菩提捨頭目髓腦處如此當發勇猛𢬵捨一條窮性命將這一具臭骨頭布施十方供養大衆一切行門苦心操持難行能行難忍能忍若於日用六根門頭頭頭透過便得法法解脫古人云從緣入者相應疾如此用心三十年不改縱不悟道再出頭來定是頂天立地漢子也老人以此示之遍告同參
