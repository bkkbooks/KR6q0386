body:
  text: 侍者福善日録門人通炯編輯嶺南弟子劉起相重較法語寂照鎧公請益八則問經云無礙清淨慧皆由禪定生如何南嶽謂馬祖曰若學坐禪禪非坐臥若學作佛佛非定相於無住法不應取捨此二説若為是非答祖師門下不論坐禪作佛只貴見性若見自性了了分明自無取捨才有取捨便落是非問圓覺經云我今四大所謂堅濕暖動各還地水風火故曰四大各離今者妄身當在何處未審此身未死各離耶抑死後各離耶答要未死前撇得下故臨行不被他纍及至臨時要離如生龜脫殼難之難矣古人道間時做下忙時用正謂此耳問稜嚴經云阿難白佛言本發心路從何攝伏入佛知見佛言汝等若欲入佛知見應當審觀因地發心與果地覺為同為異若於因地以生滅心為本修因而求佛乘不生不滅無有是處未審即今為出生死參禪學道是生滅心否答學人參禪先斷生滅心及發明時乃見不生滅性若以生滅心參但逐妄想流轉非參究也問百丈海禪師曰參見善知識求覓一知半解是善知識魔生語見故若發四宏誓願願度一切衆生盡然後成佛是菩薩法智魔誓願不相捨故若持齋戒修禪學慧是有漏善根縱然坐道場成正等覺度恆沙數人盡證辟支佛果是善根魔起貪著故若於諸法都無貪染禪理獨存甚深禪定更不升進是三昧魔久耽玩故今參禪學道者如何出得此魔入正修行路答諸修行人只為心見不忘故動隨魔網若心見消忘則佛亦不立問破四大五陰執有先後否答教説五陰漸破必先破色陰若參禪打破漆桶則先破識陰識陰既破則四大無依故如割水吹光了不相觸問金剛四句古今未有明言者或指色聲香等為四句或指眼耳鼻舌四句或指諸相非相等或指有諦無諦等至天親則曰吾升兜率陀天請益慈氏則曰無我相無人相無衆生相無壽者相是也六祖則曰摩訶般若波羅蜜多是也雙林大士又曰經中持四句應當不離身愚人看似夢智者見惟真自古迄今不曾有定辭何也答佛説般若如雪山衆草件件是藥拈來便用必定除疾故古人指出何為四句者各拈雪山一莖草耳問古人云直得純清絶點猶是真常流注直得無一法當情猶遭仰山檢點直得通身是照猶在衲僧家垂手直得七佛已前威音那畔薦取猶是話會在今之學者果到此境界否答古人垂語只是怕人落在途路邊學人縱到此亦是途路邊事況未到此便開口説禪總是欺心問圜悟大師曰有祖以來唯務單傳直指以言遣言以機奪機以毒攻毒以用破用所以支分派別各擅家風須是向上根器有紹隆佛祖志然後能深入閫奧始可印證舍此切宜寶祕勿作容易今見學者多不審自己根器便要參究向上事果不論根器否答祖師取人論根器即教中佛論種性若不是者般種性終是粘皮搭骨今人根器不淨定與此事絶分若肯留心此事從此不退久久可許造進此在不定性攝王芥菴朱白民請益問佛説頓教漸教禪開頓門漸門二教二門是同是別答佛祖出世本無法可説然法本無説何有頓漸差別言頓漸者特為機設非干法也然教有頓漸者如毗盧遮那初成正覺於菩提場説華嚴經頓示平等法界心地法門直示無遺如日初出先照高山後判教者稱為圓頓法門此佛之頓法也然此頓法惟被地上一類大根衆生於中行布四十二位是即頓之漸也其餘劣根在座如盲如聾絶然無分此則法雖大而攝機不廣所謂唯有一門而復狹小如此豈佛説法獨為一人哉所以現應化身隨三根施設説三乘法初從漸修證所謂教之漸也後至稜伽法華涅槃頓示佛性種子是為由漸而頓也此乃教分頓漸也其禪一門教中處處説菩薩六度中有禪智二度判教菩薩由二度開止觀二門為修行之本此教中用頓而漸修是禪為頓中之漸也其達磨之禪乃世尊末後拈華迦葉破顏微笑佛乃示以正法眼藏涅槃妙心遂為教外別傳之旨西域二十八傳達磨東來六傳曹溪而下傳燈所載諸祖乃單傳直指一心之禪又非六度之禪可比以此單示一心更無別法直下頓見自心不屬修證迷悟因果特顯佛未出世一著是謂向上一路名為頓教大乘此禪之頓也至若歷代祖師頓悟此心者雖一言一句一棒一喝之下直捷了悟此蓋多世修習般若根深因緣時至今日成熟亦有今生參究三二十年工夫然後得悟如此雖頓亦從漸來至如溈山云學人但能一念了悟自心識得自己本有是名為悟尚有無始無明微細流注即將悟的淨除現業流識是名為修非此外別有修也以此觀之頓中未嘗無漸也豫嘗觀稜伽分頓漸四門一頓頓二頓漸三漸頓四漸漸知此不可執一而論雖頓悟而不廢漸修佛祖之心本無二也問佛説諸經俱是稱性之談了義之旨何謂達磨頻讚稜伽云此經是我心要至黃梅則指金剛餘經有何差別耶答佛説諸大乘經雖是稱性了義之談即其建化門頭不離迷悟性相對待定要返妄歸真皆有和會方顯一真至若稜伽一經直指一心雖有真妄以示識藏即如來藏不必和會單顯自覺聖智境界但了自心現妄想無性即是聖智不用更轉即其修行但直觀自心流注妄想現量頓達自心亦不立地位階級故判教者名為頓教法門是故達磨以為心印以此經示禪宗要訣以此經難明劣解難入傳至黃梅則以金剛印心其金剛乃八部般若之一文有六百卷唯此卷獨合祖師心印以般若乃入大乘之初門正如稜嚴所説菩薩以不生滅心為本修因而般若乃佛之根本實智正是不生滅心也此經以無住為宗斷疑為用以二乘妄起衆生見佛見法見種種住著重重起疑此經盡疑根直到不疑之地知見消亡不立一法遣盡住著之心正與宗門解粘去縛手段相同斬斷意言分別正是宗門不許擬議不著思惟識情乾枯透法身向上故黃梅以此印心良有以也諸經都有些黏帶獨此經斬截參禪了此則易入耳問云有如來禪祖師禪二禪果有同異否香嚴擊竹有省呈去年窮未是窮之偈與仰山山云且喜師兄會如來禪祖師禪未夢見在依此語則見有如來禪祖師禪異也若從迦葉傳至初祖西來祖祖相承諸宗始祖即是釋迦何得有異也答如來禪祖師禪本來無二但如來禪就迷中説悟要修而後入祖師禪直指不屬迷悟一著不假修為要人直下頓了自心凡落迷悟關頭便是第二義也所以古德云修行即不無其如染污何是故宗門向上一路須是個裏人始得稜伽四種禪中最上一乘禪即祖師禪其實本無異也若根器不淨妄逞聰明知見把作會祖師禪如此連如來禪亦未夢見在譬如貧人妄稱帝王自取誅戮可不懼哉可不懼哉示蕭玄圃宗伯天啓癸亥冬十月初六日從此絶筆入道先要了悟當人心體本來光明廣大包含無外彌滿清淨聖凡不立不為身心世界之所拘礙此即向上一路西來心印唯此而已既能悟徹此心則於日用應緣一切境界如鏡現像來無所粘去無蹤迹如此則凡所施作皆從真心實際中流出一一皆真實不朽之事業不但與日月爭光也較彼區區迷夫妄想機械所為者豈可同日而語耶此段光明人人具足本無欠闕但以我見堅固凡有所作必以為己功執所見為必是是非交錯終無一定之論所以然者以無廓然大公之心而欲建千秋不朽之業難矣又吾人心體本來圓滿光明即今不能頓悟不得現前受用者蓋因無量劫來貪瞋癡愛種種煩惱障蔽自心故漸修之功不可少耳溈山云學人有能一念頓悟自心但將所悟的淨除現業流識是名為修不是此外別有修也若學道人但求頓悟便了將謂無功可用此則習氣深潛遇境竊發久則流入魔界矣然漸修之功亦非有次第但日用中向未起心動念處立定腳根返觀內照於一念起處即追審此一念從何處起追到一念生處本自無生則一切妄想情慮當下冰消矣然所忌者無勇猛力不能把斷咽喉不覺相續則流而不返也示周子寅以下海印稿附山居今日大衆結制海印據座説法華經爾時足下手書至且有佳果足占足下亦法會中人乃先得道果者此非瓦卜也前書云云日業正此不爽亦可漸入不二法門但其中日用頭頭念念皆生滅心行安能寂滅為樂若求心地一段受用更須向讀書作文已了時種種應緣處當下著實猛地返觀內照觀此種種作為生滅之心畢竟向何處起即今滅向甚麼處去如此深觀久久漸入細密若更此中一切習氣潛流處煩惱無故生起處著實一定看他畢竟是何物向何處起滅追到掃蹤絶迹處如沸湯鍋裏點片雪相似如此日用念念不得放捨才有絲毫一念懶墮懈怠偷安圖快活受用之心生時此正是病根發作便向者裡猛然剔起眉毛不可被他纏縛住才見纏縛切不可和身放倒與之打交滾也切忌切忌大段一聲菩薩或一聲佛死急靠定與之廝挨若遇種種惡習起時即將此話頭奮力提起望空一揮不管是魔是佛是煩惱習氣是善惡思量一切情塵一齊頓斷如斬亂絲如此做工夫不妨讀書不妨作文讀書處看此書讀向何處寄著作文就看此文從何處流出也不妨迎賓待客喫茶喫飯痾矢放尿一切處無用纖毫縫罅如此安心再與永嘉所説恰恰用心時恰恰無心用無心恰恰用常用恰恰無是一般不是一般足下不知能信海印老人不虗誑否請自試看足下儻見信不謬始知顏子心齋三月大為可笑圓覺經一部足下讀熟每日早晚以當功課俟來春面時相與決擇尋常與足下書不免稍帶情識自愧為足下未徹非不徹恐足下信心未徹耳今見足下信心漸增日近清淨此時若不將此赤心剜與足下何時得徹若足下因循不徹則海印自徹去也何如何如人世可悲斯道可悲望足下心更可悲耳又來書請益甚是真切但足下於空幻二字未得諦當故於心境不無其礙所以工夫難做今為足下説破則了然無復疑慮矣所謂空非絶無之空正若俗語謂傍若無人豈傍真無人耶第高舉著眼中不有其人耳所謂幻者非變怪之幻乃有而不實之謂也譬若市如弄筒子撮出許多人物一般然此筒中本無所有而忽然有之雖有而非真實也既非真實即是本無由本無故説空耳故曰譬如幻化人非無幻化人幻化人非真人也人既非真豈不是空耶佛説空字乃破世人執著以為實有之謂非絶無斷滅之謂也誠恐世人淪於斷滅復説幻字以遣其斷滅之見是則一切身心諸法因幻故空由空故説如幻耳此二字相須而觀則頓見其妙所言空即幻有以觀空名曰真空所謂有乃本無之幻有名曰妙有由真空故心非斷滅由妙有故境是無生境既無生則心何取著心既非斷則妄念何存妄念不存將何心而取境境本是幻將何境而牽心斯但心不取境而心非斷滅境不牽心而境自如如心境如如於何不樂此所謂心本無生因境有前境若無心亦無者但只看破如幻不實名曰若無而靈心獨照妄心頓歇名曰亦無耳是所無者妄心耳豈絶無真心哉何以為妄心耶境執著不化者是何以為真心不取身心境界之相了了常知靈然寂照者是如此用心有何罣礙故曰自心取自心非幻成幻法不取無非幻非幻尚不生幻法云何立正所謂境緣無好醜好醜起於心心若不強名愛憎何由起斯則但情不附物物豈礙人物既不能礙人人又何礙於物耶世人所以不得自在者唯其不達心境無生如幻不實耳若了達一念無生如幻則一切苦樂憂患得失愛憎取捨情狀當下瓦解冰消矣故曰知幻即離不作方便離幻即覺亦無漸次此所謂一念頓到佛家非虗語也足下但觀一切妄念起滅處一切境界起滅處無非是幻化不實則心自然不奔境境自然不牽心矣往來應緣則一念虗明靈然獨照照見現前身心如幻如化如水中月如鏡中像如空中雲如野馬陽𦦨如此把定金剛眼睛再莫動轉任他一切境界觸之即消憑他甚麼妄心一便滅如此用心又有何妄心可以自擾又有何妄境而可攖心者哉此番説話乃海印極力為足下通身吐露徹底掀翻足下更莫懷疑切不得思前算後種種思量皆惡覺惡習俱是障道因緣也必若老人此語目前即是極樂人矣信手呵筆不覺郎當如許婆心漏逗如此珍重又一別恍忽數月流光迅速日月欺人每聞足下精進倍常歡喜沃灌心田也初意擬尊人行後必得入山一晤相與印證既往工夫而決擇之此想實真不覺形諸夢事可笑道人亦墮情見乃爾來書所云因坐以求靜因靜以求心此乃入道初門最為切當但坐中未明肯綮所以坐久而疲由不達心體之妙故靜久而欲有聞且又疑泛然若無所歸良以能求之心未得祕訣所以求之一念返覺為勞是以心覓心正如渴鹿逐陽𦦨耳傳曰知止而後有定以足下心未知止故不得定承索所以治心條目如四勿三省者引此心而入持此心而定此足下精心苦切處乃鄙人所大有望於足下者今既肯心自許返乃祕吝乎第恐足下始於吾佛法中未得多聞至於名言之中多分轉為昔日見聞之陳習致使甘露之藥不能近取還顏之效耳從上佛祖教人之法門路雖多不出戒定慧三學所謂因戒生定因定發慧其節目之詳經不過稜嚴至若祖語無如永嘉集一書足下熟讀玩味至於其中入定用心之訣如云恰恰用心時恰恰無心用無心恰恰用常用恰恰無又云忘緣之後寂寂靈知之性歷歷無記昏昧昭昭契本真空的的此用心之神符也如四勿三省者正乃戒耳此中具悉其實修心工夫條目不出止觀等持三門而已此集中奢摩他止也毗婆舍那觀也優畢叉止觀雙運定慧等持也姑以此塞請集中紅圈者留神消息如不解者不嫌數數寄問至於止觀捷徑之法容再書一紙以償今日之欠耳又此段因緣乃至易至難之事以無量劫來生生世世雜染流轉習之深且厚矣即今一念信心始發斬於旦夕而欲遏永劫之長流其勢誠不易易即此一念回頭之心亦深難發此是積劫善根靈苗遇時而萌芽始抽而開華敷實全在時時栽培而保護之否則頓見枯焦矣遇境遇緣以事處事久久純熟更加止觀之功則可漸臻解脫然以吾人本自解脫所以煩惱不解脫者非法之咎乃自心縛著不解脫耳良以向來世情濃厚習染純熟熟處難忘故觸之便發故曰吾未見好德如好色者也若以彼易此則生處自熟熟處自生生則疏疏則遠遠則淡淡則忘忘則不暇求脫而自不縛矣久之而此心泰定則目前千態萬狀視之若空華水月陽𦦨冰河本無可縛著又何求脫耶云肇公物不遷語得力此非足下大根器不能入此老門閫獨於日月麗天句不徹若此不徹則知肇公不徹不徹則非真得力也此語老人疑之數年畢竟於吾心中獨然自省自爾以來應緣得力處多借此老之語足下出門即見信誠非小緣老人不惜為説破第恐足下後日罵老僧也足下但將此句橫之在心於一切動作云為處一切聲色貨利處一切逆順境緣處一切喜怒哀樂處一切愛憎取捨處凡係流動之境即便以此印一印印定看他如何是不遷處如何是常靜處如何是不流處如何是不動處如何是不周處如此看來看去忽然𪹼地看破此語則知老人不欺足下而始信本真不自欺也示黃惟恆足下雖云向道而此中眼目未得明徹往往將世法佛法與宗與教不免話作兩橛若此處話作兩橛則一切憎愛逆順取捨好惡窮達動靜等宜乎一一皆作兩橛也海印頻頻為足下道佛祖元無實法與人但只為人説破各各分上本有之事耳宗鏡云以一心為宗照萬法為鏡特由吾人不能知一心故佛説教以指之吾人不能見自心故祖假禪以示之二者皆不得已也足下今云習教不免精神疲倦由宗如乘順風此足下多生般若習氣之深如此大段海印分上二皆虗誑總無難易之説苟足下不達自心則宗為邪解邪染皆墮識情窠臼而教亦妄知妄見盡落言説話柄皆非究竟真實處殊不知教乃佛眼禪乃佛心二非兩般豈有彼此海印教人看教參禪皆不是者等知見足下今日作此解不獨辜負海印抑且辜負己靈耳曾記古人有問者云古人飢時喫飯困時打眠便是道今人飢時喫飯困來打眠為什麼不是道答曰古人喫飯只喫飯打眠只打眠所以是道今人喫飯不喫飯打眠不打眠胡思亂算所以背道耳由此看來足下日用只將眉毛剔起叱吒一聲只教神驚鬼怕天魔膽碎陰鬼魂消一喝喝退落得本地靜靜悄悄寸絲不挂赤力力淨裸裸將此一段家風要讀書便讀書不讀則拈向一邊不許挂一字要作文便作文不作便拈向一邊不許胡思算乃至喫茶喫飯就喫茶喫飯要打眠便打眠要痾矢放尿便痾矢放尿撞著便了更不許過後思量如遊魂鬼子一般乾乾淨淨潔潔白白亦不許坐在乾淨潔白裡如此單刀直入一念向前則讀書親見古人作文也只向自胸中一口吐出更無前後涵畜時便是吐露時吐露時便是涵畜時如此不為動靜明暗所轉不為種種伎倆所移此之謂挺特大人沒量漢也足下信然之乎若果見信便撩起向者裡入珍重珍重示馬居士學道人第一要為生死心切第二要知身是苦本心是妄想造業之本第三要真真看破世間功名富貴聲色貨利都是虗華不實第四要怕今生造下惡業將來一墮地獄受種種苦無人救護第五要知現在命根只此一息之間若此息一斷則再求今日參禪學道作福之事永不可求況受用富貴乎學道人但得此五種心時時刻刻蘊積在懷則目前一切虗華境界自然冷淡心地自然清淨將從前一往所學知見學問口頭伎倆一切放下發菩提心永斷酒肉不貪不愛持戒修福作諸功德以為載道之本仍讀大乘經典助發自心開佛知見方可作觀但觀此心廣大圓明清淨空寂一法不可得妄念元無亦無生滅而此根身一切動作猶幻人元無心識目前一切境界猶如空華忽起忽滅本來不有唯只圓明一念歷歷不昧此念亦無是名正念如是用心二六時中動靜間忙如如不動逆順好惡冤親平等隨順世緣所作功德一事一法皆成圓妙淨行如是行者名菩薩行道人果能如此用心可謂不出塵勞而作佛事現宰官身而説法即此是名報佛恩報國恩者公稟性靈明發心向道故特此示之乃贈以號曰淨妙居士公其無負己靈無忘此説珍重示王生求受戒更字王生名廷佐字子瞻生意謂名俗而字犯古請幻人更新之幻人喜而告之曰異哉子之質也傳有之曰苟日新日日新又日新今子志願祛故吾而大新之不獨新子之名抑且新子之心名者實之賓心者德之實苟不務實而尚虗名非德也由是觀之非獨子俗於名抑且俗於心所謂俗者非衣冠言貌之謂也所謂狎習染污於性德者之謂也吾人性德本明由日漸染嗜欲目蔽邪色耳蔽淫聲鼻蔽臭香舌蔽爽味身蔽妄觸心蔽邪思六者交蔽汩昏其中熏陶漸染習以成性將謂之本有謂之固然是以大馳於昏迷之境本明之德翻視為異物安知有故吾故吾哉聖人所悲悲在於此故投戒水以洗滌之且夫戒者非他物也乃自心本有之智光即儒所謂明德也今夫人者智光不朗故明德日昏今復明德而返天真必須朗智光而破昏蔽昏蔽破本體現智光朗諸障消此吾佛所以戒殺生以成仁戒偷盜以就義戒邪淫以立禮戒妄語以敦信戒飲酒以明智五戒具而五常足六情斂而三業清此所謂滌舊染進日新捨故吾而造新化也故幻人亦更其名曰言字曰子綸將其奉佛戒如君命也子其勉之示周子潛五色令人目盲五音令人耳聾五味令人口爽馳騁田獵令人心發狂此老氏之戒也非禮勿視非禮勿聽非禮勿言非禮勿動又曰少之時血氣未定戒之在色及其長也血氣方剛戒之在鬬及其老也血氣既衰戒之在得此孔子之戒也不殺不盜不淫不妄言綺語不兩舌惡口不貪瞋癡此佛之戒也噫以吾人之性本自靈明清淨但以習染之污日就汩昏沈迷而不省者唯在耳目口鼻身心之間與聲色香味觸法相對膠固綢繆接搆心鬬長迷而不返也故聖人愍之切為之戒且將欲祛舊染斷塵習而復乎本然清淨真心也由是觀之戒在我而備在心修之以身是謂道不遠人故曰聖遠乎哉體之即神吾人欲造大道之原者唯在謹謹奉持於是而已矣周子少年切志向上歸心於此故因書此以示之示祖定沙彌子嘗見世之市肆羅列割烹而過者靡不刮目垂涎希一臠之味此恆情也每見吾徒稱沙門釋子者身處旃檀之林足履清涼之地歷大法之肆羅無上醍醐甘露妙味則邈視之如鴆毒可不悲歟雖然蓋不知味之過也藉使知之豈讓嗜臠之情哉吾佛最初出世即揭波羅提木叉以示人此即以甘露陳於周道冀人人而味之同入不死之鄉矣過而味之者幾何人哉豫隨緣入王舍城止慈氏園林適開甘露之肆有沙彌祖定從吳興來參問莊嚴佛土最上法門因指入林中即得餐采此甘露法味所言甘露法者即四根本重戒也嗟乎人者久矣沈酣生死之場成就鐵床苦具靡不依此淫殺盜妄四者而立至於諸佛淨土莊嚴亦皆從斷此四者而成就故曰永斷淫心方成佛道等今沙彌將欲闢瓦礫作叢林轉穢成淨土若不翻破四根作四面清涼池豈能化三毒而為三種解脫地耶是故海印老人讚言佛子若欲成就無盡功德法門應當善學此波羅提木叉為第一義諦一切法門因從此入示吳公敏空生問佛云何應住云何降伏其心佛答以應如是住如是降伏其心又云應無所住而生其心又云信心清淨即生實相然實相無相於何有生良由生即無生則住本無住信心如此則五蘊清涼一念頓空諸妄圓滅如是降伏即非降伏是名降伏也公敏信心甚篤從余乞授菩薩戒且問持心之方余即告以調伏之法如此又更其字曰調伏至若相即無相則不可以無相為無相故又刻之以定課日用不移久久純一泯絶諸相頓契無生是所謂信心清淨即生實相也示澄鋐二公語曰君子不重則不威學則不固又曰中無主不立外無正不行此言雖小可以喻大矣是以世出世學聖賢之道未有不自正心誠意修身而至於致知格物明心見性者故孔氏為仁以三省四勿為先吾佛制心必以三業七支為本歷觀上下古今人物成大器宏大業光照宇宙表表為人師範者未有不由此以至彼由粗以極精由近以致遠也今之學者多以口耳為實學以己見為真參以遊談為順物以縱浪為適情以弔靡為容衆以恣肆為養志以安飽為調身以緣想為正心以束斂為苦形以端莊為恃傲以克念為自苦以精持為矯飾以道業為長物以身世為金剛以生死為餘事身之不立心之不究道業之不成學問之不精此其所以世愈下而道愈衰心日昏而志日喪風日靡而行日薄教日頺而法日毀也捕風捉影後學無憑望吾人之修而見淳全之質者其可得乎孔子曰聖人吾不得而見之矣得見有恆者斯可矣是以周公之夢鳳鳥之歎有志君子豈容情於自己哉二子勉旃示江吾與與足下苦語十年如教酒人齋莊非不儼然肅恭要之肅恭亦酒態也今讀足下手書始恍然從醉夢中覺令人愴然心悲復欣然大喜以舉世皆醉假而人人如足下則不貴我獨醒耳嘗謂蘇子一口舌之夫耳其所志富貴則奮發無當每治縱怠則懸梁刺股竟酬其志況出世聖賢豈值一夫無上妙道豈多金比越王遭會稽之耻志報吳讐乃臥薪嘗膽二十餘年其竟以霸然歷劫貪愛豈值吳讐幽囚生死困辱形骸豈值會稽之耻苟足下不懷切齒之恨而忘臥薪嘗膽之心不能以懸梁刺股自創又將何以酬初志雪大耻乎聞之太上立德其次立功其次立名足下誠能以太上自勵則貧而可樂其他又何以嬰心孔子曰士志於道而耻惡衣惡食者未足與議也古人亦云苟有道義之樂則形骸可外形骸可外此外則無事矣又何可嬰心處之而不泰然耶願足下勉旃示王牧長周世父嘗謂天生萬物唯人最靈此古語也豫則謂之不然何也蓋人與萬物皆具靈覺之性此性均賦而同稟者也曷嘗有人物之間畢竟所以異於物者以其物具而不知人則知其所具者耳知其本具而盡之者謂之聖知其當盡而不能頓盡謂之賢知而肯求其盡者謂之智知而不肯返求者謂之愚知而不真而求之太過者謂之狂知而不明執一介為必當者謂之狷至若不知而妄求者謂之怪與夫不知而不求則物而已矣嗟乎此人與物殊惟知與不知求與不求之間雖相去毫釐其失則千里矣竊觀三齊之君子孰不心憤憤口悱悱眇視千古咳唾風雲雖伊周事業猶不足觀及扣其心性則瞪目結舌及與談心之妙亦未嘗不謦咳擊節及與之言佛則望望然不顧噫知有心而不知有佛是猶知二五而不知十也是以道術不明而英明豪傑之士亦不免坐蔽於此此非知之過其實不知之過也又非不知之過其實不信心之過也豫竊謂非真不信心蓋未有以真心告之者假而朝夕以真心實語熏陶漸染之雖不能自信抑將與之俱化矣世之君子生而聞見乃耳目之常即天縱之聰明且將亦與彼俱化故曰習俗移人賢者不免斯言可畏哉嗟乎長夜之歎為誰而興余今置身東海空山大澤之間冒險阻履危機幾不免虎口者蓋亦數矣知我者謂我心憂不知我者謂我何求此所以抱長夜之歎而飲泣與東海競流也雖然一管灰飛而大地春生一葉辭柯而滿空秋至第感之不深故應之不至耳年來茲土二三君子具丈夫骨見信自心者津津汗浹兩腋而陽和之調將見豫將骨化長波又復何憾王生牧長周生世父以癸巳冬日來入海叩其道味天然略無毫髮拘拘俗習豫深歎其為奇男子矣雖然牧長牧長世文世文皆知其本有而肯求之者矣豫則有望於二子不望子作佛而願其現宰官居士身而説法將見般若根深習俗濃厚熏蒸變化此土羣蒙若人若物皆位之育之而生極樂之鄉也子其勉之子其勉之何以稱子示杜生孔子曰三軍可奪帥也匹夫不可奪志也又曰隱居求志果何求歟軻之言曰持其志無暴其氣此聖賢教人披肝露膽處也夫螳螂怒臂以當車轍此其志果何如哉吾嘗觀世之學者每曰有志於功名或曰有志於富貴或曰有志於忠孝舉似可佳及乎稍遇挫辱憂患飢寒貧病不如意事則氣消神沮呻吟困苦不可言稍有忤逆則忿不顧身酒色淫蕩則樂以忘生是則居常所云志者未見如孔之所教不可奪孟之所教持之也此無他蓋隱居未嘗求之耳嗟乎挫辱憂患飢寒貧病拂忤酒色不大於車轍而人不小於螳螂也竟無一怒以當之此何以故學者深求此可與言志
