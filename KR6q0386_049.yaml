body:
  text: 侍者福善日録門人通炯編輯嶺南弟子劉起相重較南嶽逢何玄圃相逢南嶽前坐對中秋月清光徹夜看疑是燕山雪玉山間登玉山頭城中見煙火萬井密如雲蓮花青朵朵望江樓獨上望江樓四面山如織中有餐霞人相對不相識高山寺山城枕江流梵剎雲中起鐘鳴萬戶開人在蓮花裏愚溪愚溪何似我我愚溪不愚流泉日夜響説法聲嗚嗚華嚴菴菴近恆河水僧衣舍衛城經聲和人語總是説無生雜咏二首白鶴飛沖霄翛然任去住可惜無礙身不知生死路螻蟻慕羶腥逐氣呼伴侶忙忙不暫停所得能幾許偶成二首法侶千峰影生涯數畝田信知人世裏難結此中緣青山待人歸本欲求深契誰知來者心動靜多相戾山居十三首片雲浮太虗倏忽遍大地試看未生前清淨無纖翳萬境本寂然因心有起滅一念若不生動靜何處覓長夜無燈燭修途總暗冥可憐酣睡者大夢幾時醒青山容易入白業不難修獨有降心法英雄讓一籌一枕黃粱夢千秋汗血功秪知常不朽誰信轉頭空雪老蒼松古僧間水石清坐來忘百慮眼見一身輕酷暑不可人清風來竹下颼颼涼氣生毛骨頓瀟灑風靜蟬聲急龍歸雨氣腥乘涼高樹下間寫換鵝經雲深便野寺僧老愛扶笻乞食歸來晚愁穿十里松爽氣入疏林萬山秋色好貪看溪頭雲忘却來時道獨坐長松下悠然太古心高山流水意誰復是知音日月如飛鳥乾坤似轉丸浮生忙裏度誰向靜中看長明一碗燈夜對心更寂多少醉眠人夢中狂未息山居二十首六言松下數椽芽屋眼前四面青山日月升沉不住白雲來去常間雪裏梅花初放暗香深夜飛來正對寒鐙獨坐忽將鼻孔衝開幾片白雲不去一輪明月飛來伴我山中寂寞笑他世上塵埃一片寒心雪夜數聲破夢霜鐘爐內香銷宿火窗前月上孤峰滿面清霜冽冽盈頭白髮蕭蕭世上空花影落目中幻翳全消淅淅泉聲入耳明明祖意西來不動舌根常説何須再歎奇哉幽谷蘭香馥馥中宵月色娟娟一段清塵勃勃無端打破枯禪一念忘緣寂寂孤明獨照惺惺看破空中閃電非同目下飛螢雲散長空雨過雪消寒谷春生但覺身如水洗不知心似冰清衰朽應憐骨弱看來轉覺心強午夜脊梁似鐵常時一念如霜空谷諸塵盡謝止留一片間雲伴我松根揮麈堪多麋鹿成羣文字眼中幻翳禪那心上浮塵內外一齊拈却大千世界全身靜夜鐘聲不住石牀夢想俱空開眼不知何處但聽滿耳松風清淨涵空寶鏡春來水滿彭湖照徹廬山面目月如額上明珠蓮漏六時猶短長香百刻安排日夜真常流注識神早托華胎一片雲封谷口千峰劃破虗空中有數椽芽屋深藏白髮山翁可惜青山常在堪嗟白髮時新盡是塵中逆旅誰為物外間人山色愁含宿雨松聲冷咽清霜乞食僧同倦鳥娥眉月上新粧世界光如水月身心皎若琉璃但見冰消澗底不知春上花枝門外青山朵朵窗前黃葉蕭蕭獨坐了無言説回看妄想全消舟中即事空水連天一葉舟即看身世等浮漚鴈聲呌破緣生夢明月蘆花古渡頭大姑山霞帶雲裳月偃眉江湖滿目少相知寒流徹底心如洗莫問夫君是阿誰姑山塔空裏浮圖水月身太虗中點一微塵行人兩眼重添屑幾個男兒認得真鄱湖寶陀寺玻璃宮殿水晶盤面面青山碧玉欄中有一人常説法西江吸盡夜潮寒過桐江挽曾健齋光祿龍華樹下舊相逢每夜談心聽曉鐘今日覓君桐水上空含血淚灑春風清江漁父詞二首水清沙白月如鈎影落波心釣未收無限遊魚吞不得空教漁父抱深愁一葉輕舟逐浪翻五湖風月任加餐夢魂常在深深處最苦離鈎水更寒舟次橫浦五雲一水入南安萬疊山回六六灘行到水窮山盡處梅花無數嶺頭看登南安城城頭瓣瓣湧青蓮花蕊香含萬戶煙身在鏡中人不識更於此外覓諸天度大庾嶺二首一徑雲霞閣道深梅花松雨氣陰森翻思昔日宵行客何似今朝度嶺心嶺上寒梅正發花枝頭雲擁舊袈裟試將拄杖重拈出香逐天風遍海涯曹溪謁六祖大師二首曹溪滴水自靈淵流入滄溟浪拍天多少魚龍從變化源頭一脈尚泠然樵斧才拋石墜腰黃梅夜半寂無聊自持一鉢南歸後從此兒孫氣日驕廣州道中二首煙水南遊歷百城相逢知識總無情挨身才欲須臾住又指前途向別行兩岸中流總不容扁舟逐浪任天風直須高挂孤帆去自信恩波到處同抵雷陽戍所瘴海嵐煙日夜浮龍蛇氣吐混清流到來盡是無生國愈見君恩未易酬寄少林無言宗師二首五乳峰頭草木深春來花發滿空林峰頭積雪仍千尺誰似當年斷臂心清涼會罷復長安一度相逢一度歡別後天南望天北炎風朔雪兩相看放舟波羅江片帆東去海波平簫鼓如從天上鳴遙望三山天外落不知人在鏡中行寄小金山珍公天風吹上妙高臺午夜乘潮載月回灑掃楞伽山上石待余重為寫經來小金山三首萬里長波萬里流誰將拳石砥中洲不因禹鑿開三級自是魚龍會點頭水晶宮殿絶塵蹤香霧氤氛露氣濃明月空中浮客棹夜深階下臥魚龍山浮水面寺依空樓閣虗無杳靄中不是幻成人世界多應天湧梵王宮寄河東妙峰師三首首陽山色枕河流師住中條最上頭麻谷牀前章敬錫至今風韻鬼神愁黃河一線自天來流入中原洗劫灰把斷要關看砥柱慈航不數濟川才天涯行盡路途難毒霧炎風任飽餐忽憶龍門千丈雪猛然提起徹心寒答高常侍寄香一瓣名香出上方封書遙寄到炎荒夢聽刁斗疑鐘磬夜起親焚禮法王懷五臺龍門舊居萬年冰雪擁芽廬一別於今草載餘叶斗峰頭明月夜不知誰在此安居憶匡山遙憶匡山五老峰白雲深鎖萬株松寒空月照彭湖水瀑布聲飛幾度鐘懷匡山天池憑虗閣主人空中樓閣閣中人宛似花間自在身午夜天池浸明月不知此際與誰親五羊喜談子文至自薊門二首西山雪擁薊門寒曾憶圍爐坐夜殘一別杳然如隔世相逢疑是夢中看炎風朔雪兩無憑火宅何如大地冰相對莫驚鬚鬢改此心元是五臺僧憶家山並諸舊遊有引余別家山三十餘年矣今被放嶺外適法兄珂公同廣姪遠慰因成三絶書還懸之舊壁以見人生幻迹如此萬竿竹繞舊庵居樓上仍懸讀遍書夢見四簷青不改空留明月照庭除長安陌上舊行蹤吹盡微塵曉夜風別後消磨三十載不知幾許出虗空憶昔兒童共聚沙百千嬉戲笑如花風霜縱使形容變此念渾同未離家本寺回祿余亦遠遊久抱修復之念今聞恩兄已新寶塔而殿宇尚在荊榛感念嬰心遙寄以詩洞然劫火憶當年寶塔如生火裏蓮今見優曇花再現何時重覩率陀天獨坐七軸蓮華一炷香晝長趺坐倚匡牀市塵門外深千尺唯任輪蹄日夜忙送劉貽哲還鄉兼東諸故人三首瘴海三年共此心形骸總不屬浮沉君歸獨載秋江月徹底寒波思更深身自驅馳心自間窮廬獵隊等青山故人儻問余消息只道婆娑鬢已班世路崎嶇不易行幾能真見是浮生君歸儻過西湖上試看蓮花出水情軍中寄懷虗谷師禪板輕拋事鼓鼙跏趺鞍馬不相宜夜深月照轅門下恰似松陰對坐時懷天臺山二首天姥雲霞傍海多半生夢想竟空過何時一曳撩天杖打醒癡僧寂滅魔華頂峰頭月倍明石梁橋下水偏清能持一滴來炎海猶勝曇花盞內生曹溪四時詠祖意明明百草頭春林花發鳥聲幽朝來雨過山如洗紅白枝枝露未收四山密密緑陰濃窗下風來水面松午睡正鼾才欲夢長廊忽聽一聲鐘刀耕火種是良方秋到家家晚稻香放不下時擔取去何如老偃在韶陽夜深旋煮雪中茶此味天然最可誇更有一般奇特處滿林寒月浸梅花軍中吟二首鐵甲天教當敝裘從軍原不為封侯身經赫日如爐冶傲骨而今鍊已柔緇衣脫却換戎裝始信隨緣是道場縱使炎天如烈火難消冰雪冷心腸陳生讀書天寧寺迹寄祇園已出塵夜眠應與佛相親夢魂忽被鐘敲破始信原為聽法人海月樓海天空處一樓居方丈中涵無盡虗夜起開窗放明月波光霞氣滿襟裾劉生讀書石湖心似寒泉色若冰幽居不讓石巖僧夜烹一滴源頭水乞火頻分照佛燈寄雲棲大師長眉鶴髮久棲雲麈尾時揮繞鹿羣遙寄旃檀香一瓣想師拈對法王焚寄屠赤水居士維摩家近白花山煙水微茫海印寒聞道文殊又東去不知香飯對誰餐寄馮開之太史索楞伽經序憶昔千華一對談珍衣脫却久㲯𣯶楞伽山上摩尼聚何日重開百寶函讀達觀大師末後偈一念從來絶覆藏通身不落是非場試看撒手輕拈出始信阿師熱肚腸懷五臺舊居叶斗峰頭雪未消別來音信久寥寥炎方塵夢經行處曳杖間過獨木橋軍中寄懷黃羽李侍御六首十年戎馬走炎荒常憶同遊海印光大火聚中求著腳與君別處最清涼聚散浮雲不可期此心未離別君時兩輪日月如飛鳥來往無停促夢思大海長江一脈通煙波浩渺總如空萬山縱使能相隔恰似空花落鏡中虗空大地可消亡此念如何屬斷常試問維摩方丈內近來諸有置何方君先待漏紫宸朝遙把楞伽問寂寥侍者飽餐香飯後至今一粒未曾消世事虗空最是間乾坤何地沒青山知君正眼相看處不在音聲色相間寄水田南皋鄒給諫門前一片福田衣時折松枝當塵揮山色溪聲常説法不知若個是當機題香爐峰紫雲菴香爐峰下紫雲深松竹層崖白晝陰門帶長江接溪水清流洗盡世間心山中夏日如焚夏日晝偏長渴想菩提樹下涼一陳風從空裏過送來何處藕花香懷九華山九江江上秀芙蓉一帶雲霞六六峰回首瘴鄉明月夜無端清夢挂寒松繹公自衡陽來參遙向曹溪獨問津溪頭秋水淨無塵持來一片衡山月猶照當年獵隊人寄茶陵劉存赤居士見面何如未見真朅來消息嶺頭春衡山月色曹溪水徹底相看是故人舟次螺江訪僧鍾公不遇曾坐江樓待雪消螺江春水急於潮今看白鷺洲前月猶似當年伴寂寥蒙恩宥還山少小為僧五十年老來特地混塵緣從今走斷天涯路此去千峰白晝眠夜坐露灑幽蘭撲鼻香風吹毛骨夜生涼坐來已覺心如雪月色還疑地上霜夏日過法性寺二首菩提樹下風祛暑般若臺前雨送涼一盞清茶諸想滅更於何處覓西方覺樹當年向此栽初心為待至人來千秋衣鉢今仍在説法誰登舊講臺懷雪峰枯木堂枯木堂前冷似冰當年曾坐半千僧遙思一片寒灰地何日重挑午夜燈題畫二首飛來山色掩湖光煙樹新晴帶夕陽遙聽上方兜率界半天鐘鼓落微茫一片煙波十五橋雲山落木晚蕭蕭孤城半壓吳江水水上人家夜聽潮將之雷陽江上別曇公相逢庾嶺日初遲欲折梅花第幾枝忽逐秋風度炎海別君不似見君時懷舊居安居舊住竹林西明月溪頭幾杖藜常想夜深松露下不知猿鶴向誰啼寄浮山淡居鎧公浮山九帶事如何回首當年已爛柯為問夜深趺坐處白雲明月是誰多舟次小金山志感常思半月經三度倏爾暌携又五年此日重來峰頂坐德雲原不是生前憶山中梅二首曹溪梅花每至盛開如坐香積世界今冬以魔作祟牽次芙蓉江上望山中咫尺不得坐享香供詩以憶之寒梅帶雪嶺頭開冉冉天花落講臺好遣上方香積國為豫一鉢盡擎來梅花香樹積成林香氣熏人悅可心樹下現敷獅子座風聲誰解海潮音得東海門人江吾與書二首從空一紙故人書萬里遙來問起居為報親知零落盡滿頭霜雪更愁豫十五年來坐瘴鄉海天相對未能忘時看萬里中霄月一似同遊海印古佛松林松陰幕幕淨無塵山色雲光自法身日夜風濤廣長舌不知聽徹是何人開元曉鐘明河清淺淡疏星古寺虗簷宿百靈一擊曉鐘驚大夢不知誰最獨稱醒平原古塔浮屠何代擁諸天傳是隋朝大業年蒼蘚剝封殘碣盡平原荒草布金田寄愚菴法師遙想華臺坐講時四天彌覆法堂垂座中龍象清如許可記炎荒老赤髭寄草堂法師瘴海還從坐寶林常懷法窟舊知音遙看一片燕山月盡是隨緣度世心山居偶成四首百年世事空華裏一片身心水月間獨許萬山深密處晝長趺坐掩松關滾滾紅塵世路長不知何事走他鄉回頭日望家山遠滿目空雲帶夕陽鬧藍誰肯急抽身自古青山隔市塵莫謂桃源無路入落花流水是知津日夜煙霞護翠微相將猿鶴待忘機青山莫道間無主自是間人不肯歸送隱知禪人還蜀一錫冷冷過瘴鄉巫山西去思茫茫峨眉峰頂新秋月知爾看時到上方寄題杜將軍曇花精舍二首鼓吹轅門獨晏然曇花樹下晝安禪誰知可汗歸王日正是將軍破有年鐘鼓胡笳總道場旌旗影裏坐焚香思君力破羣魔壘自許心空見法王送慈公還五臺一別臺山三十年眼前冰雪尚依然君來細説窟中事又結多生未了緣寄空印法師憶昔臺山百尺冰與君對坐骨崚𡾓翻思三十餘年事夢裏相看似不曾別曹溪二首為決曹溪萬里流歸心常撫大刀頭因思血浸齊腰雪千古令人痛未休自為曹溪杖䇿來坐看山色笑顏開從今一別千峰去鳥語溪聲不盡哀初至衡陽喜雪二首七十峰頭雪正寒到來深見此心安回思火宅驅馳地盡入冰壺影裏看五熱場中幻化身草年來往任風塵今歸一片瀟湘雪原是清涼徹骨人山居二十八首余生平抱煙霞之癖早年行腳三十住五臺冰雪中者八稔及居東海一十二載知命之年乃被業風吹墮瘴鄉將二十年嗟乎人生幾何忽忽往來已七十歲浮光幻影豈能長久頃蒙聖恩賜還初服特來南嶽作投老計因緣未偶乃就湖東古道場地仗諸檀越助營安居創始於甲寅九月既望落成於臘月逼除草草苟完從此一片身心始得休息之地如久客還家以釋重負其逍遙灑落何快如之隨有口占命侍者録之以志幽懷非言詩也興來即筆略無次第云耳祇園借得一枝安從此無論道路難日上三竿高臥穩相看不必勸加餐雪壓衡門夜擁爐此身雖寄恰如無不知日月從何去回首人間歲已徂灌木叢中一小菴石牀為座草為龕杜門口似維摩詰莫問前三與後三形如枯木念如灰雪滿頭顱霜滿腮不是老來偏厭世眼中無處著塵埃身心放下有餘間垂老生涯在萬山不許白雲輕出谷好隨明月護柴關寒燈獨照影微微踈屋風吹雪滿衣忽憶五臺趺坐處萬年冰裏一柴扉寒威入骨千峰雪怒氣衝人萬竅風衲被蒙頭初睡醒不知身在寂寥中百千世界空華影一片身心水月光伎倆窮時消息斷可中無處著思量地爐無火石牀寒瓦鼎香消坐夜殘萬籟聲沉心更寂却疑身在鏡中看四圍嘉樹影扶踈樹下深藏一小廬車馬不聞人迹斷閉門長日獨跏趺寒雨瀟瀟風滿林蓮花漏永夜沉沉誰知舉世難醒夢盡是光明般若心夜深獨坐事枯禪撥盡寒灰火不然忽聽樓頭鐘磐發一聲清韻滿霜天雪滿乾坤萬象新白銀世界裏藏身坐來頓入光明藏此處從來絶點塵平湖冷浸菱荷衣湖上青山絶是非塵迹盡消人世遠白雲鷗鳥總忘機雪擁柴扉獨坐時寒林寸寸折瓊枝曉來頓失青山色開盡梅花總不知春過人日雪初晴新月疏林影更清夜起推窗望寥廓滿天星斗挂簷楹雲開四野動春光何處梅花送暗香曳杖欲尋幽谷去一枝斜倚在東牆一片雲封萬壑松門前流水日淙淙不分晝夜供鼾睡好夢驚回隔嶺鐘春深雨過落花飛冉冉天香上衲衣一片間心無處著峰頭倚杖看雲歸信步騰騰任所從形骸一似雪中松偶來才向溪頭立又逐間雲過別峰麋鹿空山孰可從輸他豐草與長松紅塵縱有難醒夢絶世何曾到萬峰垂垂白髮對青山身在千巖萬壑間寂寂松門無過客往來唯有白雲間青山不動自如如朝暮雲霞任卷舒縱有紅塵深萬丈曾無一點到茅廬萬峰深處獨跏趺歷歷虗明一念孤身似寒空挂明月唯餘清影落江湖睡起呼童旋煮茶竹爐湯沸雪如花旗鎗未竪魔先退始信叢林有作家倦倚虗窗坐看山千峰紫翠出松間無心縱許雲來往何似如如體更間月色松聲總見聞禪心妄想聖凡分消歸一念無生處此意如何把似君平湖秋水浸寒空古木霜飛落葉紅石徑小橋人迹斷一菴深鎖白雲中寄舜菴老衲三十餘年學懶慵生涯坐斷祝融峰身輕鶴骨休言老千尺還看手種松寄魏考叔幽居宛是在家僧一室清如六月冰縱使善空諸有盡尚餘山水挂眉稜留別湖東社中諸子二首曇花舍就竹林西市遠塵囂最可棲勤掃階前雲臥地歸來莫使草萋萋偶來松下掩柴關招隱相求出世間豈意又隨流水去別君心似戀雲山嶽陽阻風二首嶽陽樓外浸湖天樓下沙汀夜泊船來往風帆留不住獨餘山色尚依然北風吹浪打山城一葉輕帆阻去程想為留看洞庭月怪來偏向客邊明過金沙於潤甫雲林咫尺雲林望不遙到來寒爽氣蕭蕭閉門不放煙霞出多少塵心亦易消西湖偶成四面湖山鏡裏看樓船深浸碧波寒不知身在冰壺影可笑沈酣夢未殘喜歸匡山垂老青山荷主恩匡廬南向臥朝暾七賢五老遙相對泉響深談不二門挽匡山黃龍徹空師二首昔與師住五臺冰雪中者三載別來三十餘年所矣豫今投老匡山一禮師塔挽之以詩憶昔清涼對坐時垂垂冰雪綴雙眉別來夢到傷心處一段難禁祇自知塔影團團擁萬松法身不動聳千峰知師常説無生法鳥語溪聲和曉鍾山中雪夜雪擁千峰獨閉關寒燈深夜照衰顏心灰已絶紅塵夢誰信人間有此間閲華嚴經十地品夢中偶成一葉輕舟一釣竿鈎頭香餌未曾殘直須入海深撈摝莫滯蘆花淺水灘思鄉曲二首余十二歲離鄉今六十年矣適鄉人遠問於山中因賦此門前高柳映清池常記兒童戲浴時六十餘年如夢事幾回猶動故園思青山一帶繞河流家住河邊古渡頭自小離鄉今已老此心不斷水悠悠懷大都龍華主人龍華樹下有緣人一別難求似昔親幾度夢魂飛夜月縱然相見總非真入山直入千峰不厭深最幽絶處可安心松門任使青苔厚從此時人沒處尋曹溪堂主俯無昂公來訊二首自別曹溪已十春常思香水一霑唇夢魂時坐松陰下只恐今生是後身溪上梅花不斷香幾回香霧溼衣裳年來每到看花處一似當時坐法堂送青林熙公遊南嶽二首憶昔曾登七十峰倚天傍日撫長松幽巖絶壑探奇遍君去尋余䇿杖蹤萬峰深處碧雲寒曾結茅廬學懶殘牛糞尚埋煨芋火君應一撥地爐看偶成湛海波澄一物無寒空深夜月輪孤但看萬里纖雲斷自覺冰心在玉壺集外詩五首喜老母遣弟至天屬憐同蒂君恩賜一身生還如有日尚可奉慈親憶故鄉居家住龜山陰宛似恆河曲却憶兒童時熱在河中浴夾岸柳陰濃當戶南山翠手種碧桃花不知在也未門前一小橋幼見水衝斷欲架獨木枝路遠猶未辦憶鄉友幼小同讀書連牀還共被誰知一別來看看六十歲却憶聚沙時相戲常生惱只記童子顏不信今衰老憶家山菴居樓居水竹總相連長夏清風白晝眠此日炎荒萬里外回思恰似幾生前
