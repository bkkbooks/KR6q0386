body:
  text: 侍者福善日録門人通炯編輯嶺南弟子劉起相重較題跋題壇經首示智境禪人從上佛祖為生死大事出現世間靡不大捨身命歷盡艱難自萬死一生中來觀吾本師和尚釋迦老子曠大劫來為此法故捨頭目髓腦不啻恆沙即此翻出頭猶向雪山凍餓六年以至馬麥金鎗何所不受剛剛博得四十九年粥飯氣息而已猶未見有奇特處且又末後惹得一場笑具至今流布寰區乃教碧眼特特西來把作實事賺他神光誤墮一臂及至老盧俗漢子被他一語調弄刺向黑漆桶中悶絶至死者又不止萬萬也自黃梅夜半放下腰間石頭拾得一些子破落索當作奇貨豈料被他纍至於死者又萬萬矣且幸自獵叢跳出滿目羞慚每每向人申說平生負墮處即以太虗為口猶吐露一點不出直令話柄流落江湖傳者又為實事悲哉余亦為此法故上干宸怒實出九死幸爾絶處再蘇蒙恩貶雷陽以萬曆乙未冬日出帝都冒雪南行至白下擕弟子智境如廣作形影及至雷陽瘴癘大作飲者萬萬無完人余與從者俱冒毒癘病而廣竟不起境則再死而復生苟非仗諸佛神力加持及自願持之蓋萬萬無遺類矣境病稍瘥余即遣歸盧山省乃師且以借萬頃湖光千尺瀑布以洗未盡習氣也臨行無以為屬案頭驀拈此卷遂以付之將見古人大死後如此消息但非真死者莫可得境當持之於孤峰頂上萬丈巖前試在措手處定當看苟能真個大捨身命如古人則不但不負老人今日之事抑且不負自己萬劫千生種來最勝金剛種子也爾其勉旃無忘所囑時萬曆丙申長至月十九夜燈前記於五羊東郭之壘壁間觀楞伽記略科題辭科以分經從古製也昔道安法師以三分科經時人譏其離析經義及親光論至果以三分斷其全經時乃歎其雅合蓋經經各有綱宗科乃提綱挈要使觀者得其要領庶離言得意而悟入之令捨筌蹄殆非支分節解逞臆斷也後之義學昧於離言之旨各恃己見駢枝其說以取謗法之愆使學者莫之適從正所謂以多歧亡羊耳楞伽以離言說第一義為宗文博義幽舊解但科其文而未盡挈其義於通途一貫之旨未暢使觀者狥文而失義以致修心三觀不得其門而入雖古今講演流通盡大地而依之造修者鮮知其要有負如來開示正修行路也今豫妄為通議直欲發心條貫使學者一覽便見指歸其略科但先撮要義以示文外之旨使知問答來源融會一貫了然心目冀可忘言得義不以文句為障礙耳然即此已為剩法後之學者切不得以此為缺而更增益其說自取謗法之罪不淺矣萬曆戊戌孟夏佛成道日沙門德清題於五羊之青門壁壘間題金剛經注解後佛性之在纏如珠之在懷水之在地然雖固有不指不知不鑿不得也是則善友知識乃指珠之人無量法門特穿鑿之方耳豈實法哉如來出世為一大事因緣所謂開示悟入佛之知見佛知見者乃衆生之佛性即般若之真智也且此真智吾人本自具足曾無增減正猶衣底之珠本無明昧地中之水源有淺深此其法無頓漸悟有易難由根有利鈍障有厚薄耳上根利智障薄德厚者一觸便了此悟之易故稱為頓如六祖大師聞應無所住而生其心一語頓悟本有便悟無生是多劫般若緣熟當機一觸即了然自信如披襟見珠原自本有不假外求此豈易見哉嗟乎人者無明之地堅固法性之水益深疏鑿之功未著求其乘順流而歸智海蓋亦難矣是以聖人不得已而施設因五性而立三乘循利鈍而開頓漸此八部般若之談猶為創入大乘初步而此經者特八部之一所稱金剛取其能斷耳蓋直指當人佛性堅固不壞頓斷無明離一切相如如不動正若衣珠從來不昧第指示須人悟之在己是則經乃指知之方注特穿鑿之法耳若夫吸滴水而獲清涼除熱惱而解渴愛爽然意消神釋處是飲者自知殆非可以向人吐露也蘇君叔達夙具般若種性生平酷嗜此經與焦太史諸大知識遊自信彌篤得此注本如獲至寶即壽諸梓以廣法施余見歡喜合掌而讚曰婆竭龍王能以滴水霪滿閻浮潤焦枯而成百物斯特業力變化乃爾況般若神智所熏發乎因是而知蘇君法施之功大矣書金剛經頌後右金剛頌十七首蓋余己酉季秋在曹溪寶林為諸來弟子講金剛般若而作也嘗念六祖大師聞此經一語即見自心如觀掌果直到不疑之地故從黃梅已來單以此經為心印豫向隨波流未達彼岸以不知話頭落處槩以文字目之故反為作障礙耳頃於空生嘆希有處猛然透始信古人不欺之地皆從現前日用疑根發耳靈山會上諸大弟子親近如來晝夜無間者三十年竟如盲若聾故於世尊日用揚眉瞬目行住坐臥中未觀一毛至於種種開示皆墮疑網若非空生今日看破則終當面錯過矣何況末法中志求道者親近師友豈易信哉六祖一入黃梅之室徹信不疑臨濟初入黃檗之室三度喫棒正似靈山三十年前弟子也及從大愚處命根斷後再見黃檗便能道只為老婆心切一語此正若空生冷地看破世尊便歎希有時也嗟乎自古師資授受之際誠不易易所謂見過於師方堪傳授似水投水如空合空覩空生對世尊時莫道不疑只是就世尊舉揚處如良馬見鞭影而行比未開眼時天淵矣此頌在空生分上大似畫蛇添足且喜見空生肝膽如空生見世尊處不異如為幻人歌者擊節耳善侍者執侍老人二十餘年其為日用舉揚此事不減靈山而從患難艱虞又與空生遠矣若此心不似空生見處何能消受種種苦惱耶時以魔業繫芙蓉江上一葉舟中寒夜書此付之大似寒空鴈影耳物不遷論跋豫少讀肇論於不遷之旨茫無歸宿每以旋嵐等四句致疑後有省處則信知肇公深悟實相者及閲華嚴大疏至問明品譬如河中水湍流競奔逝清涼大師引肇公不遷偈證之蓋推其所見妙契佛義也豫嘗與友人言之其友殊不許可反以肇公為一見外道廣引教義以駁之即法門老宿如雲棲達大師諸老皆力爭之竟未回其說豫閲正法眼藏佛鑑和尚示衆舉僧問趙州如何是不遷義州以兩手作流水勢其僧有省又僧問法眼不取於相如如不動如何不取於相見於不動去法眼云日出東方夜落西其僧亦有省若也於此見得方知道旋嵐偃嶽本來常靜江河競注原自不流其或未然不免更為饒舌天左旋地右轉古往今來經幾遍金烏飛玉兔走才方出海門又落青山後江河波渺渺淮濟浪悠悠直入滄溟晝夜流遂高聲云諸禪德還見如如不動麼然趙州法眼皆禪門老宿將傳佛心印之大老佛鑑推之示衆發揚不遷之旨如白日麗天殊非守教義文字之師可望崖者是可以肇公為外道見乎書此以示學者則於物不遷義當自信於言外矣重刻佛頂首楞嚴經跋首楞嚴經者乃無上頂法文該三藏教攝五時徹迷悟之根源究聖凡之要路真修妙門無尚於此故參禪之士不入此法則正眼不明探教之徒不通此經則重關莫闢自入中土解者固多而通途大旨總未究竟近有邪解之徒甚至曲引玄言以附外論壞正見世莫能辨為害非細荷擔慧命者為之寒心頃楚萍圓上人久居豫章攝受有緣深悲邪見之幟難拔乃集緇白法侶捐刻本文梵冊將以豎正法幢冀諸有志法門賢哲之士深究佛意不墮闡提則法海津梁此為帆楫其護法之功豈小補哉敬題此以為先唱刻起信直解題辭此論乃禪宗關鑰為大教之宏綱也親教者非此無以知宗要參禪者非此無以開正眼實性相二宗之指南也文簡義深法界一心理事因果修證頓漸包括無遺故法門學者捨此而求悟入是却步而求前也賢首舊疏精詳委悉而長水記亦浩瀚無涯淺識者茫無歸宿豫先取本疏略去繁科纂成疏略業已刻行時為初機指點猶以為艱故復用疏義隨文直解貴在一貫不假旁引枝蔓而一心真妄迷悟之義了然畢見如胝白黑其實祖述前意不敢妄越但取隨文易會不煩鈎索而直達本源以為新學之一助云刻百法論八識規矩跋百法八識乃相宗指南為入大乘之門也以佛說惟心唯識道理遍該一大藏經而彌勒約為六百六十而天親約為百法識論百卷三藏法師約為頌四十八句可謂至簡至要乃法界之綱維也以一切衆生迷一心而為識無明障蔽現前日用而不知自心之善惡樞機若親教者展卷則見文字遮障而不知所說皆自心本有之佛性參禪者抱持妄想盲修瞎煉而竟不達生滅根源是皆不知此論之過也然論約剛五百言而頌止四十八句統收一大時教世出世法無不該盡若教若禪無不揭示正修行路學者有志不費期月之功而通徹無遺嗟無志者不能潛心於此而甘為愚蒙可不悲哉此論古今解者多引識論本文初心難入且不便於俗諦故豫取其義而變其文以便初機使其易入文似闕而義實具是亦隨順說法非敢妄損古德成言以取謗法之愆也書四十二章經題辭此經乃吾佛世尊初成正覺所轉根本法輪也其旨以一心為宗故曰識心達本號為沙門以斷欲出塵為用故曰離欲寂靜最為第一又曰愛欲斷者如四支斷以酪為教相以醍醐出於乳酪而無上佛果皆本於真妄一心也良由心為法界之本欲為衆苦之源今將離苦得樂故以斷欲為先世出世間修行之要無外乎此故為根本法輪也有子曰孝弟也者其為仁之本歟且順親為孝敬長為弟吾佛亦曰孝名為戒孝順三寶父母師僧孝順至道之法豈非以隨順覺性而為復性之本耶嗟乎一切衆生皆以淫欲而正性命顛暝於此其來久矣然性與欲若微塵泥團耳苟非雄猛丈夫以金剛心而割斷之可以出大苦得至樂乎孔子曰人有欲焉得剛不剛則於此法門猶望洋也是以吾佛出世最初說此離欲法門是猶痛處劄錐耳故經中以此再三叮嚀致意焉凡學佛道有志於究明此心者捨此而言行是猶却步而求前也題十六妙觀後十六妙觀始因韋提希夫人為逆子阿闍世王所苦求佛哀救故佛親詣幽宮放眉間一光遍照十方佛土令夫人自擇隨願往生夫人獨愛西方極樂世界是以世尊特為說此十六妙觀以為往生之資但得一觀成就必得如願是故淨土一門最為超脫生死之徑路古今造修而取證驗者不可勝數或者槩以為中下根設非也佛以一光頓照十方佛土了然目前豈中下根人之境界且一生頓脫無量劫之生死豈中下根人所能哉嗟乎末法人多妄誕但縱口耳以資談柄雖上上根人何益耶語曰藥不必扁鵲之方愈病者良況法王親垂證驗之法門韋提已效之妙行修行捨此而別求玄妙非愚即狂實是自作障礙耳悲夫吾徒沙門釋子身既離塵而心源混濁日夜馳想於五欲場中曾無一念回光返照於自心且又妄談般若輕欺法門甘心泥犁而不省者豈不悲耶門人某請益老人特書此頌以為淨業之資將期實行實證庶不負此生出家之行腳事耳若捨此法門別求向上則佛豈誤人而永明大師又豈欺人耶題諸祖道影後諸祖乃傳佛心印之宗師也意昔世尊說法靈山常隨弟子千二百五十人及佛末後拈花迦葉破顏微笑遂傳心印為教外別傳之旨是為禪宗二十八代至達摩大師遠來東土六傳而至曹溪下有南嶽青原以分五宗由梁唐至宋元得一千八百餘人皆世挺生豪傑之士塵垢軒冕薄將相而不為故歸心法門一言之下了悟自心使歷劫生死情根當下頓斷遂稱曰祖豈不毅然大丈夫哉嗟此末世去佛時遙既不預靈山嘉會而此土諸祖出世又不能親近入室故沉迷至今而不返者亦可悲矣久聞大內藏有歷代諸祖道影新安高士丁雲鵬者丹青之妙不減僧繇道子偶得內稿本八十八尊達觀禪師命畫四堂其一置西蜀峨眉其一置金陵祖堂其一置匡山五乳一置南嶽曾儀部金簡居士請歸湖東觀察備兵吳公生白一日過訪隨喜見而歎曰此真光明幢也會荊門畫士史宷善肖像遂命臨一冊竊覩公丰彩高遠有翩翩出塵之度故望影而歸命蓋亦曾親近入室中來昔裴休見壁間高僧真儀問黃檗曰真儀可觀高僧何在檗呼曰裴休休應諾不覺諤然遂大悟豫想公夙種般若深根悟心不在裴丞相後故為集諸祖略傳各為贊以致公將為家傳心印也題所書佛心才禪師坐禪儀後余每向學人說修行法唯教以放下妄念撇脫情根不隨生滅心轉如此二六時中一切遇境逢緣逆順關頭愛惡貪瞋習氣發時當下一念回光返照決不為他遮障遷流一口咬定如咬鐵釘相似如此是謂具金剛心名為狠心漢即此可名參禪人手段如力士打拳渾身上下左右都照管到一些滲漏不放空如此乃可謂善用其心是謂勇猛伶俐衲僧此老人尋常以此一段說話示人恰似十字街頭賣平頂冠一般數十年來空受了許多起早睡晚不曾博得一文錢買冷飯喫今日看來不如才老佛心禪師說坐禪儀大似狀元郎教童蒙上大人丘乙己相似如此工夫東道不少果能學得不怕不到狀元地位回看老憨依舊還是一老骨董也具出世志正好放下心腸依此老榜樣死做一番豈不以今日此一片紙作破魔軍出生死一道符驗耶快參快參題寶貴禪人請書七佛偈後此七佛偈乃佛佛傳受心法也一大藏經千七百則公案乃至一切衆生日用現前境界以及蠢蠕蜎飛凡有識者皆向此中流出自有佛法以來聞見不少而知之者希但益多聞增長知見未有一人能向此中著腳者洪覺範禪師被放海外無佛法地寓於廢寺破壁間見一毗舍浮佛偈範持之久自云平生學道獨於今日得大歡喜方到休歇安樂之地由是觀之佛法信乎無多子學者政不在廣見博識增益多聞障耳昔山谷老人善擘窠大書凡有以佳紙精素求書者必書此偈以遺之足知古人於此中得真意者別自有解脫門非言語可到也余於辛丑夏日病起趺坐藤床寶貴以此紙求書七佛偈余是夜夢侍一偉人作書豫初握管自會有矜持狀其人笑謂之曰書法政不爾字始於蟲文鳥跡原非有意求好也余在夢中觀其用筆之妙運動之勢非凡情可想象者覺來猶恍憶遂乘興書此乃學夢中人也又余始學佛法謂諸法如夢幻觀乃入道第一妙訣枯坐山林三十年來未曾離此一念今觀此卷恍如夢事以此印心則諸法皆然即此而推水月鏡像空華陽𦦨種種境界頭頭皆解脫門也嗟嗟塵俗中人欲以有思惟心不清淨見求入諸法妙門難矣自無受用地安能令人歡喜乎後之觀此卷者能作如是觀不獨入書法亦可入佛法矣寶貴裝潢卷成見有餘地復作書尾又余每謂此七偈乃佛祖相傳心印也極喜書施諸方不下數百幅矣往往自為題跋以示為禪門關要但未知翻譯來源今於護法録中見宋公此跋足為禪門千古公據故併書之以曉近日參禪者懷增上慢不親教旨之輩為秦鏡云丁右武大參浮海四詩跋聞之古人有言曰兕虎不能撓其神獵士之勇也蛟龍不能動其色漁父之勇也死生無變於己達人之勇也死生無變於己而況利害之端乎海內識者皆以右武剛腸直烈雄才大略稱知己余觀右武當百折之餘投之海涯曠然不恧於色及赴廣海戍度崕門風濤大作桅折蓬飛顛覆萬變傍人束手公方倚舷歌詩諸豎子群起而譟曰舟覆矣公曰且住且住待我詩成頃四詩剛成而舟膠於沙遂得無覆公乃大笑曰豎子幾誤乃公詩噫此豈剛腸直烈雄才大略所可及哉是有大於此者率然臨之而本體自現在公寢處蓋亦不自知其安也故曰造適不及笑獻笑不及排此之謂歟豫因為公刻此詩於海珠而書其後如此為右武書七佛偈題後七佛偈乃從上佛祖授受心印也古人悟此者如大火聚一切死生禍患情塵燎然不可攖觸是稱雄猛丈夫秉般若鋒執金剛𦦨者也右武居士賦性如此豈非多生習此法門乎余同難行間相與旦夕遊戲以法為娛偶索書遂以此狀其本色得包公硯書心經跋往聞包公守端州一硯不留之說視為漫談及豫來詢之父老云昔包公治端革貴硯之斃偶得一美者𢹂之歸過羚羊峽口風波大作公云吾生平無愧心之事無虐民之政何以有此因視其硯云豈山靈吝此物耶遂投之水中風波乃止自後時時光怪發於水上為漁人網得之自爾光怪不復見羅生持此硯至余撫摩良久喜而歎曰神物隱顯固自有時得欣賞者亦非偶爾語曰至誠可以貫金石視此頑石包公心光能煥發於此況般若所熏乎其歷千劫而不朽者宜矣因試墨遂書心經一卷以付羅生題東坡觀音贊曹溪云佛性無常紫柏跋東坡觀音贊亦云苦樂無常然苦樂乃佛性之變也聖凡又苦樂之聚也以佛性有受則苦樂以之不受則聖凡泯矣斯則佛性隨苦樂現故衆生之苦樂以不受者受之則知苦樂者苦樂所不到也衆生有苦以不受者而呼則同不受者而應如空谷答響人若以不受者而遇苦則如湯消氷應念化成無上知覺何假他力哉是則受以不受為母生以不生為君重生知所重則超苦樂而生為贅矣題鬼子母卷我觀鬼母愚癡無比祇知貪他不顧自己己之所愛不捨一絲如何於他絶無慈悲一切母子本同一體若能等觀癡心早止若非如來拔其癡根直至窮劫尚墮沉淪縱有神力總出瞋癡用不得處方乃自知愛力極處癡心頓歇鑊湯爐炭當下消滅書元旦大雪歌跋豫昔同黃龍潭徹空師居五臺叶斗峰前之龍門時冬大雪風捲埋屋積丈餘擁衲對坐只覺夜長及起開門則雪堵矣急撥火取燈相視而嘻將謂活埋適北臺主人探而知之乃領行者數十操作具裹乾糧而來救除隧道而入入門相見其樂融融如在黃泉之下也自豫放嶺外二十年中每一思之頓破炎蒸毒熱者仗此一念氷心也頃豫逸老匡山初得憨宗珏公指五乳以棲之公乃徹師之的骨孫公視豫如若翁豫每一見公即如對徹師於雪窖時也天啓改元歲旦大雪三尺萬山連凍不減窖中豫自別五臺三十餘年未見此境故感而為之歌即以書似珏公蓋不忘徹師相與死生之際也今珏世黃龍之家聲能體現前事事皆從乃翁忍凍餓中來則何熱惱之不清涼何道業之不成辦哉諺語有之創業非難守業難苟知祖翁田地時時耘耨不致荒蕪則知我本師釋迦和尚百千萬劫捨身命財在雪山六年凍餓博得四事供養以貽兒孫吾徒日用所食粒米莖菜皆我本師之通身毛孔滴血也審此又能甘心虗度此生乎然因寫雪詩而及此者大似因漁父而得見大海波濤也公其志之天啓元年立春日題從軍詩後雷陽正當南極東坡題曰萬山第一所謂水窮山盡處也形家稱為盡龍故古之忠臣義士被謫者多在於此氣使然也寇公居之未久至今父老侈談昔東坡謫儋耳子由亦遷至而西湖遺事寇公有祠蘇公有亭山川之勝景物依然然僧來戍者昔宋之大慧徙梅陽覺範戍珠崖噫二老去余五百年矣今余蒙恩遣至此蓋亦上下千載奇事惟我聖朝僧戍者獨我始祖南洲洽禪師為護建文駕獲罪成祖赦之以其弟子德録戍於此尋即放還及某二百餘年矣頃亦為國祝釐獲罪而至此豈無謂哉余至主於城西古寺坡公亭中士子爭談坡公如昨日及訪覺範故事則杳然矣天南風物迥異中洲四時之氣亦不與天地準如乾之純陽變而為離離火方也萬物皆相見為炎熱鬯為文明人但見景物之不見通暢之妙故於文章詞賦不能盡其造化之微余初至時遭歲厲遂於此中注楞伽經自謂深窺佛祖之奧蓋實有資於是也向不求工於詩自從軍來此詩傳之海內智者皆以禪目之是足以徵心境混融有不自知其然者由是亦知古人之詩妙在於情真境實耳紫垣君侯出冊命書之聊書之以供覆䍌并發一笑題十二首臥病詩後沙門從戎昔亦有之如大慧禪師戍梅陽冠巾說法寂音尊者戍崖州箋注楞嚴二大老以如幻三昧處患難如遊戲豫少年驅鳥烏時即知其事想見其人不意豫年五十時亦遭此難蒙恩賜謫雷陽其地蓋在二老之間自慚非其人也然恆思其風致初至戍所即注楞伽蓋有感焉所寓之時與境未審較昔何如而以僧體慧命為懷一念保持兢兢弗忘自謂禪道佛法不敢望二老門墻至若堅持法門孤忠耿耿實有嚙雪吞氈之志而山林故吾之思形於聲詩者真繫鴈足帛書也千秋之下讀此詩而想見豫者能若豫之想二老乎嗟豫老矣書貽侍者廣益持此足見家範也六詠詩跋佛法宗旨之要不出一心由迷此心而有無常苦以苦本無常則性自空空則我本無我無我則誰當生死者此一大藏經佛祖所傳心印蓋不出此六法總之不離一心若迷此心則有生死無常之苦若悟此心則了無我無我則達性空性空則生死亦空殆非離此心外別有妙法而為真空也從前有志向禪者多槩從心外覔玄妙於世外求真宗所以日用錯過無邊妙行將謂別有佛法殊不知吾人日用尋常應緣行事種種皆真實佛法也但以有我無我之差故苦樂不同而聖凡亦異端在迷悟之間耳以我為衆苦之本也明府索書禪語故録舊作六詠詩復記其事且為他日證此法門之左券云書懷李公詩後右詩十首作於乙巳長至月望明年丙午孟冬時在曹溪喜重修祖庭翻然一新禪堂乃六祖大師說法南嶽青原諸大祖師安居之所世代變遷化為鼠壤狐窟今余力求以復舊制規模軒豁不減昔時而經營佽助則林參軍知足居士一力以肩之也因思昔日東海莊嚴妙麗將興法道之際而余遂嬰難放流嶺外豈意又復幻此道場以開幻衆作如幻佛事度如幻衆生耶況蒙恩詔湯網大開當初執縛之始即今解脫之終一期周圓平等無二所謂東方入定西方起比丘身中入正定居士身中從定起是名方網三昧者非耶余今難忘李侍御公最初一念歡喜心適遂書懷李公詩以付居士以是見區區不為險難傾奪不為境界遷移不以殊形異趣不以去就介懷不被惡魔之所搖動者如此非夫踞忍辱地坐寂滅場者何易致此哉箇裏機緣又為老人傳家之祕殊非文字所能述居士其能得此乎書山居十首跋此詩書於入滅十日之前乃絶筆也此詩蓋作於匡山五乳在壬子春日也侍者深光即以此卷請書老人慵於筆硯故束之高閣及復之曹溪濵行付侍者廣攝持來藏之久矣癸亥秋九月光以書來省因督攝未完時老人以足疾舉痛且苦於應答攝乘間頻請老人因念老矣恐作未來之缺故勉強力疾書之以歸可謂為憐三歲子不惜兩莖眉豈非婆心哉若以詩字觀之則辜恩多矣時癸亥冬十月朔日紫柏老人觀病偈跋紫柏老人居常以無性義示人如弄丸之手觀者莫不心駭目眩此指自雪巖中峰諸大老後知者鮮矣惜乎道與時違未遂振起之願此老人生平之所苦心者嗟乎哲人往矣後生晚輩安能復覩宗門之標格乎峨嵋海默禪人持觀病偈豫見之不覺潸然泣數行下手澤依然寶之當作光明種子也書范蠡論後此論蓋豫於己酉秋日舟泊珠江之滸李參軍以范蠡歸湖圖請贊余因是有感而作也嘗謂古之文人評論古人物若三蘇之作燦然槩不及此何哉是知求知己於千載之下古人所難而期有旦暮之遇者非偶然也蠡之心固難見以豫言而發之則蠡亦將瞑目矣奚有古今去來哉余謂丈夫處世抱超世之見者必不易見知於世故龍與麟舉世三尺之童皆知其為神且瑞此約不見而爭誇之也即旦見龍人將以為蛇麟一出必見災於虞人又何怪哉余居曹溪之十年蓋嘗一龍一蛇矣唯不免一災時有匡人之圍者兩旬當己酉寒露降霜之候清夜興發侍者某偶於篋中檢出此素卷余乘興捉筆其論適在案頭遂書之併識其意如此題書法華經歌後余少時即知誦此歌可謂深入法華三昧者每一展卷不覺精神踴躍頓生歡喜無量往往書之以貽向道者頃來曹溪為六祖整頓道場業將十年忘形從事百廢具舉山門改觀不意魔僧內障自壞法門顛倒狂惑搆訟公府以致豫棲郡城悠悠二載時在郡歸依護法者獨黃居士二年一日朝夕無間祁寒溽暑奔走不爽毫髮豫因感昔覺範禪師遣海外親知朋友鳥驚魚散獨胡強仲一人為之周旋送至韶陽師為序以別之即今讀其文想見其為人今豫以流離患難之身孑然處污辱是非之場有居士為之木舌公庭之事了然如揭日月此緣豈淺淺哉今事竣將行豫乃為書聽誦法華經歌一首以貽之令其誦習以結法喜之緣且以此紙傳之子孫使後世亦知乃公能與憨山老人眉毛廝結即以此善根福及子孫世世享之可謂不虗此會良緣矣故併記之又豫放嶺外親友疏絶如隔天上萬曆己酉夏日大都慈善寺長老義天孝公特來相慰於曹溪松下一見悲喜交集如異世人也憶豫昔乞食長安時過公宣明室洗滌客塵今在炎荒火宅每一思之頓入清涼地當茲塵土欲求滴水盥身心豈易得耶秋初豫有事於端州因拉公同行登寶月臺納涼旬月復之五羊食鮮龍眼飽餐而歸信可樂也舟行北風沂流艱澀公出此卷乞書遂寫此歌公還曰令諸弟子一一如盤陀石上之僧誦白蓮經以為常課不唯不負修雅則老人八千里外猶然如在月明松下側耳聽誦時也題雪浪恩公所書千字文後豫與雪浪恩兄生若同胞少共筆硯豫懶且善病竊慕枯禪兄苦志向學無論刻意教乘即遊心藝苑博問強記食息不倦染翰臨池晝夜無間者二十餘年及登座說法迥邁前修而辭翰擅場亦稱二妙我明二百餘年緇衣之駿指不再屈此豫生平心服而敬事者自愧福輕業重至老暌携惜兄耳順之年竟成千古嗟余苟延七十無補法門偷生何益豫隱居南嶽非石禪人携此卷來豫一見之不覺興悲三復長歎嗚呼其人往矣手澤如生覩此端若寂光覿面也題筆乘顧寶幢居士事後記云金陵顧寶幢居士名源字清浦少豪雋不羣詩書畫皆不泥古法信筆點染天趣迥絶然實自古法中來一日與余論書曰書須古法四分己意六分乃妙不然縱筆筆能似古人終成奴書不足貴也中年究心禪理大有悟入然未嘗以得理而薄修因晚節與名僧舉西方會社戒律精嚴無與為儷臨終端坐而瞑舉室聞蓮香三日始歇居士嘗手書數絶句余今筆於此十箇蒲團九箇穿誰家枯井雪難填如今法法成三昧聲色無妨到耳邊松火炊羮香滿衣雪寒豪士古長飢明珠不換黃虀瓮涕唾光爭日月輝鼎食何人曉夜忙全機隨處好參詳漁竿不負秋如錦兩岸黃花撲棹香短褐長鑱老石門蔬盤容易度朝昏百年智巧消磨盡慚愧人傳粉墨痕碗上雙刀照雪花少年曾醉魯朱家揣摩未展男兒志頭白都門學種瓜雪屋寒𦵔有歲華黃金過斗未須誇若言竹帛功難朽也是空添眼上花藤葉青莎稱體長菊花新酒滿瓢香時人若訪龐居士萬樹雲蘿護草堂被髮曾為授記人草衣隨處屬閒身十年朋舊塵勞破香火同酬野寺春雲裏青山古檜叢枝柯如屋蔽霜風男兒有志投踪跡瓦鉢依稀在手中此焦氏筆乘所載也余齠年聞寶幢居士初為諸生時氣甚豪宕才情敏捷中年一旦盡棄所習遂長齊繡佛前搆一小樓獨坐其上唯小童奉香花淨水家人女子絶不見面親知杜絶往來居然一深山頭陀也每夜五更擊大木魚高聲念佛居士家近市多屠者有一惡少年每聞魚聲即起宰殺一日遲責其妻妻曰道人打木魚念佛爾聞殺牲自不悟乃責我耶少年即折刀杖改心為善一時屠兒回心者衆士曰我抱木魚終夜打驚回多少夢中人豫年十九依長干西林祖翁出家雲谷先師當代法眼也住棲霞與居士往來特密即乘中所云名僧者師為豫談此事因問居士何如人師云今時龐公也一日偶與同儕閒行松園望見一道者入山門貌清古而雅甚閒閒如孤鶴翔空超然塵表及近而觀之其目不瞬若無意於人間世也余驚喜曰此何人斯若是之都也識者曰此寶幢居士也余欲作禮而懼焉乃隨而視其所之則見其入寺殿廊之掖門禮如來舍利塔也余竊觀之五體翹勤懇倒不可名言及觀塔殿巍峩入雲五色相鮮返照回光赭如寶錯忽悟此境殆非人世也而猶未知所以然既而余問雲谷先師師云此居士觀此作西方淨土境將以資觀行耳自後因先師而得入室焉及臨終時與先師同數名僧相對念佛數晝夜懸西方境於室中余隨衆中正作佛事時居士內人報云滿宅聞蓮花香衆皆驚喜居士恬然無異也此筆乘所載皆余目擊其事也居士有子皆諸生素不信佛至是乃涕泣牀前叩首而請曰父即超生死居淨土豈不念及兒孫輩作度脫乎何無一言相囑居士笑曰汝輩將謂我生耶死耶而獨不觀於日乎日出於東而沒於西是果沒乎果不沒乎吾之生死亦猶是也拈筆書此擲筆端然而暝此余所覩記乘不及此一日偶展乘簡見此因緣遂感而更筆之且以告知言者題南皋居士書萬法歸一卷從上佛祖原無實法與人就向衆生妄想夢中一椎打破使其㘞地一聲忽然夢覺兩眼睜開回視夢中境界了不可得若於不可得處措心亦是夢事由是觀之豈有一法可當情耶所以道不見一法即如來此則名為觀自在故云離相離名不墮諸數若喚作一則墮之又墮矣南皋居士潛符此道受用自在蓋已有年切念知音者希特拈古人此則公案往往舉以示人欲人自知落處觀者若向居士未舉以前快便薦取猶在半途若更向萬法一法上團圞大似癡人面前說夢慧菴主久參居士時入方丈聞說不二法門蓋已習熟且道此則公案與維摩默然處是同是別參題圓覺頌鄒太史公世講陽明之學其子子胤得家傳衣鉢癸丑春謁豫於五羊之青門問西來大意豫令盡屏胸中宿習知見默坐七日乃為發藥子胤一聞頓契忘言之旨自信向墮光影門頭躍然而歸及余之南嶽得乃兄子尹書來企稱子胤悟脫近不幸往矣豫愴然心悲者久之及豫逸老匡山越九年辛酉冬乃郎育侯寄所著圓覺頌一編豫閲之是知子胤雖長逝端然未出大光明藏可謂深種般若正因矣倘天假之年其所造進未可量也惜哉題幻豫本公塔銘後幻豫本公先參本師雲谷和尚與豫同條生也辛巳歲相晤於五臺見其道貌清臞弱不勝衣其心如大地有荷負衆生之力故能忘身為人未嘗一念存我相也以善醫視病僧至割內為劑可知已豫坐氷雪中一日凍餓而死師急救而生之豫則以醫王頌公別來三十餘年公入滅草三年矣向以刻藏因緣故留靈骨於雙徑之寂照丙辰冬豫以達大師入塔因緣至公之上足杲公亦乘此葬之豫是得以為公卜地厝骨入土噫此大奇事豈非宿緣哉讀洞觀居士為公塔銘恍如坐金剛窟對談時也乃詩以挽之曰寒巖凍餓有誰知絶後重蘇賴阿師今日五峰窺塔影恍然猶對坐談時念茲山為東南法窟八十八代知識說法其中公何夙緣得從達大師後究竟歸寧於此愧豫與公同條生不同條死安能得此一壞土覆枯骨乎想公將來出世不知為何代主人倘得宿命必見老朽於除夜篝燈書此語也廬山金竹坪千佛寺接待題辭廬山甲江左之勝自晉遠公開山及唐宋諸祖說法道場獨勝於天下其山形似水上青蓮而金竹坪宛坐花蕊昔為荒榛近日恭乾法師結茅單棲弔影寒巖其徒續芳聯公苦心竭力以供事之每行乞郡城日往夜歸風行露宿飢寒困苦靡不備歷不十年開荒闢土始建屋宇而乾師謝世聯公守其遺訓忘身豎立遂成叢林三十年中與衆同甘苦共臥起粒米莖菜不私作務以身先之至今老矣坐長連牀絶無寢室真得古人匡衆之體故十方衲子至者如歸然公不以佛法禪道標榜唯以一味平等慈悲以法門為心未嘗以粥飯氣息鼓諸方襟己能此又深得無我三昧者是故親近隨喜者無不觀感而心化也每歲食指數千計公淡然無懷不以四事為己憂不專化主但在叢林少有願心者無不自肯奔走效力行乞以募十方風聲感召歲計亦未嘗少缺此又深得吾佛隨緣之至教當此末法諸方建立其人或指難再屈也老人適來隨喜讚莫能窮且見諸行者行乞歸來絲毫不昧因果不負檀越信心諦觀諸方幹蠱叢林之行人亦未有如此之真實者此蓋主者真心所感以致龍天響應非偶然也老人感念無已故槩書此以告諸檀越至若四事供養七寶布施如須彌山亦可消受自有大心菩薩在非老人所敢必也題臺山竹林師卷後老人昔居金色界中獨與竹林老漢眉毛廝結臨行將把糞掃子委托叮嚀為作曼室奴郎別今三十餘年及老人業遷炎荒已二十餘年雖萬里相懸出息入息未嘗與這老漢絲毫相隔今忽見此卷竹林老漢身在老人眉毛上放光照耀誰謂這老漢入滅殊不知方網三昧東方入定西方起臺山入定匡山起正是這老漢家常茶飯且道竹林來也好著為諸人依前掃糞學人持此日用一切處不許污却掃柄始是知恩報恩題壁光童子沈大裕傳後衆生本有佛性名般若具大光明常然不昧良由無始無明故昧而不覺無明深厚故常寢生死而不自知所以菩薩修行但以智慧光照破無明即為出生死時也故修心之士名為習般若行世之人智慧明利者從般若中來發而為忠為孝性使然也以至死生不見去來之相者常光然也觀沈童子大裕出世八歲種種云為皆前世習般若行至臨終一念炯然常光不昧此般若現於方死之際足見般若強勝之力也嗚呼觀此豈墮生死之人耶而父母以愛視之是返轉般若為生死根豈不為童子所笑乎本以見度而更見纍自負童子來意多矣丁巳三月六日其父爾侯居士以此傳相示憨山老人題之以此是以楔出楔也童子有聞定發一噱題血書金剛經後此經乃華亭康孟修妻張氏安人刺血所書者安人王司馬公元美之甥也公之姊適張氏生安人早逝王太夫人自育之幼延女師習詩書工翰墨事康母孀居草年敬順如一日天生篤孝雖産富貴之室性淡泊不事鉛飾康母老年奉佛益謹禮達觀大師安人從事齊素喜捨王太夫人命司馬公兄弟視安人如己子所分家資以萬計皆悉捨為福田歸心淨土如蓮花中人晚年刺血書此經一卷臨終命舉家高聲念佛連日夜安然而逝余被放嶺外康君弟季修與余為方外交頃入季修走書以安人所書此經屬題豫覩其手澤端嚴精楷筆意師古纖毫不苟絶無軟暖氣此亦丈夫所難者撫卷三復喟然而歎曰斯蓋心光流溢也夫般若名智慧乃一切聖凡均賦而同稟者諸佛證之為金剛心地現為神通妙用衆生迷之為生死根本發為妄想塵勞性同而相異若欲轉塵勞妄想而為神通妙用非仗般若勝力不能也故曰若有能信此經者已於無量億佛所深種善根由是而知安人生平住世猶如蓮華處淤泥而不染篤信三寶諦奉此經受持不疑自非多生久習般若純熟何能精進之若此悲夫世人咸稟靈明之智負此丈夫血肉之軀但恣貪瞋造無涯之黑業以取沉淪苦趣者多矣誰能灑滴血於智海而與法性同流乎金剛以不壞得名文字般若即法身常住光明赫奕照耀無窮所謂金剛種子歷劫不磨豈直為傳家寶已耶題朱太史修南潯報國寺疏後湖州南潯報國古剎始建於宋五百餘年殿圮久矣緇白過而不問無唱導者寺沙彌某發願重修誓斷一臂以堅衆志朱太史為文以鬯之寺僧持過徑山豫三復之大有感焉謂帝王陵墓多屬丘墟而佛剎雖頺尚在即金谷銅駝類可知矣諺云千年田地八百主人誰氏之子能守數百年之業者乎抑有後能如沙彌之捨身世業而重輕者乎經云佛剎堅固金剛所成以有龍神守之弟子世之推原其始皆衆施資財即千秋不泯以較世業之久近皎然明甚人皆知沙彌斷臂誓興佛剎殊不知沙彌一臂為衆檀那世守不朽之業也明哲君子能捨不堅之財置堅固地則後千百年功德不朽賴沙彌一臂以守之尤勝子孫伯什也況福量如空乎公云荒冢賴佛寺以久存誠為法眼豫知達人先唱則衆起而響應觀此金剎立成當若天帝之拈一莖草即是沙彌現千手眼也題華山隆昌寺銅殿二文後豫友妙峰師早從法界觀入道故生平建立皆從普賢行願法界心中流出無論一往功德即銅殿因緣可見矣以峨嵋普陀五臺三山乃三大士菩提場為真丹利生最勝處各範銅殿一座以奉尊像其南海偶以緣阻遂置於金陵之華山蓋賴聖祖寵靈故感聖母聖上洪慈為布金檀越得與三山並緣亦希有其莊嚴妙麗殿堂廣博豫以業力遷訛未獲瞻禮適於焦太史黃祠部二宰官文毫端三昧具見一毛端頭現寶王剎詎不信歟三災彌綸行業湛然蓋願力所持當與法界等矣題盂蘭盆真慈達孝卷經云大孝釋迦尊纍劫報親恩以釋迦多世修行之時皆是報親之地故梵網經云孝名為戒謂孝順父母乃至一切衆生然戒為成佛之本而孝又為戒本是知諸佛菩薩救度衆生出諸苦惱皆修孝順之行也以衆生歷劫生死出沒六道捨身受身無一類而不經過是無一類而非曾經之父母且衆生度盡方受證菩提故所度衆生一一出苦皆菩薩所盡孝道之心也又豈可以一生一身而言哉即目連所救一生之母未盡如來之達孝也教有水陸齊會為報親設以盡法界所有水陸空行乃至三途六道無不願出苦淪此雖像教是衍如來大孝之本也京僧離幻持建盂蘭盆卷請益豫題之曰真慈達孝蓋盂蘭以廣戒本之意緇白知此豈可以泛泛世法觀之耶弔遼陽將士文題辭幻人衰朽骨立匿影空山掩室以休適豫章陶君相如過訪語及時事及出和張太史弔遼陽將士文且屬為引幻人三復而歎曰此古今豪傑忠義之士精神相感於形骸之外固非世諦恆情也故曰志士仁人無求生以害仁有殺身以成仁仁者何也即此心之性真也光明廣大終古常然若認假而失真則與草木同腐朽雖生不生何益哉苟能守志忘形形忘而心存當與日月爭光矣此古忠臣義士以身殉國則國為身以身殉天下則天下為身所以忠義之氣充塞宇宙凜凜而不昧者固其所也今觀兩將軍之死得其所則能興一時仁人君子之感不奪者志不晦者心所謂求仁得仁雖死可無遺憾矣豫讀太史之文心血迸灑慷慨悲歌激烈之氣蕭蕭如在易水之上也將見豪傑之士由此一鼓而興起者竦動義概竭忠效死以捍社稷端有望於今日也豈直為文而已哉題龍樹庵主濟川傳公傳後歷觀古豪傑之士以一身殉國家之急卒以忠義表於世以丈夫稱者古今不多見豈獨方內然哉方外亦以之豫讀傳公傳深有感焉若夫伽藍所在乃法界之封疆也吳門之華山封疆之一隅也時公為居士遂毅然棄妻子剃髮為弟子以身殉佛土竟保全以棄去豈非丈夫之事哉若夫功成而不居又古之所難也語曰夫惟不居是以不去公實有焉
