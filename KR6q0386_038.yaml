body:
  text: 侍者福善日録門人通炯編輯嶺南弟子劉起相重較偈一示鄒生子胤十首此事明明絶覆藏普天匝地露堂堂男兒不突金剛眼覿體相看若面墻見聞知覺總空花翳未除時見轉差只待晴空清淨眼方知別有好生涯聲色場中豈偶然自將荊棘苦參天何人一擲翻身出始信隨緣自在禪妙性圓明自本真從來皎潔絶纖塵不教妄染輕遮障便是超凡大力人道心原不離尋常待客迎賓底事忙試看個中關捩子何曾移動一毫芒五蘊山中寂滅場六窗虗敞夜生光只須喚醒葊中主莫使昏沈自蓋藏湛湛心光本不迷祇因情想自暌𢹂但看起處無消息一任猿聲日夜啼性天雲淨月輪孤身世何須問有無但得塵緣蹤迹斷不勞名字挂江湖世緣逐逐幾時休弃却家山向外求衣底明珠任埋沒長途空自抱窮愁太虗閃電不留情憎愛何容逐隊行擘破娘生真面目肯教埋沒過平生寄袁生曾將書札寄南能問法遙參最上乘三昧知從文字入不知可記昔時僧示水天禪人知識相逢豈易哉個中消息口難開妙高峰頂經行處不是平空賺善財示談復之曾從授記向靈山今日重來一扣關為問拈華當日事頭陀不是易開顏示鍾生衡頴曾過曹溪已十年相逢知識總前緣阮生何必窮途哭自有西來最上禪示方生覺之心光獨露形骸外祖意能參機語前想聽匡山蓮漏熟故來重理舊因緣示常達禪人南嶽曹溪一脈來相傳明鏡亦非臺金剛正眼人人共須向磨甎一句開示宗玄禪人幻成五蘊本來空必欲求之似捕風試向渾身消散後應須識取主人公示南嶽庸質山主萬山深處一茅菴朝暮雲霞當小參最是溪聲關不住廣長日夜語喃喃南嶽山居七十年來夢裏過江湖蹤迹總蹉跎而今喜得閒田地莫問從前事若何腳跟踏遍水雲鄉未離清涼古道場筋力漸衰心已倦安眠飽食是行藏大休歇處不尋常妄想消時世已忘都向別求真極樂誰知當下是西方但見無生寂滅心了無妄想敢來侵根塵總是空花影佛祖何須向外尋觀心生處了無生閃電光中眼倍明為問西來成底事今人都只解貪程示廬陵僧密潔公廬陵米價近如何問著休全舉似他一粒但能輕嚼破始知佛法總無多示杜言禪人西江一派馬師禪聞道而今久失傳莫謂磨甎堪作鏡自然不墮路途邊示定水禪人久依華座覓真詮鐘鼓分明句句玄若問西來端的意從前佛祖未曾傳示量空禪人接待武昌聞開梵剎向江湄來往風䭵正渡時為問華亭垂釣者離鈎三寸幾人知題方覺之離垢菴一芥菴中絶點塵從來無物可相親靜觀寂滅清涼地頓見如來妙法身題羼提菴物我如空不可求無邊大海一浮漚但看起處無蹤跡苦樂從教當下休示天淵禪人己躬下事甚分明不用尋師費遠行只向目前親薦取是誰見色與聞聲示六義禪人死生大事莫商量說起愁心可斷腸無量劫來都錯過者回豈忍負空王寄若昧法師蓮華峰下住菴人日與雲中五老親瀑布從空霏玉屑恍如賓主對談論示雲居常元禪人出世原為究此心非圖名字挂叢林頭話參到無心處不向他家外面尋寄海會菴主十方海會此為家來往經過路不差香飯飽餐回首去出門煙水更無涯答雨法師寄法華新疏靈山一會費商量四十餘年久覆藏今日通身全吐露分明只在一毫芒閣門緊閉不通風多少躊躇歎路窮不是輕勞彈指力安知裏許量如空窮子歸來見父時此心相委信無疑縱將寶藏全分付若不掀翻總不知無邊剎海總蓮華可歎從前盡數沙君向毛頭親點破自今常御白牛車示素璞禪人有引禪人向參豫於曹溪尋歸吳門頃巢雨二法師以豫與若師雪浪為法門兄弟命禪人持書遠走南嶽迎豫終老豫感二公高誼念禪人遠勞因成二偈用以志懷曾禮曹溪走瘴鄉歸依三匝繞禪牀分明一句無生話莫道當時有覆藏遙持一紙故人書特向空山問卜居一片身心全付託餘生不必問何如答巢雨二法師法門義氣信非常自是青山骨肉香擬向通玄峰頂上忘言相對一繩牀吳門山水最幽清二朗高峰久著聲儻得煙霞期共老安眠飽食遂餘生示浮剎禪人遙向千峰問懶殘口邊寒涕未曾乾火中黃獨初煨熟把似君前不易餐示大智禪人竹杖芒鞋過萬山遠從南嶽扣松關石頭路滑難移步莫道參方是等閒題別峰相見卷百城南望盡煙波峰頂相逢事若何不是善財無面目祇緣知識信誵訛訊專愚衡公病四大久觀如泡影病魔何處可潛蹤古人自有安閒法只在無生一念中示若拙禪人行遍天涯覓此心從來都向外邊尋縱然未出門前路須信漫漫草更深寄徐菶莪時問維摩病裏身門開不二露天真飽餐香飯忘言後方信離情道始親示心聞禪人本來自性量如空見色聞聲樹過風但使浮雲消散盡幾曾一物著其中示三昧真禪人遊峩嵋歷遍諸方好歇心不虗名字挂叢林歸來滿面峩嵋雪雲白山青何處尋示徑山靜主電光石火豈為真瞥地相逢未可親若是本來消息斷大千隨處現全身若野音禪人從黃梅走南嶽復參雙徑示之以偈遠行南嶽覓行蹤喜得黃梅一線通別向五峰相見處萬山雪擁白頭翁示無瑕禪人䇿杖遙來雙徑深別峰相見是知音故人若問餘生事萬疊雲山一片心示念西居士南詢煙水百城過知識相逢事若何更向五峰深處覓須知佛法本無多示勤如禪人禮峨嵋遠從雙徑禮峨嵋涉水登山為阿誰儻見普賢真面目莫教辜負一雙眉示徑山堂主雙徑單傳佛祖心蒼崖翠竹古叢林應知正令常新處鐘鼓時宣妙法音挽幻豫師寒巖凍餓有誰知絶後重蘇賴阿師今日五峰窺塔影恍然猶對坐談時示仁安法師身心一片似冰壺試看其中是有無妄想不來消息斷何須此外覓工夫過菩提菴喜逢智河禪友原是菩提樹下人到來恍忽見前身溪聲常說無生法可惜時人聽不真樹下相逢舊有緣別來不記幾生前入門一笑心相契始信無言是祕傳示詢南禪人看病出世何為最勝因目前看破病中身知他痛癢相關處萬行無如此念真示德門禪人校經海眼從來絶點塵大光明藏可安身只須仔細從頭看才著纖塵便失真示非玄曉禪人曾向慈恩理教綱釣竿拋却歷諸方於今若識娘生面不必將心問法王過甘露接待寺登山涉水總迷途未審前村是有無驀直忽逢甘露灑才沾一滴破焦枯示承拙禪人持明密行烈火炎炎妄想流醍醐須灌頂門頭會教一滴周毛孔始是持明祕密修淡泊齊示雲山居士中一室冷如冰趺坐長明午夜燈來往應真時滿座人人知是在家僧示蓮西居士妄想生時當下休了無一念挂心頭忘機便是真安養極樂何須向外求題達大師書經墨光亭聞道蓮華筆底生墨光猶自照虗明閒來為問華中主滿耳秋濤說法聲示曹生錫卿丈夫立志豈尋常刺股懸梁苦備嘗但使六根無垢濁管教心地自生光遊浮山於妙高峰下聞智燈禪人誦法華經因題於壁水上蓮華舌上經一菴深鎖萬峰青松風日夜常宣說可惜時人不解聽示真嗣沙彌生死無常一息閒好將心志在青山但能不作紅塵業嬴得終身物外閒匡山喜陳赤石大參過訊萬疊青山一片心目前處處是雲林不須更問西來意水鳥時宣妙法音示修六逸公掩關金輪峰萬仞峰頭獨坐時身心放下是全提銀山鐵壁須鑽透徹底分明不許知送悟心融首座還京口空山擬伴老餘年何意東歸上法船好待海門孤月上話頭一為老僧圓示達本禪人勘破塵凡萬劫心歸來遙向白雲深金輪峰下松濤急日聽無生妙法音示本懷禪人身心久在白雲中何事隨緣任轉蓬收拾歸來全放下萬山高臥日頭紅示行素侍者拋却身心禮法王前程不必問行藏但能識得娘生面草木叢林盡放光示頓利禪人遊五臺一條拄杖曳單瓢參禮休辭萬里遙儻遇曼殊齊會日休教惡水驀頭澆示寂知慧林二禪人學人不必苦馳求妄想消時得自由但自披衣閒處看心心不斷是誰流空山寂寂絶諸緣不學諸方五味禪參者不須求向上但能放下自天然示恆一禪人此事從來不外求見聞知覺有來由但知日用頭頭現莫落隨緣第二籌示克文禪人空華起滅本無端爭奈人人翳眼看須信晴空無處覓丈夫切莫被他瞞示巨壑禪人坐斷千峰不問禪爐香經卷是生緣但能此外無餘事自是塵中極樂天若惺炯首座遠來相訊因示苦海相從二十年重從廬嶽禮枯禪相看莫問餘生事五老雲霞在目前念雲禪人遵乃祖命接待吳江今逢六十初度偈以壽之塵中覺路敞雲堂遍布身心滿十方一片祖翁常住地願教永劫作津梁示眉子火宅炎炎不易清六根銷爍可憐生但能一念如冰冷便是超凡第一程送昧法師應講維揚偶乘一葦截江流法鼓雷鳴彼岸頭無數羣生開大夢歸來毫相不曾收示鄭白生居士一片身心放下時直教內外似琉璃其中無著纖塵處日用頭頭只自知示曹溪堂主俯無昂公常想新州戴髮僧不知一字有何能肩頭柴擔腰閒石博得西來無盡燈道場不必向他求只在當人一念頭自性但能全體現何愁法海不橫流示見空禪人出塵本意在山林四十無聞愧此心今喜腳跟絲線斷萬峰深處更宜深示禪人禮峨嵋無邊法界以為身觸處相逢意最親若向峨嵋峰頂上雲霞滿目更迷人西望峨嵋雪似銀普賢端坐一微塵無邊剎海都含攝應現隨緣喜見身示冶師鑄鐘成天地為爐萬象銅鎔成衆竅吼長風一聲響徹三千界喚醒人閒大夢中示李生浮世光陰苦不多己躬下事竟如何今生若不求歸宿依舊從緣墮愛河示朴行者乞食市遠山深乞食遙單持一鉢路迢迢莫因曲折生疲厭應想黃梅石墜腰示無隱法師昔依華座繞空王文字時生般若香今向一毛觀剎海逢人不必細商量示幻宗老衲印造華嚴經剖破微塵出大經法門珠網遞相形分明託出蓮華藏觸處令人夢眼醒贈堪輿響山老衲大地山河入眼空一條拄杖活如龍分明指出無生路直與西來一派通示體具禪人趙州無字死生關鐵壁銀山冷眼看但向未生前覷破自然不被舌頭謾示悅禪人清涼菴捨茶楊枝甘露灑焦枯一滴才沾熱惱蘇直指西來端的意相逢但問喫茶無寄博山無異來公襟期不隔一毫端千里雲山覿面看最是思君親切處夜深明月照人寒示壽昌長老瓦礫翻成大道場祖翁田地莫教荒應思冒雨衝寒句粒米莖薪可斷腸示壽昌𨶑然謐禪人堀中師子久調兒轉擲翻身未易知莫使野狐蹤迹近叉牙切記在當時示頑石禪人埋身八面不通風死盡偷心始見功但向未生前著力方知海底日頭紅示碧霞老衲他方行遍久歸來梵剎家山坐地開衲子入門無別事喫茶洗鉢亦奇哉示玄樞禪人己躬下事要分明一念單提莫記程但使妄情消盡處管教心水自澄清示蘄陽歸宗老衲觸目明明般若光六門常放未遮藏若能當念根塵斷日用端居大道場示慧鏡禪人心見光明不在根從來諸暗不能昏三千世界如觀果那律親登此法門示六如坤公掩關收攝身心緊閉關塵中不異在深山好將妄想都拋却從此勤求出世閒示戒深濬侍者憶昔𢹂瓶逐杖藜幾回為法到曹溪今來直入千峰裏更向堂前乞指迷示有明了重禮五乳昔年參罷禮清涼一見文殊返故鄉不識三三多少衆故來重請為敷揚鄭白生重參五乳因示昨來問法過匡廬一句全提會也無但只不忘歸去路自然超出聖凡途聞沈朗倩掩關城中寄示居一室豁如空凡聖交參落此中獨有主人常寂寂十方坐斷不通風示丹陽觀音山慧空禪人祇園門外即迷津來往風波過客頻高揭慧燈常不昧直須照破一微塵示岸度禪人幻海無涯浪未收全憑智楫駕慈舟中流高桂輕䭵去直到菩提彼岸頭寄金貞度同坐祇園飯食時別來每憶善思惟法緣應似維摩詰不二相談近是誰寄普陀昱光禪人白花山下久跏趺水月光中一念孤正使十方俱坐斷海枯石爛恰如無酬心光法師空山一室白雲封鳥道玄微入萬重不是直通霄外路安知步步絶行蹤示深光侍者省親爾別慈親已草年要明父母未生前而今復作思歸夢此去應須斷愛緣示姚星陽居士心在塵中願出塵直須不昧本來人時時常想歸依處八寶花閒有後身示了此老衲增臘濁世浮生莫問年法身三際不能遷但須一念常光現華藏莊嚴在目前示護關侍者擎茶奉水要真知動靜周旋看是誰須向目前三喚處莫教辜負一雙眉犀牛扇子骨皮全急喚將來不解拈一語痛如三頓棒幾能脅下會還拳示新安仰山本源禪人割愛應知出世因肯教心地著纖塵直須念念回光照莫昧當人淨法身圓明一念沒遮藏觸處逢緣盡寂光拈起一塵含法界更於何處覓西方寄雞鳴寺冲虗上人湖光山色照牀前樓閣渾如出水蓮遙憶故人行樂處花中白日坐安禪寄黃檗山了心上人禪從黃檗最難參才著言詮落二三唯有風光當一掌至今山水語喃喃寄樊山主隨緣示現小王身心似蓮花不染塵宴坐深宮常說法直教不昧本來人寄袁居士一向此身都是客而今掉臂始歸家回看奔走紅塵道何似棲心白藕花示明海禪人袈裟之下豈尋常不自求心最可傷曠劫漂流至今日者回真是好商量示心悟禪人閉關九年閉關枯坐九年期好似嵩山面壁時縱有齊腰三尺雪安心一語幾人知示性通行人負舂腰石似黃梅夜半何曾正眼開但信本來無一物方知明鏡亦非臺送克文禪人少林禮祖斷臂巖前雪尚紅西來一脈許誰通此行但得安心法便振當年鼻祖風挽巢松法師原從兜率白椎來此去還應坐講臺若待慈尊下生日知君重理舊胚胎寄融首座西江不斷往來船別後音書竟杳然唯有牀前松上月夜深影落在君前寄孫圖南居士久落江湖不定蹤別來今已臥千峰誰知破盡人閒夢唯有空山靜夜鐘示深愚字以訥大道西來本絶言好從愚訥遡真源直須參到忘緣處方信毗耶不二門寄三白禪人何時杖錫過東林入室重論出世心莫負千峰秋夜月清光獨照影沈沈示廣鎧侍者持法華經一自親聞墨劫前是時已結大因緣從今重理多生句字字心開舌上蓮示海藏行人禮法華經多寶如來舊法身從空涌出示諸人若能當處無生滅法法原來總是真示江州孝子左福念佛本多生孝道人常持一念奉慈親若將孝道求成佛萬行無如此念真示鳴明禪人遙來為法到匡山幾度晨昏一叩關若問西來端的意白雲飛去又飛還示明華禪人字道果一葦西來五葉花從茲道種自生芽但將智水勤澆灌果證菩提定不差示歸宗堅音長老荷擔正法古叢林須用金剛護法心但得光明全體現頭頭物物盡知音示王居士父子家傳淨業禪曾從瘴海問真詮而今重入匡山祉見面還如未別前武夷默初禪人遠來禮請病不赴因示遙來為法到匡山瞻戀殷勤重往還莫道老僧慵說法白雲不放出松關莊嚴華座擁諸天只待光臨啓法筵莫謂法身曾不動舌根蚤已遍三千寄示觀智雲禪人遠持一鉢走他方到處隨緣是道場莫謂塵勞非佛事原從苦海泛慈航示鏡玄禪人當體圓明般若光六根門首沒遮藏若能念念無生現觸處無心解脫場示禪人八首當人一念要精持歷歷孤明不昧時獨有未生前一著從來不許老胡知死生大事最堪悲急下功夫蚤是遲但向自心求解脫不須此外更尋思往來生死久竛竮未悟無生不暫停誓向此身應度脫莫教回首再沈冥圓明一性絶纖塵只為從前錯認真但使斷除煩惱障自然得見本來人欲海波騰無盡流誰將彼岸一回頭直須高挂輕䭵去不到窮源未肯休世緣無盡苦無涯一念回頭便到家識得本來真面目方知不負此袈裟此心不必外邊求只在當人一念休身世但從空處看恰如湛海一浮漚六根門首六塵多舉世人人沒奈何但肯心心常照破自然日用不隨他示修淨土六首衆緣消盡絶疏親老眼何容著點塵莫使六時蓮漏斷華中已有未來身初因愛念感娑婆淨土應須出愛河要得蓮華為父母全憑念念見彌陀見聞知覺盡常光心地蓮華暗吐香若使六根無染著自然觸目是西方眉閒一道白毫光諸佛衆生總覆藏但得現前常不昧蓮華心地暗生香五濁塵勞可厭離西方淨土是歸期直須念念光明現便見華開七寶池淨土原來不外求當人一念要知休回觀妄想消融處便是西方第一籌大雪萬山冰雪連根凍一片身心徹骨寒回想六年飢餓處令人不覺鼻頭酸答劉三畏大參千里雲山見此心聊將一語寄東林儻君不負蓮華約白社幽期尚可尋華宇居士持華嚴經令甥覺之來請因寄華藏莊嚴妙絶倫無邊佛剎一微塵若能念念光明現便是隨緣解脫人示在珍行童生死途中苦最長好從知識覓良方若能掉臂安然去須向空門禮法王蘊真禪人時從從五臺來參雙徑金剛堀裏舊行蹤別後雲山隔萬重今夜長空千里雪當年曾把洞門封
