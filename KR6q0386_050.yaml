body:
  text: 菩薩戒弟子僧本昂馮昌歷僧知融日錄宰官弟子王安舜劉起相纂輯長春社弟子陳迪祥梁四相仝較曹溪中興錄上中興因緣師曰曹溪者乃昔曹叔良為魏武之裔避地於此因以名焉其道場自梁神僧智藥三藏從西天汎海而來𢹂菩提樹於五羊之法性寺讖云百六十年有肉身菩薩於此出家度人無量將入嶺過曹溪水口掬水㱃之而甘且香乃曰此我西天水也原上必有聖地因㴑流而上至觀其山似象形曰此山宛似我西天賓林山也乃謂居人曹叔良曰此山宜建梵剎百六十年後當有肉身菩薩於此說法叔良即白州牧某具奏梁武帝遂命建寺額曰寶林乃開山之始也至唐龍朔間有新州盧道者得黃梅衣號為六祖回至曹溪時寶林已廢有尼僧名無盡者見六祖問涅槃經義知是異人乃白其父兄重修寶林延祖居之未幾有害祖者祖遂避難於懷會隱獵隊中一十五年後至五羊法性寺露穎而出遂於菩提樹下剃髮即回曹溪開法於寶林時山已易主為陳氏矣祖說法多年雲集者眾以其山如生象齒鼻完具先寺於左頷大牙之內其鼻在右業為陳氏祖墓故其寺址甚迫隘祖一日謂居人陳亞仙乞一坐具地亞仙許之祖以坐具一展盡四山之嶺時四天王出現四隅亞仙即許之曰也知和尚法力廣大當盡捨之但先祖墓在寺右他日修建望乞存留又曰此山形乃生龍白象來脈他日興造只可平天不可平地於是亞仙遂𢹂家隱去不知所之故此山自六祖開創已來四天王內周環數十里為一蘭若並無民居其山形風氣完密即少林已下諸祖道場未有如此之勝者向僧皆以為藏修地至我國初開阡陌而環山之內皆為田疇收入版籍則僧以務農為本業樹藝孳畜不異俗人然從來未有民居及弘正間四方流棍漸集於山中始以傭賃久則經營借資於僧而僧不察以山門通滃源入府孔道而漸成窟穴羅於道側開張市肆豈特鳩居鵲巢將使狼據師窟僧亦捨寺而住莊菴則山門日空流棍日集旤害日作而僧徒竟為此累以至幾不可保矣丙申春予蒙恩放嶺外初入山禮祖見其凋弊不堪之甚未幾而旤患果作僧至流離於是一時當道汲汲拯救之初制府大司馬陳公欲予迬救正之未既而觀詧海門周公甚留心祖道方從事於此頃即入賀去㡭巡道祝公乃極力致予因是寺僧某等相率來歸請授具戒堅意懇請予應之於庚子秋九月入山即以祖庭為心遂拚捨身命一一綜理次第建立如下所列其概皆大𡎯極弊不容一日安者幸仗佛祖之靈當道護法神力冥加八年之中略有頭緒雖未究竟卒業而心膂俱竭其所建者皆可為恒規僧徒苟能自此謹守勿失亦可保此道場世世無虞矣時師命昌歷等在寺訓諸沙彌凡所作事皆目擊之及所發言即日錄之久而成帙題曰中興實錄彷通𢗍十品之例列為十則其示眾法語清規手札雜著並次第於後云培祖龍以完風氣師初入山因見祖庭破壞乃集諸弟子曰佛說大地山河唯一真心之所融結雖形家之說未必盡信而至理存焉亞仙初捨地即云此山乃生龍白象來脈他日興造只可平天不可平地此葢言地形之不可傷也觀此曹溪主山儼然象形而四足六牙鼻口俱備其寶林初開時山勢完密故寺坐頷中左太牙包裹與右牙連合脣內為龍潭即如象口其寶林右壁儼然象鼻而陳亞仙之祖墓先葬其上六祖存日其寶林牆外即其墓也故乞其地而擴之其口為龍潭滀水於內有龍居之及祖降其龍乃鑿二牙交關處放水填潭以葢佛殿然龍既蛻水既竭而靈氣已泄故佛殿雖備其潭未填完而祖師化去至今殿前猶為深窟乃前未竟之功也故丹墀剛半師詧知其故乃填平之前羅漢樓乃初鑿嶺之缺後人因而為山門既久建樓於上師欲改補而未及以象之食賴鼻而命即在鼻其鼻當有數節而陳墓正當中故六祖入滅所存肉身初即建木墖於墓前以安供墓後建信具樓以藏衣鉢至我明成化間有僧某者去木墖易之以甎其中陰溼未幾祖現夢於郡守乞一安居守命改信具樓為祖殿其空墖在前返為胸中壘凷矣其祖殿後為程蘇閣乃嘉靖丙午間郡守陳豹谷所建師至則見殿左為方丈當中開一路入後山斬斷象鼻其殿後低窪為北風所劫來脈有傷故道場頹敗職此之由也師因詧象鼻之形則殿後當有一高阜時一老僧為師言初為沙彌時見殿後一堆如壘土比陳公修閣時令僧削去某時為沙彌亦在擔土列師知其信然乃令所選三學教授僧率肄業沙彌百餘人每日各擔土十回以培之三月而成一山如固有於是改中路於曹溪邊為迴廊右繞祖庭而行入後山由是風氣始完其於山門之內凡有凶煞者盡除之而眾僧遂安其祖殿後一澗為蜚錫橋過橋為卓錫泉即象咽喉師引其泉入香積廚泉右一小嶺如舌狀右一窩鉗即右頷古為無盡尼所居之菴乃重興寶林之主故師中興必首新之此最初入山開創之始也新祖庭以尊瞻仰祖庭初以改信具樓為之殊為卑陋入門不見眉目禮拜不能重列且前有拜殿接檐殊為幽暗墓前一墖屹立墖前又有諸天殿重疊破碎壘砌當襟無一隙地近殿左有僧房如拳拄頤右下角有戶長廚屋糞穢垢積兩腋僧居郎當敗椽如荊棘林然外望屋宇參差岈略無一綫通透此祖道所以壅塞而不暢有由矣師深見開闢之難日夜以思竟無規畫不能成局每每登墖眺望諦觀全寺大勢其左方丈法堂禪堂前即鐘鼓兩樓翼峙成一局師云此必寶林開山初創之制也而右為佛殿乃祖師存日填龍潭而為之者後有經閣前羅漢樓及寶林山門通為一局後人不善增修故祖殿居中僧房雜居塞其神路全無瞻仰氣象耳今欲分條析理以就規模非巨靈之手何能劈之耶因是見羅漢樓之西山如虎頭回望師買其山取土填大殿之潭窟出地以移祖師殿左之僧居仍別買房屋以易經閣後之僧房為戶長公廨以除祖殿西角之穢污其兩廊之僧各別置安居拆其前後諸天拜殿則目前地平如掌矣遂極力經營一一如畫故得重修祖殿高廠可觀前設兩配殿欲奉南岳青原五宗諸像其大門房周圍一十五間將奉傳燈諸祖兒孫如七十子之從祀於孔子也但前路壅塞乃買空地移有礙僧房三主乃大闢神路直與寶林門齊中與羅漢樓並起華嚴樓三間為祖庭頭門其上為禪堂諸僧書華嚴經所如此天然成一勝概矣今之觀者但見一目了然而不知開闢之難為力也選僧行以養人才本寺僧徒向以便安莊居種藝畜養與俗無異寺中百房皆扄其戶入門絕無人迹唯祖殿侍奉香火數僧及住持方丈數輩而已以是山門任流棍縱橫僧徒出入皆避影潛蹤可恨也師初至首以作養人才為急即選合寺僧眾四十已上者聽其自便若四十已下者二十已上者每房一二人在寺安居日日登殿逐日四時功課諷誦祝延聖壽誤者各罰有差於是集者得百餘僧俱為授戒從此晨昏鐘皷經聲相續不斷儼然一勝道場僧徒亦知有本業而外侮亦漸知警矣但諸僧徒習俗成風凡幼童出家祇見師長務農不異俗人竟不知出家為何業而畜其徒者止利其得力於𤰝畝而無一言及出世事其來久矣欲望其成人安可得乎師至寺之初即選眾中有通問學堪為師範者本昂等三人乃勸合寺僧眾凡有行童二十已下八歲已上者盡行報名到住持拘集在寺立三學館分三教授教習經典一年之中有通二時功課者乃延請儒師孝廉馮生昌歷茂才龍生璋梁生四相教習四書講貫義理其束脩供餽師自備之如是三年有成者乃為披剃為僧總入禪堂以習出家規矩令知修行讀誦書寫經典各有執業即今禪堂諸僧皆吾師作養之人才也又謂佛法所貴熏聞成種嶺南久無佛法熏習以乏種子故信心難生先教諸得度沙彌書寫華嚴大經一以法緣廣大為最勝種子二以借書寫攝持之力資初心觀行以助入道資糧初則二三人已而人人相望發心不十年間書此經者已成十餘部矣此吾師作人之功灼然者也驅流棍以洗腥穢師見曹溪道場破壞葢因四方流棍聚集山中百有餘年牢不可破而俗人墳墓皆盈山谷視為己業矣始也起於傭賃久則經營借資於僧當山門外起造屋廬開張舖戶屠沽賭婬日滋其害而愚僧不察與之親狎夤緣交相為利故僧之所畜多歸之噬嚙日深則謀為不法於是多方誘引以酒色為坑穽盲者一墮其中則任其食啖膏脂盡竭以故僧之田地山場房屋因是而準折者多矣頃則附近豪強亦垂涎其間乃通同衙棍互相架搆以包姦為詞訐告道府借為口實以張騙局聳動上司駭心驚聽遂以為實乃具申軍門令下將莊居盡行折毀僧不如法者驅逐時奉令者無良信其耳目以為奇貨乃親入山蹋勘每至一莊居備估其值輸半乃免由是寺僧盡入網羅業已失其半而禍方滋蔓不遑一息安堵當師度嶺之二年為丁酉歲初謁制府大司馬陳公因得概申眾僧之情狀乃寢其令幸得免即欲以師往整之師以方在席稾未敢奉命明年戊戌屯鹽道周公署南韶事欲拯之屬師修通誌未幾入賀去己亥南韶道祝公蒞事自號曹溪行脚僧痛惜其弊力致師以整頓之庚子歲公亦以入賀去瀕行面囑且令寺僧懇請師應命於是九月入山見此輩縱橫乃祖庭心腹之疾也不瘳則六祖慧命終難救矣於是椉改風水將山門大路東西填塞移置溪邊直出水口為通途如是則向之市店皆圍於山門之內而往來者不便於食宿矣然終無術以去之也居三月歲暮往謁制府大司馬戴公備陳為害之狀公曰此護法之責也但出一令責守土者嚴督之此一尉吏之任耳歲旦行該縣坐守驅逐不留一人舖店盡拆不存片瓦於是山門百餘年來所集腥穢一旦洗之而眾僧之禍害永絕矣舖店既拆市街一空師即於西街向之屠肆修旦過堂以接待十方之禮祖者東街修公館以為滃源官長入郡之停驂處其山門道路初則一綫而左則列肆直抵當心因盡拆之石坊先在上今則移置溪邊開闢壅塞相望如引繩遂成一大觀矣為害之源不能盡述而根深難拔一旦盡絕概錄於此以示來者為龜鑒云復產業以安僧眾師以流棍既驅向之所騙田地山場房屋皆執其左券此輩戀戀終無究竟思非善後長䇿因設齋於祖殿盡邀其賓主各出券相對查原有本而子息未及者補償之息過其半者已之其有本已得過而以息重累者及口腹虗花者罷之於是盡焚其券而以田地山場房屋盡歸其故主自此外患方絕而貧累之僧得以安居無擾矣時人或慮師任怨者師曰不然凡人雖不善必有本心之良苟開曉分明人各自知其非無有不心服者於是諸棍漸引去然亦竟無他虞嚴齋戒以勵清修先是寺僧多不守齋戒畜養孳牲以恣宰殺故凡上司府縣入山當里甲供應者必責寺僧而差役恃此以利其口腹即上用其一而下十倍之故所傷生命及所費資財歲不勝紀而本寺之累亦無底止且來者以禮祖為心而腥葷羅列於前殊非清供亦非仁者本心也積弊已久思革為難初幸觀察海門周公開禁革之端准其呈狀及署篆觀察余公乃嚴禁宰殺案載志書故凡供應官長例以蔬齋清供自師入山始但慮兩院威嚴難以必行值直指顧公入山為二親祈福本縣急督如故事公行齋戒令自此一定為恒規矣此事既行不唯保護生命雅肅清規即省費資財歲計不貲而常住亦免苦累即僧持戒者日益增進叢林清肅亦此一舉矣復蒙祝親詣山中教諭僧徒戒養孳牲宰殺變魚塘為蓮池自此山門頓改觀矣清租課以裨常住師初入山於祖殿閱常住歲計記籍見券帖數紙皆祖師貸約中載七八分之利息者師扣之主僧應云此常住供應缺乏乃借貸以支給者師為之痛心及詢常住舊有香燈莊田租稅何所歸耶即聚眾備查祖師香燈有黃巢滃源補鉢及本山續置各項莊田每歲總計約租有四百餘金何所支銷而言不足眾曰各莊逐年但聽十房管事僧輪流徵收即聽彼銷繳及察其故乃管事與佃戶通同作弊故致拖欠不完徒有虗名而無實惠所以常住日見其匱乏耳師即選眾舉公正廉能者十僧管事令對祖發誓刺血書盟不私一毫喚集各莊佃戶立定規則歲期以限約赴寺交納仍設庫司立管常住監寺四人執掌收支於是總計各莊每歲徵足若干兩計其所入將本寺各項應用派有定規著為章程纖細不遺除支尚有剩餘從此不唯常住豐贍而祖師法利如一雨普霑且不為泥犂種子矣其清規條例別列如左敕賜曹溪南華禪寺設立常住重興長生庫註記出納錢糧清規定格題辭夫惟吾佛世尊住世之時初但領眾持鉢行乞食法本無畜積何有常住次因老病比丘不能行乞命同住比丘就所乞食以其一半持歸供給名曰分衛謂分其所食衛護道業律部載之詳矣及佛滅後西域之法與佛在時無異及教法東流自漢永平以至唐代累朝帝王名臣宰官長者各捨資財建寺贍僧以為福田往往寺主濫為己有貪饕壞法侵漁眾僧不愳因果者多至我六祖大師之孫馬祖弟子百丈禪師始創清規立為常住凡在伽藍之內所有施利及莊田錢穀俱有典守故寺有主者稱為住持以說法為主總領大綱其輔𢏺叢林助揚法化者則設有兩序執事若都監寺監寺以掌管常住副二住持其歲計錢糓各有庫藏出內所司謂之庫司就監寺內取其公廉出眾者司之恐力所不及又設副寺以佐之其莊田則有莊主及徵收租稅又有監收此就眾中擇其公正廉能寬厚仁恕者充之其經手支給者則又有執歲執月料理山門事務以應官長檀越凡有支取所需必稟明住持准驗票帖明註庫記以備稽查故常住之物毫髮無差是則叢林如一身住持如頭首執事如手足耳目相須為用而不可缺一者故凡山門事務一有所作則上下同心小大一力如目視耳聽手捉足奔無不從其令者所以叢林興盛法化昌隆外侮不侵內障不起此佛祖度世之楷模自古叢林之典刑也夫何近代以來祖道衰替叢林凋弊先聖垂訓蔑然無知如我六祖曹溪為禪宗之源叢林為天下冠香火供養不減在昔而常住破壞至極僧徒愚迷癡蠢不知其為何物也余因弘法罹難蒙恩遣嶺外於萬歷丙申春二月謁六祖大師睹其道骨儼然如生而山門寥落之甚殆不堪看為之徘徊泣下者久之且僧徒被害官司勾牽急如星火日夜追逼傾家賣產者過半以致祖庭廢墜幾如埽地矣幸荷制府大司馬陳公稍寬恤之次蒙屯鹽道周公署南韶略革應官酒肉之弊次蒙南韶祝公痛懲僧徒之非戒殺孳牲力救之乃命合山眾僧再三請余入山料理於萬歷二十七年己亥冬公面力囑余明年庚子春正月復命寺僧真權行裕淨泰慧珊願識等持書走五羊促余入山余以方在行間未遑應命四月公以入賀北上余送別靈洲辱公再三面叮嚀之余於是歲秋九月方杖䇿入山至則先選僧若干為授具戒同集殿堂二時轉法華經次選行童可教者若干名習讀經書分為三學擇其眾中學行稍優者為教師次觀山門風水大概有冲傷刑剋者去之破壞者補之塞靈源門培象鼻以厚祖庭闢山門路移石坊以受元氣不三月內翕然改觀而山門內向為流棍潛住霸占寺基開張舖店酒肆屠沽巧設婬賭勾結土宄騙害寺僧橫如豺虎習久成風牢不可破甚為大蠱竊為隱憂余於是年十二月復走端州謁制臺大司馬戴公請令以驅逐之尋即令下曲江勒限三日內盡逐出境不許容留一人一店於是羣兇屏跡將前所占寺基街市盡歸常住余乃因而塞其東西穿心大路左立公館以為滃源及諸過客停驂之所額曰三生來右立十方旦過寮以延四來衲子為挂錫之所額曰一宿覺將通衢改於溪畔往來行止各得其宜無復混溷叢林自此潔清眾僧自此安枕矣余於明年辛丑春正月朔之三日奉制臺檄以為地方之務走青鸚且乞採監李公作中興檀越七月公入山禮祖喜施三百金為重修山門之資於是余治寺僧備查六祖供奉香燈莊租每歲所獲從來未有毫𨤲入常住者皆為典守侵漁沿為故習乃先料理太平莊租業已將萬歷二十九年分課銀歸入常住立定春秋冬三期以聽當年支銷外今將黃巢萬善補鉢及續置本寺諸莊一並歸之俱係先收以聽下年支銷除將諸莊二十九年分租課先完外自三十年起以為定規再查本寺舊有長生庫今復舉設凡一應常住租稅及施主錢糧盡入庫內收貯仍照清規事例設定執事以監寺四人掌管收支選眾中老成公廉者充之本寺十房舊有都管一人都寺九人原應差役迎接官長供應府縣取辦椒茶椶櫚果筍之物而向之常住租課盡為此輩乾沒極可痛恨今擇精練曉事僧十名充之其一應所須該用之物俱照人頭派定每僧量攢少許預取入庫以待上司不時之需庶省煩擾其各莊收入在庫租課查照田糧差徭常法照數支領完納不致拖欠冐破其上司官長入山應接所費設有定規亦不致偏累執事其佛祖殿堂香燈之用各有定例庶不失焚修供奉報本之意其執事諸僧終歲奔走辛苦亦有酬勞務使勞逸均平不致嗟怨仍勘收租全缺量為盈縮以彰勤惰已上四則俱在庫內支銷獨教授行童束修之資除儒師乃予自備其僧師則出於塔下減損祖師衣鉢訓育沙彌以增後生慚愧亦有定則如此則常住錢糧無浪費之條典守執事無自盜之罅眾僧無煩優之科常住可為長久之計矣仍將合寺大小僧徒盡行受戒以免玷辱祖庭之呵且省酒肉之費以為衣食之資斯則衣食足而禮義興即穢可轉清淨佛土矣曹溪祖庭中興叢林紀綱再振在此一舉大關法運所係非輕除前壞法弊端一切置之不論外其一切事宜自今萬歷三十年更始永為定式諸執事者宜各勉力務要奉行不許日久因循無賴僧徒妄起希圖生心壞法擅改成規如有此等則上稟祖師靈通護法伽藍神目鑒察必罪不宥明彰報應即使姦盜壞法之徒生遭王法死墮阿鼻因果昭然毫髮不爽今後凡頭首司其事者各宜時時痛自省心不致誤招苦報自取罪咎立庫之初當年租課俱係下年徵收致庫而現年預支無出余先備銀三百二十五兩在庫抵墊陸續支銷以為常住張本待後租課節年補還今將應行條例開列於後永為定規以便遵守計開一設職事監寺四名顓掌庫司收支常住錢糓置辦什物主張山門大事以副住持凡事務同心議處內以一人顓管鎻鑰經理收貯一應錢糧什物庶有責成內以一人監收租課舉劾弊竇不使濫觴為眾紀綱設庫司書記一名專管收支登記帳簿以備稽查不致疎漏戶長一名此乃舊規專管里甲差徭糧稅仍照常規此即古副寺都管一名此職即古規都知事乃知事首領今即以此職統充莊主率領都寺徵收各莊租課催辦合寺糧差以副戶長亦名直歲都寺九品此即古知事以佐都管徵收糧差輪流直月以應接官長幹辦山門大小事務此十執事今照本寺十房舊規輪流各房挨當歲終一換故前此已往皆無賴者多不能料理大事今特選擇才力出眾者充之如遇年終更代之期住持監寺仍察賢勞出眾者照舊留用不堪者或有他緣不能應者即選公廉老成者代之如有不守清規抗法循私或與佃戶通同破壞常住拖欠租課或貪圖小利掊尅佃民剝削眾僧有傷大體者都管監寺不許容隱即時舉白住持鳴鐘集眾對祖師前明證其罪輕則量懲革黜別選能者代之不待歲終重則呈首到官以法治之以警其餘住持亦不許姑息循情以養成大害慎之慎之一明收支收有五欵祖殿每年施利及銀帽器物常住各莊每年租課官長入山及施主隨喜布施一一募化修造及齋僧錢糧罸過犯僧人入常住錢糓香油及應入官房產業田地銀兩等物並就庫中回買物料價值及亡僧應入常住之物及常住置買田地房屋什物契書各有項下一一條陳登記簿籍以備稽查每欵各置收簿二扇住持與庫司各執一扇凡有應收者當祖殿對眾收之凡各莊每歲租課各有上下限期預期都管督率都寺同催各佃總責田甲收銀完足親到祖殿當住持監寺交兌監收執平持衡勘兌明白書記登簿住持僉封即於庫內取庫收印票一張合住持收簿將銀數上鈐合縫印仍各僉花押於執事名目之下方給田甲以為準的執事之人不許私給若查出租無印票者即係通同侵欺住持頭首定舉送官如律治罪凡春秋二季十方施主至祖師前進香供養銀帽花器及銀兩袈裟衣物等項塔主零收住持登簿年終代期總類若干見數明白勘校應存留者照舊貯積祖殿應用者交割庫內照式收支臨期務要集眾耆舊眼同勘驗塔主不許隱匿與執事通同黨護查出定以侵尅官物罸治凡官長布施及募化修造錢糓齋僧稻糧並一應但係常住之物俱照式立簿一一條欵如法收之不得隱漏但有應收之物而不登簿者即坐書記監寺通同作弊之罪凡應用支銷銀糓物件等項直月都寺照式寫支票一紙先到住持處請稟住持許支將票抄落支簿仍將票填次第號數並所支銀數二處合縫鈐一私記圖書仍於空處寫准支二字直月管事執票到庫支取司庫書記將票抄落支簿監寺方敢照數發銀如無圖書號票即係昌支少則對祖集眾量罸多則送官治罪如律若不當公用而住持循私與執月及典守者通用妄發一票支出錢物不論多寡查出即以監收自盜論設長生庫顓𫎓儲積監寺掌理錢糧之所多人不得混入故又設監寺寮為會議之所凡遇直月管事僧定要專住寮一月照管常住內外大小事務支過錢糓物件月終結算明白具造月報小冊一本送住持處對查明白批不差二字發送庫司以便年終類結庶不混錯凡年終於十月朔日更代之期預先住持會眾結算一年收支帳目是日監寺書記十房都管各執簿籍同集祖殿請能算數耆舊一人掌算一人唱數對眾眼同摸算明白總付書記具造文冊內開今將某年分本寺常住共收租課錢糓若干布施若干某物若干今某項及雜項支用過若干見存若干或有租稅未完若干一一條列備造總冊一樣四本其一送祖師殿收𫎓圅中其一送中興常住其一落庫司以為永遠規格其椒茶椶果之類一一如之今將歲支額定項下開列於後計開有十五欵辦納糧差隨田照例每歲大約銀一百兩有餘若有新增田土及遇閏月差徭有增無減若遇免稅則有少無多佛殿香燈每歲設銀十兩祖殿供養香燈每歲設銀五十兩護法伽藍月月朔望齋供每歲共銀十二兩閏月無住持接待上司往來官長每歲舊例十一兩新增四兩戶長接待官長每歲舊例十兩新增二兩監寺四人司庫書記一人每人每歲齋食銀三兩六錢共銀一十八兩都管都寺十人每歲齋食銀三兩六錢共銀三十六兩新設山長一人看守祖山樹木修理栽培每歲量給食米銀一兩五錢藏主維𨚗六人逐日領眾各殿念誦每人給布二疋折銀五錢共銀三兩老郎二人伴僕一人看守公館打鐘鼓報客以聽常住差使供役每人每歲工食銀一兩二錢共銀三兩六錢中興祖庭重建無盡菴每歲設供贍香火銀三十兩此乃額外係祖師自受施利所置又非他人布施者比後之主者用者及執掌者勿得輕視自取重愆慎之慎之此項銀兩自三十四年修起禪堂即將此銀入堂作十方常住供眾之用與菴無干凡遇撫按兩院入山除塔主住持戶長三處迎接上司外其餘府縣參遊守府賞功中軍把總衛所巡捕等官及尋常上司差使人役仍照舊規分派十房公同接待不許常住支銷滃源縣出入往來專在直月管事迎接齋食定例正堂每飯一餐銀一錢佐貳每飯一餐銀七分儒學每飯一餐銀五分相公每飯一餐銀三分以上四則管事迎接過後即具支票到住持處僉印到庫支取若不係本縣仍照舊規教授行童經書教師三人每歲共銀十兩各布二疋每疋折銀二錢五分此俱在祖師衣鉢內取當年塔主備之外每人鞵一雙折銀二錢此在常住庫內支給此項儻祖殿無出即在長生庫照監寺例節年支給不必零星其供應飯食隨禪堂眾數以上條例仍照祖師香燈田祖均攃公用永為一定規格後來住持頭首執事之人不許生心饕餮常住循私任情妄自增減即每年祖課完足除上支銷尚有餘剩者執事之人亦不許巧設事端別立名色妄擅支取除當修補山門及執事出入盤費併係常住公用必不得已者方許動支但可省各人當以厚實常住為念切不可起希圖小利之心自取地獄古德云常住之物住持人與司其出入者善能撙節浮費則錢穀不可勝用矣自此歲歲儲積有餘經營得法而日增月盛叢林未有不興法輪未有不轉者余稟祖命整捄傾危扶植頹綱非為細事諸執事者務必遵之纖毫毋忽嗚呼念哉常住之物絲毫為重葢是施主福田種子信心膏血豈可輕心欺盜古德云常住之物幾如鴆毒纔霑一粒則裂肝碎首通身潰爛故凡司執掌者能知因果即此便是造就天宮淨土不知因果者便是造就無量地獄鐵牀銅柱焦熱鐵丸萬劫苦楚不止披毛戴角銜鐵負鞍酬償宿債而已也況王法森嚴神明司察可不畏哉凡我執事各宜痛省思之念之萬歷三十年歲在壬寅春正月上元日立免虗糧以蘇賠累初本寺翁源一莊乃鄉民謝氏所施六祖為供贍香燈者歲入祖課銀一百二十兩萬歷六年間遊學林渙乃本府王郡丞之親友送寓本寺意有所欲於寺僧未遂因譖於郡丞謂此莊厚利皆歸於僧丞誤聽值署府事遂將本莊祖銀分六十兩以抵曲江蛋戶虗糧具申兩院司道立為章程其存寺六十兩又因佃戶姦頑拖欠累及寺僧無已屢告上司甚至費千餘金竟不能免後遇軍門劉下議本府申詳將浛洸廠稅課乃軍門兵饟內扣羨餘抵補以免僧累一向無異至萬歷庚子搉稅使者出即以廠稅入內監比告軍門戴蒙准仍照前行嗣稅監自行差官徵收則無羨餘可扣師知之親詣軍門陳白蒙行本縣查無礙抵補不得仍累寺僧本縣再三挨查無出因議各山通江小河出穀小艇設稅計得二十六兩未足續查濛𣿞對面山鄉舊有蠱毒田一所向未起科遂將此田設租三十四兩取足具申准議自此永杜山門之害皆制臺護法之力也既免此累而本莊佃民姦頑又以隔縣難制向以此田致累僧區內追田為費因與眾議將前莊田變賣得價收贖寺內近田為便具告軍門准批本道行府縣議以為便比眾佃從祖已來世耕即同己業不捨別賣情願重丈增祖永守寺業無替曲江二尹徐公署翁源事拘集眾佃丈量委實田地有餘遂於正課之外量加新增租銀一十四兩有零具申上司詳允乃與眾佃每歲約期交納到庫時寺住持眾僧議新增租課係師之力當歸中興常住師遂併前無盡菴香燈一並歸於禪堂以為供贍永為定規惟此一事實山門無已之害前幸制臺劉公權宜於前竟蒙戴公永絕其累且為後福是知佛法付囑王臣非仗大力外護何以能保永永哉此卷案具在府縣復祖山以杜侵占曹溪祖山宛若象形前後首尾分明今山後一帶乃全體也其紫筍莊乃祖師存日所遊花果園十二之一向有僧七主名小南華其來久矣成化元年韶州始開阡陌定井田本山盡為豪右並吞時年僧滿滄盛公具疏赴闕奏行撫按勘定復業則以占紫筍莊為首懲也後因僧多不律致附近居民蠶食為害竟不能安各歸寺住遂棄此業萬歷二十年間豪民江應東假買僧田盡占後山一帶圖為風水以至象脊與祖山中分且砍伐漸侵內地師心痛曰從此祖山將盡為民業矣遂激勸眾僧赴告軍門蒙准批本道行府親勘比蒙署篆肇慶府通判萬親詣山中踏勘定立界石斷將前田令僧收贖以絕禍源師自行募銀二百兩將前田贖回連後山場樹木一並盡為禪堂永遠供贍不唯保全祖山且為禪堂永永之業然師以此致怨而不法之僧交結外侮為害然竟以堅固立為金剛幢矣開禪堂以固根本師一日示眾曰叢林之有禪堂如國家之有學校乃養育材器之地自古為國者以儲材為本而法門亦然自達磨西來衣鉢止曹溪當時六祖座下悟道者三十餘人而南嶽青原為上首其寶林禪堂乃諸祖出身之地故天下禪堂傳燈所載者一千七百餘人皆出曹溪一脈如孔門之洙泗是則本山禪堂乃禪宗根本地也夫何歲月已久僧徒失守而禪堂幾於湮沒其舊基地雜居僧房有七而香積廚有二則溷廁豕牢亦各有九以清淨寶地變為糞壤矣師甚哀之因思叢林百年須樹之以人今選沙彌教習成人教而不育則如農知種而不知耘終難成實若無禪堂後輩將何賴焉以此日夜以思苦心焦慮徧察地宜自以衣鉢減口之資積金若干兩搜買空地各移僧房貼價另葢換出禪堂空地寸寸計之以十易一方得均齊方正竭盡心力乃起禪堂一區雖不全舊制其規模已盡此矣又思若照諸方常套決不能久因立十方堂於山門外以接待往來而內堂但安本寺作養後學僧徒專心淨業幸有成規則在堂之僧濟濟可觀儼然一道場矣師以禪堂既立而食指為難遂將前本寺供中興菴租銀三十一兩又將翁源新增租銀十四兩告贖紫筍莊田地山場原價二百餘兩並買黃山柴山一片用價若干兩又將自買旃檀林房一座換香積厨後僧房二主一併通歸禪堂以為中興常住始終併修造所費即此一所不下千金皆出師一力自此僧徒衣食足而禮義興故今在堂僧徒所受用者皆師當日苦心血汗也後之安享者可不知其本耶僧徒欲食已足又能以法食充之則佛祖慧命可賴此永固矣附錄未竟因緣右上臚列乃遵大師所訂壇經通志十品之規故摭其事之大綱亦分十則以見全體之一毛其微細行門皆出思議之表者亦未易悉數也其在八年之內拮据之勞精神疲竭其已成者開闢之功十之七修造之功十之三其大殿一區未竟之功乃六祖未竟之功也久欲經營力所不及於戊申春三月嶺西觀察文所馮公入山訪師宿菴中夜夢觀音大士現高大身相好端嚴公見而頂禮讚歎嚴好聞大士語曰即非莊嚴是名莊嚴公有省及寤甚喜詰朝入殿禮佛謁大士見大殿後柱腐敗其勢欲傾三大士像亦甚危矣公指謂師曰何不修此師曰久抱此心力未能耳公曰所須幾何師曰非三千金不敢舉公曰請力任之師曰檀越果發大心在謦欬彈指間耳公曰固非一力所能姑徐圖之公歸見制府大司馬戴公告之故公曰孺子將入井仁者必匍匐而往救況大廈將傾佛聖之危乎此仁心者所不忍遂語馮公請師面議之師聞而喜乃具圖式往謁戴公按圖私計曰若公所云猶未也師曰佛事如空中雲第以此為緣起耳戴公即願力為之師曰法門之事非可以世法拘又不可期以速成在臺慈一力恐有所不便須眾心合成但仗法力倡導足矣於是議製疏十通分通省司道府各助之不日軍門二司道府各施有千金師親往西求大材事事皆一肩荷擔明年己酉孟夏材木盡載運至濛𣿞師還山集眾議擇日興工以有礙之僧房須先移空地以堆拆謝之材料時一二不軌僧徒以為不便因而倡眾鼓譟如作亂勢師遂已如是者三日師默坐菴中閱金剛經乃曰此正予著相之過也仍著金剛決疑解三日而成眾乃止倡者自憂不獲已乃妄揑師侵寺若干金拆毀殿堂若干座條牒具訟於道府師聞之曰諸辱可安忍若言染指常住金錢此干大法豈可緘默乎因具先設常住清規出納支籍號帖及經手僧名具白本道下府拘集節年經手者查算一毫無干以住持願祖侵欺抵罪僧復訟於按臺准批刑廳師親往聽理於是年五月飄然出山從此不復入寺矣以直指無代者師奉法不離船居者二載船破廛居者期年困辱病患無所不至辛亥秋直指王公按部司理蔣謬聽將師一往所修禪堂及所置供贍山場田地盡斷歸佛殿為名其實歸訟者仍坐師不法罪遞解出境而先事有勞者皆坐以罪事上直指批曰願祖盜賣寺基猶然刁逞此祖師之大罪人也某大有功於六祖者其違法之僧不遣而反坐有功者並其無盡菴而奪之得無以此為平等法門乎仍批本道劉公覆勘詳確重委陳郡丞到寺按狀歷覈事事皆虗願祖愳自死以法科抵罪禪堂香燈屬門人圓修主之六祖如綫一脈賴以存而師心迹始大白矣當道再四慰留還山以竟前業師曰僧以因緣為進退今緣盡矣力以病謝竟浩然長往師乃著中興曹溪寶林禪堂香燈記具述其事刻之貞石時萬歷辛亥秋九月也諸弟子懇留居五羊長春菴又明年癸丑師以病不能安遂杖之南嶽越丙辰夏東遊吳越弔紫柏雲栖二大師黃梅汪靜峰司馬致書浮梁陳大參赤石公為檀越留師休老於匡山明年丁巳夏師還匡山遂結廬於五乳峰下自師之去曹溪其受化諸弟子輩如嬰兒之失慈母也日夜以思求師復歸難得矣越四年庚申方伯吳公入山覩寺之規模三歎不已眾僧因具白師之功德及山中眾等戀慕之心吳公大發歡喜願與六祖作護法遂具書請師還山未幾會中興護法祝公亦至一力堅請師轉法輪由是益知六祖之靈有感嶺南法化之機有在也此師末後一段因緣因記之以示來者王安舜曰夫建功成事之難也𡩋獨興朝事業哉即法門亦然曹溪為禪宗洙泗海內叢林傳燈諸祖皆出一脈豈細事哉今千年矣其大壞極弊一至於此即六祖復出亦難之也何幸徼聖天子之寵靈師以逆緣至一力而更新之不八年而功過半無論其財法二施即堅忍不之志處困苦污辱而甘心若飴在古人求之亦未易見也然師之真慈御物應化居常切言不為世主之忠臣即為慈父之孝子每見在行間執戟大將軍轅門鴈行卒伍叩首階下出入如坐蓮花而禮金仙未嘗一見其惰容至於地方多故當道束手生民皇皇不安枕師默運慈力排難解紛潛施密化斡旋其間未嘗一求人知或以耿介觸時即諸弟子人人危之師恬然略無芥蒂無論其妙悟玄機高才磊落即隨緣應物一味平懷咸聚首而語曰此非所謂現應化身隨類而說法者耶不然何以竊謂嶺南六祖為佛法源頭何幸千載之下而一再見豈昔曾授記也耶若師之心如虗空固不可涯量略記其行事之概如此師在行間十有八年所著述有曹溪通志楞伽筆記楞嚴通議法華擊節品節通議金剛決疑道德經解觀老莊影響論唯識百法規矩解起信肇論莊子內篇解大學決疑其詩有夢遊集自罹難始及開示門人法語偈頌計數百萬言然皆在奔走間凡有所求信意揮灑未嘗一安坐經思也又其染翰人得片紙為世寶大略觀師於可見者特緒餘耳師之不可見者又可得而思議耶或曰詎所謂和光同塵微妙玄通深不可識者耶余曰是亦強為之容耳欲知吾師請竢如吾師者
