body:
  text: 侍者福善日録門人通炯編輯嶺南弟子劉起相重校記瓊澥探奇記豫被放之十年萬曆乙巳春三月自雷陽杖䇿南遊天池探瓊澥之奇且踐宗伯王公給諫許公之約寓於明昌塔院院乃許公議建以補郡城艮方之不足獨立中天高標雲漢登覽四顧若御泠風而遊空澥潮音動天水色澄虗又若鈞天而臨明鏡巍然一大奇觀也居旬日諸弟子日益進盤桓閣上相與論道有閒陳生於宸邀豫尋毗耶之金粟求蘇公之白龍具得其真樂而忘返又數日劉參軍遨遊西湖觀玉龍泉乃欣然命䇿孟夏之十日也湖去郡西二十里許岡巒蔓衍一望蒼翠指石山而南二十里出郭三里許村園蔬圃連絡鱗次礧礧落落疊石為塹擘土為畦骨露肉藏外瘠中腴秫黍菽麥嘉蔬細粟五穀咸備觸目燦然儼若薊門西山也迤邐曲折漸入深林行數里蓊蔽野不辨高下穿雲躡石步出小溪清流照人可鑑毛髮心脾一洗炎蒸頓蘇不數十步則臨大溪度石橋俯流濯髮肌骨生粟乃拽杖散步聞雲中犬吠不見煙火小轉即入村墅居人環堵盡壘石為壁形朴色古蒼蘚青藤延蔓交絡如珠瓔之挂天冠也余喜而忘倦因倚杖入門良久一老人出修眉龐首著牛鼻裩敝衣垢面捉襟肘現望之若不見問之則不應儻然若忘掉頭而入余是知秦人不在武陵也伫立須臾余掀髯長嘯出村舍西石漸巨林益深石岸夾溪則見沃壤平疇禾稻如雲流水灌注濚𭱫周匝如渭川淇澳恨無入雲修竹耳椰棕檳榔處處撐天此世所無淇澳所不易者余曳屐沿流穿田度塢不辨東西行又數里許過小溪登平岡則知為西轉也棘刺牽衣林草塞路披雲撥霧攀蘿躡磴神怡足健經過十餘里皆礧石為塹如丸如拳如毬如案大者小者欹者側者方如切者斜如壁者砌為隄環密如羅紋天然峭列無不中度大如丈室巖如宮牆至有萬夫不能舉者纍纍垂垂疑其為鬼工也登高遠望連阡遍野處處皆然異哉徘徊瞻眺隱隱出灌木末參差列如層城四顧茫然寂無人聲幽深窈窕非人閒世矣又小北轉遙見雲中華表從者指為石湖心竊疑之其石鋪地面一平如掌色如古鐵形狀巧妙大似蓮盤小如蜂竇奇形異態行行不見其蹤小轉入石門仄徑逶迤始知為一石天成周數十里四面皆高中凹一湖如照天明鏡又若生盤池中著玻瓈盞耳不知誰為鑿之也相傳此地昔為居人一日風雷大作龍從石出大水沸涌屋宇盡沒為湖天旱水涸石有龍形嘗大旱現夢於郡守曰吾石湖龍也禱之當得雨太守往禱輒應建廟貌以祀之至今率為常入石門百步渡小橋連一池池上古木如張幕下有古殿三楹棟梁皆石殿後有池額曰玉龍泉池上有古廟三楹即玉龍之神女像也左有龍泉自石罅中出噴薄如珠大如車軸注於方池池上有亭址池下有長灣皆有故事今亡矣池東隔小石嶺嶺下有溪曰篁溪溪下望之嵯岈嶔岑石空洞中如盤池者多奇絶林草翳蔽不能入而水滙為流曲折隱伏會歸一竅且曰出前村之石橋從之環繞萬山腳穿田過峽從石塔山外過郡門入南渡響水橋則直東而會大河傾瀉入澥矣余與參軍湯黃二生濯足清流散髮披襟盤礴池上清風四至毛骨清涼如坐廣寒對冰壺而臨玉鑑殊不知為炎荒瘴澥也日莫返䇿因循水道望之則自源頭出谷曲折由西掠南直東入河似與郡城無繫屬焉窮日而歸臥高閣而恍夢遊覺而紀之因論之曰瓊自中原來脈從南嶽轉西粵抽枝下桂林左右兩江夾送而南至蒼梧貴水過峽蜿蜒出靈欽入澥為蓬壺轉珠崖突然涌出五指參天北向中原為南甸鎖鑰環三千里真天壤一大奇觀也聖祖有言南溟浩瀚中有奇甸數千里豈非天眼哉嘗歷覽方輿南衡而下脊分五嶺山水背中國而南奔入澥故按環澥大形左朝鮮而右安南若兩翼然日本呂宋暹羅諸島列於外瓊甸適當百粵之捍屏實澥外一大都會也五指回拱特起中天為瓊之祖龍山北向而水北流腰結定安水左旋右折循龍而趨橫跨郡東而直入澥山則右奔遵西澥而北結石山舉首開口中吐真脈盤而東倒回顧若遊龍頷下之明珠結為郡城石山為首左張唇入澥為後託小水隨之右拖長嶺方數十里中為石湖委蛇而南橫嶺為郡案嶺後為白水緊纏幹龍由石塔繞城西南隅過門而左低滀為南湖而石湖水外流包內案度響水橋古從馬坡迤東北回繞春牛館聚東湖之回西北轉自新橋會白水抱城東而旋今則返跳直入河如弓以背向郡城而不顧如形家所謂氣散矣許公建明昌塔於艮方以塞水口議將引石湖之水繞城南抱東郭會白龍金粟過明昌而始入河以完生氣居然一天造也竟不遂豈扼於人哉余坐閣上每夜登塔望山川之氣索然指謂從遊諸子曰瓊必有災以山川寂寥而城若空無人者是無氣也時以為妄余孟夏既望乃渡澥北歸未幾月而地大震東門地拆城陷屋宇盡塌官民露處而塔亦側其半余居之閣亦傾搖揚不安者半年至今記余言者以為徵因併記之瓊州金粟泉記并銘瓊郡距澥可十里城東北隅岡足水趺有泉涌粟粒粒燦然如珠泛澥眼人取而試之去殼出精宛如北方之布穀至冬日氣斂泉溫其粟出芽如秧針刺水是則實非幻出也時人怪而異之不知所從來概呼為粟泉萬曆乙巳春三月豫自雷陽渡澥訪大宗伯王公給諫許公且探瓊澥之奇陳生於宸博雅士也謁余於明昌塔院邀宗伯公同過天寧方丈茶話及此因杖䇿而觀之令僕探取沙泥中果得粟數粒撚皮出米如新穫者余甚奇之因命名金粟泉意取維摩金粟如來李白自稱為後身今於宗伯學士若有當也汲水烹茶味甚冽啜之毛骨清涼如在毗耶方丈吃香積飯也陳生畜疑避席而問曰粟産於北土泉涌於南天相懸萬里且隔澥津胡為乎來哉此智者所必疑常情所未測也敢問其故余曰噫嘻此蓋難與俗言也請試論之大地浮水上如一葉耳水之潛流四天下地如人血脈之注周身由生於心而養五臟外達四肢徹於皮膚下至涌泉上極泥洹髮毛爪齒靡不充足不充則不仁矣由是觀之天地一指也萬物一體也水火相射山澤通氣風雲呼吸潮汐吞吐乾坤闢闔晝夜往來無一息之停機如人日用食息起居耳復何怪哉昔有神僧從西域來飲曹溪水香美而甘驚曰此吾西天寶林水也中山大悲閣閣高百尺像高八丈有唐異僧遍化金錢銅木在在納於井中及歸而取之盡從井出以足其用至今尚有一木存焉由此觀之大地之水未嘗不通物未嘗不達斯實事也昔蘇長公居儋耳嘗品三山泉謂與惠山相通因名惠通泉是則太虗寥廓萬象融通人特有心限礙耳竊觀瓊海地發於西北氣結於東南如人一指之甲耳甲乃筋之餘也血以養筋筋固則甲厚凡人甲厚者必多壽故地土厚者必多材說者咸謂中原土厚故將相多出於其閒余則謂不然瓊居南離離乾體也以吸一陰外剛而內柔虗而麗照文明之象也地浮澥中火金生水故晝炎而夜寒以乾坤之真氣極於斯而鍾於斯故山川之金銀明珠文禽名香珍奇異獸寶藏興焉百物備焉人則仙靈文名忠臣義士往往出焉此天地之一隅如太虗之一塵造化密移昧者不覺聊通一粟以示之如從一葉以辨春秋耳復何怪哉宗伯聞說躍然歡喜再歎曰奇哉時在座有沈生成德等相率再拜稽首請銘之以曉未聞乃為之銘曰大地一塵滄海一粟充遍十方何所不足似毛在體如血周身觸處即見於何不真坎離水火乾坤在我交姤發生有何不可地氣自北而鍾於南物亦隨之涌現其閒人疑此粟不知所從來處不知何以明宗造化密移不屬聞見聊借一粒以觀其變苟知一粒芥子含空水火周遍何不相容血脈周身自頂至趾上下周流終而復始大道循環無往不復道脈潛通若此一粟淵泉混混而時出之道脈南來可卜於斯遊景泰寺記之山川發於衡嶽折庾嶺而下腰結曹溪逶迤而南直抵五羊五羊之主山曰秀秀之祖龍曰白雲白雲固多奇勝而景泰為最以踞白雲之腹而撫仙龍之城兩翼合抱如老蚌含珠孤峰絶澗深林蓊奇葩異草煙雲出沒菖蒲生於石隙棕髮披於林表大海如鏡壁立於眉閒明月如珠光流於唇吻信天壤之奇觀南海之巨麗也初寺以山名我明景泰閒奏請賜額如故制府馬公昂率諸屬以新之余居五羊三年戊戌𢹂禪侶遊觀極為佳勝丁未春仲奉詔還山寺僧正裔持此圖以請聊為記之端州寶月臺記按志郡北百五十步為寶月臺平地突起高二丈周一里許望之如臺是則天成非人為也不知命名之始高岸深谷遷變不常今為平湖陂也殆為有力者負之而趨山川故吾無復真宰矣萬曆甲辰嶺西憲副陳公治郡政暇歷覽形勝登高望遠慨然而歎曰吾今乃知寶月之臺當平湖之心也本之形家居必憑倚星巖固為郡之屏障以前逼而後脫天造斯土為嶺表喉舌百要衝揆之風氣豈若是之疏且漏耶故知斯臺之於郡城為形家之鬼託無疑矣是可以終亡乎遂建議於湖心培隄築臺以實之鳩工集事不日而成華亭馮公元成以浙憲長量移茲土登臺周覽曰美則美矣猶未盡也且以隄為臺名實未副月圓矩方形似失真是則人未合天也且山有仙則名水有龍則靈言得其主也故凡建久遠不拔之功者必人為而神守恃有常主不失其祀故能與天地相為悠久也公乃捐俸就臺殿之中楹造白衣大士像披珠纓而臨空水坐火宅而灑清涼端然如淨琉璃含寶月也豫辱公見招因與公議將補前之缺略後建閣五楹前列鐘鼓二樓蓋取形圓象月勢高若臺藉大士之靈以主之始謂天人合德以還造化之全功也公慨然捐俸庀工首事始於萬曆丁未冬十月落成於戊申秋七月規模壯麗宏敞高出中天畫棟連雲丹楹映日余時登覽撫景四顧超然遐想曰美哉山河之固異哉天造之奇也因思臺始命名必形家之具法眼者閒嘗閲覽東來龍遠宗衡嶽抽幹而下越懷四注鼎湖為端郡之祖龍挺挺雲霄蜿蜒西走列障橫開明堂廣衍垣應紫微融結七星奇峰洞宇千態萬狀文巖錦石雲蒸霞燦拳砆片石足為世珍此造化之精英山川之蘊奧也星巖羅列蛛絲遊蟻點綴平川東折羚羊峽為端捍門左逆水上遊由黃岡而西結為郡城按形察理則回龍顧祖轉望七星志稱斯臺平陽突起非若驪龍頷下之珠乎意取明月之珠為世至寶故名寶月有旨哉且夫天然之巧能取而象之固已奇矣神珠既失罔象索之得於重淵以還化工又一奇也缺而補之引而伸之神以明之以為常守惟斯舉也諸子大夫萃美一時顧盼之閒美流萬世所謂待人而興仁智之實也豈偶然哉水有龍以靈龍有珠以神若騎龍犄角扼頷批鱗而奪之者則其人也故茲土之為靈也久矣臺翼二剎左慧日而右靜明若日夜相代照迷方以破重昏鐘鼓交參潮音迭奏上祝聖壽下福斯民忠孝節義乘時而興起者實馮大士之靈也若夫奠斯士以鎮華夷布慈風以翊皇度誠萬世無窮之利奚值遊觀之美而已哉是為記夢遊端溪記萬曆己酉仲夏五月十有二日余以重修寶林搆材於端州往來期年事竣還山時當溽暑霖雨大作江水泛漲兩涘渚涯不辨牛馬於是乘流放舟下羚羊之峽過端溪之口倏忽四山雲合風雨颯來波濤洶涌舟不能進乃維以避之神搖目眩隱几假寐而夢遊焉於是乎仰望峰巒奇秀上干重霄怪石嵖岈下臨無地遠聽溪流泙湃激隙衝巖如考洪鐘而擊鼉鼓其聲自天隱隱窿窿不知所從將謂蛟龍之堀宅神人之洞府空谷之足音也余跫然而喜乃呼漁父刺船入溪以遊目焉少焉風雨暫止霧斂山霽余乃摳衣跣足拽杖穿雲緣溪小轉百餘步歷山之麓有神壇焉謁荒榛中少憩石上數十步近聞異響若空中發延伫良久四顧茫然窺懸巖瞰幽壑始究聲之所從出漁父曰此端溪小巖也即名硯之所産者巖穴水盈一竅如口乍聞其聲若獅子吼衆音雜沓若號羣走巨者細者如雷如霆如崩如奔如篁如笙金石鏗鏗若和鑾之夜鳴者洞中流泉淙淙之聲也余踵足而立傾耳而聽掀髯而喜曰噫斯莊生所謂地籟者乎何其殊音妙響若是之奇也徘徊久之左陟層巔望山腰如雉堞者採石之署基也東過小嶺數百武一澗相纏雙嶺若翼澗之兩垂碎石礨礨如羣星錯落裂錦紛披者鑿石之場也其有小者大者如掌如指如耳如齒如蜂如蝶如翅如尾而不知其幾千萬落諦視其狀若切烏玉以截瓊枝剪雲霞而散綺縠者丈石之棄涕成才之土苴也可玩而不可把可愛而不可拾目擊心怡足躡神曠攀援而東披荊棘履巑岏下嶺入溪清流如鏡毛髮可數一碧𣹢虗羣峰倒影捫蘿俯視峭壁臨流淵深瀞默若神龍蟠屈於其下者漁父指顧謂余曰此端溪大巖也但見蒼藤翠篠蔭蔽其上幽潛杳渺莫辨其戶漁父曰門居水底亂石封固即官家採取亦待三冬水涸而啓之其中深不可測鑿空虗實積水成潭濶數十丈杳不可渡上通衆竅下接尾閭潮汐盈虗與時消息雖萬夫之力不易竭也即有事於此以車出水子夜施工以及亭午略見崖際石工編篾而取之不易得也由是而知端硯注水而不飲者生於水也巖面而上兩山合抱中若掌心望之若古墓焉高不能上乃命童子往視有碣苔封不辨歲月但識陳孟輔之墓傳說先朝採使卒於役遂賜葬於此若使其神守焉者余慨然曰山川如故人壽幾何此其驗也呼漁舟渡清溪探巖下亂石壘疊於水底者洞門也波光蕩漾若流霞散綵於水面可觀而不可挹者石之餘烈遺輝也余解衣磐礴披襟散髮濯足清流刺船少進則頽波激湍觸石噴珠濺面溼髮毛悚肌粟水淺舟大膠不可上遂捨舟入溪援揭潺湲數羣石而嬉遊焉亂石如蟻嶙嶙齒齒巨者細者如羊如牛如豚如狗如箕如斗如拳如手然其大者肉銷骨露天然渾圓小者鎚鑿之餘蕩磨光瑩而與頑石同波者難以名言咸撫摩玩弄而洗濯之拔髮刮垢凝脂膴媚燦然可觀余憮然歎曰信乎美器造物惜之是知山川之精文物之英上天所禁恆民不可得而襲取也漁者網𮊁樵者斧斤時過懵然而不顧者以其無所可用也其有墨卿翰史求之而不得慕之而難見者以託身邈遠不易見知於世也亦有得其形似用不稱職名不及實而遂詆之者紫奪朱也余於是乎力命童子批沙掘泥擇而簡之大者堅不能舉小者盈把可十數片懷而歸之若採紫芝而拾雲英信可樂也然皆剝猗斜之餘不堪雕琢知其無用而寶之者以其德合君子具體而微聊足以寄心且窺化工之一班也頃忽風雨飈至雷驅電捲余知山靈之不我與也遂沿流出溪而歸舟焉忽疾雷破山蘧然驚覺頓失向來之所有推篷太息四顧萬山煙籠雲幕羣峰插天森然若戟倣徨躊蹰魚蹤鳥迹恐尚奇者欲談辭喪不可得而憶焉遂託之於筆廣州光孝寺重修六祖殿記昔佛未出世時舍衛國王祗陀太子有園林豐美足備遊觀及佛出世卜墜開講堂遂選為精舍至今稱為祇樹園蓋人以勝地名也趙他為南海尉選訶林以為園及東晉隆安中賓國沙門曇摩耶舍尊者從西域來愛其地勝遂乞以建梵剎名王園寺至晉永和初求那跋陀三藏持楞伽經自西國來就其寺建戒壇以待聖人梁天監初西天智藥三藏持菩提樹一枝植於壇側且志之曰百六十年後有肉身菩薩於此開法度人無量有唐貞觀中改王園為法性寺高宗龍朔初我六祖大師得黃梅衣鉢隱約十有五年至儀鳳初因風幡之辨脫㯋而出果披剃於樹下登壇受戒推為人天師以符玄讖自爾法幢豎於曹溪道化被於寰宇至今稱此為根本地然佛祖之道原不二則祇樹王園亦一也豈非人以道勝地以人勝耶嘗閲玄奘西域記云祇園精舍今為荊棘之場今見訶林覺樹猶聞鐘梵之響豈南靈異於西天祖道有逾於佛法耶聖人相傳應運出世授受之際閒不容髮第願力有淺深故化緣有延促譬若四時成功者退是則化聲相待待而有待有待而又有待也無待則應緣之迹斯亦幾乎息矣惟今去我六祖大師千年傳燈所載千七百人其化法之場隨時隆替在在淪沒者多粵之梵宇百不存一猶曹溪流而不涸覺樹榮而不凋詎非斯道有所託而然耶此又地以道存人依法住也余少事枯禪因法獲譴丙申春初謁六祖大師於曹溪瞻覺樹於光孝訪其遺事其迹邈然而人不知僧期年而乞食行三年而齊戒修放生舉五年而曹溪新戒壇復十年而教法廣信道衆蓋大運然也昔人以菩提樹下為大師剃髮之所因建殿以奉法事其來遠矣風雨薄蝕亦因時興廢今僧通維率弟子行佩輩募衆而重新之余為清其眉宇擴其門廡使道容暗然而復章慧燈朗然而不昧此又事賴人為人因事重也然佛以六度攝有情而檀波羅蜜為第一且即非莊嚴是名莊嚴苟事相與法性融通則世諦與真如交徹斯則燒香散花皆為妙行矣若通維者刻桷雕榱豈非淨土之資乎昔立壇植樹既有待於六祖今迹存而事修人亡而道在豈無待於後人耶且王園之勝較之祇園彼往而此來又有閒矣是為記衡州府開福寺因緣記開福寺居府城湘江之南岸里許唐大歷閒無著禪師開山於此禪師法系載傳燈録初與法照禪師結念佛社於湖東後皆遊五臺親見文殊事具清涼傳師與其弟無絶同建道場師創開福絶於西鄉金蘭里興大悲寺實一時也開福始制規模弘敞宋淳熙閒丞相趙忠定公汝愚謫永州道經衡病作為守臣錢鍪所窘暴卒殯於此因立祠歲時祀之後郡守向子憫公有惠政歲荒全活數萬人百姓感之亦立祠於此歷久寺廢胡元元年有福海禪師重興并新大悲寺我明宣德閒寺又廢士民建小菴於荒址地僅一區殘僧數輩守至今幸不沒於民閒也隆慶壬申郡善士綦遐等重緝其菴以僧如祿守之萬曆庚戌孝廉杜君友桂居與寺比鄰一夕夢老人擁上馬曰豫開福土地神也是年杜君舉鄉進士乃以夢語其親曾儀部金簡公公曰考郡乘開福乃福海禪師重建君今號馥海豈前後身耶君宜新此以志不昧本因也杜君欣然約鄉善士劉子濂綦遐文學劉鳴鸞等併力鼎新郡司馬尹公雅重三寶力為之主以其地久廢多沒於民閒基址迫狹二祠亦湮沒無能復其舊經營五六年閒始建佛殿三楹湖東開福相望咫尺曾公重建湖東迎豫主之癸丑冬豫自中至其營開福諸善士來請豫往視之愍其心而嘉其志乃為之記曰自古佛祖說法地所建道場為結金剛界皆有龍神護法以守之雖窮劫不泯也昔世尊與帝釋行次指其地曰此過去七佛說法處宜建梵剎時賢於長者即插一莖於地曰建梵剎竟此其證也震旦自有佛法以來天下叢林在在琳宮如星羅棋布雖墮荒榛其名不朽即有興之者發其幽隱如覩故物蓋在因果不可泯如許詢建浮屠未終而逝後裴度為相謁其寺主者一見而言曰許玄度來何莫昔日浮屠今如故度聞語遂修之塔內石刻果有緋衣宰相之讖由是觀之開福蕪廢千有餘年而尹公與曾杜二公唱導興復皆於佛地有大因緣非偶然者昔者無著法照發迹湖東皆遊五臺並得親見文殊豫今發迹五臺投老湖東適遇開福重興之日是諸人者往往來來彈指出沒曾不離文殊尸利竹林寺金剛堀中前三三後三三因緣會合豈可思議哉諸善男子其尸祝尹公於其寺又將為後之玄度徵杜君馥海之兆桑中之環益較然不爽矣豫故概記其始末以告來者諺云千年田地八百主人今之讚歎隨喜者豈非後之護法福田功德固有不亡者存可不信哉遊芝山記余隱衡之靈湖有談永州芝山之奇勝豫心慕焉乙卯秋九月參知馮公從武陵移鎮湖南駐節永州招豫為九疑之遊以是月晦至則見永郡山水清勝若仙都洞府未可以塵寰概視也寓瀟江之西滸石上小樓坐覽江山之勝如在几席冬十月九日孝廉唐還和文學呂旭谷邀潭州周伯孔四明張漢槎嶺南弟子釋超逸同遊芝山寒雨連朝時則小霽乃拽杖從西江之岸沿緣里許就山麓逶迤而上又里許登小嶺望羣峰崒嵂不可攀援乃下嶺入谷二百武小轉而西則奇峰獨聳縣巖秀削梵宇飛甍依巖篏石曰芝山寺乃萬曆乙巳比丘明爵開山創建寺前無餘地為龍首遮障不可縱觀又轉而西為觀音閣倚高巖之下則開敞昭曠衆山羅列如在眉睫下則平疇沃壤溪流曲屈羊腸九折如天衣飛帶飄揚到懷由山足入江又西轉數武為殿一楹舊縣塑三大士為闡提所毀其地最為幽勝後有洞宇可坐數人又西轉穿石碴砑從隙中登陟而上紆盤數十級為山腰平地數丈前太守王公建一虗亭遊者至此可坐而樂焉奇峰怪石森列左右千態萬狀不可名目如纍纍太湖堆積疊甃瓊花玉惢密葉敷榮亭左緣巖而上洞心駭目若披青蓮而挹惢珠不能細數又上有兩石如手名合掌巖下有洞門天然透漏度門而上則為玉皇殿至此一覽則四面山川盡在眼底城郭鋪舒宛若圖畫永之全勝畢見無遺矣竊謂柳司馬居永十餘年無幽不討而足不及此何蔑如也或指此為西山柳文有記從染溪而西又曰特出似今目為真珠嶺也又或指為羣玉山志云宅仙洞下此山無仙洞是二皆非豫謂茲山不遇柳不幸也柳不至茲山未盡窮也或造物祕護而有待於今日乎豫與諸子相和而歎曰山川留勝蹟我輩復登臨徜徉徐行尋柳巖而歸宜章高雲山藏經閣記域內名山英靈奇秀鍾天地之精者五嶽居尊支分四出而曹溪源根於南嶽南嶽曹溪相望千餘里諸峰綿亘羅列星斗自六祖開化讓師分流道脈寰中而韶陽上下肉身大士以十數逮今如生者詎非山川之蘊奧故道脈特有託焉宜章介曹衡之中治西三十里有山名高雲祝融之孫也為靈久矣嘉靖甲戌居人歐陽氏創蘭若迎沙金海公居之擴建梵宇以安廣衆通邑歸依為福田資置香燈糧八斗未幾厄於回祿海公去隱於閩之支提山弟子悟丹輩一力重修壬午歲工落成建塔於龍首迎海公靈骨歸藏是為開山祖弟子日益進十方往來於曹衡者莫不過而止焉邑人袁氏文憲施田三十畝供雲水齊粥需由是諸方咸稱之僧既集深山窮谷之氓皆知有佛若僧矣第僧尚未聞有法也有法孫性成者志求大藏經於金陵苦心一十二年願始就萬歷己酉夏六月乃迎大藏歸四衆歡睹若白馬自西來也葊居山頂林木蓊雲霧蒸溼慮經藏之難久法孫真桂等議擬建閣於山之麓曰南莊時大尹鄭公守戎童公為檀越倡導之出信疏以告四方聞者歡悅來歸者如市工始於某年月落成於某年月將啓法會供水陸儀以宣利濟居然一大道場也事克成公弟子悟紹從余曹溪乃乞余言以記之曰古德云盡十方是常寂光土徹大地是普眼真經斯則佛土不修而自淨經卷不展而自明雖然良由心淨而土現眼明而法彰此所謂人能弘道非道弘人也高雲之道場東來之大藏非海公之成始諸孫之繼業檀越之成終又何能使披荊棘而為寶樹變沙礫而成梵宮哉法幢既竪道運弘開則青山白雲法身常住猿吟鳥噪妙偈恆宣而水流風動居然出廣長舌與此境中人疇唱無盡凡在見聞隨喜者如善財之入彌勒莊嚴樓閣也惟此功德又奚可以一毫端頭而能具其涯量耶是為記麗江木六公奉佛記豫將逸老南嶽適隱衡之靈湖馮元成先生量移守湖南過訪永州談及往遊滇南諸勝事出武陵稿豫讀六公傳乃知金馬碧雞之西有異人木六公焉公守麗江奄有疆土六傳而至公稱六公云其先在國初以忠順發家武功最著至雪山公遂以文名雅歌聲詩翩翩有凌雲氣楊用修太史大為稱賞相傳至玉龍松鶴辭翰逸格而蓮社清修發軔覺路至六公則迥超前哲特出風塵之表矣公天性淡薄於世味一無所嗜好忠孝慈愛唯以濟人利物為懷歸心三寶刻意禪那愛接方外法侶相與禮通精修頽然如糞掃頭陀尤廣檀度是皆富貴之所難能而公特為家常行履豈非多生久植善根乘悲願力而影響攝化應現者乎豫初入空門不知佛法之廣大將謂單棲弔影於窮山絶壑草衣木食守枯禪而為上乘及親大教日深讀雜華觀普賢妙行無一類而不現身無一事而非佛事以不捨一衆生乃見佛慈之廣大不棄一塵一毛方識法界之甚深由是凡對宰官相與語者不更窮玄體妙唯以了悟自心廣行萬行即世諦語言資生業等皆順正法所謂實際理地不受一塵今事門頭不捨一法若夫浮慕虗尚高談脫屣而膠固貪癡綢繆世態者與夫身居世網志出塵埃冥心絶域若蓮出淤泥皭然而不滓者安可同條而共蒂耶是知佛性雖一而習染厚薄有迷悟之不同故論種子從貪瞋而發者資貪瞋從般若而發者資般若般若深則貪瞋薄般若現則貪瞋消如神奇化臭腐臭腐化神奇體一而用異聖凡由是而分焉了心廣大則形骸不能拘觀法界空則萬有不能礙所以達人無纍於情者以其智勝而習薄也故古之悟心之士攬長河為酥酪變大地作黃金豈有他術哉唯得自心之妙滿法界之量心外無法故也公刻華嚴大疏於雞足其有得於此惟是道路閒關無大手宗匠開公頂門眼故公志慕方外欲事遠遊參訪知識以世法纏牽而不可得愚意則不然即公能靜坐觀心六根消復則虗空殞亡洞觀法界則山河不隔將視華藏於毫端攝淨土於塵芥不動步而遊履十方不起坐而承事諸佛此自性天然本元具足曾不假於外也且公有土者也以山川之廣人民之衆即推其佛心而教化之語曰一家仁一國興仁公以精誠格物以佛事化民使家喻而戶曉人各知有佛心各知有慈不令而民從不威而民服熙熙皋皋含哺鼓腹窮荒邊徼洋洋佛國之風公如坐蓮花而端居極樂即太古之治在掌股閒又何勞跋涉山川視浮光泡影而為究竟佛事者乎豫因先生而知公居遐陬八難之地定為悲願之應身第恨老矣不能持一鉢以南詢望毗耶之室如眉睫閒願與公結異世緣當龍華三會中豫定知公為釋迦末法中之宰官佛子也公其無意乎法相寺長耳定光佛緣起記杭之山水甲天下古聖示迹剎竿相望者如林亦域內無兩法相寺居南高峰下幽深杳眇林木蓊泉石清奇蓋昔人迹罕至五代有異僧棲遁於此後遂為道場師名性真閩泉州陳氏子母夢吞日而孕師生異狀兩耳垂肩下可結頤人皆怪之七歲不語或指曰此兒啞耶師即開口曰不遇作家徒撞破額顱耳長出家參雪峰存禪師發悟遂行腳至四明隱於山中為鬼神說法諸天散花猿鳥獻果既而出山至錢塘隱於南高峰頴秀塢初無水師至卓錫有泉迸流時乞食於市人皆異之小兒叢逐見師耳長左右扯之師隨轉但頽然嘻笑而已人問作何事為好師曰作福可遮百醜乾祐三年吳越忠懿王誕日飯僧永明寺時智覺壽禪師正開大法師赴會遍身疥癩徑坐上座衆皆惡之王見之大不敬遣之即歸山中晏坐一室齊罷王問壽曰今日齊僧有聖僧降否壽曰長耳和尚乃定光古佛應身也王悔趨駕往禮曰弟子肉眼凡夫不識古佛願求懺悔師曰彌陀饒舌言訖坐逝王回禮壽壽遂化王因是建寺留師肉身至今存焉王有感以二師事併奏聞請諡賜永明宗照大師師曰宗慧大師嗚呼佛說法時往往以後五百年像法已壞衆生濁惡最難教化且曰我遣變化人處處為諸衆生開示演說此法而度脫之是知逆行順行皆大權示現方便利物或語或默無非演說最上之法觀二師同時出現蓋可知矣永明悲末法性相難明故設宗鏡揭一心之旨使見聞者靡不躍然而入其長耳者以異狀利生始終無法可說惟以慈心三昧攝化衆生以衆生生死愛為根本而以男女為愛根欲以愛治愛故令無子衆生求者必應至今世之乏嗣者無不求之求而必應捷如影響此不說之說其說熾然而道場晏然香火綿遠則窮衆生界愛根未盡而法音常然豈不信哉是為記嘉禾金明寺大定堂記金明為嘉禾名剎其後為范蠡湖今為郡城滄海桑田也寺始於宋乾道間靜慧禪師開山興廢不一而伽藍之地鬼神護之然竟未為草莾也向殿宇雖傾而僧不乏祀頃於庚子歲秋潭舷公始重新佛閣未就而化禪人道顯以受業願繼其功閣竟成而佛殿觀音大士閣及天王殿併一新請耶溪法師講楞嚴經遂成叢林其寺右有地十畝許舊為禪堂址向為有力者所據居士包心弦沈汝納王季常沈爾侯仲貞諸君捐資贖之嗣請玄津法師講法華圓覺金剛諸經歸信者益衆復搆禪堂齊寮厨庫先所闕略者一時完足為道場之偉觀豫來雙徑雲棲弔二大老先過吳門會耶溪法師見其道貌蒼然喜法門東南有師表焉豫往居南嶽著楞嚴通議成刻之姑蘇法師適應講期見而歎曰此揭義學之重雲也願請卒業以廣法施罷講歸過金明顯公向依法席執弟子役法師遂願於此弘演之及還山旬日遂物化嗚呼死生夢幻豈必於人乎觀齎志而往則有不往者存焉玄津法師耶公之適嗣實繼志而述事者豫寓淨慈玄為旦過主及豫還匡山玄送至金明豫見其寺感其事遂命顯請玄以滿前志豫因題其堂曰大定蓋首楞嚴大定之名也此云堅固不壞然佛始坐菩提場其地堅固金剛所成故名阿練若正修行處以此地經五百年成住壞空已經劫矣而畢竟為道場至其興也以楞嚴為始今已成以楞嚴為終然楞嚴修證以金剛心地為本始至其所證者證此而已以此觀之若心若境等為金剛常住不壞故豫名其堂曰大定信矣其居是堂者以此心而住其說法者以此心而說其聽法者以此心而聽即鐘鼓交參梵唄相和以及市井羣聲男女戲笑皆入大定之門又豈有靜亂之分山林城市之別乎諸子相送至麟溪赴沈爾侯居士齊蓋亦成始成終之緣會也故為之記如此
