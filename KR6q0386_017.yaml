body:
  text: 侍者福善日録門人通炯編輯嶺南弟子劉起相重較書問與汪靜峰司馬憶昔長安大道把臂同遊䇿蹇長驅風餐旅宿此段因緣真兩間奇事朅來倏忽幻化如斯惟正眼觀之端若空花夢事耳惟三昧神力無不深入諸法夢幻實際也山僧自入瘴鄉仗光被諸緣寂靜種種皆為助道具彌感聖恩裂破幻網重重可勝半生行腳諒知已必不以此為妄語耳惟馬祖唱道西江而廬阜諸剎皆從上家傳演化地座下生長於黃梅開化於青原今且復為匡山主此等行腳皆從馬祖解制時來能不重此本願乎聞歸宗近蒙聖恩頒賜大典今日因緣大非昔比地主得座下則人又非昔比也西江道法之興是有望於座下願以金剛心地為護法檀度伫看無盡法輪皆在一微塵內轉也又菩提所緣緣苦衆生惟居士以大悲願力置身苦衆生界即夢想中無非利生事業知菩提種子日夜增長當無量矣華嚴五地菩薩純以利他成己妙行豈堅固我相及孤調解脫者而能及哉是則紫雲千峰未嘗不列几席間也江頭晤別及濵行叮嚀首座之言字字入我甚深三昧山野二十餘年沉淪苦海即寤寐山林如想極樂世界何幸仰仗慈力攝持置身萬仞峰頭一夕之安日劫相倍到此水窮山盡處豈容更著一毫妄想耶此吾本分事是不敢勞多囑也仰承檀施為山林護法五乳數椽去冬已就安居何意餘生得遂高臥萬山積雪一徑雲封不減清涼寒巖徹骨時也感念護法之心真不可以言謝又自聞警以來此心無日不坐馳塞上也當此小劫恨無神力以消衆生定業唯率衆日誦華嚴經以祈邊境靜謐切願老居士早遂歸來之志同究竟此生淨土之願新歲聞法駕業已抵家喜而不寐此荷聖恩恃出望外誠感佛祖神力加持以為法門證信耳豈小緣哉每思老居士坐此二載靜觀一念不啻鐵壁銀山即三十年行腳未必有如是真得力處過此一關則掉臂淨土又超日劫矣是知此番因緣皆助出生死海之迅䭵也何快如之山野仰仗慈庇山居不及三載經營聊爾可栖即將常住交首座為十方獨此一身閉關絶緣隨衆粥飯自中秋至今已及五月三十年所求難得之緣一旦遂之餘生豈忍輕放將一切禪道佛法置之度外單修拙度效遠公六時刻香代漏日持彌陀五萬聲以送餘生所幸衰朽色力尚可強行夜坐不臥精神覺無疲倦即一日皆老居士之惠我也與繆覺休與居士多世法親支離岐路今他鄉驀直喜慰何如西江一帶法緣所賴智椎先白即以貧道聊爾經過深仗旁通助顯此其王重仙陀佛欽內祕而調應偶會之機妙在節拍成令耳私謂在處法緣假令人人啐同時如居士者當使法幢光明照耀大地矣別後因緣具悉南臯居士書中但念居士扁舟東下見諸故舊不能無懷又不知達師錫住何方可能一親承接足否貧道身嬰罪藪難傍孤雲儻杖屨乘秋發興而來固所大願但跋涉艱難恐不勝其勞頓耳若有緣共坐五羊江頭相與披剝萬象亦奇事也又貧道以夙業力隨幻化緣濫膺形服賓不稱實有點真淨頃荷諸佛慈悲不棄而投之紅爐烈焰中頓使積習垢纏銷爍殆盡自慶此段因緣可超生平行腳耳近於會城栖遲壘壁間日惟閉門枯坐搜究佛祖心印了未了公案惟斯末法苦海波濤將求自度安敢望中流轉舵揚帆彼岸乎以是麈尾堆塵口角生醭比幸勻原昕夕往來可謂世外奇逢此公天然道骨凡所云為皆從金剛心中實際流出然雖道不勝習且喜習不障道更自奇特此蓋般若久熏根本脫黏略無沾滯道品中固稱勇猛丈夫上根利器若一撥便轉可日劫相倍此番造物鎔冶成就不淺觀其粃糠榮辱塵垢死生順物虗懷委蛇濁世大非疇昔意與居士再晤之日或不復以兄事之也居士東歸吳中計此時返櫂南州儻有達師起居并諸故人消息幸示以慰爾瞻起居何如聞雲居已復江左祖道中興法輪機軸在此一轉今居士力荷擔之豈非前身為知事適來了此宿願乎右武去就因緣渠自有報可省繫念第貧道幻影浮踪尚託乾城猶然未登初地也與賀知忍中翰度嶺以來杳如隔世道義之知豈能忘於一日自癸卯冬聞達師訃音則山僧此心與之俱死法幢既折有識何歸不止痛心而已切念達師生死之義將期解脫之日親往致一瓣香爾後山僧日益多難足無停影直至癸丑冬出粵擬過南嶽一赴故人之約取道東歸豈期忽忽又復三載人生幾何況今年踰七十目前光景無多頃聞業已入塔益增惶懼恐即填溝壑何面目見達師於寂光乎茲將扁舟東下秋冬可抵雙徑以踐生死之盟生前面許塔銘此願豈可再違但達師半生以前行腳事跡都所未悉須與諸法門高第探討商榷以便執筆達師一座無縫塔樣先從諸公筆尖托出山僧不妨作依樣葫蘆也與于中甫比部一晤千日如食頃耳雖心光洞照不若時復謦咳為佳達師西遊無問令人重增妄想也鄙人去秋以乞法因緣幻遊王城幸接洞觀健齊諸居士極盡法喜之娛惟蓮華座畔獨少一跏趺人為缺典耳想足下入都法門增色然長安塵聚塵塵皆是入正定處足下一一能入之乎所云唯一堅密身一切塵中現是則恐其不堅密耳鄙人時來癡憨日長懶惰益增頺然無事憶足下定中覩之未必不熙然一笑何時暫得毗離相與默談不二耶陸海無涯願智楫嘗橫無疲津濟是所願也又往一交臂之頃鄙人即敢以知足下自許然未敢許足下知鄙人既讀手書具見真心兩相照耀若秦鏡交光肝膽盡露不獨見匠氏作者之妙蓋亦深見足下天然本色全無刀斧痕也較之鋸解不開紐理橫紋雖有犯鼻之斤亦無容施其巧矣惟念世衰道微愈流愈下非特求真實以生死為急務以道法為己任若古之挺然傑出者固不可得至若具正信明白黑直心熱腸橫身以當涂轍者亦不多見況夫卓然頓超濁世若足下與同參大衆一時亹亹者乎鄙人私謂時雖末法猶正法也自爾吾輩有高深堅利恃為外護然雖將頭不猛亦足以使魔外喪魄我此涅槃大城可保坐令安堵況復經營日新有身董其役者乎吾道之幸幸何以喻常竊論吾佛世尊以一大事因緣出現於世所謂一大事者果何事耶古德云除却死生真大事其餘都是可商量是知真見生死了然不變而不避者方稱堪任大事耳然能果了生死不變則餘不足論以此事為大則他皆細故是則忘生於道法與傷生於物欲者必有辨矣然用田程之心以為法則法無不振使蘇李之志以降魔則魔無不服則安攘法土之功莫大於是此足下深抱而同參大衆共有者鄙人似深知之是故荷擔之任不容不屬之足下且令自負之矣吾輩雖堂堂直泥木之佛豈不巍然可觀是足以受燒香散華而作供養但不能度水火耳侍者歸極口足下妙契言外且辱委心相可是則凡在周防法幢者足下定以法眼洞照未然而神運力持矣茲特遣迎龍華師歸窟中且留達師主寂場是二老把住放行又在足下之手耳呵呵一笑千里同聲併入慈照又山野以業風南吹初擬過故都見故人豈意溯流而西竟失良晤幸江頭與達師抵掌信宿而別屈指倏忽幾四年矣世相遷流剎那不住惟道眼諦觀了無去來之想耳始至雷陽以有漏之軀水火似不相入第以性融之則平等寂滅及回五羊得右武為侶朝夕無閒此君光明種子甚深第為習氣所蔽山野時時針劄不透直至臨行痛下毒手頂門一針渠自謂一劄到底始知回頭轉腦因贈之曰覺非居士又為銘以銘之渠亦自發大願此後若不痛自䇿勵則不當以人數目之此語出自痛腸第此事須時與善知識決擇提擕乃能合轍否則惡習一發不覺墮在黑山鬼窟此從來學道人所難者要在金剛心地立定腳跟方不被他掉弄耳比得手書知座下年來所遭憂患如此人所難堪苟非以理折情何以過此一關此中波瀾皆性海汪洋料沐浴洪流優游巨浸而無涯之量自能飲縮百川吞吐日月耳即以來劄示右武讀至叮嚀語不覺舌短蓋真氣逼人自當點首即宇宙內以此實事傾倒者亦不多見也頃楞伽已成特遣侍者賫往請正但此經境界非攀緣可到座下當哀毀之餘理極情忘必於此門深入儻有一語當心願告同志廣其法施惟此不獨區區報君恩即座下亦可酬罔極矣又別來忽忽如許歲月不知落向何處世閒夢幻亦至此耶瘴鄉炎蒸毒霧冒觸難禁所賴一點清涼地作隱身草耳炎荒朔雪火水異勢自古皆然獨去冬寒氣不減薊北新歲南征宿新興旅邸寒凜肌骨凍不能寐夜半扣門驚起則見大義持北來諸古人書首函達師及尊札讀之恍若冰雪墮牀頭舉身毛孔清徹宛在千丈寒嵒破衲蒙頭睡醒時也四月自雷廉回時法音再至手之字字心光流溢迸灑奪人居士坐此憂患病苦中而細細作書如此足見三車長者之心無時不在火宅中也年來生事何如令甥成就何似惟此末法劫火洞然此中能得一片清涼地即火裏蓮花也右武自珠江臨別頂門一錐透至腳底賴此機緣即年來居家杜門謝客修忍辱行皆仗此法門威力也第習氣勇猛不能頓入微密耳劉貽哲根器近道頴悟快便第般若不深天壤閒此等奇氣目所稀覩每相見但說眼前淡話從來未敢舉著此事欲識佛性義當觀時節因緣料不負雅望耳得達師長安消息甚慰鄙懷從前門庭亦折合過半惟此不獨為達師福亦是法門厚幸末法中有此宗匠可追像法第叢林凋弊後生薄福不識可能蒙化否曹溪傾頽之極苦心欲為料理去秋入山略為整頓似亦可觀所謂水月道場空華佛事觸處皆然何必以有所住心作無相福田乎此在護法心精所樂聞者贅發一笑與吳本如祠部奉違光相倏逾一紀別來法門日見凋弊知識星散痛念法幢摧折慧日西沉言之腐心想在同體可勝悲愴耶昔稱寂音為法有程嬰公孫杵臼之心今於阿師再見之矣貧道庸鄙愧無荷法之責而有破法之愆然在金剛心中不知作何懺悔也浮沉瘴海不敢有負本懷所幸諸苦能安足慰慈念向在曹溪作六祖奴郎以供灑掃為淨心地仰賴法庇諸略有序唯念業繫未脫初服未遂不敢安心寂定耳儻如所願得以休老埋骨此中足了生死大事斯實惟天能育惟慈能贊之也不識文殊右手能伸過此百城乎與曾金簡儀部那羅延窟古佛道場毗盧親口授記處沉埋海隅千百年為蔑戾車之所倒置山僧初以避魔至此然不知撞入魔界信乎業屬前緣無逃者此時更無神通法力可使唯只拋擲身心隨順忍受不與魔冤作對耳又何敢誇禪定解脫融通理事無礙哉嘗思法華囑纍末世利生第一當起大忍力大精進力悲夫黃面老深有懼於此時也然山僧自揣非大忍力大精進力又何以拔魔幟樹法幢哉承足下見示縛解之意信乎法性原無彼此嘗謂世出世閒乃生與無生之異耳然日用現前種種業幻諸流轉者皆生死因若不為所轉不忘境界有可忍者謂之生忍不見可忍亦無忍者為無生忍若忍至無生則無不忍矣心境如如亦為寂滅然所稱魔業不獨冤對為然即凡當人起心動念不順解脫戕害法身逼惱正性者皆魔屬也吾人有志做工夫出生死者不能忍此又何以稱有力大人我輩生居堪忍中若此處不破則無可破者固當直以大忍力大精進力為第一義諦耳無論道緣前定不前定功力齊不齊也足下其信然之耶見面為難不覺漏逗至此又昔承蜚光照臨海印真不世良緣頓成金剛種子永劫不磨終當透骨而出此大丈夫之能事非居士大力量人一肩擔荷孰敢正視別後因緣無從委悉起居之狀諒已深入如幻三昧當動靜不二也貧道向為山鬼所弄加之夙業障緣致茲嚴譴是雖有玷法門且幸增上道力所云大火所燒此土安穩非妄語也古人每以苦事為助道增上緣得力處正在於此居士聞之將為塗毒鼓耶今業已荷戈半載適當歲時大凶疫癘交作民物凋殘良可悲愍是故於菩提心轉更增勝第此幻化空身居然火宅中也毗耶法會對談不二端在何日惟同體之悲定惟此枯朽頭陀時時瞥興妄想也與馮啓南孝廉老人與足下遊將二十年矣如在水月光中一切逆順境界光中之影耳諸子同入而受用不同者正似天人一器受食而精粗各別此其佛性貴緣種也老人與足下諸子多生一遇猶時雨也各各種子因而發生秀實存乎人耳今老人去粵則似未至之時幸有足下為之灌溉不至焦枯此段因緣誠非小小二乘但畏衆生難度故絶分菩提足下豈存衆生於目中耶大段此事在人之自肯肯處便是入處古人拌捨身命只是一肯心耳但願足下以肯為人則無不肯者但思今生錯過一失人身萬劫難復此則不容不肯耳老人心知法緣為難此行蓋為山林狹習所使及至狂心頓歇觀南嶽之靈為諸祖所拔今已竭矣生氣為難今寓湖東如生公住虎邱時也善孫從北回不久將同蠢禪入可一悉也知足下善病此是足下慣熟法門願室中不少師子座令諸來者同入幻病三昧則此病為精進幢也與龍元溫老人初入時足下最先入法門為居士長同遊二十年來不在音聲色相閒老人今去粵賴足下居然為法門長也惟足下護法精心如金剛幢但以護念付囑為懷種種方便引攝有緣直使慧命不斷為第一義妙在離言之指自有撩天鼻孔豈為老人一莖眉穿却耶昔世尊不許阿難以緣心聽法宗門不許語言轉正要顯出當人作略耳奚以實法綴人哉老人感足下殷勤為法惓惓苦心豈忍忘情但願此道不墜即千載如一日也又何有於去來南嶽山靈已竭一切道場皆委荒榛殊為酸心恐諸老復起亦未易舉也嗟乎道與時也安可強乎與元溫起南足下念老人與諸子周旋十八年來大似幻師於四衢道作諸幻事雖有種種妍醜欣戚之狀總之皆歸幻化人今日觀之又夢事也老人初心妄意南嶽為大休歇地及至乃知山不宜老種種不易皆為身心之纍且衰朽又無行腳濟勝具只得隨緣放下將就湖東幸一二檀越助營菟裘去冬誅茅結廬於逼除日已就安居當下狂心頓歇生平所志願者一旦得之二十年中跉𨂲辛苦化為無上妙樂之境矣信乎淨穢隨心苦樂在己一切處無非寂光真際也最可喜者已蒙聖恩浩蕩還我本來面目無復他慕其山門應接賴有湛公荷擔老人自此閉門飽食高眠一切禪道佛法束之高閣今日乃為天地閒一無事人即此一日之安尤勝碌碌一生也諸子聞之豈不為我大生歡喜乎修公同居時時提撕此事恨不與諸子共之古人謂道路各別養家一般諸子果能日用於一切處以老人之樂為己樂則老人所有亦諸子之所有老人所無亦諸子之所無也所謂一身一智慧力無畏亦然此語豈黃面老子自道哉莫謂老人今日之事與諸子絶分但於日用妄想交錯煩惱固結處便是老人現前時節若當面錯過即隔粵山楚水也今歲正是諸子願力成熟之時嘗憶文殊窟中一萬眷屬常空數十座且人人腳下一片雲豈肯讓人乘之耶但有疲於津梁者啓南上座當為大衆白椎耳答李湘州太史貧道一入空門即抱向上志十九披緇遂棄筆硯單究己躬下事荏苒十年未有開悟遂匿迹五臺冰雪中刻苦身心甚至一字不識之地忽然四大脫落無依回觀從前山河世界皆夢中事由是得大快樂一切應緣如鏡中像了無滯礙如此八年先是諸經實未通達因思佛楞嚴以一心三觀為宗向以文字障礙貧道澄心諦觀只以理觀為主理觀一通餘文可略嗣隱東海潛心力究忽然有得遂直述此書自為必信即法門疑者不無久慕玄解特請印正當有面決處此時苦以病魔作祟儻秋爽有期當與掩關十日一決生平之素庶此道寥寥天壤不孤耳明發溯流回首徒有瞻依寄高瀛臺太守頃時事驚心公壯心勃勃讀尊草委悉近況然臣子為國攄忠固本分事第非其時似違用舍之戒況當垂老之事居固窮之地正壯士失色之時豈不為身心大纍乎杜智者之於重輕必有一以審處矣山野年近八十衰病日至幸藏迹空山苟延一息待死而已枯朽之懷無以為知己道者儻公能降心寂寞享清修之樂作出世一段因緣大為奇事古云生平無限傷心事不向空門何處消此實意之所望者答談復之頃就湖東尺地結廬於灌水之陰業幸就緒於月之十八日入室高臥夢想頓空足可娛老且喜得如足下信道之士相與精神流通可謂不索寞矣行者來得足下書中語似於知見上做工夫此足下信向之篤故楞嚴云知見立知即無明本此謂衆禍之門也又云知見無見斯即涅槃是謂衆妙之門也此中云知見大非凡情妄想思算境界皆從實際工夫真參實悟處做出殊非口頭戲論當作佛法也足下信心固篤入法未深便作如是種種知見語皆成戲論其在善知識分上不是以佛法作人情便以冬瓜印子許可也老人所云衆生知見即佛知見者蓋推本未迷以前言之耳不是迷中妄想知見當作佛之知見也若以妄想為佛知見則大地衆生皆已是佛又何用修行耶若以尋常妄想情慮當作受用境界則一切世閒淫殺未除貪嗔放逸者皆是佛矣若作此解即是魔說豈可以邪見作正悟耶來語種種皆非真實受用處足下但將從前知見一切剗去纖毫不留於一念不存處稍見影響方可以言個中事若以聰明伶俐知見把作正解恰似認驢糞作明珠若在善知識門下存此知見則善知識亦成邪魔種類矣老人於足下大生法愛故不惜眉毛以酬來意足下試自點檢果於知見上有何實際當不落此戲論場中以為入道真種耳深切思之又向上一路親近者稀不是真正奇男子決不能單刀直入此事決不是世閒聰明伶俐可能凑泊亦不是俗習知見之乎者也當作妙悟亦不是記誦古人玄言妙語當作己解只須真參實究向自己胸中流出方始蓋天蓋地若有志參究只須將從前知見盡情吐却即上大人孔乙己字腳亦不許存在胸中吐到乾乾淨淨一物不留處放下又放下放到無可放處方是入手時節此時正好著力做工夫做到做不得處如壁立萬仞才是得力時節如此用心辟如逼狗跳牆定有從中迸出一段光景方是真受用處殆非泛泛可到此地苟非真正丈夫有決定之志者不能至也世閒多少聰明伶俐漢都納降款於五欲場中高者納於功名路上如此而已幾曾有自己活計哉以足下之根器加之篤實信心已具根本最為難得若效當世口鼓子禪但資說鈴不究實際豈不孤負己靈哉以足下信老人心決定無疑故不敢負足下歸心之望前書僭妄以恃知己故不惜眉毛不是披剝足下願足下詣真實際不欲向門頭戶底墮恆品耳足下自謂向棒喝下承當足見大力量處要知古人棒喝不輕施即承當亦未可草草願足下從今一切知見盡行放下就放下處提撕便見真實受用以所望足下不淺故不惜忉怛政以足下有此大力量故以千斤擔子纍足下耳讀書之下試請大慧書問一看便見老人不妄與也與穆象玄侍御山野向有休老南嶽之志去冬杖䇿而來山居之緣未就頃者暫寓衡陽之湖東亦古道場地也勤公來得悉明公比來大作佛事頓開人天眼目聞之喜不自勝嘗謂古今豪傑之士一段般若光明多被世緣蓋覆盡力納向功名富貴門頭肯於自己性命根宗向上一路著腳者甚自難得以此大事因緣乃大丈夫究竟歸寧之地明公頓能向此回視功名事業特塵垢粃糠欣羡何如第恨不能相與決擇向上事以此為闕耳聞明公精持金剛般若頃有決疑一本奉為法施答劉玉受繕部蕪關幸入維摩之室自爾音問時通第未酬公歸命之念此為抱愧別入匡山棲遲六年壬戌長至月復有嶺南之行辱惠辛酉閏月書至癸亥二月方得開誦一書之達如此況人生多世之緣乎所示病紀細細披讀雖是病態要自參究習氣中發非業習也就中見公歡喜不無但以為實證則未可也且楞嚴明訓若從真實參究禪定中來亦不敢作證若作聖解即受羣邪況病態乎雖然過此一番公當自信其心掃除從前知見不患不到家平貼地耳答杭城諸宰官山野自愧薄劣為法門罪人漂流瘴海二十餘年骨殞神銷僅存一息將匿影窮山畢命斯世第以法門之故與達師有死生之義悲蓮師有慧日之沉特不遠數千里持瓣香以弔茲已了雙徑之願擬過殘冬有雲棲之行必取道錢塘一入毗耶之室何意辱諸大長者先施慈命晤玄津法師委悉法會之盛何幸餘生再見今日感不能言撫慚無地謹此致謝容當敬受彈呵以銷狹劣與蘄州荊王恭惟賢王殿下睿德天成靈根夙植內蘊真慈外現國主身處塵勞心存淨土山野枯朽山林仰德欽風為日久矣自分無緣一餐徽問去秋遊目匡廬濵行適歸宗老納持令旨至伏承香積之惠匆匆行腳未遑啓謝今夏復還匡山擬休老計幸故人汪司馬公以法眼相看願結十賢同入蓮社欲賢王為上首曾託左右致意想未達睿聽然惟匡山即靈鷲蘄黃猶舍衛豈捨賢王於法門乎將期始終金湯耳頃拜使者之辱兼領法施深感慈念致謝無量且聞冢嗣之變知賢王以天倫至情難免憂苦但人生修短各有定分本屬前緣往者既不可留來者尚圖厚望豈可以不作之魂而傷生者之性此在達人以理自遣萬無以癡念重勞玉體也唯望三寶慈悲足以利存亡耳願賢王厚自保愛答荊世子先王上御國事多艱殿下冲齡方在勤學其內外事體皆在國太一身擔荷憂勞之念又當何如山野以此不忘於心也然須自知保重節憂省惱以靜持心以慈御下以綏天寵萬無過傷以慰羣望其於念佛誦經禮拜乃切己大事又不可以艱難退心捨此一念無可以感佛天加護者惟有至誠可以格天耳答無錫翁兆吉廣文公道念精純人倫師表願開示來學務真參實究不墮光影門頭為第一義大抵聖學一宗果能參究禪門工夫方有實際且近習多好談宗門爽悟語句大為流弊誤人不少以在口頭非真知見也至若楞伽楞嚴金剛三經乃發明最上第一義顧以文字視非正眼也願公留心時時披究當得真正路頭以末世無明眼人賴此為印證耳與聞子與念足下為生死心真實如救頭然五欲泥中不若是堅強勇猛誠難頓拔其根若於熱惱中發一念清涼便是火裏生蓮但惜足下稟氣柔弱心力骨剛第色力不充耳居常善病足下識此病源乎他人之病從世閒貪癡起足下之病從為道貪癡起病雖不同為病則一足下憤憤要出生死將謂脫塵網為出生死不知離妄想網為真出生死況父母之恩未能頓報若以遠離為報則重增父母之憂是返苦於親也何報之有以不得脫離日夜癡癡妄想以為不遂其志則道未辦而苦芽先增長矣豈非大癡耶足下當自思維妄想乃生死根即於病中比妄想了無根蒂則念念頓拔生死即此坐進此道法身日健心地日明不待脫而自脫矣老朽感足下信心時不能忘聞足下病尚未安故以此奉慰與金省吾中丞在昔豪傑之士負經世之材者但知建功立業於不朽豈知真不朽之業哉以不達本有捨己從人故功未必成即成而未必不朽即有虗名垂之後世名存無益而黑業隨之因果昭人之耳目者古之將相類墮於此孰能如裴張白楊諸大老在世出世者乎是知有先具性真而推緒餘於功名者亦有功成身退而歸根於性命者雖蚤晚不同而超然獨得世難與比者則一也惟翁當功成身退之日即能放下諸緣潛心一真之地其所謂至樂於己者九鼎不易也豈非大豪傑哉惟翁即在放下處著力放到無可放處自然不被生死業繫矣即修淨土一門最要放下染緣而淨業方成然於放下處求生淨土是以彼易此博換之法耳雲棲道場清規肅靜如金剛圈但願大衆一心依教奉行即蓮師法身儼然踞獅子座也唯衆護法大檀時時加被以增精進耳復何所云與嚴天池中翰還山後業已具報奉慰慈念山居卜地最為幽勝拮据誅茅數椽十月望後已就安居將三月矣歲窮則無所不窮唯有千峰積雪萬壑松濤盈耳眩目時皤然一老鬚髮鬔鬆頽然兀坐擁衲圍爐燒榾柮火邈焉不知有人世而人世亦不知乾坤之內有此物也積劫塵勞可一洗殆盡況二十年炎蒸毒霧乎想老居士聞此必無一撫掌與王季和居士言近來日多懈怠無精進力此自知之明經云知是空華即無輪轉以知為懈怠則定不為懈怠轉矣古德云心不與世情和合是真精進近聞同元初讀書洞庭山中塵境遠離六根無據置身於三萬六千頃寒波浩渺之中如坐大圓鏡裏且與勝友對談不二此中何處更容懈怠乎第恐妄想不休如白日作夢自生顛倒耳與顧履初明府居士天然道骨稟出塵之度養素山林固稱高尚但於性命根宗超出生死一著似未留心居士根器已具所缺知識與之切磋蓋亦時節因緣未至耳山野卜居匡廬之南七賢峰下與五老相對揖讓雲中吞吐彭蠡波光雲影不減太湖雖花果難爭鄧尉而幽勝過之山野幸託棲遲逸老且願效遠公東林遺事將期遨域內高賢同修蓮社之盟居士肯留心此中幸約同契勝友各標志願俟結搆道場落成他日歸來如久客還家共老煙霞同歸極樂豈不為最上因緣乎居士若果惠然以為先導無俟山野饒舌也與虞素心吏部往晤公於東禪覩其道貌天形敦篤厚重心知其為有力大人所為公惜者有道器而未聞道恐臨大事人不勝天耳苟不奮發真實信心於佛法中精心著力深窮超生死之學為真實處世俗口耳皆非究竟地也出世真修唯楞嚴一經應世之妙無逾道德一書願公早發信心於此用力久之當有自得處也與熊芝岡侍御前過武昌得瞻光霽辱不鄙而厚遇之飽餐香飯深領至言歷談處遼一段精神所謂威行蠻貊氣欲吞胡載戢干戈嬰兒強虜事事全出大光明藏金剛心中聽之不覺毛孔熙怡私謂菩薩現宰官身定國安盡屬神通遊戲嘗聞其語今見其人即以此心成佛真能一超直入誠雄猛丈夫哉別後光儀時現心鏡頃聞潛心佛事此又超出世閒一步古語有之生平無限傷心事不向空門何處消惟此空門實豪傑退步若肯放身此中以大智火銷鎔意氣畜此無生利器稱師倚為劒天長劒把定乾坤眼睛他日神通回視向者直一唾耳實所望焉高明其有意乎與蔡五嶽使君往幸有緣一接光容即辱法門心契承為六祖護法雖闡提作障而金剛種子已不磨矣既而曹溪因緣亦以獅蟲噆食竟違本願又作未來公案山野亦脫然謝去未幾即蒙恩度嶺初擬南嶽休老未遂復有雙徑之行了達師未了因緣所經叢林處處皆公心光照耀而禪宗向上一著莫不推為上首末法宰官能真參力究如公者指不再屈想年來履踐真切當過關掉臂逢緣自在一切幻化皆張般若智燈矣答王於凡曇公來辱惠手書以生死一事拳拳於心發此大心甚為希有但以念佛有漸次欲求頓悟之說此乃近世士大夫學佛者喜為爽口之食非應病之藥也以未實有為生死心但徒說玄妙道理口說為生死且亦不知何者為生死根所言生死根者即是吾人日用種種妄想人我憎愛貪瞋癡等諸煩惱業此業若有一絲不斷即是生死根本如今說要參禪頓悟了生死請自討量果能一念頓斷歷劫煩惱如斬亂絲否若不能斷煩惱縱能頓悟亦成魔業豈可輕視哉從上諸祖頓悟亦從多生積功漸修中來故頓悟一著說則似易其實為難苟無二三十年死心工夫如何得向熱惱中一念頓悟亦要在自知根器何如耳至若念佛一門世人不知其妙視為淺近其實步步踏著實地何也以吾人有生以來念念妄想攀緣造生死業何曾一念回光返照自心何曾一念肯斷煩惱今果能以妄想之心轉為念佛則念念斷煩惱若念念能斷煩惱則是念念出生死若此一念不亂到臨命終時惡業消滅佛境現前一念隨佛往生淨土永超生死登不退地所謂但得見彌陀何愁不開悟又何必論頓論漸又管甚三品九品哉譬如世登黃榜即末後一名亦可又何必要鼎甲哉苟如所云參禪徹首徹尾則五濁十方無非淨土此語甚痛快第恐不能如此豈不自誤此生又墮長劫生死果能以念佛之一念不移一心不亂比參禪更有下落總之惟在一念真切耳但參禪定要死盡世心不容一念妄想其念佛是以淨想轉染想以想除想乃博換之法就吾人根器易為耳其實心心念佛心心不昧此心妙樂有不可言者足下請試為之幸無以老朽為劣解知識也此不欺之言惟心諒之淨土三品之說嘗備淨土會語論中足下無惑於邪說請細披之無俟多贅謝吳曙谷相國頃承翰教知明公時中以楞伽印心昔張方平偶得其本恍是前生手書此亦明公懷中故物耳但此經文險義幽山野不揣妄為注記不能發揮萬一承問此經何以不立九識蓋佛應機說法教有權實以初出世時化機未熟不堪受大姑為小乘劣根說六識三毒為生死本即八識祕未敢說直至三十年後根機漸熟方說唯識以八識為迷悟生死之本猶恐不信佛性故於八外又別立第九名無垢識以引進之此亦未盡大乘了義過此以後觀機已熟乃說楞伽直指識藏即如來藏為頓教大乘此經不立修證漸次名位但了一念無生頓同佛體故經雖有種種言說都是破外道小乘執言之病只教離言說妄想頓契本心故達摩西來以此經為心印全不同餘經之說也明公但觀經中識藏即如來藏一語便是究竟極則不必更求九識為實法也大段此經只是要離言說妄想為入門工夫開卷即一切俱非便是佛祖正令妄意如此惟明公留意焉答阮淡宇太守客歲聞挂冠東歸喜慰無量惟菩薩度生固是本行當劫濁時衆生垢重即釋迦不免蹙額奈何能盡願力乎靜山白雲晚年清福較之尤多若精修淨業以長揖堪忍又為丈夫最上緣也
