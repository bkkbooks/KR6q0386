body:
  text: 侍者福善日録門人通炯編輯嶺南弟子劉起相重較觀老莊影響論敘意西域諸祖造論以破外道之執須善自他宗此方從古經論諸師未有不善自他宗者吾宗末學安於孤陋昧於同體視為異物不能融通教觀難於利俗其有初信之士不能深窮教典苦於名相支離難於理會至於酷嗜老莊為文章淵藪及其言論指歸莫不望洋而歎也逮觀諸家注釋各徇所見難以折衷及見口義副墨深引佛經每一言有當且謂一大藏經皆從此出而惑者以為必當深有慨焉余居海上枯坐之餘因閲楞嚴法華次有請益老莊之旨者遂蔓衍及此以自決非敢求知於真人以為必當之論也且慨從古原教破敵者發藥居多而啓膏肓之疾者少非不妙投第未疹其病源耳是故余以唯心識觀而印決之如摩尼圓照五色相鮮空谷傳聲衆響斯應苟唯心識而觀諸法則彼自不出影響間也故以名論論教源嘗觀世之百工技藝之精而造乎妙者不可以言傳效之者亦不可以言得況大道之妙可以口耳授受語言文字而致哉蓋在心悟之妙耳是則不獨參禪貴在妙悟即世智辨聰治世語言資生之業無有一法不悟而得其妙者妙則非言可及也故吾佛聖人説法華則純談實相乃至妙法則未措一詞但云如是而已至若悟妙法者但云善説法者治世語言資生業等皆順正法而華嚴五地聖人善能通達世間之學至於陰陽術數圖書印璽醫方辭賦靡不該練然後可以涉俗利生故等覺大士現十界形應以何身何法得度即現何身何法而度脫之由是觀之佛法豈絶無世諦而世諦豈盡非佛法哉由人不悟大道之妙而自畫於內外之差耳道豈然乎竊觀古今衛道藩籬者在此則曰彼外道耳在彼則曰此異端也大而觀之其猶貴賤偶人經界太虗是非日月之光也是皆不悟自心之妙而增益其戲論耳蓋古之聖人無他特悟心之妙者一切言教皆從妙悟心中流出應機而示淺深者也故曰無不從此法界流無不還歸此法界是故吾人不悟自心不知聖人之心不知聖人之心而擬聖人之言者譬夫場人之欣戚雖樂不樂雖哀不哀哀樂原不出於己有也哀樂不出於己而以己為有者吾於釋聖人之言者見之論心法余幼師孔不知孔師老不知老既壯師佛不知佛退而入於深山大澤習靜以觀心焉由是而知三界唯心萬法唯識既唯心識觀則一切形心之影也一切聲心之響也是則一切聖人乃影之端者一切言教乃響之順者由萬法唯心所現故治世語言資生業等皆順正法以心外無法故法法皆真迷者執之而不妙若悟自心則法無不妙心法俱妙唯聖者能之論去取吾佛經盡出自西域皆從翻譯然經之來始於漢至西晉方大盛晉之譯師獨稱羅什為最而什之徒生肇融睿四公僧之麟鳳也而什得執役然什於肇亦曰余解不謝子文當相揖耳蓋肇尤善老莊焉然佛經皆出金口所宣而至此方則語多不類一經而數譯者有之以致淺識之疑殊不知理實不差文在譯人之巧拙耳故藏經凡出什之手者文皆雅致以有四哲左右焉故法華理深辭密曲盡其妙不在言而維摩文勢宛莊語其理自昭著至於肇四論則渾然無隙非具正法眼者斷斷難明故惑者非之以空宗莊老孟浪之談宜矣清涼觀國師華嚴菩薩也至疏華嚴每引肇論必曰肇公尊之也嘗竊論之藉使肇見不正則什何容在座什眼不明則譯何以稱尊若肇論不經則觀又何容口古今質疑頗多而槩不及此何哉至觀華嚴疏每引老莊語甚夥則曰取其文不取其意圭峰則謂二氏不能原人宗鏡闢之尤著然上諸師皆應身大士建大法幢者何去取相左如此嘗試論之抑各有所主也蓋西域之語質直無文且多重復而譯師之學不善兩方者則文多鄙野大為理纍蓋中國聖人之言除五經束於世教此外載道之言者唯老一書而已然老言古簡深隱難明發揮老氏之道者唯莊一人而已焦氏有言老之有莊猶孔之有孟斯言信之然孔稱老氏猶龍假孟而見莊豈不北面耶間嘗私謂中國去聖人即上下千古負超世之見者去老唯莊一人而已載道之言廣大自在除佛經即諸子百氏究天人之學者唯莊一書而已藉令中國無此人萬世之下不知有真人中國無此書萬世之下不知有妙論蓋吾佛法廣大微妙譯者險辭以濟之理必沈隱如楞伽是已是故什之所譯稱最者以有四哲為之輔佐故耳觀師有言取其文不取其意斯言有由矣設或此方有過老莊之言者肇必捨此而不顧矣由是觀之肇之經論用其文者蓋肇宗法華所謂善説法者世諦語言資生業等皆順正法乃深造實相者之所為也圭峰少而宗鏡遠之者孔子作春秋假天王之令而行賞罰二師其操法王之權而行褒貶歟清涼則渾融法界無可無不可者故取而不取是各有所主也故余以法華見觀音三十二應則曰應以婆羅門身得度即現其身而為説法至於妙莊嚴二子則曰汝父信受外道深著婆羅門法且二子亦悔生此邪見之家蓋此方老莊即西域婆羅門類也然此剛為現身説法旋即斥為外道邪見何也蓋在著與不著耳由觀音圓通無礙則不妨現身説法由妙莊深生執著故為外道邪見是以聖人教人但破其執不破其法是凡執著音聲色相者非正見也論學問余每見學者披閲經疏忽撞引及子史之言者如攔路虎必驚怖不前及教之親習則曰彼外家言耳掉頭弗顧抑嘗見士君子為莊子語者必引佛語為鑒或一言有當且曰佛一大藏盡出於此嗟乎是豈通達之謂耶質斯二者學佛而不通百氏不但不知是法而亦不知佛法解莊而謂盡佛經不但不知佛意而亦不知莊意此其所以難明也故曰自大視細者不盡自細視大者不明余嘗以三事自勗曰不知春秋不能涉世不知老莊不能忘世不參禪不能出世知此可與言學矣論教乘或問三教聖人本來一理是果然乎曰若以三界唯心萬法唯識而觀不獨三教本來一理無有一事一法不從此心之所建立若以平等法界而觀不獨三聖本來一體無有一人一物不是毗盧遮那海印三昧威神所現故曰不壞相而緣起染淨恆殊不捨緣而即真聖凡平等但所施設有圓融行布人法權實之異耳圓融者一切諸法但是一心染淨融通無障無礙行布者十界五乘五教理事因果淺深不同所言十界謂四聖六凡也所言五教謂小始終頓圓也所言五乘謂人天聲聞緣覺菩薩也佛則最上一乘矣然此五乘各有修進因果階差條然不紊所言人者即蓋載兩間四海之內君長所統者是已原其所修以五戒為本所言天者即欲界諸天帝釋所統原其所修以上品十善為本色界諸天梵王所統無色界諸天空定所持原其所修上品十善以有漏禪九次第定為本此二乃界內之因果也所言聲聞所修以四諦為本緣覺所修以十二因緣為本菩薩所修以六度為本此三乃界外之因果也佛則圓悟一心妙契三德攝而為一故曰圓融散而為五故曰行布然此理趣諸經備載由是觀之則五乘之法皆是佛法五乘之行皆是佛行良由衆生根器大小不同故聖人設教淺深不一無非應機施設所謂教不躐等之意也由是證知孔子人乘之聖也故奉天以治人老子天乘之聖也故清淨無欲離人而入天聲聞緣覺超人天之聖也故高超三界遠越四生棄人天而不入菩薩超二乘之聖也出人天而入人天故往來三界救度四生出真而入俗佛則超聖凡之聖也故能聖能凡在天而天在人而人乃至異類分形無往而不入且夫能聖能凡者豈聖凡所能哉據實而觀則一切無非佛法三教無非聖人若人若法統屬一心若事若理無障無礙是名為佛故圓融不礙行布十界森然行布不礙圓融一際平等又何彼此之分是非之辨哉故曰或邊地語説四諦或隨俗語説四諦蓋人天隨俗而説四諦者也原彼二聖豈非吾佛密遣二人而為佛法前導者耶斯則人法皆權耳良由建化門頭不壞因果之相三教之學皆防學者之心緣淺以及深由近以至遠是以孔子欲人不為虎狼禽獸之行也故以仁義禮智援之姑使捨惡以從善由物而入人修先王之教明賞罰之權作春秋以明治亂之迹正人心定上下以立君臣父子之分以定人倫之節其法嚴其教切近人情而易行但當人欲橫流之際故在彼汲汲猶難之吾意中國非孔氏而人不為夷狄禽獸者幾希矣雖然孔氏之迹固然耳其心豈盡然耶況彼明言之曰毋意毋必毋固毋我觀其濟世之心豈非據菩薩乘而説治世之法者耶經稱儒童良有以也而學者不見聖人之心將謂其道如此而已矣故執先王之迹以挂功名堅固我執肆貪欲而為生纍至操仁義而為盜賊之資啓攻鬥之禍者有之矣故老氏愍之曰斯尊聖用智之過也若絶聖棄智則民利百倍剖斗折衡則民不爭矣甚矣貪欲之害也故曰不見可欲使心不亂故其為教也離欲清淨以靜定持心不事於物淡泊無為此天之行也使人學此離人而入於天由其言深沈學者難明故得莊子起而大發揚之因人之固執也深故其言之也切至於誹堯舜薄湯武非大言也絶聖棄智之謂也治推上古道越羲皇非漫談也甚言有為之害也詆訾孔子非詆孔子詆學孔子之迹者也且非實言乃破執之言也故曰寓言十九重言十七訶教勸離隳形泯智意使離人入天去貪欲之纍故耳至若精研世故曲盡人情破我執之牢關去生人之大界寓言曼衍比事類辭精切著明微妙玄通深不可識此其説人天法而具無礙之辨者也非夫現婆羅門身而説法者耶何其遊戲廣大之若此也粃粳塵世幻化死生解脫物纍逍遙自在其超世之量何如哉嘗謂五伯僭竊之餘處士橫議充塞仁義之途若非孟氏起而大闢之吾意天下後世左袵矣當羣雄吞噬之劇舉世顛瞑亡生於物欲火馳而不返者衆矣若非此老䠇起攘臂其間後世縱有高潔之士將亦不知軒冕為桎梏矣均之濟世之功又何如耶然其工夫由靜定而入其文字從三昧而出後人以一曲之見而窺其人以濁亂之心而讀其書茫然不知所歸趣苟不見其心而觀其言宜乎驚怖而不入也且彼亦曰萬世之後而一遇大聖知其解者是旦暮遇之也然彼所求之大聖非佛而又其誰耶若意彼為吾佛破執之前矛斯言信之矣世人於彼尚不入安能入於佛法乎論工夫吾教五乘進修工夫雖各事行不同然其修心皆以止觀為本故吾教止觀有大乘有小乘有人天乘四禪八定九通明禪孔氏亦曰知止而後有定又曰自誠明此人乘止觀也老子曰常無欲以觀其妙常有欲以觀其徼又曰萬物並作吾以觀其復莊子亦曰莫若以明又曰聖人不由而照之於天又曰人莫鑑於流水而鑑於止水惟止能止衆止也又曰大定持之至若百骸九竅賅而存焉吾誰與為親又曰咸其自取怒者其誰耶至若黃帝之退居顏子之心齋丈人承蜩之喻仲尼夢覺之論此其靜定工夫舉皆釋形去智離欲清淨所謂厭下苦粗障欣上淨妙離冀去人而入天按教所明乃捨欲界生而生初禪者故曰宇泰定者發乎天光此天乘止觀也首楞嚴曰一切世間所修心人愛染不生無留欲界是人應念身為梵侶又曰欲習既除離欲心現是人應時能行梵德名為梵輔又曰清淨禁戒加以明悟是人應時能統梵衆為大梵王又曰此三勝流一切煩惱所不能逼雖非正修真三摩地清淨心中諸漏不動名為初禪至於澄心不動湛寂生光倍倍增勝以歷二三四禪精見現前陶鑄無礙以至究竟羣幾窮色性性入無邊際名色究竟天此其證也由是觀之老氏之學若謂大患莫若於有身故滅身以歸無勞形莫先於有智故釋智以淪虗此則有似二乘且出無佛世觀化知無有似獨覺原其所宗虗無自然即屬外道觀其慈悲救世之心人天交歸有無雙照又似菩薩蓋以權論正所謂現婆羅門身而説法者據實判之乃人天乘精修梵行而入空定者是也所以能濟世者以大梵天王為娑婆主統領世界説十善法救度衆生據華嚴地上菩薩為大梵王至其梵衆皆實行天人由人乘而修天行者此其類也無疑矣吾故曰莊語純究天人之際非孟浪之談也論行本原夫即一心而現十界之像是則四聖六凡皆一心之影響也豈獨人天為然哉究論修進階差實自人乘而立是知人為凡聖之本也故裴休有言曰鬼神沈幽愁之苦鳥獸懷獝狖之悲修羅方瞋諸天耽樂可以整心慮趣菩提唯人道為能耳由是觀之捨人道無以立佛法非佛法無以盡一心是則佛法以人道為鎡基人道以佛法為究竟故曰菩提所緣緣苦衆生若無衆生則無菩提此之謂也所言人道者乃君臣父子夫婦之間民生日用之常也假而君君臣臣父父子子不識不知無貪無競如幻化人是為諸上善人俱會一處即此世界為極樂之國矣又何庸夫聖人哉奈何人者因愛欲而生愛欲而死其生死愛欲者財色名食睡耳由此五者起貪愛之心搆攻鬬之禍以致君不君臣不臣父不父子不子雖先王之賞罰不足以禁其心適一己無厭之欲以結未來無量之苦是以吾佛愍之曰諸苦所因貪欲為本若滅貪欲無所依止故現身三界與民同患乃説離欲出苦之要道耳且不居天上而乃生於人間者正示十界因果之相皆從人道建立也然既處人道不可不知人道也故吾佛聖人不從空生而以淨梵為父摩耶為母者示有君親也以耶輸為妻示有夫婦也以羅睺為子示有父子也且必捨父母而出家非無君親也割君親之愛也棄國榮而不顧示名利為纍也擲妻子而遠之示貪欲之害也入深山而苦修示離欲之行也先習外道四遍處定示離人而入天也捨此而證正遍正覺之道者示人天之行不足貴也成佛之後入王宮而升父棺上忉利而為母説法示佛道不捨孝道也依人間而説法示人道易趣菩提也假王臣為外護示處世不越世法也此吾大師示現度生之楷模垂誠後世之弘範也嗟乎吾人為佛弟子不知吾佛之心處人間世不知人倫之事與之論佛法則儱侗真如瞞頇佛性與之論世法則觸事面墻幾如檮昧與之論教乘則曰枝葉耳不足尚也與之言六度則曰菩薩之行非吾所敢為也與之言四諦則曰彼小乘耳不足為也與之言四禪八定則曰彼外道所習耳何足齒也與之言人道則茫不知君臣父子之分仁義禮智之行也嗟乎吾人不知何物也然而好高慕遠動以口耳為借資竟不知吾佛救人出世以離欲之行為第一也故曰離欲寂靜最為第一以余生人道不越人乘故幼師孔子以知人欲為諸苦本志離欲行故少師老莊以觀三界唯心萬法唯識知十界唯心之影響也故歸命佛論宗趣老氏所宗虗無大道即楞嚴所謂晦昧為空八識精明之體也然吾人迷此妙明一心而為第八阿賴耶識依此而有七識為生死之根六識為造業之本變起根身器界生死之相是則十界聖凡統皆不離此識但有執破染淨之異耳以欲界凡夫不知六塵五欲境界唯識所變乃依六識分別起貪愛心固執不捨造種種業受種種苦所謂人欲橫流故孔子設仁義禮智教化為隄防使思無邪姑捨惡而從善至若定名分正上下然其道未離分別即所言靜定工夫以唯識證之斯乃斷前六識分別邪妄之思以祛鬬諍之害而要歸所謂妙道者乃以七識為指歸之地所謂生機道原故曰生生之謂易是也至若老氏以虗無為妙道則曰谷神不死又曰死而不亡者壽又曰生生者不生且其教以絶聖棄智忘形去欲為行以無為為宗極斯比孔則又進觀生機深脈破前六識分別之執伏前七識生滅之機而認八識精明之體即楞嚴所謂罔象虗無微細精想者以為妙道之源耳故曰惚兮恍其中有象恍兮惚其中有物其以此識乃全體無明觀之不透故曰杳杳冥冥其中有精以此識體不思議熏不思議變故曰玄之又玄而稱之曰妙道以天地萬物皆從此中變現故曰天地之根衆妙之門不知其所以然而然故莊稱自然且老乃中國之人也未見佛法而深觀至此可謂捷疾利根矣借使一見吾佛而印決之豈不頓證真無生耶吾意西涉流沙豈無謂哉大段此識深隱難測當佛未出世時西域九十六種以六師為宗其所立論百什至於得神通者甚多其書又不止此方之老莊也洎乎吾佛出世靈山一會英傑之士皆彼六師之徒且其見佛不一言而悟如良馬見鞭影而行豈非昔之工夫有在但邪執之心未忘故今見佛只在點化之間以破其執耳故佛説法原無贅語但就衆生所執之情隨宜而擊破之所謂以楔出楔者本無實法與人也至於楞嚴會上微細披剝次第徵辨以破因緣自然之執以斷凡夫外道二乘之疑而看教者不審乎此但云彼西域之人耳此東土之人也人有彼此而佛性豈有二耶且吾佛為三界之師四生之父豈其説法止為彼方之人而此十萬里外則絶無分耶然而一切衆生皆依八識而有生死堅固我執之情者豈只彼方衆生有執而此方衆生無之耶是則此第八識彼外道者或執之為冥諦或執之為自然或執之為因緣或執之為神我即以定修心生於梵天而執之為五現涅槃或窮空不歸而入無色界天伏前七識生機不動進觀識性至空無邊處無所有處以極非非想處此乃界內修心而未離識性者故曰學道之人不識真只為從前認識神無量劫來生死本癡人認作本來人者是也至於界外聲聞已滅三界見思之惑已斷三界生死之苦已證無為寂滅之樂八識名字尚不知而亦認為涅槃將謂究竟寧歸之地且又親從佛教得度猶費吾佛四十年彈訶淘汰之功至於法華會上猶懷疑佛之意謂以小乘而見濟度雖地上菩薩登七地已方捨此識而猶異熟未空由是觀之八識為生死根本豈淺淺哉故曰一切世間諸修行人不能得成無上菩提乃至別成聲聞緣覺及成外道諸天魔王及魔眷屬皆由不知二種根本一者無始生死根本則汝今者與諸衆生用攀緣心為自性者二者無始涅槃元清淨體則汝今者識精元明能生諸緣緣所遺者正此之謂也噫老氏生人間世出無佛世而能窮造化之原深觀至此即其精進工夫誠不易易但未打破生死窠堀耳古德嘗言孔助於戒以其嚴於治身老助於定以其精於忘我二聖之學與佛相須而為用豈徒然哉據實而論執孔者涉因緣執老者墮自然要皆未離識性不能究竟一心故也佛則離心意識故曰本非因緣非自然性方徹一心之原耳此其世出世法之分也佛所破正不止此即出世三乘亦皆在其中世人但見莊子誹堯舜薄湯武詆訾孔子之徒以為驚異若聞世尊訶斥二乘以為焦芽敗種悲重菩薩以為佛法闡提又將何如耶然而佛訶二乘非訶二乘訶執二乘之迹者欲其捨小趣大也所謂莊詆孔子非詆孔子詆學孔子之迹者欲其絶聖棄智也要皆遣情破執之謂也若果情忘執謝其將把臂而遊妙道之鄉矣方且歡欣至樂之不暇又何庸夫憒憒哉華嚴地上菩薩於塗灰事火臥棘投針之儔靡不現身其中與之作師長也苟非佛法又何令彼入佛法哉故彼六師之執幟非佛不足以拔之吾意老莊之大言非佛法不足以證嚮之信乎遊戲之談雖老師宿學不能自解免耳今以唯心識觀皆不出乎影響矣此論創意蓋豫居海上時萬曆戊子冬乞食王城嘗與洞觀居士夜談所及居士大為撫掌庚寅夏日始命筆焉藏之既久向未拈出甲午冬隨緣王城擬請益於弱侯焦太史不果明年乙未春以弘法罹難其草業已遺之海上矣仍遣侍者往殘簡中搜得之秋蒙恩遣雷陽達觀禪師由匡廬杖䇿候豫於江上冬十一月豫方渡江晤師於旅泊菴夜坐出此師一讀三歎曰是足以祛長迷也即命弟子如奇刻之以廣法施豫固止之戊戌夏豫寓五羊時與諸弟子結制壘壁間為衆演楞嚴宗旨門人寶貴見而歎喜願竭力成之以卒業焉噫欲識佛性義當觀時節因緣此區區片語誠不足為法門重輕創意於十年之前而克成於十年之後作之於東海之東而行之於南海之南豈機緣偶會而然耶道與時也庸可強乎然此蓋因觀老莊而作也故以名論萬曆戊戌除日憨山道人清書於楞伽室病後俗冗近始讀大製曹溪通志及觀老莊影響論等書深為歎服所謂不知春秋不能涉世不知老莊不能忘世不參禪不能出世及孔子人乘之聖老子天乘之聖佛能聖能凡能人能天之聖如此之類百世不易之論也起原再稽顙道德經解發題發明宗旨老氏所宗以虗無自然為妙道此即楞嚴所謂分別都無非色非空拘舍離等昧為冥諦者是已此正所云八識空昧之體也以其此識最極幽深微妙難測非佛不足以盡之轉此則為大圓鏡智矣菩薩知此以止觀而破之尚有分證至若聲聞不知則取之為涅槃西域外道梵志不知則執之為冥諦此則以為虗無自然妙道也故經曰諸修行人不能得成無上菩提乃至別成聲聞緣覺諸天外道魔王及魔眷屬皆由不知二種根本錯亂修習猶如煮沙欲成佳饌縱經塵劫終不能得云何二種一者無始生死根本則汝今者與諸衆生用攀緣心為自性者二者無始涅槃元清淨體則汝今者識精元明能生諸緣緣所遺者此言識精元明即老子之妙道也故曰杳杳冥冥其中有精其精甚真由其此體至虗至大故非色以能生諸緣故非空不知天地萬物皆從此識變現乃謂之自然由不思議熏不思議變故謂之妙至精不雜故謂之真天地壞而此體不壞人身滅而此性常存故謂之常萬物變化皆出於此故謂之天地之根衆妙之門凡遇書中所稱真常玄妙虗無大道等語皆以此印證之則自有歸趣不然則茫若捕風捉影矣故先示於此臨文不煩重出發明趣向愚謂看老莊者先要熟覽教乘精透楞嚴融會吾佛破執之論則不被他文字所惑然後精修靜定工夫純熟用心微細方見此老工夫苦切然要真真實實看得身為苦本智為纍根自能隳形釋智方知此老真實受用至樂處更須將世事一一看破人情一一覷透虗懷處世目前無有絲毫障礙方見此老真實逍遙快活廣大自在儼然一無事道人然後不得已而應世則不費一點氣力端然無為而治觀所以教孔子之言可知已莊子一書乃老子之注疏故愚所謂老之有莊如孔之有孟是知二子所言皆真實話非大言也故曰吾言甚易知甚易行天下莫能知莫能行而世之談二子者全不在自己工夫體會只以語言文字之乎者也而擬之故大不相及要且學疏狂之態者有之而未見有以靜定工夫而入者此其所謂知我者希矣冀親二子者當作如是觀發明工夫老子一書向來解者例以虗無為宗及至求其入道工夫茫然不知下手處故豫於首篇將觀無觀有一觀字為入道之要使學者易入然觀照之功最大三教聖人皆以此示人孔子則曰知止而後有定又曰明明德然知明即了悟之意佛言止觀則有三乘止觀人天止觀淺深之不同若孔子乃人乘止觀也老子乃天乘止觀也然雖三教止觀淺深不同要其所治之病俱以先破我執為第一步工夫以其世人盡以我之一字為病根即智愚賢不肖汲汲功名利祿之場圖為百世子孫之計用盡機智總之皆為一身之謀如佛言諸苦所因貪欲為本皆為我故老子亦曰貴大患若身以孔聖為名教宗主故對中下學人不敢輕言破我執唯對顏子則曰克己其餘但言正心誠意修身而已然心既正意既誠身既修以此施於君臣父子之間各盡其誠即此是道所謂為名教設也至若絶聖棄智無我之旨乃自受用地亦不敢輕易舉似於人唯引而不發所謂若聖於仁則吾豈敢又曰吾有知乎哉無知也有鄙夫問於我空空如也至若極力為人處則曰克己則曰毋意毋必毋固毋我此四言者肝膽畢露然己者我私意者生心必者待心固者執心我者我心克者盡絶毋者禁絶之辭教人盡絶此意必固我四者之病也以聖人虗懷遊世寂然不動物來順應感而遂通用心如鏡不將不迎來無所黏去無蹤迹身心兩忘與物無競此聖人之心也世人所以不能如聖人者但有意必固我四者之病故不自在動即是苦孔子觀見世人病根在此故使痛絶之即此之教便是佛老以無我為宗也且毋字便是斬截工夫下手最毒即如法家禁令之言毋得者使其絶不可有犯一犯便罪不容赦只是學者不知耳至若吾佛説法雖浩瀚廣大要之不出破衆生粗細我法二執而已二執既破便登佛地即三藏經文皆是破此二執之具所破之執即孔子之四病尚乃粗執耳世人不知將謂別有玄妙也若夫老子超出世人一步故顓以破執立言要人釋智遺形離欲清淨然所釋之智乃私智即意必也所遺之形即固我也所離之欲即己私也清淨則廓然無礙如太虗空即孔子之大公也是知孔老心法未嘗不符第門庭施設藩衛世教不得不爾以孔子專於經世老子顓於忘世佛顓於出世然究竟雖不同其實最初一步皆以破我執為主工夫皆由止觀而入發明體用或曰三教聖人教人俱要先破我執是則無我之體同矣奈何其用有經世忘世出世之不同耶答曰體用皆同但有淺深小大之不同耳假若孔子果有我是但為一己之私何以經世佛老果絶世是為自度又何以利生是知由無我方能經世由利生方見無我其實一也若孔子曰寂然不動感而遂通天下之故用也明則誠體也誠則形用也心正意誠體也身修家齊國治天下平用也老子無名體也無為而為用也孔子曰唯天唯大唯堯則之蕩蕩乎民無能名焉又曰無為而治者其舜也歟且經世以堯舜為祖此豈有名有為者耶由無我方視天下皆我故曰堯舜與人同耳以人皆同體所不同者但有我私為障礙耳由人心同此心心同則無形礙故汲汲為之教化以經濟之此所以由無我而經世也老子則曰常善教人故無棄人無棄人則人皆可以為堯舜是由無我方能利生也若夫一書所言為而不宰功成不居等語皆以無為為經世之大用又何嘗忘世哉至若佛則體包虗空用周沙界隨類現身乃曰我於一切衆生身中成等正覺又曰度盡衆生方成佛道又曰若能使一衆生發菩提心寧使我身受地獄苦亦不疲厭然所化衆生豈不在世間耶既涉世度生非經世而何且為一人而不厭地獄之苦豈非汲汲耶若無一類而不現身豈有一定之名耶列子嘗云西方有大聖人不言而信無為而化是豈有心要為耶是知三聖無我之體利生之用皆同但用處大小不同耳以孔子匡持世道姑從一身以及家國後及天下故化止於中國且要人人皆做堯舜以所祖者堯舜也老子因見當時人心澆薄故思復太古以所祖者軒黃也故件件説話不同尋常因見得道大難容故遠去流沙若佛則教被三千世界至廣至大無所揀擇矣若子思所讚聖人乃曰凡有血氣者莫不尊親是知孔子體用未嘗不大但局於時勢耳正是隨機之法故切近人情此體用之辨也惜乎後世學者各束於教習儒者拘習老者狂學佛者隘此學者之弊皆執我之害也果能力破我執則剖破藩籬即大家矣發明歸趣愚嘗竊謂孔聖若不知老子決不快活若不知佛決不奈煩老子若不知孔決不口口説無為而治若不知佛決不能以慈悲為寶佛若不經世決不在世間教化衆生愚意孔老即佛之化身也後世學佛之徒若不知老則直管往虗空裏看將去目前法法都是障礙事事不得解脫若不知孔子單單將佛法去涉世決不知世道人情逢人便説玄妙如賣死貓頭一毫沒用處故祖師亦云説法不投機終是間言語所以華嚴經云或邊地語説四諦此佛説法未嘗單誇玄妙也然隨俗以度生豈非孔子經世之心乎又經云五地聖人涉世度生世間一切經書技藝醫方雜論圖書印璽種種諸法靡不該練方能隨機故曰世諦語言資生之業皆順正法故儒以仁為本釋以戒為本若曰孝弟為仁之本與佛孝名為戒其實一也以此觀之佛豈絶無經世之法乎由孔子攘夷狄故教獨行於中國佛隨邊地語説四諦故夷狄皆從其化此所以用有大小不同耳是知三教聖人所同者心所異者迹也以迹求心則如蠡測海以心融迹則似芥含空心迹相忘則萬派朝宗百川一味憨山緒言有物者不可以語道夫萬物紛紜非有也有之者人也人不有則萬物何有凡有物者必殉物殉物者幾亡人人亡矣孰與道哉物與人也甚矣夫忘物者不足以致道夫不有物者達物虗物虗則不假忘而忘矣而云我忘物已我忘物已有所可忘非真忘故云不足以致道淪虗者未足以盡道夫心不虗者因物有物虗而心自虗矣心虗物虗則心無而有物虗心虗則物有而無如斯則又何滯哉而必以虗為虗取虗為極是淪虗也何盡道忘與不忘俱忘忘忘矣而必拘俱忘忘矣而不拘俱難噫至矣哉安得無忘而無不忘無俱而無不俱者而與之言忘俱耶今夫致道者在塵必曰動易體出塵必曰靜易造以動易者如實石火以靜易者如可急流石火似有急流似停易此者是不達動靜之原生滅之本也被物動者我之招也不有我孰能動哉觀夫長風鼓於天地木折而竅號於太虗何有焉故至人無我虗之至也以其虗故不動心體原真習染成妄故造道之要但治習治習之要純以智嘗試觀夫融冰者焉火勝則冰易消智深則習易盡我信人不信非人不信信不及也人信我不信非我不信不足信也故我信信心人信信言言果會心則無不信矣銖兩移千鈞之至重一私奪本有之大公私也者圓明之眚生死之蒂也是以得不在小失不在大聖人戒慎恐懼不睹不聞之地勞於利勞於名勞於功勞於道其勞雖同所以勞則異也是以有利不有名有名不有功有功不有道有道者道成無不備陸魚不忘濡沫籠鳥不忘理翰以其失常思返也人而失常不思返是不如魚鳥也悲夫趣利者急趣道者緩利有情道無味味無味者緩斯急也無味人孰味之味之者謂之真人心本澄淵由吸前境渾濁其性起諸昏擾悶亂生惱推原其根其過在著一翳在眼空華亂起纖塵著體雜念紛飛了翳無華銷塵絶念至細者大至微者著細易輕微易忽衆人不識聖人兢兢由乎兢兢故道大功著萬世無過物無可欲人欲之故可欲欲生於愛愛必取取必入入則沒沒則己小而物大生輕而物重人亡而物存古之善生者不事物故無欲雖萬狀陳前猶西子售色於麋鹿也吾觀夫狎虎狼者雖狎而常畏恐其食己也故常畏色欲之於人何啻虎狼哉人狎而且玩食盡而心甘恬不知畏過矣乎虎狼食身色欲食性色欲之於人無敵也故曰賴有一矣若使二同普天之人無能為道者吾意善敵欲者最以智助智以厭厭則懼懼則遠遠則淡淡則忘忘之者望形若偶人視味如嚼蠟何欲哉難而易易而難衆人畏難而忽易聖人畏易而敬難是以道無不大德無不弘功無不成名無不立世之皆以功名為不朽謂可以心致故勞心謂可以形致故勞形且夫盡勞而未必樹樹而未必固吁去聖人孰能固哉不固則朽何固哉吾謂不朽者異夫是知吾之不朽不朽矣榮名者跂名榮位者跂位既跂矣辱何加焉故曰跂者不立不立者無本無本而名位之兢兢乎得失也何榮哉富不大以其蓄有蓄則有亡故不大貴不至以其高有高則有下故不至是知達人無蓄故富莫大焉無高故貴莫至焉藏迹者非隱迹隱而心未必忘馮名者非顯名顯而道未必著故隱非正顯非大吾所謂隱顯者異乎是吾所謂隱顯者隱於體而顯於用也體隱則廓爾太清萬境斯寂用顯則森然頓現一道齊觀如斯則逆順隨宜窮通一致矣噫處此者博大真人哉君父之命不可逃況大命乎嘗試觀夫負小技而不達大命者居常為失意當分為棄時故踔踶之心憤激託言而要乎世噫過矣夫達士觀之猶人酣酒夜行而射顙於柱抱布鼓而號救於天也雖然布鼓存焉知命者不取以機為密非密矣以道為密密也夫吾嘗觀夫弄弩者岌岌然百發而數獲此善者也而況不善者乎善為道者能宥物不發而物無所逃故密莫大焉徑莫至焉天地循環千變萬化死生有常人莫之測不測其常徇物而忘聖人返物故乃昌人棄我取故人之所有我不有我之所有人不有人非不有以其不知有故不有設知有我何異哉塵垢污指必濯而後快貪嗔害德而不知祛是視德不若一指也指污有生德害失性負重者纍多知者勞纍久則形傷勞極則心殆殆已所以殆者事外也是以重生者事內不事外循己不循人志存不志亡變通難言也人莫不以趣利避害為然而吾實不然亦有夫利害置前而不可却者變也何通耶衆人隨之君子審之聖人適之適之則不有以其不自有故不有人謂之盜物者為盜非盜也吾謂之盜心者為盜確已夫夫盜盜物未必盡有禦必不入設入必獲獲則死無容既死矣奚盜哉夫盜盜心必盡失禦急而愈入設獲且生而多又縱之尤有誨之者慎之哉道盛柔德盛謙物盛折是以柔愈強謙愈光折愈亡古之不事物者故乃長密於事者心疏密於心者事達故事愈密心愈疏心愈密事愈達心不洗者無由密是以聖人貴洗心退藏於密一刺在膚側掉而不安衆刺在心何可安耶刺膚膚潰刺心心亡大威可畏觀夫天地肅殺者大威也萬物雖衆靡靡然孰能當之故夫人有威者承天也天威至公人威效公天威愛物人威主生化人無功化己有功己果化而人不化自化矣徵夫觀德人之容使人之意也消信夫治逆易治順難逆有對順無知故有知者遇逆如甘露畏順如鴆毒慎之至也以其慎故守不失慎也者成德之人歟心體本明情塵日厚塵厚而心日昏矣是以聖人用智不用情故致道者以智去情情忘則智泯矣忘情者近道哉智巨事微善達事者莫若智故智之器挫鋭解紛無不利嘗試觀夫片雪點紅爐清霜消烈日以其勝之也故自勝者孰能禦之人以大巧我用至拙人巧以失我拙以得故善事道者棄巧取拙無不獲順我者喜逆我者怒喜怒迭遷好惡競作日益其過推原其由本乎不覺不覺即忘返也恣口體極耳目與物钁鑠人謂之樂何樂哉苦莫大焉隳形骸泯心智不與物伍人謂之苦何苦哉樂莫至焉是以樂苦者苦日深苦樂者樂日化故效道之人去彼取此天地不勞而成化聖人以勞而成功衆人因勞而遂事事遂者逸功成者退故曰功成事遂身退天之道多財者驕高位者慢多功者伐大志者狂勝才者傲厚德者下實道者隨不了假緣橫生取捨識風鼓扇浩蕩不停如海波澄因風起浪風若不起波浪何生識若不生萬緣何有故致道者不了即生了即無生也善哉源不遠流不長道不大功不固是以聖人德被羣生功流萬世以其道大也有大道者孰能破之目容天地纖塵能失其明心包太虗一念能塞其廣是知一念者生死之根禍患之本也故知幾知微聖人存戒自信者人雖不信亦信之矣不自信者人雖信亦不信之矣故自信敦誠人信易欺誠者曰精欺者曰淪智照識惑惑起千差照存獨立故致道者以照照惑貴智不貴識觀夫市人莽行失足於窪然必惕然揮臂以自誓者為嫌其污屨也今夫人者處下德而晏然不惕不誓是自短於市人而土苴其道德也悲夫人皆知變之為變而為之變而不知變有不變者存焉苟知其不變則變不能變之矣苟不知其不變雖無變何嘗不變哉請試觀夫聖人身循萬有潛歷四生紜紜並作而無將無迎者是處其不變而變之也何變哉若夫人者形若稿木而心若揚塵物絶迹而猶呻吟是無變也何嘗不變哉寢息坐臥所以逸身也止絶攀緣所以逸心也身逸者志墮心逸者志精故養道者忘形師心道乃貞天地大以能含成其大江海深以善納成其深聖人尊以納污含垢成其尊是以聖人愈容愈大愈下愈尊故道通百劫福隆終古而莫之爭視民為吾民善善惡惡或不均視民為吾心慈善悲惡無不真故曰天地同根萬物一體此之謂同仁見色者盲見見者明聞聲者聾聞聞者聰是以全色全見盡聲盡聞無不融聲色俱非見聞無住此之謂大通衆念紛紛不止無以會真若以衆念止衆念則愈止愈不止矣若以一念止衆念則不止而自止矣吾所謂一念者無念也能觀無念不妨念念而竟何念哉雖然實無念者贅也夫曾不知其為橛也心體元虗妄想不有若了妄不有雖有而不有也不了妄不有雖不有猶有之也故妄想如空花其根在眼眚了眚花不無空體常寂滅夫平居內照似有及涉事即無者直以心境未融前塵未了而為留礙也故造道者不了前塵縱心想俱停猶為趣寂故於至道不取體寂用照用不失體即照而寂體不離用即寂而照是以體寂若太虗用照如白日故萬變無虧無幽不鑒前無始後無終萬劫一念六合一虗人物齊軌大小同狀晝夜不變死生不遷此之謂常然體此者似人而天誰為之愆事小理大事有千差理唯一味善理者即事無外隱顯存亡莫之二是以至人愈動愈靜無不寓不可以無心得不可以有心求有心執有無心著無是二俱非則超然獨立所以大人無對者以其無可當情也念有物有心空法空是以念若虗鎔逢緣自在心如圓鑑來去常間善此者不出尋常端居妙域矣大忘不忘無不忘用意忘者愈忘愈著執著者未喻道果喻道何不忘耶故曰魚相忘於水人相忘於道遊魚不知海飛鳥不知空凡民不知道藉若知道豈為凡民哉吾意善體道者身若魚鳥心若海空近之矣一動一靜一語一默揚眉瞬目或飲與左之右之無時不察察久念裂劃然自得自得者自知人莫之識天地之功不捨一草滄海之潤不棄一滴圓明之體不離一念是知一念之要重矣夫真心至大此身至微是以明真心者返觀此身猶若片雲浮於太清任往任來翛然無寄由無寄故處世若寄焉為有為無能為為無為能有為是以聖人無為而無不為也吾所謂聖人無為者蓋即為而不有其為非若寒灰枯木而斷然不為也太虗遊於吾心如一漚在海況天地之在太虗乎萬物之在天地乎此身之在萬物乎外物之在此身乎嘻眇小哉以其小故大天地寂萬物一守寂知一萬事畢處此道者常不忒以其不忒故作做云為俱不失不失者謂之真人超然絶待大同也夫不同則物我二物我二則形敵生有形敵者侍莫甚焉何絶哉吾意善致道者貴兩忘兩忘則物我一物我一則形敵忘形敵既忘誰待哉絶待故大大故同大同者謂之聖人故曰會萬物而為己者其唯聖人乎山河大地一味純真心若圓明天地虗寂故達此者外觸目無可當情中返觀了無一物如斯則空空絶迹物物徒云身寄寰中心超象表矣靜極則心通言忘則體會是以通會之人心若懸鑑口若結舌形若稿木氣若霜雪嘻果何人斯願與之遊也其形似拘拘其中深而虗虗眼若不見耳若不聞昏昏悶悶人望之而似癡若亡人而不知偶誰吾請以為師世間所有杳若夢存夢中不無覺後何有故不覺何以超有不超有何以離世吾所謂離世者非離世離世在即世而離世也即世而離世者謂之至人知有為始極盡為終䇿知以智運極以權權也者涉有也涉有處變古有萬變而不失其正者根本存焉今夫不本而誇善變者是由自縛而解人人見而必唾雖孺子大笑之直達謂之頓密造謂之漸直達詣真密造除偽真不詣偽不除偽不除真不極由是觀夫偽也者真之蔽歟道之害歟德之纍歟圓融該攝廣大交徹全事全理隱顯莫測一多互含多一互入舉一通收不妨羅列小大不殊凡聖不隔常泯常照常起常寂心不可思言不可議日用尋常曾無欠闕常在其中不勞途涉此之謂至極大言載道小言載名至言忘言載名者近載道者遠忘言者通是故近則易親遠則易毀通則莫測以其至故莫測居莫測者謂之神化孤掌不鳴不虗無響絶待無言由是觀之言者有待而然也雖然言言於無言言即無言矣無言者言之不及也吾意善得無言者在遺言言既遺而無言者得矣何言哉聊城傅光宅曰世之謂子書者則老莊非其至乎老言簡而意玄莊語奇而思遠後之談道者歸焉荀楊而下未足擬也茲緒言將非老莊之倫耶其為文俊偉明潔而其意旨難以名言或老莊猶有所未及耶疑者曰子是過矣老莊何可及也余曰老莊誠不可及也乃所稱谷神和同與疑始玄珠之類則似有言而未盡又似欲言而難於言者道信無窮極也西方聖人無法可説而有説法言之盡矣故觀老莊而知諸子未盡也觀西方聖人而知老莊未盡也緒言則旨出於西方聖人而文似老莊者也故曰或老莊猶有所未及也然是亦有言也有言則緒也故以緒言名即其言而求其所不言是存乎人矣不然謂憨山今人也緒言何奇哉豈唯不及老莊亦復不及諸子
