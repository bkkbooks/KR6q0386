body:
  text: 侍者福善日録門人通炯編輯嶺南弟子劉起相重較法語答湖州僧海印問古人已稟單傳直指復修淨業而欲往生者為是悟後隨願起行耶為是未悟二行兼修耶若兼修者墮偷心岐路心工夫那得成片如已悟則塵塵華藏在在蓮苗十方無不可者何獨樂西方乎答承教有言淨土有三謂常寂光土實報莊嚴土方便有餘土若諸佛菩薩與從上單傳悟心諸祖皆受自性法樂無一不歸常寂光土者是謂惟心淨土若塵塵剎剎皆淨土者乃華藏莊嚴實報土耳亦惟心所現至若求生西方淨土者名方便有餘土乃華藏塵剎中一土耳此是欲求往生者論云衆生初學懼信心難成意欲退者當知如來有勝方便攝護信心謂以專念西方極樂世界阿彌陀佛所修善根回向願求即得往生常見歸依佛故終無有退此乃未悟而修者即永明所云但得見彌陀何愁不開悟之意也若兼修此行如論所云若觀彼佛真如法身常勤修習畢竟得生住正定故此豈偷心是未達念佛之旨不知淨土之意也是知已悟者不待求而自然往生未悟者亦非偷心念佛可生也問參禪貴一念不生念佛貴淨念相繼茲參究念佛一門意在妙悟而得往生也今念佛時雖心佛分明參時則二俱坐斷故參功漸勝念佛漸微他時焉得亦悟亦生耶答參禪貴一念不生是已若言念佛貴淨念相繼者此將四字佛號放在心中為淨念耳殊不知四字佛號相繼不斷者是名繫念非淨念也乃中下根人專以念佛求生西方正屬方便淨土一門耳今云參究念佛意在妙悟者乃是以一聲佛作話頭參究所謂念佛參禪公案也如從上諸祖教人參話頭如庭前柏樹子麻三斤乾矢橛狗子無佛性放下著須彌山等公案隨提一則蘊在胸中默默參究借此塞斷意根使妄想不行久久話頭得力忽然㘞地一聲如冷灰豆𪹼將無明業識窠臼一拶百碎是為妙悟即參究念佛亦如此參但提起一聲佛來即疑審是誰深深究此佛向何處起念的畢竟是誰如此疑來疑去參之又參久久得力忽然了悟此為念佛審實公案與參究話頭原無兩樣畢竟要參到一念不生之地是為淨念止觀云若心馳散應當攝來歸於正念正念者無念也無念乃為淨念只是正念不昧乃為相繼豈以聲聲念佛不斷為參究淨念耶此不但不知參禪亦不知念佛矣若參究果至淨念現前則淨土不必外求而一念即至得上品上生者此行所至也問即心即佛不外馳求之理信得及見得徹了為便隨緣消業不造新殃任運騰騰以待夫識乾自得耶為當更起疑情窮參力究以求妙悟耶答信得即心即佛及只是空信須要行證若無行證徒信無益豈有但以信字便為了徹耶古人云先悟後修是則悟後正好修行古德云學人但得一念頓契自心是為妙悟尚有八識田中無量劫來惡習種子名為現業流識既悟之後即將悟得道理二六時中密密綿綿淨除現業流識名之為修不是捨此悟外更有修也淨除現業乃為隨緣消舊業全仗悟之之功乃能有力淨除惡習若但空信將何以消惡習乎所云疑情參究等正是淨除現業工夫若未悟時須究業習流識起處經云靜坐山林觀自心流注等若已悟後則惡習起處一照便消自然如紅爐片雪耳悟後消業與未悟時工夫日劫相倍不可同日語也問參禪暫有諸念不生時其話頭便提不起亦捺不落其應緣時若管帶又被古人訶斥任之不能相續只是動靜兩間如何提究疾得相應答參禪暫有諸念不生時此非真不生乃是話頭得力處耳此得力處不能久常及至遇緣便打失或被境界搖奪自然動靜兩般起滅不停耳若果能用心單在一念不生以前著力久久純熟一念不生本體現前常光了了明暗不移動靜一如方為打成一片到此應緣不須管帶自然任運合道豈有古人訶斥真無生意耶參禪工夫只在一念不生以前著力如此提究自然疾得相應若以電光三昧為得終落識情窠臼問永嘉云誰無念誰無生雲居齊云不斷分別不捨心相似悟後有想念也又涌泉云不許走作仰山禪鬼不知及石霜一念萬年等竟似悟後無想念也豈應緣有而離緣無耶有無二義願垂一決答古人悟的就是妄想妄想就是悟的元無兩般迷人坐在妄想中故望妙悟將謂別有耳稜伽云從上諸聖轉相傳授妄想無性豈有二耶但迷時用妄想悟時用自心豈有悟後又起妄想耶問永明云先以聞解信入後以無私契同一入信門便登祖位夫祖位甚深聞解便可登乎況雲門已透法身洞山必令盡識是證非解也茲解位稱祖當必有深義答教有信解行證四門其解有解悟之解知解之解若以聞信入乃知解邊事若靈雲睹桃華香巖聞擊竹頓了自心此解悟之解一解便徹自心即將解字吐却所謂入此門來不存知解便稱祖位若聞他家屋裡事解得當為己有豈可稱為祖師耶已透法身若影子不忘正墮識情全存知解是以古人不貴若真實悟的豈特解不稱祖所謂初發心時即得菩提豈可與知解者同耶問初祖示稜伽以印心黃梅令讀金剛而見性乃至俱胝準提首山法華似參禪不礙於持誦藥山不許看經趙州不喜念佛乃至高峰曰話頭綿密便是一卷不斷頭的經又似禁絶誦持而貴在單提心印從來以參話頭為主兼持華嚴及念佛為課今欲止其課一其參惟存願力未知得否答初祖黃梅以稜伽金剛印心乃禪道初來恐學人用心差錯故以經印正其心不致誤謬非是以經為己解也俱胝準提是以呪為話頭參究亦從緣而入者若首山法華乃悟後聊以作佛事耳所謂心悟轉法華非以誦經作功行也其不許看經念佛者正恐學人迷却自己把作實法會耳若參禪人未悟時不妨持誦乃借法力加持以為助行如三期懺悔古人必不可少若悟後誦經則字字心光透露盡為妙行豈比循行數墨春禽晝啼者耶問但愁不作佛莫愁佛不解語古訓也今之學者不務真修而務機鋒轉語過矣然自知未悟時切提撕只因見地未明恐是盲修瞎煉故以師資道友間問答酬唱此亦無傷乎儻學力不通商量必俟悟後吐語則見地尚虧從誰起行耶況陶鎔理性決擇是非如三登九上一句千山俱在悟前耶答古時悟心之士稱為明眼人若作家相見如兩鏡相照不拘有語無語自然目擊道存不是定要酬酢機鋒相尚為高也後之學者狂妄馳騁口舌便利誠不足取若是參學有疑明眼人前真誠請益披露本心亦非以口舌相見至若廣參知識只為決擇此心何妨落草盤桓平實商量方是本色道人若務機鋒應酬乃門頭戶底非真實也真參實悟之士決不墮此問見自性者得自由於生死作得主者能轉業於臨終彼諸祖得自由者勿論其草堂青印禪師等那隔世便迷耶豈悟有淺深習有重輕乎抑亦大悲增上本高迹下而人自不知乎不然學者奚取信於見性法門耶答古人所云一悟便了生死者乃悟自性法身耳尚有積劫無明習氣種子皆生死苦因未得頓盡故須多劫修行方成佛道且如七信菩薩已悟自性位登不退者又歷四十二位漸斷無明習氣方成佛道豈可以七信之悟便為究竟了生死耶是知變易生死尚與微苦相應故云菩薩有隔陰之昏所云轉業但是道力殊勝故能轉非定消定業也其實悟有淺深習有厚薄但悟後處生死而不被生死拘留來去自在故稱變易生死是悟心之人在生死中縱迷亦易覺必不至大顛倒耳經云一成真金體不復重為礦豈可預憂其復迷而輕見性法門耶若本高迹下又不在此論然佛不能逃定業又非悟心之咎也答段幻然給諫問曰圓妙真心未有不由五陰而障入如來地未有不由破陰而成稜嚴五十五位行布詳矣由淺淺而深深必由破某陰而後躋某位以破障對位次諸家解尚未分明豈學問難思推敲難到故置之耶經云受陰盡者雖未漏盡心離其形從是凡身上歷菩薩六十聖位可見破色陰決在三漸次無疑矣且又修習真修增進諸功皆在色身而起其破色陰一一可徵獨以受想等攝入六十位中尚未決別而經云又以識陰若盡如淨琉璃內含寶月如是乃超十信等可見五陰該在行布中但後人未細心耳某陰未盡則不能超十信某陰未盡則不能超十住等至於識陰銷落六十位次始超今若云破陰自破陰何必併歸六十位位次自位次何必併歸破陰是有二種門頭矣且歷位而不併入五陰則行布內少破魔之功勛行布不成行布也破陰而不併入三賢十聖則破陰中缺修證之位次破陰不成破陰也望師一一分疏開我執迷今掠宗抄案之徒只貴眼明不貴踐履謂毗盧頂上行有何五陰有何行布大妄語成害將何極至於宗門得道之祖亦謂一了一切了不歷三祇今無論十地神通即願心住菩薩能遊十方所往隨願傳燈高賢有此手段否初發心時便成正覺恐只收入初乾慧中未必是金剛乾慧後心也次又見孤山注識陰盡文諸根互用即圓教相似七信界內思惑已盡也能入金剛乾慧者從相似位超入等覺後心也天台明圓教利根一生有超登十地與此符合甫閲其文不覺鼓掌曰識陰若盡如是乃超十信十住十回向十地等覺云云超字又不歷五十五位者也然則三漸次以後即破五陰陰若破則五十五位可盡超乎若然是行布外另有一種門頭也望師詳以語我困農望雨以日為歲此番請益更切更深惟勿斳金玉是禱武昌段然頓首答讀來問稜嚴破陰淺深與五十五位相對同別此乃諸佛菩薩自住三摩地中親證境界非凡情所可妄測此義從前諸師亦未疑及即宗鏡深窮性相之原然亦未談及此學者一向槩未留心即山野通議但於三漸次及結位之文小有發揮亦未詳配位次如來問云云深為有見山野膚淺暗昧且禪定未深五陰未破定中境界安敢妄言以居士為法心切問意懇到故敢依聖言量略陳其槩所言五陰乃一切衆生通受生死之苦具修行之士未有不破五陰而能超生死者故如來出世單單只是破衆生五陰生死之具即一代時教盡是破陰之談散在五時無處不説但未次第唯以稜嚴經一經收盡一代時教統攝迷悟修證因果備殫聖凡二路以便修行者為一路涅槃門故修證位次始終詳悉且又特申定中破陰境界者以此經真修專以禪定一門深入而以破陰其淺深故其位次不同華嚴瓔珞等説以華嚴圓圓果海一位具足一切位雖設行布不説斷證要在藉顯圓融故初發心時便成正覺是以果覺為因心也瓔珞位次雖詳意在分斷分證故約見思塵沙無明以定列行布如天台所明此經與彼二經迥然不同單約稜嚴大定頓悟漸修故以不生滅心為本修因是先悟妙圓真心為本發心即以此心漸斷習氣以定位次淺深正起信論發心修行以悟真如為本至其斷惑論又多依相宗斷證特約六粗三細以定位次是謂先悟後修故論就破惑定位則易明此經以破陰定位則難合何也若約論則信位斷執取計名字起業三種粗惑三賢斷相續智相二惑為粗中之細細中之粗初地至七地斷三細中現相八地至等覺斷轉相金剛最後斷業相此經中斷證之明文也今若以五陰對惑合位高下則經義大不然矣以經有明文則曰理須頓悟乘悟併消此則不歷諸位矣事須漸除因次第盡此又約斷以明位也此經先悟後修正與論義相符若約論義先斷惑業在三賢後斷無明在登地與今經少異詳今經文三漸次中即獲無生法忍從是漸修安立聖位然無生法忍乃登地已證平等真如方得此忍是經意以三漸中專以真如為行本且云反流全一六用不行十方國土皎然清淨譬如琉璃內懸寶月後文云識陰若盡如淨琉璃內含寶月如是乃超十信以至等覺圓明入於如來妙莊嚴海以此佛語證之則在三漸次中已超諸位應於未登位前已破識陰又不待相似信位矣又何敢妄以破陰次第配諸位耶諦觀佛意必不然矣此經正義大與諸經不同者以諸經蓋隨時隨機對談修證中一段義其所破惑亦隨機偏重乃一時應病之藥耳此經總收一代時教無機不攝重在單破生死根本專指淫習為生死之根大定乃破敵之具故經特出發業潤生二種無明是以大定直破八識根本無明而以定斫窮縱八識未破而見思塵沙粗惑任運先落至若以不生滅心為本修因正是以金剛心為禪定本故經云是名妙蓮華金剛王寶覺由是觀之則初修定時在三漸次中以定研窮已破八識透出金剛心地正是理須頓悟乘悟併消則能超越諸位矣若云從此安立聖位則是事須漸除因次第盡乃約侵斷歷劫無明習氣特就厚薄輕重約位以判淺深高下耳斯約頓悟漸修則由破陰而入位元無二路也此義正與溈山云若人一念頓了自心是名為悟即以所悟淨除現業流識是名為修非此外別有修也以衆生隨生死流流有四種謂欲流有流見流無明流今三漸次中欲愛乾枯根境不偶現前殘質不復續生乃斷欲有見三流也名乾慧地者言乾有其慧未與如來法流水接是無明流尚未乾耳此無明流乃金剛心中無明流宗門目為真常流注故經結位文云是覺始獲金剛心中初乾慧地此言從前漸次得乾慧以來直至等覺金剛心中無明習氣之流才得乾耳由是觀之於三漸次中已破八識頓悟自心從入信以來直至等覺通斷無明習氣正是事須漸除因次第盡也所以無明必歷諸位而後盡者以從真淨界中瞥生一念無明遂起生死無量劫來起惑造業皆是無明妄想之咎以遭曠劫生死時長染著愛欲習氣深厚必須以金剛心重重磨煉方始得還本源心地故從信位即云圓妙開敷中道純真末後乃云如是重重單復十二者正顯以此大定消磨習氣之功也且如經云五陰各各皆是妄想為本若破陰對位則經初信文中便云即以此心中中流入一切妄想滅盡無餘又安可以帶陰而入諸位耶若帶妄想而修則不名為真修矣且三漸次中欲愛乾枯根境不偶現前殘質不復續生此則已出三界生死矣後文識陰盡則超命濁豈但破色陰耶受乃執受四大有苦樂等若受陰不破則不得正受若想陰不破則難入妙奢摩他若行陰不破則生滅不停非為正定若識陰不破則未悟真心難立諸位由此證之則在三漸次中已破五陰決不帶五陰而入諸位也明矣豈可單破色陰耶由五陰俱破方名真悟由破八識進修乃名真修是則破五陰乃頓悟其理其後諸位但約大定以消磨歷劫無明習氣正謂事須漸除至若五十五位諸妙功德以如來藏中具有恆沙稱性功德向被無明變作恆沙生死業習今以金剛如幻三昧磨煉業習化作神通妙用耳以所化者淺故其位下所化者深故其位高圭山云覺前前非名後後位以此觀之此經大義單以觀心研窮進破無明約位以明證入之淺深非分斷分證之可比由先破陰而後八位非約破五陰以配諸位也明矣又豈可執定破陰以併行布位次耶然破陰之説佛恐諸修行人得少為足錯亂修習故特申明以防邪誤非就此以明位也且識陰未破墮落二乘則可知矣若禪門頓悟自心頓出生死則不落階級乃是三漸次中頓破八識自然超越諸位然祖師雖云超越但云素法身佛未必具有相光莊嚴神通妙用即諸佛如來未有不悟自心而成佛者若一悟便了無事則諸佛又何假更歷三大阿僧祇劫耶今人蒲團未穩以世智聰明掠古人公案自逞知見妄言證聖自為超佛越祖乃是憎上慢人未得謂得墮大妄語可不懼哉此輩豈可以破陰不破陰與真修之士同日而語耶昨東行見禪者甚多而墮上慢者不少山野特舉破陰以印正之聞者慚服頗折其邪見白衣談禪多墮此病惟今真修但以三漸次行頓悟自心頓出生死一著為急務若自心一明識陰自破則前四陰不待破而自破且如將頭臨白刃一似斬春風豈色陰能礙也又云老僧能轉十二時又云入息不居陰界出息不涉衆緣豈在受想行陰裏六祖臨終自知去處豈非隨願所往如是殆非妄言證聖者可擬也吾人只貴究明自心求出生死一著且不必論破陰與位次合不合以理揆之聖言證明暗劣之見如此高明有以教之西堂廣智請益教乘六疑一問古人判教云雙垂兩相二始同時初説華嚴本被大乘二乘絶分鹿苑轉四諦時身子目連尚未捨邪出家何故華嚴結末文中有聲聞舍利弗等若據結文二乘得聞華嚴何故斥云二乘絶分文義俱違願垂分祈答教中説十方諸佛一身一智慧故十方佛土中唯説一乘法所以菩提場中初成正覺即説華嚴為最上一乘法獨被大根衆生是謂稱實智説爭奈衆生根機不一有中下劣解不見不聞則為絶分故隨劣機感現小化身八相成道於鹿野苑説三乘法所謂佛真法身猶若虗空應物現形如水中月以但隨機感故現身耳其所説法為權智也華嚴會上逝多林中文殊象王回旋則舍利弗等六千比丘成道於言下是亦地上菩薩名大阿羅漢今佛既現小應身示生人間而諸外道堅執我見未易攝化故舍利等亦隨現聲聞輔揚法化為影響衆所謂內祕外現之儔非實聲聞也其斥二乘絶分者乃斥實行執相聲聞而舍利等受呵正為鼓簧法化耳大似優戲場中各作一腳以發悲歡離合之情及至散場則了無干涉故菩薩利生如嬉戲然調而應偶而會豈實法耶二問華嚴經中普眼不見普賢如是三度入定遍觀三千大千世界不見却來白佛佛教靜三昧中起念便見普眼才起一念即見在虗空中若普賢之身是一真法界應在三昧中見何故不見若普賢是色相身未入定時應見何故佛教起念方見耶答法身無相饒他普眼亦莫能覷於定中求而不見者以法身無彼此迭相見故是知可見者乃就第二門頭故起念方見耳三問起信論中真如內熏故有妄心厭生死苦要求涅槃妄心有二一者凡夫二乘依事識熏修二者菩薩依業識熏修今之學人參究但依事識不能依業識參禪本是大乘法門若依事識而參返成凡夫二乘之行若參時二識同用又違古人云離心意識參願垂開決答教説凡夫二乘依事識修菩薩依業識修乃約就依識發心取證耳今參禪人發心雖是事識而用志直要打破業識漆桶直透向上未迷已前一著不落二識巢臼若得少為足便不能離心意識矣四問古人云不貴子之行履祇貴子之見地又云見地不明墮落坑塹今諸方解説有二一説博學經論依解名為見地一説悟明後方為見地若學解為見地何故宗門不許看教若悟後方是見地即今初心操履以何法為見地免離墮坑之患耶答解為見地有三種不同有學解有信解有悟解若從教上或祖師公案上解得佛祖究竟處不落枝岐此雖是名見地謂依地作解其有未親言教但只決定信自心了無一物是為信解若參究一旦明本有是為悟解此三皆名見地但依他解多落知見障信解如此亦要操修以臻實證其悟解雖一念頓悟尚有無始微細惑障亦要淨除是三種見地雖貴若不行履終難究竟今古人所貴見地者但就根器為本非金不行履古人一期之語不可作實法會也五問古人云參究在搬柴運水行腳處參今之學者要在靜坐參功有力若在四威儀中與物交接心念紛飛話頭沈沒若惟靜坐又違古人操履若與物交終日散心如何令學人日用中動靜無違也答古人做工夫要在行住坐臥四威儀中看取不是教你死死枯坐也以初入禪心多散動姑就靜坐攝心其實要將靜中做的去動處驗看如何若用心綿密自然動靜如一打成一片矣今對境心念紛飛是於話頭全不得力豈真參之人耶為今只要話頭得力不拘動靜自然不被他轉矣六問又經云心佛衆生三無差別又云佛界等衆生界等又云度盡衆生方成佛道若生佛平等佛無度生之義如何度盡衆生方成佛道若佛菩薩度盡衆生佛界似乎漸增衆生界似乎漸減云何謂生佛平等耶答心佛衆生本來平等以衆生是佛心中之衆生故佛度自心之衆生若衆生相空是為度盡衆生即成自心之佛縱一心盡作衆生乃衆生自作自心之衆生而佛界不減縱衆生界盡只是消得各各衆生界以心平等故而佛亦不增佛觀衆生界空若衆生自心不空則衆生亦不減譬如長空雲屯霧暗而空亦不減雲散霧消而空亦不增雖終日暗終日消而空體湛然此則佛界豈有增減耶答大潔六問一問持律曰初學不知持律恐舉動即錯受有次第決無莽獵然其間大小區乘權實應用雖根因利鈍機隨淺深不無弊端幸提軌則使利者仰遵而鈍者拓武乎答佛所設戒律部載之詳矣本意為衆生有八萬四千煩惱故設八萬四千律儀為對病之藥欲令煩惱病除法身清淨因機有大小故戒有三品曰沙彌十戒比丘二百五十戒菩薩十重四十八輕戒以沙彌比丘二種戒乃因事而設名為遮戒謂遮止過非雖大小同遵而多為小乘但執身不行有能執心不起者即為大乘亦在事相戒至若梵網經所説十重四十八輕戒名為性戒乃我本師盧舍那報佛所説諸佛心地法門名金剛寶戒命釋迦文佛展轉傳化所言性戒者謂了達自性清淨本來無染頓悟本有清淨法身性自具足故名為戒經云若人受佛戒即入諸佛位故釋迦四十九年所説者但傳此戒法而已末後拈華所示者亦示此戒性而已歷代祖師所悟者亦圓此戒光而已故觀一切衆生佛性種子本來平等以同具平等法身故以佛性而觀衆生則凡起一念殺盜淫妄乃至説四衆過自讚毀他謗三寶者即斷佛慧命與殺佛無異矣故列十重之科若以平等法身而觀衆生則無可殺盜淫妄乃至毀謗者以乃圓滿頓戒然所重者獨在佛性種子即佛之慧命故不獨上根利智能受即黃門二根淫男淫女乃至鬼神但解法師語者皆堪受之只要信一切衆生佛性種子即是平等法身苟能作如是觀則於一切日用現前所遇境界盡是戒光明地如此不獨執身不行而於殺盜淫妄觸目念念佛性現前則頓化為光明聚矣又豈特執心不起而已耶然持之之法在遮戒固難端在檢束三業制伏過非唯此性戒實難要以一片金剛心持之勿失但一念昧却即全身墮落豈細事哉故華嚴十信初心持此戒者説淨行品一百二十大願則日用無滲漏處尚隨事相至若十住初心持此戒者有梵行品審觀離相便是持此戒之方法也初機常持此二品經則久久自然相應矣所云弊者在遮戒有執相自是多我慢自高憎毀戒者之弊持性戒者有未得謂得縱放任情認賊為子之弊祛此二端無問利鈍皆名真持戒者二問參禪曰守律而不如自性終屬顢頇欲求見性無過參究其間疑悟交關子賊難判幸垂永鑒免墮迷坑答佛説沙門所習戒定慧三學然律即戒學其參究即定學也惟教中所設定學乃三觀妙門為悟心之捷徑後因禪道東來重在直指單傳見性為禪而不言定然禪即定也初達磨示二祖只是個覓心了不可得名為頓悟乃至六祖只是教人不思善不思惡那個是自己本來面目即此返求自心便是參究工夫初無看話頭下疑情之説後至黃蘗以下乃教人看話頭以古人一則公案為本參相傳為實法及至今時師家教人但參公案不究自心因此疑誤多人故今參禪者多未有得正知見者且又自以參禪毀教蓋為非真參禪也殊不知古人為學人難入特以一期方便權宜只要人識自本心耳佛祖豈有二心耶殊不知提話頭堵截意根不容一念生滅遷流即是入定要門而今別作奇特想故多自誤耳唯今參究不可無話頭以初心散亂難制要此作巴鼻當未提時須要先持身心內外一齊放下放到無可放處從此緩緩極力提起話頭返看起處從何處起畢竟是個甚麼因未明見自心故下疑情云如何是我自己本命元辰如此追求是名參究要念念不昧心心不移日夜靠定廢寢忘餐忽然冷灰豆𪹼本體一念現前是謂悟自本心到此依然只是舊時人更無一毫奇特處若得一念歡喜便自為足是名認賊為子矣何況作種種知見説偈説頌為奇貨耶切不可墮此魔網三問公案曰話頭破碎後一千七百葛藤勢如破竹然一則稍訛一齊雲霧從前破碎方信鬼關不識此弊而掉弄精魂三途潛伏矣答學人果能明見自心到不疑之地則與十方諸佛歷代祖師一個鼻孔出氣又説甚公案不公案此事不是初機分上事且姑置之不必在念四問印教曰不向教上印證者不得正知見此和尚舊訓也然義路是宿習宿習難消如油入麵萬一印處有一絲意識則悟者轉落陰魔資發邪見為害匪細幸揭關頭答老人尋常要修行人以教印心者謂是為自己所知所見一向無明眼人指示邪正要以佛經印正如稜嚴稜伽圓覺經中所説皆禪定工夫悟心之要將自心對照看如佛所説不如佛説故云以聖教為明鏡照見自心不是將經中玄妙言句回為己解也如子所問者正不知話頭落處也至若吾人種種心病唯佛披露殆盡如稜嚴七趣升沈之狀五十種陰魔之形稜伽外道二乘之邪見非佛細説又何從而知懼耶吾所謂印心者此耳只要以教照心不在義路不義路至若宿習種種又不止義路也五問闡教曰法布施者大法供養者最因悟印教即印闡教似乎契佛知見大轉法輪然悟非真悟以印自信印非真印以闡自任抹却諸注獨逞己明是獅是狐易於自慁是闡是謗難於自知幸垂精判永奉蓍龜答為佛弟子念佛恩難報唯有替佛傳法為真報恩者故古之宏法諸師有三種不同一自悟本性妙契佛心於佛言教如從自己胸中流出四辨無礙且又深入教海波瀾浩瀚如清涼圭峯天台諸大祖師是也二雖未悟自心依佛言教印定自心廣探教海如所解説不謬佛意此雖未超言象而不敢妄以己見縱談依教敷演如從前諸大法師是也三有夙習般若種子如有禪定工夫自明己心妙契佛意但未廣涉多聞而正見不謬雖有以淺為深之過而無謗法之愆其所宏揚皆以法施為心不求世間名利恭敬如昔溫陵寂音諸老是也此皆法施之大者至有聰明利根但恃己見為得排斥古今縱口橫談唯以宏法為利者此則不唯破壞佛法抑且誤墮後人如是豈可以闡法稱乎此了然易見不問可知六問頌古曰古人悟後頌古如描畫虗空不落色相今人悟未能徹輒易頌古句出詩想機同滑稽以為悟語悟境膾炙人口一轉墮狐恬不知懼此末法流弊乎吾輩易失此坑幸發針砭普荷深慈答頌古從上有之不過發揮古人作略聊示門庭施設以彰大機大用且出自己縱奪殺活之手非徒矢口縱情搆畫為得也此頌古闡教二事皆非初機所急何須預設古德云但得了悟自心不愁不會説法如是初心唯以究心求明己躬大事為急切不可懷此見也吾人苟能了悟自心縱不闡教不頌古亦是真實出家不負在袈裟下也
